// ── TITLE BLOCK EXTRACTOR ──
async function extractTitleBlock(dataUrl){
  if(!_apiKey||!dataUrl)return null;
  try{
    const text=await apiCall({
      max_tokens:150,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:dataUrl.split(",")[1]}},
        {type:"text",text:`Look at the title block of this engineering drawing (typically in the bottom-right corner).
Extract exactly three fields:
- Drawing number (labeled DWG NO., DRAWING NO., JOB NO., DWG #, SHEET, or similar)
- Drawing title or description (the main name/description of what is shown)
- Revision (labeled REV, REVISION, REV NO., REV LETTER — typically a letter like A, B, C or a number; empty string if not shown)
Return ONLY valid JSON, no extra text: {"drawingNo":"...","drawingDesc":"...","drawingRev":"..."}`}
      ]}]
    });
    const m=text.replace(/```json|```/g,"").trim().match(/\{[\s\S]*?\}/);
    if(!m)return null;
    return JSON.parse(m[0]);
  }catch(e){return null;}
}

// ── DRAWING LIGHTBOX ──
function DrawingLightbox({pages,startId,onClose}){
  const [idx,setIdx]=useState(()=>{const i=pages.findIndex(p=>p.id===startId);return i>=0?i:0;});
  const pg=pages[idx]||pages[0];
  const typeColors={bom:C.accent,schematic:C.green,layout:C.purple};
  const typeLabels={bom:"BOM",schematic:"Schematic",layout:"Layout"};

  useEffect(()=>{
    function onKey(e){
      if(e.key==="Escape")onClose();
      if(e.key==="ArrowRight"||e.key==="ArrowDown")setIdx(i=>Math.min(i+1,pages.length-1));
      if(e.key==="ArrowLeft"||e.key==="ArrowUp")setIdx(i=>Math.max(i-1,0));
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[pages.length,onClose]);

  if(!pg)return null;
  const types=getPageTypes(pg);
  const hasFilmstrip=pages.length>1;

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",flexDirection:"column",background:"rgba(0,0,0,0.97)"}}>

      {/* Top bar */}
      <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"#0d0d14",borderBottom:`1px solid ${C.border}`}}>
        <div style={{flex:1,fontSize:15,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pg.name}</div>
        <div style={{display:"flex",gap:6}}>
          {types.map(t=>(
            <span key={t} style={{background:typeColors[t]+"33",color:typeColors[t],border:`1px solid ${typeColors[t]}66`,borderRadius:10,padding:"3px 10px",fontSize:13,fontWeight:700}}>
              {typeLabels[t]}
            </span>
          ))}
        </div>
        <div style={{fontSize:13,color:C.muted,whiteSpace:"nowrap"}}>{idx+1} / {pages.length}</div>
        <button onClick={onClose} style={{background:C.border,border:"none",color:C.text,cursor:"pointer",borderRadius:6,padding:"6px 16px",fontSize:14,fontWeight:600}}>✕ Close</button>
      </div>

      {/* Image area */}
      <div onClick={onClose} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",padding:"16px 64px"}}>
        <img onClick={e=>e.stopPropagation()} src={pg.dataUrl} alt={pg.name}
          style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:6,boxShadow:"0 4px 40px rgba(0,0,0,0.8)"}}/>

        {idx>0&&(
          <button onClick={e=>{e.stopPropagation();setIdx(i=>i-1);}}
            style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.1)",border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",borderRadius:8,padding:"10px 14px",fontSize:26,lineHeight:1}}>
            ‹
          </button>
        )}
        {idx<pages.length-1&&(
          <button onClick={e=>{e.stopPropagation();setIdx(i=>i+1);}}
            style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.1)",border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",borderRadius:8,padding:"10px 14px",fontSize:26,lineHeight:1}}>
            ›
          </button>
        )}
      </div>

      {/* Filmstrip */}
      {hasFilmstrip&&(
        <div style={{flexShrink:0,display:"flex",gap:8,padding:"10px 16px",overflowX:"auto",background:"#0d0d14",borderTop:`1px solid ${C.border}`}}>
          {pages.map((p,i)=>(
            <img key={p.id} src={p.dataUrl} alt={p.name} onClick={()=>setIdx(i)}
              style={{height:64,width:104,objectFit:"contain",borderRadius:4,cursor:"pointer",border:`2px solid ${i===idx?C.accent:C.border}`,background:"#080810",flexShrink:0,opacity:i===idx?1:0.55,transition:"all 0.15s"}}/>
          ))}
        </div>
      )}
    </div>,
    document.body
  );
}

// ── PANEL CARD (inline workspace) ──
function PanelCard({panel,idx,uid,readOnly,onDelete,onUpdate,onSaveImmediate,onViewQuote,onOpenDetails}){
  const [dragging,setDragging]=useState(false);
  const [processing,setProcessing]=useState(false);
  const [processingMsg,setProcessingMsg]=useState("");
  const [detecting,setDetecting]=useState(false);
  const [detectProgress,setDetectProgress]=useState("");
  const [extracting,setExtracting]=useState(false);
  const [extractProgress,setExtractProgress]=useState(null);
  const [showFastQuote,setShowFastQuote]=useState(false);
  const [lightboxId,setLightboxId]=useState(null);
  const [draftName,setDraftName]=useState(panel.name||"");
  const [draftNo,setDraftNo]=useState(panel.drawingNo||"");
  const [draftDesc,setDraftDesc]=useState(panel.drawingDesc||"");
  const [draftRev,setDraftRev]=useState(panel.drawingRev||"");
  const [extractingTitle,setExtractingTitle]=useState(false);
  const [tagsChanged,setTagsChanged]=useState(false);
  const [aiFeedback,setAiFeedback]=useState("");
  const [reExtracting,setReExtracting]=useState(false);
  const [feedbackSaved,setFeedbackSaved]=useState(false);
  const [err,setErr]=useState("");
  const [partLibrary,setPartLibrary]=useState([]);
  const [partCorrections,setPartCorrections]=useState([]);
  const [aiPricing,setAiPricing]=useState(false);
  const [pricingProgress,setPricingProgress]=useState(null);
  const [validatingPanel,setValidatingPanel]=useState(false);
  const feedbackRef=useRef(null);
  const fileRef=useRef(null);
  const autoSaveTimer=useRef(null);
  const bomEditRef=useRef({});
  useEffect(()=>{
    loadPartLibrary(uid).then(setPartLibrary);
    loadPartCorrections(uid).then(setPartCorrections);
  },[uid]);
  useEffect(()=>()=>{if(autoSaveTimer.current)clearTimeout(autoSaveTimer.current);},[]);

  const pages=panel.pages||[];
  const typeColors={bom:C.accent,schematic:C.green,layout:C.purple};
  const SHORT={bom:"BOM",schematic:"SCH",layout:"LAY"};
  const bomCount=pages.filter(p=>getPageTypes(p).includes("bom")).length;
  const schCount=pages.filter(p=>getPageTypes(p).includes("schematic")).length;
  const layoutCount=pages.filter(p=>getPageTypes(p).includes("layout")).length;

  async function addFiles(files){
    setProcessing(true);
    const items=[];
    for(const f of Array.from(files)){
      if(f.type==="application/pdf"){
        await window.pdfjsReady;
        const pdfjs=window._pdfjs;
        const buf=await f.arrayBuffer();
        const pdf=await pdfjs.getDocument({data:buf}).promise;
        for(let pg=1;pg<=pdf.numPages;pg++){
          setProcessingMsg(`${f.name} p${pg}/${pdf.numPages}`);
          const page=await pdf.getPage(pg);
          const vp=page.getViewport({scale:4.0});
          const canvas=document.createElement("canvas");
          canvas.width=vp.width;canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
          let srcCanvas=canvas;
          if(canvas.height>canvas.width){
            const rot=document.createElement("canvas");rot.width=canvas.height;rot.height=canvas.width;
            const rctx=rot.getContext("2d");rctx.translate(0,rot.height);rctx.rotate(-Math.PI/2);rctx.drawImage(canvas,0,0);
            canvas.width=0;canvas.height=0;srcCanvas=rot;
          }
          const dataUrl=srcCanvas.toDataURL("image/jpeg",0.95);
          srcCanvas.width=0;srcCanvas.height=0;
          const resized=await resizeImage(dataUrl,3800);
          items.push({id:Date.now()+Math.random(),name:`${f.name} — p${pg}`,dataUrl:resized,types:[]});
        }
      } else if(f.type.startsWith("image/")){
        setProcessingMsg(f.name);
        const reader=new FileReader();
        const dataUrl=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(f);});
        const resized=await resizeImage(dataUrl,3800);
        items.push({id:Date.now()+Math.random(),name:f.name,dataUrl:resized,types:[]});
      }
    }
    setProcessing(false);setProcessingMsg("");
    if(_apiKey&&items.length){
      setDetecting(true);
      for(let i=0;i<items.length;i++){
        setDetectProgress(`Detecting ${i+1}/${items.length}…`);
        const info=await detectPageTypes(items[i].dataUrl);
        items[i].types=info.types;items[i].sheetNo=info.sheetNo;
      }
      setDetecting(false);setDetectProgress("");
    }
    let updated={...panel,pages:[...pages,...items]};
    // Auto-extract title block from first drawing if panel has none yet
    if(_apiKey&&items.length>0&&!panel.drawingNo){
      const firstWithData=items.find(i=>i.dataUrl);
      if(firstWithData){
        const tb=await extractTitleBlock(firstWithData.dataUrl);
        if(tb){
          updated={...updated,drawingNo:tb.drawingNo||"",drawingDesc:tb.drawingDesc||"",drawingRev:tb.drawingRev||""};
          setDraftNo(tb.drawingNo||"");setDraftDesc(tb.drawingDesc||"");setDraftRev(tb.drawingRev||"");
        }
      }
    }
    // Show drawings immediately
    onUpdate(updated);
    try{await onSaveImmediate(updated);}catch(e){}

    // Auto-extract BOM from any BOM-tagged pages
    const bomPages=updated.pages.filter(p=>getPageTypes(p).includes("bom")&&p.dataUrl);
    let latestPanel=updated;
    if(_apiKey&&bomPages.length>0){
      setExtracting(true);setExtractProgress({msg:"Auto-extracting BOM…",pct:2});
      let all=[];let ok=true;
      for(let i=0;i<bomPages.length;i++){
        setExtractProgress({msg:`BOM page ${i+1}/${bomPages.length}…`,pct:5+Math.round((i/bomPages.length)*88)});
        try{const items=await extractBomPage(bomPages[i].dataUrl);all=[...all,...items];}
        catch(ex){setErr(`BOM extraction failed: ${ex.message}`);ok=false;break;}
      }
      if(ok&&all.length>0){
        const map={};
        all.forEach(item=>{
          const key=(item.partNumber||"").trim().toLowerCase()||("desc:"+item.description.toLowerCase().slice(0,40));
          if(map[key]){map[key].qty=(+map[key].qty||1)+(+item.qty||1);}
          else{map[key]={...item,id:Date.now()+Math.random(),qty:+item.qty||1};}
        });
        const bom=Object.values(map);
        const withBom={...updated,bom,status:"extracted",updatedAt:Date.now()};
        latestPanel=withBom;
        onUpdate(withBom);
        try{await onSaveImmediate(withBom);}catch(e){}
        setExtractProgress({msg:`✓ ${bom.length} items extracted`,pct:100});
      }
      setExtracting(false);
    }
    // Auto-validate if schematic pages exist
    const schPages=latestPanel.pages.filter(p=>getPageTypes(p).includes("schematic")&&p.dataUrl);
    if(_apiKey&&schPages.length>0){
      setValidatingPanel(true);
      setExtractProgress({msg:"Validating schematics…",pct:null});
      const validation=await runPanelValidation(latestPanel);
      if(validation){
        const withVal={...latestPanel,validation,status:latestPanel.status==="extracted"?"extracted":"validated",updatedAt:Date.now()};
        onUpdate(withVal);
        try{await onSaveImmediate(withVal);}catch(e){}
      }
      setValidatingPanel(false);
      setExtractProgress(null);
    }
  }

  async function autoExtractTitle(){
    const firstWithData=pages.find(p=>p.dataUrl);
    if(!firstWithData||!_apiKey)return;
    setExtractingTitle(true);
    const tb=await extractTitleBlock(firstWithData.dataUrl);
    setExtractingTitle(false);
    if(tb){
      setDraftNo(tb.drawingNo||"");setDraftDesc(tb.drawingDesc||"");setDraftRev(tb.drawingRev||"");
      const updated={...panel,drawingNo:tb.drawingNo||"",drawingDesc:tb.drawingDesc||"",drawingRev:tb.drawingRev||""};
      onUpdate(updated);
      try{onSaveImmediate(updated);}catch(e){}
    }
  }

  function saveTitleFields(){
    const updated={...panel,drawingNo:draftNo.trim(),drawingDesc:draftDesc.trim(),drawingRev:draftRev.trim()};
    onUpdate(updated);
    try{onSaveImmediate(updated);}catch(e){}
  }
  function savePanelName(){
    if(!draftName.trim())return;
    const updated={...panel,name:draftName.trim()};
    onUpdate(updated);
    try{onSaveImmediate(updated);}catch(e){}
  }

  function tagPage(id,types){
    onUpdate({...panel,pages:pages.map(p=>p.id===id?{...p,types}:p)});
    setTagsChanged(true);
  }
  function removePage(id){
    const remaining=pages.filter(p=>p.id!==id);
    let updated={...panel,pages:remaining};
    if(remaining.length===0){
      updated={...updated,drawingNo:"",drawingDesc:"",drawingRev:"",bom:[],validation:null,pricing:null,budgetaryQuote:null,status:"draft"};
      setDraftNo("");setDraftDesc("");setDraftRev("");setExtractProgress(null);setErr("");
    }
    onUpdate(updated);
    try{onSaveImmediate(updated);}catch(e){}
  }

  async function autoDetect(){
    if(!_apiKey)return;
    const untagged=pages.filter(p=>getPageTypes(p).length===0&&p.dataUrl);
    if(!untagged.length)return;
    setDetecting(true);
    let updatedPages=[...pages];
    for(let i=0;i<untagged.length;i++){
      setDetectProgress(`Detecting ${i+1}/${untagged.length}…`);
      const info=await detectPageTypes(untagged[i].dataUrl);
      updatedPages=updatedPages.map(p=>p.id===untagged[i].id?{...p,types:info.types,sheetNo:info.sheetNo}:p);
    }
    const updated={...panel,pages:updatedPages};
    onUpdate(updated);
    setDetecting(false);setDetectProgress("");
  }

  async function runExtraction(){
    const bomPages=pages.filter(p=>getPageTypes(p).includes("bom"));
    if(!bomPages.length){setErr("No pages tagged BOM yet.");return;}
    setExtracting(true);setErr("");setExtractProgress({msg:"Starting…",pct:5});
    let all=[];
    for(let i=0;i<bomPages.length;i++){
      const pg=bomPages[i];
      if(!pg.dataUrl){setErr(`"${pg.name}" has no image — re-upload.`);setExtracting(false);return;}
      setExtractProgress({msg:`Analyzing page ${i+1}/${bomPages.length}…`,pct:10+Math.round((i/bomPages.length)*80)});
      try{const items=await extractBomPage(pg.dataUrl);all=[...all,...items];}
      catch(ex){setErr(`Failed: ${ex.message}`);setExtracting(false);return;}
    }
    const map={};
    all.forEach(item=>{
      const key=(item.partNumber||"").trim().toLowerCase()||("desc:"+item.description.toLowerCase().slice(0,40));
      if(map[key]){map[key].qty=(+map[key].qty||1)+(+item.qty||1);}
      else{map[key]={...item,id:Date.now()+Math.random(),qty:+item.qty||1};}
    });
    const bom=applyPartCorrections(partCorrections,Object.values(map).map(row=>{
      const sugg=findPartSuggestion(partLibrary,row);
      return sugg?{...row,suggestedPartNumber:sugg}:row;
    }));
    const updated={...panel,bom,status:"extracted",updatedAt:Date.now()};
    try{await onSaveImmediate(updated);}catch(e){}
    onUpdate(updated);
    setExtractProgress({msg:`✓ ${bom.length} items extracted`,pct:100});
    setTagsChanged(false);
    setExtracting(false);
  }

  function parseLaborFeedback(text){
    const updates={};
    const t=text.toLowerCase();
    // Wire count: "X wires", "base labor off X wires", "wire count is X", "X wire terminations"
    const wireMatch=t.match(/\b(\d+)\s*wire(?:s|[\s-]terminations?|[\s-]count)?/);
    if(wireMatch){
      const wires=parseInt(wireMatch[1]);
      const hours=Math.round((Math.ceil(wires/12)+Math.ceil(wires/8))/2);
      updates.laborHoursOverride=hours;
      updates._wiresUsed=wires;
    }
    // Direct hour override: "X hours", "use X labor hours", "set hours to X"
    const hoursMatch=t.match(/\b(\d+(?:\.\d+)?)\s*(?:labor\s+)?hours?\b/);
    if(hoursMatch&&!wireMatch){
      updates.laborHoursOverride=parseFloat(hoursMatch[1]);
    }
    // Labor rate: "$X/hr", "rate is $X", "labor rate X"
    const rateMatch=t.match(/\$\s*(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r|per\s+hour)/)||
                    t.match(/labor\s+rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)/)||
                    t.match(/rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r)?/);
    if(rateMatch){updates.laborRate=parseFloat(rateMatch[1]);}
    const {_wiresUsed,...pricingUpdates}=updates;
    return Object.keys(pricingUpdates).length>0?{pricingUpdates,wires:_wiresUsed||null}:null;
  }

  async function reExtractWithFeedback(){
    const bomPages=pages.filter(p=>getPageTypes(p).includes("bom")&&p.dataUrl);
    if(!aiFeedback.trim())return;

    // Apply labor corrections immediately regardless of whether BOM re-extraction runs
    const laborResult=parseLaborFeedback(aiFeedback);
    let latestPanel=panel;
    if(laborResult){
      const newPricing={...(panel.pricing||{}),...laborResult.pricingUpdates};
      latestPanel={...panel,pricing:newPricing};
      onUpdate(latestPanel);
      try{onSaveImmediate(latestPanel);}catch(e){}
    }

    // If no BOM pages, just save the labor fix and clear
    if(!bomPages.length){
      if(laborResult){
        const msg=laborResult.wires!=null
          ?`✓ Labor updated — using ${laborResult.wires} wires → ${laborResult.pricingUpdates.laborHoursOverride} hrs`
          :"✓ Labor settings updated";
        setExtractProgress({msg,pct:100});
        setFeedbackSaved(true);setTimeout(()=>setFeedbackSaved(false),3000);
        setAiFeedback("");
      } else {
        setErr("No BOM-tagged pages to re-extract.");
      }
      return;
    }

    setReExtracting(true);setErr("");setExtractProgress({msg:"Re-extracting with your feedback…",pct:3});
    let all=[];
    for(let i=0;i<bomPages.length;i++){
      setExtractProgress({msg:`Page ${i+1}/${bomPages.length}…`,pct:8+Math.round((i/bomPages.length)*85)});
      try{const items=await extractBomPage(bomPages[i].dataUrl,aiFeedback);all=[...all,...items];}
      catch(ex){setErr(`Failed: ${ex.message}`);setReExtracting(false);return;}
    }
    const map={};
    all.forEach(item=>{
      const key=(item.partNumber||"").trim().toLowerCase()||("desc:"+item.description.toLowerCase().slice(0,40));
      if(map[key]){map[key].qty=(+map[key].qty||1)+(+item.qty||1);}
      else{map[key]={...item,id:Date.now()+Math.random(),qty:+item.qty||1};}
    });
    const bom=applyPartCorrections(partCorrections,Object.values(map).map(row=>{
      const sugg=findPartSuggestion(partLibrary,row);
      return sugg?{...row,suggestedPartNumber:sugg}:row;
    }));
    const logEntry={timestamp:Date.now(),feedback:aiFeedback,itemCount:bom.length};
    const feedbackLog=[...((latestPanel.extractionFeedbackLog)||[]),logEntry];
    const updated={...latestPanel,bom,status:"extracted",extractionFeedbackLog:feedbackLog,updatedAt:Date.now()};
    try{await onSaveImmediate(updated);}catch(e){}
    onUpdate(updated);
    const laborMsg=laborResult?.wires!=null?` · labor set to ${updated.pricing?.laborHoursOverride} hrs`:"";
    setExtractProgress({msg:`✓ ${bom.length} items extracted${laborMsg}`,pct:100});
    setFeedbackSaved(true);setTimeout(()=>setFeedbackSaved(false),3000);
    setAiFeedback("");
    setReExtracting(false);
  }

  function updateBomRow(id,field,val){
    const updated={...panel,bom:(panel.bom||[]).map(r=>r.id===id?{...r,[field]:val}:r)};
    onUpdate(updated);
    if(autoSaveTimer.current)clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current=setTimeout(()=>{try{onSaveImmediate(updated);}catch(e){}},1500);
  }
  function saveBomRow(updated){
    try{onSaveImmediate(updated);}catch(e){}
  }
  function addBomRow(){
    const updated={...panel,bom:[...(panel.bom||[]),{id:Date.now()+Math.random(),qty:1,partNumber:"",description:"",manufacturer:"",notes:""}]};
    onUpdate(updated);try{onSaveImmediate(updated);}catch(e){}
  }
  function deleteBomRow(id){
    const updated={...panel,bom:(panel.bom||[]).filter(r=>r.id!==id)};
    onUpdate(updated);try{onSaveImmediate(updated);}catch(e){}
  }
  function confirmSuggestion(id){
    const row=(panel.bom||[]).find(r=>r.id===id);
    if(!row||!row.suggestedPartNumber)return;
    const bom=(panel.bom||[]).map(r=>r.id===id?{...r,partNumber:r.suggestedPartNumber,suggestedPartNumber:null,learnedPartNumber:true}:r);
    const updated={...panel,bom};
    onUpdate(updated);saveBomRow(updated);
    // Reinforce this description→partNumber link in the library
    savePartLibraryEntry(uid,{manufacturer:row.manufacturer||"",description:row.description||"",partNumber:row.suggestedPartNumber})
      .then(()=>loadPartLibrary(uid).then(setPartLibrary)).catch(()=>{});
  }
  function dismissSuggestion(id){
    const bom=(panel.bom||[]).map(r=>r.id===id?{...r,suggestedPartNumber:null}:r);
    onUpdate({...panel,bom});
  }
  function updatePrice(id,val){
    const parsed=val===""?null:parseFloat(val);
    const updatedBom=(panel.bom||[]).map(r=>r.id===id?{...r,unitPrice:isNaN(parsed)?null:parsed,priceSource:isNaN(parsed)||parsed===null?null:"manual"}:r);
    const updated={...panel,bom:updatedBom};
    onUpdate(updated);
    if(autoSaveTimer.current)clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current=setTimeout(()=>{try{onSaveImmediate(updated);}catch(e){}},1500);
  }
  function savePricing(updates){
    const updated={...panel,pricing:{...(panel.pricing||{}),...updates}};
    onUpdate(updated);
    try{onSaveImmediate(updated);}catch(e){}
  }
  async function runPricingOnPanel(){
    const bom=panel.bom||[];
    if(!bom.length||!_apiKey)return;
    setAiPricing(true);setPricingProgress({msg:"Starting…",pct:5});
    let updatedBom=[...bom];
    const BATCH=20;
    const total=Math.ceil(bom.length/BATCH);
    for(let i=0;i<bom.length;i+=BATCH){
      const batchIdx=Math.floor(i/BATCH);
      setPricingProgress({msg:`Pricing ${i+1}–${Math.min(i+BATCH,bom.length)} of ${bom.length}…`,pct:Math.round((batchIdx/total)*90)+5});
      try{
        const map=await estimatePrices(bom.slice(i,i+BATCH));
        updatedBom=updatedBom.map(r=>{const key=String(r.id);return key in map?{...r,unitPrice:map[key],priceSource:map[key]!=null?"ai":r.priceSource||null}:r;});
      }catch(ex){setAiPricing(false);setPricingProgress(null);return;}
    }
    const updated={...panel,bom:updatedBom};
    onUpdate(updated);
    try{await onSaveImmediate(updated);}catch(e){}
    setPricingProgress({msg:`✓ ${updatedBom.filter(r=>r.unitPrice!=null).length} of ${bom.length} priced`,pct:100});
    setAiPricing(false);
  }
  async function validatePanel(){
    if(!_apiKey)return;
    setValidatingPanel(true);
    const validation=await runPanelValidation(panel);
    if(validation){
      const updated={...panel,validation,status:"validated"};
      onUpdate(updated);
      try{await onSaveImmediate(updated);}catch(e){}

    setValidatingPanel(false);
  }
  function exportCSV(){
    const header=["Qty","Part Number","Description","Manufacturer","Notes"];
    const rows=[header,...(panel.bom||[]).map(r=>[r.qty,r.partNumber,r.description,r.manufacturer,r.notes])];
    const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`${(panel.drawingNo||panel.name||"BOM").replace(/[^a-z0-9]/gi,"_")}_BOM.csv`;
    a.click();
  }

  return(

      {/* Combined header + title block */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{background:C.accentDim,color:C.accent,borderRadius:6,padding:"4px 12px",fontSize:13,fontWeight:800,letterSpacing:1,flexShrink:0,alignSelf:"stretch",display:"flex",alignItems:"center",justifyContent:"center"}}>LINE {idx+1}</div>
        {/* Panel name + title block identity */}
        <div style={{flex:1,display:"flex",alignItems:"flex-start",gap:20,minWidth:0,flexWrap:"wrap"}}>

            <input value={draftName} onChange={e=>setDraftName(e.target.value)} placeholder="Part #" readOnly={readOnly}
              onFocus={e=>{e.target.style.borderColor=C.accent;e.target.style.background=C.card;}}
              onBlur={e=>{e.target.style.borderColor="transparent";e.target.style.background="transparent";savePanelName();}}
              onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){setDraftName(panel.name||"");e.target.blur();}}}
              style={{background:"transparent",border:"1px solid transparent",borderRadius:4,padding:"2px 5px",color:C.text,fontSize:15,fontWeight:700,outline:"none",width:Math.max(8,(draftName||"").length+2)+"ch",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase"}}>DWG #</div>
            <input value={draftNo} onChange={e=>setDraftNo(e.target.value)} placeholder="—" readOnly={readOnly}
              onFocus={e=>{e.target.style.borderColor=C.accent;e.target.style.background=C.card;}}
              onBlur={e=>{e.target.style.borderColor="transparent";e.target.style.background="transparent";saveTitleFields();}}
              onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){setDraftNo(panel.drawingNo||"");e.target.blur();}}}
              style={{background:"transparent",border:"1px solid transparent",borderRadius:4,padding:"2px 5px",color:C.text,fontSize:15,fontWeight:700,outline:"none",width:Math.max(5,(draftNo||"").length+2)+"ch",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0,minWidth:40}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase"}}>Rev</div>
            <input value={draftRev} onChange={e=>setDraftRev(e.target.value)} placeholder="—" readOnly={readOnly}
              onFocus={e=>{e.target.style.borderColor=C.accent;e.target.style.background=C.card;}}
              onBlur={e=>{e.target.style.borderColor="transparent";e.target.style.background="transparent";saveTitleFields();}}
              onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){setDraftRev(panel.drawingRev||"");e.target.blur();}}}
              style={{background:"transparent",border:"1px solid transparent",borderRadius:4,padding:"2px 5px",color:C.yellow,fontSize:15,fontWeight:700,outline:"none",width:Math.max(3,(draftRev||"").length+2)+"ch",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:3,flex:1,minWidth:160}}>
            <div style={{fontSize:11,color:C.accent,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase"}}>Description</div>
            <input value={draftDesc} onChange={e=>setDraftDesc(e.target.value)} placeholder="—" readOnly={readOnly}
              onFocus={e=>{e.target.style.borderColor=C.accent;e.target.style.background=C.card;}}
              onBlur={e=>{e.target.style.borderColor="transparent";e.target.style.background="transparent";saveTitleFields();}}
              onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){setDraftDesc(panel.drawingDesc||"");e.target.blur();}}}
              style={{background:"transparent",border:"1px solid transparent",borderRadius:4,padding:"2px 5px",color:C.sub,fontSize:14,outline:"none",width:"100%",fontFamily:"inherit"}}/>
          </div>
        </div>
        {/* Right-side controls */}
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          {pages.length>0&&_apiKey&&!readOnly&&(
            <button onClick={autoExtractTitle} disabled={extractingTitle} title="Re-extract title block from drawing"
              style={{background:"none",border:`1px solid ${C.border}`,color:C.yellow,cursor:"pointer",borderRadius:5,padding:"2px 8px",fontSize:12,fontWeight:600,opacity:extractingTitle?0.5:1}}>
              {extractingTitle?"🤖…":"🤖"}
            </button>
          )}
          <Badge status={panel.status||"draft"}/>
          {!readOnly&&<button onClick={onDelete} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:15,padding:"2px 6px",borderRadius:4}} onMouseEnter={e=>e.target.style.color=C.red} onMouseLeave={e=>e.target.style.color=C.muted}>✕</button>}
        </div>
      </div>

      {/* 4 stat boxes */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {[
          {label:"Total",count:pages.length,color:C.sub,dim:C.border+"44"},
          {label:"BOM",count:bomCount,color:C.accent,dim:C.accentDim},
          {label:"Schematic",count:schCount,color:C.green,dim:C.greenDim},
          {label:"Layout",count:layoutCount,color:C.purple,dim:"#2e1a4a"},
        ].map(s=>(
          <div key={s.label} style={{background:s.dim,border:`1px solid ${s.color}44`,borderRadius:8,padding:"10px 6px",textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:800,color:s.color,lineHeight:1}}>{s.count}</div>
            <div style={{fontSize:12,color:s.color,fontWeight:700,marginTop:4,letterSpacing:0.5,opacity:0.85}}>{s.label.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {/* Drawings section */}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.7}}>DRAWINGS</div>
          {detecting&&<span style={{fontSize:12,color:C.yellow,fontWeight:600}}>{detectProgress||"🤖 Detecting…"}</span>}
          {!detecting&&_apiKey&&pages.some(p=>getPageTypes(p).length===0&&p.dataUrl)&&!readOnly&&(
            <button onClick={autoDetect} style={{background:"none",border:"none",color:C.yellow,cursor:"pointer",fontSize:12,fontWeight:600,padding:"0 4px"}}>🤖 Auto-detect</button>
          )}
        </div>

        {/* Thumbnail strip + drop tile */}
        <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6,alignItems:"flex-start"}}>
          {pages.map(pg=>{
            const types=getPageTypes(pg);
            return(
              <div key={pg.id} style={{flexShrink:0,width:420,display:"flex",flexDirection:"column",gap:6}}>
                <div style={{position:"relative",cursor:"zoom-in"}} onClick={()=>setLightboxId(pg.id)}>
                  <img src={pg.dataUrl} alt={pg.name} style={{width:420,height:272,objectFit:"contain",borderRadius:6,background:"#080810",display:"block"}}/>
                  {!readOnly&&<button onClick={e=>{e.stopPropagation();removePage(pg.id);}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.75)",border:"none",color:C.red,cursor:"pointer",borderRadius:4,padding:"1px 7px",fontSize:13,lineHeight:"20px"}}>✕</button>}
                </div>
                <div style={{lineHeight:1.4}}>
                  {(panel.drawingNo||panel.drawingDesc)?(
                    <>
                      <div style={{fontSize:12,color:C.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:600}}>
                        {[panel.drawingNo,panel.drawingDesc].filter(Boolean).join("  ")}
                      </div>
                      {panel.drawingRev&&<div style={{fontSize:11,color:C.yellow,fontWeight:700}}>Rev {panel.drawingRev}</div>}
                    </>
                  ):(
                    <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pg.name}</div>
                  )}
                  {pg.sheetNo&&<div style={{fontSize:11,color:C.teal,fontWeight:700,marginTop:1}}>Sht {pg.sheetNo}</div>}
                </div>
                <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                  {["bom","schematic","layout"].map(t=>{
                    const active=types.includes(t);
                    return(
                      <button key={t} disabled={readOnly} onClick={()=>tagPage(pg.id,active?types.filter(x=>x!==t):[...types,t])}
                        style={{background:active?typeColors[t]+"33":"transparent",color:active?typeColors[t]:C.muted,border:`1px solid ${active?typeColors[t]+"88":C.border}`,borderRadius:10,padding:"2px 8px",fontSize:12,fontWeight:700,cursor:readOnly?"default":"pointer",transition:"all 0.1s"}}>
                        {SHORT[t]}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {/* Drop zone tile */}
          {!readOnly&&(
            <div
              onDragOver={e=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={e=>{e.preventDefault();setDragging(false);addFiles(e.dataTransfer.files);}}
              onClick={()=>!processing&&!detecting&&fileRef.current?.click()}
              style={{flexShrink:0,width:420,height:272,border:`2px dashed ${dragging?C.accent:C.border}`,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:processing||detecting?"default":"pointer",transition:"all 0.15s",background:dragging?C.accentDim+"33":"transparent",textAlign:"center",padding:12,gap:8}}>
              <input ref={fileRef} type="file" multiple accept="image/*,application/pdf" onChange={e=>{addFiles(e.target.files);e.target.value="";}} style={{display:"none"}}/>
              <div style={{fontSize:32,opacity:processing||detecting?1:0.35}}>{processing||detecting?"⏳":"+"}</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.6,whiteSpace:"pre-line"}}>{detecting?detectProgress:processing?processingMsg:"Drop or click\nPDF · JPG · PNG"}</div>
            </div>
          )}
        </div>
      </div>

      {/* Error */}
      {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.red,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>{err}<button onClick={()=>setErr("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:15,lineHeight:1}}>✕</button></div>}

      {/* Extract progress bar */}
      {extractProgress&&(
        <div style={{marginBottom:12}}>
          <div style={{background:C.border,borderRadius:4,height:6,overflow:"hidden",marginBottom:6}}>
            <div style={{width:`${extractProgress.pct}%`,height:"100%",background:C.accent,borderRadius:4,transition:"width 0.3s"}}/>
          </div>
          <div style={{fontSize:13,color:C.sub}}>{extractProgress.msg}</div>
        </div>
      )}

      {/* BOM Table */}
      {(panel.bom||[]).length>0&&(
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.7,flex:1}}>
              BILL OF MATERIALS — {panel.bom.length} items
            </div>
            {!readOnly&&<button onClick={addBomRow} style={btn("transparent",C.accent,{fontSize:12,padding:"4px 12px",border:`1px dashed ${C.accent}66`})}>+ Add Row</button>}
            <button onClick={exportCSV} style={btn(C.greenDim,C.green,{fontSize:12,padding:"4px 12px"})}>⬇ CSV</button>
          </div>
          <div style={{overflowX:"auto",borderRadius:8,border:`1px solid ${C.border}`}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#0a0a12"}}>
                  {[["#",56],["Qty",56],["Part Number",0,"fit"],["Description",0],["Manufacturer",0,"fit"],["Notes",160],["Unit $",90],["Ext $",80],["Val",44],["",60]].map(([h,w,mode])=>(
                    <th key={h} style={{padding:"9px 10px",textAlign:h==="Unit $"||h==="Ext $"?"right":"left",color:C.muted,fontWeight:700,fontSize:12,whiteSpace:"nowrap",width:mode==="fit"?"1%":w||"auto",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const sortedBom=(panel.bom||[]).slice().sort((a,b)=>{
                    if(!a.itemNo&&!b.itemNo)return 0;
                    if(!a.itemNo)return 1;
                    if(!b.itemNo)return -1;
                    const an=parseFloat(a.itemNo),bn=parseFloat(b.itemNo);
                    if(!isNaN(an)&&!isNaN(bn))return an-bn;
                    return (a.itemNo||"").localeCompare(b.itemNo||"");
                  });
                  const valData=panel.validation||null;
                  const matchedIds=valData?new Set((valData.matched||[]).map(m=>String(m.item.id))):null;
                  const missingIds=valData?new Set((valData.missingFromSchematic||[]).map(m=>String(m.id))):null;
                  const ntIds=valData?new Set((valData.notTraceable||[]).map(m=>String(m.id))):null;
                  return sortedBom.map((row,i)=>(
                  <tr key={row.id} style={{borderBottom:i<sortedBom.length-1?`1px solid ${C.border}33`:"none",background:i%2===0?"transparent":"rgba(255,255,255,0.015)"}}>
                    <td style={{padding:"3px 4px",whiteSpace:"nowrap",textAlign:"center",fontSize:12,fontWeight:700,color:row.itemNo?C.accent:C.red,userSelect:"none"}}>
                      {row.itemNo||i+1}
                    </td>
                    {[["qty",56],["partNumber",0,"fit"],["description",0],["manufacturer",0,"fit"],["notes",160]].map(([f,w,mode])=>(
                      <td key={f} style={{padding:"3px 5px",width:mode==="fit"?"1%":w||"auto",whiteSpace:mode==="fit"?"nowrap":"normal",overflow:"visible"}}>
                        {mode==="fit"?(
                          <div>
                          <div style={{position:"relative",display:"inline-block",minWidth:80}}>
                            <span style={{visibility:"hidden",whiteSpace:"pre",fontSize:13,fontFamily:"inherit",padding:"5px 20px 5px 7px",display:"block",pointerEvents:"none"}}>{row[f]||"\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0"}</span>
                            <input value={row[f]||""} readOnly={readOnly}
                              onChange={e=>updateBomRow(row.id,f,e.target.value)}
                              onBlur={e=>{
                                e.target.style.borderColor="transparent";
                                const val=e.target.value;
                                const updatedBom=(panel.bom||[]).map(r=>r.id===row.id?{...r,[f]:val}:r);
                                saveBomRow({...panel,bom:updatedBom});
                                if(f==="partNumber"&&val.trim()){
                                  savePartLibraryEntry(uid,{manufacturer:row.manufacturer||"",description:row.description||"",partNumber:val.trim()})
                                    .then(()=>loadPartLibrary(uid).then(setPartLibrary)).catch(()=>{});
                                }
                              }}
                              onFocus={e=>{e.target.style.borderColor=C.accent;if(f==="partNumber")bomEditRef.current[row.id]=row[f]||"";}}
                              onKeyDown={e=>{
                                if(f==="partNumber"&&e.key==="Enter"&&!readOnly){
                                  e.preventDefault();
                                  const newVal=e.target.value.trim();
                                  const origVal=bomEditRef.current[row.id]||"";
                                  if(newVal&&newVal!==origVal){
                                    const label=row.itemNo||(i+1);
                                    const desc=row.description?` - "${row.description}"`:"";
                                    const was=origVal?` (was: ${origVal})`:"";
                                    const line=`Item ${label} - correct part number is ${newVal}${was}${desc}`;
                                    setAiFeedback(prev=>(prev.trim()?prev.trim()+"\n":"")+line);
                                    const updatedBom=(panel.bom||[]).map(r=>r.id===row.id?{...r,[f]:newVal}:r);
                                    const updatedPanel={...panel,bom:updatedBom};
                                    onUpdate(updatedPanel);
                                    saveBomRow(updatedPanel);
                                    if(origVal.trim()){
                                      savePartCorrection(uid,{wrongValue:origVal,correctValue:newVal,description:row.description||"",manufacturer:row.manufacturer||""})
                                        .then(()=>loadPartCorrections(uid).then(setPartCorrections)).catch(()=>{});
                                    }
                                    e.target.blur();
                                    setTimeout(()=>{feedbackRef.current?.scrollIntoView({behavior:"smooth",block:"nearest"});feedbackRef.current?.focus();},80);
                                  } else {
                                    e.target.blur();
                                  }
                                }
                              }}
                              style={{...inp({padding:"5px 14px 5px 7px",fontSize:13,borderColor:"transparent",background:"transparent",borderRadius:5}),position:"absolute",inset:0,width:"100%",minWidth:0}}
                            />
                            {f==="partNumber"&&(row.learnedPartNumber||row.correctedByLibrary)&&(
                              <span style={{position:"absolute",top:3,right:3,fontSize:9,color:row.correctedByLibrary?C.yellow:C.teal,pointerEvents:"none",fontWeight:800}}>{row.correctedByLibrary?"🔧":"📚"}</span>
                            )}
                          </div>
                          {f==="partNumber"&&row.suggestedPartNumber&&!row.partNumber&&!readOnly&&(
                            <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3,paddingLeft:2,flexWrap:"nowrap"}}>
                              <span style={{fontSize:10,color:C.teal}}>📚</span>
                              <span style={{fontSize:11,color:C.teal,fontWeight:700}}>{row.suggestedPartNumber}</span>
                              <button onClick={()=>confirmSuggestion(row.id)} style={{fontSize:10,color:"#000",background:C.teal,border:"none",borderRadius:3,padding:"1px 7px",cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>Use</button>
                              <button onClick={()=>dismissSuggestion(row.id)} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer",lineHeight:1}}>✕</button>
                            </div>
                          )}
                          </div>
                        ):(
                          <input value={row[f]||""} readOnly={readOnly}
                            onChange={e=>updateBomRow(row.id,f,e.target.value)}
                            onBlur={e=>{
                              e.target.style.borderColor="transparent";
                              const val=e.target.value;
                              const updatedBom=(panel.bom||[]).map(r=>r.id===row.id?{...r,[f]:val}:r);
                              saveBomRow({...panel,bom:updatedBom});
                              if(f==="partNumber"&&val.trim()){
                                savePartLibraryEntry(uid,{manufacturer:row.manufacturer||"",description:row.description||"",partNumber:val.trim()})
                                  .then(()=>loadPartLibrary(uid).then(setPartLibrary)).catch(()=>{});
                              }
                            }}
                            style={{...inp({padding:"5px 14px 5px 7px",fontSize:13,borderColor:"transparent",background:"transparent",borderRadius:5}),width:w?w-10+"px":"100%",minWidth:w?w-10+"px":"100px"}}
                            onFocus={e=>e.target.style.borderColor=C.accent}
                          />
                        )}
                      </td>
                    ))}
                    <td style={{padding:"3px 5px",textAlign:"right",width:90}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                        {row.priceSource==="ai"&&<span style={{background:C.teal+"22",color:C.teal,borderRadius:8,padding:"1px 5px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>AI</span>}
                        {row.priceSource==="manual"&&<span style={{background:C.accentDim,color:C.accent,borderRadius:8,padding:"1px 5px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>M</span>}
                        <span style={{color:C.muted,fontSize:11}}>$</span>
                        <input type="number" min="0" step="0.01" readOnly={readOnly}
                          value={row.unitPrice!=null?parseFloat(row.unitPrice).toFixed(2):""}
                          onChange={e=>updatePrice(row.id,e.target.value)}
                          placeholder="—"
                          style={{...inp({padding:"4px 4px",fontSize:12,borderColor:"transparent",background:"transparent",borderRadius:4,textAlign:"right",width:70}),minWidth:70}}
                          onFocus={e=>{e.target.style.borderColor=C.accent;e.target.value=row.unitPrice??""}}
                          onBlur={e=>{e.target.style.borderColor="transparent";if(e.target.value!=="")e.target.value=parseFloat(e.target.value).toFixed(2);}}
                        />
                      </div>
                    </td>
                    <td style={{padding:"3px 8px",textAlign:"right",width:80,fontSize:12,color:row.unitPrice!=null?C.text:C.muted,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>
                      {row.unitPrice!=null?"$"+((row.unitPrice||0)*(row.qty||1)).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}
                    </td>
                    <td style={{padding:"3px 5px",textAlign:"center",width:44}}>
                      {valData&&(
                        matchedIds.has(String(row.id))?<span style={{color:C.green,fontWeight:800,fontSize:14}}>✓</span>
                        :missingIds.has(String(row.id))?<span style={{color:C.red,fontWeight:800,fontSize:14}} title="Not found in schematic">✗</span>
                        :ntIds.has(String(row.id))?<span style={{color:C.muted,fontSize:13}} title="As shown / not traceable">📋</span>
                        :<span style={{color:C.border,fontSize:11}}>—</span>
                      )}
                    </td>
                    <td style={{padding:"3px 5px",textAlign:"center"}}>
                      {!readOnly&&<button onClick={()=>deleteBomRow(row.id)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,opacity:0.45,padding:"3px 5px"}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.45}>✕</button>}
                    </td>
                  </tr>
                ));
                })()}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Pricing Summary */}
      {(panel.bom||[]).length>0&&(()=>{
        const pr=panel.pricing||{};
        const markup=pr.markup??30;
        const laborRate=pr.laborRate??45;
        const contingencyBOM=pr.contingencyBOM??_pricingConfig.contingencyBOM;
        const contingencyConsumables=pr.contingencyConsumables??_pricingConfig.contingencyConsumables;
        const wireCount=panel.validation?.wireCount||0;
        const defaultHours=wireCount?Math.round((Math.ceil(wireCount/12)+Math.ceil(wireCount/8))/2):0;
        const laborHours=(pr.laborHoursOverride??null)??defaultHours;
        const bom=panel.bom||[];
        const pricedCount=bom.filter(r=>r.unitPrice!=null).length;
        const totalCost=bom.reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
        const laborCost=laborHours*laborRate;
        const grandTotal=totalCost+laborCost+contingencyBOM+contingencyConsumables;
        const sellPrice=grandTotal*(1+markup/100);
        const fmt=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
        return(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
              <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.7,flex:1}}>PRICING SUMMARY</div>
              <span style={{fontSize:12,color:C.sub}}>{pricedCount}/{bom.length} priced</span>
              {_apiKey&&pages.some(p=>getPageTypes(p).includes("schematic")&&p.dataUrl)&&(
                <button onClick={validatePanel} disabled={validatingPanel||readOnly}
                  style={btn(C.accentDim,C.accent,{fontSize:12,padding:"4px 12px",opacity:validatingPanel||readOnly?0.5:1,border:`1px solid ${C.accent}55`})}>
                  {validatingPanel?"Validating…":"🔄 Re-Validate"}
                </button>
              )}
              {!readOnly&&_apiKey&&bom.length>0&&(
                <button onClick={runPricingOnPanel} disabled={aiPricing}
                  style={btn(C.accentDim,C.accent,{fontSize:12,padding:"4px 12px",opacity:aiPricing?0.5:1,border:`1px solid ${C.accent}55`})}>
                  {aiPricing?"Estimating…":"✨ AI Prices"}
                </button>
              )}
            </div>
            {pricingProgress&&(
              <div style={{marginBottom:10}}>
                <div style={{background:C.border,borderRadius:4,height:5,overflow:"hidden",marginBottom:5}}>
                  <div style={{width:`${pricingProgress.pct}%`,height:"100%",background:C.accent,borderRadius:4,transition:"width 0.3s"}}/>
                </div>
                <div style={{fontSize:12,color:C.sub}}>{pricingProgress.msg}</div>
              </div>
            )}
            <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start"}}>
              {/* LEFT: Labor inputs */}
              <div style={{background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",minWidth:220}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:0.5,marginBottom:8}}>LABOR</div>
                {wireCount>0&&<div style={{fontSize:12,color:C.sub,marginBottom:8}}>{wireCount} wires → {Math.ceil(wireCount/12)}–{Math.ceil(wireCount/8)} hr range</div>}
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{fontSize:12,color:C.muted,width:60,flexShrink:0}}>Hours</span>
                  <input type="number" min="0" step="0.5" readOnly={readOnly}
                    value={pr.laborHoursOverride??""} placeholder={String(defaultHours||0)}
                    onChange={e=>savePricing({laborHoursOverride:e.target.value===""?null:Math.max(0,+e.target.value||0)})}
                    style={{...inp({padding:"3px 6px",fontSize:13,width:70,textAlign:"right"})}}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:12,color:C.muted,width:60,flexShrink:0}}>Rate $/hr</span>
                  <input type="number" min="0" step="1" readOnly={readOnly}
                    value={laborRate}
                    onChange={e=>savePricing({laborRate:Math.max(0,+e.target.value||0)})}
                    style={{...inp({padding:"3px 6px",fontSize:13,width:70,textAlign:"right"})}}/>
                </div>
              </div>

function PanelListView({project,uid,readOnly,onBack,onOpenPanel,onViewQuote,onUpdate}){
  const [editingName,setEditingName]=useState(false);
  const [draftName,setDraftName]=useState(project.name||"");
  const [validating,setValidating]=useState(false);
  const [validateMsg,setValidateMsg]=useState("");

  function addPanel(){
    const n=(project.panels||[]).length+1;
    const newPanel={id:'panel-'+Date.now(),name:`Panel ${n}`,pages:[],bom:[],validation:null,pricing:null,budgetaryQuote:null,status:'draft'};
    onUpdate({...project,panels:[...(project.panels||[]),newPanel]});
  }
  function deletePanel(id){
    if(!window.confirm("Delete this panel and all its data?"))return;
    onUpdate({...project,panels:(project.panels||[]).filter(p=>p.id!==id)});
  }
  async function saveImmediatePanel(panelId,updatedPanel){
    const newPanels=(project.panels||[]).map(p=>p.id===panelId?updatedPanel:p);
    const updatedProject={...project,panels:newPanels,pricing:{...(project.pricing||{}),...(updatedPanel.pricing||{})}};
    await saveProject(uid,updatedProject);
    onUpdate(updatedProject);
  }
  async function saveName(){
    if(!draftName.trim())return;
    const updated={...project,name:draftName.trim()};
    onUpdate(updated);
    await saveProject(uid,updated);
    setEditingName(false);
  }
  async function validateAll(){
    if(!_apiKey)return;
    setValidating(true);
    let panels=[...(project.panels||[])];
    for(let i=0;i<panels.length;i++){
      const p=panels[i];
      const schematicPages=(p.pages||[]).filter(pg=>getPageTypes(pg).includes("schematic")&&pg.dataUrl);
      if(!schematicPages.length)continue;
      setValidateMsg(`Validating ${p.name||"Panel "+(i+1)}…`);
      const validation=await runPanelValidation(p);
      if(validation){panels[i]={...p,validation,status:"validated"};}
    }
    const updatedProject={...project,panels};
    onUpdate(updatedProject);
    await saveProject(uid,updatedProject);
    setValidating(false);
    setValidateMsg("");
  }
  const panels=project.panels||[];
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 24px",display:"flex",alignItems:"center",gap:16,minHeight:52,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",gap:6,padding:"0",whiteSpace:"nowrap"}}>← Projects</button>
        <div style={{width:1,height:18,background:C.border}}/>
        {editingName?(
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
            <input value={draftName} onChange={e=>setDraftName(e.target.value)} autoFocus
              style={{...inp(),fontSize:15,fontWeight:700,padding:"4px 10px",flex:1}}
              onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape")setEditingName(false);}}/>
            <button onClick={saveName} style={btn(C.accent,"#fff",{fontSize:13,padding:"4px 12px"})}>✓</button>
            <button onClick={()=>setEditingName(false)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
          </div>
        ):(
          <div style={{flex:1,display:"flex",alignItems:"center",gap:8,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{project.name}</div>
            {!readOnly&&<button onClick={()=>{setDraftName(project.name);setEditingName(true);}} title="Edit project name"
              style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"0 4px",flexShrink:0}}>✏️</button>}
          </div>
        )}
        {readOnly&&<span style={{background:C.border,color:C.muted,borderRadius:20,padding:"2px 10px",fontSize:13,fontWeight:700}}>VIEW ONLY</span>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Panels / Lines</div>
              <div style={{fontSize:13,color:C.muted}}>{panels.length} panel{panels.length!==1?"s":""}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={!readOnly?addPanel:undefined} disabled={readOnly} style={btn(C.accent,"#fff",{fontSize:13,opacity:readOnly?0.4:1})}>+ Add Panel</button>
              {panels.length>0&&<button onClick={onViewQuote} style={btn(C.greenDim,C.green,{fontSize:13})}>📊 View Quote</button>}
            </div>
          </div>
          {panels.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
              <div style={{fontSize:52,marginBottom:16,opacity:0.3}}>🗂️</div>
              <div style={{fontSize:18,fontWeight:700,color:C.sub,marginBottom:8}}>No panels yet</div>
              <div style={{fontSize:13,marginBottom:24,lineHeight:1.7}}>Add a panel to start uploading drawings and quoting this job.</div>
              {!readOnly&&<button onClick={addPanel} style={btn(C.accent,"#fff")}>+ Add First Panel</button>}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              {panels.map((panel,idx)=>(
                <PanelCard
                  key={panel.id}
                  panel={panel}
                  idx={idx}
                  uid={uid}
                  readOnly={readOnly}
                  onDelete={()=>deletePanel(panel.id)}
                  onUpdate={updatedPanel=>{
                    const newPanels=panels.map(p=>p.id===panel.id?updatedPanel:p);
                    onUpdate({...project,panels:newPanels,pricing:{...(project.pricing||{}),...(updatedPanel.pricing||{})}});
                  }}
                  onSaveImmediate={updatedPanel=>saveImmediatePanel(panel.id,updatedPanel)}
                  onViewQuote={onViewQuote}
                  onOpenDetails={()=>onOpenPanel(panel)}
                />
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── QUOTE VIEW (aggregates all panels) ──
function QuoteView({project,uid,onBack,onUpdate}){
  const panels=project.panels||[];
  const allBom=mergeBoms(panels.map(p=>p.bom||[]));
  const totalWireCount=panels.reduce((s,p)=>s+(p.validation?.wireCount||0),0);
  const panelsPricing=panels.reduce((m,p)=>({...m,...(p.pricing||{})}),{});
  const aggregated={
    ...project,
    bom:allBom,
    validation:{wireCount:totalWireCount},
    pricing:{...(project.pricing||{}),...panelsPricing},
    pages:panels.flatMap(p=>p.pages||[]),
  };
  function handleQuoteUpdate(upd){
    onUpdate({...project,quote:upd.quote,pricing:upd.pricing,budgetaryQuote:upd.budgetaryQuote});
  }
  const fmtMoney=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 24px",display:"flex",alignItems:"center",gap:16,minHeight:52,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,padding:"0",whiteSpace:"nowrap"}}>← Panels</button>
        <div style={{width:1,height:18,background:C.border}}/>
        <div style={{fontSize:15,fontWeight:700,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{project.name}</div>
        <span style={{background:C.greenDim,color:C.green,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>COMBINED QUOTE</span>
        <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{allBom.length} items · {totalWireCount} wires</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          {panels.length>0&&(
            <div style={{...card({padding:"12px 16px"}),marginBottom:20}} className="no-print">
              <div style={{fontSize:12,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Panel Breakdown</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                {panels.map(p=>{
                  const mats=(p.bom||[]).reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
                  return(
                    <div key={p.id} style={{...card({padding:"10px 14px"}),minWidth:170}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{p.name}</div>
                      <div style={{fontSize:12,color:C.muted}}>{(p.bom||[]).length} items · {(p.pages||[]).length} pages</div>
                      {p.validation?.wireCount>0&&<div style={{fontSize:12,color:C.muted}}>⚡ {p.validation.wireCount} wires</div>}
                      {mats>0&&<div style={{fontSize:12,color:C.green,marginTop:4}}>Materials: {fmtMoney(mats)}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <QuoteTab project={aggregated} onUpdate={handleQuoteUpdate}/>
        </div>
      </div>
    </div>
  );
}

// ── PROJECT VIEW ──
function ProjectView({project:init,uid,onBack,onChange}){
  const [project,setProject]=useState(()=>migrateProject(init));
  const projectRef=useRef(migrateProject(init));
  const [view,setView]=useState("panels"); // "panels"|"panel"|"quote"
  const [activePanel,setActivePanel]=useState(null);
  const saveTimer=useRef(null);
  const readOnly=isReadOnly();
  const didMigrate=useRef(!init.panels);

  // Keep ref in sync with state for use in callbacks
  useEffect(()=>{projectRef.current=project;},[project]);

  // Save migrated project immediately on first open
  useEffect(()=>{
    if(didMigrate.current){
      didMigrate.current=false;
      saveProject(uid,migrateProject(init)).catch(()=>{});
    }
  },[]);

  function update(p){
    setProject(p);projectRef.current=p;onChange(p);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>saveProject(uid,p),1000);
  }

  function updatePanel(panelId,updatedPanel){
    const cur=projectRef.current;
    const newPanels=cur.panels.map(p=>p.id===panelId?updatedPanel:p);
    const newProject={...cur,panels:newPanels,pricing:{...(cur.pricing||{}),...(updatedPanel.pricing||{})}};
    setActivePanel(updatedPanel);
    update(newProject);
  }

  if(view==="panel"&&activePanel){
    return(
      <PanelView
        project={project}
        panel={activePanel}
        uid={uid}
        readOnly={readOnly}
        onBack={()=>{setView("panels");setActivePanel(null);}}
        onUpdatePanel={updatedPanel=>updatePanel(activePanel.id,updatedPanel)}
        onViewQuote={()=>setView("quote")}
      />
    );
  }

  if(view==="quote"){
    return(
      <QuoteView
        project={project}
        uid={uid}
        onBack={()=>setView("panels")}
        onUpdate={update}
      />
    );
  }

  return(
    <PanelListView
      project={project}
      uid={uid}
      readOnly={readOnly}
      onBack={onBack}
      onOpenPanel={panel=>{setActivePanel(panel);setView("panel");}}
      onViewQuote={()=>setView("quote")}
      onUpdate={update}
    />
  );
}

  async function sendReset(){
    setPwErr("");setPwLoading(true);
    try{
      await fbAuth.sendPasswordResetEmail(fbAuth.currentUser.email);
      setResetSent(true);
    }catch(ex){setPwErr(ex.message);}
    setPwLoading(false);
  }

  async function changePassword(e){
    e.preventDefault();setPwErr("");
    if(newPass.length<6){setPwErr("New password must be at least 6 characters.");return;}
    if(newPass!==confPass){setPwErr("Passwords do not match.");return;}
    setPwLoading(true);
    try{
      const user=fbAuth.currentUser;
      const cred=firebase.auth.EmailAuthProvider.credential(user.email,curPass);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPass);
      setPwOk(true);setCurPass("");setNewPass("");setConfPass("");
      setTimeout(()=>setPwOk(false),3000);
    }catch(ex){
      if(ex.code==="auth/wrong-password"||ex.code==="auth/invalid-credential")setPwErr("Current password is incorrect.");
      else if(ex.code==="auth/operation-not-allowed")setPwErr("Password sign-in is not enabled for this account.");
      else setPwErr(ex.message);
    }
    setPwLoading(false);
  }

  const isEmailProvider=fbAuth.currentUser?.providerData?.some(p=>p.providerId==="password");

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>⚙ Settings</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Matrix ARC configuration</div>

        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Anthropic API Key</label>
          {loading
            ?<div style={{color:C.muted,fontSize:13,padding:"9px 0"}}>Loading…</div>
            :<input value={key} onChange={e=>setKey(e.target.value)} type="password" placeholder="sk-ant-…" style={inp()}/>
          }
          <div style={{fontSize:11,color:C.muted,marginTop:6}}>Stored in your Firebase project. Shared across all team members.</div>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:24}}>
          <button onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Close</button>
          <button onClick={save} disabled={loading||!key.trim()} style={btn(saved?C.green:C.accent,"#fff",{flex:2,opacity:loading||!key.trim()?0.5:1})}>
            {saved?"✓ Saved":"Save Key"}
          </button>
        </div>

        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Change Password</label>
          {!isEmailProvider?(
            <div style={{fontSize:13,color:C.muted,padding:"10px 12px",background:C.surface,borderRadius:8}}>
              Your account uses Google Sign-In and does not have a password. Use "Forgot password?" on the login screen to set one.
            </div>
          ):(
            <form onSubmit={changePassword}>
              <div style={{marginBottom:4}}><input value={curPass} onChange={e=>setCurPass(e.target.value)} type="password" placeholder="Current password" style={inp()} required/></div>
              <div style={{textAlign:"right",marginBottom:10}}>
                {resetSent
                  ?<span style={{fontSize:12,color:C.green}}>✓ Reset link sent to {fbAuth.currentUser?.email}</span>
                  :<button type="button" onClick={sendReset} disabled={pwLoading} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:0}}>Forgot password?</button>
                }
              </div>
              <div style={{marginBottom:8}}><input value={newPass} onChange={e=>setNewPass(e.target.value)} type="password" placeholder="New password (min 6 chars)" style={inp()} required/></div>
              <div style={{marginBottom:10}}><input value={confPass} onChange={e=>setConfPass(e.target.value)} type="password" placeholder="Confirm new password" style={inp()} required/></div>
              {pwErr&&<div style={{color:C.red,fontSize:12,marginBottom:10,lineHeight:1.5}}>{pwErr}</div>}
              {pwOk&&<div style={{color:C.green,fontSize:12,marginBottom:10}}>✓ Password updated successfully.</div>}
              <button type="submit" disabled={pwLoading} style={btn(C.accent,"#fff",{width:"100%",opacity:pwLoading?0.6:1})}>
                {pwLoading?"Updating…":"Update Password"}
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// ── NEW PROJECT MODAL ──
function NewProjectModal({uid,onCreated,onClose}){
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);

  async function create(e){
    e.preventDefault();if(!name.trim())return;setLoading(true);
    const p=await saveProject(uid,{name:name.trim(),status:"draft",panels:[{id:'panel-1',name:'Panel 1',pages:[],bom:[],validation:null,pricing:null,budgetaryQuote:null,status:'draft'}],createdAt:Date.now(),updatedAt:Date.now()});
    onCreated(p);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:440}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>New Project</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Name this control panel quote</div>
        <form onSubmit={create}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Panel 2024-001 — Conveyor Control" style={{...inp(),marginBottom:16}} autoFocus/>
          <div style={{display:"flex",gap:10}}>
            <button type="button" onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
            <button type="submit" disabled={!name.trim()||loading} style={btn(C.accent,"#fff",{flex:2,opacity:!name.trim()||loading?0.5:1})}>
              {loading?"Creating…":"Create Project"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── APP ──
function App({user}){
  const [projects,setProjects]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("dashboard");
  const [openProject,setOpenProject]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showConfig,setShowConfig]=useState(false);
  const [companyId,setCompanyId]=useState(null);
  const [userRole,setUserRole]=useState(null);
  const [companyName,setCompanyName]=useState(null);
  const [showTeam,setShowTeam]=useState(false);
  const [showSetup,setShowSetup]=useState(false);
  const [setupDismissed,setSetupDismissed]=useState(false);

  useEffect(()=>{
    (async()=>{
      _appCtx.uid=user.uid;
      const profile=await loadUserProfile(user.uid);
      if(profile?.companyId){
        _appCtx.companyId=profile.companyId;
        _appCtx.role=profile.role;
        _appCtx.projectsPath=`companies/${profile.companyId}/projects`;
        _appCtx.configPath=`companies/${profile.companyId}/config`;
        setCompanyId(profile.companyId);
        setUserRole(profile.role);
        try{
          const cd=await fbDb.doc(`companies/${profile.companyId}`).get();
          if(cd.exists)setCompanyName(cd.data().name||null);
        }catch(e){}
      } else {
        _appCtx.projectsPath=`users/${user.uid}/projects`;
      }
      await Promise.all([loadApiKey(user.uid),loadPricingConfig(user.uid)]);
      setProjects(await loadProjects(user.uid));
      setLoading(false);
    })();
  },[user.uid]);

  function handleOpen(p){setOpenProject(p);setView("project");}
  function handleCreated(p){setShowNew(false);setProjects(ps=>[p,...ps]);setOpenProject(p);setView("project");}
  function handleChange(p){setProjects(ps=>ps.map(x=>x.id===p.id?p:x));setOpenProject(p);}
  function handleDelete(id){if(!confirm("Delete this project?"))return;deleteProject(user.uid,id);setProjects(ps=>ps.filter(x=>x.id!==id));}
  async function handleAccept(id){
    const path=_appCtx.projectsPath||`users/${user.uid}/projects`;
    await fbDb.doc(`${path}/${id}`).update({
      transferred:firebase.firestore.FieldValue.delete(),
      transferredTo:firebase.firestore.FieldValue.delete(),
      transferredFrom:firebase.firestore.FieldValue.delete(),
      createdBy:user.uid,
    });
    setProjects(ps=>ps.map(p=>p.id===id?{...p,transferred:undefined,transferredTo:undefined,transferredFrom:undefined,createdBy:user.uid}:p));
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {view==="dashboard"&&(
        <>
          <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 32px",display:"flex",alignItems:"center",height:52}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
              <span style={{fontSize:22}}>⬡</span>
              <span style={{fontSize:16,fontWeight:800,letterSpacing:-0.5}}>Matrix <span style={{color:C.accent}}>ARC</span></span>
              <span style={{fontSize:11,color:C.muted,marginLeft:4}}>AI Recognition &amp; Capture</span>
              {companyName&&(
                <span style={{color:C.accent,fontSize:12,fontWeight:700,marginLeft:8}}>⬡ {companyName}</span>
              )}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={()=>setShowTeam(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"6px 10px",borderRadius:6}}>👥 Team</button>
              <button onClick={()=>setShowConfig(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"6px 10px",borderRadius:6}}>⚙ Config</button>
              <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,padding:"6px 10px",borderRadius:6}}>⚙ Settings</button>
              <div style={{width:1,height:18,background:C.border}}/>
              <span style={{fontSize:12,color:C.muted}}>{user.email}</span>
              {userRole&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:userRole==="admin"?C.accentDim:userRole==="edit"?C.greenDim:C.border,color:userRole==="admin"?C.accent:userRole==="edit"?C.green:C.muted}}>{userRole}</span>}
              <button onClick={()=>fbAuth.signOut()} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:"6px 10px"}}>Sign out</button>
            </div>
          </div>
          {/* Company setup banner */}
          {!companyId&&!setupDismissed&&(
            <div style={{background:"#1a1a3e",borderBottom:`1px solid ${C.accent}44`,padding:"8px 32px",display:"flex",alignItems:"center",gap:12,fontSize:13,flexWrap:"wrap"}}>
              <span style={{color:C.sub,flex:1}}>Set up a Company workspace to collaborate with your team.</span>
              <button onClick={()=>setShowSetup(true)} style={btn(C.accent,"#fff",{fontSize:12,padding:"5px 14px"})}>Set up Company</button>
              <button onClick={()=>setSetupDismissed(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:"4px 8px"}}>Not now</button>
            </div>
          )}
          <Dashboard uid={user.uid} projects={projects} loading={loading} onOpen={handleOpen} onNew={()=>setShowNew(true)} onDelete={handleDelete} onAccept={handleAccept}/>
        </>
      )}
      {view==="project"&&openProject&&(
        <ProjectView project={openProject} uid={user.uid} onBack={()=>setView("dashboard")} onChange={handleChange}/>
      )}
      {showNew&&<NewProjectModal uid={user.uid} onCreated={handleCreated} onClose={()=>setShowNew(false)}/>}
      {showSettings&&<SettingsModal uid={user.uid} onClose={()=>setShowSettings(false)}/>}
      {showConfig&&<PricingConfigModal uid={user.uid} onClose={()=>setShowConfig(false)}/>}
      {showTeam&&<TeamModal uid={user.uid} companyId={companyId} userRole={userRole} onClose={()=>setShowTeam(false)}/>}
      {showSetup&&<CompanySetupModal uid={user.uid} email={user.email} onDone={(cid,role,name)=>{setCompanyId(cid);setUserRole(role);setCompanyName(name||null);setShowSetup(false);}} onClose={()=>setShowSetup(false)}/>}
    </div>
  );
}

// ── ROOT ──
function Root(){
  const [user,setUser]=useState(undefined);
  const [redirectDone,setRedirectDone]=useState(false);

  useEffect(()=>{setRedirectDone(true);},[]);
  const [joinPayload]=useState(()=>{
    try{
      const params=new URLSearchParams(window.location.search);
      const j=params.get("join");
      if(!j)return null;
      return JSON.parse(atob(j));
    }catch(e){return null;}
  });

  useEffect(()=>{
    return fbAuth.onAuthStateChanged(u=>{
      if(u&&joinPayload){
        // If signed in as a different user, sign out and show the invite login screen
        if(u.email.toLowerCase()!==joinPayload.e.toLowerCase()){
          fbAuth.signOut();
          return; // onAuthStateChanged will fire again with null → shows LoginScreen
        }
        const{c:companyId,r:role}=joinPayload;
        const batch=fbDb.batch();
        batch.set(fbDb.doc(`companies/${companyId}/members/${u.uid}`),{email:u.email,role,addedAt:Date.now()});
        batch.set(fbDb.doc(`users/${u.uid}/config/profile`),{companyId,role},{merge:true});
        batch.commit()
          .then(()=>{
            try{
              const url=new URL(window.location.href);
              url.searchParams.delete("join");
              window.history.replaceState({},"",url.toString());
            }catch(e){}
            setUser(u);
          })
          .catch(e=>{
            console.error("Failed to accept invite:",e);
            setUser(u);
          });
      } else {
        setUser(u);
      }
    });
  },[joinPayload]);

  if(user===undefined||!redirectDone)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
      <div style={{color:C.muted,fontSize:14}}>Loading…</div>
    </div>
  );
  if(!user)return<LoginScreen invite={joinPayload}/>;
  return<App user={user}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
