// ── IMAGE RESIZE ──
function resizeImage(dataUrl,maxW=2800){
  return new Promise((res,rej)=>{
    if(!dataUrl){return rej(new Error("resizeImage: empty dataUrl"));}
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.95));c.width=0;c.height=0;
    };
    img.onerror=()=>rej(new Error("resizeImage: failed to load image"));
    img.src=dataUrl;
  });
}

// ── IMAGE CACHE (IndexedDB) ──
const _IDB_NAME="matrix-arc-images",_IDB_STORE="pages";
function _openImageDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(_IDB_NAME,1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(_IDB_STORE);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function _saveImages(panels){
  try{
    const db=await _openImageDB();
    const tx=db.transaction(_IDB_STORE,"readwrite");
    const store=tx.objectStore(_IDB_STORE);
    for(const panel of (panels||[])){
      for(const page of (panel.pages||[])){
        if(page.dataUrl)store.put(page.dataUrl,String(page.id));
      }
    }
    await new Promise((res,rej)=>{tx.oncomplete=res;tx.onerror=e=>rej(e.target.error);});
  }catch(e){console.warn("ImageCache save failed:",e);}
}
async function _loadImages(panels){
  try{
    const db=await _openImageDB();
    const tx=db.transaction(_IDB_STORE,"readonly");
    const store=tx.objectStore(_IDB_STORE);
    for(const panel of (panels||[])){
      for(const page of (panel.pages||[])){
        if(!page.dataUrl){
          const img=await new Promise(res=>{const r=store.get(String(page.id));r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);});
          if(img)page.dataUrl=img;
        }
      }
    }
  }catch(e){console.warn("ImageCache load failed:",e);}
}
async function _deleteImages(panels){
  try{
    const db=await _openImageDB();
    const tx=db.transaction(_IDB_STORE,"readwrite");
    const store=tx.objectStore(_IDB_STORE);
    for(const panel of (panels||[])){
      for(const page of (panel.pages||[])) store.delete(String(page.id));
    }
  }catch(e){}
}

async function saveProject(uid,project){
  const path=_appCtx.projectsPath||`users/${uid}/projects`;
  const col=fbDb.collection(path);
  const ref=project.id?col.doc(project.id):col.doc();
  const data={...project,id:ref.id,updatedAt:Date.now(),...(!project.id&&{createdBy:uid})};
  // Persist images to IndexedDB before stripping from Firestore payload
  await _saveImages(data.panels);
  // Don't store page images in Firestore — strip dataUrls from panels
  const stripped={...data,panels:(data.panels||[]).map(panel=>({...panel,pages:(panel.pages||[]).map(p=>{const {dataUrl,...rest}=p;return rest;})}))};
  // Firestore rejects undefined values — round-trip through JSON to remove them
  const toSave=JSON.parse(JSON.stringify(stripped));
  await ref.set(toSave);
  return data; // return with dataUrls intact for in-memory use
}

function _libPath(uid){
  return _appCtx.configPath?`${_appCtx.configPath}/partLibrary`:`users/${uid}/config/partLibrary`;

function _libKey(manufacturer,description){
  const n=s=>(s||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
  return `${n(manufacturer)}||${n(description).slice(0,80)}`;
}
async function loadPartLibrary(uid){
  try{const d=await fbDb.doc(_libPath(uid)).get();return d.exists?(d.data().entries||[]):[];}
  catch(e){return[];}

async function savePartLibraryEntry(uid,{manufacturer,description,partNumber}){
  if(!partNumber||!partNumber.trim())return;
  if(!manufacturer&&!description)return;
  const path=_libPath(uid);
  let entries=[];
  try{const d=await fbDb.doc(path).get();if(d.exists)entries=d.data().entries||[];}catch(e){}
  const key=_libKey(manufacturer,description);
  const idx=entries.findIndex(e=>e.key===key);
  const entry={key,manufacturer:manufacturer||"",description:description||"",partNumber:partNumber.trim(),updatedAt:Date.now()};
  if(idx>=0)entries[idx]=entry;else entries.push(entry);
  await fbDb.doc(path).set({entries});
}
function findPartSuggestion(library,row){
  if(!library||!library.length)return null;
  if(row.partNumber&&row.partNumber.trim())return null;
  if(!row.manufacturer&&!row.description)return null;
  const n=s=>(s||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
  const exact=library.find(e=>e.key===_libKey(row.manufacturer,row.description));
  if(exact)return exact.partNumber;
  const words=s=>s.split(/\s+/).filter(w=>w.length>2);
  const rowWords=words(n(row.description));
  if(rowWords.length<2)return null;
  const mfr=n(row.manufacturer);
  let best=null,bestScore=0;
  for(const e of library){
    const eMfr=n(e.manufacturer);
    if(mfr&&eMfr&&!eMfr.includes(mfr)&&!mfr.includes(eMfr))continue;
    const eWords=words(n(e.description));
    const common=rowWords.filter(w=>eWords.includes(w)).length;
    const score=common/Math.max(rowWords.length,eWords.length,1);
    if(score>0.6&&score>bestScore){bestScore=score;best=e.partNumber;}
  }
  return best;
}
async function loadPartCorrections(uid){
  try{const d=await fbDb.doc(_libPath(uid)).get();return d.exists?(d.data().corrections||[]):[];}
  catch(e){return[];}

async function savePartCorrection(uid,{wrongValue,correctValue,description,manufacturer}){
  if(!wrongValue||!wrongValue.trim()||!correctValue||!correctValue.trim())return;
  const path=_libPath(uid);
  let corrections=[];
  try{const d=await fbDb.doc(path).get();if(d.exists)corrections=d.data().corrections||[];}catch(e){}
  const key=(wrongValue||"").trim().toLowerCase();
  const idx=corrections.findIndex(c=>c.key===key);
  const entry={key,wrongValue:wrongValue.trim(),correctValue:correctValue.trim(),description:description||"",manufacturer:manufacturer||"",updatedAt:Date.now()};
  if(idx>=0)corrections[idx]=entry;else corrections.push(entry);
  try{await fbDb.doc(path).set({corrections},{merge:true});}catch(e){}
}
function applyPartCorrections(corrections,bom){
  if(!corrections||!corrections.length)return bom;
  return bom.map(row=>{
    if(!row.partNumber||!row.partNumber.trim())return row;
    const key=(row.partNumber||"").trim().toLowerCase();
    const match=corrections.find(c=>c.key===key);
    return match?{...row,partNumber:match.correctValue,correctedByLibrary:true}:row;
  });
}

// ── BOM MERGER (combine by partNumber, sum qty) ──
function mergeBoms(bomArrays){
  const map={};
  bomArrays.flat().forEach(item=>{
    const key=(item.partNumber||"").trim().toLowerCase()||("desc:"+((item.description||"").toLowerCase().slice(0,40)));
    if(map[key]){map[key]={...map[key],qty:(+map[key].qty||1)+(+item.qty||1)};}
    else{map[key]={...item};}
  });
  return Object.values(map);
}

// ── BOM EXTRACTION PROMPT ──
const BOM_PROMPT=`You are an expert at reading UL508A industrial electrical control panel drawings.

TASK: Extract every line item from the BOM table on this drawing page.

STEP 1 — ANALYZE THE TABLE STRUCTURE FIRST:
Before extracting anything, carefully examine:
• All column headers exactly as printed
• Total number of data rows in the table (count them)
• Any multi-line cells, merged cells, or continuation rows
• Whether rows continue from a previous page (no header row visible)

STEP 2 — MAP COLUMNS:
• itemNo      → ITEM, Item #, Item No., LINE, Line #, No., or leftmost sequential number column
• qty         → QTY, Quantity, Qty., EA, Each
• partNumber  → "MFG/PART NO.", "Part No.", "Part #", "Cat. No.", "Catalog No.", "Model No.",
                "Order No.", "Product No.", "Stock No." — values are alphanumeric catalog codes
• manufacturer → Manufacturer, MFG, Brand, Make
• notes       → TAG, Tag No., Ref, Reference, Device ID — contains ref designators (CB1, M2, OL1…)
• description → Description, Item Description, Function, Material Description

STEP 3 — EXTRACT EVERY ROW (no skipping):
• Multi-line cells: if text wraps to the next printed line, it is ONE row — keep it as one item
• itemNo: copy exact value printed. Use "" if no item number column exists
• NEVER invent or use sequential row counts (1,2,3…) as partNumber values
• Blank / "—" / "N/A" in part number column → partNumber: ""
• Manufacturer prefix in part number cell: split it
  e.g. "SAGINAW SCE-24EL20X10SSLP" → manufacturer:"SAGINAW", partNumber:"SCE-24EL20X10SSLP"
  e.g. "ABB AF09-30-10-13" → manufacturer:"ABB", partNumber:"AF09-30-10-13"
• Multiple catalog codes in ONE cell (comma- or slash-separated): output a SEPARATE row for each
  e.g. "ABB KXTBRHEBFP, OXP10X225, OH865L10B" → three rows, each with same qty/manufacturer/notes
  First row: original description unchanged
  Each extra row: append " (sub-part)" to description
• Reference designators (CB1, M1, OL2, PB3, SS1…) → notes field only, never partNumber
• Include ALL data rows even when some fields are blank — only skip: column header row, totals rows, title block text, revision block rows

STEP 4 — CHARACTER ACCURACY (most critical step):
Each character in a part number must be verified individually. Common industrial drawing confusions:
• 0 (zero) vs O (letter-O): zero is narrower and has flat or angled cuts; O is a smooth oval
• 1 (one) vs I (capital-i) vs L (capital-L): check stroke widths and serif details carefully
• 2 vs Z — 5 vs S — 8 vs B — 6 vs G — 4 vs A — 9 vs q
• Q has a small tail/stroke inside the circle; O does not
• U vs V vs W — count the number of strokes and angles
• Hyphens matter: "100-C09D10" is different from "1OOC09D10"
• When unsure of a character: look at the full context of the part number format for that manufacturer
TRANSCRIBE EXACTLY what is printed — do NOT autocomplete, normalize, or guess part numbers

RETURN FORMAT:
Output ONLY a valid JSON array — no markdown, no explanation. Each object must have exactly:
{"itemNo":"","qty":1,"partNumber":"","description":"","manufacturer":"","notes":""}

If no BOM table exists on this page, return [].`;

async function extractBomPage(dataUrl,feedback=""){
  const b64=dataUrl&&dataUrl.split(",")[1];
  if(!b64){console.warn("extractBomPage: skipping — empty or invalid dataUrl");return[];}
  const feedbackSection=feedback?`\n\nCORRECTION INSTRUCTIONS FROM USER:\n${feedback}\nApply these corrections carefully and exactly as described.`:"";
  // Use extended thinking so Claude reasons through the table structure before extracting
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-beta":"interleaved-thinking-2025-05-14","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-opus-4-6",
      max_tokens:16000,
      thinking:{type:"enabled",budget_tokens:8000},
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:BOM_PROMPT+feedbackSection}
      ]}]
    })
  });
  const d=await resp.json();
  if(!resp.ok)throw new Error(d.error?.message||"API error");
  // Find the text block (thinking blocks come first)
  const raw=(d.content||[]).find(b=>b.type==="text")?.text||"";
  console.log("Claude raw response:",raw);
  try{
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const m=cleaned.match(/\[[\s\S]*\]/);
    if(!m){console.warn("No JSON array found in response");return[];}
    const items=JSON.parse(m[0]);
    // Post-process: split any rows where partNumber still contains multiple values
    const expanded=[];
    for(const item of items){
      const pn=(item.partNumber||"").trim();
      // Detect multiple part numbers: split on " / " or ", " but only when each segment looks like a part number
      // (contains letters+numbers, not just a description phrase)
      const segments=pn.split(/\s*\/\s*|\s*,\s*/).map(s=>s.trim()).filter(s=>s&&/[A-Z0-9]{3,}/i.test(s));
      if(segments.length>1){
        for(let si=0;si<segments.length;si++){
          const base=item.description||"";
        const alreadyLabeled=base.includes("(sub-part from above)");
        const desc=si===0?base:(alreadyLabeled?base:base+" (sub-part from above)");
          expanded.push({...item,partNumber:segments[si],description:desc});
        }
      } else {
        expanded.push(item);
      }
    }
    return expanded;
  }catch(e){console.error("JSON parse error:",e,raw);return[];}
}

// ── SCHEMATIC ANALYSIS PROMPT ──
const SCHEMATIC_PROMPT=`You are reading a UL508A electrical control panel schematic page.

Extract TWO things and return ONLY valid JSON:
{
  "tags": ["CB100", "M178", ...],
  "wireCount": 42
}

Rules:
- tags: include all alphanumeric device IDs, reference designators, terminal block labels visible on this schematic page
- wireCount: count the number of individual wires (each wire counted once, regardless of how many ends it has)
- Return JSON only, no explanation`;

async function analyzeSchematicPage(dataUrl){
  const b64=dataUrl&&dataUrl.split(",")[1];
  if(!b64){console.warn("analyzeSchematicPage: skipping — empty or invalid dataUrl");return{tags:[],wireCount:0};}
  const raw=await apiCall({
    max_tokens:4000,
    messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
      {type:"text",text:SCHEMATIC_PROMPT}
    ]}]
  });
  console.log("Schematic Claude response:",raw);
  try{
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const m=cleaned.match(/\{[\s\S]*\}/);
    if(!m){console.warn("No JSON object found in schematic response");return{tags:[],wireTerminations:0};}
    const parsed=JSON.parse(m[0]);
    return{tags:Array.isArray(parsed.tags)?parsed.tags:[],wireCount:+parsed.wireCount||0};
  }catch(e){console.error("Schematic JSON parse error:",e,raw);return{tags:[],wireCount:0};}
}

// ── PANEL VALIDATION (standalone, usable outside ValidateTab) ──
async function runPanelValidation(panel){
  const schematicPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("schematic")&&p.dataUrl);
  if(!schematicPages.length)return null;
  let allTags=[],totalWires=0;
  for(const pg of schematicPages){
    const result=await analyzeSchematicPage(pg.dataUrl);
    allTags=[...allTags,...result.tags];
    totalWires+=result.wireCount;
  }
  const schematicTags=[...new Set(allTags.map(t=>t.trim()).filter(Boolean))];
  const allTagsSet=new Set(schematicTags.map(t=>t.toUpperCase()));
  const isAsShown=notes=>/^(as\s+shown|enclosure)$/i.test((notes||"").trim());
  const matched=[],missing=[],notTraceable=[];
  for(const item of (panel.bom||[])){
    const notes=(item.notes||"").trim();
    if(isAsShown(notes)){notTraceable.push(item);continue;}
    const itemTags=notes.split(/[\s,;]+/).filter(Boolean);
    const found=itemTags.filter(t=>allTagsSet.has(t.toUpperCase()));
    if(found.length>0||itemTags.length===0)matched.push({item,found});
    else missing.push(item);
  }
  const allBomTags=new Set((panel.bom||[]).flatMap(i=>(i.notes||"").split(/[\s,;]+/).filter(Boolean).map(t=>t.toUpperCase())));
  const unaccounted=schematicTags.filter(t=>!allBomTags.has(t.toUpperCase()));
  const traceable=(panel.bom||[]).length-notTraceable.length;
  const matchPct=traceable>0?matched.length/traceable:1;
  const confidence=matchPct>=0.9?"high":matchPct>=0.7?"medium":"low";
  return{runAt:Date.now(),schematicTags,wireCount:totalWires,matched,missingFromSchematic:missing,notTraceable,unaccountedTags:unaccounted,confidence};
}

// ── PRICING PROMPT ──
const PRICING_PROMPT=`You are a pricing assistant for industrial electrical control panel components.
Estimate US distributor market prices (Grainger, AutomationDirect, Allied, DigiKey, etc.)
Return ONLY a valid JSON array, same order as input:
[{"id":"...","unitPrice":12.50},...]
Use null for any item you cannot price. No explanation, JSON only.

Items:`;

async function estimatePrices(items){
  const BATCH=20;
  const result={};
  for(let i=0;i<items.length;i+=BATCH){
    const batch=items.slice(i,i+BATCH);
    const payload=batch.map(r=>({id:String(r.id),partNumber:r.partNumber||"",description:r.description||"",manufacturer:r.manufacturer||""}));
    try{
      const raw=await apiCall({
        max_tokens:2000,
        messages:[{role:"user",content:`${PRICING_PROMPT}\n${JSON.stringify(payload)}`}]
      });
      const cleaned=raw.replace(/```json|```/g,"").trim();
      const m=cleaned.match(/\[[\s\S]*\]/);
      if(m){
        const arr=JSON.parse(m[0]);
        arr.forEach(r=>{result[r.id]=r.unitPrice??null;});
      }
    }catch(e){console.error("Pricing batch error:",e);}
  }
  return result;
}

// ── PAGE TYPE DETECTION ──
const PAGE_TYPE_DETECT_PROMPT=`You are analyzing a page from a UL508A industrial control panel drawing set.
Return ONLY a JSON object with exactly these two fields:
- "types": array of content types present on this page, using only: "bom", "schematic", "layout"
  "bom"       — page contains a Bill of Materials table (columns for qty, part numbers, descriptions)
  "schematic" — page contains electrical schematic diagrams (wires, symbols, terminal numbers, device tags)
  "layout"    — page contains physical layout, dimensional drawings, panel arrangement, or assembly view
  Use [] for title sheets, revision history, or pages with none of the above.
- "sheetNo": string — the sheet number as printed in the title block (e.g. "1 of 5", "2/8", "SHT 3"). Empty string "" if not found.

JSON object only — no explanation, no markdown. Example: {"types":["bom"],"sheetNo":"1 of 5"}`;

async function detectPageTypes(dataUrl){
  const b64=dataUrl&&dataUrl.split(",")[1];
  if(!b64||!_apiKey)return{types:[],sheetNo:""};
  try{
    const raw=await apiCall({
      max_tokens:80,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:PAGE_TYPE_DETECT_PROMPT}
      ]}]
    });
    const m=raw.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
    if(!m)return{types:[],sheetNo:""};
    const obj=JSON.parse(m[0]);
    return{types:(obj.types||[]).filter(t=>["bom","schematic","layout"].includes(t)),sheetNo:obj.sheetNo||""};
  }catch(e){return{types:[],sheetNo:""};}
}

// ── PAGE TYPES HELPER (backward compat: old pages have type string, new have types array) ──
function getPageTypes(page){
  if(Array.isArray(page.types))return page.types;
  if(page.type&&page.type!=="untagged")return[page.type];
  return[];
}

  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const emailRef=useRef(null);

  async function submit(e){
    e.preventDefault();setErr("");setLoading(true);
    try{
      if(mode==="login")await fbAuth.signInWithEmailAndPassword(email,pass);
      else await fbAuth.createUserWithEmailAndPassword(email,pass);
    }catch(ex){
      if(ex.code==="auth/email-already-in-use"){
        setMode("login");
        setErr("That email already has an account — sign in below, or use Forgot Password to reset it.");
      } else if(["auth/user-not-found","auth/wrong-password","auth/invalid-credential","auth/invalid-email"].includes(ex.code)){
        setErr("Email or password not recognized. Please try again, or use Forgot Password to reset it.");
      } else {
        setErr(ex.message);
      }
    }
    setLoading(false);
  }
  async function google(){
    setLoading(true);
    try{await fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
    catch(ex){setErr(ex.message);}
    setLoading(false);
  }
  async function microsoft(){
    setLoading(true);
    try{
      const provider=new firebase.auth.OAuthProvider("microsoft.com");
      provider.setCustomParameters({prompt:"select_account"});
      await fbAuth.signInWithPopup(provider);
    }catch(ex){
      if(ex.code==="auth/account-exists-with-different-credential"){
        if(ex.email)setEmail(ex.email);
        setErr("An account with this email already exists — please sign in with your email and password below.");
      } else {
        setErr(ex.message);
      }
    }
    setLoading(false);
  }
  async function sendReset(e){
    e.preventDefault();setErr("");setLoading(true);
    try{
      await fbAuth.sendPasswordResetEmail(email);
      setResetSent(true);
    }catch(ex){setErr(ex.message);}
    setLoading(false);
  }
  function switchMode(m){
    // Capture actual DOM value first — browser autocomplete may not fire onChange
    if(emailRef.current)setEmail(emailRef.current.value);
    setMode(m);setErr("");setResetSent(false);
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 50% 0%,#1a1a3e 0%,${C.bg} 60%)`}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:52,marginBottom:10}}>⬡</div>
        <div style={{fontSize:34,fontWeight:800,letterSpacing:-1}}>Matrix <span style={{color:C.accent}}>ARC</span></div>
        <div style={{fontSize:14,color:C.muted,marginTop:6}}>AI Recognition &amp; Capture · Control Panel Quoting</div>
      </div>
      {invite&&(
        <div style={{background:C.accentDim,border:`1px solid ${C.accent}44`,borderRadius:12,padding:"14px 20px",marginBottom:20,textAlign:"center",width:"100%",maxWidth:400}}>
          <div style={{fontSize:15,fontWeight:700,color:C.accent,marginBottom:4}}>You've been invited to Matrix ARC</div>
          <div style={{fontSize:13,color:C.sub}}>Create an account or sign in to join your team workspace.</div>
        </div>
      )}
      <div style={{...card(),width:"100%",maxWidth:400}}>
        {mode==="reset"?(
          resetSent?(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>Check your email</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6}}>A password reset link was sent to <strong style={{color:C.fg}}>{email}</strong>. Check your inbox and follow the link to set a new password.</div>
              <button onClick={()=>switchMode("login")} style={btn(C.accent,"#fff",{width:"100%"})}>Back to Sign In</button>
            </div>
          ):(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Reset Password</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:16}}>Enter your email and we'll send a reset link.</div>
              <form onSubmit={sendReset}>
                <div style={{marginBottom:16}}><input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" style={inp()} required/></div>
                {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,lineHeight:1.5}}>{err}</div>}
                <button type="submit" disabled={loading} style={btn(C.accent,"#fff",{width:"100%",opacity:loading?0.6:1})}>{loading?"Sending…":"Send Reset Link"}</button>
              </form>
              <div style={{textAlign:"center",marginTop:14,fontSize:12,color:C.muted}}>
                <button onClick={()=>switchMode("login")} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontWeight:600,fontSize:12}}>Back to Sign In</button>
              </div>
            </div>
          )
        ):(
          <div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:20}}>{mode==="login"?"Sign In":"Create Account"}</div>
            <form onSubmit={submit}>
              <div style={{marginBottom:10}}><input ref={emailRef} value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" style={inp()} required/></div>
              <div style={{marginBottom:6}}><input value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="Password" style={inp()} required/></div>
              <div style={{textAlign:"right",marginBottom:14}}>
                <button type="button" onClick={()=>switchMode("reset")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>Forgot password?</button>

              {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,lineHeight:1.5}}>{err}</div>}
              <button type="submit" disabled={loading} style={btn(C.accent,"#fff",{width:"100%",opacity:loading?0.6:1})}>{loading?"Please wait…":mode==="login"?"Sign In":"Create Account"}</button>
            </form>
            <div style={{textAlign:"center",margin:"14px 0",color:C.muted,fontSize:12}}>or</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={google} disabled={loading} style={btn("#fff","#1a1a1a",{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8})}>
                <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Continue with Google
              </button>
              <button onClick={microsoft} disabled={loading} style={btn("#2f2f2f","#fff",{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8})}>
                <svg width="16" height="16" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
                Continue with Microsoft

            </div>
            <div style={{textAlign:"center",marginTop:14,fontSize:12,color:C.muted}}>
              {mode==="login"?"No account? ":"Have an account? "}
