<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC Drawing Review Portal</title>
  <link rel="icon" href="/icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
    .portal-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
    .portal-header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .portal-header h1 { font-size: 18px; color: #1e293b; font-weight: 700; }
    .portal-content { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .portal-note { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; }
    .portal-note .note-num { font-size: 12px; font-weight: 700; color: #2563eb; }
    .portal-note .note-text { font-size: 14px; color: #1e293b; line-height: 1.6; margin: 8px 0; }
    .portal-note .note-author { font-size: 11px; color: #64748b; font-style: italic; }
    .portal-note textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px; margin-top: 8px; }
    .portal-btn { background: #2563eb; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .portal-btn:hover { background: #1d4ed8; }
    @keyframes notePulse { 0%,100%{transform:scale(1);box-shadow:0 1px 4px rgba(0,0,0,0.3)} 50%{transform:scale(1.15);box-shadow:0 0 16px 4px rgba(37,99,235,0.6),0 0 24px 8px rgba(239,68,68,0.4)} }
    .note-pulsing { animation: notePulse 0.5s ease-in-out 4; z-index: 30 !important; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script>
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyDAk-bcYLwjrihgOwsdboU70Y9q93-_9-M",
        authDomain: "matrix-arc.firebaseapp.com",
        projectId: "matrix-arc",
        storageBucket: "matrix-arc.firebasestorage.app",
        messagingSenderId: "1026422498498",
        appId: "1:1026422498498:web:e2ee72fd7e0f73b9e0ffae"
      });
    }
  </script>
</head>
<body>
  <div id="portal-app">
    <div class="portal-loading">
      <div style="font-size: 48px; opacity: 0.3;">📐</div>
      <div style="color: #64748b; font-size: 14px;">Loading Review Portal...</div>
    </div>
  </div>
  <script src="/modules/engineering/portal.js?v=0.8.0"></script>
</body>
</html>
