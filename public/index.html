  useEffect(()=>{
    function onKey(e){
      if(e.key==="Escape")onClose();
      if(e.key==="ArrowRight"||e.key==="ArrowDown")setIdx(i=>Math.min(i+1,pages.length-1));

  async function addFiles(files){
    console.log("ADDFILES: start, files="+files.length+", apiKey="+(!!_apiKey));
    setProcessing(true);setErr("");
    let _bgErr=false;
    bgStart(panel.id, panel.name||("Panel "+(idx+1)), projectId);
    try{
    const newItems=[];
    let livePages=[...savedPages];
    for(const f of Array.from(files)){
      if(f.type==="application/pdf"){
        await window.pdfjsReady;
        const pdfjs=window._pdfjs;
        const buf=await f.arrayBuffer();
        const pdf=await pdfjs.getDocument({data:buf}).promise;
        for(let pg=1;pg<=pdf.numPages;pg++){
          setProcessingMsg(`${f.name} p${pg}/${pdf.numPages}`);
          const page=await pdf.getPage(pg);
          const vp=page.getViewport({scale:4.0});
          const canvas=document.createElement("canvas");
          canvas.width=vp.width;canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
          let srcCanvas=canvas;
          if(canvas.height>canvas.width){
            const rot=document.createElement("canvas");rot.width=canvas.height;rot.height=canvas.width;
            const rctx=rot.getContext("2d");rctx.translate(0,rot.height);rctx.rotate(-Math.PI/2);rctx.drawImage(canvas,0,0);
            canvas.width=0;canvas.height=0;srcCanvas=rot;
          }
          const dataUrl=srcCanvas.toDataURL("image/jpeg",0.95);
          srcCanvas.width=0;srcCanvas.height=0;
          const resized=await resizeImage(dataUrl,3800);
          const item={id:Date.now()+Math.random(),name:`${f.name} — p${pg}`,dataUrl:resized,types:[]};
          newItems.push(item);
          livePages=[...livePages,item];
          setPendingPages([...livePages]);
        }
      } else if(f.type.startsWith("image/")){
        setProcessingMsg(f.name);
        const reader=new FileReader();

    // Auto-extract BOM from any BOM-tagged pages
    const bomPages=updated.pages.filter(p=>getPageTypes(p).includes("bom")&&p.dataUrl);
    let latestPanel=updated;
    const hasSchOrLayout=updated.pages.some(p=>(getPageTypes(p).includes("schematic")||getPageTypes(p).includes("layout")||getPageTypes(p).includes("backpanel")||getPageTypes(p).includes("enclosure"))&&p.dataUrl);

      bgUpdate(panel.id,"Extracting BOM…");

    // Verify part numbers (runs in parallel with validation)
    const bomToVerify=(latestPanel.bom||[]).slice();
    const verifyPromise=(bomToVerify.length>0&&_apiKey)?(async()=>{

      const itemCount=(latestPanel.bom||[]).length;

  function parseLaborFeedback(text){
    const updates={};
    const t=text.toLowerCase();
    // Wire count: "X wires", "base labor off X wires", "wire count is X", "X wire terminations"
    const wireMatch=t.match(/\b(\d+)\s*wire(?:s|[\s-]terminations?|[\s-]count)?/);
    if(wireMatch){
      const wires=parseInt(wireMatch[1]);
      const hours=computeFallbackLaborHours(wires);
      updates.laborHoursOverride=hours;
      updates._wiresUsed=wires;
    }
    // Direct hour override: "X hours", "use X labor hours", "set hours to X"
    const hoursMatch=t.match(/\b(\d+(?:\.\d+)?)\s*(?:labor\s+)?hours?\b/);
    if(hoursMatch&&!wireMatch){
      updates.laborHoursOverride=parseFloat(hoursMatch[1]);
    }
    // Labor rate: "$X/hr", "rate is $X", "labor rate X"
    const rateMatch=t.match(/\$\s*(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r|per\s+hour)/)||
                    t.match(/labor\s+rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)/)||
                    t.match(/rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r)?/);
    if(rateMatch){updates.laborRate=parseFloat(rateMatch[1]);}
    const {_wiresUsed,...pricingUpdates}=updates;
    return Object.keys(pricingUpdates).length>0?{pricingUpdates,wires:_wiresUsed||null}:null;
  }

  async function runPricingOnPanel(){
    const bom=panel.bom||[];
    if(!bom.length||!_apiKey)return;
    setAiPricing(true);setPricingProgress({msg:"Starting…",pct:5});
    let updatedBom=[...bom];
    let bcCount=0;

    // Phase 1: Business Central lookup
    if(!_bcToken){
      setPricingProgress({msg:"Trying silent BC login…",pct:5});
      try{await Promise.race([acquireBcToken(false),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),5000))]);}
      catch(e){setPricingProgress({msg:"BC silent login skipped — use Connect BC button first. Using AI…",pct:5});}
    }
    if(_bcToken){
      setPricingProgress({msg:"BC: Getting company ID…",pct:5});
      try{
        const compId=await bcGetCompanyId();
        if(!compId){
          setPricingProgress({msg:"BC: Company not found (\""+BC_COMPANY_NAME+"\") — falling back to AI…",pct:10});
        }else{
          const eligible=bom.filter(r=>{const ps=r.priceSource;return ps!=="bc"&&ps!=="manual";});
          setPricingProgress({msg:`BC: Fuzzy-matching ${eligible.length} items…`,pct:7});
          const bcMap={};
          const fuzzySugg={};
          for(let i=0;i<eligible.length;i++){
            const pn=(eligible[i].partNumber||"").trim();
            if(!pn)continue;
            setPricingProgress({msg:`BC: Fuzzy lookup ${i+1}/${eligible.length}: ${pn}`,pct:7+Math.round((i/eligible.length)*30)});
            const result=await bcFuzzyLookup(pn);
            if(result.match&&result.match.unitCost!=null){
              bcMap[String(eligible[i].id)]={unitPrice:result.match.unitCost,source:"bc",bcDisplayName:result.match.displayName,bcInventory:result.match.inventory,bcNumber:result.match.number};
            } else if(result.suggestions.length>0){
              fuzzySugg[String(eligible[i].id)]=result.suggestions;
            }
          }
          bcCount=Object.keys(bcMap).length;
          updatedBom=updatedBom.map(r=>{
            const key=String(r.id);
            if(key in bcMap){return{...r,partNumber:bcMap[key].bcNumber||r.partNumber,unitPrice:bcMap[key].unitPrice,priceSource:"bc"};}
            return r;
          });
          if(Object.keys(fuzzySugg).length>0){
            setBcFuzzySuggestions(prev=>({...prev,...fuzzySugg}));
          }
          const fuzzyCount=Object.keys(fuzzySugg).length;
          setPricingProgress({msg:`BC: ${bcCount} matched${fuzzyCount>0?`, ${fuzzyCount} need review`:""} of ${eligible.length}. AI for the rest…`,pct:40});
        }
      }catch(ex){
        console.warn("BC pricing phase failed:",ex);
        setPricingProgress({msg:`BC failed: ${ex.message||ex} — falling back to AI…`,pct:10});
      }
    }

    // Phase 2: AI fallback for items not priced by BC
    const unpricedBom=updatedBom.filter(r=>r.priceSource!=="bc"&&r.priceSource!=="manual");
    if(unpricedBom.length>0){
      const BATCH=20;
      const total=Math.ceil(unpricedBom.length/BATCH);
      for(let i=0;i<unpricedBom.length;i+=BATCH){
        const batchIdx=Math.floor(i/BATCH);
        const basePct=_bcToken?45:5;
        const pctRange=_bcToken?45:90;
        setPricingProgress({msg:`AI pricing ${i+1}–${Math.min(i+BATCH,unpricedBom.length)} of ${unpricedBom.length} remaining items…`,pct:basePct+Math.round((batchIdx/total)*pctRange)});
        const batch=unpricedBom.slice(i,i+BATCH);
        try{
          const map=await estimatePrices(batch);
          updatedBom=updatedBom.map(r=>{
            const key=String(r.id);
            if(key in map&&r.priceSource!=="bc"&&r.priceSource!=="manual"){
              return{...r,unitPrice:map[key],priceSource:map[key]!=null?"ai":r.priceSource||null};
            }
            return r;
          });
        }catch(ex){setAiPricing(false);setPricingProgress(null);return;}
      }
    }

    const updated={...panel,bom:updatedBom,status:"costed"};
    onUpdate(updated);
    try{await onSaveImmediate(updated);}catch(e){}
    const aiCount=updatedBom.filter(r=>r.priceSource==="ai").length;
    const totalPriced=updatedBom.filter(r=>r.unitPrice!=null).length;
    setPricingProgress({msg:`✓ ${totalPriced} of ${bom.length} priced${bcCount>0?` (${bcCount} BC, ${aiCount} AI est.)`:""}.`,pct:100});
    setAiPricing(false);
  }

    function tick(){
      const target=valTarget.current;
      const ceiling=Math.max(target,Math.min(current+0.08,99));
      current+=(ceiling-current)*0.06+0.02;
      current=Math.min(current,99);
      setValPct(Math.round(current));
      valRaf.current=requestAnimationFrame(tick);
    }
    valRaf.current=requestAnimationFrame(tick);
    try{
      const result=await runPanelValidation(panel,pct=>{valTarget.current=pct;});
      if(valRaf.current){cancelAnimationFrame(valRaf.current);valRaf.current=null;}
      setValPct(100);
      if(result.validation||result.laborData){
        const bom=appendDefaultBomItems(panel.bom||[]);
        const updated={...panel,bom,...(result.validation?{validation:result.validation}:{}),...(result.laborData?{laborData:result.laborData}:{}),status:"validated"};
        onUpdate(updated);
        try{await onSaveImmediate(updated);}catch(e){}
      }
    }catch(e){
      console.error("Validation error:",e);
      if(valRaf.current){cancelAnimationFrame(valRaf.current);valRaf.current=null;}
    }
    setTimeout(()=>{setValidatingPanel(false);setValPct(0);},600);
  }

    ])];

                          <div>

                            <button title="Browse BC items" onClick={()=>{setBcBrowserTarget(row.id);setBcBrowserQuery(row.partNumber||row.description||"");setBcBrowserOpen(true);}}
                              style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:"2px 4px",lineHeight:1,opacity:0.85,flexShrink:0,filter:"brightness(1.8)"}}

                          )}
                          {f==="partNumber"&&bcFuzzySuggestions[row.id]&&!readOnly&&(
                            <div style={{marginTop:4,background:"#0a0a12",border:`1px solid ${C.accent}44`,borderRadius:6,padding:6,maxHeight:140,overflow:"auto"}}>
                              <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
                                <div style={{fontSize:10,color:C.accent,fontWeight:700,flex:1}}>BC FUZZY MATCHES</div>
                                <button onClick={()=>setBcFuzzySuggestions(prev=>{const next={...prev};delete next[row.id];return next;})}
                                  style={{fontSize:10,color:C.text,background:C.border,border:"none",cursor:"pointer",padding:"2px 10px",lineHeight:1,fontWeight:600,borderRadius:20}}
                                  onMouseEnter={e=>e.target.style.background=C.muted} onMouseLeave={e=>e.target.style.background=C.border}>Close</button>
                              </div>
                              {bcFuzzySuggestions[row.id].map((s,si)=>(
                                <div key={s.number+si} onClick={()=>applyBcItem(row.id,s)}
                                  style={{display:"flex",alignItems:"center",gap:6,padding:"3px 4px",cursor:"pointer",borderRadius:4,fontSize:11}}
                                  onMouseEnter={e=>e.currentTarget.style.background=C.accentDim+"66"}
                                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                                  <span style={{color:C.text,fontWeight:600,whiteSpace:"nowrap"}}>{s.number}</span>
                                  <span style={{color:C.muted,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.displayName}</span>
                                  <span style={{color:C.green,fontWeight:600,whiteSpace:"nowrap"}}>{s.unitCost!=null?"$"+s.unitCost.toFixed(2):""}</span>
                                </div>
                              ))}
                            </div>
                          )}
                          </div>
                        ):(
                          <input value={row[f]||""} readOnly={readOnly}
                            onChange={e=>updateBomRow(row.id,f,e.target.value)}
                            onBlur={e=>{
                              e.target.style.borderColor="transparent";
                              const val=e.target.value;
                              const updatedBom=(panel.bom||[]).map(r=>r.id===row.id?{...r,[f]:val}:r);
                              saveBomRow({...panel,bom:updatedBom});
                              if(f==="partNumber"&&val.trim()){
                                savePartLibraryEntry(uid,{manufacturer:row.manufacturer||"",description:row.description||"",partNumber:val.trim()})
                                  .then(()=>loadPartLibrary(uid).then(setPartLibrary)).catch(()=>{});
                              }
                            }}
                            style={{...inp({padding:"5px 14px 5px 7px",fontSize:13,borderColor:"transparent",background:"transparent",borderRadius:5}),width:w?w-10+"px":"100%",minWidth:w?w-10+"px":"100px",flex:1}}
                            onFocus={e=>e.target.style.borderColor=C.accent}
                          />
                        )}
                      </td>
                    ))}
                    <td style={{padding:"3px 5px",textAlign:"right",width:110}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                        {row.priceSource==="bc"&&<span style={{background:"#2563eb22",color:"#5b9aff",borderRadius:8,padding:"1px 5px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>BC</span>}
                        {row.priceSource==="ai"&&<span style={{background:C.teal+"22",color:C.teal,borderRadius:8,padding:"1px 5px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>AI</span>}
                        {row.priceSource==="manual"&&<span style={{background:C.accentDim,color:C.accent,borderRadius:8,padding:"1px 5px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>M</span>}
                        <div style={{display:"inline-flex",alignItems:"center",gap:0,marginLeft:"auto"}}>
                        <span style={{color:C.muted,fontSize:13,lineHeight:1}}>$</span>
                        <input type="text" inputMode="decimal" readOnly={readOnly}
                          defaultValue={row.unitPrice!=null?parseFloat(row.unitPrice).toFixed(2):""}
                          key={row.id+"-"+(row.priceSource||"")+(row.unitPrice??"")}
                          placeholder="—"
                          style={{background:"transparent",border:"1px solid transparent",borderRadius:5,padding:"5px 2px 5px 0",color:C.text,fontSize:13,outline:"none",textAlign:"left",width:70,minWidth:50}}
                          onFocus={e=>{e.target.style.borderColor=C.accent;e.target.style.background=C.card;e.target.select();}}
                          onBlur={e=>{e.target.style.borderColor="transparent";e.target.style.background="transparent";const v=e.target.value.trim();if(v===""){updatePrice(row.id,"");}else{const n=parseFloat(v);if(!isNaN(n)){e.target.value=n.toFixed(2);updatePrice(row.id,String(n));}else{e.target.value=row.unitPrice!=null?parseFloat(row.unitPrice).toFixed(2):"";}}}}
                          onKeyDown={e=>{if(e.key==="Enter")e.target.blur();if(e.key==="Escape"){e.target.value=row.unitPrice!=null?parseFloat(row.unitPrice).toFixed(2):"";e.target.blur();}}}
                        />
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"3px 8px",textAlign:"right",width:80,fontSize:13,color:row.unitPrice!=null?C.text:C.muted,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>
                      {row.unitPrice!=null?"$"+((row.unitPrice||0)*(row.qty||1)).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}
                    </td>
                    <td style={{padding:"3px 5px",textAlign:"center",width:44}}>
                      {valData&&(
                        matchedIds.has(String(row.id))?<span style={{color:C.green,fontSize:13}} title="Matched in schematic">⬤</span>
                        :missingIds.has(String(row.id))&&wAccepted.has(String(row.id))?<span style={{color:C.accent,fontSize:13}} title="Accepted (not in schematic)">⬤</span>
                        :missingIds.has(String(row.id))?<span style={{color:"#cc0000",fontSize:13}} title="Not found in schematic">⬤</span>
                        :ntIds.has(String(row.id))?<span style={{color:"#ffe033",fontSize:13}} title="As shown / not traceable">⬤</span>
                        :<span style={{color:C.border,fontSize:11}}>—</span>
                      )}
                    </td>
                    <td style={{padding:"3px 3px",textAlign:"center",width:90}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:0}}>
                        {!readOnly&&<button onClick={()=>deleteBomRow(row.id)} style={{background:"none",border:"none",color:"#ff3333",cursor:"pointer",fontSize:18,opacity:0.6,padding:"2px 4px",width:28,textAlign:"center"}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.6}>✕</button>}
                      </div>
                    </td>
                  </tr>
                ));
                })()}
              </tbody>
            </table>
          </div>
          {!readOnly&&<button onClick={addBomRow} style={btn("transparent",C.accent,{fontSize:12,padding:"8px 12px",border:`1px dashed ${C.accent}66`,width:"100%",marginTop:8})}>+ Add Row</button>}
        </div>
      )}

      {/* Pricing Summary */}
      {(panel.bom||[]).length>0&&(()=>{
        const pr=panel.pricing||{};
        const markup=pr.markup??30;
        const laborRate=pr.laborRate??45;
        const contingencyBOM=pr.contingencyBOM??_pricingConfig.contingencyBOM;
        const contingencyConsumables=pr.contingencyConsumables??_pricingConfig.contingencyConsumables;
        const laborEst=computeLaborEstimate(panel);
        const laborHours=laborEst.totalHours;
        const laborCost=laborEst.totalCost;
        const bom=panel.bom||[];
        const pricedCount=bom.filter(r=>r.unitPrice!=null).length;
        const totalCost=bom.reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
        const grandTotal=totalCost+laborCost+contingencyBOM+contingencyConsumables;
        const sellPrice=grandTotal*(1+markup/100);
        const fmt=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
        return(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
              <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.7,flex:1}}>PRICING SUMMARY</div>
              <span style={{fontSize:12,color:C.sub}}>{pricedCount}/{bom.length} priced</span>
              {_apiKey&&pages.some(p=>getPageTypes(p).includes("schematic")&&(p.dataUrl||p.storageUrl))&&(
                validatingPanel
                  ?<span style={{display:"inline-flex",alignItems:"center",gap:8,padding:"4px 12px"}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.accent,animation:"pulse 1.2s ease-in-out infinite"}}>Validating…</span>
                    <span style={{fontSize:15,fontWeight:800,color:C.text,fontVariantNumeric:"tabular-nums"}}>{valPct}%</span>
                  </span>
                  :<button onClick={validatePanel} disabled={readOnly}
                    style={btn(C.accentDim,C.accent,{fontSize:12,padding:"4px 12px",opacity:readOnly?0.5:1,border:`1px solid ${C.accent}55`})}>
                    🔄 Re-Validate
                  </button>
              )}
              {!readOnly&&bom.length>0&&(
                <>
                  {_bcToken
                    ?<span style={{background:"#2563eb22",color:"#5b9aff",borderRadius:10,padding:"3px 10px",fontSize:11,fontWeight:700}}>BC Connected</span>
                    :<button disabled={bcConnecting} onClick={async()=>{
                      setBcConnecting(true);setBcError("");
                      try{
                        await acquireBcToken();
                        if(_bcToken){setBcError("");}else{setBcError("BC login failed — no token received");}
                      }catch(e){setBcError("BC error: "+(e.message||e));}
                      setBcConnecting(false);onUpdate({...panel});
                    }} style={btn(C.border,C.muted,{fontSize:11,padding:"3px 10px",borderRadius:10,opacity:bcConnecting?0.5:1})}>
                      {bcConnecting?"Connecting…":"Connect BC"}
                    </button>
                  }
                  {bcError&&<span style={{fontSize:11,color:C.red}}>{bcError}</span>}
                  {_apiKey&&<button onClick={runPricingOnPanel} disabled={aiPricing}
                    style={btn(C.accentDim,C.accent,{fontSize:12,padding:"4px 12px",opacity:aiPricing?0.5:1,border:`1px solid ${C.accent}55`})}>
                    {aiPricing?"Pricing…":"💲 Get Prices (BC + AI)"}
                  </button>}
                </>
              )}
            </div>
            {pricingProgress&&(
              <div style={{marginBottom:10}}>
                <div style={{background:C.border,borderRadius:4,height:5,overflow:"hidden",marginBottom:5}}>
                  <div style={{width:`${pricingProgress.pct}%`,height:"100%",background:C.accent,borderRadius:4,transition:"width 0.3s"}}/>
                </div>
                <div style={{fontSize:12,color:C.sub}}>{pricingProgress.msg}</div>
              </div>
            )}
            <div style={{display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-start"}}>
              {/* LEFT: Labor breakdown */}
              <div style={{background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",minWidth:280}}>
                {(()=>{
                  const laborAccepted=panel.laborData?.accepted||{};
                  const acceptedCount=laborEst.lines.filter(l=>laborAccepted[l.category]).length;
                  const allAccepted=laborEst.lines.length>0&&acceptedCount===laborEst.lines.length;
                  return <>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.5}}>LABOR</div>
                  <span style={{background:laborEst.isLegacy?C.yellowDim:laborEst.hasLayoutData?C.greenDim:C.accentDim,color:laborEst.isLegacy?C.yellow:laborEst.hasLayoutData?C.green:C.accent,borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>
                    {laborEst.isOverride?"Manual Override":laborEst.isLegacy?"Legacy":laborEst.hasLayoutData?"Auto (schematic + layout)":"Schematic only"}
                  </span>
                  {allAccepted&&<span style={{background:C.greenDim,color:C.green,borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>All Accepted</span>}
                </div>
                {laborEst.lines.length>0&&(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginBottom:6}}>
                    <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
                      <th style={{textAlign:"center",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12,width:24}}>&#10003;</th>
                      <th style={{textAlign:"left",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Category</th>
                      <th style={{textAlign:"right",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Qty</th>
                      <th style={{textAlign:"right",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Hours</th>
                      <th style={{textAlign:"right",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Cost</th>
                    </tr></thead>
                    <tbody>
                      {laborEst.lines.map((l,i)=>{
                        const isAccepted=!!laborAccepted[l.category];
                        return(
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:isAccepted?"#0a1a0a":"transparent"}}>
                          <td style={{padding:"3px 4px",textAlign:"center"}}>
                            <input type="checkbox" checked={isAccepted} disabled={readOnly}
                              onChange={e=>saveLaborAccepted(l.category,e.target.checked)}
                              style={{accentColor:C.green,cursor:readOnly?"default":"pointer",margin:0}}/>
                          </td>
                          <td style={{padding:"3px 4px",color:isAccepted?C.green:C.sub,whiteSpace:"nowrap"}}>{l.category}</td>
                          <td style={{padding:"3px 4px",textAlign:"right",whiteSpace:"nowrap"}}>
                            {l.field&&!readOnly?(
                              <input type="text" inputMode="decimal"
                                defaultValue={l.qty}
                                key={l.field+"-"+(l.qty)}
                                onBlur={e=>{
                                  const v=parseFloat(e.target.value);
                                  if(!isNaN(v)&&v!==l.qty)saveLaborOverride(l.field,Math.max(0,v));
                                }}
                                onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
                                style={{background:"transparent",border:"1px solid #888",borderRadius:4,color:C.text,padding:"1px 4px",fontSize:13,width:48,textAlign:"right"}}/>
                            ):(
                              <span style={{color:C.text}}>{l.qty}</span>
                            )}
                            {" "}<span style={{color:C.muted,fontSize:12}}>{l.unit}</span>
                          </td>
                          <td style={{padding:"3px 4px",textAlign:"right",color:C.muted,fontSize:12}}>{l.hours.toFixed(1)}</td>
                          <td style={{padding:"3px 4px",textAlign:"right",color:C.text,fontVariantNumeric:"tabular-nums"}}>{fmt(l.cost)}</td>
                        </tr>);
                      })}
                      <tr style={{borderTop:`1px solid ${C.border}`}}>
                        <td style={{padding:"3px 4px",textAlign:"center",fontSize:11,color:C.muted}}>{acceptedCount}/{laborEst.lines.length}</td>
                        <td style={{padding:"3px 4px",fontWeight:700,color:C.text}}>TOTAL</td>
                        <td></td>
                        <td style={{padding:"3px 4px",textAlign:"right",fontWeight:700,color:C.text}}>{laborEst.totalHours.toFixed(1)}</td>
                        <td style={{padding:"3px 4px",textAlign:"right",fontWeight:700,color:C.accent,fontVariantNumeric:"tabular-nums"}}>{fmt(laborEst.totalCost)}</td>
                      </tr>
                    </tbody>
                  </table>
                )}
                </>;})()}
                {!laborEst.isOverride&&laborEst.lines.length>0&&(()=>{
                  const GROUPS=[
                    {label:"CUT",   color:"#f97316", cats:["Panel Holes","Side Devices","HVAC/Fans"]},
                    {label:"LAYOUT",color:"#a78bfa", cats:["Device Mounting","Duct & DIN Rail","Labels"]},
                    {label:"WIRE",  color:"#38bdf8", cats:["Wire Time","Door Wiring"]},
                  ];
                  return(
                    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4,marginBottom:6}}>
                      <div style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Labor Groups</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {GROUPS.map(({label,color,cats})=>{
                          const hrs=laborEst.lines.filter(l=>cats.includes(l.category)).reduce((s,l)=>s+l.hours,0);
                          return(
                            <div key={label} style={{flex:1,minWidth:70,background:"#0a0a12",border:`1px solid ${color}44`,borderRadius:8,padding:"6px 10px",textAlign:"center"}}>
                              <div style={{fontSize:11,fontWeight:700,color,letterSpacing:0.8,marginBottom:2}}>{label}</div>
                              <div style={{fontSize:16,fontWeight:800,color:C.text,fontVariantNumeric:"tabular-nums"}}>{Math.ceil(hrs)}</div>
                              <div style={{fontSize:10,color:C.muted}}>hrs</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
                {!laborEst.isOverride&&!laborEst.isLegacy&&laborEst.inputs&&(
                  <div style={{borderTop:`1px solid ${C.border}`,paddingTop:6,marginTop:4,marginBottom:6}}>
                    <div style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Detected Inputs</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 12px",fontSize:12}}>
                      {[
                        ["Wire terminations",laborEst.inputs.wireTerminations||laborEst.inputs.wireCount||0],
                        ["Total wires",laborEst.inputs.wireCount||0],
                        ["Door-mounted devices",laborEst.inputs.doorDevices||0],
                        ["Total devices",laborEst.inputs.allDevices||0],
                        ["Panel holes",laborEst.inputs.panelHoles||0],
                        ["Duct & DIN rail",`${laborEst.inputs.ductDinFeet||0} ft`],
                        ["Side devices (small)",laborEst.inputs.sideTopSmallCount||0],
                        ["Side devices (AC/Fan)",laborEst.inputs.sideTopLargeCount||0],
                        ["Label hours",laborEst.inputs.labelHours||0],
                        ["PM sessions",laborEst.inputs.pmUnits||0],
                      ].map(([label,val])=>(
                        <div key={label} style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{color:C.muted}}>{label}</span>
                          <span style={{color:C.text,fontVariantNumeric:"tabular-nums"}}>{val}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:C.muted}}>$/hr</span>
                  <input type="number" min="0" step="1" readOnly={readOnly} value={laborRate}
                    onChange={e=>savePricing({laborRate:Math.max(0,+e.target.value||0)})}
                    style={{...inp({padding:"3px 5px",fontSize:13,width:65,textAlign:"right",border:"1px solid #888"})}}/>
                  <span style={{fontSize:12,color:C.muted,marginLeft:6}}>Override hrs</span>
                  <input type="number" min="0" step="0.5" readOnly={readOnly} value={pr.laborHoursOverride??""} placeholder="auto"
                    onChange={e=>savePricing({laborHoursOverride:e.target.value===""?null:Math.max(0,+e.target.value||0)})}
                    style={{...inp({padding:"3px 5px",fontSize:13,width:65,textAlign:"right",border:"1px solid #888"})}}/>
                </div>
              </div>
              {/* RIGHT: Price breakdown */}
              <div style={{flex:1,minWidth:280}}>
                {[
                  ["Materials",fmt(totalCost),C.green,null,null],
                  ["BOM Contingency",null,C.sub,contingencyBOM,"contingencyBOM"],
                  ["Consumables",null,C.sub,contingencyConsumables,"contingencyConsumables"],
                  ["Labor",fmt(laborCost),C.sub,null,null],
                  ["Total",fmt(grandTotal),C.text,null,null],
                ].map(([label,val,color,numVal,key])=>(
                  <div key={label} style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:20,marginBottom:6,fontSize:13}}>
                    <span style={{color:C.muted,textAlign:"right"}}>{label}</span>
                    {key?(
                      <div style={{display:"flex",alignItems:"center",gap:2,minWidth:90,justifyContent:"flex-end"}}>
                        <span style={{color:C.muted,fontSize:12}}>$</span>
                        <input type="number" min="0" step="50" readOnly={readOnly}
                          value={numVal}
                          onChange={e=>savePricing({[key]:Math.max(0,+e.target.value||0)})}
                          style={{...inp({padding:"3px 5px",fontSize:13,borderColor:"transparent",background:"transparent",borderRadius:4,width:80,textAlign:"right"}),color}}
                          onFocus={e=>e.target.style.borderColor=C.accent}
                          onBlur={e=>e.target.style.borderColor="transparent"}/>
                      </div>
                    ):(
                      <span style={{color,fontWeight:label==="Total"?700:400,fontVariantNumeric:"tabular-nums",minWidth:90,textAlign:"right"}}>{val}</span>
                    )}
                  </div>
                ))}
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,display:"flex",justifyContent:"flex-end",alignItems:"center",gap:20,fontSize:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:C.sub}}>Margin</span>
                    <input type="number" min="0" step="1" value={markup} readOnly={readOnly}
                      onChange={e=>savePricing({markup:Math.max(0,+e.target.value||0)})}
                      style={{...inp({padding:"3px 6px",fontSize:13,width:60,textAlign:"right"})}}/>
                    <span style={{color:C.muted,fontSize:13}}>%</span>
                  </div>
                  <span style={{fontWeight:800,color:C.accent,fontSize:16,fontVariantNumeric:"tabular-nums",minWidth:90,textAlign:"right"}}>{fmt(sellPrice)}</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",marginTop:10,gap:8}}>
                  <ConfidenceBar panel={panel} readOnly={readOnly} onUpdate={onUpdate} onSaveImmediate={onSaveImmediate}/>
                  <button onClick={onViewQuote} style={btn(C.greenDim,C.green,{fontSize:13,padding:"6px 18px"})}>📊 View Quote</button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* AI Feedback & Correction */}
      {(panel.bom||[]).length>0&&!readOnly&&_apiKey&&(
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{fontSize:12,color:C.accent,fontWeight:700,letterSpacing:0.7}}>🤖 AI CORRECTION</div>
            {(panel.extractionFeedbackLog||[]).length>0&&(
              <span style={{fontSize:11,color:C.muted}}>{(panel.extractionFeedbackLog).length} correction{(panel.extractionFeedbackLog).length!==1?"s":""} logged</span>
            )}
          </div>
          <div style={{fontSize:12,color:C.sub,marginBottom:8,lineHeight:1.6}}>
            Describe what's wrong or missing. The AI will re-extract the BOM using your instructions, and your feedback is saved to improve future extractions.
          </div>
          <textarea
            ref={feedbackRef}
            value={aiFeedback}
            onChange={e=>setAiFeedback(e.target.value)}
            placeholder={"BOM corrections:\ne.g. Row 23 is missing — 3 items: KXTBRHEBFP, OXP10X225 and OH865L10B, all ABB qty 1.\ne.g. Row 19 quantity should be 2 not 1.\ne.g. The part number for the transformer is PH500MQMJ.\n\nLabor corrections (applied immediately):\ne.g. The wire count is not correct, base labor off 50 wires, not 25.\ne.g. Use 12 labor hours.\ne.g. Labor rate is $55/hr."}
            rows={4}
            style={{...inp(),width:"100%",resize:"vertical",lineHeight:1.6,fontSize:13,marginBottom:10}}

// ── PANEL LIST VIEW ──
function PanelListView({project,uid,readOnly,onBack,onViewQuote,onUpdate}){
  const [editingName,setEditingName]=useState(false);
  const [draftName,setDraftName]=useState(project.name||"");
  const [validating,setValidating]=useState(false);
  const [validateMsg,setValidateMsg]=useState("");

  function addPanel(){
    const n=(project.panels||[]).length+1;
    const newPanel={id:'panel-'+Date.now(),name:`Panel ${n}`,pages:[],bom:[],validation:null,pricing:null,budgetaryQuote:null,status:'draft'};
    onUpdate({...project,panels:[...(project.panels||[]),newPanel]});
  }
  function deletePanel(id){
    if(!window.confirm("Delete this panel and all its data?"))return;
    onUpdate({...project,panels:(project.panels||[]).filter(p=>p.id!==id)});
  }
  async function saveImmediatePanel(panelId,updatedPanel){
    const newPanels=(project.panels||[]).map(p=>p.id===panelId?updatedPanel:p);
    const updatedProject={...project,panels:newPanels};
    await saveProject(uid,updatedProject);
    onUpdate(updatedProject);
  }
  async function saveName(){
    if(!draftName.trim())return;
    const updated={...project,name:draftName.trim()};
    onUpdate(updated);
    await saveProject(uid,updated);
    setEditingName(false);
    if(_bcToken&&project.bcProjectId) bcUpdateProject(project.bcProjectId,draftName.trim());
  }
  async function validateAll(){
    if(!_apiKey)return;
    setValidating(true);
    let panels=[...(project.panels||[])];
    for(let i=0;i<panels.length;i++){
      const p=panels[i];
      const hasSchOrLayout=(p.pages||[]).some(pg=>(getPageTypes(pg).includes("schematic")||getPageTypes(pg).includes("layout")||getPageTypes(pg).includes("backpanel")||getPageTypes(pg).includes("enclosure"))&&(pg.dataUrl||pg.storageUrl));
      if(!hasSchOrLayout)continue;
      setValidateMsg(`Validating ${p.name||"Panel "+(i+1)}…`);
      const result=await runPanelValidation(p);
      if(result.validation||result.laborData){const bom=appendDefaultBomItems(p.bom||[]);panels[i]={...p,bom,...(result.validation?{validation:result.validation}:{}),...(result.laborData?{laborData:result.laborData}:{}),status:"validated"};}
    }
    const updatedProject={...project,panels};
    onUpdate(updatedProject);
    await saveProject(uid,updatedProject);
    setValidating(false);
    setValidateMsg("");
  }
  const panels=project.panels||[];
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"6px 24px",display:"flex",alignItems:"center",gap:12,minHeight:40,flexShrink:0}}>
        <button onClick={onBack} style={{background:"#383850",border:"1.5px solid #7a7a9a",color:C.sub,cursor:"pointer",fontSize:19,fontWeight:600,display:"flex",alignItems:"center",gap:8,padding:"6px 16px",borderRadius:8,whiteSpace:"nowrap"}}>← Back to Projects</button>
        {readOnly&&<><div style={{width:1,height:16,background:C.border}}/><span style={{background:C.border,color:C.muted,borderRadius:20,padding:"2px 10px",fontSize:13,fontWeight:700}}>VIEW ONLY</span></>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
            <div>
              {editingName?(
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <input value={draftName} onChange={e=>setDraftName(e.target.value)} autoFocus
                    style={{...inp(),fontSize:18,fontWeight:700,padding:"4px 10px",minWidth:240}}
                    onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape")setEditingName(false);}}/>
                  <button onClick={saveName} style={btn(C.accent,"#fff",{fontSize:13,padding:"4px 12px"})}>✓</button>
                  <button onClick={()=>setEditingName(false)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap",marginBottom:4}}>
                  {project.bcProjectNumber&&<span style={{fontSize:26,fontWeight:800,color:C.accent}}>{project.bcProjectNumber}</span>}
                  {project.bcProjectNumber&&(project.bcCustomerName||project.name)&&<span style={{fontSize:22,color:C.border,fontWeight:400}}>—</span>}
                  {project.bcCustomerName&&<span style={{fontSize:20,fontWeight:700,color:C.sub}}>{project.bcCustomerName}</span>}
                  {project.bcCustomerName&&project.name&&<span style={{fontSize:22,color:C.border,fontWeight:400}}>—</span>}
                  <span style={{fontSize:20,fontWeight:700,color:C.text}}>{project.name}</span>
                  {!readOnly&&<button onClick={()=>{setDraftName(project.name);setEditingName(true);}} title="Edit project name" style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14,padding:"0 4px",alignSelf:"center"}}>✏️</button>}
                </div>
              )}
              <div style={{fontSize:13,color:C.muted}}>{panels.length} panel{panels.length!==1?"s":""}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={!readOnly?addPanel:undefined} disabled={readOnly} style={btn(C.accent,"#fff",{fontSize:13,opacity:readOnly?0.4:1})}>+ Add Panel</button>
              {panels.length>0&&<button onClick={onViewQuote} style={btn(C.greenDim,C.green,{fontSize:13})}>📊 View Quote</button>}
            </div>
          </div>
          {panels.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
              <div style={{fontSize:52,marginBottom:16,opacity:0.3}}>🗂️</div>
              <div style={{fontSize:18,fontWeight:700,color:C.sub,marginBottom:8}}>No panels yet</div>
              <div style={{fontSize:13,marginBottom:24,lineHeight:1.7}}>Add a panel to start uploading drawings and quoting this job.</div>
              {!readOnly&&<button onClick={addPanel} style={btn(C.accent,"#fff")}>+ Add First Panel</button>}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              {panels.map((panel,idx)=>(
                <PanelCard
                  key={panel.id}
                  panel={panel}
                  idx={idx}
                  uid={uid}
                  projectId={project.id}
                  readOnly={readOnly}
                  onDelete={()=>deletePanel(panel.id)}
                  onUpdate={updatedPanel=>{
                    const newPanels=panels.map(p=>p.id===panel.id?updatedPanel:p);
                    onUpdate({...project,panels:newPanels});
                  }}
                  onSaveImmediate={updatedPanel=>saveImmediatePanel(panel.id,updatedPanel)}
                  onViewQuote={onViewQuote}
                />
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// ── QUOTE VIEW (aggregates all panels) ──
function QuoteView({project,uid,onBack,onUpdate}){
  const panels=project.panels||[];
  const allBom=mergeBoms(panels.map(p=>p.bom||[]));
  const totalWireCount=panels.reduce((s,p)=>s+(p.validation?.wireCount||0),0);
  // Compute labor for each panel individually (preserves overrides), then sum
  const perPanelLabor=panels.map(p=>computeLaborEstimate(p));
  const totalLaborHours=perPanelLabor.reduce((s,l)=>s+l.totalHours,0);
  const totalLaborCost=perPanelLabor.reduce((s,l)=>s+l.totalCost,0);
  const hasLayoutData=perPanelLabor.some(l=>l.hasLayoutData);
  // Merge labor lines by category
  const laborLineMap={};
  perPanelLabor.forEach(l=>l.lines.forEach(line=>{
    if(laborLineMap[line.category]){laborLineMap[line.category].qty+=line.qty;laborLineMap[line.category].hours+=line.hours;laborLineMap[line.category].cost+=line.cost;}
    else{laborLineMap[line.category]={...line};}
  }));
  const aggregatedLaborLines=Object.values(laborLineMap);
  // Use first panel's pricing as source of truth (that's where user edits markup/contingency)
  const firstPanelPricing=panels.find(p=>p.pricing)?.pricing||{};
  const derivedPricing={...firstPanelPricing};
  // Build a fake laborData so computeLaborEstimate produces matching results for QuoteTab
  // But actually override QuoteTab's computation — pass pre-computed values via pricing
  const aggregated={
    ...project,
    bom:allBom,
    validation:{wireCount:totalWireCount},
    laborData:null, // null triggers legacy path, but we override via _quoteLabor
    pricing:derivedPricing,
    pages:panels.flatMap(p=>p.pages||[]),
    _quoteLabor:{lines:aggregatedLaborLines,totalHours:totalLaborHours,totalCost:totalLaborCost,hasLayoutData,isLegacy:false,isOverride:false},
  };
  function handleQuoteUpdate(upd){
    // Sync pricing back to all panels so panel cards stay consistent with quote
    const updatedPanels=(project.panels||[]).map(p=>({...p,pricing:{...(p.pricing||{}),...(upd.pricing||{})}}));
    onUpdate({...project,panels:updatedPanels,quote:upd.quote,pricing:upd.pricing,budgetaryQuote:upd.budgetaryQuote});
  }
  const fmtMoney=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"6px 24px",display:"flex",alignItems:"center",gap:12,minHeight:40,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,padding:"0",whiteSpace:"nowrap"}}>← Panels</button>
        <div style={{width:1,height:16,background:C.border}}/>
        <div style={{fontSize:15,fontWeight:700,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{project.name}</div>
        <span style={{background:C.greenDim,color:C.green,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>COMBINED QUOTE</span>
        <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{allBom.length} items · {totalWireCount} wires</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          {panels.length>0&&(
            <div style={{...card({padding:"12px 16px"}),marginBottom:20}} className="no-print">
              <div style={{fontSize:12,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Panel Breakdown</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                {panels.map(p=>{
                  const mats=(p.bom||[]).reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
                  return(
                    <div key={p.id} style={{...card({padding:"10px 14px"}),minWidth:170}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{p.name}</div>
                      <div style={{fontSize:12,color:C.muted}}>{(p.bom||[]).length} items · {(p.pages||[]).length} pages</div>
                      {p.validation?.wireCount>0&&<div style={{fontSize:12,color:C.muted}}>⚡ {p.validation.wireCount} wires</div>}
                      {mats>0&&<div style={{fontSize:12,color:C.green,marginTop:4}}>Materials: {fmtMoney(mats)}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <QuoteTab project={aggregated} onUpdate={handleQuoteUpdate}/>
        </div>
      </div>
    </div>
  );
}

// ── PROJECT VIEW ──
function ProjectView({project:init,uid,onBack,onChange}){
  const [project,setProject]=useState(()=>migrateProject(init));
  const projectRef=useRef(migrateProject(init));
  const [view,setView]=useState("panels"); // "panels"|"quote"
  const saveTimer=useRef(null);
  const readOnly=isReadOnly();
  const didMigrate=useRef(!init.panels);

  // Keep ref in sync with state for use in callbacks
  useEffect(()=>{projectRef.current=project;},[project]);

  // Save migrated project immediately on first open
  useEffect(()=>{
    if(didMigrate.current){
      didMigrate.current=false;
      saveProject(uid,migrateProject(init)).catch(()=>{});
    }
  },[]);

  function update(p){
    setProject(p);projectRef.current=p;onChange(p);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>saveProject(uid,p),1000);
  }

  if(view==="quote"){
    return(
      <QuoteView
        project={project}
        uid={uid}
        onBack={()=>setView("panels")}
        onUpdate={update}
      />
    );
  }

  return(
    <PanelListView
      project={project}
      uid={uid}
      readOnly={readOnly}
      onBack={onBack}
      onViewQuote={()=>setView("quote")}
      onUpdate={update}
    />
  );
}

// ── SETTINGS MODAL ──
function SettingsModal({uid,onClose}){
  const [key,setKey]=useState("");
  const [loading,setLoading]=useState(true);
  const [saved,setSaved]=useState(false);

  const [curPass,setCurPass]=useState("");
  const [newPass,setNewPass]=useState("");
  const [confPass,setConfPass]=useState("");
  const [pwLoading,setPwLoading]=useState(false);
  const [pwErr,setPwErr]=useState("");
  const [pwOk,setPwOk]=useState(false);
  const [resetSent,setResetSent]=useState(false);

  useEffect(()=>{
    fbDb.doc(`users/${uid}/config/api`).get()
      .then(d=>{if(d.exists)setKey(d.data().key||"");})
      .finally(()=>setLoading(false));
  },[uid]);

  async function save(){
    await fbDb.doc(`users/${uid}/config/api`).set({key});
    _apiKey=key;setSaved(true);setTimeout(()=>setSaved(false),2000);
  }

  async function sendReset(){
    setPwErr("");setPwLoading(true);
    try{
      await fbAuth.sendPasswordResetEmail(fbAuth.currentUser.email);
      setResetSent(true);
    }catch(ex){setPwErr(ex.message);}
    setPwLoading(false);
  }

  async function changePassword(e){
    e.preventDefault();setPwErr("");
    if(newPass.length<6){setPwErr("New password must be at least 6 characters.");return;}
    if(newPass!==confPass){setPwErr("Passwords do not match.");return;}
    setPwLoading(true);
    try{
      const user=fbAuth.currentUser;
      const cred=firebase.auth.EmailAuthProvider.credential(user.email,curPass);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPass);
      setPwOk(true);setCurPass("");setNewPass("");setConfPass("");
      setTimeout(()=>setPwOk(false),3000);
    }catch(ex){
      if(ex.code==="auth/wrong-password"||ex.code==="auth/invalid-credential")setPwErr("Current password is incorrect.");
      else if(ex.code==="auth/operation-not-allowed")setPwErr("Password sign-in is not enabled for this account.");
      else setPwErr(ex.message);
    }
    setPwLoading(false);
  }

  const isEmailProvider=fbAuth.currentUser?.providerData?.some(p=>p.providerId==="password");

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>⚙ Settings</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Matrix ARC configuration</div>

        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Anthropic API Key</label>
          {loading
            ?<div style={{color:C.muted,fontSize:13,padding:"9px 0"}}>Loading…</div>
            :<input value={key} onChange={e=>setKey(e.target.value)} type="password" placeholder="sk-ant-…" style={inp()}/>
          }
          <div style={{fontSize:11,color:C.muted,marginTop:6}}>Stored in your Firebase project. Shared across all team members.</div>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:24}}>
          <button onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Close</button>
          <button onClick={save} disabled={loading||!key.trim()} style={btn(saved?C.green:C.accent,"#fff",{flex:2,opacity:loading||!key.trim()?0.5:1})}>
            {saved?"✓ Saved":"Save Key"}
          </button>
        </div>

        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Change Password</label>
          {!isEmailProvider?(
            <div style={{fontSize:13,color:C.muted,padding:"10px 12px",background:C.surface,borderRadius:8}}>
              Your account uses Google Sign-In and does not have a password. Use "Forgot password?" on the login screen to set one.
            </div>
          ):(
            <form onSubmit={changePassword}>
              <div style={{marginBottom:4}}><input value={curPass} onChange={e=>setCurPass(e.target.value)} type="password" placeholder="Current password" style={inp()} required/></div>
              <div style={{textAlign:"right",marginBottom:10}}>
                {resetSent
                  ?<span style={{fontSize:12,color:C.green}}>✓ Reset link sent to {fbAuth.currentUser?.email}</span>
                  :<button type="button" onClick={sendReset} disabled={pwLoading} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:0}}>Forgot password?</button>
                }
              </div>
              <div style={{marginBottom:8}}><input value={newPass} onChange={e=>setNewPass(e.target.value)} type="password" placeholder="New password (min 6 chars)" style={inp()} required/></div>
              <div style={{marginBottom:10}}><input value={confPass} onChange={e=>setConfPass(e.target.value)} type="password" placeholder="Confirm new password" style={inp()} required/></div>
              {pwErr&&<div style={{color:C.red,fontSize:12,marginBottom:10,lineHeight:1.5}}>{pwErr}</div>}
              {pwOk&&<div style={{color:C.green,fontSize:12,marginBottom:10}}>✓ Password updated successfully.</div>}
              <button type="submit" disabled={pwLoading} style={btn(C.accent,"#fff",{width:"100%",opacity:pwLoading?0.6:1})}>
                {pwLoading?"Updating…":"Update Password"}
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${deleteBC?C.red:C.muted}`,background:deleteBC?C.red:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {deleteBC&&<span style={{color:"#fff",fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>}
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:deleteBC?C.red:C.sub}}>Also delete from Business Central</div>
              <div style={{fontSize:11,color:C.muted}}>Project {bcProjectNumber} will be permanently removed from BC</div>
            </div>
          </div>
        )}
        {bcErr&&<div style={{fontSize:12,color:C.red,background:C.redDim,borderRadius:8,padding:"8px 12px",marginBottom:12}}>{bcErr}</div>}
        <div style={{fontSize:12,color:C.muted,marginBottom:20}}>This action cannot be undone.</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onCancel} disabled={deleting} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
          <button onClick={handleConfirm} disabled={deleting} style={btn(C.red,"#fff",{flex:1,fontWeight:700,opacity:deleting?0.6:1})}>
            {deleting?"Deleting…":"Delete"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── NEW PROJECT MODAL ──
function NewProjectModal({uid,onCreated,onClose}){
  const [name,setName]=useState("");
  const [panelCount,setPanelCount]=useState(1);
  const [loading,setLoading]=useState(false);
  const [bcStatus,setBcStatus]=useState(null);
  const [createErr,setCreateErr]=useState("");
  const [customerQuery,setCustomerQuery]=useState("");
  const [allCustomers,setAllCustomers]=useState([]);
  const [customerResults,setCustomerResults]=useState([]);
  const [customerSearching,setCustomerSearching]=useState(false);
  const [selectedCustomer,setSelectedCustomer]=useState(null);
  const [showDropdown,setShowDropdown]=useState(false);
  const [bcConnected,setBcConnected]=useState(!!_bcToken);
  const [showNewCust,setShowNewCust]=useState(false);
  const [newCustName,setNewCustName]=useState("");
  const [newCustPhone,setNewCustPhone]=useState("");
  const [newCustEmail,setNewCustEmail]=useState("");
  const [creatingCust,setCreatingCust]=useState(false);
  const [newCustErr,setNewCustErr]=useState("");

  useEffect(()=>{
    if(_bcToken){loadCustomers();return;}
    acquireBcToken(false).then(t=>{
      if(t){setBcConnected(true);loadCustomers();}
    }).catch(()=>{});
  },[]);

  async function loadCustomers(){
    setCustomerSearching(true);
    const all=await bcLoadAllCustomers();
    setAllCustomers(all);
    setCustomerResults(all.slice(0,25));
    setCustomerSearching(false);
  }

  async function connectBC(){
    setCustomerSearching(true);
    const t=await acquireBcToken(true);
    if(t){setBcConnected(true);await loadCustomers();}
    setCustomerSearching(false);
  }

  function handleCustomerInput(val){
    setCustomerQuery(val);
    setSelectedCustomer(null);
    setShowDropdown(true);
    setCustomerResults(bcFilterCustomers(allCustomers,val));
  }

  function selectCustomer(c){
    setSelectedCustomer(c);
    setCustomerQuery(c.displayName);
    setShowDropdown(false);
  }

  async function createNewCustomer(){
    if(!newCustName.trim())return;
    setCreatingCust(true);setNewCustErr("");
    try{
      const c=await bcCreateCustomer(newCustName.trim(),newCustPhone.trim(),newCustEmail.trim());
      selectCustomer(c);
      const all=await bcLoadAllCustomers();
      setAllCustomers(all);
      setShowNewCust(false);setNewCustName("");setNewCustPhone("");setNewCustEmail("");
    }catch(err){setNewCustErr(err.message||"Failed to create customer in BC");}
    setCreatingCust(false);
  }

  async function create(e){
    e.preventDefault();
    if(!name.trim()||!selectedCustomer)return;
    setLoading(true);setCreateErr("");
    const trimmed=name.trim();
    if(!_bcToken){setBcStatus("connecting");await acquireBcToken(true);}
    if(!_bcToken){setCreateErr("Could not connect to Business Central. Please try again.");setLoading(false);return;}
    try{
      setBcStatus("creating");
      const bc=await bcCreateProject(trimmed,selectedCustomer.number);
      setBcStatus("ok");
      const p=await saveProject(uid,{
        name:trimmed,
        bcProjectId:bc.id,
        bcProjectNumber:bc.number,
        bcCustomerNumber:bc.customerNumber,
        bcCustomerName:bc.customerName||selectedCustomer.displayName,
        status:"draft",
        panels:Array.from({length:Math.max(1,panelCount)},(_,i)=>({id:`panel-${i+1}`,name:`Panel ${i+1}`,pages:[],bom:[],validation:null,pricing:null,budgetaryQuote:null,status:'draft'})),
        createdAt:Date.now(),updatedAt:Date.now()
      });
      onCreated(p);
    }catch(e){
      setBcStatus(null);
      setCreateErr(e.message||"Failed to create project in Business Central.");
      setLoading(false);
    }
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>New Project</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Name this control panel quote</div>
        <form onSubmit={create}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Project Name</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Conveyor Control Panel" style={{...inp(),marginBottom:16}} autoFocus/>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Number of Panels</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button type="button" onClick={()=>setPanelCount(c=>Math.max(1,c-1))} style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:C.border,color:C.text,fontSize:18,cursor:"pointer",lineHeight:1}}>−</button>
            <span style={{fontSize:20,fontWeight:700,minWidth:32,textAlign:"center"}}>{panelCount}</span>
            <button type="button" onClick={()=>setPanelCount(c=>Math.min(20,c+1))} style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:C.border,color:C.text,fontSize:18,cursor:"pointer",lineHeight:1}}>+</button>
            <span style={{fontSize:12,color:C.muted}}>{panelCount===1?"1 panel will be created":`${panelCount} panels will be created`}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Customer <span style={{color:C.border,fontWeight:400,textTransform:"none",letterSpacing:0}}>(from Business Central)</span></div>
            {bcConnected&&!showNewCust&&<button type="button" onClick={()=>setShowNewCust(true)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:12,padding:0,fontWeight:600}}>+ New Customer</button>}
          </div>
          {showNewCust&&(
            <div style={{background:C.accentDim,border:`1px solid ${C.accent}44`,borderRadius:8,padding:14,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>Create New BC Customer</div>
              <input value={newCustName} onChange={e=>setNewCustName(e.target.value)} placeholder="Customer Name *" style={{...inp(),marginBottom:8}}/>
              <input value={newCustPhone} onChange={e=>setNewCustPhone(e.target.value)} placeholder="Phone (optional)" style={{...inp(),marginBottom:8}}/>
              <input value={newCustEmail} onChange={e=>setNewCustEmail(e.target.value)} placeholder="Email (optional)" style={{...inp(),marginBottom:10}}/>
              {newCustErr&&<div style={{fontSize:11,color:C.red,marginBottom:8}}>{newCustErr}</div>}
              <div style={{display:"flex",gap:8}}>
                <button type="button" onClick={()=>{setShowNewCust(false);setNewCustName("");setNewCustPhone("");setNewCustEmail("");setNewCustErr("");}} style={btn(C.border,C.sub,{flex:1,fontSize:12})}>Cancel</button>
                <button type="button" onClick={createNewCustomer} disabled={!newCustName.trim()||creatingCust} style={btn(C.accent,"#fff",{flex:2,fontSize:12,opacity:!newCustName.trim()||creatingCust?0.5:1})}>{creatingCust?"Creating in BC…":"Create in BC"}</button>
              </div>
            </div>
          )}
          {!bcConnected?(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,background:C.border,borderRadius:8,padding:"10px 14px"}}>
              <span style={{fontSize:12,color:C.muted,flex:1}}>Connect to BC to pick a customer</span>
              <button type="button" onClick={connectBC} disabled={customerSearching}
                style={btn(C.accent,"#fff",{fontSize:12,padding:"6px 14px",opacity:customerSearching?0.5:1})}>

            <div style={{position:"relative",marginBottom:16}}>
              <input
                value={customerQuery}

// ── DASHBOARD ──
function Dashboard({uid,projects,loading,onOpen,onNew,onDelete,onAccept}){
  const [groupBy,setGroupBy]=useState("all");

  function groupProjects(list){
    if(groupBy==="customer"){
      const map={};
      list.forEach(p=>{
        const key=p.bcCustomerName||"No Customer";
        if(!map[key])map[key]=[];
        map[key].push(p);
      });
      return Object.keys(map).sort((a,b)=>a==="No Customer"?1:b==="No Customer"?-1:a.localeCompare(b)).map(k=>({label:k,items:map[k]}));
    }
    if(groupBy==="date"){
      const map={};
      const maxTs={};
      list.forEach(p=>{
        const d=p.createdAt||p.updatedAt||0;
        const key=d?new Date(d).toLocaleDateString("en-US",{month:"long",year:"numeric"}):"Unknown Date";
        if(!map[key])map[key]=[];
        map[key].push(p);
        if(d>=(maxTs[key]||0))maxTs[key]=d;
      });
      return Object.keys(map).sort((a,b)=>{
        if(a==="Unknown Date")return 1;
        if(b==="Unknown Date")return -1;
        return (maxTs[b]||0)-(maxTs[a]||0);
      }).map(k=>({label:k,items:map[k]}));
    }
    if(groupBy==="projectnum"){
      const sorted=[...list].sort((a,b)=>{
        const an=a.bcProjectNumber||"";
        const bn=b.bcProjectNumber||"";
        if(!an&&!bn)return 0;
        if(!an)return 1;
        if(!bn)return -1;
        return bn.localeCompare(an,undefined,{numeric:true});
      });
      return [{label:null,items:sorted}];
    }
    return [{label:null,items:list}];
  }

  const filterBtn=(label,val)=>(
    <button key={val} onClick={()=>setGroupBy(val)} style={{background:groupBy===val?C.accent:"#383850",color:groupBy===val?"#fff":C.muted,border:groupBy===val?`1.5px solid ${C.accent}`:"1.5px solid #7a7a9a",borderRadius:8,padding:"8px 20px",fontSize:14,cursor:"pointer",fontWeight:600,transition:"all 0.15s"}}>
      {label}
    </button>
  );

  return(
    <div style={{maxWidth:1400,margin:"0 auto",padding:32}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:26,fontWeight:800,letterSpacing:-0.5}}>Projects</div>
        </div>
        <button onClick={onNew} style={btn(C.accent,"#fff",{display:"flex",alignItems:"center",gap:8,fontSize:14})}>
          <span style={{fontSize:18,lineHeight:1}}>+</span> New Project
        </button>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:24}}>
        {filterBtn("All","all")}
        {filterBtn("By Customer","customer")}
        {filterBtn("By Date","date")}
        {filterBtn("By Project #","projectnum")}
      </div>

      {loading&&(
        <div style={{textAlign:"center",padding:80,color:C.muted}}>
          <div className="spin" style={{fontSize:24,marginBottom:12}}>◌</div>
          <div>Loading projects…</div>
        </div>
      )}

      {(()=>{
        const myProjects=projects.filter(p=>!p.transferred||p.transferredTo!==uid);
        const transferred=projects.filter(p=>p.transferred&&p.transferredTo===uid);
        const groups=groupProjects(myProjects);
        return(<>
          {!loading&&myProjects.length===0&&transferred.length===0&&(
            <div style={{textAlign:"center",padding:80,color:C.muted}}>
              <div style={{fontSize:52,marginBottom:16,opacity:0.2}}>⬡</div>
              <div style={{fontSize:18,fontWeight:700,color:C.sub,marginBottom:8}}>No projects yet</div>
              <div style={{fontSize:13,marginBottom:24,lineHeight:1.7}}>Upload scanned UL508A drawings to extract<br/>BOM data, validate schematics, and generate quotes.</div>
              <button onClick={onNew} style={btn(C.accent,"#fff")}>Create First Project</button>
            </div>
          )}
          {groups.map((g,gi)=>(
            <div key={gi} style={{marginBottom:groups.length>1?32:0}}>
              {g.label&&<div style={{fontSize:groupBy==="customer"?20:12,fontWeight:700,color:groupBy==="customer"?C.text:C.muted,textTransform:groupBy==="customer"?"none":"uppercase",letterSpacing:groupBy==="customer"?-0.3:0.8,marginBottom:12,paddingBottom:groupBy==="customer"?0:6,borderBottom:groupBy==="customer"?"none":`1px solid ${C.border}`}}>{g.label}</div>}
              <div style={{background:groupBy==="customer"?"#1c1c2e":"none",border:groupBy==="customer"?`2px solid #4a5080`:"none",borderRadius:groupBy==="customer"?12:0,padding:groupBy==="customer"?16:0}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:12}}>
                {g.items.map(p=>(
              <div key={p.id} className="fade-in" onClick={()=>onOpen(p)}
                style={{...card({padding:"10px 14px"}),border:"1px solid #4a5080",cursor:"pointer",transition:"border-color 0.15s,transform 0.15s",position:"relative"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent+"99";e.currentTarget.style.transform="translateY(-2px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="#4a5080";e.currentTarget.style.transform="none";}}>
                <button onClick={e=>{e.stopPropagation();onDelete(p.id,p.name,p.bcProjectId,p.bcProjectNumber);}}
                  title="Delete project"
                  style={{position:"absolute",top:8,right:8,background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14,lineHeight:1,padding:"2px 5px",borderRadius:4,transition:"color 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.color=C.red}
                  onMouseLeave={e=>e.currentTarget.style.color=C.muted}>✕</button>
                {p.bcProjectNumber&&<div style={{fontSize:18,fontWeight:800,color:C.accent,marginBottom:4}}>{p.bcProjectNumber}</div>}
