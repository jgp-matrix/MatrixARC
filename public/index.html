// ── QUOTE VIEW (aggregates all panels) ──
function QuoteView({project,uid,onBack,onUpdate}){
  const panels=project.panels||[];
  const allBom=mergeBoms(panels.map(p=>p.bom||[]));
  const totalWireCount=panels.reduce((s,p)=>s+(p.validation?.wireCount||0),0);
  // Compute labor for each panel individually (preserves overrides), then sum
  const perPanelLabor=panels.map(p=>computeLaborEstimate(p));
  const totalLaborHours=perPanelLabor.reduce((s,l)=>s+l.totalHours,0);
  const totalLaborCost=perPanelLabor.reduce((s,l)=>s+l.totalCost,0);
  const hasLayoutData=perPanelLabor.some(l=>l.hasLayoutData);
  // Merge labor lines by category
  const laborLineMap={};
  perPanelLabor.forEach(l=>l.lines.forEach(line=>{
    if(laborLineMap[line.category]){laborLineMap[line.category].qty+=line.qty;laborLineMap[line.category].hours+=line.hours;laborLineMap[line.category].cost+=line.cost;}
    else{laborLineMap[line.category]={...line};}
  }));
  const aggregatedLaborLines=Object.values(laborLineMap);
  // Use first panel's pricing as source of truth (that's where user edits markup/contingency)
  const firstPanelPricing=panels.find(p=>p.pricing)?.pricing||{};
  const derivedPricing={...firstPanelPricing};
  // Build a fake laborData so computeLaborEstimate produces matching results for QuoteTab
  // But actually override QuoteTab's computation — pass pre-computed values via pricing
  const aggregated={
    ...project,
    bom:allBom,
    validation:{wireCount:totalWireCount},
    laborData:null, // null triggers legacy path, but we override via _quoteLabor
    pricing:derivedPricing,
    pages:panels.flatMap(p=>p.pages||[]),
    _quoteLabor:{lines:aggregatedLaborLines,totalHours:totalLaborHours,totalCost:totalLaborCost,hasLayoutData,isLegacy:false,isOverride:false},
  };
  function handleQuoteUpdate(upd){
    // Sync pricing back to all panels so panel cards stay consistent with quote
    const updatedPanels=(project.panels||[]).map(p=>({...p,pricing:{...(p.pricing||{}),...(upd.pricing||{})}}));
    onUpdate({...project,panels:updatedPanels,quote:upd.quote,pricing:upd.pricing,budgetaryQuote:upd.budgetaryQuote});
  }
  const fmtMoney=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"6px 24px",display:"flex",alignItems:"center",gap:12,minHeight:40,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,padding:"0",whiteSpace:"nowrap"}}>← Panels</button>
        <div style={{width:1,height:16,background:C.border}}/>
        <div style={{fontSize:15,fontWeight:700,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{project.name}</div>
        <span style={{background:C.greenDim,color:C.green,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>COMBINED QUOTE</span>
        <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{allBom.length} items · {totalWireCount} wires</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          {panels.length>0&&(
            <div style={{...card({padding:"12px 16px"}),marginBottom:20}} className="no-print">
              <div style={{fontSize:12,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Panel Breakdown</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                {panels.map(p=>{
                  const mats=(p.bom||[]).reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
                  return(
                    <div key={p.id} style={{...card({padding:"10px 14px"}),minWidth:170}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{p.name}</div>
                      <div style={{fontSize:12,color:C.muted}}>{(p.bom||[]).length} items · {(p.pages||[]).length} pages</div>
                      {p.validation?.wireCount>0&&<div style={{fontSize:12,color:C.muted}}>{p.validation.wireCount} wires</div>}
                      {p.complianceReview?.concerns?.length>0&&(()=>{const cc=p.complianceReview.concerns;const crit=cc.filter(c=>c.severity==='critical').length;const warn=cc.filter(c=>c.severity==='warning').length;return <div style={{fontSize:11,marginTop:2}}>{crit>0&&<span style={{color:'#ef4444',fontWeight:700,marginRight:4}}>{crit} critical</span>}{warn>0&&<span style={{color:'#f59e0b',fontWeight:600}}>{warn} warning{warn>1?'s':''}</span>}</div>;})()}
                      {mats>0&&<div style={{fontSize:12,color:C.green,marginTop:4}}>Materials: {fmtMoney(mats)}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <QuoteTab project={aggregated} onUpdate={handleQuoteUpdate}/>
        </div>
      </div>
    </div>
  );
}

// ── ERROR BOUNDARY ──
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,info){console.error("ErrorBoundary caught:",e,info);}
  render(){
    if(this.state.error){
      return(
        <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
          <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:700,color:C.red,marginBottom:8}}>Something went wrong</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:24,maxWidth:600,textAlign:"center",wordBreak:"break-all"}}>{this.state.error?.message||String(this.state.error)}</div>
          <button onClick={()=>{this.setState({error:null});if(this.props.onBack)this.props.onBack();}}
            style={{background:"#383850",border:"1.5px solid #7a7a9a",color:"#d4d8e0",cursor:"pointer",fontSize:15,fontWeight:600,padding:"8px 20px",borderRadius:8}}>← Back to Projects</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ── PROJECT VIEW ──
function ProjectView({project:init,uid,onBack,onChange,onDelete,onTransfer,onCopy,autoOpenPortal,onPortalOpened}){
  const [project,setProject]=useState(()=>migrateProject(init));
  const projectRef=useRef(migrateProject(init));
  const [view,setView]=useState("panels"); // "panels"|"quote"
  const [autoPrint,setAutoPrint]=useState(false);
  const [rfqLoading,setRfqLoading]=useState(false);
  const [rfqGroups,setRfqGroups]=useState(null);
  const [autoPrintRfq,setAutoPrintRfq]=useState(false);
  const [rfqEmailModal,setRfqEmailModal]=useState(null);
  const [showRfqHistory,setShowRfqHistory]=useState(false);
  const [quoteWarnRows,setQuoteWarnRows]=useState(null); // null=hidden, array=showing
  const [showSqModal,setShowSqModal]=useState(false);
  const [sqPanelBom,setSqPanelBom]=useState(null);
  const [pendingRfqUploads,setPendingRfqUploads]=useState(0);
  const [portalSubmissions,setPortalSubmissions]=useState([]);
  const [showPortalModal,setShowPortalModal]=useState(false);
  const [showPoModal,setShowPoModal]=useState(false);
  useEffect(()=>{
    if(!uid||!init.id){setPendingRfqUploads(0);setPortalSubmissions([]);return;}
    const unsub=fbDb.collection('rfqUploads').where('uid','==',uid).onSnapshot(snap=>{
      const matching=snap.docs.filter(d=>{
        const data=d.data();
        return data.projectId===init.id&&data.status==='submitted';
      });
      console.log('PORTAL SUBS: project',init.id,'total docs',snap.size,'matching',matching.length,matching.map(d=>d.id));
      setPendingRfqUploads(matching.length);
      setPortalSubmissions(matching.map(d=>({id:d.id,...d.data()})));
    },err=>{console.error('PORTAL SUBS error:',err);setPendingRfqUploads(0);setPortalSubmissions([]);});
    return()=>unsub();
  },[uid,init.id]);
  // Auto-open portal modal when navigated from a notification
  useEffect(()=>{
    if(autoOpenPortal&&portalSubmissions.length>0){
      setShowPortalModal(true);
      onPortalOpened?.();
    }
  },[autoOpenPortal,portalSubmissions.length]);
  const saveTimer=useRef(null);
  const readOnly=isReadOnly();
  const isBcDisconnected=!!(project.bcEnv&&project.bcEnv!==_bcConfig.env);
  const didMigrate=useRef(!init.panels);

  // Keep ref in sync with state for use in callbacks
  useEffect(()=>{projectRef.current=project;},[project]);

  // Save migrated project immediately on first open
  useEffect(()=>{
    if(didMigrate.current){
      didMigrate.current=false;
      saveProject(uid,migrateProject(init)).catch(()=>{});
    }
  },[]);

  // Listen for live updates from background extraction tasks (survives navigation)
  useEffect(()=>onProjectUpdated(project.id,p=>{setProject(p);projectRef.current=p;onChange(p);}),[project.id]);

  function update(p){
    setProject(p);projectRef.current=p;onChange(p);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>saveProject(uid,p),1000);
  }

  const [relinking,setRelinking]=useState(false);
  const [relinkMsg,setRelinkMsg]=useState(null);
  async function relinkToBC(){
    if(!_bcToken){alert("Connect to Business Central first.");return;}
    if(!confirm("This will create a NEW BC project in the current environment ("+_bcConfig.env+") and re-link this project. Continue?"))return;
    setRelinking(true);setRelinkMsg("Creating BC project…");
    try{
      const bc=await bcCreateProject(project.name,project.bcCustomerNumber||null);
      setRelinkMsg("Creating task structure…");
      const panels=project.panels||[];
      await bcCreatePanelTaskStructure(bc.number,project.name,panels).catch(e=>console.warn("Relink task structure error:",e));
      for(let i=0;i<panels.length;i++){
        setRelinkMsg(`Syncing planning lines (panel ${i+1}/${panels.length})…`);
        await bcSyncPanelPlanningLines(bc.number,i,panels[i]).catch(e=>console.warn("Relink planning lines error panel",i,e));
      }
      const updated={...projectRef.current,bcProjectNumber:bc.number,bcProjectId:bc.id,bcEnv:_bcConfig.env,bcPdfAttached:false,bcPdfFileName:null};
      // Reset per-panel bc attachment flags
      if(updated.panels)updated.panels=updated.panels.map(pan=>({...pan,bcPdfAttached:false,bcPdfFileName:null}));
      setProject(updated);projectRef.current=updated;onChange(updated);
      await saveProject(uid,updated);
      setRelinkMsg("✓ Re-linked to "+bc.number);
      setTimeout(()=>setRelinkMsg(null),3000);
    }catch(e){
      console.error("Relink error:",e);
      setRelinkMsg("Failed: "+(e.message||e));
    }
    setRelinking(false);
  }

  // Auto-print: wait for quote DOM to render, trigger print, then go back
  useEffect(()=>{
    if(autoPrint&&view==="quote"){
      const t=setTimeout(()=>{window.print();setAutoPrint(false);setView("panels");},400);
      return()=>clearTimeout(t);
    }
  },[autoPrint,view]);

  async function onPrintRfq(){
    setRfqLoading(true);
    try{
      const allBom=mergeBoms((projectRef.current.panels||[]).map(p=>p.bom||[]));
      const result=await buildRfqSupplierGroups(allBom);
      if(result.noItems){setRfqLoading(false);alert("No items eligible for RFQ. Items qualify if they show 'No POs' or have a price date older than 60 days (manual-priced items are excluded).");return;}
      setRfqGroups(result.groups);
      setAutoPrintRfq(true);
    }catch(e){console.error("RFQ build error:",e);alert("Failed to build RFQ: "+(e.message||e));}
    setRfqLoading(false);
  }

  async function onSendRfqEmails(){
    setRfqLoading(true);
    try{
      const allBom=mergeBoms((projectRef.current.panels||[]).map(p=>p.bom||[]));
      const result=await buildRfqSupplierGroups(allBom);
      if(result.noItems){setRfqLoading(false);alert("No items eligible for RFQ email. Items qualify if they show 'No POs' or have a price date older than 60 days.");return;}
      const groupsWithEmail=await Promise.all(result.groups.map(async g=>{
        const email=g.vendorNo?await bcGetVendorEmail(g.vendorNo):"";
        return{...g,vendorEmail:email};
      }));
      setRfqEmailModal({groups:groupsWithEmail,projectName:projectRef.current.name||""});
    }catch(e){console.error("RFQ email build error:",e);alert("Failed to build RFQ: "+(e.message||e));}
    setRfqLoading(false);
  }

  function handlePrintQuote(){
    const now=Date.now();
    const staleMs=60*24*60*60*1000;
    const allBom=(projectRef.current.panels||[]).flatMap(p=>p.bom||[]);
    const warn=allBom.filter(r=>{
      if(r.isLaborRow||r.customerSupplied)return false;
      if(r.priceSource==="ai")return true;
      if(r.priceSource==="manual")return false;
      const isBC=r.priceSource==="bc"&&"bcPoDate"in r;
      const dt=isBC?r.bcPoDate:r.priceDate;
      if(isBC&&!dt)return true; // No PO date = "No POs" — needs pricing
      return dt&&dt<now-staleMs;
    });
    if(warn.length>0){setQuoteWarnRows(warn);}
    else{setAutoPrint(true);setView("quote");}
  }

  function onRfqPrint(groups){
    setRfqGroups(groups);
    setAutoPrintRfq(true);
  }

  function onRfqSent(sentItemIds){
    const sentSet=new Set(sentItemIds);
    const now=Date.now();
    const updatedPanels=(projectRef.current.panels||[]).map(panel=>({
      ...panel,
      bom:(panel.bom||[]).map(row=>sentSet.has(row.id)?{...row,rfqSentDate:now}:row)
    }));
    update({...projectRef.current,panels:updatedPanels});
  }

  async function applyPortalPrices(submission){
    try{
    // Save cannot-supply records to Firestore for future tracking
    const cantItems=(submission.lineItems||[]).filter(item=>item.cannotSupply&&item.partNumber);
    if(cantItems.length>0){
      const records=cantItems.map(item=>({
        vendorName:submission.vendorName||'',
        partNumber:(item.partNumber||'').trim(),
        description:item.description||'',
        markedAt:Date.now(),
        rfqNum:submission.rfqNum||'',
      }));
      fbDb.doc(`users/${uid}/config/supplierCantSupply`).set({records:firebase.firestore.FieldValue.arrayUnion(...records)},{merge:true}).catch(e=>console.warn("supplierCantSupply save failed:",e));
    }
    // Save confirmed supplier PN → Matrix PN crossings to sqCrossings for future auto-matching
    const crossings=submission.confirmedCrossings||[];
    if(crossings.length>0){
      const crossData={};
      crossings.forEach(c=>{
        const key=c.supplierPartNumber.toLowerCase().trim();
        crossData[key]={bcItemNumber:c.matrixPartNumber,bcItemDescription:c.description||'',confirmedAt:Date.now(),source:'supplier_portal'};
      });
      fbDb.doc(`users/${uid}/config/sqCrossings`).set(crossData,{merge:true}).catch(e=>console.warn("sqCrossings save failed:",e));
      console.log('PORTAL CROSSINGS: saved',crossings.length,'confirmed supplier→Matrix part crossings');
    }
    // Build normalized part# → price map (skip cannot-supply items)
    const priceMap={};
    (submission.lineItems||[]).forEach(item=>{
      if(item.cannotSupply)return;
      if(item.unitPrice!=null&&item.partNumber){
        priceMap[normPart(item.partNumber)]={price:item.unitPrice,partNumber:(item.partNumber||'').trim(),uom:item.uom||''};
      }
    });
    const now=Date.now();
    // Use BC vendor number from rfqUpload doc (set when RFQ was sent), fall back to fuzzy match
    let vendorNo=submission.vendorNumber||null;
    if(!vendorNo&&_bcToken&&submission.vendorName){
      try{
        const vendors=await bcListVendors();
        const svName=(submission.vendorName||'').toLowerCase().trim();
        const svWords=svName.replace(/[^a-z0-9]/g,' ').split(/\s+/).filter(w=>w.length>2);
        const vMatch=vendors.find(v=>v.displayName===submission.vendorName)
          ||vendors.find(v=>(v.displayName||'').toLowerCase().includes(svName))
          ||vendors.find(v=>svName.includes((v.displayName||'').toLowerCase()))
          ||vendors.find(v=>{const vWords=(v.displayName||'').toLowerCase().replace(/[^a-z0-9]/g,' ').split(/\s+/).filter(w=>w.length>2);return svWords.some(sw=>vWords.some(vw=>vw.includes(sw)||sw.includes(vw)));});
        if(vMatch)vendorNo=vMatch.number;
      }catch(e){console.warn("Vendor lookup for portal prices failed:",e);}
    }
    if(vendorNo)console.log("applyPortalPrices: vendor",vendorNo,submission.vendorName);
    // Push each price (and vendor if resolved) to BC item card
    const bcPushes=Object.values(priceMap).map(({price,partNumber})=>{
      const patch={Unit_Cost:price};
      if(vendorNo)patch.Vendor_No=vendorNo;
      return bcPatchItemOData(partNumber,patch).catch(e=>console.warn("BC price push failed:",partNumber,e));
    });
    await Promise.all(bcPushes);
    // Push Purchase Prices to BC (vendor, direct unit cost, starting date = priced date)
    if(vendorNo&&_bcToken){
      const ppPushes=Object.values(priceMap).map(({price,partNumber,uom})=>{
        return bcPushPurchasePrice(partNumber,vendorNo,price,now,uom).catch(e=>console.warn("BC purchase price push failed:",partNumber,e));
      });
      await Promise.all(ppPushes);
    }
    // Apply to BOM — priceSource:'bc', bcPoDate:now so rows don't get flagged
    let matched=0;
    const updatedPanels=(projectRef.current.panels||[]).map(panel=>({
      ...panel,
      bom:(panel.bom||[]).map(row=>{
        const nk=normPart(row.partNumber);
        // Try exact normalized match first, then fuzzy contains/prefix match
        let hit=priceMap[nk];
        if(!hit){
          const supplierKey=Object.keys(priceMap).find(sk=>partMatch(nk,sk));
          if(supplierKey)hit=priceMap[supplierKey];
        }
        if(hit){
          matched++;
          return{...row,unitPrice:hit.price,priceSource:'bc',priceDate:now,bcPoDate:now,bcVendorName:submission.vendorName||row.bcVendorName};
        }
        return row;
      })
    }));
    update({...projectRef.current,panels:updatedPanels});
    const cantCount=cantItems.length;
    alert(`Prices applied to ${matched} BOM row${matched!==1?'s':''} and pushed to BC Item Cards.${vendorNo?`\nVendor ${submission.vendorName} set on all matched items.\nPurchase Prices updated in BC.`:''}\nBC planning lines will auto-sync in a few seconds.${cantCount>0?`\n${cantCount} item${cantCount!==1?'s':''} marked "Cannot Supply" by vendor — skipped and recorded.`:''}`);
    }catch(e){
      console.error("applyPortalPrices error:",e);
      alert("Error applying prices: "+e.message+"\nPrices may have been partially applied. Check console for details.");
    }
    // Always close modal and mark as imported
    fbDb.collection('rfqUploads').doc(submission.id).update({status:'imported',importedAt:Date.now()}).catch(()=>{});
    setShowPortalModal(false);
  }

  // Auto-print RFQ
  useEffect(()=>{
    if(autoPrintRfq&&rfqGroups){
      const t=setTimeout(()=>{
        document.body.dataset.printTarget="rfq";
        window.print();
        delete document.body.dataset.printTarget;
        setAutoPrintRfq(false);setRfqGroups(null);
      },400);
      return()=>clearTimeout(t);
    }
  },[autoPrintRfq,rfqGroups]);

  return(
    <>
      {view==="quote"?(
        <div style={autoPrint?{height:0,overflow:"hidden"}:undefined}>
          <QuoteView project={project} uid={uid} onBack={()=>setView("panels")} onUpdate={update}/>
        </div>
      ):(
        <>
          <PanelListView
            project={project}
            uid={uid}
            readOnly={readOnly}
            onBack={onBack}
            onViewQuote={handlePrintQuote}
            onPrintRfq={onPrintRfq}
            onSendRfqEmails={onSendRfqEmails}
            onShowRfqHistory={()=>setShowRfqHistory(true)}
            rfqLoading={rfqLoading}
            onUpdate={update}
            onDelete={onDelete}
            onTransfer={onTransfer}
            onCopy={onCopy}
            onOpenSupplierQuote={bom=>{if(portalSubmissions.length>0){setShowPortalModal(true);}else{setSqPanelBom(bom);setShowSqModal(true);}}}
            pendingRfqUploads={pendingRfqUploads}
            onPoReceived={()=>setShowPoModal(true)}
            relinking={relinking}
            relinkMsg={relinkMsg}
            onRelink={relinkToBC}
          />
          {rfqGroups&&<div style={{height:0,overflow:"hidden"}}><RfqDocument groups={rfqGroups} projectName={project.name}/></div>}
          {rfqEmailModal&&<RfqEmailModal groups={rfqEmailModal.groups} projectName={rfqEmailModal.projectName} projectId={project.id} bcProjectNumber={project.bcProjectNumber||""} uid={uid} userEmail={fbAuth.currentUser?.email||""} onClose={()=>setRfqEmailModal(null)} onSent={onRfqSent} onPrint={onRfqPrint}/>}
          {showRfqHistory&&<RfqHistoryModal uid={uid} onClose={()=>setShowRfqHistory(false)}/>}
          {showPoModal&&<PoReceivedModal project={project} bcProjectNumber={project.bcProjectNumber||""} onClose={()=>setShowPoModal(false)} onDone={async(poNum)=>{setShowPoModal(false);const updated={...projectRef.current,bcPoStatus:"Open",bcPoNumber:poNum,updatedAt:Date.now()};setProject(updated);projectRef.current=updated;onChange&&onChange(updated);try{await saveProject(uid,updated);}catch(e){console.warn("PO save failed:",e);}}}/>}
          {showPortalModal&&<PortalSubmissionsModal submissions={portalSubmissions} onClose={()=>setShowPortalModal(false)} onApplyPrices={applyPortalPrices} onImportPdf={()=>{setShowPortalModal(false);setSqPanelBom((projectRef.current.panels||[])[0]?.bom||[]);setShowSqModal(true);}}/>}
          {quoteWarnRows&&ReactDOM.createPortal(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
              <div style={{background:"#0d0d1a",border:"1px solid #b45309",borderRadius:10,padding:"24px 28px",width:"100%",maxWidth:520,boxShadow:"0 8px 40px rgba(0,0,0,0.7)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:22}}>⚠️</span>
                  <div style={{fontSize:15,fontWeight:800,color:"#fbbf24"}}>Pricing May Be Outdated</div>
                </div>
                <div style={{fontSize:13,color:"#94a3b8",marginBottom:14,lineHeight:1.6}}>
                  {(()=>{const ai=quoteWarnRows.filter(r=>r.priceSource==="ai");const nopo=quoteWarnRows.filter(r=>r.priceSource!=="ai"&&(r.priceSource==="bc"&&"bcPoDate"in r)&&!r.bcPoDate);const old=quoteWarnRows.filter(r=>r.priceSource!=="ai"&&!(r.priceSource==="bc"&&"bcPoDate"in r&&!r.bcPoDate));return(<>
                    {ai.length>0&&<div style={{marginBottom:4}}>• <strong style={{color:"#f1f5f9"}}>{ai.length} item{ai.length!==1?"s":""}</strong> with <strong style={{color:"#c084fc"}}>AI-estimated pricing</strong> — not confirmed from a real source.</div>}
                    {nopo.length>0&&<div style={{marginBottom:4}}>• <strong style={{color:"#f1f5f9"}}>{nopo.length} item{nopo.length!==1?"s":""}</strong> with <strong style={{color:"#fbbf24"}}>No POs</strong> — no purchase order pricing on record.</div>}
                    {old.length>0&&<div>• <strong style={{color:"#f1f5f9"}}>{old.length} item{old.length!==1?"s":""}</strong> with pricing <strong style={{color:"#fb923c"}}>older than 60 days</strong>.</div>}
                  </>);})()}
                </div>
                <div style={{background:"#0a0a18",border:"1px solid #2a2a3e",borderRadius:6,maxHeight:180,overflowY:"auto",marginBottom:16}}>
                  {quoteWarnRows.map((r,i)=>(
                    <div key={r.id||i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 10px",borderBottom:i<quoteWarnRows.length-1?"1px solid #1a1a2e":"none",fontSize:12}}>
                      <span style={{color:r.priceSource==="ai"?"#c084fc":(r.priceSource==="bc"&&"bcPoDate"in r&&!r.bcPoDate)?"#fbbf24":"#fb923c",fontWeight:700,fontSize:10,minWidth:28}}>{r.priceSource==="ai"?"AI":(r.priceSource==="bc"&&"bcPoDate"in r&&!r.bcPoDate)?"NoPO":"OLD"}</span>
                      <span style={{color:"#fde68a",fontWeight:600,fontFamily:"monospace",minWidth:120}}>{r.partNumber||"—"}</span>
                      <span style={{color:"#64748b",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description||""}</span>
                      <span style={{color:"#475569",fontSize:10,whiteSpace:"nowrap"}}>{r.priceSource==="ai"?"ARC AI est.":r.bcPoDate||r.priceDate?new Date(r.bcPoDate||r.priceDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"}):"no date"}</span>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>Run <strong style={{color:"#f1f5f9"}}>Refresh Pricing</strong> or send RFQs to get current pricing before quoting, or acknowledge and proceed.</div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>setQuoteWarnRows(null)} style={{background:"#1a1a2a",border:"1px solid #2a2a3e",color:"#94a3b8",padding:"7px 18px",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Cancel</button>
                  <button onClick={()=>{setQuoteWarnRows(null);setAutoPrint(true);setView("quote");}} style={{background:"#7c2d12",border:"1px solid #b45309",color:"#fbbf24",padding:"7px 18px",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:700}}>Acknowledge &amp; Proceed</button>
                </div>
              </div>
            </div>
          ,document.body)}
        </>
      )}
      <SupplierQuoteImportModal show={showSqModal} uid={uid} panelBom={sqPanelBom} bcProjectNumber={project.bcProjectNumber||null} projectId={init.id} onClose={()=>setShowSqModal(false)}/>
    </>
  );
}

// ── SETTINGS MODAL ──
function SettingsModal({uid,onClose,onNameChange}){
  const [key,setKey]=useState("");
  const [loading,setLoading]=useState(true);
  const [saved,setSaved]=useState(false);
  const [apiTestMsg,setApiTestMsg]=useState(null); // {ok:bool, text:string}
  const [apiTesting,setApiTesting]=useState(false);
  const [firstName,setFirstName]=useState("");
  const [nameSaved,setNameSaved]=useState(false);

  const [curPass,setCurPass]=useState("");
  const [newPass,setNewPass]=useState("");
  const [confPass,setConfPass]=useState("");
  const [pwLoading,setPwLoading]=useState(false);
  const [pwErr,setPwErr]=useState("");
  const [pwOk,setPwOk]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const [graphStatus,setGraphStatus]=useState("checking"); // checking|authorized|unauthorized|loading

  // BC Environment config
  const [bcEnvName,setBcEnvName]=useState(_bcConfig.env);
  const [bcCompName,setBcCompName]=useState(_bcConfig.companyName);
  const [bcClientIdVal,setBcClientIdVal]=useState(_bcConfig.clientId);
  const [bcSaving,setBcSaving]=useState(false);
  const [bcSaved,setBcSaved]=useState(false);
  const [bcErr,setBcErr]=useState("");
  const [bcConfirm,setBcConfirm]=useState(false);
  const [bcConnStatus,setBcConnStatus]=useState(()=>_bcToken?"connected":"unknown"); // "unknown"|"testing"|"connected"|"failed"
  const [bcConnDetail,setBcConnDetail]=useState("");
  async function testBcConnection(){
    setBcConnStatus("testing");setBcConnDetail("");
    try{
      const token=await acquireBcToken(true);
      if(!token){setBcConnStatus("failed");setBcConnDetail("Could not acquire token");return;}
      _bcCompanyId=null; // force re-resolve
      const compId=await bcGetCompanyId();
      if(compId){setBcConnStatus("connected");setBcConnDetail(_bcConfig.companyName);}
      else{setBcConnStatus("failed");setBcConnDetail("Company '"+_bcConfig.companyName+"' not found in environment");}
    }catch(e){setBcConnStatus("failed");setBcConnDetail(e.message||"Connection error");}
  }

  const email=fbAuth.currentUser?.email||"";

  useEffect(()=>{
    Promise.all([
      fbDb.doc(`users/${uid}/config/api`).get(),
      fbDb.doc(`users/${uid}/config/profile`).get(),
    ]).then(([apiDoc,profileDoc])=>{
      if(apiDoc.exists)setKey(apiDoc.data().key||"");
      if(profileDoc.exists)setFirstName(profileDoc.data().firstName||"");
    }).finally(()=>setLoading(false));
    // Check if Mail.Send is already consented
    tryGraphTokenSilent().then(tok=>setGraphStatus(tok?"authorized":"unauthorized")).catch(()=>setGraphStatus("unauthorized"));
  },[uid]);

  async function authorizeOutlook(){
    setGraphStatus("loading");
    const tok=await acquireGraphToken();
    setGraphStatus(tok?"authorized":"unauthorized");
  }

  async function saveName(){
    const name=firstName.trim();
    await fbDb.doc(`users/${uid}/config/profile`).set({firstName:name},{merge:true});
    if(onNameChange)onNameChange(name);
    setNameSaved(true);setTimeout(()=>setNameSaved(false),2000);
  }

  async function save(){
    await fbDb.doc(`users/${uid}/config/api`).set({key});
    _apiKey=key;setSaved(true);setTimeout(()=>setSaved(false),2000);
  }
  async function testApiKey(){
    const k=key.trim()||_apiKey;
    if(!k){setApiTestMsg({ok:false,text:"No API key entered"});return;}
    setApiTesting(true);setApiTestMsg(null);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:20,messages:[{role:"user",content:"Say OK"}]})});
      const d=await r.json();
      if(r.ok){setApiTestMsg({ok:true,text:"API key is working — "+d.model});}
      else{setApiTestMsg({ok:false,text:(d.error?.message||"Error "+r.status)});}
    }catch(e){setApiTestMsg({ok:false,text:e.message});}
    setApiTesting(false);
  }

  async function sendReset(){
    setPwErr("");setPwLoading(true);
    try{
      await fbAuth.sendPasswordResetEmail(fbAuth.currentUser.email);
      setResetSent(true);
    }catch(ex){setPwErr(ex.message);}
    setPwLoading(false);
  }

  async function changePassword(e){
    e.preventDefault();setPwErr("");
    if(newPass.length<6){setPwErr("New password must be at least 6 characters.");return;}
    if(newPass!==confPass){setPwErr("Passwords do not match.");return;}
    setPwLoading(true);
    try{
      const user=fbAuth.currentUser;
      const cred=firebase.auth.EmailAuthProvider.credential(user.email,curPass);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPass);
      setPwOk(true);setCurPass("");setNewPass("");setConfPass("");
      setTimeout(()=>setPwOk(false),3000);
    }catch(ex){
      if(ex.code==="auth/wrong-password"||ex.code==="auth/invalid-credential")setPwErr("Current password is incorrect.");
      else if(ex.code==="auth/operation-not-allowed")setPwErr("Password sign-in is not enabled for this account.");
      else setPwErr(ex.message);
    }
    setPwLoading(false);
  }

  const isEmailProvider=fbAuth.currentUser?.providerData?.some(p=>p.providerId==="password");

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:18,fontWeight:700,flex:1}}>⚙ Settings</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20,lineHeight:1,padding:"2px 6px",borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color=C.text} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>✕</button>
        </div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>ARC configuration</div>

        {/* Account */}
        <div style={{marginBottom:20,background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontSize:12,color:C.sub,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Account</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4}}>Email</label>
            <div style={{fontSize:14,color:C.text,padding:"8px 10px",background:C.surface,borderRadius:6,border:`1px solid ${C.border}`,userSelect:"all"}}>{email}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4}}>First Name</label>
              <input value={firstName} onChange={e=>setFirstName(e.target.value)} placeholder="Your first name"
                onKeyDown={e=>{if(e.key==="Enter")saveName();}}
                style={inp()}/>
            </div>
            <button onClick={saveName} disabled={loading}
              style={btn(nameSaved?C.green:C.accent,"#fff",{opacity:loading?0.5:1,flexShrink:0,marginBottom:1})}>
              {nameSaved?"✓ Saved":"Save"}
            </button>
          </div>
        </div>

        {isAdmin()&&<><div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Anthropic API Key <span style={{fontSize:9,color:C.red,fontWeight:700,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:4,padding:"1px 5px",marginLeft:6,verticalAlign:"middle"}}>ADMIN ONLY</span></label>
          {loading
            ?<div style={{color:C.muted,fontSize:13,padding:"9px 0"}}>Loading…</div>
            :<input value={key} onChange={e=>setKey(e.target.value)} type="text" placeholder="sk-ant-…" style={inp()}/>
          }
          <div style={{fontSize:11,color:C.muted,marginTop:6}}>Stored in your Firebase project. Shared across all team members.</div>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:6}}>
          <button onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Close</button>
          <button onClick={testApiKey} disabled={apiTesting||loading} style={btn("#1e3a5f","#93c5fd",{flex:1,opacity:apiTesting||loading?0.5:1})}>
            {apiTesting?"Testing…":"Test Key"}
          </button>
          <button onClick={save} disabled={loading||!key.trim()} style={btn(saved?C.green:C.accent,"#fff",{flex:1,opacity:loading||!key.trim()?0.5:1})}>
            {saved?"✓ Saved":"Save Key"}
          </button>
        </div>
        {apiTestMsg&&<div style={{fontSize:12,color:apiTestMsg.ok?C.green:C.red,marginBottom:16,padding:"6px 10px",background:apiTestMsg.ok?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",border:`1px solid ${apiTestMsg.ok?"rgba(34,197,94,0.25)":"rgba(239,68,68,0.25)"}`,borderRadius:6,wordBreak:"break-word"}}>{apiTestMsg.text}</div>}
        </>}

        {/* Outlook Email Integration */}
        <div style={{marginBottom:20,background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontSize:12,color:C.sub,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Outlook Email — RFQ Sending</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.6}}>Authorize ARC to send RFQ emails via your Microsoft 365 / Outlook account. Required for the <strong style={{color:C.text}}>✉ Email RFQs</strong> feature.</div>
          {graphStatus==="checking"&&<div style={{fontSize:12,color:C.muted}}>Checking authorization…</div>}
          {graphStatus==="authorized"&&<div style={{fontSize:12,color:C.green,display:"flex",alignItems:"center",gap:6}}>✓ Outlook email authorized — RFQ sending is ready.</div>}

        {/* BC Environment Configuration — Admin only */}
        {isAdmin()&&<div style={{marginBottom:20,background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>

          <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.6}}>Configure the BC environment connection. <strong style={{color:C.yellow}}>Warning:</strong> Changing the environment will disconnect all existing projects from BC.</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"6px 10px",background:C.surface,borderRadius:6,flexWrap:"wrap"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:bcConnStatus==="connected"?C.green:bcConnStatus==="failed"?C.red:bcConnStatus==="testing"?C.yellow:C.muted,flexShrink:0,boxShadow:bcConnStatus==="testing"?"0 0 6px "+C.yellow:"none"}}/>
            <span style={{fontSize:12,color:C.text,flex:1}}>Current: <strong>{_bcConfig.env}</strong></span>
            <span style={{fontSize:11,fontWeight:700,borderRadius:20,padding:"2px 10px",
              background:bcConnStatus==="connected"?C.greenDim:bcConnStatus==="failed"?"rgba(239,68,68,0.1)":bcConnStatus==="testing"?"rgba(234,179,8,0.1)":"rgba(100,116,139,0.1)",
              color:bcConnStatus==="connected"?C.green:bcConnStatus==="failed"?C.red:bcConnStatus==="testing"?C.yellow:C.muted,
              border:`1px solid ${bcConnStatus==="connected"?C.green+"44":bcConnStatus==="failed"?C.red+"44":bcConnStatus==="testing"?C.yellow+"44":C.muted+"44"}`}}>
              {bcConnStatus==="connected"?"BC Connected":bcConnStatus==="failed"?"Connection Failed":bcConnStatus==="testing"?"Testing…":"Not Tested"}
            </span>
            {bcConnStatus!=="testing"&&<button onClick={testBcConnection} style={{fontSize:11,color:C.accent,background:"none",border:"none",cursor:"pointer",fontWeight:600,padding:0}}>Test</button>}
          </div>
          {bcConnDetail&&bcConnStatus==="failed"&&<div style={{fontSize:11,color:C.red,marginBottom:8,marginTop:-8}}>{bcConnDetail}</div>}
          <div style={{display:"grid",gap:8,marginBottom:12}}>
            <div>
              <label style={{fontSize:11,color:C.sub,display:"block",marginBottom:3}}>Environment Name</label>
              <input value={bcEnvName} onChange={e=>setBcEnvName(e.target.value)} style={inp()} placeholder="e.g. Production"/>
            </div>
            <div>
              <label style={{fontSize:11,color:C.sub,display:"block",marginBottom:3}}>Company Name</label>
              <input value={bcCompName} onChange={e=>setBcCompName(e.target.value)} style={inp()} placeholder="e.g. Matrix Systems LLC"/>
            </div>
            <div>
              <label style={{fontSize:11,color:C.sub,display:"block",marginBottom:3}}>Client ID (Azure App Registration)</label>
              <input value={bcClientIdVal} onChange={e=>setBcClientIdVal(e.target.value)} style={inp()} placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
            </div>
          </div>
          {bcErr&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{bcErr}</div>}
          {bcSaved&&<div style={{color:C.green,fontSize:12,marginBottom:8}}>✓ BC environment updated successfully.</div>}
          {!bcConfirm?(
            <button onClick={()=>{
              setBcErr("");setBcSaved(false);
              if(!bcEnvName.trim()||!bcCompName.trim()||!bcClientIdVal.trim()){setBcErr("All fields are required.");return;}

              <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.6}}>This will switch from <strong style={{color:C.text}}>{_bcConfig.env}</strong> to <strong style={{color:C.text}}>{bcEnvName}</strong>. All existing projects will be disconnected from BC and will need to be re-linked.</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={async()=>{
                  setBcSaving(true);setBcErr("");
                  try{

                    testBcConnection();
                  }catch(ex){setBcErr("Failed to save: "+ex.message);}
                  setBcSaving(false);
                }} disabled={bcSaving} style={btn(C.red,"#fff",{fontSize:12,opacity:bcSaving?0.6:1})}>
                  {bcSaving?"Saving…":"Yes, Switch Environment"}
                </button>
                <button onClick={()=>setBcConfirm(false)} disabled={bcSaving} style={btn(C.surface,C.text,{fontSize:12})}>Cancel</button>
              </div>
            </div>
          )}

        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Change Password</label>
          {!isEmailProvider?(
            <div style={{fontSize:13,color:C.muted,padding:"10px 12px",background:C.surface,borderRadius:8}}>
              Your account uses Google Sign-In and does not have a password. Use "Forgot password?" on the login screen to set one.
            </div>
          ):(
            <form onSubmit={changePassword}>
              <div style={{marginBottom:4}}><input value={curPass} onChange={e=>setCurPass(e.target.value)} type="password" placeholder="Current password" style={inp()} required/></div>
              <div style={{textAlign:"right",marginBottom:10}}>
                {resetSent
                  ?<span style={{fontSize:12,color:C.green}}>✓ Reset link sent to {fbAuth.currentUser?.email}</span>
                  :<button type="button" onClick={sendReset} disabled={pwLoading} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:0}}>Forgot password?</button>
                }
              </div>
              <div style={{marginBottom:8}}><input value={newPass} onChange={e=>setNewPass(e.target.value)} type="password" placeholder="New password (min 6 chars)" style={inp()} required/></div>
              <div style={{marginBottom:10}}><input value={confPass} onChange={e=>setConfPass(e.target.value)} type="password" placeholder="Confirm new password" style={inp()} required/></div>

                {pwLoading?"Updating…":"Update Password"}
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// ── DELETE CONFIRM MODAL ──
function DeleteConfirmModal({projectName,bcProjectNumber,isAdmin,project,onConfirm,onCancel}){
  const [deleteBC,setDeleteBC]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [confirmText,setConfirmText]=useState("");

  // Forbidden if any panel has status quoted or pushed_to_bc
  const sentStatuses=new Set(["quoted","pushed_to_bc"]);
  const quoteSent=(project?.panels||[]).some(p=>sentStatuses.has(p.status||""));

  async function handleConfirm(){
    if(quoteSent||confirmText!=="DELETE")return;
    setDeleting(true);
    await onConfirm(deleteBC);
    setDeleting(false);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onCancel}>
      <div style={{...card(),width:"100%",maxWidth:440,border:`1px solid ${quoteSent?C.red+"66":C.red+"44"}`}} onClick={e=>e.stopPropagation()}>

        {quoteSent?(
          <>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span style={{fontSize:22}}>🚫</span>
              <div style={{fontSize:18,fontWeight:800,color:C.red}}>Deletion Forbidden</div>
            </div>
            <div style={{fontSize:13,color:C.sub,lineHeight:1.7,marginBottom:16}}>
              A quote has already been sent for project <strong style={{color:C.text}}>{projectName}</strong>.
              Once a quote is issued, this project is a permanent record and <strong style={{color:C.red}}>cannot be deleted</strong>.
            </div>
            <div style={{fontSize:12,color:C.muted,background:C.redDim,borderRadius:8,padding:"10px 14px",marginBottom:20,lineHeight:1.6}}>
              If this project needs to be closed or cancelled, change its status accordingly. Contact an administrator if you believe this is an error.
            </div>
            <button onClick={onCancel} style={btn(C.border,C.sub,{width:"100%",fontWeight:700})}>Close</button>
          </>
        ):(
          <>
            <div style={{fontSize:18,fontWeight:800,color:C.red,marginBottom:6}}>Delete Project?</div>
            <div style={{fontSize:13,color:C.sub,marginBottom:8}}>This will permanently delete from ARC:</div>
            <div style={{fontSize:14,fontWeight:700,color:C.text,background:C.border,borderRadius:8,padding:"10px 14px",marginBottom:14}}>{projectName}</div>

            <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 14px",marginBottom:14,display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{fontSize:16,flexShrink:0}}>⚠️</span>
              <div style={{fontSize:12,color:C.red,lineHeight:1.7,fontWeight:600}}>
                This action is <strong>permanent and not recoverable.</strong> All panels, drawings, BOM data, and history will be lost forever.
              </div>
            </div>

            {isAdmin&&bcProjectNumber&&(
              <div onClick={()=>setDeleteBC(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,background:deleteBC?C.redDim:"transparent",border:`1px solid ${deleteBC?C.red+"66":C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:12,cursor:"pointer"}}>
                <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${deleteBC?C.red:C.muted}`,background:deleteBC?C.red:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {deleteBC&&<span style={{color:"#fff",fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>}
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:deleteBC?C.red:C.sub}}>Also delete from Business Central</div>
                  <div style={{fontSize:11,color:C.muted}}>Project {bcProjectNumber} will be permanently removed from BC</div>
                </div>
              </div>
            )}

            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Type <strong style={{color:C.red,fontFamily:"monospace",letterSpacing:1}}>DELETE</strong> to confirm:</div>
              <input
                value={confirmText}
                onChange={e=>setConfirmText(e.target.value.toUpperCase())}
                placeholder="DELETE"
                autoFocus
                style={{width:"100%",boxSizing:"border-box",background:"#0d0d1a",border:`1px solid ${confirmText==="DELETE"?C.red:C.border}`,borderRadius:8,padding:"9px 12px",color:confirmText==="DELETE"?C.red:C.text,fontSize:14,fontWeight:700,fontFamily:"monospace",letterSpacing:2,outline:"none"}}
              />
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={onCancel} disabled={deleting} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
              <button onClick={handleConfirm} disabled={deleting||confirmText!=="DELETE"}
                style={btn(C.red,"#fff",{flex:1,fontWeight:700,opacity:(deleting||confirmText!=="DELETE")?0.4:1,cursor:confirmText!=="DELETE"?"not-allowed":"pointer"})}>
                {deleting?"Deleting…":"Delete Forever"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── NEW PROJECT MODAL ──
function NewProjectModal({uid,onCreated,onClose}){
  const [name,setName]=useState("");
  const [panelCount,setPanelCount]=useState(1);
  const [loading,setLoading]=useState(false);
  const [bcStatus,setBcStatus]=useState(null);
  const [createErr,setCreateErr]=useState("");
  const [customerQuery,setCustomerQuery]=useState("");
  const [allCustomers,setAllCustomers]=useState([]);
  const [customerResults,setCustomerResults]=useState([]);
  const [customerSearching,setCustomerSearching]=useState(false);
  const [selectedCustomer,setSelectedCustomer]=useState(null);
  const [showDropdown,setShowDropdown]=useState(false);
  const [bcConnected,setBcConnected]=useState(!!_bcToken);
  const [showNewCust,setShowNewCust]=useState(false);
  const [newCustName,setNewCustName]=useState("");
  const [newCustPhone,setNewCustPhone]=useState("");
  const [newCustEmail,setNewCustEmail]=useState("");
  const [creatingCust,setCreatingCust]=useState(false);
  const [newCustErr,setNewCustErr]=useState("");

  useEffect(()=>{
    if(_bcToken){loadCustomers();return;}
    acquireBcToken(false).then(t=>{
      if(t){setBcConnected(true);loadCustomers();}
    }).catch(()=>{});
  },[]);

  // Block Escape key — modal must only close via Cancel or Create buttons
  useEffect(()=>{
    function blockEsc(e){if(e.key==="Escape"){e.preventDefault();e.stopImmediatePropagation();}}
    window.addEventListener("keydown",blockEsc,{capture:true});
    return()=>window.removeEventListener("keydown",blockEsc,{capture:true});
  },[]);

  async function loadCustomers(){
    setCustomerSearching(true);
    const all=await bcLoadAllCustomers();
    setAllCustomers(all);
    setCustomerResults(all.slice(0,25));
    setCustomerSearching(false);
  }

  async function connectBC(){
    setCustomerSearching(true);
    const t=await acquireBcToken(true);
    if(t){setBcConnected(true);await loadCustomers();}
    setCustomerSearching(false);
  }

  function handleCustomerInput(val){
    setCustomerQuery(val);
    setSelectedCustomer(null);
    setShowDropdown(true);
    setCustomerResults(bcFilterCustomers(allCustomers,val));
  }

  function selectCustomer(c){
    setSelectedCustomer(c);
    setCustomerQuery(c.displayName);
    setShowDropdown(false);
  }

  async function createNewCustomer(){
    if(!newCustName.trim())return;
    setCreatingCust(true);setNewCustErr("");
    try{
      const c=await bcCreateCustomer(newCustName.trim(),newCustPhone.trim(),newCustEmail.trim());
      selectCustomer(c);
      const all=await bcLoadAllCustomers();
      setAllCustomers(all);
      setShowNewCust(false);setNewCustName("");setNewCustPhone("");setNewCustEmail("");
    }catch(err){setNewCustErr(err.message||"Failed to create customer in BC");}
    setCreatingCust(false);
  }

  async function create(e){
    e.preventDefault();
    if(!name.trim()||!selectedCustomer)return;
    setLoading(true);setCreateErr("");
    const trimmed=name.trim();
    if(!_bcToken){setBcStatus("connecting");await acquireBcToken(true);}
    if(!_bcToken){setCreateErr("Could not connect to Business Central. Please try again.");setLoading(false);return;}
    try{
      setBcStatus("creating");
      const bc=await bcCreateProject(trimmed,selectedCustomer.number);
      const panelList=Array.from({length:Math.max(1,panelCount)},(_,i)=>({id:`panel-${i+1}`,name:`Panel ${i+1}`}));
      setBcStatus("tasks");
      let taskWarn=null;
      try{
        const taskCount=await bcCreatePanelTaskStructure(bc.number,trimmed,panelList);
        console.log(`bcCreatePanelTaskStructure: ${taskCount} tasks created`);
      }catch(te){
        console.error("bcCreatePanelTaskStructure failed:",te.message);
        taskWarn=te.message;
      }
      setBcStatus(taskWarn?"taskwarn":"ok");
      const p=await saveProject(uid,{
        name:trimmed,
        bcProjectId:bc.id,
        bcProjectNumber:bc.number,
        bcEnv:_bcConfig.env,
        bcCustomerNumber:bc.customerNumber,
        bcCustomerName:bc.customerName||selectedCustomer.displayName,
        status:"draft",
        panels:panelList.map(panel=>({...panel,pages:[],bom:[],validation:null,pricing:null,budgetaryQuote:null,status:'draft'})),
        createdAt:Date.now(),updatedAt:Date.now()
      });
      if(taskWarn){
        setCreateErr(`Project created, but BC task structure failed: ${taskWarn} — ensure 'ProjectTaskLines' (page 1002) is published in BC Web Services.`);
        setLoading(false);
        return; // don't auto-navigate — let user see the warning
      }
      onCreated(p);
    }catch(e){
      setBcStatus(null);
      setCreateErr(e.message||"Failed to create project in Business Central.");
      setLoading(false);
    }
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
      <div style={{...card(),width:"100%",maxWidth:460}}>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>New Project</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Name this control panel quote</div>
        <form onSubmit={create}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Project Name</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Conveyor Control Panel" style={{...inp(),marginBottom:16}} autoFocus/>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Number of Panels</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button type="button" onClick={()=>setPanelCount(c=>Math.max(1,c-1))} style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:C.border,color:C.text,fontSize:18,cursor:"pointer",lineHeight:1}}>−</button>

            <button type="button" onClick={()=>setPanelCount(c=>Math.min(20,c+1))} style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:C.border,color:C.text,fontSize:18,cursor:"pointer",lineHeight:1}}>+</button>
            <span style={{fontSize:12,color:C.muted}}>{panelCount===1?"1 panel will be created":`${panelCount} panels will be created`}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Customer <span style={{color:C.border,fontWeight:400,textTransform:"none",letterSpacing:0}}>(from Business Central)</span></div>
            {bcConnected&&!showNewCust&&<button type="button" onClick={()=>setShowNewCust(true)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:12,padding:0,fontWeight:600}}>+ New Customer</button>}
          </div>
          {showNewCust&&(
            <div style={{background:C.accentDim,border:`1px solid ${C.accent}`,borderRadius:8,padding:14,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>Create New BC Customer</div>
              <input value={newCustName} onChange={e=>setNewCustName(e.target.value)} placeholder="Customer Name *" style={{...inp(),marginBottom:8}}/>
              <input value={newCustPhone} onChange={e=>setNewCustPhone(e.target.value)} placeholder="Phone (optional)" style={{...inp(),marginBottom:8}}/>
              <input value={newCustEmail} onChange={e=>setNewCustEmail(e.target.value)} placeholder="Email (optional)" onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}} style={{...inp(),marginBottom:10}}/>
              {newCustErr&&<div style={{fontSize:11,color:C.red,marginBottom:8}}>{newCustErr}</div>}
              <div style={{display:"flex",gap:8}}>
                <button type="button" onClick={()=>{setShowNewCust(false);setNewCustName("");setNewCustPhone("");setNewCustEmail("");setNewCustErr("");}} style={btn(C.border,C.sub,{flex:1,fontSize:12})}>Cancel</button>
                <button type="button" onClick={createNewCustomer} disabled={!newCustName.trim()||creatingCust} style={btn(C.accent,"#fff",{flex:2,fontSize:12,opacity:!newCustName.trim()||creatingCust?0.5:1})}>{creatingCust?"Creating in BC…":"Create in BC"}</button>
              </div>
            </div>
          )}
          {!bcConnected?(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,background:C.border,borderRadius:8,padding:"10px 14px"}}>
              <span style={{fontSize:12,color:C.muted,flex:1}}>Connect to BC to pick a customer</span>
              <button type="button" onClick={connectBC} disabled={customerSearching}
                style={btn(C.accent,"#fff",{fontSize:12,padding:"6px 14px",opacity:customerSearching?0.5:1})}>
                {customerSearching?"Connecting…":"Connect BC"}
              </button>
            </div>
          ):(
            <div style={{position:"relative",marginBottom:16}}>
              <input
                value={customerQuery}
                onChange={e=>handleCustomerInput(e.target.value)}
                onFocus={()=>setShowDropdown(true)}
                onBlur={()=>setTimeout(()=>setShowDropdown(false),150)}
                onKeyDown={e=>{if(e.key==="Tab"&&customerResults.length===1){e.preventDefault();selectCustomer(customerResults[0]);}}}
                placeholder={customerSearching?"Loading customers…":"Search by name or number…"}
                style={{...inp()}}
              />
              {selectedCustomer&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.green,fontSize:14}}>✓</div>}
              {showDropdown&&customerResults.length>0&&(
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:10,maxHeight:200,overflowY:"auto",marginTop:4,boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>
                  {customerResults.map(c=>(
                    <div key={c.number} onMouseDown={()=>selectCustomer(c)}
                      style={{padding:"9px 12px",cursor:"pointer",display:"flex",gap:10,alignItems:"center"}}
                      onMouseEnter={e=>e.currentTarget.style.background=C.border}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <span style={{fontSize:11,color:C.muted,minWidth:60,fontFamily:"monospace"}}>{c.number}</span>
                      <span style={{fontSize:13,color:C.text}}>{c.displayName}</span>
                    </div>
                  ))}
                </div>
              )}
              {showDropdown&&!customerSearching&&customerResults.length===0&&customerQuery&&(
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:10,padding:"10px 12px",marginTop:4,fontSize:12,color:C.muted}}>No customers found</div>
              )}
            </div>
          )}
          {bcStatus==="connecting"&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>Connecting to Business Central...</div>}
          {bcStatus==="creating"&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>Creating project in Business Central…</div>}
          {bcStatus==="tasks"&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>Building project task structure in BC…</div>}
          {bcStatus==="taskwarn"&&<div style={{fontSize:12,color:C.yellow,marginBottom:10}}>Project created — task structure pending (see error below)</div>}
          {createErr&&<div style={{fontSize:12,color:C.red,background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 12px",marginBottom:12}}>{createErr}</div>}
          {!selectedCustomer&&name.trim()&&<div style={{fontSize:12,color:C.yellow,marginBottom:10}}>A customer is required to create a project.</div>}
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button type="button" onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
            <button type="submit" disabled={!name.trim()||!selectedCustomer||loading} style={btn(C.accent,"#fff",{flex:2,opacity:!name.trim()||!selectedCustomer||loading?0.5:1})}>
              {loading?"Creating…":"Create Project"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── SUPPLIER PRICING UPLOAD MODAL ──
function SupplierPricingUploadModal({uid,onClose}){
  const [phase,setPhase]=useState('upload'); // upload|mapping|review|processing|done
  const [dragOver,setDragOver]=useState(false);
  const [rawRows,setRawRows]=useState([]);
  const [headers,setHeaders]=useState([]);
  const [colMap,setColMap]=useState({partNumber:-1,description:-1,unitCost:-1});
  const [reviewRows,setReviewRows]=useState([]);
  const [checked,setChecked]=useState({});
  const [lookupProgress,setLookupProgress]=useState(null);
  const [progress,setProgress]=useState(null);
  const [results,setResults]=useState(null);
  const [parseError,setParseError]=useState('');
  const fileRef=useRef(null);

  function parseCSV(text){
    const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/);
    const rows=[];
    for(const line of lines){
      if(!line.trim())continue;
      const row=[];let cur='';let inQ=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(inQ){if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(ch==='"'){inQ=false;}else{cur+=ch;}}
        else{if(ch==='"'){inQ=true;}else if(ch===','){row.push(cur.trim());cur='';}else{cur+=ch;}}
      }
      row.push(cur.trim());
      rows.push(row);
    }
    if(rows.length<2)return{headers:[],rows:[]};
    return{headers:rows[0],rows:rows.slice(1)};
  }

  function handleFile(f){
    if(!f)return;
    setParseError('');
    if(!/\.csv$/i.test(f.name)){setParseError('Please upload a CSV file (.csv)');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      const{headers:h,rows:r}=parseCSV(e.target.result);
      if(!h.length||!r.length){setParseError('Could not parse file — no data found');return;}
      setHeaders(h);setRawRows(r);
      // Auto-detect columns
      const map={partNumber:-1,description:-1,unitCost:-1};
      h.forEach((col,i)=>{
        const lc=col.toLowerCase();
        if(map.partNumber===-1&&(/part\s*#|part.*num|item.*num|catalog|sku|^pn$|^item$|^number$/i.test(col)))map.partNumber=i;
        if(map.description===-1&&(/desc|^name$/i.test(lc)))map.description=i;
        if(map.unitCost===-1&&(/cost|price|unit/i.test(lc)))map.unitCost=i;
      });
      setColMap(map);setPhase('mapping');
    };
    reader.readAsText(f);
  }

  async function runLookup(){
    if(colMap.partNumber===-1||colMap.unitCost===-1){setParseError('Part Number and Unit Cost columns are required');return;}
    setPhase('review');setLookupProgress({current:0,total:rawRows.length});
    if(!_bcToken){try{await acquireBcToken(true);}catch(e){}}
    const rows=[];const seen=new Set();
    for(let i=0;i<rawRows.length;i++){
      setLookupProgress({current:i+1,total:rawRows.length});
      const r=rawRows[i];
      const pn=(r[colMap.partNumber]||'').trim();
      const desc=colMap.description>=0?(r[colMap.description]||'').trim():'';
      const costStr=(r[colMap.unitCost]||'').replace(/[^0-9.\-]/g,'');
      const cost=parseFloat(costStr);
      if(!pn||isNaN(cost))continue;
      if(seen.has(pn.toUpperCase())){
        const existing=rows.find(x=>x.partNumber.toUpperCase()===pn.toUpperCase());
        if(existing){existing.newCost=cost;existing.description=desc||existing.description;}
        continue;
      }
      seen.add(pn.toUpperCase());
      let bcItem=null;
      if(_bcToken){
        try{
          const compId=await bcGetCompanyId();
          if(compId){
            const items=await _bcFetchItems(compId,`number eq '${pn.replace(/'/g,"''")}'`,1,0);
            if(items&&items.length)bcItem=items[0];
          }
        }catch(e){}
      }
      rows.push({partNumber:pn,description:desc,newCost:cost,bcItem,status:bcItem?'update':'new'});
    }
    setReviewRows(rows);
    const chk={};rows.forEach((_,i)=>{chk[i]=true;});setChecked(chk);
    setLookupProgress(null);
  }

  async function runBatch(){
    setPhase('processing');
    const toProcess=reviewRows.filter((_,i)=>checked[i]);
    const prog={total:toProcess.length,current:0,updated:0,created:0,skipped:0,errors:[]};
    setProgress({...prog});
    if(!_bcToken){try{await acquireBcToken(true);}catch(e){}}
    for(let i=0;i<toProcess.length;i++){
      const row=toProcess[i];
      prog.current=i+1;setProgress({...prog});
      try{
        if(row.status==='update'){
          await bcPatchItemOData(row.partNumber,{Unit_Cost:row.newCost});
          prog.updated++;
        }else{
          await bcCreateItem({number:row.partNumber,displayName:row.description||row.partNumber,unitCost:row.newCost});
          prog.created++;
        }
      }catch(e){
        prog.errors.push({partNumber:row.partNumber,message:e.message||String(e)});
      }
      setProgress({...prog});
      if(i<toProcess.length-1)await new Promise(r=>setTimeout(r,200));
    }
    setResults(prog);setPhase('done');
  }

  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:700,display:"flex",alignItems:"center",justifyContent:"center"};
  const modal={background:C.card,borderRadius:14,width:900,maxWidth:"96vw",maxHeight:"85vh",display:"flex",flexDirection:"column",border:`1px solid ${C.border}`,boxShadow:"0 8px 40px rgba(0,0,0,0.6)"};
  const hdr={padding:"18px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"};
  const body={flex:1,overflowY:"auto",padding:"20px 24px"};

  return(
    <div style={overlay} onClick={onClose}>
      <div style={modal} onClick={e=>e.stopPropagation()}>
        <div style={hdr}>
          <div style={{fontSize:16,fontWeight:800,color:C.text}}>📥 Upload Supplier Pricing</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        <div style={body}>

        {phase==='upload'&&(<>
          <div style={{fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6}}>Upload a CSV file with supplier pricing to batch update or create items in Business Central. Your CSV should include columns for Part Number, Description, and Unit Cost.</div>
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);}}
            onClick={()=>fileRef.current?.click()}
            style={{border:`2px dashed ${dragOver?C.accent:C.border}`,borderRadius:14,padding:"48px 32px",textAlign:"center",cursor:"pointer",background:dragOver?C.accentDim+"44":"transparent",transition:"all 0.2s"}}>
            <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)handleFile(f);}}/>
            <div style={{fontSize:40,marginBottom:12}}>📥</div>
            <div style={{fontSize:16,fontWeight:700,color:dragOver?C.accent:C.text,marginBottom:6}}>Drop a pricing spreadsheet here</div>
            <div style={{fontSize:13,color:C.muted}}>or click to browse — CSV files supported</div>
          </div>
          {parseError&&<div style={{marginTop:12,color:C.red,fontSize:13,fontWeight:600}}>{parseError}</div>}
        </>)}

        {phase==='mapping'&&(<>
          <div style={{fontSize:13,color:C.muted,marginBottom:16}}>Map the columns from your CSV to the required fields. Found <strong style={{color:C.text}}>{rawRows.length}</strong> rows and <strong style={{color:C.text}}>{headers.length}</strong> columns.</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
            {[['Part Number','partNumber',true],['Description','description',false],['Unit Cost','unitCost',true]].map(([label,key,req])=>(
              <div key={key} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:12}}>
                <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>{label} {req&&<span style={{color:C.red}}>*</span>}</div>
                <select value={colMap[key]} onChange={e=>setColMap(prev=>({...prev,[key]:parseInt(e.target.value)}))}
                  style={{width:"100%",background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:13,fontFamily:"inherit"}}>
                  <option value={-1}>— Select column —</option>
                  {headers.map((h,i)=><option key={i} value={i}>{h}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>Preview (first 5 rows)</div>
          <div style={{overflowX:"auto",borderRadius:8,border:`1px solid ${C.border}`,marginBottom:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#0a0a12"}}>{headers.map((h,i)=><th key={i} style={{padding:"6px 10px",textAlign:"left",color:i===colMap.partNumber?C.accent:i===colMap.unitCost?C.green:i===colMap.description?C.yellow:C.muted,fontWeight:700,whiteSpace:"nowrap",borderBottom:`1px solid ${C.border}`}}>{h}</th>)}</tr></thead>
              <tbody>{rawRows.slice(0,5).map((row,ri)=><tr key={ri}>{row.map((cell,ci)=><td key={ci} style={{padding:"5px 10px",color:C.text,borderBottom:`1px solid ${C.border}22`,whiteSpace:"nowrap"}}>{cell}</td>)}</tr>)}</tbody>
            </table>
          </div>
          {parseError&&<div style={{marginBottom:12,color:C.red,fontSize:13,fontWeight:600}}>{parseError}</div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setPhase('upload');setParseError('');}} style={{padding:"10px 20px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>
            <button onClick={runLookup} disabled={colMap.partNumber===-1||colMap.unitCost===-1}
              style={{flex:1,padding:"10px 20px",background:C.accent,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:(colMap.partNumber===-1||colMap.unitCost===-1)?0.5:1}}>
              Look Up Items in BC →
            </button>
          </div>
        </>)}

        {phase==='review'&&lookupProgress&&(
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{width:48,height:48,margin:"0 auto 16px",border:"4px solid #e2e8f0",borderTop:`4px solid ${C.accent}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>Looking up items in Business Central…</div>
            <div style={{fontSize:13,color:C.muted}}>{lookupProgress.current} of {lookupProgress.total}</div>
          </div>
        )}

        {phase==='review'&&!lookupProgress&&(<>
          <div style={{fontSize:13,color:C.muted,marginBottom:12}}>
            <strong style={{color:C.text}}>{reviewRows.filter(r=>r.status==='update').length}</strong> items to update, <strong style={{color:C.accent}}>{reviewRows.filter(r=>r.status==='new').length}</strong> new items to create. Uncheck rows to skip them.
          </div>
          <div style={{overflowX:"auto",borderRadius:8,border:`1px solid ${C.border}`,marginBottom:16,maxHeight:400,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#0a0a12",position:"sticky",top:0,zIndex:1}}>
                <th style={{padding:"8px 10px",width:36}}><input type="checkbox" checked={reviewRows.every((_,i)=>checked[i])} onChange={e=>{const v=e.target.checked;const c={};reviewRows.forEach((_,i)=>{c[i]=v;});setChecked(c);}} style={{accentColor:C.accent}}/></th>
                <th style={{padding:"8px 10px",textAlign:"left",color:C.muted,fontWeight:700}}>Status</th>
                <th style={{padding:"8px 10px",textAlign:"left",color:C.muted,fontWeight:700}}>Part Number</th>
                <th style={{padding:"8px 10px",textAlign:"left",color:C.muted,fontWeight:700}}>Description</th>
                <th style={{padding:"8px 10px",textAlign:"right",color:C.muted,fontWeight:700}}>Current Cost</th>
                <th style={{padding:"8px 10px",textAlign:"right",color:C.muted,fontWeight:700}}>New Cost</th>
                <th style={{padding:"8px 10px",textAlign:"right",color:C.muted,fontWeight:700}}>Δ</th>
              </tr></thead>
              <tbody>{reviewRows.map((row,i)=>{
                const cur=row.bcItem?.unitCost;
                const diff=cur!=null?(row.newCost-cur):null;
                const noChange=cur!=null&&Math.abs(diff)<0.005;
                return(
                  <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,opacity:checked[i]?1:0.4}}>
                    <td style={{padding:"6px 10px",textAlign:"center"}}><input type="checkbox" checked={!!checked[i]} onChange={e=>setChecked(prev=>({...prev,[i]:e.target.checked}))} style={{accentColor:C.accent}}/></td>
                    <td style={{padding:"6px 10px"}}><span style={{fontSize:11,fontWeight:700,borderRadius:6,padding:"2px 8px",background:row.status==='update'?(noChange?"#334155":C.greenDim):C.accentDim,color:row.status==='update'?(noChange?C.muted:C.green):C.accent}}>{row.status==='update'?(noChange?"No Change":"Update"):"New"}</span></td>
                    <td style={{padding:"6px 10px",fontWeight:600,color:C.text,fontFamily:"monospace"}}>{row.partNumber}</td>
                    <td style={{padding:"6px 10px",color:C.muted,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.description||row.bcItem?.displayName||"—"}</td>
                    <td style={{padding:"6px 10px",textAlign:"right",color:C.muted,fontVariantNumeric:"tabular-nums"}}>{cur!=null?"$"+cur.toFixed(2):"—"}</td>
                    <td style={{padding:"6px 10px",textAlign:"right",color:C.text,fontWeight:600,fontVariantNumeric:"tabular-nums"}}>${row.newCost.toFixed(2)}</td>
                    <td style={{padding:"6px 10px",textAlign:"right",fontWeight:600,fontVariantNumeric:"tabular-nums",color:diff==null?C.muted:diff>0?C.red:diff<0?C.green:C.muted}}>{diff!=null?(diff>0?"+":"")+"$"+diff.toFixed(2):"—"}</td>
                  </tr>);
              })}</tbody>
            </table>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setPhase('mapping');setReviewRows([]);}} style={{padding:"10px 20px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>
            <button onClick={runBatch} disabled={!Object.values(checked).some(v=>v)}
              style={{flex:1,padding:"10px 20px",background:C.accent,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:Object.values(checked).some(v=>v)?1:0.5}}>
              Apply {Object.values(checked).filter(v=>v).length} Items to BC →
            </button>
          </div>
        </>)}

        {phase==='processing'&&progress&&(
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{width:48,height:48,margin:"0 auto 16px",border:"4px solid #e2e8f0",borderTop:`4px solid ${C.accent}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:8}}>Updating Business Central…</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:12}}>{progress.current} of {progress.total}</div>
            <div style={{display:"flex",justifyContent:"center",gap:20,fontSize:13}}>
              <span style={{color:C.green}}>✓ {progress.updated} updated</span>
              <span style={{color:C.accent}}>+ {progress.created} created</span>
              {progress.errors.length>0&&<span style={{color:C.red}}>✗ {progress.errors.length} errors</span>}
            </div>
          </div>
        )}

        {phase==='done'&&results&&(<>
          <div style={{textAlign:"center",padding:"20px 0 24px"}}>
            <div style={{fontSize:40,marginBottom:12}}>{results.errors.length===0?"✅":"⚠️"}</div>
            <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:16}}>Pricing Upload Complete</div>
            <div style={{display:"flex",justifyContent:"center",gap:24,fontSize:14,marginBottom:20}}>
              <div><span style={{fontWeight:800,color:C.green,fontSize:22}}>{results.updated}</span><div style={{color:C.muted,fontSize:12,marginTop:2}}>Updated</div></div>
              <div><span style={{fontWeight:800,color:C.accent,fontSize:22}}>{results.created}</span><div style={{color:C.muted,fontSize:12,marginTop:2}}>Created</div></div>
              {results.errors.length>0&&<div><span style={{fontWeight:800,color:C.red,fontSize:22}}>{results.errors.length}</span><div style={{color:C.muted,fontSize:12,marginTop:2}}>Errors</div></div>}
            </div>
          </div>
          {results.errors.length>0&&(
            <div style={{background:"#1a0a0a",border:`1px solid ${C.red}44`,borderRadius:8,padding:12,marginBottom:16,maxHeight:200,overflowY:"auto"}}>
              <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:8}}>Errors</div>
              {results.errors.map((err,i)=>(
                <div key={i} style={{fontSize:12,color:C.muted,marginBottom:4,display:"flex",gap:8}}>
                  <span style={{color:C.text,fontWeight:600,fontFamily:"monospace",flexShrink:0}}>{err.partNumber}</span>
                  <span style={{color:C.red}}>{err.message}</span>
                </div>
              ))}
            </div>
          )}
          <button onClick={onClose} style={{width:"100%",padding:"12px",background:C.accent,border:"none",borderRadius:8,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Done</button>
        </>)}

        </div>
      </div>
    </div>
  );
}
