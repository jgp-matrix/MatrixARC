// ── DEBUG LOGGING ──
// DECISION(v1.19.584): Capture uncaught errors + console.error + user-reported issues
// to Firestore (companies/{companyId}/debugLogs) for admin-visible debugging.
// Admins view logs in Settings → Debug Logs. Breadcrumbs record the last 30 events.
const _debugBreadcrumbs=[];
const DEBUG_BREADCRUMB_MAX=30;
let _currentProjectId=null;
let _currentPanelId=null;
const _debugDedup=new Map();
let _debugSelfError=false;
function addBreadcrumb(type,message,data){
  try{
    _debugBreadcrumbs.push({t:Date.now(),type,message:(message||'').toString().slice(0,500),data:data||null});
    while(_debugBreadcrumbs.length>DEBUG_BREADCRUMB_MAX)_debugBreadcrumbs.shift();
  }catch(e){}
}
async function logDebugEntry(opts){
  if(_debugSelfError)return;
  if(!fbAuth.currentUser)return; // drop pre-auth events (writes would fail rules anyway)
  try{
    const uid=fbAuth.currentUser.uid;
    const entry={
      createdAt:Date.now(),createdBy:uid,
      userEmail:fbAuth.currentUser.email||'',
      userName:fbAuth.currentUser.displayName||'',
      severity:opts.severity||'error',
      source:opts.source||'unknown',
      message:(opts.message||'').toString().slice(0,2000),
      stack:(opts.stack||'').toString().slice(0,5000),
      url:location.href.slice(0,500),
      userAgent:(navigator.userAgent||'').slice(0,500),
      appVersion:APP_VERSION,
      projectId:_currentProjectId||null,
      panelId:_currentPanelId||null,
      breadcrumbs:opts.breadcrumbs||_debugBreadcrumbs.slice(-DEBUG_BREADCRUMB_MAX),
      description:opts.description||null,
      extra:opts.extra||null,
    };
    const path=_appCtx&&_appCtx.companyId?`companies/${_appCtx.companyId}/debugLogs`:`users/${uid}/debugLogs`;
    await fbDb.collection(path).add(entry);
  }catch(e){
    _debugSelfError=true;
    setTimeout(()=>{_debugSelfError=false;},30000);
    _origConsoleWarn('Debug log emit failed:',e.message);
  }
}
function _debugEmit(source,message,stack){
  try{
    const key=source+'|'+(message||'').toString().slice(0,200);
    const now=Date.now();
    const last=_debugDedup.get(key);
    if(last&&now-last<60000)return; // dedup same error within 60s
    _debugDedup.set(key,now);
    logDebugEntry({severity:'error',source,message,stack});
  }catch(e){}
}
// Preserve originals BEFORE wrapping so logDebugEntry can use them safely
const _origConsoleError=console.error.bind(console);
const _origConsoleWarn=console.warn.bind(console);
console.error=function(...args){
  try{
    const msg=args.map(a=>{
      if(a instanceof Error)return a.stack||a.message;
      if(typeof a==='object'){try{return JSON.stringify(a).slice(0,500);}catch(e){return '[unserializable]';}}
      return String(a).slice(0,500);
    }).join(' ');
    addBreadcrumb('console.error',msg);
    _debugEmit('console_error',msg);
  }catch(e){}
  _origConsoleError(...args);
};
console.warn=function(...args){
  try{
    const msg=args.map(a=>typeof a==='object'?(()=>{try{return JSON.stringify(a).slice(0,300);}catch(e){return '[obj]';}})():String(a).slice(0,300)).join(' ');
    addBreadcrumb('console.warn',msg);
  }catch(e){}
  _origConsoleWarn(...args);
};
window.addEventListener('error',function(ev){
  try{
    const err=ev.error;
    const msg=ev.message||(err&&err.message)||'Unknown error';
    const stack=(err&&err.stack)||`at ${ev.filename}:${ev.lineno}:${ev.colno}`;
    addBreadcrumb('uncaught',msg);
    _debugEmit('uncaught',msg,stack);
  }catch(e){}
});
window.addEventListener('unhandledrejection',function(ev){
  try{
    const reason=ev.reason;
    const msg=(reason&&reason.message)||(typeof reason==='string'?reason:'[promise rejection]');
    const stack=(reason&&reason.stack)||'';
    addBreadcrumb('promise_rejection',msg);
    _debugEmit('promise_rejection',msg,stack);
  }catch(e){}
});

// ── FCM (Push Notifications) ──
// DECISION(v1.19.762): firebase-messaging-compat is lazy-loaded. ensureFcm() injects
// the script tag the first time it's called (on push-toggle click), then waits for
// firebase.messaging to attach. The push toggle in the bell dropdown gates on
// _pushSupported (a static browser feature check) so it appears regardless of whether
// FCM has loaded yet.
let fbMessaging=null;
const _pushSupported='Notification' in window && 'serviceWorker' in navigator && 'PushManager' in window;
let _fcmLoadPromise=null;
function ensureFcm(){
  if(fbMessaging)return Promise.resolve(fbMessaging);
  if(_fcmLoadPromise)return _fcmLoadPromise;
  if(!_pushSupported)return Promise.reject(new Error("Push notifications not supported in this browser"));
  _fcmLoadPromise=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js";
    s.onload=()=>{
      try{
        if(firebase.messaging.isSupported()){
          fbMessaging=firebase.messaging();
          // DECISION(v1.19.762): onMessage handler installed after lazy load. Foreground
          // FCM messages still surface a native notification.
          fbMessaging.onMessage(payload=>{
            console.log('FCM foreground message:',payload);
            if(_swRegistration&&Notification.permission==='granted'){
              const n=payload.notification||{};
              const d=payload.data||{};
              _swRegistration.showNotification(n.title||d.title||'MatrixARC',{
                body:n.body||d.body||'',
                icon:n.icon||'/icons/icon-192.png',
                data:d,
                requireInteraction:true,
              });
            }
          });
          res(fbMessaging);
        }else rej(new Error("FCM not supported in this browser"));
      }catch(e){console.warn("FCM not supported in this browser:",e);rej(e);}
    };
    s.onerror=()=>rej(new Error("Failed to load firebase-messaging script"));
    document.head.appendChild(s);
  });
  return _fcmLoadPromise;
}

// Register service worker for push notifications
let _swRegistration=null;
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    _swRegistration=reg;
    console.log('SW registered for push notifications');
  }).catch(err=>console.warn('SW registration failed:',err));
}

// Helper: hash a string to use as a Firestore doc ID for the token
function _hashToken(token){
  let h=0;for(let i=0;i<token.length;i++){h=((h<<5)-h)+token.charCodeAt(i);h|=0;}
  return'tk_'+Math.abs(h).toString(36);
}

// Request push notification permission, get FCM token, save to Firestore
async function initPushNotifications(uid){
  // DECISION(v1.19.762): Lazy-load firebase-messaging-compat on first toggle.
  await ensureFcm();
  if(!fbMessaging){throw new Error("Push notifications not supported in this browser");}
  const permission=await Notification.requestPermission();
  if(permission!=='granted'){throw new Error("Notification permission denied");}
  const token=await fbMessaging.getToken({vapidKey:"BGv8kmrC_h2FhCZh9p1YnywPX7ocBKO5pFb2dcE2vG_1u7tU1rQ9PuETiG7qFlHtnbEFvIFJ0KwFHBAF23ISFkM",serviceWorkerRegistration:_swRegistration});
  if(!token){throw new Error("Failed to get FCM token");}
  const tokenId=_hashToken(token);
  await fbDb.doc(`users/${uid}/fcmTokens/${tokenId}`).set({
    token,
    createdAt:Date.now(),
    userAgent:navigator.userAgent,
  });
  console.log('Push notifications enabled, token saved');
  return token;
}

// Unsubscribe: delete FCM token from Firestore and deregister from FCM
async function unsubscribePushNotifications(uid){
  if(!fbMessaging)return;
  try{
    const token=await fbMessaging.getToken({vapidKey:"BGv8kmrC_h2FhCZh9p1YnywPX7ocBKO5pFb2dcE2vG_1u7tU1rQ9PuETiG7qFlHtnbEFvIFJ0KwFHBAF23ISFkM",serviceWorkerRegistration:_swRegistration});
    if(token){
      const tokenId=_hashToken(token);
      await fbDb.doc(`users/${uid}/fcmTokens/${tokenId}`).delete();
      await fbMessaging.deleteToken();
    }
  }catch(e){console.warn('Push unsubscribe error:',e);}
  console.log('Push notifications disabled');
}

// DECISION(v1.19.762): The foreground onMessage handler was moved INTO ensureFcm()
// above so it's installed only after firebase-messaging-compat finishes lazy-loading.
// Originally it was top-level here; that required messaging to load eagerly on every
// page. Now this block is a no-op marker.
