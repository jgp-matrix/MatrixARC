              <input type={type} min="0" step={step} value={val} onChange={e=>setter(Math.max(0,+e.target.value||0))} style={{...inp(),width:140,textAlign:"right"}}/>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>{desc}</div>
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Budgetary Contingency %</label>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="number" min="0" max="100" step="1" value={budgPct} onChange={e=>setBudgPct(Math.max(0,+e.target.value||0))} style={{...inp(),width:140,textAlign:"right"}}/>
            <span style={{color:C.muted,fontSize:14}}>%</span>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:4}}>Hidden buffer added to budgetary sell price (default 20%)</div>
        </div>

        {/* ── AUTO-ADD BOM ITEMS ── */}
        <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:16,marginBottom:16}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Auto-Add BOM Items</label>
          <div style={{fontSize:11,color:C.muted,marginBottom:12}}>Items below are automatically added to every BOM after extraction</div>

          {/* BC search */}
          <div style={{marginBottom:10}}>
            <input value={bcQuery} onChange={e=>onBcQueryChange(e.target.value)}
              placeholder={_bcToken?"Search BC items (min 3 chars)…":"Connect BC to search items"}
              disabled={!_bcToken}
              onKeyDown={e=>{if(e.key==="Enter"&&bcQuery.trim().length>=3){if(bcDebounce.current)clearTimeout(bcDebounce.current);doBcSearch(bcQuery);}}}
              style={{...inp(),width:"100%",boxSizing:"border-box",fontSize:13,opacity:_bcToken?1:0.5}}/>
            {bcSearching&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>Searching…</div>}
            {bcResults.length>0&&(
              <div style={{border:`1px solid ${C.border}`,borderRadius:8,marginTop:6,maxHeight:200,overflowY:"auto",background:C.bg}}>
                <div style={{display:"grid",gridTemplateColumns:"110px 1fr 80px 90px",gap:0,fontSize:10,color:C.muted,fontWeight:600,padding:"5px 10px",borderBottom:`1px solid ${C.border}`,textTransform:"uppercase",letterSpacing:0.3,position:"sticky",top:0,background:C.bg}}>
                  <div>Part #</div><div>Description</div><div style={{textAlign:"right"}}>Unit Cost</div><div style={{textAlign:"right"}}>Modified</div>
                </div>
                {bcResults.map((item,i)=>(
                  <div key={i} onClick={()=>addBcItem(item)} style={{display:"grid",gridTemplateColumns:"110px 1fr 80px 90px",gap:0,padding:"7px 10px",cursor:"pointer",borderBottom:`1px solid ${C.border}22`,fontSize:12,transition:"background 0.1s"}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.accent+"22"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{color:C.accent,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.number}</div>
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:8}}>{item.displayName}</div>
                    <div style={{textAlign:"right",color:C.green}}>{item.unitCost!=null?"$"+item.unitCost.toFixed(2):"—"}</div>
                    <div style={{textAlign:"right",color:C.muted}}>{fmtDate(item.lastModifiedDateTime)}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Manual add */}
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <input value={manualDesc} onChange={e=>setManualDesc(e.target.value)} placeholder="Description (manual)" style={{...inp(),flex:1,fontSize:12}}
              onKeyDown={e=>{if(e.key==="Enter")addManualItem();}}/>
            <div style={{display:"flex",alignItems:"center",gap:2}}>
              <span style={{color:C.muted,fontSize:12}}>$</span>
              <input type="number" min="0" step="0.01" value={manualPrice} onChange={e=>setManualPrice(e.target.value)} placeholder="0.00" style={{...inp(),width:80,fontSize:12,textAlign:"right"}}
                onFocus={e=>e.target.select()}
                onKeyDown={e=>{if(e.key==="Enter")addManualItem();}}/>
            </div>
            <button onClick={addManualItem} disabled={!manualDesc.trim()} style={btn(C.accent,"#fff",{padding:"6px 14px",fontSize:12,opacity:manualDesc.trim()?1:0.4})}>Add</button>
          </div>

          {/* Saved defaults list */}
          {defaultItems.length>0&&(
            <div style={{border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"50px 100px 1fr 80px 32px",gap:0,fontSize:10,color:C.muted,fontWeight:600,padding:"5px 10px",background:C.bg,textTransform:"uppercase",letterSpacing:0.3,borderBottom:`1px solid ${C.border}`}}>
                <div>Qty</div><div>Part #</div><div>Description</div><div style={{textAlign:"right"}}>Price</div><div></div>
              </div>
              {defaultItems.map((item,i)=>{
                const zeroPrice=!item.unitPrice;
                return(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"50px 100px 1fr 80px 32px",gap:0,padding:"4px 10px",fontSize:12,borderBottom:i<defaultItems.length-1?`1px solid ${C.border}22`:"none",background:zeroPrice?"#ff000011":"transparent",alignItems:"center"}}>
                    <input type="number" min="1" step="1" value={item.qty||1} onChange={e=>{const q=Math.max(1,+e.target.value||1);setDefaultItems(prev=>prev.map((it,j)=>j===i?{...it,qty:q}:it));}} onFocus={e=>e.target.select()} style={{...inp(),width:40,fontSize:12,textAlign:"center",padding:"3px 4px"}}/>
                    <div style={{color:C.accent,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.partNumber||"—"}</div>
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.description}</div>
                    <div style={{textAlign:"right",color:zeroPrice?C.red:C.green}}>{item.unitPrice?"$"+Number(item.unitPrice).toFixed(2):"$0.00"}</div>
                    <button onClick={()=>removeItem(i)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14,padding:0,lineHeight:1}} title="Remove">✕</button>
                  </div>
                );
              })}
            </div>
          )}
          {defaultItems.length===0&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>No auto-add items configured</div>}
        </div>

        {canUploadLogo&&(
          <div style={{marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:13,fontWeight:700,color:C.sub,marginBottom:10}}>Company Logo</div>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              {logoUrl?(
                <img src={logoUrl} alt="Company logo" style={{maxHeight:56,maxWidth:160,objectFit:"contain",borderRadius:6,border:`1px solid ${C.border}`,background:"#fff",padding:4}}/>
              ):(
                <div style={{width:100,height:56,borderRadius:6,border:`1px dashed ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>No logo</div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <input ref={logoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadLogo(e.target.files[0])}/>
                <button onClick={()=>logoInputRef.current.click()} disabled={logoUploading} style={btn(C.accent,"#fff",{fontSize:12,padding:"6px 14px",opacity:logoUploading?0.6:1})}>
                  {logoUploading?"Uploading…":"Upload Logo"}
                </button>
                {logoUrl&&<button onClick={removeLogo} style={btn(C.border,C.red,{fontSize:12,padding:"6px 14px"})}>Remove</button>}
              </div>
            </div>
            {logoErr&&<div style={{fontSize:12,color:C.red,marginTop:6}}>{logoErr}</div>}
            <div style={{fontSize:11,color:C.muted,marginTop:6}}>PNG, JPG, or SVG recommended. Displayed in the header top-left.</div>
          </div>
        )}

        {/* ── LABOR RATES (admin only) ── */}
        {isAdmin()&&(
          <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:16,marginBottom:4}}>
            <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Labor Category Rates <span style={{fontSize:9,color:C.red,fontWeight:700,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:4,padding:"1px 5px",marginLeft:6,verticalAlign:"middle"}}>ADMIN ONLY</span></label>
            <div style={{fontSize:11,color:C.muted,marginBottom:12}}>Minutes per unit for each labor category. Changes apply to all future estimates.</div>
            {[
              ["wireMinPerPoint","Wire Time","min / wire point"],
              ["doorDeviceMinPerDevice","Door Wiring","min / device"],
              ["mountingMinPerDevice","Device Mounting","min / device"],
              ["ductDinMinPerFoot","Duct & DIN Rail","min / foot"],
              ["holesMinPerHole","Panel Holes","min / hole"],
              ["hmiHoleEquivalent","HMI Hole Equivalent","holes per HMI cutout"],
              ["squareCutoutMinPerCut","Square Cutout","min / cutout"],
              ["pmMinPerUnit","Project Mgmt","min / session"],
              ["cratingMinPerUnit","Crating","min / crate"],
            ].map(([key,label,unit])=>(
              <div key={key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{flex:1,fontSize:12,color:C.text,fontWeight:500}}>{label}</div>
                <input type="number" min="0" step="1" value={laborRates[key]??LABOR_RATE_DEFAULTS[key]}
                  onChange={e=>setLaborRates(prev=>({...prev,[key]:Math.max(0,+e.target.value||0)}))}
                  onFocus={e=>e.target.select()}
                  style={{...inp(),width:70,textAlign:"right",fontSize:12,padding:"4px 6px"}}/>
                <div style={{fontSize:11,color:C.muted,width:120}}>{unit}</div>
              </div>
            ))}
            <button onClick={()=>setLaborRates({...LABOR_RATE_DEFAULTS})}
              style={{...btn(C.border,C.muted,{fontSize:11,padding:"4px 10px",marginTop:4})}}>
              Reset to Defaults
            </button>
          </div>
        )}

        {/* ── UI PREFERENCES ── */}
        <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:16,marginBottom:4}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>UI Preferences</label>
          <TooltipToggle/>
        </div>

        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
          <button onClick={save} disabled={saving} style={btn(saved?C.green:C.accent,"#fff",{flex:2,opacity:saving?0.6:1})}>
            {saving?"Saving…":saved?"✓ Saved":"Save Defaults"}
          </button>
        </div>
        <button onClick={onClose} style={{display:"block",width:"100%",marginTop:10,background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 0",color:C.muted,cursor:"pointer",fontSize:13}}>Close</button>
      </div>
    </div>
  );
}

// ── COMPANY SETUP MODAL ──
function CompanySetupModal({uid,email,onDone,onClose}){
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  async function create(e){
    e.preventDefault();if(!name.trim())return;setLoading(true);setErr("");
    try{
      const cid=await createCompany(uid,email,name.trim());
      _appCtx.companyId=cid;_appCtx.role="admin";
      _appCtx.projectsPath=`companies/${cid}/projects`;
      _appCtx.configPath=`companies/${cid}/config`;
      onDone(cid,"admin",name.trim());
    }catch(ex){setErr(ex.message);setLoading(false);}
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:440}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Set Up Company Workspace</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Create a shared workspace so your team can collaborate on projects.</div>
        <form onSubmit={create}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Company Name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Matrix Systems, Inc." style={{...inp(),marginBottom:16}} autoFocus/>
          {err&&<div style={{color:C.red,fontSize:12,marginBottom:12}}>{err}</div>}
          <div style={{display:"flex",gap:10}}>
            <button type="button" onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
            <button type="submit" disabled={!name.trim()||loading} style={btn(C.accent,"#fff",{flex:2,opacity:!name.trim()||loading?0.5:1})}>
              {loading?"Creating…":"Create Company"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ── REMOVE MEMBER MODAL ──
function RemoveMemberModal({uid,companyId,member,members,onRemoved,onClose}){
  const [transferTo,setTransferTo]=useState("");
  const [memberProjects,setMemberProjects]=useState([]);
  const [loadingProjects,setLoadingProjects]=useState(true);
  const [removing,setRemoving]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    fbDb.collection(`companies/${companyId}/projects`)
      .where("createdBy","==",member.uid)
      .get()
      .then(snap=>{setMemberProjects(snap.docs.map(d=>d.data()));setLoadingProjects(false);})
      .catch(()=>setLoadingProjects(false));
  },[]);

  async function doRemove(){
    setRemoving(true);setErr("");
    try{
      if(transferTo&&memberProjects.length>0){
        const batch=fbDb.batch();
        memberProjects.forEach(p=>{
          batch.update(fbDb.doc(`companies/${companyId}/projects/${p.id}`),{
            transferred:true,
            transferredTo:transferTo,
            transferredFrom:{uid:member.uid,email:member.email},
            createdBy:transferTo,
          });
        });
        await batch.commit();
      }
      await fbFunctions.httpsCallable("removeTeamMember")({targetUid:member.uid,companyId});
      onRemoved(member.uid);
    }catch(ex){setErr(ex.message);}
    setRemoving(false);
  }

  const recipients=members.filter(m=>m.uid!==member.uid);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Remove Member</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Removing <strong style={{color:C.text}}>{member.email}</strong> from the workspace.</div>
        {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:10,marginBottom:12,fontSize:13,color:C.red}}>{err}</div>}
        {loadingProjects?(
          <div style={{color:C.muted,fontSize:13,padding:"20px 0",textAlign:"center"}}>Checking projects…</div>
        ):(
          <>
            {memberProjects.length>0?(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Their Projects ({memberProjects.length})</div>
                <div style={{background:"#0a0a12",borderRadius:8,padding:10,marginBottom:14,maxHeight:130,overflow:"auto"}}>
                  {memberProjects.map(p=>(
                    <div key={p.id} style={{fontSize:13,color:C.text,padding:"5px 0",borderBottom:`1px solid ${C.border}22`}}>{p.name}</div>
                  ))}
                </div>
                <div style={{fontSize:13,color:C.sub,marginBottom:8}}>Transfer projects to:</div>
                <select value={transferTo} onChange={e=>setTransferTo(e.target.value)}
                  style={{width:"100%",background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:transferTo?C.text:C.muted,fontSize:14,marginBottom:6}}>
                  <option value="">Leave in workspace (no specific owner)</option>
                  {recipients.map(m=>(
                    <option key={m.uid} value={m.uid}>{m.email} ({m.role})</option>
                  ))}
                </select>
                {transferTo&&<div style={{fontSize:11,color:C.muted}}>Projects will appear in the recipient's Transferred Projects section.</div>}
              </div>
            ):(
              <div style={{background:"#0a0a12",borderRadius:8,padding:14,marginBottom:20,fontSize:13,color:C.muted}}>This member has no projects.</div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={onClose} disabled={removing} style={btn(C.border,C.sub)}>Cancel</button>
              <button onClick={doRemove} disabled={removing} style={btn(C.red,"#fff",{opacity:removing?0.6:1})}>
                {removing?"Removing…":transferTo?"Transfer & Remove":"Remove Member"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── TEAM MODAL ──
function TeamModal({uid,companyId,userRole,onClose}){
  const [members,setMembers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [inviteEmail,setInviteEmail]=useState("");
  const [inviteRole,setInviteRole]=useState("edit");
  const [inviting,setInviting]=useState(false);
  const [generatedLinks,setGeneratedLinks]=useState([]); // [{email,role,url}]
  const [copied,setCopied]=useState("");
  const [err,setErr]=useState("");
  const [removingMember,setRemovingMember]=useState(null);

  useEffect(()=>{
    if(!companyId){setLoading(false);return;}
    loadCompanyMembers(companyId)
      .then(m=>{
        // Ensure the current user always appears; repair missing member doc if needed
        if(!m.some(x=>x.uid===uid)){
          const self={uid,email:fbAuth.currentUser?.email||"",role:userRole};
          fbDb.doc(`companies/${companyId}/members/${uid}`).set(self,{merge:true}).catch(()=>{});
          m=[self,...m];
        }
        setMembers(m);setLoading(false);
      })
      .catch(e=>{setErr("Failed to load members: "+e.message);setLoading(false);});
  },[companyId]);

  async function sendInvite(e){
    e.preventDefault();if(!inviteEmail.trim())return;
    setInviting(true);setErr("");
    try{
      const email=inviteEmail.trim();
      const payload=btoa(JSON.stringify({c:companyId,r:inviteRole,e:email}));
      const url=`${window.location.origin}${window.location.pathname}?join=${payload}`;
      await fbFunctions.httpsCallable("sendInviteEmail")({to:email,inviteUrl:url,role:inviteRole});
      setGeneratedLinks(l=>[...l,{email,role:inviteRole,url,sent:true}]);
      setInviteEmail("");
    }catch(ex){setErr(ex.message);}
    setInviting(false);
  }

  function handleMemberRemoved(targetUid){
    setMembers(m=>m.filter(x=>x.uid!==targetUid));
    setRemovingMember(null);
  }

  async function changeRole(targetUid,role){
    try{
      await fbFunctions.httpsCallable("updateMemberRole")({targetUid,role,companyId});
      setMembers(m=>m.map(x=>x.uid===targetUid?{...x,role}:x));
    }catch(ex){setErr(ex.message);}
  }

  const admin=userRole==="admin";
  const roleBadge={admin:[C.accentDim,C.accent],edit:[C.greenDim,C.green],view:[C.border,C.muted]};

  return(<>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:560,maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>👥 Team</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Manage company workspace members</div>
        {loading&&<div style={{color:C.muted,fontSize:13,padding:"20px 0",textAlign:"center"}}>Loading…</div>}
        {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:10,marginBottom:12,fontSize:13,color:C.red}}>{err}</div>}

        {!loading&&(
          <>
            {/* Members */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:12,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Members ({members.length})</div>
              {members.map(m=>{
                const [bg,col]=roleBadge[m.role]||roleBadge.view;
                return(
                  <div key={m.uid} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"8px 12px",background:"#0a0a12",borderRadius:8}}>
                    <div style={{flex:1,fontSize:13,color:C.text}}>{m.email}</div>
                    {admin&&m.uid!==uid?(
                      <select value={m.role} onChange={e=>changeRole(m.uid,e.target.value)}
                        style={{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>
                        <option value="admin">admin</option>
                        <option value="edit">edit</option>
                        <option value="view">view</option>
                      </select>
                    ):(
                      <span style={{background:bg,color:col,borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700}}>{m.role}</span>
                    )}
                    {admin&&m.uid!==uid&&(
                      <button onClick={()=>setRemovingMember(m)} style={{background:C.redDim,color:C.red,border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>Remove</button>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Generated invite links (this session) */}
            {generatedLinks.length>0&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Invite Links</div>
                {generatedLinks.map((inv,i)=>(
                  <div key={i} style={{marginBottom:8,padding:"8px 12px",background:"#0a0a12",borderRadius:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1,fontSize:13,color:C.text}}>{inv.email}</div>
                      <span style={{background:C.yellowDim,color:C.yellow,borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{inv.role}</span>
                      {inv.sent&&<span style={{color:C.green,fontSize:11,fontWeight:700}}>✓ Email sent</span>}
                      <button
                        onClick={()=>{navigator.clipboard.writeText(inv.url);setCopied(i);setTimeout(()=>setCopied(""),2000);}}
                        style={btn(copied===i?C.greenDim:C.border,copied===i?C.green:C.muted,{fontSize:11,padding:"3px 10px"})}>
                        {copied===i?"✓ Copied":"Copy Link"}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Invite form — admin only */}

// ── LOGIN ──
function LoginScreen({invite}){
  const [email,setEmail]=useState(invite?.e||"");
  const [pass,setPass]=useState("");
  const [mode,setMode]=useState(invite?"register":"login");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const emailRef=useRef(null);

  async function submit(e){
    e.preventDefault();setErr("");setLoading(true);
    try{
      if(mode==="login")await fbAuth.signInWithEmailAndPassword(email,pass);
      else await fbAuth.createUserWithEmailAndPassword(email,pass);
    }catch(ex){
      if(ex.code==="auth/email-already-in-use"){
        setMode("login");
        setErr("That email already has an account — sign in below, or use Forgot Password to reset it.");
      } else if(["auth/user-not-found","auth/wrong-password","auth/invalid-credential","auth/invalid-email"].includes(ex.code)){
        setErr("Email or password not recognized. Please try again, or use Forgot Password to reset it.");
      } else {
        setErr(ex.message);
      }
    }
    setLoading(false);
  }
  async function google(){
    setLoading(true);
    try{await fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
    catch(ex){setErr(ex.message);}
    setLoading(false);
  }
  async function microsoft(){
    setLoading(true);
    try{
      const provider=new firebase.auth.OAuthProvider("microsoft.com");
      provider.setCustomParameters({prompt:"select_account"});
      await fbAuth.signInWithPopup(provider);
    }catch(ex){
      if(ex.code==="auth/account-exists-with-different-credential"){
        if(ex.email)setEmail(ex.email);
        setErr("An account with this email already exists — please sign in with your email and password below.");
      } else {
        setErr(ex.message);
      }
    }
    setLoading(false);
  }
  async function sendReset(e){
    e.preventDefault();setErr("");setLoading(true);
    try{
      await fbAuth.sendPasswordResetEmail(email);
      setResetSent(true);
    }catch(ex){setErr(ex.message);}
    setLoading(false);
  }
  function switchMode(m){
    // Capture actual DOM value first — browser autocomplete may not fire onChange
    if(emailRef.current)setEmail(emailRef.current.value);
    setMode(m);setErr("");setResetSent(false);
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 50% 0%,#1a1a3e 0%,${C.bg} 60%)`}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:104,marginBottom:10}}>⬡</div>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:64,fontWeight:900,letterSpacing:8,color:C.accent,lineHeight:1}}>ARC</div>
        <div style={{fontSize:14,color:C.muted,fontWeight:500,marginTop:6,letterSpacing:2}}>by <span style={{background:"#ef4444",color:"#fff",borderRadius:20,padding:"2px 12px",fontWeight:700,letterSpacing:1}}>RedPill</span> Software</div>
        <div style={{fontSize:13,color:C.muted,marginTop:4,opacity:0.6}}>{APP_VERSION}</div>
      </div>
      {invite&&(
        <div style={{background:C.accentDim,border:`1px solid ${C.accent}`,borderRadius:12,padding:"14px 20px",marginBottom:20,textAlign:"center",width:"100%",maxWidth:400}}>
          <div style={{fontSize:15,fontWeight:700,color:C.accent,marginBottom:4}}>You've been invited to APEX ARC</div>
          <div style={{fontSize:13,color:C.sub}}>Create an account or sign in to join your team workspace.</div>
        </div>
      )}
      <div style={{...card(),width:"100%",maxWidth:400}}>
        {mode==="reset"?(
          resetSent?(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>Check your email</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6}}>A password reset link was sent to <strong style={{color:C.fg}}>{email}</strong>. Check your inbox and follow the link to set a new password.</div>
              <button onClick={()=>switchMode("login")} style={btn(C.accent,"#fff",{width:"100%"})}>Back to Sign In</button>
            </div>
          ):(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Reset Password</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:16}}>Enter your email and we'll send a reset link.</div>
              <form onSubmit={sendReset}>
                <div style={{marginBottom:16}}><input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" style={inp()} required/></div>
                {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,lineHeight:1.5}}>{err}</div>}
                <button type="submit" disabled={loading} style={btn(C.accent,"#fff",{width:"100%",opacity:loading?0.6:1})}>{loading?"Sending…":"Send Reset Link"}</button>
              </form>
              <div style={{textAlign:"center",marginTop:14,fontSize:12,color:C.muted}}>
                <button onClick={()=>switchMode("login")} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontWeight:600,fontSize:12}}>Back to Sign In</button>
              </div>
            </div>
          )
        ):(
          <div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:20}}>{mode==="login"?"Sign In":"Create Account"}</div>
            <form onSubmit={submit}>
              <div style={{marginBottom:10}}><input ref={emailRef} value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="Email" style={inp()} required/></div>
              <div style={{marginBottom:6}}><input value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="Password" style={inp()} required/></div>
              <div style={{textAlign:"right",marginBottom:14}}>
                <button type="button" onClick={()=>switchMode("reset")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>Forgot password?</button>
              </div>
              {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,lineHeight:1.5}}>{err}</div>}
              <button type="submit" disabled={loading} style={btn(C.accent,"#fff",{width:"100%",opacity:loading?0.6:1})}>{loading?"Please wait…":mode==="login"?"Sign In":"Create Account"}</button>
            </form>
            <div style={{textAlign:"center",margin:"14px 0",color:C.muted,fontSize:12}}>or</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={google} disabled={loading} style={btn("#fff","#1a1a1a",{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8})}>
                <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Continue with Google
              </button>
              <button onClick={microsoft} disabled={loading} style={btn("#2f2f2f","#fff",{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8})}>
                <svg width="16" height="16" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
                Continue with Microsoft
              </button>
            </div>
            <div style={{textAlign:"center",marginTop:14,fontSize:12,color:C.muted}}>
              {mode==="login"?"No account? ":"Have an account? "}
              <button onClick={()=>switchMode(mode==="login"?"register":"login")} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontWeight:600,fontSize:12}}>
                {mode==="login"?"Register":"Sign In"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── RFQ EMAIL MODAL ──
function RfqEmailModal({groups,projectName,projectId,bcProjectNumber,uid,userEmail,onClose,onSent,onPrint}){
  const [emails,setEmails]=useState(()=>{const m={};groups.forEach(g=>{m[g.vendorName]=g.vendorEmail||"";});return m;});
  const [included,setIncluded]=useState(()=>{const m={};groups.forEach(g=>{m[g.vendorName]=true;});return m;});
  const [statuses,setStatuses]=useState({});
  const [sending,setSending]=useState(false);
  const [done,setDone]=useState(false);
  const [previewGroup,setPreviewGroup]=useState(null);
  const fromEmail=userEmail||fbAuth.currentUser?.email||"your Outlook account";
  const _today=new Date();
  const _rfqBase=bcProjectNumber||Date.now().toString(36).toUpperCase().slice(-6);
  const _makeRfqNum=vendor=>`${vendorCode(vendor)}-${_rfqBase}`;
  const _rfqDate=_today.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  const _responseBy=new Date(_today.getTime()+14*24*60*60*1000).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  async function sendAll(shouldPrint=false){
    setSending(true);
    const graphToken=await acquireGraphToken();
    if(!graphToken){setSending(false);alert("Could not get Microsoft 365 token. Make sure you are signed in to your Microsoft account.");return;}
    const today=_today;
    const rfqBase=_rfqBase;
    const makeRfqNum=_makeRfqNum;
    const rfqDate=_rfqDate;
    const responseBy=_responseBy;
    // Generate per-vendor upload tokens and store in Firestore
    const vendorTokens={};
    const uploadExpiry=Date.now()+30*24*60*60*1000;
    const currentUid=uid||fbAuth.currentUser?.uid||"";
    for(const group of groups){
      if(included[group.vendorName]&&(emails[group.vendorName]||"").trim()){
        const rfqNum=makeRfqNum(group.vendorName);
        const tok=Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
        vendorTokens[group.vendorName]=tok;
        fbDb.collection('rfqUploads').doc(tok).set({uid:currentUid,projectId:projectId||"",projectName:projectName||"",vendorName:group.vendorName,vendorNumber:group.vendorNo||"",vendorEmail:(emails[group.vendorName]||"").trim(),rfqNum,lineItems:group.items.map(i=>({partNumber:i.partNumber||"",description:i.description||"",qty:i.qty||1,manufacturer:i.manufacturer||""})),sentAt:Date.now(),expiresAt:uploadExpiry,status:"pending",companyName:_appCtx.company?.name||"",companyLogoUrl:_appCtx.company?.logoUrl||"",companyAddress:_appCtx.company?.address||"",companyPhone:_appCtx.company?.phone||""}).catch(e=>console.warn("rfqUpload save failed:",e));
      }
    }
    const sentItemIds=[];
    const historyEntries=[];
    for(const group of groups){
      if(!included[group.vendorName]){
        setStatuses(prev=>({...prev,[group.vendorName]:{state:"skipped"}}));
        historyEntries.push({vendorName:group.vendorName,vendorEmail:emails[group.vendorName]||"",items:group.items.map(i=>({partNumber:i.partNumber,qty:i.qty,id:i.id})),sent:false,skipped:true});
        continue;
      }
      const to=(emails[group.vendorName]||"").trim();
      if(!to){
        setStatuses(prev=>({...prev,[group.vendorName]:{state:"error",msg:"No email address"}}));
        historyEntries.push({vendorName:group.vendorName,vendorEmail:"",items:group.items.map(i=>({partNumber:i.partNumber,qty:i.qty,id:i.id})),sent:false,skipped:false,error:"No email address"});
        continue;
      }
      setStatuses(prev=>({...prev,[group.vendorName]:{state:"sending"}}));
      try{
        // RFQ number: vendor code + project number (e.g. ROY-PRJ402010)
        // Future: integrate with BC Requisition Worksheets for proper purchasing flow
        let rfqNum=makeRfqNum(group.vendorName);
        const uploadToken=vendorTokens[group.vendorName];
        const uploadUrl=uploadToken?`https://matrix-arc.web.app?rfqUpload=${uploadToken}`:null;
        const subject=`Request for Quote — ${projectName||"Project"} — ${rfqNum}`;
        const html=buildRfqEmailHtml(group,projectName,rfqNum,rfqDate,responseBy,uploadUrl,_appCtx.company);
        const pdfBase64=await buildRfqPdf(group,projectName,rfqNum,rfqDate,responseBy,_appCtx.company).catch(()=>null);
        const pdfName=`${rfqNum}-${(group.vendorName||"Supplier").replace(/[^a-z0-9]/gi,"_")}.pdf`;
        await sendGraphEmail(graphToken,to,subject,html,pdfBase64,pdfName);
        setStatuses(prev=>({...prev,[group.vendorName]:{state:"sent"}}));
        group.items.forEach(item=>sentItemIds.push(item.id));
        historyEntries.push({rfqNum,vendorName:group.vendorName,vendorEmail:to,items:group.items.map(i=>({partNumber:i.partNumber,qty:i.qty,id:i.id})),sent:true,skipped:false});
      }catch(e){
        setStatuses(prev=>({...prev,[group.vendorName]:{state:"error",msg:String(e.message||e)}}));
        historyEntries.push({rfqNum:makeRfqNum(group.vendorName),vendorName:group.vendorName,vendorEmail:to,items:group.items.map(i=>({partNumber:i.partNumber,qty:i.qty,id:i.id})),sent:false,skipped:false,error:String(e.message||e)});
      }
    }
    // Save to Firestore history
    if(uid&&historyEntries.length>0){
      const sessionRfqNum=historyEntries.find(e=>e.sent)?.rfqNum||`RFQ-${rfqBase}`;
      fbDb.collection(`users/${uid}/rfq_history`).add({rfqNum:sessionRfqNum,sentAt:Date.now(),projectId:projectId||"",projectName:projectName||"",sentFrom:fromEmail,entries:historyEntries}).catch(e=>console.warn("RFQ history save failed:",e));
      // Save supplier part cross-reference for crossed items
      const allCrossings=[];
      historyEntries.filter(e=>e.sent).forEach(entry=>{
        const grp=groups.find(g=>g.vendorName===entry.vendorName);
        if(!grp)return;
        grp.items.filter(i=>i.crossedFrom).forEach(i=>{
          allCrossings.push({origPartNumber:i.crossedFrom,bcPartNumber:i.partNumber,description:i.description||"",manufacturer:i.manufacturer||"",vendorName:grp.vendorName,rfqNum:entry.rfqNum||"",rfqDate:Date.now()});
        });
      });
      if(allCrossings.length>0){
        fbDb.doc(`users/${uid}/config/supplierCrossRef`).set({records:firebase.firestore.FieldValue.arrayUnion(...allCrossings)},{merge:true}).catch(e=>console.warn("CrossRef save failed:",e));
      }
    }
    setSending(false);setDone(true);
    if(sentItemIds.length>0&&onSent)onSent(sentItemIds);
    if(shouldPrint&&onPrint)onPrint(groups);
  }
  const stColors={sent:"#4ade80",error:"#f87171",skipped:"#64748b",sending:"#818cf8"};
  const stLabel=st=>st?.state==="sending"?"⏳ Sending…":st?.state==="sent"?"✓ Sent":st?.state==="error"?`✗ ${st.msg||"Failed"}`:st?.state==="skipped"?"— Skipped":null;
  return ReactDOM.createPortal(
    <>
    {previewGroup&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:10001,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:1440,background:"#fff",borderRadius:10,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.8)",display:"flex",flexDirection:"column",maxHeight:"calc(100vh - 80px)"}}>
          <div style={{background:"#1e1b4b",padding:"10px 16px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#a5b4fc",fontWeight:700,fontSize:13,flex:1}}>Preview: {previewGroup.vendorName} — {_makeRfqNum(previewGroup.vendorName)}</span>
            <button onClick={()=>setPreviewGroup(null)} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:18,lineHeight:1,padding:"2px 6px"}}>✕</button>
          </div>
          <iframe srcDoc={buildRfqEmailHtml(previewGroup,projectName,_makeRfqNum(previewGroup.vendorName),_rfqDate,_responseBy,null,_appCtx.company)} style={{flex:1,border:"none",minHeight:1000}} title="RFQ Preview"/>
        </div>
        <div style={{marginTop:12}}>
          <button onClick={()=>setPreviewGroup(null)} style={{background:"#1e1b4b",border:"1px solid #4f46e5",color:"#a5b4fc",padding:"7px 24px",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600}}>Close Preview</button>
        </div>
      </div>
    )}
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#0d0d1a",border:"1px solid #2a2a3e",borderRadius:10,padding:"24px 28px",minWidth:480,maxWidth:600,boxShadow:"0 8px 40px rgba(0,0,0,0.7)"}}>

// ── PO RECEIVED MODAL ──
function PoReceivedModal({project,bcProjectNumber,onClose,onDone}){
  const panels=project.panels||[];
  const [poNumber,setPoNumber]=useState('');
  const [globalDate,setGlobalDate]=useState('');
  const [perPanel,setPerPanel]=useState(false);
  const [shipDates,setShipDates]=useState(()=>{const m={};panels.forEach((p,i)=>{m[i]=p.requestedShipDate||'';});return m;});
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const [errors,setErrors]=useState([]);

  // When global date changes, pre-fill any per-panel slot that hasn't been individually set
  function handleGlobalDate(val){
    setGlobalDate(val);
    if(!perPanel)return;
    setShipDates(prev=>{
      const next={...prev};
      panels.forEach((_,i)=>{if(!next[i]||next[i]===globalDate)next[i]=val;});
      return next;
    });
  }

  // Switching to per-panel mode seeds all rows with the current global date
  function enablePerPanel(){
    if(globalDate){
      setShipDates(prev=>{
        const next={...prev};
        panels.forEach((_,i)=>{if(!next[i])next[i]=globalDate;});
        return next;
      });
    }
    setPerPanel(true);
  }

  async function handleSubmit(){
    if(!poNumber.trim()){alert("Please enter a PO number.");return;}
    if(!bcProjectNumber){alert("No BC Project Number on this project. Cannot write to BC.");return;}
    setSaving(true);setErrors([]);
    const errs=[];
    try{
      const _poFields={External_Document_No:poNumber.trim(),Status:"Open"};
      await bcPatchJobOData(bcProjectNumber,_poFields).catch(e=>{
        if(!_bcToken)bcEnqueue('patchJob',{projectNumber:bcProjectNumber,fields:_poFields},`Update BC project ${bcProjectNumber}`);
        else throw e;
      });
    }catch(e){errs.push("Project header: "+(e.message||e));}
    // Determine which date to use per panel
    for(let i=0;i<panels.length;i++){
      const d=perPanel?(shipDates[i]||globalDate):globalDate;
      if(!d)continue;
      try{
        await bcPatchPanelEndDate(bcProjectNumber,i+1,d);
      }catch(e){errs.push(`Panel ${i+1} end date: `+(e.message||e));}
    }
    setSaving(false);
    if(errs.length>0){setErrors(errs);}
    else{setDone(true);if(onDone)onDone(poNumber.trim());}
  }
  const inp=(extra={})=>({width:"100%",boxSizing:"border-box",background:"#0a0a18",border:"1px solid #2a2a3e",borderRadius:4,padding:"6px 8px",color:"#f1f5f9",fontSize:12,fontFamily:"inherit",outline:"none",...extra});
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#0d0d1a",border:"1px solid #2a2a3e",borderRadius:10,padding:"24px 28px",width:"100%",maxWidth:480,boxShadow:"0 8px 40px rgba(0,0,0,0.7)"}}>
        <div style={{fontSize:15,fontWeight:800,color:"#f1f5f9",marginBottom:4}}>📬 PO Received</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:18}}>Writes PO# to BC External Document No, sets project status to Open, and updates panel ship dates.</div>
        {done?(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:22,marginBottom:8}}>✅</div>
            <div style={{fontSize:14,color:"#4ade80",fontWeight:700,marginBottom:4}}>PO Recorded in BC</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:20}}>PO# <strong style={{color:"#f1f5f9"}}>{poNumber}</strong> written to project {bcProjectNumber}.</div>
            <button onClick={onClose} style={{background:"#1a1a2a",border:"1px solid #2a2a3e",color:"#94a3b8",padding:"7px 20px",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Close</button>
          </div>
        ):(
          <>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:5,fontWeight:600}}>Customer PO Number</div>
              <input value={poNumber} onChange={e=>setPoNumber(e.target.value)} placeholder="e.g. PO-12345" style={inp()} autoFocus/>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>
                  {perPanel?"Ship Dates by Panel":"Requested Ship Date"}
                </div>
                {panels.length>1&&(
                  <button onClick={perPanel?()=>setPerPanel(false):enablePerPanel}
                    style={{background:perPanel?"#1a1a2a":"#0d1a2a",border:`1px solid ${perPanel?"#475569":"#3b82f6"}`,color:perPanel?"#94a3b8":"#60a5fa",fontSize:11,fontWeight:700,cursor:"pointer",padding:"3px 10px",borderRadius:5,fontFamily:"inherit",letterSpacing:0.3}}>
                    {perPanel?"Single Date":"Separate Dates"}
                  </button>
                )}
              </div>
              {!perPanel?(
                <input type="date" value={globalDate} onChange={e=>handleGlobalDate(e.target.value)}
                  style={inp({colorScheme:"dark"})}/>
              ):(
                <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:220,overflowY:"auto"}}>
                  {panels.map((p,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"#111128",border:"1px solid #2a2a3e",borderRadius:6,padding:"8px 10px"}}>
                      <span style={{flex:1,fontSize:12,color:"#f1f5f9",fontWeight:600,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.drawingDesc||p.drawingNo||p.name||`Panel ${i+1}`}</span>
                      <input type="date" value={shipDates[i]||''}
                        onChange={e=>setShipDates(prev=>({...prev,[i]:e.target.value}))}
                        style={inp({width:140,flex:"none",colorScheme:"dark"})}/>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {errors.length>0&&(
              <div style={{background:"#1a0a0a",border:"1px solid #f87171",borderRadius:6,padding:"8px 10px",marginBottom:12}}>
                {errors.map((e,i)=><div key={i} style={{fontSize:11,color:"#f87171"}}>{e}</div>)}
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={onClose} disabled={saving} style={{background:"#1a1a2a",border:"1px solid #2a2a3e",color:"#94a3b8",padding:"7px 16px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
              <button onClick={handleSubmit} disabled={saving||!poNumber.trim()} style={{background:"#0d2010",border:"1px solid #4ade80",color:"#4ade80",padding:"7px 20px",borderRadius:6,cursor:saving?"not-allowed":"pointer",fontSize:13,fontFamily:"inherit",fontWeight:700,opacity:saving||!poNumber.trim()?0.6:1}}>{saving?"Writing to BC…":"Submit PO"}</button>
            </div>
          </>
        )}
      </div>
    </div>
  ,document.body);
}

// ── QUOTE TAB ──
function QuoteTab({project,onUpdate}){
  const [quoteTab,setQuoteTab]=useState("formal");
  const pr=project.pricing||{};
  const bom=project.bom||[];
  // Use pre-computed labor from QuoteView (sums each panel individually, preserving overrides)
  // Fall back to computing from project directly for single-panel or non-aggregated use
  const laborEst=project._quoteLabor||computeLaborEstimate(project);
  const laborHours=laborEst.totalHours;
  const laborRate=pr.laborRate??45;
  const markup=pr.markup??30;
  const contingencyBOM=pr.contingencyBOM??_pricingConfig.contingencyBOM;
  const contingencyConsumables=pr.contingencyConsumables??_pricingConfig.contingencyConsumables;
  const materialCost=bom.reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
  const laborCost=laborEst.totalCost;
  const grandTotal=materialCost+laborCost+contingencyBOM+contingencyConsumables;
  const sellPrice=grandTotal*(1+markup/100);
  const hasSellPrice=sellPrice>0;

  // BUDGETARY: true if any panel has at least one BOM item not yet confirmed in BC
  const isProjectBudgetary=(project.panels||[project]).some(isPanelBudgetary);

  const q=project.quote||{};
  function setQ(updates){onUpdate({...project,quote:{...q,...updates}});}

// ── TITLE BLOCK EXTRACTOR ──
async function extractTitleBlock(dataUrl){
  if(!_apiKey||!dataUrl)return null;
  try{
    const text=await apiCall({
      max_tokens:200,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:dataUrl.split(",")[1]}},
        {type:"text",text:`Look at the title block of this engineering drawing (typically in the bottom-right corner).
Extract exactly three fields:
- Drawing number (labeled DWG NO., DRAWING NO., JOB NO., DWG #, SHEET, or similar)
- Drawing title or description (the main name/description of what is shown)
- Revision (labeled REV, REVISION, REV NO., REV LETTER — typically a letter like A, B, C or a number; empty string if not shown)
Return ONLY valid JSON, no extra text: {"drawingNo":"...","drawingDesc":"...","drawingRev":"..."}`}
      ]}]
    });
    const m=text.replace(/```json|```/g,"").trim().match(/\{[\s\S]*?\}/);
    if(!m)return null;
    return JSON.parse(m[0]);
  }catch(e){return null;}
}

// ── CPD PANEL METADATA EXTRACTION ──
// Analyzes ALL pages in batches of 8, merges results into one metadata object
async function extractPanelMetadata(pages){
  if(!_apiKey||!pages||!pages.length)return null;
  const allPages=pages.filter(p=>(p.dataUrl||p.storageUrl));
  if(!allPages.length)return null;
  const BATCH=8;
  const prompt=`Analyze these control panel engineering drawings (schematics, layouts, title blocks, BOM pages — all page types). Extract every detail you can find.
Return ONLY valid JSON (no markdown):
{
  "panelType": "e.g. Motor Control Panel / PLC Panel / Junction Box / Heater Control / Relay Panel / MCC / Automation Panel",
  "controlledEquipment": "comma-separated list of all equipment mentioned e.g. Clarifier, Thickener, Kiln, Generator, Pump, Conveyor, Trash Rake, Heater, Fan",
  "voltages": {
    "lineVoltage": "e.g. 480V 3PH or 208V 3PH or unknown",
    "controlVoltage": "e.g. 120VAC or 24VDC or unknown",
    "motorVoltage": "e.g. 460V or unknown"
  },
  "plcBrand": "e.g. Allen-Bradley, Siemens, AutomationDirect, or none/unknown",
  "enclosureType": "e.g. NEMA 12, NEMA 4X, or unknown",
  "inputCount": 0,
  "outputCount": 0,
  "motorCount": 0,
  "additionalNotes": "any other relevant details: customer name, project name, location, special requirements, certifications required, environmental conditions"
}`;
  try{
    // Ensure all pages have dataUrl
    const ensured=await Promise.all(allPages.map(ensureDataUrl));
    const withData=ensured.filter(p=>p.dataUrl);
    if(!withData.length)return null;
    // Process in batches, collect partial results
    const partials=[];
    for(let i=0;i<withData.length;i+=BATCH){
      const batch=withData.slice(i,i+BATCH);
      const imageContents=batch.map(p=>({
        type:"image",source:{type:"base64",media_type:"image/jpeg",data:p.dataUrl.split(",")[1]}
      }));
      try{
        const resp=await apiCall({
          max_tokens:700,
          messages:[{role:"user",content:[...imageContents,{type:"text",text:prompt}]}]
        });
        const raw=resp.content[0].text.replace(/```json|```/g,'').trim();
        const m=raw.match(/\{[\s\S]*\}/);
        if(m)partials.push(JSON.parse(m[0]));
      }catch(e){}
    }
    if(!partials.length)return null;
    // Merge: prefer first non-unknown value for each field, sum counts, combine equipment lists
    const merged=partials[0];
    for(let i=1;i<partials.length;i++){
      const p=partials[i];
      if((!merged.panelType||merged.panelType==='unknown')&&p.panelType)merged.panelType=p.panelType;
      if(p.controlledEquipment){
        const existing=new Set((merged.controlledEquipment||'').split(/,\s*/).filter(Boolean));
        p.controlledEquipment.split(/,\s*/).filter(Boolean).forEach(e=>existing.add(e.trim()));
        merged.controlledEquipment=[...existing].join(', ');
      }
      if((!merged.voltages?.lineVoltage||merged.voltages.lineVoltage==='unknown')&&p.voltages?.lineVoltage&&p.voltages.lineVoltage!=='unknown')merged.voltages={...merged.voltages,...p.voltages};
      if((!merged.plcBrand||merged.plcBrand==='unknown')&&p.plcBrand&&p.plcBrand!=='unknown')merged.plcBrand=p.plcBrand;
      if((!merged.enclosureType||merged.enclosureType==='unknown')&&p.enclosureType&&p.enclosureType!=='unknown')merged.enclosureType=p.enclosureType;
      if(p.inputCount>0&&(!merged.inputCount||merged.inputCount<p.inputCount))merged.inputCount=p.inputCount;
      if(p.outputCount>0&&(!merged.outputCount||merged.outputCount<p.outputCount))merged.outputCount=p.outputCount;
      if(p.motorCount>0&&(!merged.motorCount||merged.motorCount<p.motorCount))merged.motorCount=p.motorCount;
      if(p.additionalNotes&&p.additionalNotes!==merged.additionalNotes){
        merged.additionalNotes=[merged.additionalNotes,p.additionalNotes].filter(Boolean).join(' | ');
      }
    }
    return merged;
  }catch(e){return null;}
}

function BCItemBrowserModal({onSelect,onClose,initialQuery,targetRow,pages,syncError}){
  const [query,setQuery]=useState(initialQuery||"");

  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [hasMore,setHasMore]=useState(false);
  const [skip,setSkip]=useState(0);
  const [searched,setSearched]=useState(false);
  const debounceRef=useRef(null);
  const PAGE=25;
  const [showCreate,setShowCreate]=useState(false);
  const [createNumber,setCreateNumber]=useState(initialQuery||"");
  const [createName,setCreateName]=useState(targetRow&&targetRow.description?targetRow.description:"");
  const [createCost,setCreateCost]=useState("");
  const [createCategory,setCreateCategory]=useState("PARTS");
  const [createUom,setCreateUom]=useState("EA");
  const [createVendor,setCreateVendor]=useState("");
  const [creating,setCreating]=useState(false);
  const [createErr,setCreateErr]=useState("");
  const [bcCategories,setBcCategories]=useState([]);
  const [bcUoms,setBcUoms]=useState([]);
  const [bcVendors,setBcVendors]=useState([]);
  const [bcGenProdGroups,setBcGenProdGroups]=useState([]);
  const [bcInvPostingGroups,setBcInvPostingGroups]=useState([]);
  const [createGenProd,setCreateGenProd]=useState("INVENTORY");
  const [createInvPosting,setCreateInvPosting]=useState("RAW MAT");
  const [dropdownsLoaded,setDropdownsLoaded]=useState(false);
  const [croppedDataUrl,setCroppedDataUrl]=useState(null);
  const [locating,setLocating]=useState(false);
  const [drawingPageIdx,setDrawingPageIdx]=useState(0);
  const [vendorNames,setVendorNames]=useState({});
  const [purchaseData,setPurchaseData]=useState({});
  const [customerSupplied,setCustomerSupplied]=useState(false);
  const [editVendorItem,setEditVendorItem]=useState(null); // item.number being edited
  const [editVendorNo,setEditVendorNo]=useState("");
  const [savingVendor,setSavingVendor]=useState(false);
  const [vendorSaveErr,setVendorSaveErr]=useState("");
  const [vendorListLoaded,setVendorListLoaded]=useState(false);
  const bomPages=((pages||[]).filter(p=>getPageTypes(p).includes('bom')&&(p.dataUrl||p.storageUrl)));

  async function locateInDrawing(pgIdx){
    const idx=pgIdx!=null?pgIdx:drawingPageIdx;
    const pg=bomPages[idx];
    if(!pg||!_apiKey)return;
    setLocating(true);setCroppedDataUrl(null);
    try{
      let dataUrl=pg.dataUrl;
      if(!dataUrl&&pg.storageUrl){const loaded=await ensureDataUrl(pg);dataUrl=loaded.dataUrl;}
      if(!dataUrl)return;
      const b64=dataUrl.split(',')[1];
      if(!b64)return;
      const pn=(targetRow?.partNumber||initialQuery||'').trim();
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:120,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:`This is a BOM table from an electrical panel drawing. Find the row containing the part number "${pn}". Return ONLY JSON, no explanation: {"found":true,"y_top":0.38,"y_bottom":0.42,"x_left":0.50,"x_right":1.0} where y_top/y_bottom are the top/bottom edges of that row as fractions of image height, and x_left/x_right are the left/right edges of the entire BOM TABLE (all columns, excluding any schematic/layout area to the left). If not found return {"found":false}.`}
        ]}]})
      });
      const data=await resp.json();
      const text=data.content?.[0]?.text||'';
      const m=text.match(/\{[\s\S]*?\}/);
      if(m){
        const r=JSON.parse(m[0]);
        if(r.found&&r.y_top!=null&&r.y_bottom!=null){
          await cropRowFromImage(dataUrl,r.y_top,r.y_bottom);
        }
      }
    }catch(e){console.warn('locateInDrawing:',e);}
    finally{setLocating(false);}
  }

  function cropRowFromImage(dataUrl,yTop,yBottom){
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{
        const W=img.naturalWidth,H=img.naturalHeight;
        // Full drawing width — no horizontal crop (BOM table position varies)
        // The container auto-scrolls to the right where BOM tables always are
        const srcX=0;
        const srcW=W;
        // Vertical crop — tight strip around the row
        const vPad=0.015;
        const cropTop=Math.max(0,yTop-vPad);
        const cropBottom=Math.min(1,yBottom+vPad);
        const srcY=Math.round(cropTop*H);
        const srcRowH=Math.round((yBottom-yTop)*H);
        const srcH=Math.round((cropBottom-cropTop)*H);
        // Scale so the row renders at ~50px tall — natural width, container scrolls right
        const scale=Math.max(1,50/Math.max(srcRowH,1));
        const canvasW=Math.round(srcW*scale);
        const canvasH=Math.round(srcH*scale);
        const canvas=document.createElement('canvas');
        canvas.width=canvasW;canvas.height=canvasH;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,srcX,srcY,srcW,srcH,0,0,canvasW,canvasH);
        // Highlight the row
        const rowTopC=Math.round(((yTop-cropTop)/(cropBottom-cropTop))*canvasH);
        const rowBotC=Math.round(((yBottom-cropTop)/(cropBottom-cropTop))*canvasH);
        const rowH=Math.max(3,rowBotC-rowTopC);
        ctx.fillStyle='rgba(253,224,71,0.22)';
        ctx.fillRect(0,rowTopC,canvasW,rowH);
        ctx.strokeStyle='#fde047';ctx.lineWidth=2;
        ctx.strokeRect(1,rowTopC+1,canvasW-2,rowH-2);
        setCroppedDataUrl(canvas.toDataURL('image/jpeg',0.95));
        resolve();
      };
      img.onerror=resolve;
      img.src=dataUrl;
    });
  }

  useEffect(()=>{
    // If extraction stored valid coordinates, use them directly — no API call needed
    const hasValidCoords=bomPages.length&&targetRow?.y_top!=null&&targetRow?.y_bottom!=null&&(targetRow.y_bottom-targetRow.y_top)>0.001;
    if(hasValidCoords){
      const pgIdx=targetRow.sourcePageIdx??0;
      setDrawingPageIdx(pgIdx);
      const pg=bomPages[pgIdx]||bomPages[0];
      if(pg){
        setLocating(true);
        const doLoad=async()=>{
          try{
            let dataUrl=pg.dataUrl;
            if(!dataUrl&&pg.storageUrl){const loaded=await ensureDataUrl(pg);dataUrl=loaded.dataUrl;}
            if(dataUrl)await cropRowFromImage(dataUrl,targetRow.y_top,targetRow.y_bottom);
          }catch(e){console.warn('cropRowFromImage:',e);}finally{setLocating(false);}
        };
        doLoad();
      }
    } else if(bomPages.length&&_apiKey){
      const pgIdx=targetRow?.sourcePageIdx??0;
      locateInDrawing(pgIdx);
    }
  },[]);

  async function doSearch(append=false,overrideQuery){
    const q=overrideQuery!==undefined?overrideQuery:query;
    const s=append?skip:0;
    if(!q.trim()||q.trim().length<3){
      if(!append){setResults([]);setSearched(false);setHasMore(false);}
      return;
    }
    setLoading(true);
    const r=await bcSearchItems(q,{field,top:PAGE,skip:s});

      setVendorSaveErr(e.message||"Failed to update vendor");

    setSavingVendor(false);

  const backdropMdRef=useRef(false);
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onMouseDown={e=>{backdropMdRef.current=e.target===e.currentTarget;}}
      onClick={e=>{if(backdropMdRef.current)onClose();}}>
      <div style={{...card(),width:"100%",maxWidth:860,maxHeight:"90vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>

          function friendlyErr(e){
            if(/must select an existing item/i.test(e))return"This part number does not exist in BC. Search for the correct item below, or create a new item.";
            if(/Gen\.?\s*Prod\.?\s*Posting Group must have a value/i.test(e))return"The BC item is missing its Gen. Prod. Posting Group.";
            if(/Inventory Posting Group must have a value/i.test(e))return"The BC item is missing its Inventory Posting Group.";
            if(/posting group/i.test(e))return"The BC item is missing a required Posting Group field.";
            if(/429|Too Many/i.test(e))return"BC rate limit was hit during sync — retry sync from the panel.";
            if(/field.*validation/i.test(e))return"A required BC item field failed validation.";
            const m=e.match(/"message":"([^"]{0,160})/);
            return m?m[1]:"BC returned an error when pushing this item.";
          }
          const msg=friendlyErr(e);
          return(
            <div style={{marginBottom:10,background:isBcSetup?"#1a0900":"#160a0a",border:`1px solid ${C.red}`,borderRadius:8,padding:"10px 14px",fontSize:12,display:"flex",flexDirection:"column",gap:4}}>

// ── STAMPED DRAWING — burns overlay text into canvas so it persists in screenshots/prints ──
function StampedDrawing({src,overlay,width,height,onClick}){
  width=width||420;height=height||381;
  const canvasRef=React.useRef();
  React.useEffect(()=>{
    if(!src)return;
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      canvas.width=width;canvas.height=height;
      ctx.fillStyle='#080810';ctx.fillRect(0,0,width,height);
      ctx.drawImage(img,0,0,width,height);
      if(overlay){
        const barH=14;
        ctx.fillStyle='rgba(255,255,255,0.88)';ctx.fillRect(0,0,width,barH);
        ctx.fillStyle='#cc0000';ctx.fillRect(0,barH-1,width,1);
        ctx.font='bold 11px Arial,sans-serif';ctx.fillStyle='#cc0000';ctx.textBaseline='middle';
        const y=barH/2;
        ctx.textAlign='left';ctx.fillText((overlay.left||'').slice(0,40),6,y);
        ctx.textAlign='center';ctx.fillText(overlay.center||'',width/2,y);
        ctx.textAlign='right';ctx.fillText((overlay.right||'').slice(0,50),width-6,y);
      }
    };
    img.onerror=()=>{const c=canvasRef.current;if(!c)return;c.getContext('2d').fillStyle='#080810';c.getContext('2d').fillRect(0,0,width,height);};
    img.src=src;
  },[src,JSON.stringify(overlay),width,height]);
  return <canvas ref={canvasRef} width={width} height={height} onClick={onClick} style={{borderRadius:6,display:'block',cursor:'zoom-in'}}/>;
}

// ── PANEL CARD (inline workspace) ──
function PanelCard({panel,idx,uid,projectId,projectName,bcProjectNumber,bcDisconnected,readOnly,onDelete,onUpdate,onSaveImmediate,onViewQuote,onPrintRfq,onSendRfqEmails,rfqLoading,onOpenSupplierQuote,isSelected,onSelect,quoteData}){
  const [dragging,setDragging]=useState(false);
  const [processing,setProcessing]=useState(false);
  const [processingMsg,setProcessingMsg]=useState("");
  const [detecting,setDetecting]=useState(false);
  const [detectProgress,setDetectProgress]=useState("");
  const [awaitingConfirm,setAwaitingConfirm]=useState(false);
  const [extractionNotes,setExtractionNotes]=useState(panel.extractionNotes||"");
  const pendingNewItemsRef=useRef([]);
  const pageTypeChangesRef=useRef({});
  const learningExamplesRef=useRef([]);
  const latestPanelRef=useRef(panel);
  const [reasonPickerFor,setReasonPickerFor]=useState(null);
  const [extracting,setExtracting]=useState(false);
  const ep=useSmoothProgress();
  const bgTasks=useBgTasks();
  const bgTask=bgTasks[panel.id];
  // Restore extracting spinner if a bg task is still running when this panel mounts
  useEffect(()=>{if(bgTask?.status==="running")setExtracting(true);},[]);
  // Progress bar: use bgTask (persists navigation) or ep (for re-extract/validate flows)
  const extractProgress=(bgTask?.status==="running"||bgTask?.status==="done")?{pct:bgTask.pct||0,msg:bgTask.msg}:ep.progress;
  // Unified progress: pricing takes priority when active, then extraction, then null
  const _showExtract=extractProgress&&(!awaitingConfirm||detecting);
  // When aiPricing=true, guarantee a non-null value even if pricingProgress state hasn't synced yet
  const _activePricing=aiPricing?(pricingProgress||{msg:"Getting prices…",pct:5}):pricingProgress;
  const _rawUnified=_activePricing||(_showExtract?extractProgress:null);
  const unifiedProgress=_rawUnified?{..._rawUnified,isError:_rawUnified.isError||bgTask?.status==="error"}:null;
  const [lightboxId,setLightboxId]=useState(null);
  const [showCompliance,setShowCompliance]=useState(false);
  const [draftName,setDraftName]=useState(panel.name||"");
  const [draftNo,setDraftNo]=useState((panel.drawingNo||"").slice(0,25));
  const [draftDesc,setDraftDesc]=useState(panel.drawingDesc||"");
  const [draftRev,setDraftRev]=useState(panel.drawingRev||"");
  const [draftShipDate,setDraftShipDate]=useState(panel.requestedShipDate||"");
  const [draftLineQty,setDraftLineQty]=useState(panel.lineQty??1);
  const [bcSyncing,setBcSyncing]=useState(false);
  const [bcSyncStatus,setBcSyncStatus]=useState(null); // null | "ok" | "error"

          await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;

  function parseLaborFeedback(text){
    const updates={};
    const t=text.toLowerCase();
    // Wire count: "X wires", "base labor off X wires", "wire count is X", "X wire terminations"
    const wireMatch=t.match(/\b(\d+)\s*wire(?:s|[\s-]terminations?|[\s-]count)?/);
    if(wireMatch){
      const wires=parseInt(wireMatch[1]);
      const hours=computeFallbackLaborHours(wires);
      updates.laborHoursOverride=hours;
      updates._wiresUsed=wires;
    }
    // Direct hour override: "X hours", "use X labor hours", "set hours to X"
    const hoursMatch=t.match(/\b(\d+(?:\.\d+)?)\s*(?:labor\s+)?hours?\b/);
    if(hoursMatch&&!wireMatch){
      updates.laborHoursOverride=parseFloat(hoursMatch[1]);
    }
    // Labor rate: "$X/hr", "rate is $X", "labor rate X"
    const rateMatch=t.match(/\$\s*(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r|per\s+hour)/)||
                    t.match(/labor\s+rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)/)||
                    t.match(/rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r)?/);
    if(rateMatch){updates.laborRate=parseFloat(rateMatch[1]);}
    const {_wiresUsed,...pricingUpdates}=updates;
    return Object.keys(pricingUpdates).length>0?{pricingUpdates,wires:_wiresUsed||null}:null;
  }

  function commitBcItem(bomRowId,bcItem,asCross,correctionType=null){
    const bom=(panel.bom||[]).map(r=>{
      if(r.id!==bomRowId)return r;
      const origPN=(r.crossedFrom||r.correctionFrom||r.partNumber||"").trim();
      const newPN=bcItem.number;
      const updates={...r,...(newPN?{partNumber:newPN}:{}),unitPrice:bcItem.unitCost,priceSource:"bc",priceDate:Date.now()};
      if(bcItem._customerSupplied){updates.customerSupplied=true;updates.unitPrice=0;}
      if(bcItem._vendorName)updates.bcVendorName=bcItem._vendorName;
      // Async vendor lookup — don't block commit
      if(!updates.bcVendorName&&newPN){(async()=>{const vNo=await bcGetItemVendorNo(newPN);if(vNo){const name=await bcGetVendorName(vNo);if(name){const bom2=(panel.bom||[]).map(r2=>r2.id===bomRowId?{...r2,bcVendorName:name}:r2);const u2={...panel,bom:bom2};onUpdate(u2);try{onSaveImmediate(u2);}catch(e){}}}})().catch(()=>{});}
      if(asCross){
        updates.isCrossed=true;updates.crossedFrom=origPN;
        delete updates.isCorrection;delete updates.correctionType;delete updates.correctionFrom;
      }else{
        updates.isCorrection=true;updates.correctionType=correctionType;updates.correctionFrom=origPN;
        delete updates.isCrossed;delete updates.crossedFrom;
      }
      if(bcItem.displayName&&!r.description)updates.description=bcItem.displayName;
      if(bcItem._vendorName&&!r.manufacturer)updates.manufacturer=bcItem._vendorName;
      if(asCross){
        // autoReplace:true — ARC selection immediately trains the learning database
        saveAlternateEntry(uid,origPN,{partNumber:newPN,description:bcItem.displayName||r.description||"",unitCost:bcItem.unitCost},true)
          .then(alts=>setAlternates([...alts])).catch(()=>{});
      }else if(correctionType){
        saveCorrectionEntry(uid,origPN,newPN,correctionType).then(()=>{}).catch(()=>{});
      }
      return updates;
    });
    const updated={...panel,bom};
    onUpdate(updated);
    try{onSaveImmediate(updated);}catch(e){}

      const next={...prev};delete next[bomRowId];
      const patched={...panel,bom,bcFuzzySuggestions:Object.keys(next).length?next:undefined};

  async function runPricingOnPanel(bomOverride,panelOverride,onEpProgress){
    const bom=bomOverride||panel.bom||[];
    if(!bom.length||!_apiKey)return;
    if(pricingClearTimer.current){clearTimeout(pricingClearTimer.current);pricingClearTimer.current=null;}
    const _pp=(o)=>{setPricingProgress(o);if(onEpProgress)onEpProgress(o.pct);};
    setAiPricing(true);_pp({msg:"Getting prices…",pct:5});
    let updatedBom=[...bom];
    let bcCount=0;

    // Phase 1: Business Central lookup
    if(!_bcToken){
      _pp({msg:"Trying silent BC login…",pct:5});
      try{await Promise.race([acquireBcToken(false),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),5000))]);}
      catch(e){_pp({msg:"BC silent login skipped — using AI…",pct:5});}
    }
    if(_bcToken){
      _pp({msg:"BC: Getting company ID…",pct:5});
      try{
        const compId=await bcGetCompanyId();
        if(!compId){
          _pp({msg:"BC: Company not found — falling back to AI…",pct:10});
        }else{
          // Rows already BC-priced but missing bcPoDate — just backfill PO date, no re-match
          const needPoDate=bom.filter(r=>r.priceSource==="bc"&&!r.isLaborRow&&!("bcPoDate"in r)&&(r.partNumber||"").trim());
          if(needPoDate.length){
            _pp({msg:`BC: Backfilling PO dates for ${needPoDate.length} items…`,pct:7});
            const poMap={};
            for(let i=0;i<needPoDate.length;i++){
              const pn=(needPoDate[i].partNumber||"").trim();
              _pp({msg:`BC: PO date ${i+1}/${needPoDate.length}: ${pn}`,pct:7+Math.round((i/needPoDate.length)*20)});
              const lp=await bcGetLastPurchase(pn);
              poMap[String(needPoDate[i].id)]=lp?new Date(lp.postingDate).getTime():null;
            }
            updatedBom=updatedBom.map(r=>{const key=String(r.id);return key in poMap?{...r,bcPoDate:poMap[key]}:r;});
          }
          // When called from Refresh button (no bomOverride), re-check bc rows too so updated costs are picked up
          const eligible=bom.filter(r=>{if(r.isLaborRow)return false;const ps=r.priceSource;if(ps==="manual"&&bomOverride)return false;if(ps==="bc"&&bomOverride)return false;return true;});
          _pp({msg:`BC: Fuzzy-matching ${eligible.length} items…`,pct:27});
          await bcGetVendorMap();
          const bcMap={};
          const fuzzySugg={};
          for(let i=0;i<eligible.length;i++){
            const row=eligible[i];
            const pn=(row.partNumber||"").trim();
            if(!pn)continue;
            _pp({msg:`BC: ${row.priceSource==="bc"?"Refreshing":"Fuzzy lookup"} ${i+1}/${eligible.length}: ${pn}`,pct:27+Math.round((i/eligible.length)*20)});
            // Already bc-priced: exact lookup to get current cost (don't fuzzy-match, avoid changing part number)
            if(row.priceSource==="bc"){
              const exact=await bcLookupItem(pn);
              if(exact&&exact.unitCost!=null){
                const vNo=await bcGetItemVendorNo(pn);
                const lp=await bcGetLastPurchase(pn);
                bcMap[String(row.id)]={unitPrice:exact.unitCost,source:"bc",bcDisplayName:exact.displayName,bcInventory:exact.inventory,bcNumber:pn,bcVendorName:vNo?await bcGetVendorName(vNo):"",bcPoDate:lp?new Date(lp.postingDate).getTime():null};
              }
              continue;
            }
            const result=await bcFuzzyLookup(pn);
            if(result.match&&result.match.unitCost!=null){
              const matchNo=result.match.number||pn;
              const vNo=await bcGetItemVendorNo(matchNo);
              const lp=await bcGetLastPurchase(matchNo);
              bcMap[String(row.id)]={unitPrice:result.match.unitCost,source:"bc",bcDisplayName:result.match.displayName,bcInventory:result.match.inventory,bcNumber:matchNo,bcVendorName:vNo?await bcGetVendorName(vNo):"",bcPoDate:lp?new Date(lp.postingDate).getTime():null};
            } else if(result.suggestions.length>0){
              fuzzySugg[String(row.id)]=result.suggestions;
            }
          }
          bcCount=Object.keys(bcMap).length;
          updatedBom=updatedBom.map(r=>{
            const key=String(r.id);
            if(key in bcMap){return{...r,partNumber:bcMap[key].bcNumber||r.partNumber,unitPrice:bcMap[key].unitPrice,priceSource:"bc",priceDate:Date.now(),bcVendorName:bcMap[key].bcVendorName||r.bcVendorName||"",bcPoDate:bcMap[key].bcPoDate};}
            return r;
          });
          if(Object.keys(fuzzySugg).length>0){
            setBcFuzzySuggestions(prev=>({...prev,...fuzzySugg}));
          }
          const fuzzyCount=Object.keys(fuzzySugg).length;
          _pp({msg:`BC: ${bcCount} matched${fuzzyCount>0?`, ${fuzzyCount} need review`:""} of ${eligible.length}. AI for the rest…`,pct:40});
        }
      }catch(ex){
        console.warn("BC pricing phase failed:",ex);
        _pp({msg:`BC failed: ${ex.message||ex} — falling back to AI…`,pct:10});
      }
    }

    // Phase 2: AI fallback for items not priced by BC
    const unpricedBom=updatedBom.filter(r=>r.priceSource!=="bc"&&r.priceSource!=="manual");
    if(unpricedBom.length>0){
      const BATCH=20;
      const total=Math.ceil(unpricedBom.length/BATCH);
      for(let i=0;i<unpricedBom.length;i+=BATCH){
        const batchIdx=Math.floor(i/BATCH);
        const basePct=_bcToken?45:5;
        const pctRange=_bcToken?45:90;
        _pp({msg:`AI pricing ${i+1}–${Math.min(i+BATCH,unpricedBom.length)} of ${unpricedBom.length} remaining items…`,pct:basePct+Math.round((batchIdx/total)*pctRange)});
        const batch=unpricedBom.slice(i,i+BATCH);
        try{
          const map=await estimatePrices(batch);
          updatedBom=updatedBom.map(r=>{
            const key=String(r.id);
            if(key in map&&r.priceSource!=="bc"&&r.priceSource!=="manual"){
              const ai=map[key];
              return{...r,unitPrice:ai.unitPrice,priceSource:ai.unitPrice!=null?"ai":r.priceSource||null,aiSources:ai.sources||[],aiBasis:ai.basis||""};
            }
            return r;
          });
        }catch(ex){setAiPricing(false);_pp({msg:`Pricing error: ${(ex.message||"failed").slice(0,60)}`,pct:0,isError:true});return;}
      }
    }

    const panelBase=panelOverride||panelRef.current;
    const mergedFuzzy={...(panelBase.bcFuzzySuggestions||{}),...bcFuzzySuggestions};
    const updated={...panelBase,bom:updatedBom,status:"costed",bcFuzzySuggestions:Object.keys(mergedFuzzy).length?mergedFuzzy:undefined};
    onUpdate(updated);
    try{await onSaveImmediate(updated);}catch(e){}
    const aiCount=updatedBom.filter(r=>r.priceSource==="ai").length;
    const totalPriced=updatedBom.filter(r=>r.unitPrice!=null).length;
    _pp({msg:`✓ ${totalPriced} of ${bom.length} priced${bcCount>0?` (${bcCount} BC, ${aiCount} AI est.)`:""}.`,pct:100});
    setAiPricing(false);
    pricingClearTimer.current=setTimeout(()=>{setPricingProgress(null);pricingClearTimer.current=null;},4000);
  }
  async function validatePanel(){
    if(!_apiKey)return;
    setValidatingPanel(true);
    const valPages=(panel.pages||[]).filter(p=>["schematic","backpanel","enclosure","layout"].some(t=>getPageTypes(p).includes(t))&&(p.dataUrl||p.storageUrl));
    ep.start("Validating…",valPages.length*20);
    try{
      const result=await runPanelValidation(panel,pct=>{ep.set(Math.round(pct*0.45),"Validating…");});
      let updated=panel;
      if(result.validation||result.laborData){
        const bom=appendDefaultBomItems(panel.bom||[]);
        updated={...panel,bom,...(result.validation?{validation:result.validation}:{}),...(result.laborData?{laborData:result.laborData}:{}),status:"validated"};
        onUpdate(updated);
        try{await onSaveImmediate(updated);}catch(e){}
      }
      setValidatingPanel(false);
      // Continue into pricing — keep ep alive, no gap in the bar
      if((updated.bom||[]).length>0&&_apiKey){
        ep.set(48,"Getting prices…");
        try{await runPricingOnPanel(updated.bom,updated,pct=>{ep.set(48+Math.round(pct*0.50),null);});}catch(e){}
      }
      ep.finish("✓ Complete");
    }catch(e){
      console.error("Validation error:",e);
      ep.finish("Validation failed");
      setValidatingPanel(false);
    }
  }
  function exportCSV(){
    const sourceLabel=s=>s==="bc"?"BC":s==="ai"?"AI":s==="manual"?"Manual":"";

    const rows=[header,...(panel.bom||[]).map(r=>[

      r.unitPrice!=null?"$"+Number(r.unitPrice).toFixed(2):"",

    ])];
    const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`${(panel.drawingNo||panel.name||"BOM").replace(/[^a-z0-9]/gi,"_")}_BOM.csv`;
    a.click();
  }
