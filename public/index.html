// ── DASHBOARD ──
// ── ARC AI DATABASE PAGE (admin only) ──
function AIDatabasePage({uid,onBack}){
  const [cpd,setCpd]=useState(null);
  const [loading,setLoading]=useState(true);
  const [editingId,setEditingId]=useState(null);
  const [editNotes,setEditNotes]=useState("");
  const [saving,setSaving]=useState(false);
  const [filter,setFilter]=useState("");
  const [catalogOpen,setCatalogOpen]=useState(false);

  useEffect(()=>{
    loadCPD(uid).then(data=>{setCpd(data);setLoading(false);}).catch(()=>setLoading(false));
  },[uid]);

  async function saveAdminNotes(panelId){
    setSaving(true);
    const panels=(cpd.panels||[]).map(p=>p.panelId===panelId?{...p,adminNotes:editNotes}:p);
    const updated={...cpd,panels};
    await saveCPD(uid,updated);
    setCpd(updated);
    setSaving(false);
    setEditingId(null);
  }

  if(loading)return<div style={{padding:40,color:C.muted,fontSize:14}}>Loading ARC AI Database…</div>;
  const panels=cpd?.panels||[];
  const products=cpd?.products||[];

  // Group panels by controlled equipment
  const groups={};
  panels.forEach(p=>{
    const equip=(p.controlledEquipment||'Unclassified').split(/,\s*/)[0].trim()||'Unclassified';
    if(!groups[equip])groups[equip]=[];
    groups[equip].push(p);
  });
  const sorted=Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0]));
  const filterLow=filter.toLowerCase();
  const filteredSorted=filter?sorted.map(([g,ps])=>[g,ps.filter(p=>{
    const hay=JSON.stringify(p).toLowerCase();
    return hay.includes(filterLow);
  })]).filter(([,ps])=>ps.length):sorted;

  return(
    <div style={{padding:"24px 32px",maxWidth:1400,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
        <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:12,padding:"5px 12px",cursor:"pointer"}}>← Back</button>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:"#a78bfa",letterSpacing:1}}>🧠 ARC AI DATABASE</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{panels.length} panels cataloged · {products.length} unique parts</div>
        </div>
        <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Filter by any field…"
          style={{marginLeft:"auto",background:"#0a0a16",border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:12,padding:"6px 12px",width:240,outline:"none"}}/>
      </div>

      {filteredSorted.length===0&&(
        <div style={{color:C.muted,fontSize:13,padding:"40px 0",textAlign:"center"}}>No panel data yet. Extractions will appear here automatically as panels are scanned.</div>
      )}

      {filteredSorted.map(([equipType,panelGroup])=>(
        <div key={equipType} style={{marginBottom:32}}>
          <div style={{fontSize:13,fontWeight:800,color:"#a78bfa",textTransform:"uppercase",letterSpacing:1,marginBottom:10,paddingBottom:6,borderBottom:`1px solid #a78bfa33`,display:"flex",alignItems:"center",gap:8}}>
            <span>⚡</span>{equipType}
            <span style={{fontSize:11,fontWeight:400,color:C.muted}}>({panelGroup.length} panel{panelGroup.length!==1?"s":""})</span>
          </div>
          {panelGroup.map(p=>(
            <div key={p.panelId} style={{background:"#0d0d1a",border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 18px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
                {/* Panel identity */}
                <div style={{minWidth:200,flex:"0 0 auto"}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:2}}>{p.panelName||p.drawingNo||'Unnamed Panel'}</div>
                  <div style={{fontSize:11,color:C.muted}}>{p.drawingNo&&<span style={{color:C.accent}}>{p.drawingNo} </span>}{p.panelType&&<span style={{color:C.sub}}>{p.panelType}</span>}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{p.scannedAt?new Date(p.scannedAt).toLocaleDateString():''}</div>
                </div>
                {/* Equipment + voltages */}
                <div style={{flex:1,minWidth:180}}>
                  {p.controlledEquipment&&<div style={{fontSize:11,color:C.sub,marginBottom:3}}><span style={{color:C.muted}}>Equipment: </span>{p.controlledEquipment}</div>}
                  {p.voltages&&(p.voltages.lineVoltage||p.voltages.controlVoltage)&&(
                    <div style={{fontSize:11,color:C.sub,marginBottom:3}}>
                      {p.voltages.lineVoltage&&p.voltages.lineVoltage!=='unknown'&&<span style={{marginRight:10}}><span style={{color:C.muted}}>Line: </span>{p.voltages.lineVoltage}</span>}
                      {p.voltages.controlVoltage&&p.voltages.controlVoltage!=='unknown'&&<span style={{marginRight:10}}><span style={{color:C.muted}}>Control: </span>{p.voltages.controlVoltage}</span>}
                      {p.voltages.motorVoltage&&p.voltages.motorVoltage!=='unknown'&&<span><span style={{color:C.muted}}>Motor: </span>{p.voltages.motorVoltage}</span>}
                    </div>
                  )}
                  {p.enclosureType&&p.enclosureType!=='unknown'&&<div style={{fontSize:11,color:C.sub,marginBottom:3}}><span style={{color:C.muted}}>Enclosure: </span>{p.enclosureType}</div>}
                  {p.plcBrand&&p.plcBrand!=='unknown'&&<div style={{fontSize:11,color:C.sub}}><span style={{color:C.muted}}>PLC: </span>{p.plcBrand}</div>}
                </div>
                {/* Specs */}
                <div style={{flex:"0 0 auto",display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-start"}}>
                  {[
                    {label:"Items",val:p.specs?.itemCount,color:C.accent},
                    {label:"Motors",val:p.specs?.motorCount,color:"#fb923c"},
                    {label:"PLC In",val:p.specs?.plcInputs,color:C.green},
                    {label:"PLC Out",val:p.specs?.plcOutputs,color:"#f472b6"},
                    {label:"Processors",val:p.specs?.plcProcessors,color:"#93c5fd"},
                  ].filter(s=>s.val>0).map(s=>(
                    <div key={s.label} style={{background:s.color+'18',border:`1px solid ${s.color}44`,borderRadius:6,padding:"4px 8px",textAlign:"center",minWidth:52}}>
                      <div style={{fontSize:14,fontWeight:800,color:s.color,lineHeight:1}}>{s.val}</div>
                      <div style={{fontSize:9,color:s.color,opacity:0.8,marginTop:2,letterSpacing:0.3}}>{s.label.toUpperCase()}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* BOM categories summary */}
              {p.bomSummary&&p.bomSummary.length>0&&(()=>{
                const cats={};
                p.bomSummary.forEach(r=>{cats[r.category]=(cats[r.category]||0)+1;});
                return(
                  <div style={{marginTop:10,display:"flex",gap:5,flexWrap:"wrap"}}>
                    {Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,cnt])=>(
                      <span key={cat} style={{fontSize:10,background:"#1a1a2e",border:`1px solid ${C.border}`,borderRadius:4,padding:"2px 7px",color:C.muted}}>
                        {cat} <span style={{color:C.sub,fontWeight:700}}>{cnt}</span>
                      </span>
                    ))}
                  </div>
                );
              })()}

              {/* Additional notes from extraction */}
              {p.additionalNotes&&(
                <div style={{marginTop:8,fontSize:11,color:C.muted,fontStyle:"italic",lineHeight:1.5,borderTop:`1px solid ${C.border}`,paddingTop:6}}>
                  {p.additionalNotes}
                </div>
              )}

              {/* Admin notes */}
              <div style={{marginTop:10,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                {editingId===p.panelId?(
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",marginBottom:4}}>Admin Notes</div>
                    <textarea value={editNotes} onChange={e=>setEditNotes(e.target.value)} rows={3} autoFocus
                      placeholder="Add additional details, corrections, or learning notes for this panel…"
                      style={{width:"100%",background:"#0a0814",border:"1px solid #a78bfa66",borderRadius:6,color:C.text,fontSize:12,padding:"7px 10px",resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      <button onClick={()=>saveAdminNotes(p.panelId)} disabled={saving}
                        style={btn("#1a0a2a","#a78bfa",{fontSize:12,border:"1px solid #a78bfa66",opacity:saving?0.5:1})}>
                        {saving?"Saving…":"Save Notes"}
                      </button>
                      <button onClick={()=>setEditingId(null)} style={btn(C.border,C.muted,{fontSize:12})}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    {p.adminNotes?(
                      <div style={{flex:1,fontSize:11,color:"#c4b5fd",lineHeight:1.5,background:"#1a0a2a",borderRadius:6,padding:"6px 10px",border:"1px solid #a78bfa33"}}>
                        <span style={{fontSize:10,fontWeight:700,color:"#a78bfa",marginRight:6}}>ADMIN:</span>{p.adminNotes}
                      </div>
                    ):(
                      <div style={{flex:1,fontSize:11,color:C.muted,fontStyle:"italic"}}>No admin notes yet</div>
                    )}
                    <button onClick={()=>{setEditingId(p.panelId);setEditNotes(p.adminNotes||"");}}
                      style={{background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:"#a78bfa",fontSize:11,padding:"3px 10px",cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
                      {p.adminNotes?"Edit Notes":"+ Add Notes"}
                    </button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      ))}

      {/* Products summary */}
      {products.length>0&&(
        <div style={{marginTop:16,paddingTop:24,borderTop:`1px solid ${C.border}`}}>
          <div onClick={()=>setCatalogOpen(o=>!o)}
            style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:catalogOpen?12:0}}>
            <span style={{fontSize:13,transition:"transform 0.15s",display:"inline-block",transform:catalogOpen?"rotate(90deg)":"none",color:"#a78bfa"}}>▸</span>
            <div style={{fontSize:13,fontWeight:800,color:"#a78bfa",textTransform:"uppercase",letterSpacing:1}}>📦 Product Catalog</div>
            <span style={{fontSize:11,color:C.muted,fontWeight:400}}>({products.length} parts)</span>
          </div>
          {catalogOpen&&(
            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:8}}>
                {products.filter(p=>!filter||JSON.stringify(p).toLowerCase().includes(filterLow)).slice(0,100).map(p=>(
                  <div key={p.partNumber} style={{background:"#0d0d1a",border:`1px solid ${C.border}`,borderRadius:6,padding:"9px 12px",fontSize:11}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <span style={{fontWeight:700,color:C.accent}}>{p.partNumber}</span>
                      <span style={{fontSize:9,background:C.border,borderRadius:3,padding:"1px 5px",color:C.muted}}>{p.category}</span>
                      {p.seenCount>1&&<span style={{fontSize:9,color:C.green}}>×{p.seenCount}</span>}
                      {p.enriched&&<span style={{fontSize:9,color:"#a78bfa"}}>✓ enriched</span>}
                    </div>
                    <div style={{color:C.sub,marginBottom:2}}>{p.description}</div>
                    {p.manufacturer&&<div style={{color:C.muted}}>MFR: {p.manufacturer}</div>}
                    {p.shortSpec&&<div style={{color:C.muted,fontStyle:"italic",marginTop:2}}>{p.shortSpec}</div>}
                    {p.enriched&&(p.approvals?.ul||p.approvals?.ce||p.approvals?.csa)&&(
                      <div style={{marginTop:3,display:"flex",gap:4}}>
                        {['ul','ce','csa'].filter(k=>p.approvals[k]&&p.approvals[k]!=='unknown').map(k=>(
                          <span key={k} style={{fontSize:9,background:p.approvals[k]==='yes'?"#14532d":"#1a1a1a",border:`1px solid ${p.approvals[k]==='yes'?"#22c55e":C.border}`,borderRadius:3,padding:"1px 5px",color:p.approvals[k]==='yes'?"#4ade80":C.muted,textTransform:"uppercase"}}>{k}: {p.approvals[k]}</span>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              {products.length>100&&<div style={{fontSize:11,color:C.muted,marginTop:8}}>Showing first 100 of {products.length} parts. Use filter to search.</div>}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── REPORTS MODAL ──
function ReportsModal({uid,onClose}){
  const [records,setRecords]=useState(null);
  const [loading,setLoading]=useState(true);
  const [activeReport,setActiveReport]=useState("crossref");
  useEffect(()=>{
    if(!uid)return;
    fbDb.doc(`users/${uid}/config/supplierCrossRef`).get()
      .then(d=>{setRecords(d.exists?(d.data().records||[]):[]);setLoading(false);})
      .catch(()=>{setRecords([]);setLoading(false);});
  },[uid]);
  const byVendor={};
  (records||[]).forEach(r=>{if(!byVendor[r.vendorName])byVendor[r.vendorName]=[];byVendor[r.vendorName].push(r);});
  const vendorNames=Object.keys(byVendor).sort();
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#0d0d1a",border:"1px solid #2a2a3e",borderRadius:12,width:"100%",maxWidth:960,maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.7)"}}>
        <div style={{padding:"18px 24px",borderBottom:"1px solid #2a2a3e",display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:16,fontWeight:800,color:"#f1f5f9",flex:1}}>📊 Reports</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:20,lineHeight:1,padding:"2px 6px"}}>✕</button>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid #1e293b"}}>
          <button onClick={()=>setActiveReport("crossref")} style={{padding:"10px 20px",background:"none",border:"none",borderBottom:activeReport==="crossref"?"2px solid #3b82f6":"2px solid transparent",color:activeReport==="crossref"?"#60a5fa":"#64748b",cursor:"pointer",fontSize:13,fontWeight:activeReport==="crossref"?700:500}}>Supplier Part Cross-Reference</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px 24px"}}>
          {activeReport==="crossref"&&(<>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16,lineHeight:1.6}}>
              This report tracks the relationship between supplier part numbers (as quoted) and Matrix BC part numbers.<br/>
              It is automatically populated when RFQs are sent for items where a part number crossing exists.<br/>
              <span style={{color:"#475569",fontSize:11}}>Note: In a future release, this data will be stored in Business Central.</span>
            </div>
            {loading?(
              <div style={{textAlign:"center",padding:40,color:"#64748b"}}>Loading…</div>
            ):vendorNames.length===0?(
              <div style={{textAlign:"center",padding:40,color:"#64748b",fontSize:13}}>
                No cross-reference data yet.<br/>
                <span style={{fontSize:12,color:"#475569"}}>This report auto-populates when RFQs are sent for items with crossed (BC) part numbers.</span>
              </div>
            ):vendorNames.map(vendor=>(
              <div key={vendor} style={{marginBottom:28}}>

                    </tr>
                  </thead>
                  <tbody>
                    {byVendor[vendor].sort((a,b)=>(b.rfqDate||0)-(a.rfqDate||0)).map((r,i)=>(
                      <tr key={i} style={{borderBottom:"1px solid #0f1520",background:i%2===0?"transparent":"#0a0a14"}}>
                        <td style={{padding:"7px 10px",fontWeight:700,color:"#f1f5f9",fontFamily:"monospace",fontSize:11}}>{r.origPartNumber||"—"}</td>
                        <td style={{padding:"7px 10px",color:"#60a5fa",fontFamily:"monospace",fontSize:11}}>{r.bcPartNumber||"—"}</td>
                        <td style={{padding:"7px 10px",color:"#94a3b8"}}>{r.description||"—"}</td>
                        <td style={{padding:"7px 10px",color:"#64748b",fontFamily:"monospace",fontSize:11}}>{r.rfqNum||"—"}</td>
                        <td style={{padding:"7px 10px",color:"#64748b",whiteSpace:"nowrap"}}>{r.rfqDate?new Date(r.rfqDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—"}</td>
                      </tr>
                    ))}

            ))}

        <div style={{padding:"12px 24px",borderTop:"1px solid #2a2a3e",display:"flex",justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{background:"#1a1a2a",border:"1px solid #2a2a3e",color:"#94a3b8",padding:"7px 20px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Close</button>
        </div>

}

function Dashboard({uid,userFirstName,memberMap,projects,loading,onOpen,onNew,onDelete,onAccept,onTransfer,onUpdateProject,sqQuery,sqResults,sqSearching,rfqCounts}){
  const [groupBy,setGroupBy]=useState("status");
  const [dragProjectId,setDragProjectId]=useState(null);
  const [dropTarget,setDropTarget]=useState(null);
  const bgTasks=useBgTasks();

  function groupProjects(list){
    if(groupBy==="customer"){
      const map={};
      list.forEach(p=>{
        const key=p.bcCustomerName||"No Customer";
        if(!map[key])map[key]=[];
        map[key].push(p);
      });
      return Object.keys(map).sort((a,b)=>a==="No Customer"?1:b==="No Customer"?-1:a.localeCompare(b)).map(k=>({label:k,items:map[k],customerNumber:map[k].find(p=>p.bcCustomerNumber)?.bcCustomerNumber||null}));
    }
    if(groupBy==="date"){
      const map={};
      const maxTs={};
      list.forEach(p=>{
        const d=p.createdAt||p.updatedAt||0;
        const key=d?new Date(d).toLocaleDateString("en-US",{month:"long",year:"numeric"}):"Unknown Date";
        if(!map[key])map[key]=[];
        map[key].push(p);
        if(d>=(maxTs[key]||0))maxTs[key]=d;
      });
      return Object.keys(map).sort((a,b)=>{
        if(a==="Unknown Date")return 1;
        if(b==="Unknown Date")return -1;
        return (maxTs[b]||0)-(maxTs[a]||0);
      }).map(k=>({label:k,items:map[k]}));
    }
    if(groupBy==="projectnum"){
      const sorted=[...list].sort((a,b)=>{
        const an=a.bcProjectNumber||"";
        const bn=b.bcProjectNumber||"";
        if(!an&&!bn)return 0;
        if(!an)return 1;
        if(!bn)return -1;
        return bn.localeCompare(an,undefined,{numeric:true});
      });
      return [{label:null,items:sorted}];
    }
    if(groupBy==="status"){
      const order=["draft","in_progress","evc","process_rfq","active","purchasing"];
      const labels={draft:"Draft",in_progress:"In Progress",evc:"Ready",process_rfq:"Process RFQs",active:"Active (Ready for Purchasing)",purchasing:"Purchasing In Progress"};
      const map={};
      list.forEach(p=>{
        if((rfqCounts?.[p.id]||0)>0){if(!map.process_rfq)map.process_rfq=[];map.process_rfq.push(p);return;}
        if(p.bcPoStatus==="purchasing"){if(!map.purchasing)map.purchasing=[];map.purchasing.push(p);return;}
        if(p.bcPoStatus==="Open"){if(!map.active)map.active=[];map.active.push(p);return;}
        let st=projectStatus(p);if(st==="extracted"||st==="validated"||st==="costed"||st==="quoted"||st==="pushed_to_bc")st="evc";if(!map[st])map[st]=[];map[st].push(p);
      });
      return order.map(k=>({label:labels[k],items:map[k]||[]}));
    }
    if(groupBy==="imported"){
      return [{label:null,items:list.filter(p=>p.importedFromBC)}];
    }
    if(groupBy==="active"){
      return [{label:"Active (Ready for Purchasing)",items:list.filter(p=>p.bcPoStatus==="Open")}];
    }
    if(groupBy==="purchasing"){
      return [{label:"Purchasing In Progress",items:list.filter(p=>p.bcPoStatus==="purchasing")}];
    }
    return [{label:null,items:list}];
  }

  async function assignCustomer(projectId,customerName,customerNumber){
    const proj=projects.find(p=>p.id===projectId);
    if(!proj||proj.bcCustomerName)return;
    const updated={...proj,bcCustomerName:customerName,bcCustomerNumber:customerNumber,updatedAt:Date.now()};
    await onUpdateProject(updated);
    if(proj.bcProjectNumber&&customerNumber){
      try{
        if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
        if(!_bcToken){_bcToken=await acquireBcToken(true)||null;}
        const _custFields={Bill_to_Customer_No:customerNumber};
        await bcPatchJobOData(proj.bcProjectNumber,_custFields).catch(e=>{
          if(!_bcToken)bcEnqueue('patchJob',{projectNumber:proj.bcProjectNumber,fields:_custFields},`Update BC project ${proj.bcProjectNumber}`);
          else throw e;
        });
      }catch(e){console.warn("BC customer assign failed:",e);}
    }
  }
  const filterBtn=(label,val)=>(
    <button key={val} onClick={()=>setGroupBy(val)} style={{background:groupBy===val?C.accent:"#383850",color:groupBy===val?"#fff":C.muted,border:groupBy===val?`1.5px solid ${C.accent}`:"1.5px solid #7a7a9a",borderRadius:8,padding:"8px 20px",fontSize:14,cursor:"pointer",fontWeight:600,transition:"all 0.15s"}}>
      {label}
    </button>
  );

  return(
    <div style={{maxWidth:2100,margin:"0 auto",padding:32,minWidth:0,width:"100%",boxSizing:"border-box"}}>

      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <div style={{fontSize:26,fontWeight:800,letterSpacing:-0.5}}>Projects</div>
        <button data-tip="Start a new panel extraction project" data-tour="new-project-btn" onClick={onNew} style={btn(C.accent,"#fff",{display:"flex",alignItems:"center",gap:8,fontSize:14})}>
          <span style={{fontSize:18,lineHeight:1}}>+</span> New Project
        </button>
      </div>

      {/* AI Search results are now shown in the floating chat panel above */}

      <div style={{display:"flex",gap:8,marginBottom:groupBy!=="imported"?8:24}}>
        {filterBtn("By Status","status")}
        {filterBtn("By Customer","customer")}
        {filterBtn("By Date","date")}
        {filterBtn("By Project #","projectnum")}
        {filterBtn("Active (Ready for Purchasing)","active")}
        {filterBtn("Purchasing In Progress","purchasing")}
        {filterBtn("Imported","imported")}
        {filterBtn("All","all")}
      </div>

      {loading&&(
        <div style={{textAlign:"center",padding:80,color:C.muted}}>
          <div className="spin" style={{fontSize:24,marginBottom:12}}>◌</div>
          <div>Loading projects…</div>
        </div>
      )}

      {(()=>{
        const myProjects=projects.filter(p=>(!p.transferred||p.transferredTo!==uid)&&(groupBy==="imported"||groupBy==="active"||groupBy==="purchasing"||!p.importedFromBC));
        const transferred=projects.filter(p=>p.transferred&&p.transferredTo===uid);
        const groups=groupProjects(myProjects);
        return(<>
          {!loading&&myProjects.length===0&&transferred.length===0&&(
            <div style={{textAlign:"center",padding:80,color:C.muted}}>
              <div style={{fontSize:52,marginBottom:16,opacity:0.2}}>⬡</div>
              <div style={{fontSize:18,fontWeight:700,color:C.sub,marginBottom:8}}>No projects yet</div>
              <div style={{fontSize:13,marginBottom:24,lineHeight:1.7}}>Upload scanned UL508A drawings to extract<br/>BOM data, validate schematics, and generate quotes.</div>
              <button onClick={onNew} style={btn(C.accent,"#fff")}>Create First Project</button>
            </div>
          )}
          {(groupBy==="customer"||groupBy==="status")?(
            <div style={{display:"flex",gap:16,alignItems:"flex-start",width:"100%",paddingBottom:8}}>
              {groups.map((g,gi)=>{
                const statusColColors={Draft:C.muted,"In Progress":C.yellow,Ready:C.green,"Process RFQs":C.red,"Active (Ready for Purchasing)":"#38bdf8","Purchasing In Progress":"#f59e0b"};
                const statusColBg={Draft:C.border,"In Progress":C.yellowDim,Ready:C.greenDim,"Process RFQs":C.redDim,"Active (Ready for Purchasing)":"#0c2233","Purchasing In Progress":"#1c1200"};
                const colColor=groupBy==="status"?(statusColColors[g.label]||C.muted):C.sub;
                const colBg=groupBy==="status"?(statusColBg[g.label]||C.border):"#2a2a3e";
                const isNoCustomer=groupBy==="customer"&&g.label==="No Customer";
                const isDropTarget=groupBy==="customer"&&!isNoCustomer&&!!g.customerNumber&&!!dragProjectId;
                const isOver=dropTarget===gi;
                return(
                <div key={gi} style={{flex:"1 1 0",minWidth:180}}
                  onDragOver={isDropTarget?e=>{e.preventDefault();setDropTarget(gi);}:undefined}
                  onDragLeave={isDropTarget?e=>{if(!e.currentTarget.contains(e.relatedTarget))setDropTarget(null);}:undefined}
                  onDrop={isDropTarget?e=>{e.preventDefault();setDropTarget(null);if(dragProjectId)assignCustomer(dragProjectId,g.label,g.customerNumber);setDragProjectId(null);}:undefined}>
                  {g.label&&<div style={{background:isOver?C.accent:colBg,color:isOver?"#fff":colColor,borderRadius:8,fontSize:13,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:10,textAlign:"center",height:44,display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxSizing:"border-box",width:"100%",transition:"background 0.15s,color 0.15s",outline:isDropTarget&&dragProjectId?(isOver?"2px solid "+C.accent:"2px dashed "+C.accent+"66"):"none",outlineOffset:2}}><span>{g.label}</span><span style={{opacity:0.6,fontWeight:400}}>({g.items.length})</span></div>}
                  <div style={{display:"flex",flexDirection:"column",gap:8,borderRadius:8,padding:isOver?"6px":"0",background:isOver?"#1e2e1e":"transparent",transition:"background 0.15s,padding 0.15s"}}>
                    {g.items.map(p=>(
                      <ProjectTile key={p.id} p={p} onOpen={onOpen} onDelete={onDelete} onTransfer={onTransfer}
                        onUpdateStatus={onUpdateProject?async(proj,newStatus)=>{const u={...proj,bcPoStatus:newStatus,updatedAt:Date.now()};await onUpdateProject(u);}:undefined}
                        userFirstName={userFirstName} memberMap={memberMap} rfqCount={rfqCounts?.[p.id]||0}
                        draggable={isNoCustomer}
                        onDragStart={isNoCustomer?e=>{e.dataTransfer.effectAllowed="move";setDragProjectId(p.id);}:undefined}
                        onDragEnd={isNoCustomer?()=>{setDragProjectId(null);setDropTarget(null);}:undefined}/>
                    ))}
                  </div>
                </div>
                );
              })}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:32}}>
              {groups.map((g,gi)=>(
                <div key={gi}>
                  {g.label&&<div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>{g.label}</div>}
                  <div data-tour="project-list" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
                    {g.items.map(p=>(
                      <ProjectTile key={p.id} p={p} onOpen={onOpen} onDelete={onDelete} onTransfer={onTransfer} userFirstName={userFirstName} memberMap={memberMap} rfqCount={rfqCounts?.[p.id]||0}/>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
          {transferred.length>0&&(
            <div style={{marginTop:48}}>
              <div style={{fontSize:14,fontWeight:700,color:C.yellow,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Transferred Projects</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:20}}>These projects were transferred to you. Accept them to add them to your project list.</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
                {transferred.map(p=>{
                  const activeTask=Object.values(bgTasks).find(t=>t.projectId===p.id&&(t.status==="running"||t.status==="done"||t.status==="error"));
                  const st=projectStatus(p);
                  const statusColors={draft:C.muted,in_progress:C.yellow,extracted:C.green,validated:C.green,costed:C.green,pushed_to_bc:"#38bdf8"};
                  const statusLabels={draft:"DRAFT",in_progress:"PROCESSING",extracted:"READY",validated:"READY",costed:"READY",pushed_to_bc:"PUSHED TO BC"};
                  return(
                  <div key={p.id} className="fade-in" onClick={()=>onOpen(p)}
                    style={{...card({padding:"10px 14px"}),cursor:"pointer",borderColor:C.yellow+"44",transition:"border-color 0.15s,transform 0.15s",display:"flex",flexDirection:"column"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=C.yellow;e.currentTarget.style.transform="translateY(-2px)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.yellow+"44";e.currentTarget.style.transform="none";}}>
                    <div style={{fontSize:10,color:C.yellow,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>From {p.transferredFrom?.email||"a removed member"}</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.3,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                    {p.bcCustomerName&&<div style={{fontSize:11,color:C.teal,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.bcCustomerName}</div>}
                    <div style={{fontSize:11,color:C.muted,marginBottom:"auto"}}>{p.createdAt?new Date(p.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):p.updatedAt?new Date(p.updatedAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—"}</div>
                    {activeTask&&(
                      <div style={{marginTop:6}}>
                        <div style={{fontSize:10,color:activeTask.status==="error"?C.red:C.accent,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{activeTask.msg}</div>
                        {activeTask.status!=="error"?(
                          <div style={{width:"100%",height:4,background:C.border,borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:(activeTask.pct||0)+"%",background:`linear-gradient(90deg,${C.accent},#818cf8)`,borderRadius:4,transition:"width 0.4s"}}/>
                          </div>
                        ):null}
                      </div>
                    )}
                    <div style={{marginTop:5,marginBottom:6}}><Badge status={st}/></div>
                    <button onClick={e=>{e.stopPropagation();onAccept(p.id);}}
                      style={btn(C.accentDim,C.accent,{width:"100%",fontSize:12,padding:"6px 0",fontWeight:700,border:`1px solid ${C.accent}88`})}>
                      Accept into My Projects
                    </button>
                  </div>
                  );
                })}
              </div>
            </div>
          )}
        </>);
      })()}
    </div>
  );
}

// ── COPY PROJECT MODAL ──
function CopyProjectModal({project,uid,onCopied,onClose}){
  const [name,setName]=useState((project.name||"")+" (Copy)");
  const [copying,setCopying]=useState(false);
  const [progress,setProgress]=useState(null);
  const [error,setError]=useState("");

  async function handleCopy(){
    if(!name.trim())return;
    setCopying(true);setError("");
    try{
      const newProj=await copyProject(uid,{...project,name:name.trim()},p=>setProgress(p));
      onCopied(newProj);
    }catch(e){
      setError(e.message||"Copy failed");
      setCopying(false);setProgress(null);
    }
  }

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}
      onMouseDown={e=>{if(!copying&&e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#0d0d1a",border:"1px solid "+C.accent+"66",borderRadius:10,padding:"24px 28px",width:420,boxShadow:"0 8px 40px rgba(0,0,0,0.7)"}}>
        <div style={{fontSize:15,fontWeight:800,color:C.accent,marginBottom:12}}>Copy Project</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.5}}>
          Creates a new BC project with all panels, BOM data, drawings, tasks, and planning lines copied from <strong style={{color:C.text}}>{project.bcProjectNumber}</strong>.
        </div>
        <label style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4,display:"block"}}>New Project Name</label>
        <input value={name} onChange={e=>setName(e.target.value)} disabled={copying}
          style={{width:"100%",boxSizing:"border-box",background:C.card,border:"1px solid "+C.border,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:14,marginBottom:12,outline:"none"}}
          onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
        <div style={{fontSize:12,color:C.sub,marginBottom:12}}>
          Customer: <strong style={{color:C.text}}>{project.bcCustomerName||"—"}</strong>
        </div>
        {progress&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:progress.step==="done"?C.green:C.accent,marginBottom:4}}>{progress.msg}</div>
            <div style={{width:"100%",height:6,background:C.border,borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:(progress.pct||0)+"%",background:progress.step==="done"?C.green:`linear-gradient(90deg,${C.accent},#818cf8)`,borderRadius:4,transition:"width 0.4s"}}/>
            </div>
          </div>
        )}
        {error&&<div style={{fontSize:12,color:C.red,marginBottom:8}}>{error}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          {!copying&&<button onClick={onClose} style={{background:"transparent",border:"1px solid "+C.border,borderRadius:6,padding:"8px 16px",color:C.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>}
          <button onClick={handleCopy} disabled={copying||!name.trim()}
            style={{background:copying?"#1e293b":C.accent,color:"#fff",border:"none",borderRadius:6,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:copying?"default":"pointer",opacity:copying?0.7:1}}>
            {copying?"Copying…":"Copy Project"}
          </button>
        </div>
      </div>
    </div>,document.body
  );
}

// ── TRANSFER PROJECT MODAL ──
function TransferProjectModal({project,companyId,uid,userEmail,onTransferred,onClose}){
  const [members,setMembers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [recipientUid,setRecipientUid]=useState("");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    if(!companyId){setLoading(false);return;}
    fbDb.collection(`companies/${companyId}/members`).get()
      .then(snap=>{
        const all=snap.docs.map(d=>({uid:d.id,...d.data()})).filter(m=>m.uid!==uid);
        setMembers(all);setLoading(false);
      })
      .catch(e=>{setErr("Failed to load members: "+e.message);setLoading(false);});
  },[companyId]);

  async function doTransfer(){
    if(!recipientUid)return;
    setSaving(true);setErr("");
    try{
      const path=_appCtx.projectsPath||`users/${uid}/projects`;
      await fbDb.doc(`${path}/${project.id}`).update({
        transferred:true,
        transferredTo:recipientUid,
        transferredFrom:{uid,email:userEmail},
        createdBy:recipientUid,
      });
      onTransferred(project.id);
    }catch(e){setErr(e.message);setSaving(false);}
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,padding:24,width:"100%",maxWidth:420,display:"flex",flexDirection:"column",gap:16}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text}}>Transfer Project</div>
        <div style={{fontSize:13,color:C.sub}}>
          Move <span style={{color:C.accent,fontWeight:600}}>{project.name}</span> to another team member. They'll receive it in their Transferred Projects section.
        </div>
        {loading?(
          <div style={{fontSize:13,color:C.muted}}>Loading members…</div>
        ):!companyId?(
          <div style={{fontSize:13,color:C.red}}>You must be in a Company workspace to transfer projects.</div>
        ):members.length===0?(
          <div style={{fontSize:13,color:C.muted}}>No other team members found.</div>
        ):(
          <>
            <div>
              <div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Transfer To</div>
              <select value={recipientUid} onChange={e=>setRecipientUid(e.target.value)}
                style={{width:"100%",background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:recipientUid?C.text:C.muted,fontSize:14}}>
                <option value="">Select a team member…</option>
                {members.map(m=>(
                  <option key={m.uid} value={m.uid}>{m.email} ({m.role})</option>
                ))}
              </select>
            </div>
            {recipientUid&&<div style={{fontSize:11,color:C.muted}}>The project will move out of your list immediately. The recipient can accept it from their dashboard.</div>}
          </>
        )}
        {err&&<div style={{fontSize:12,color:C.red}}>{err}</div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} disabled={saving} style={btn(C.border,C.sub)}>Cancel</button>
          <button onClick={doTransfer} disabled={saving||!recipientUid||loading}
            style={btn(C.accent,"#fff",{opacity:(saving||!recipientUid||loading)?0.5:1})}>
            {saving?"Transferring…":"Transfer"}
          </button>
        </div>
      </div>
    </div>
  );

    if(!user?.uid)return;
    async function syncBcProjects(){
      if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
      if(!_bcToken)return;
      try{
        const [bcProjects,bcCustomers,odataProjects]=await Promise.all([bcLoadAllProjects(),bcLoadAllCustomers(),bcLoadAllProjectsOData()]);
        // Build OData lookup by project No for rich customer fields
        const odataByNo=Object.fromEntries(odataProjects.filter(op=>op.No).map(op=>[op.No,op]));
        const bcById=Object.fromEntries(bcProjects.filter(bp=>bp.id).map(bp=>[bp.id,bp]));
        const custByNumber=Object.fromEntries(bcCustomers.map(c=>[c.number,c.displayName]));
        function extractCustomer(bp){
          const odata=odataByNo[bp.number]||{};
          const custNo=odata.Sell_to_Customer_No||odata.CCS_Sell_to_Customer_No||odata.Bill_to_Customer_No||bp.billToCustomerNumber||bp.billToCustomerNo||"";
          const custName=odata.Sell_to_Customer_Name||odata.Bill_to_Name||bp.billToName||bp.billToCustomerName||(custNo?custByNumber[custNo]||"":"");
          return{bcCustomerNumber:custNo,bcCustomerName:custName};
        }
        setProjects(ps=>{
          const existingBcIds=new Set(ps.map(p=>p.bcProjectId).filter(Boolean));
          // Import new projects
          const toImport=bcProjects.filter(bp=>bp.id&&!existingBcIds.has(bp.id));
          const newProjects=toImport.map(bp=>({
            id:"arc-"+bp.id.replace(/-/g,""),
            name:bp.displayName||bp.number||"Imported Project",
            bcProjectId:bp.id,
            bcProjectNumber:bp.number||"",
            bcEnv:_bcConfig.env,
            ...extractCustomer(bp),
            importedFromBC:true,
            status:"draft",
            panels:[],
            createdAt:Date.now(),
            updatedAt:Date.now()
          }));
          if(newProjects.length){console.log(`BC sync: importing ${newProjects.length} new project(s)`);newProjects.forEach(p=>saveProject(user.uid,p).catch(e=>console.warn("BC import save failed:",e)));}
          // Re-sync customer name on BC-linked projects missing it
          const toUpdate=ps.filter(p=>p.bcProjectId&&!p.bcCustomerName&&bcById[p.bcProjectId]);
          const updatedPs=ps.map(p=>{
            if(!p.bcProjectId||p.bcCustomerName)return p;
            const bp=bcById[p.bcProjectId];
            // Also try direct customer number lookup even without a bp match
            const custNo=p.bcCustomerNumber||"";
            const nameFromCustomers=custNo?custByNumber[custNo]||"":"";
            if(!bp&&!nameFromCustomers)return p;
            const cust=bp?extractCustomer(bp):{bcCustomerNumber:custNo,bcCustomerName:nameFromCustomers};
            if(!cust.bcCustomerName)return p;
            const updated={...p,...cust,updatedAt:Date.now()};
            saveProject(user.uid,updated).catch(e=>console.warn("BC customer resync failed:",e));
            return updated;
          });
          if(toUpdate.length)console.log(`BC sync: re-synced customer on ${toUpdate.length} project(s)`);
          return newProjects.length||toUpdate.length?[...newProjects,...updatedPs]:ps;
        });
      }catch(e){console.warn("BC project sync error:",e);}
    }
    // Run immediately on load (delay slightly to allow silent BC auth to complete)
    const initialTimer=setTimeout(syncBcProjects,3000);
    const interval=setInterval(syncBcProjects,5*60*1000);
    return()=>{clearTimeout(initialTimer);clearInterval(interval);};

function useTourRect(target){
  const[rect,setRect]=useState(null);
  useEffect(()=>{
    if(!target){setRect(null);return;}
    function measure(){
      const el=document.querySelector(target);
      if(!el){setRect(null);return;}
      const r=el.getBoundingClientRect();
      setRect({top:r.top,left:r.left,width:r.width,height:r.height});
      el.scrollIntoView({behavior:'smooth',block:'center'});
    }
    measure();
    const t=setTimeout(measure,320);
    return()=>clearTimeout(t);
  },[target]);
  return rect;
}

function TourOverlay({stepIdx,onNext,onPrev,onDone,onSkip,onMinimize}){
  const step=TOUR_STEPS[stepIdx];
  const PAD=12;const PW=480;
  const rect=useTourRect(step?.target||null);
  const[popStyle,setPopStyle]=useState({});

  useEffect(()=>{
    const vw=window.innerWidth;const vh=window.innerHeight;
    if(!rect||!step?.target){
      setPopStyle({position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:PW});
      return;
    }
    const cx=rect.left+rect.width/2;
    const sp=step.placement||'bottom';
    let top,left;
    if(sp==='bottom'){
      top=rect.top+rect.height+PAD+16;
      left=Math.max(16,Math.min(cx-PW/2,vw-PW-16));
    }else if(sp==='top'){
      top=rect.top-PAD-380;
      left=Math.max(16,Math.min(cx-PW/2,vw-PW-16));
    }else if(sp==='right'){
      top=Math.max(16,Math.min(rect.top+rect.height/2-180,vh-380));
      left=Math.min(rect.left+rect.width+PAD+16,vw-PW-16);
    }else if(sp==='center'){
      top=Math.max(16,Math.min(rect.top+rect.height/2-180,vh-380));
      left=Math.max(16,Math.min(cx-PW/2,vw-PW-16));
    }else{
      top=Math.max(16,Math.min(rect.top-PAD-380,vh-380));
      left=Math.max(16,Math.min(cx-PW/2,vw-PW-16));
    }
    setPopStyle({position:'fixed',top:Math.max(10,top),left:Math.max(10,left),width:PW});
  },[rect,step,stepIdx]);

  const isFirst=stepIdx===0;const isLast=stepIdx===TOUR_STEPS.length-1;
  const phasePct=Math.round(((stepIdx+1)/TOUR_STEPS.length)*100);

  return(
    <div style={{position:'fixed',inset:0,zIndex:99997,pointerEvents:'all'}}>
      {!rect&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.75)'}}/>}
      {rect&&<div style={{position:'fixed',top:rect.top-PAD,left:rect.left-PAD,width:rect.width+PAD*2,height:rect.height+PAD*2,borderRadius:12,boxShadow:'0 0 0 9999px rgba(0,0,0,0.75)',border:'2px solid #60a5fa',pointerEvents:'none',zIndex:99998,transition:'top 0.25s ease,left 0.25s ease,width 0.25s ease,height 0.25s ease'}}/>}
      <div style={{...popStyle,zIndex:99999,background:'#131929',border:'1px solid #1e3a5f',borderRadius:16,overflow:'hidden',boxShadow:'0 16px 56px rgba(0,0,0,0.75)',color:'#f1f5f9',pointerEvents:'all'}}>
        {/* Phase + progress header */}
        <div style={{background:'#0d1f3c',padding:'13px 20px',borderBottom:'1px solid #1e3a5f',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
          <span style={{fontSize:13,fontWeight:700,color:'#60a5fa',letterSpacing:0.5,textTransform:'uppercase'}}>{step.phase}</span>
          <div style={{flex:1,height:4,background:'#1e293b',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:phasePct+'%',background:'#3b82f6',borderRadius:2,transition:'width 0.3s ease'}}/>
          </div>
          <span style={{fontSize:13,color:'#64748b',flexShrink:0,fontWeight:600}}>{stepIdx+1} / {TOUR_STEPS.length}</span>
          <button onClick={onMinimize} title="Minimize — your progress is saved" style={{background:'none',border:'1px solid #1e3a5f',color:'#94a3b8',cursor:'pointer',fontSize:13,lineHeight:1,padding:'3px 10px',borderRadius:5,flexShrink:0,fontFamily:'inherit'}}>– Hide</button>
        </div>
        {/* Body */}
        <div style={{padding:'22px 26px'}}>
          <div style={{fontSize:18,fontWeight:700,color:'#93c5fd',lineHeight:1.3,marginBottom:14}}>{step.title}</div>
          <div style={{fontSize:15,color:'#cbd5e1',lineHeight:1.75,whiteSpace:'pre-line',marginBottom:step.action?16:22}}>{step.body}</div>
          {/* Action prompt */}
          {step.action&&(
            <div style={{background:'#0f2a1a',border:'1px solid #166534',borderRadius:10,padding:'14px 18px',marginBottom:18}}>
              <div style={{fontSize:13,fontWeight:700,color:'#86efac',marginBottom:4}}>👆 Your Turn</div>
              <div style={{fontSize:14,color:'#4ade80',lineHeight:1.7}}>{step.actionLabel}</div>
            </div>
          )}
          {/* Navigation */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            <button onClick={onSkip} style={{background:'none',border:'none',color:'#334155',cursor:'pointer',fontSize:13,padding:0,fontFamily:'inherit',textDecoration:'underline'}}>End tour</button>
            <div style={{display:'flex',gap:10}}>
              {!isFirst&&<button onClick={onPrev} style={{background:'none',border:'1px solid #1e3a5f',color:'#94a3b8',borderRadius:8,padding:'9px 20px',cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>← Back</button>}
              {isLast
                ?<button onClick={onDone} style={{background:'#16a34a',border:'none',color:'#fff',borderRadius:8,padding:'9px 24px',cursor:'pointer',fontSize:15,fontWeight:700,fontFamily:'inherit'}}>Finish ✓</button>
                :<button onClick={onNext} style={{background:'#2563eb',border:'none',color:'#fff',borderRadius:8,padding:'9px 24px',cursor:'pointer',fontSize:15,fontWeight:700,fontFamily:'inherit'}}>{step.action?'Done, Next →':'Next →'}</button>
              }
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PART NUMBER FUZZY MATCHING ──
// Normalize: remove spaces/dashes/dots, uppercase
function normPart(s){return(s||'').replace(/[\s\-\.]/g,'').toUpperCase();}
// Fuzzy match: exact after normalize, OR one contains the other (handles manufacturer prefix)
function partMatch(a,b){
  const na=normPart(a),nb=normPart(b);
  if(!na||!nb||na.length<3||nb.length<3)return false;
  if(na===nb)return true;
  // Contains: "HOFFCEL550M" contains "CEL550M", or "ARL449" within "ARL449"
  if(nb.length>=4&&na.includes(nb))return true;
  if(na.length>=4&&nb.includes(na))return true;
  return false;
}

// ── SUPPLIER PORTAL PAGE ──
function SupplierPortalPage({token}){
  const [info,setInfo]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [file,setFile]=useState(null);
  const [uploading,setUploading]=useState(false);
  const [done,setDone]=useState(false);
  const [unitPrices,setUnitPrices]=useState({});
  const [leadTime,setLeadTime]=useState('');
  const [phase,setPhase]=useState('upload'); // 'upload'|'analyzing'|'review'
  const [analyzeMsg,setAnalyzeMsg]=useState('');
  const [aiConfidences,setAiConfidences]=useState({});
  const [aiError,setAiError]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const [itemLeadTimes,setItemLeadTimes]=useState({});
  const [cannotSupply,setCannotSupply]=useState({});
  const [supplierPartNums,setSupplierPartNums]=useState({});
  const [supplierLineNums,setSupplierLineNums]=useState({}); // idx→supplier quote line #
  const [itemNotes,setItemNotes]=useState({}); // idx→supplier note text
  const [extractionSummary,setExtractionSummary]=useState(null); // {requestedCount, matchedCount, unmatchedSupplierItems}
  const [quoteHeaderInfo,setQuoteHeaderInfo]=useState(null);
  const [allExtractedItems,setAllExtractedItems]=useState([]); // all AI-extracted items from quote scan
  const [confirmedMatches,setConfirmedMatches]=useState({}); // idx→true when supplier confirms a match is correct
  const [openSpnDrop,setOpenSpnDrop]=useState(null); // which row's supplier PN dropdown is open (index or null)
  const [spnDropRect,setSpnDropRect]=useState(null); // bounding rect of the open dropdown button
  const [morePages,setMorePages]=useState(null); // {nextPage,totalPages} when PDF has >20 pages
  const pdfRef=useRef(null);

  useEffect(()=>{
    fbDb.collection('rfqUploads').doc(token).get()
      .then(snap=>{
        if(!snap.exists){setError("This link is invalid or has expired.");setLoading(false);return;}
        const data=snap.data();
        if(data.status==="submitted")setDone(true);
        setInfo(data);
        setLoading(false);
      })
      .catch(e=>{setError("Could not load RFQ: "+e.message);setLoading(false);});
  },[token]);

  async function processFile(f){
    if(!f||!f.type.includes("pdf")){alert("Please select a PDF file.");return;}
    setFile(f);setPhase('analyzing');setAiError(null);
    const allPrices={};const allConf={};const allLeadTimes={};const allSupplierPNs={};const allSupplierLineNums={};const collectedExtracted=[];let lastSummary=null;
    try{
      setAnalyzeMsg(`Reading ${f.name}…`);
      await window.pdfjsReady;
      const pdfjs=window._pdfjs;
      const buf=await f.arrayBuffer();
      const pdf=await pdfjs.getDocument({data:buf}).promise;
      pdfRef.current=pdf;
      const BATCH=20;
      const totalBatches=Math.ceil(pdf.numPages/BATCH);
      const lineItems=info?.lineItems||[];
      for(let batch=0;batch<totalBatches;batch++){
        const startPage=batch*BATCH+1;
        const endPage=Math.min(pdf.numPages,startPage+BATCH-1);
        const pageImages=[];
        for(let pg=startPage;pg<=endPage;pg++){
          setAnalyzeMsg(`Processing page ${pg} of ${pdf.numPages}${totalBatches>1?` (section ${batch+1} of ${totalBatches})`:""}…`);
          const page=await pdf.getPage(pg);
          const vp=page.getViewport({scale:2.0});
          const canvas=document.createElement("canvas");
          canvas.width=vp.width;canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
          const dataUrl=canvas.toDataURL("image/jpeg",0.85);
          canvas.width=0;canvas.height=0;
          pageImages.push(dataUrl.split(",")[1]);
        }
        setAnalyzeMsg(`ARC AI is securely scanning your Quote…`);
        console.log('PORTAL EXTRACT: sending',pageImages.length,'images for batch',batch+1);
        const result=await fbFunctions.httpsCallable("extractSupplierQuotePricing")({token,pageImages});
        const extracted=result.data?.extracted||[];
        if(result.data?.quoteHeader&&!quoteHeaderInfo)setQuoteHeaderInfo(result.data.quoteHeader);
        if(result.data?.summary)lastSummary=result.data.summary;
        console.log('PORTAL EXTRACT: got',extracted.length,'results, summary:',result.data?.summary,'sample:',JSON.stringify(extracted.slice(0,3)));
        extracted.forEach(ex=>{
          collectedExtracted.push(ex);
          if(ex.confidence==='unmatched')return; // unmatched supplier items — keep in collectedExtracted for dropdown but don't assign to a row
          // First try exact (normalized), then fuzzy prefix/contains match
          let idx=lineItems.findIndex(it=>normPart(it.partNumber)===normPart(ex.partNumber));
          if(idx<0)idx=lineItems.findIndex(it=>partMatch(it.partNumber,ex.partNumber));
          if(idx>=0){
            if(ex.unitPrice!=null&&(allPrices[idx]===undefined||allPrices[idx]===''))allPrices[idx]=String(ex.unitPrice);
            if(allConf[idx]===undefined)allConf[idx]=ex.confidence||'medium';
            if(ex.leadTimeDays!=null&&(allLeadTimes[idx]===undefined||allLeadTimes[idx]===''))allLeadTimes[idx]=String(ex.leadTimeDays);
            if(ex.supplierPartNumber&&!allSupplierPNs[idx])allSupplierPNs[idx]=ex.supplierPartNumber;
            if(ex.supplierLineNumber&&!allSupplierLineNums[idx])allSupplierLineNums[idx]=ex.supplierLineNumber;
          }
        });
      }
      setUnitPrices(allPrices);
      setAiConfidences(allConf);
      setItemLeadTimes(allLeadTimes);
      setSupplierPartNums(allSupplierPNs);
      setSupplierLineNums(allSupplierLineNums);
      setAllExtractedItems(collectedExtracted);
      setExtractionSummary(lastSummary);
      // Auto-confirm matched items (high or medium confidence)
      const autoConfirm={};
      Object.entries(allConf).forEach(([idx,c])=>{if(c==='high'||c==='medium')autoConfirm[idx]=true;});
      setConfirmedMatches(autoConfirm);
      setMorePages(null);
      setPhase('review');
    }catch(e){
      console.warn("ARC AI extraction failed:",e);
      setAiError(e.message||String(e));
      setUnitPrices(prev=>({...allPrices,...prev}));
      setPhase('review');
    }
  }

  function handleDrop(e){
    e.preventDefault();setDragOver(false);
    const f=e.dataTransfer.files[0];
    if(f)processFile(f);
  }

  async function handleSubmit(){
    if(uploading)return;
    if(!leadTime.trim()){alert("Please enter the lead time in days ARO for this order before submitting.");return;}
    setUploading(true);
    try{
      let storageUrl=null,fileName=null;
      if(file){
        const storageRef=fbStorage.ref(`supplierUploads/${token}/${file.name}`);
        await storageRef.put(file);
        storageUrl=await storageRef.getDownloadURL();
        fileName=file.name;
      }
      const orderLeadTime=parseInt(leadTime)||null;
      const pricedItems=(info?.lineItems||[]).map((item,i)=>({
        ...item,
        unitPrice:cannotSupply[i]===true?null:(unitPrices[i]!==undefined&&unitPrices[i]!==''?parseFloat(unitPrices[i])||null:null),
        // Row-level lead time overrides the order lead time; fall back to order lead time
        leadTimeDays:cannotSupply[i]===true?null:(itemLeadTimes[i]!==undefined&&itemLeadTimes[i]!==''?parseInt(itemLeadTimes[i])||null:orderLeadTime),
        cannotSupply:cannotSupply[i]===true,
        supplierPartNumber:supplierPartNums[i]||null,
        supplierLineNumber:supplierLineNums[i]||null,
        supplierNote:itemNotes[i]||null,
      }));
      // Build confirmed crossings for ARC to save — supplier PN → Matrix PN
      const confirmedCrossings=[];
      (info?.lineItems||[]).forEach((item,i)=>{
        if(confirmedMatches[i]&&supplierPartNums[i]&&item.partNumber){
          confirmedCrossings.push({supplierPartNumber:supplierPartNums[i],matrixPartNumber:item.partNumber,description:item.description||''});
        }
      });
      const updateData={status:"submitted",submittedAt:Date.now(),lineItems:pricedItems,leadTimeDays:orderLeadTime};
      if(confirmedCrossings.length)updateData.confirmedCrossings=confirmedCrossings;
      if(fileName)updateData.fileName=fileName;
      if(storageUrl)updateData.storageUrl=storageUrl;
      await fbDb.collection('rfqUploads').doc(token).update(updateData);
      setDone(true);
    }catch(e){alert("Submission failed: "+e.message);}
    setUploading(false);
  }

  const bg="#f8fafc";const card="#ffffff";const accent="#2563eb";const dark="#1e293b";const muted="#64748b";const border="#e2e8f0";
  const inp={border:`1px solid ${border}`,borderRadius:6,padding:"7px 10px",fontSize:14,fontFamily:"inherit",color:dark,outline:"none",background:"#f8fafc"};

  function Header(){

        <span style={{fontSize:14,color:muted,letterSpacing:1}}>Powered by <strong style={{color:dark}}>ARC Software</strong> &copy; 2026</span>
      </div>

  if(loading)return(<div style={{minHeight:"100vh",background:bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:muted,fontSize:15}}>Loading…</div></div>);

  const expired=(info?.expiresAt||0)>0&&Date.now()>(info?.expiresAt||0);
  if(expired)return(<div style={{minHeight:"100vh",background:bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}><div style={{background:card,border:`1px solid ${border}`,borderRadius:12,padding:"32px 36px",maxWidth:440,width:"100%",textAlign:"center"}}><div style={{fontSize:36,marginBottom:16}}>⌛</div><div style={{fontSize:17,fontWeight:700,color:dark,marginBottom:8}}>Link Expired</div><div style={{fontSize:14,color:muted}}>This RFQ link has expired. Please contact Matrix Systems for an updated link.</div></div></div>);

  // ── ANALYZING PHASE ──
  if(phase==='analyzing')return(
    <div style={{minHeight:"100vh",background:bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:card,border:`1px solid ${border}`,borderRadius:12,padding:"40px 36px",maxWidth:440,width:"100%",textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,0.08)"}}>
        <div style={{width:48,height:48,margin:"0 auto 16px",border:"4px solid #e2e8f0",borderTop:`4px solid ${accent}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}
.spn-drop{max-height:200px;overflow-y:auto;scrollbar-width:auto;}

.spn-drop::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:7px;border:3px solid #fff;}

input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}

        <div style={{fontSize:17,fontWeight:700,color:dark,marginBottom:8}}>Analyzing Your Quote</div>

                        const opts=allExtractedItems.filter(ex=>ex.supplierPartNumber).map(ex=>ex.supplierPartNumber);
                        const unique=[...new Set(opts)];
                        if(!unique.length)return<span style={{color:muted}}>—</span>;
                        const cur=supplierPartNums[i]||"";
                        const isOpen=openSpnDrop===i;
                        function pick(val){
                          setSupplierPartNums(prev=>({...prev,[i]:val}));
                          if(val){
                            setConfirmedMatches(prev=>({...prev,[i]:true}));
                            const match=allExtractedItems.find(ex=>ex.supplierPartNumber===val);
                            if(match){
                              if(match.unitPrice!=null)setUnitPrices(prev=>({...prev,[i]:String(match.unitPrice)}));
                              if(match.leadTimeDays!=null)setItemLeadTimes(prev=>({...prev,[i]:String(match.leadTimeDays)}));
                              if(match.supplierLineNumber)setSupplierLineNums(prev=>({...prev,[i]:match.supplierLineNumber}));
                              setAiConfidences(prev=>({...prev,[i]:'medium'}));
                            }
                          }else{
                            setConfirmedMatches(prev=>({...prev,[i]:false}));
                          }
                          setOpenSpnDrop(null);setSpnDropRect(null);
                        }
                        const naturalH=Math.min(200,(unique.length+1)*32+2);
                        let dropStyle={position:"fixed",zIndex:700,background:"#fff",border:`1px solid ${border}`,borderRadius:6,width:240,boxShadow:"0 4px 16px rgba(0,0,0,0.15)"};
                        if(isOpen&&spnDropRect){
                          const spaceBelow=window.innerHeight-spnDropRect.bottom-10;
                          const spaceAbove=spnDropRect.top-10;
                          if(spaceBelow>=naturalH){
                            dropStyle={...dropStyle,top:spnDropRect.bottom+2,left:spnDropRect.left,maxHeight:spaceBelow};
                          }else if(spaceAbove>=naturalH){
                            dropStyle={...dropStyle,bottom:window.innerHeight-spnDropRect.top+2,left:spnDropRect.left,maxHeight:spaceAbove};
                          }else if(spaceAbove>spaceBelow){
                            dropStyle={...dropStyle,bottom:window.innerHeight-spnDropRect.top+2,left:spnDropRect.left,maxHeight:spaceAbove};
                          }else{
                            dropStyle={...dropStyle,top:spnDropRect.bottom+2,left:spnDropRect.left,maxHeight:spaceBelow};
                          }
                        }
                        return<div>
                          <button onClick={e=>{if(isOpen){setOpenSpnDrop(null);setSpnDropRect(null);}else{setSpnDropRect(e.currentTarget.getBoundingClientRect());setOpenSpnDrop(i);}}} style={{...inp,padding:"4px 6px",fontSize:14,fontFamily:"monospace",width:190,textAlign:"left",cursor:"pointer",color:cur?dark:muted,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cur||"— Select —"}</span>
                            <span style={{fontSize:12,marginLeft:4}}>{isOpen?"▲":"▼"}</span>
                          </button>
                          {isOpen&&<>
                            <div style={{position:"fixed",inset:0,zIndex:699}} onClick={()=>{setOpenSpnDrop(null);setSpnDropRect(null);}}/>
                            <div className="spn-drop" style={dropStyle}>
                              <div onClick={()=>pick("")} style={{padding:"7px 10px",fontSize:14,color:muted,cursor:"pointer",borderBottom:`1px solid ${border}`}} onMouseEnter={e=>e.target.style.background="#f1f5f9"} onMouseLeave={e=>e.target.style.background="#fff"}>— Clear —</div>
                              {unique.map(pn=><div key={pn} onClick={()=>pick(pn)} style={{padding:"7px 10px",fontSize:14,fontFamily:"monospace",color:pn===cur?accent:dark,fontWeight:pn===cur?700:400,cursor:"pointer",background:pn===cur?"#eff6ff":"#fff"}} onMouseEnter={e=>{if(pn!==cur)e.target.style.background="#f1f5f9";}} onMouseLeave={e=>{if(pn!==cur)e.target.style.background="#fff";}}>{pn}</div>)}
                            </div>
                          </>}
                        </div>;
                      })()}</td>
                      <td style={{padding:"10px 12px",color:muted,textDecoration:cant?"line-through":undefined}}>{item.description||"—"}</td>
                      <td style={{padding:"10px 12px",textAlign:"center",color:dark}}>{item.qty||1}</td>
                      <td style={{padding:"8px 12px"}}>
                        {cant?<span style={{fontSize:14,color:"#dc2626",fontWeight:700,display:"block",textAlign:"right"}}>No Bid</span>:(
                        <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:6}}>
                          {confLabel&&<span style={{fontSize:12,fontWeight:700,borderRadius:4,padding:"2px 8px",background:confBg,color:confColor,flexShrink:0}}>{confLabel}</span>}
                          {!confirmed&&hasSupplierPN&&(isNoMatch||isMatch)&&<button onClick={()=>setConfirmedMatches(prev=>({...prev,[i]:true}))} style={{fontSize:12,fontWeight:600,borderRadius:4,padding:"2px 8px",background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe",cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>✓ Confirm</button>}
                          {!conf&&!hasPrice&&<span style={{fontSize:14,color:"#dc2626",fontWeight:600,flexShrink:0}}>⚠ Missing</span>}
                          {isNoMatch&&<span style={{fontSize:12,color:"#991b1b",flexShrink:0}}>Please enter price</span>}
                          <span style={{color:muted}}>$</span>
                          <input type="text" inputMode="decimal" placeholder="0.00"
                            value={unitPrices[i]??''}
                            onChange={e=>{const v=e.target.value;if(v===''||/^\d*\.?\d*$/.test(v))setUnitPrices(prev=>({...prev,[i]:v}));}}
                            onFocus={e=>e.target.select()}
                            onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))setUnitPrices(prev=>({...prev,[i]:v.toFixed(2)}));}}
                            onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
                            style={{width:100,textAlign:"right",...inp,border:`1px solid ${hasPrice?(isMatch?"#86efac":"#e2e8f0"):"#fca5a5"}`,background:hasPrice?"#f0fdf4":"#fff5f5"}}
                          />
                        </div>)}
                      </td>
                      <td style={{padding:"8px 12px",textAlign:"center"}}>
                        {!cant&&<input type="number" min="0" step="1" placeholder="—"
                          value={itemLeadTimes[i]??''}
                          onChange={e=>setItemLeadTimes(prev=>({...prev,[i]:e.target.value}))}
                          onFocus={e=>e.target.select()}
                          onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
                          style={{width:70,textAlign:"center",...inp}}
                        />}
                      </td>
                      <td style={{padding:"8px 12px",textAlign:"center"}}>
                        <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
                          <input type="checkbox" checked={cant}
                            onChange={e=>setCannotSupply(prev=>({...prev,[i]:e.target.checked}))}
                            style={{width:16,height:16,accentColor:"#dc2626",cursor:"pointer"}}
                          />
                          {cant&&<span style={{fontSize:14,color:"#dc2626",fontWeight:700}}>Yes</span>}
                        </label>
                      </td>
                      <td style={{padding:"8px 12px"}}>
                        <input type="text" placeholder="Add note…"
                          value={itemNotes[i]||''}
                          onChange={e=>setItemNotes(prev=>({...prev,[i]:e.target.value}))}
                          style={{...inp,width:"100%",padding:"4px 6px"}}
                        />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{background:card,border:`1px solid ${!leadTime.trim()?"#fca5a5":border}`,borderRadius:10,padding:"20px 24px",marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
            <label style={{display:"block",fontSize:14,fontWeight:700,color:dark,marginBottom:4}}>Lead Time (days ARO) <span style={{color:"#dc2626"}}>*</span></label>
            <div style={{fontSize:14,color:muted,marginBottom:8}}>Required — enter your standard lead time for this entire order. You may optionally enter different lead times per line item above to override.</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <input type="number" min="0" step="1" placeholder="e.g. 14" value={leadTime}
                onChange={e=>setLeadTime(e.target.value)}
                onFocus={e=>e.target.select()}
                onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
                onBlur={e=>{
                  const val=e.target.value;
                  if(val.trim()){
                    const lineItems=info?.lineItems||[];
                    setItemLeadTimes(prev=>{
                      const next={...prev};
                      lineItems.forEach((_,i)=>{if(!next[i]||next[i]==='')next[i]=val;});
                      return next;
                    });
                  }
                }}
                style={{width:120,...inp,border:`1px solid ${!leadTime.trim()?"#fca5a5":border}`}}/>
              <span style={{fontSize:14,color:muted}}>calendar days after receipt of order</span>
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setPhase('upload');setFile(null);setUnitPrices({});setAiConfidences({});setAiError(null);setItemLeadTimes({});setSupplierPartNums({});setSupplierLineNums({});setItemNotes({});setConfirmedMatches({});setQuoteHeaderInfo(null);setAllExtractedItems([]);setExtractionSummary(null);setMorePages(null);pdfRef.current=null;}}
              style={{flex:1,background:"#fff",border:`1px solid ${border}`,color:muted,padding:"12px",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              ← Start Over
            </button>
            <button onClick={handleSubmit} disabled={uploading}
              style={{flex:3,background:accent,border:"none",color:"#fff",padding:"12px",borderRadius:8,fontSize:15,fontWeight:700,cursor:uploading?"wait":"pointer",opacity:uploading?0.7:1,fontFamily:"inherit"}}>
              {uploading?"Submitting…":"✓ Confirm & Submit Quote"}
            </button>
          </div>
          <div style={{fontSize:13,color:muted,textAlign:"center",marginTop:8,lineHeight:1.5}}>Confirming each item is helpful, but not required.<br/>Your uploaded quote will be reviewed by the Matrix Sales Team.</div>
        </div>
      </div>
    );
  }

  // ── UPLOAD PHASE ──
  return(
    <div style={{minHeight:"100vh",background:bg,padding:"32px 16px"}}>
      <div style={{maxWidth:620,margin:"0 auto"}}>
        <Header/>
        <div style={{background:card,border:`1px solid ${border}`,borderRadius:10,padding:"20px 24px",marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <table style={{fontSize:14,borderCollapse:"collapse"}}>
            <tbody>
              <tr><td style={{padding:"4px 16px 4px 0",color:muted}}>Project:</td><td style={{fontWeight:600,color:dark}}>{info?.projectName||"—"}</td></tr>
              <tr><td style={{padding:"4px 16px 4px 0",color:muted}}>To:</td><td style={{color:dark}}>{info?.vendorName||"—"}</td></tr>
            </tbody>
          </table>
        </div>
        <div style={{background:card,border:`1px solid ${border}`,borderRadius:10,padding:"28px 24px",marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:15,fontWeight:700,color:dark,marginBottom:4}}>Submit Your Quote</div>
          <div style={{fontSize:14,color:muted,marginBottom:22,lineHeight:1.6}}>Upload your quote PDF below. AI will automatically extract pricing — you'll review before submitting.</div>
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop}
            style={{border:`2px dashed ${dragOver?"#2563eb":border}`,borderRadius:10,padding:"40px 20px",textAlign:"center",transition:"all 0.2s",background:dragOver?"#eff6ff":"#f8fafc",marginBottom:16}}>
            <div style={{fontSize:36,marginBottom:10}}>📄</div>
            <div style={{fontSize:15,fontWeight:600,color:dragOver?accent:dark,marginBottom:6}}>{dragOver?"Drop PDF here":"Drag & drop your quote PDF here"}</div>
            <div style={{fontSize:14,color:muted,marginBottom:16}}>or</div>
            <label style={{display:"inline-block",background:accent,color:"#fff",fontWeight:700,fontSize:14,padding:"10px 24px",borderRadius:7,cursor:"pointer",fontFamily:"inherit"}}>
              Browse File
              <input type="file" accept=".pdf,application/pdf" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)processFile(f);}}/>
            </label>
          </div>
          <div style={{fontSize:14,color:muted,textAlign:"center"}}>PDF only · Up to 8 pages scanned · Pricing extracted automatically by AI</div>
        </div>
        {(info?.lineItems||[]).length>0&&(
          <div style={{background:card,border:`1px solid ${border}`,borderRadius:10,marginBottom:20,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
            <div style={{padding:"14px 20px",borderBottom:`1px solid ${border}`,fontSize:14,fontWeight:700,color:dark}}>Items Requested ({info.lineItems.length})</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
              <thead><tr style={{background:"#f1f5f9"}}>
                <th style={{padding:"8px 12px",textAlign:"left",color:muted,fontWeight:600}}>#</th>
                <th style={{padding:"8px 12px",textAlign:"left",color:muted,fontWeight:600}}>Part Number</th>
                <th style={{padding:"8px 12px",textAlign:"left",color:muted,fontWeight:600}}>Description</th>
                <th style={{padding:"8px 12px",textAlign:"center",color:muted,fontWeight:600}}>Qty</th>
              </tr></thead>
              <tbody>
                {info.lineItems.map((item,i)=>(
                  <tr key={i} style={{borderTop:`1px solid ${border}`}}>
                    <td style={{padding:"8px 12px",color:muted}}>{i+1}</td>
                    <td style={{padding:"8px 12px",fontWeight:600,color:dark,whiteSpace:"nowrap"}}>{item.partNumber||"—"}</td>
                    <td style={{padding:"8px 12px",color:dark}}>{item.description||"—"}</td>
                    <td style={{padding:"8px 12px",textAlign:"center",color:dark}}>{item.qty||1}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT ──
function Root(){
  const [rfqUploadToken]=useState(()=>{try{const p=new URLSearchParams(window.location.search);return p.get("rfqUpload")||null;}catch(e){return null;}});
  const [user,setUser]=useState(undefined);
  const [redirectDone,setRedirectDone]=useState(false);

  useEffect(()=>{setRedirectDone(true);},[]);
  const [joinPayload]=useState(()=>{
    try{
      const params=new URLSearchParams(window.location.search);
      const j=params.get("join");
      if(!j)return null;
      return JSON.parse(atob(j));
    }catch(e){return null;}
  });

  useEffect(()=>{
    return fbAuth.onAuthStateChanged(u=>{
      if(u&&joinPayload){
        // If signed in as a different user, sign out and show the invite login screen
        if(u.email.toLowerCase()!==joinPayload.e.toLowerCase()){
          fbAuth.signOut();
          return; // onAuthStateChanged will fire again with null → shows LoginScreen
        }
        const{c:companyId,r:role}=joinPayload;
        const batch=fbDb.batch();
        batch.set(fbDb.doc(`companies/${companyId}/members/${u.uid}`),{email:u.email,role,addedAt:Date.now()});
        batch.set(fbDb.doc(`users/${u.uid}/config/profile`),{companyId,role},{merge:true});
        batch.commit()
          .then(()=>{
            try{
              const url=new URL(window.location.href);
              url.searchParams.delete("join");
              window.history.replaceState({},"",url.toString());
            }catch(e){}
            setUser(u);
          })
          .catch(e=>{
            console.error("Failed to accept invite:",e);
            setUser(u);
          });
      } else {
        setUser(u);
      }
    });
  },[joinPayload]);

  if(rfqUploadToken)return<SupplierPortalPage token={rfqUploadToken}/>;
  if(user===undefined||!redirectDone)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
      <div style={{color:C.muted,fontSize:14}}>Loading…</div>
    </div>
  );
  if(!user)return<LoginScreen invite={joinPayload}/>;
  return<App user={user}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
