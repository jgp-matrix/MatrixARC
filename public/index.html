                  <div style={{fontWeight:700,fontSize:13,color:C.accent,marginBottom:3}}>Crossed / Superseded</div>
                  <div style={{fontSize:11,color:C.muted,lineHeight:1.4}}>An alternate product intentionally replacing the original. Saved to Alternates DB. Shown in BOM notes and on quote.</div>
                </button>
                <button onClick={()=>{commitBcItem(crossOrCorrectPending.bomRowId,crossOrCorrectPending.bcItem,false,'extraction');dismiss();}}
                  style={{padding:"11px 14px",background:"#1a0a0a",border:`1px solid ${C.red}`,borderRadius:7,color:C.text,textAlign:"left",cursor:"pointer"}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.red,marginBottom:3}}>Bad Extraction</div>
                  <div style={{fontSize:11,color:C.muted,lineHeight:1.4}}>AI misread the part number entirely. Fixed quietly — logged for AI learning. No note on quote.</div>
                </button>
                <button onClick={()=>{commitBcItem(crossOrCorrectPending.bomRowId,crossOrCorrectPending.bcItem,false,'formatting');dismiss();}}
                  style={{padding:"11px 14px",background:"#0a1a12",border:"1px solid #4ade80",borderRadius:7,color:C.text,textAlign:"left",cursor:"pointer"}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#4ade80",marginBottom:3}}>Formatting Error</div>
                  <div style={{fontSize:11,color:C.muted,lineHeight:1.4}}>Part number is correct but formatted differently (dashes, spacing). Auto-corrected on future extractions. Noted on quote.</div>
                </button>
              </div>
              <button onClick={dismiss}
                style={{padding:"7px 14px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:12,cursor:"pointer"}}>
                Cancel
              </button>
            </div>
          </div>,
          document.body
        );
      })()}
    </div>
  );
}

// ── CPD SEARCH MODAL ──
function CPDSearchModal({query,uid,panel,onClose,onImportBom}){
  const [phase,setPhase]=useState("thinking"); // thinking | result | error
  const [result,setResult]=useState(null);
  const [selected,setSelected]=useState(new Set());
  const [errorMsg,setErrorMsg]=useState("");

  const [similarPanels,setSimilarPanels]=useState([]);

  // Find similar panels from CPD database
  useEffect(()=>{
    loadCPD(uid).then(cpd=>{
      const panels=cpd.panels||[];
      if(!panels.length)return;
      const q=query.toLowerCase();
      const scored=panels.map(p=>{
        let score=0;
        const haystack=((p.panelType||'')+(p.controlledEquipment||'')+(p.panelName||'')+(p.additionalNotes||'')).toLowerCase();
        q.split(/\s+/).forEach(word=>{if(word.length>2&&haystack.includes(word))score++;});
        // Bonus for voltage match
        const vLine=(p.voltages?.lineVoltage||'').toLowerCase();
        if(q.includes('480')&&vLine.includes('480'))score+=2;
        if(q.includes('208')&&vLine.includes('208'))score+=2;
        return{...p,_score:score};
      }).filter(p=>p._score>0).sort((a,b)=>b._score-a._score).slice(0,3);
      setSimilarPanels(scored);
    }).catch(()=>{});
  },[]);

  useEffect(()=>{
    let cancelled=false;
    async function run(){
      try{
        const cpd=await loadCPD(uid);
        // Build context from CPD catalog including panel metadata
        const topCategories={};
        (cpd.products||[]).forEach(p=>{topCategories[p.category]=(topCategories[p.category]||0)+1;});
        const panelCount=(cpd.panels||[]).length;
        const panelSummaries=(cpd.panels||[]).slice(-5).map(p=>`${p.panelType||'Panel'} for ${p.controlledEquipment||'unknown equipment'} (${p.specs?.motorCount||0} motors, PLC I/O: ${p.specs?.plcInputs||0}in/${p.specs?.plcOutputs||0}out, ${p.voltages?.lineVoltage||'unknown voltage'})`).join('; ');
        const catalogContext=panelCount>0
          ?`The system has cataloged ${panelCount} control panel(s). Recent panels: ${panelSummaries}. Common components: ${Object.entries(topCategories).map(([k,v])=>`${k} (${v} unique parts)`).join(', ')}.`
          :`No prior panel scans in the database yet — generating BOM from expert knowledge.`;

        const systemPrompt=`You are an expert industrial control panel designer specializing in UL508A panels. You have deep knowledge of PLCs (Allen-Bradley, Siemens, Automation Direct), motor control, field instruments, and control panel BOM creation.

${catalogContext}

When given a panel description, generate a realistic preliminary Bill of Materials. Return ONLY valid JSON array, no markdown, no explanation. Each item: {"partNumber":"","description":"","qty":1,"manufacturer":"","category":"","unitPrice":0}

Categories: PLC Processor, PLC I/O Module, VFD, Contactor, Relay, MCCB, Circuit Breaker, Wire Duct, DIN Rail, Terminal Block, Heater, Air Conditioner, Horn/Beacon, Enclosure, HMI, Pilot Light/Operator, Other

Use realistic part numbers (Allen-Bradley, Phoenix Contact, Schneider, etc.) where confident. Set unitPrice to 0 if unknown.`;

        const resp=await apiCall({
          model:"claude-sonnet-4-6",
          max_tokens:4096,
          system:systemPrompt,
          messages:[{role:"user",content:`Generate a BOM for: ${query}`}]
        });
        if(cancelled)return;
        const raw=resp.content[0].text.trim();
        const json=raw.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
        const rows=JSON.parse(json);
        const bomRows=rows.map((r,i)=>({
          id:`cpd-${Date.now()}-${i}`,
          partNumber:r.partNumber||'',
          description:r.description||'',
          qty:r.qty||1,
          manufacturer:r.manufacturer||'',
          unitPrice:r.unitPrice||null,
          priceSource:r.unitPrice?'ai':null,
          cpdCategory:r.category||'Other',
          cpdGenerated:true
        }));
        setResult(bomRows);
        setSelected(new Set(bomRows.map(r=>r.id)));
        setPhase("result");
      }catch(e){
        if(!cancelled){setErrorMsg(e.message||"Failed to generate BOM.");setPhase("error");}
      }
    }
    run();
    return()=>{cancelled=true;};
  },[]);

  const catColors={'PLC Processor':'#93c5fd','PLC I/O Module':'#818cf8','VFD':'#fb923c','Contactor':'#f472b6','Relay':'#a78bfa','MCCB':'#ef4444','Circuit Breaker':'#f87171','Wire Duct':'#6b7280','DIN Rail':'#9ca3af','Terminal Block':'#d1d5db','Heater':'#fb923c','Air Conditioner':'#22d3ee','Horn/Beacon':'#facc15','Enclosure':'#a3e635','HMI':'#34d399','Pilot Light/Operator':'#f9a8d4','Other':'#6b7280'};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#0d0d1a",border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:780,maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 60px rgba(0,0,0,0.8)"}}>
        {/* Header */}
        <div style={{padding:"18px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexShrink:0}}>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:C.accent,letterSpacing:1,marginBottom:4}}>CPD SEARCH — AI BOM GENERATOR</div>
            <div style={{fontSize:12,color:C.muted,fontStyle:"italic",lineHeight:1.5}}>"{query}"</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer",padding:"0 4px",flexShrink:0}}>✕</button>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 24px"}}>
          {similarPanels.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>Similar Panels in Database</div>
              {similarPanels.map((p,i)=>(
                <div key={p.panelId||i} style={{background:"#120a2a",border:"1px solid #a78bfa44",borderRadius:7,padding:"9px 12px",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#a78bfa"}}>{p.panelType||'Control Panel'}</span>
                    {p.controlledEquipment&&<span style={{fontSize:10,color:C.muted}}>— {p.controlledEquipment}</span>}
                  </div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {p.voltages?.lineVoltage&&<span style={{fontSize:10,color:C.sub}}>⚡ {p.voltages.lineVoltage}</span>}
                    {p.specs?.motorCount>0&&<span style={{fontSize:10,color:C.sub}}>⚙ {p.specs.motorCount} motors</span>}
                    {(p.specs?.plcInputs||p.specs?.plcOutputs)&&<span style={{fontSize:10,color:C.sub}}>PLC {p.specs.plcInputs||0}in/{p.specs.plcOutputs||0}out</span>}
                    {p.plcBrand&&<span style={{fontSize:10,color:C.sub}}>{p.plcBrand}</span>}
                    <span style={{fontSize:10,color:C.muted}}>{p.panelName}</span>
                  </div>
                  {p.additionalNotes&&<div style={{fontSize:10,color:C.muted,marginTop:3,fontStyle:"italic"}}>{p.additionalNotes.slice(0,120)}</div>}
                </div>
              ))}
            </div>
          )}
          {phase==="thinking"&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 0",gap:14}}>
              <div style={{fontSize:36,animation:"spin 1.2s linear infinite",display:"inline-block"}}>⚙</div>
              <div style={{fontSize:13,color:C.muted}}>APEX is generating your preliminary BOM…</div>
            </div>
          )}
          {phase==="error"&&(
            <div style={{color:C.red,fontSize:13,padding:"24px 0"}}>{errorMsg}</div>
          )}
          {phase==="result"&&result&&(
            <>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:12,color:C.muted}}>{result.length} items generated — check the items you want to import</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setSelected(new Set(result.map(r=>r.id)))} style={{fontSize:11,background:"none",border:`1px solid ${C.accent}44`,borderRadius:4,color:C.accent,padding:"3px 8px",cursor:"pointer"}}>All</button>
                  <button onClick={()=>setSelected(new Set())} style={{fontSize:11,background:"none",border:`1px solid ${C.border}`,borderRadius:4,color:C.muted,padding:"3px 8px",cursor:"pointer"}}>None</button>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {result.map(r=>{
                  const checked=selected.has(r.id);
                  const col=catColors[r.cpdCategory]||'#6b7280';
                  return(
                    <div key={r.id} onClick={()=>setSelected(prev=>{const s=new Set(prev);checked?s.delete(r.id):s.add(r.id);return s;})}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:6,background:checked?"#0d1a2a":"#0a0a12",border:`1px solid ${checked?C.accent+'44':C.border}`,cursor:"pointer"}}>
                      <div style={{width:16,height:16,borderRadius:3,border:`2px solid ${checked?C.accent:C.muted}`,background:checked?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {checked&&<span style={{color:"#000",fontSize:10,fontWeight:800,lineHeight:1}}>✓</span>}
                      </div>
                      <div style={{fontSize:9,fontWeight:700,color:col,background:col+'22',borderRadius:3,padding:"2px 5px",whiteSpace:"nowrap",flexShrink:0}}>{r.cpdCategory}</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.accent,minWidth:120,flexShrink:0}}>{r.partNumber||<span style={{color:C.muted,fontStyle:"italic"}}>TBD</span>}</div>
                      <div style={{fontSize:12,color:C.sub,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description}</div>
                      <div style={{fontSize:11,color:C.muted,flexShrink:0}}>Qty: {r.qty}</div>
                      {r.unitPrice>0&&<div style={{fontSize:11,color:C.green,flexShrink:0}}>${r.unitPrice.toFixed(2)}</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:12,padding:"8px 10px",background:"#0a0a12",borderRadius:6,border:`1px solid ${C.border}`,lineHeight:1.5}}>
                ⚠ This is an AI-generated preliminary BOM. Part numbers and pricing should be verified before quoting. All items are marked as AI-generated in the BOM.
              </div>
            </>
          )}
        </div>

        {/* Footer */}
        {phase==="result"&&(
          <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,justifyContent:"flex-end",flexShrink:0}}>
            <button onClick={onClose} style={btn(C.border,C.muted,{fontSize:13})}>Cancel</button>
            <button onClick={()=>onImportBom(result.filter(r=>selected.has(r.id)))}
              disabled={selected.size===0}
              style={btn(C.accentDim,C.accent,{fontSize:13,fontWeight:700,opacity:selected.size===0?0.4:1})}>
              Import {selected.size} Item{selected.size!==1?"s":""} into BOM
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── CREATE ITEM IN BC MODAL ──
function CreateItemInBCModal({panel,onClose,onUpdate,onSaveImmediate}){
  const [description,setDescription]=useState(panel.drawingDesc||panel.name||"");
  const [vendorItemNo,setVendorItemNo]=useState([panel.drawingNo,panel.drawingRev?"Rev "+panel.drawingRev:""].filter(Boolean).join(" ")||"");
  const [categoryCode,setCategoryCode]=useState("");
  const [categories,setCategories]=useState([]);
  const [uomCode,setUomCode]=useState("EA");
  const [uoms,setUoms]=useState([]);
  const [phase,setPhase]=useState("setup"); // setup | creating | done | error | missing_items
  const [progress,setProgress]=useState("");
  const [result,setResult]=useState(null);
  const [missingItems,setMissingItems]=useState([]);
  const [itemNumber,setItemNumber]=useState("");
  const [unitPriceStr,setUnitPriceStr]=useState(()=>{
    const pr=panel.pricing||{};
    const laborEst=computeLaborEstimate(panel);
    const markup=pr.markup??30;
    const contingencyBOM=pr.contingencyBOM??_pricingConfig.contingencyBOM;
    const contingencyConsumables=pr.contingencyConsumables??_pricingConfig.contingencyConsumables;
    const materialCost=(panel.bom||[]).reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
    const grandTotal=materialCost+laborEst.totalCost+contingencyBOM+contingencyConsumables;
    const sell=grandTotal*(1+markup/100);
    return sell>0?sell.toFixed(2):"";
  });

  // This panel's BOM only, rows with a part number
  const mergedBom=React.useMemo(()=>
    (panel.bom||[])
      .filter(r=>(r.partNumber||"").trim())
      .slice()
      .sort((a,b)=>{
        if(a.isLaborRow&&!b.isLaborRow)return -1;
        if(!a.isLaborRow&&b.isLaborRow)return 1;
        if(a.isLaborRow&&b.isLaborRow)return (a.partNumber||"").localeCompare(b.partNumber||"");
        return (a.partNumber||"").localeCompare(b.partNumber||"");
      })
  ,[panel]);
  const pendingBcRows=mergedBom.filter(r=>r.priceSource!=="bc"&&r.priceSource!=="manual");
  const pendingBcCount=pendingBcRows.length;

  useEffect(()=>{
    bcListItemCategories().then(setCategories).catch(()=>{});
    bcListUnitsOfMeasure().then(setUoms).catch(()=>{});
    // Suggest next item number from BC
    (async()=>{
      try{
        if(!_bcToken){await acquireBcToken(false);}
        if(!_bcToken)return;
        const compId=await bcGetCompanyId();
        if(!compId)return;
        const r=await fetch(`${BC_API_BASE}/companies(${compId})/items?$orderby=number desc&$top=1&$select=number`,{headers:{"Authorization":`Bearer ${_bcToken}`}});
        if(!r.ok)return;
        const d=await r.json();
        const last=((d.value||[])[0]||{}).number||"";
        const n=parseInt(last,10);
        if(!isNaN(n))setItemNumber(String(n+1));
      }catch(e){}
    })();
  },[]);

  async function handleCreate(){
    if(!description.trim()||!categoryCode||!uomCode||pendingBcCount>0)return;
    setPhase("creating");
    setProgress("Connecting to Business Central…");
    try{
      if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
      if(!_bcToken){_bcToken=await acquireBcToken(true)||null;}
      if(!_bcToken)throw new Error("Not connected to Business Central");

      // Pre-validate: all BOM part numbers must exist in BC
      if(mergedBom.length>0){
        setProgress("Validating BOM items exist in BC…");
        const missing=[];
        for(const row of mergedBom){
          const pn=(row.partNumber||"").trim();
          if(!pn)continue;
          const found=await bcLookupItem(pn);
          if(!found)missing.push(pn);
        }
        if(missing.length>0){
          setMissingItems(missing);
          setPhase("missing_items");
          return;
        }
      }

      // Step 1: Create the Item via REST API (UoM only — other fields set via OData PATCH)
      const created=await bcCreateItem({number:itemNumber.trim()||undefined,baseUnitOfMeasureCode:uomCode||undefined});
      setProgress(`Item ${created.number} created. Patching fields via OData…`);

      // Step 2: Comprehensive OData PATCH — Description, Category, Vendor Item No, Replenishment System, Unit Price
      const odataFields={
        Description:description.trim(),
        Replenishment_System:"Assembly"
      };
      if(categoryCode)odataFields.Item_Category_Code=categoryCode;
      if(vendorItemNo.trim())odataFields.Vendor_Item_No=vendorItemNo.trim();
      const parsedUnitPrice=parseFloat(unitPriceStr);
      if(!isNaN(parsedUnitPrice)&&parsedUnitPrice>0)odataFields.Unit_Price=parsedUnitPrice;
      try{
        await bcPatchItemOData(created.number,odataFields);
      }catch(pe){
        throw new Error(`Item ${created.number} created but field patch failed: ${pe.message}. Ensure the ItemCard OData web service is published (Page 30, Service Name: ItemCard).`);
      }

      // Step 3: Add Assembly BOM lines
      let bomResult={added:0,skipped:0,errors:[],warning:""};
      if(mergedBom.length>0){
        setProgress(`Adding ${mergedBom.length} assembly BOM components…`);
        bomResult=await bcAddAssemblyBOMLines(
          created.number,
          mergedBom,
          (i,total,pn)=>setProgress(`Adding BOM line ${i+1}/${total}: ${pn}…`)
        );
      }

      // Determine if push was fully successful (item created, BOM lines added with no errors)
      const itemCreated=!!created.number;
      const bomFullyPushed=mergedBom.length===0||(bomResult.added>0&&bomResult.errors.length===0);
      const pushSuccess=itemCreated&&bomFullyPushed&&!bomResult.warning;

      const resultData={
        itemNumber:created.number,
        bomAdded:bomResult.added,
        bomSkipped:bomResult.skipped,
        bomErrors:bomResult.errors,
        bomWarning:bomResult.warning,
        pushSuccess
      };
      setResult(resultData);

      // Only set pushed_to_bc status if item was fully created and all BOM lines pushed without errors
      if(pushSuccess&&onUpdate&&onSaveImmediate){
        const updated={...panel,status:"pushed_to_bc",bcItemNumber:created.number,updatedAt:Date.now()};
        onUpdate(updated);
        try{await onSaveImmediate(updated);}catch(se){console.warn("Status save failed:",se);}
      }

      setPhase("done");
    }catch(e){
      setResult({error:e.message});
      setPhase("error");
    }
  }

  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:24};
  const modalCard={...card({padding:28}),width:"100%",maxWidth:680,maxHeight:"90vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:16};

  return(
    <div style={overlay} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={modalCard}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:700}}>Create Item in BC</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20}}>✕</button>
        </div>

        {phase==="setup"&&(<>
          {pendingBcCount>0&&(
            <div style={{background:"#450a0a55",border:"1px solid #ef444466",borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:18,flexShrink:0}}>🚫</span>
              <div>
                <div style={{fontWeight:700,color:"#f87171",fontSize:13,marginBottom:3}}>{pendingBcCount} part{pendingBcCount>1?"s":""} not yet verified in Business Central</div>
                <div style={{fontSize:12,color:C.sub,lineHeight:1.5}}>All BOM parts must be confirmed as BC items (blue BC circle resolved) before pushing to the Assembly BOM. Close this dialog, resolve the highlighted rows, then try again.</div>
              </div>
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <div style={{fontSize:12,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Description</div>
              <input value={description} onChange={e=>setDescription(e.target.value)} style={inp()} placeholder="Item description…"/>
            </div>
            <div>
              <div style={{fontSize:12,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Vendor Item No. <span style={{fontWeight:400}}>(DWG # + Rev)</span></div>
              <input value={vendorItemNo} onChange={e=>setVendorItemNo(e.target.value)} style={inp()} placeholder="e.g. DWG-1234 Rev B"/>
            </div>
            <div>
              <div style={{fontSize:12,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Item Category Code <span style={{color:C.red}}>*</span></div>
              <select value={categoryCode} onChange={e=>setCategoryCode(e.target.value)}
                style={{...inp(),cursor:"pointer"}}>
                <option value="">— Select Category —</option>
                {categories.map(c=><option key={c.code} value={c.code}>{c.code}{c.description?" – "+c.description:""}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:12,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Unit of Measure <span style={{color:C.red}}>*</span></div>
              <select value={uomCode} onChange={e=>setUomCode(e.target.value)}
                style={{...inp(),cursor:"pointer"}}>
                <option value="">— Select Unit of Measure —</option>
                {uoms.map(u=><option key={u.code} value={u.code}>{u.code}{u.displayName&&u.displayName!==u.code?" – "+u.displayName:""}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Item Number <span style={{fontWeight:400,textTransform:"none"}}>(leave blank for auto-assign)</span></div>
                <input value={itemNumber} onChange={e=>setItemNumber(e.target.value)} style={inp()} placeholder="Auto-assigned by BC"/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Unit Price ($)</div>
                <input type="number" min="0" step="0.01" value={unitPriceStr} onChange={e=>setUnitPriceStr(e.target.value)} style={inp()} placeholder="0.00"/>
              </div>
            </div>
          </div>

          {mergedBom.length>0?(
            <div>
              <div style={{fontSize:12,color:C.muted,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Assembly BOM — {mergedBom.length} component{mergedBom.length!==1?"s":""}</div>
              <div style={{maxHeight:220,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:8}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:C.border}}>
                      <th style={{textAlign:"left",padding:"6px 10px",color:C.muted,fontWeight:600}}>Part #</th>
                      <th style={{textAlign:"center",padding:"6px 10px",color:C.muted,fontWeight:600,width:60}}>Qty</th>
                      <th style={{textAlign:"left",padding:"6px 10px",color:C.muted,fontWeight:600}}>Description</th>
                    </tr>
                  </thead>
                  <tbody>
                    {mergedBom.map((row,i)=>{
                      const unverified=row.priceSource!=="bc"&&row.priceSource!=="manual";
                      return(
                      <tr key={i} style={{borderTop:`1px solid ${C.border}`,background:unverified?"#450a0a44":"transparent"}}>
                        <td style={{padding:"5px 10px",fontFamily:"monospace",color:unverified?"#f87171":C.accent}}>
                          {row.partNumber}
                          {unverified&&<span style={{marginLeft:6,fontSize:9,background:"#2563eb",color:"#fff",borderRadius:"50%",width:14,height:14,display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:800,verticalAlign:"middle"}}>BC</span>}
                        </td>
                        <td style={{padding:"5px 10px",textAlign:"center",color:C.text}}>{row.qty||1}</td>
                        <td style={{padding:"5px 10px",color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:240}}>{row.description||"—"}</td>
                      </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          ):(
            <div style={{padding:16,background:C.border,borderRadius:8,fontSize:13,color:C.muted,textAlign:"center"}}>No BOM components with part numbers found in this project.</div>
          )}

          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
            <button onClick={onClose} style={btn("#383850",C.muted,{fontSize:13})}>Cancel</button>
            <button onClick={handleCreate} disabled={!description.trim()||!categoryCode||!uomCode||pendingBcCount>0}
              style={btn(C.accent,"#fff",{fontSize:13,opacity:!description.trim()||!categoryCode||!uomCode||pendingBcCount>0?0.4:1})}>
              Create Item in BC
            </button>
          </div>
        </>)}

        {phase==="creating"&&(
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <div className="spin" style={{fontSize:28,marginBottom:16,color:C.accent}}>◌</div>
            <div style={{fontSize:14,color:C.sub}}>{progress}</div>
          </div>
        )}

        {phase==="done"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {result.pushSuccess?(
              <div style={{background:"#0d1f3c",border:"1px solid #38bdf844",borderRadius:8,padding:16}}>
                <div style={{fontSize:15,fontWeight:700,color:"#38bdf8",marginBottom:6}}>✓ Pushed to BC — Status Updated</div>
                <div style={{fontSize:13,color:C.sub,marginBottom:4}}>BC Item Number: <span style={{fontFamily:"monospace",color:C.accent,fontWeight:700}}>{result.itemNumber}</span></div>
                <div style={{fontSize:12,color:"#38bdf8aa"}}>Panel status set to <strong>PUSHED TO BC</strong></div>
              </div>
            ):(
              <div style={{background:C.yellowDim,border:`1px solid ${C.yellow}44`,borderRadius:8,padding:16}}>
                <div style={{fontSize:15,fontWeight:700,color:C.yellow,marginBottom:6}}>⚠ Item Created — Partial Push</div>
                <div style={{fontSize:13,color:C.sub,marginBottom:4}}>BC Item Number: <span style={{fontFamily:"monospace",color:C.accent,fontWeight:700}}>{result.itemNumber}</span></div>
                <div style={{fontSize:12,color:C.yellow}}>BOM had errors or warnings — status not updated to Pushed to BC. Resolve issues and retry.</div>
              </div>
            )}
            <div style={{fontSize:13,color:C.muted}}>
              Assembly BOM: <span style={{color:C.green}}>{result.bomAdded} component{result.bomAdded!==1?"s":""} added</span>
              {result.bomSkipped>0&&<span style={{color:C.yellow}}> · {result.bomSkipped} skipped</span>}
            </div>
            {result.bomWarning&&<div style={{fontSize:12,color:C.yellow,background:C.yellowDim,borderRadius:6,padding:"8px 12px"}}>{result.bomWarning}</div>}
            {result.bomErrors.length>0&&(
              <div style={{fontSize:12,color:C.red,background:C.redDim,borderRadius:6,padding:"8px 12px",maxHeight:120,overflowY:"auto"}}>
                <div style={{fontWeight:700,marginBottom:4}}>BOM errors ({result.bomErrors.length}):</div>
                {result.bomErrors.map((e,i)=><div key={i} style={{marginBottom:2}}>• {e}</div>)}
              </div>
            )}
            <div style={{textAlign:"right"}}>
              <button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button>
            </div>
          </div>
        )}

        {phase==="error"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:16}}>
              <div style={{fontSize:15,fontWeight:700,color:C.red,marginBottom:4}}>✕ Creation Failed</div>
              <div style={{fontSize:13,color:C.sub}}>{result.error}</div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={btn("#383850",C.muted,{fontSize:13})}>Cancel</button>
              <button onClick={()=>setPhase("setup")} style={btn(C.accent,"#fff",{fontSize:13})}>Try Again</button>
            </div>
          </div>
        )}

        {phase==="missing_items"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:16}}>
              <div style={{fontSize:15,fontWeight:700,color:C.red,marginBottom:6}}>⛔ Missing Items in BC</div>
              <div style={{fontSize:13,color:C.sub,marginBottom:10}}>The following item{missingItems.length>1?"s":""} must be added to Business Central before you can create this item:</div>
              <div style={{fontFamily:"monospace",fontSize:13,display:"flex",flexDirection:"column",gap:4}}>
                {missingItems.map(pn=><div key={pn} style={{color:C.red}}>• {pn}</div>)}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── UPDATE BOM IN BC MODAL ──
function UpdateBomInBCModal({panel,onClose,onUpdate,onSaveImmediate,onCreateNewItem}){
  const [phase,setPhase]=useState("checking"); // checking | confirm | in_use | updating | done | error | missing_items
  const [progress,setProgress]=useState("");
  const [result,setResult]=useState(null);
  const [projectWarning,setProjectWarning]=useState([]);
  const [missingItems,setMissingItems]=useState([]);
  const itemNo=panel.bcItemNumber||"";
  const mergedBom=(panel.bom||[]).filter(r=>(r.partNumber||"").trim()).slice().sort((a,b)=>{
    if(a.isLaborRow&&!b.isLaborRow)return -1;
    if(!a.isLaborRow&&b.isLaborRow)return 1;
    return (a.partNumber||"").localeCompare(b.partNumber||"");
  });
  const pendingBcCount=mergedBom.filter(r=>r.priceSource!=="bc"&&r.priceSource!=="manual").length;
  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:24};
  const modalCard={...card({padding:28}),width:"100%",maxWidth:560,display:"flex",flexDirection:"column",gap:16};

  useEffect(()=>{
    (async()=>{
      try{
        if(!_bcToken){await acquireBcToken(false);}
        const[{inUse},{onProjects,projects}]=await Promise.all([
          bcCheckItemInUse(itemNo),
          bcCheckItemOnProjects(itemNo)
        ]);
        if(onProjects)setProjectWarning(projects);
        setPhase(inUse?"in_use":"confirm");
      }catch(e){setPhase("confirm");}
    })();
  },[]);

  async function handleUpdate(){
    setPhase("updating");
    setProgress("Connecting to Business Central…");
    try{
      if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
      if(!_bcToken){_bcToken=await acquireBcToken(true)||null;}
      if(!_bcToken)throw new Error("Not connected to Business Central");

      // Pre-validate: all BOM part numbers must exist in BC
      if(mergedBom.length>0){
        setProgress("Validating BOM items exist in BC…");
        const missing=[];
        for(const row of mergedBom){
          const pn=(row.partNumber||"").trim();
          if(!pn)continue;
          const found=await bcLookupItem(pn);
          if(!found)missing.push(pn);
        }
        if(missing.length>0){
          setMissingItems(missing);
          setPhase("missing_items");
          return;
        }
      }

      const res=await bcReplaceAssemblyBOMLines(
        itemNo,mergedBom,
        (i,total,pn)=>setProgress(i===-1?"Clearing existing BOM lines…":`Adding BOM line ${i+1}/${total}: ${pn}…`)
      );
      const success=res.added>0&&res.errors.length===0&&!res.warning;
      setResult({...res,success});
      if(success&&onUpdate&&onSaveImmediate){
        const updated={...panel,status:"pushed_to_bc",updatedAt:Date.now()};
        onUpdate(updated);
        try{await onSaveImmediate(updated);}catch(se){console.warn("Status save failed:",se);}
      }
      setPhase("done");
    }catch(e){
      setResult({error:e.message});
      setPhase("error");
    }
  }

  return(
    <div style={overlay} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={modalCard}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:700}}>Update BOM in BC</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20}}>✕</button>
        </div>

        {phase==="checking"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:"20px 0"}}>
            <div style={{width:36,height:36,border:"3px solid #38bdf844",borderTop:"3px solid #38bdf8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            <div style={{fontSize:13,color:C.sub}}>Checking item usage in Business Central…</div>
          </div>
        )}

        {phase==="in_use"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#451a0355",border:"1px solid #f9731644",borderRadius:8,padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:12}}>
              <span style={{fontSize:22,flexShrink:0}}>⚠️</span>
              <div>
                <div style={{fontWeight:700,color:"#f97316",fontSize:14,marginBottom:6}}>Item {itemNo} is already in use on a BC Project</div>
                <div style={{fontSize:13,color:C.sub,lineHeight:1.6}}>This item has ledger entries in Business Central and cannot be edited. To update the BOM, you must create a new item with the revised components.</div>
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={btn("#383850",C.muted,{fontSize:13})}>Cancel</button>
              <button onClick={()=>{onClose();if(onCreateNewItem)onCreateNewItem();}}
                style={btn(C.accentDim,C.accent,{fontSize:13,border:`1px solid ${C.accent}55`})}>
                ⚙ Create New Item in BC
              </button>
            </div>
          </div>
        )}

        {phase==="confirm"&&(<>
          {pendingBcCount>0&&(
            <div style={{background:"#450a0a55",border:"1px solid #ef444466",borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:18,flexShrink:0}}>🚫</span>
              <div>
                <div style={{fontWeight:700,color:"#f87171",fontSize:13,marginBottom:3}}>{pendingBcCount} part{pendingBcCount>1?"s":""} not yet verified in BC</div>
                <div style={{fontSize:12,color:C.sub}}>Resolve all blue BC circles before updating.</div>
              </div>
            </div>
          )}
          {projectWarning.length>0&&(
            <div style={{background:"#422006aa",border:"1px solid #f9731655",borderRadius:8,padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
              <div>
                <div style={{fontWeight:700,color:"#fb923c",fontSize:13,marginBottom:4}}>Item {itemNo} is assigned to {projectWarning.length} BC Project{projectWarning.length>1?"s":""}</div>
                <div style={{fontSize:12,color:C.sub,marginBottom:6,lineHeight:1.5}}>Updating the Assembly BOM will affect this item on the following project{projectWarning.length>1?"s":""}. Only proceed if you are sure the change is intentional.</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {projectWarning.map(p=><span key={p} style={{background:"#f9731622",color:"#fb923c",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"monospace"}}>{p}</span>)}
                </div>
              </div>
            </div>
          )}
          <div style={{background:"#0d1f3c",border:"1px solid #38bdf844",borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:13,color:C.sub,marginBottom:4}}>BC Item: <span style={{fontFamily:"monospace",color:"#38bdf8",fontWeight:700}}>{itemNo}</span></div>
            <div style={{fontSize:13,color:C.sub}}>This will <strong style={{color:"#f87171"}}>delete all existing Assembly BOM lines</strong> for this item and replace them with the current ARC BOM ({mergedBom.length} component{mergedBom.length!==1?"s":""}).</div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
            <button onClick={onClose} style={btn("#383850",C.muted,{fontSize:13})}>Cancel</button>
            <button onClick={handleUpdate} disabled={pendingBcCount>0}
              style={btn("#0d1f3c","#38bdf8",{fontSize:13,opacity:pendingBcCount>0?0.4:1,border:"1px solid #38bdf866"})}>
              Replace BOM in BC
            </button>
          </div>
        </>)}

        {phase==="updating"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,padding:"20px 0"}}>
            <div style={{width:40,height:40,border:`3px solid ${"#38bdf8"}44`,borderTop:`3px solid ${"#38bdf8"}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            <div style={{fontSize:14,color:C.sub,textAlign:"center"}}>{progress}</div>
          </div>
        )}

        {phase==="done"&&result&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {result.success?(
              <div style={{background:"#0d1f3c",border:"1px solid #38bdf844",borderRadius:8,padding:16}}>
                <div style={{fontSize:15,fontWeight:700,color:"#38bdf8",marginBottom:6}}>✓ BOM Updated Successfully</div>
                <div style={{fontSize:13,color:C.sub}}>Removed <strong>{result.deleted}</strong> old line{result.deleted!==1?"s":""} · Added <strong>{result.added}</strong> new line{result.added!==1?"s":""}</div>
              </div>
            ):(
              <div style={{background:C.yellowDim,border:`1px solid ${C.yellow}44`,borderRadius:8,padding:16}}>
                <div style={{fontSize:15,fontWeight:700,color:C.yellow,marginBottom:6}}>⚠ Partial Update</div>
                <div style={{fontSize:13,color:C.sub}}>Removed {result.deleted} · Added {result.added} · {result.skipped} skipped</div>
              </div>
            )}
            {result.warning&&<div style={{fontSize:12,color:C.yellow,background:C.yellowDim,borderRadius:6,padding:"8px 12px"}}>{result.warning}</div>}
            {result.errors&&result.errors.length>0&&(
              <div style={{fontSize:12,color:C.red,background:C.redDim,borderRadius:6,padding:"8px 12px",maxHeight:120,overflowY:"auto"}}>
                <div style={{fontWeight:700,marginBottom:4}}>Errors ({result.errors.length}):</div>
                {result.errors.map((e,i)=><div key={i} style={{marginBottom:2}}>• {e}</div>)}
              </div>
            )}
            <div style={{textAlign:"right"}}><button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button></div>
          </div>
        )}

        {phase==="error"&&result&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:16}}>
              <div style={{fontSize:15,fontWeight:700,color:C.red,marginBottom:6}}>✗ Update Failed</div>
              <div style={{fontSize:13,color:C.sub}}>{result.error}</div>
            </div>
            <div style={{textAlign:"right"}}><button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button></div>
          </div>
        )}

        {phase==="missing_items"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:16}}>
              <div style={{fontSize:15,fontWeight:700,color:C.red,marginBottom:6}}>⛔ Missing Items in BC</div>
              <div style={{fontSize:13,color:C.sub,marginBottom:10}}>The following item{missingItems.length>1?"s":""} must be added to Business Central before you can update this BOM:</div>
              <div style={{fontFamily:"monospace",fontSize:13,display:"flex",flexDirection:"column",gap:4}}>
                {missingItems.map(pn=><div key={pn} style={{color:C.red}}>• {pn}</div>)}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PanelListView({project,uid,readOnly,onBack,onViewQuote,onUpdate,onDelete,onTransfer}){
  const [editingName,setEditingName]=useState(false);
  const [draftName,setDraftName]=useState(project.name||"");
  const [bcSyncMsg,setBcSyncMsg]=useState(null);
  const [validating,setValidating]=useState(false);
  const [validateMsg,setValidateMsg]=useState("");
  const [showDeleteAdminWarn,setShowDeleteAdminWarn]=useState(false);
  const customerLogo=useCustomerLogo(project.bcCustomerName||null);

  function addPanel(){
    const n=(project.panels||[]).length+1;
    const newPanel={id:'panel-'+Date.now(),name:`Panel ${n}`,pages:[],bom:[],validation:null,pricing:null,budgetaryQuote:null,status:'draft'};
    onUpdate({...project,panels:[...(project.panels||[]),newPanel]});
  }
  function deletePanel(id){
    if(!window.confirm("Delete this panel and all its data?"))return;
    onUpdate({...project,panels:(project.panels||[]).filter(p=>p.id!==id)});
  }
  async function saveImmediatePanel(panelId,updatedPanel){
    const newPanels=(project.panels||[]).map(p=>p.id===panelId?updatedPanel:p);
    const updatedProject={...project,panels:newPanels};
    await saveProject(uid,updatedProject);
    onUpdate(updatedProject);
  }
  async function saveName(){
    if(!draftName.trim())return;
    const updated={...project,name:draftName.trim()};
    onUpdate(updated);
    await saveProject(uid,updated);
    setEditingName(false);
    if(project.bcProjectId){
      setBcSyncMsg({ok:null,text:"Syncing to BC…"});
      const ok=await bcUpdateProject(project.bcProjectId,draftName.trim());
      setBcSyncMsg({ok,text:ok?"✓ Name synced to Business Central":"⚠ BC sync failed — check connection"});
      setTimeout(()=>setBcSyncMsg(null),4000);
    }
  }
  async function validateAll(){
    if(!_apiKey)return;
    setValidating(true);
    let panels=[...(project.panels||[])];
    for(let i=0;i<panels.length;i++){
      const p=panels[i];
      const hasSchOrLayout=(p.pages||[]).some(pg=>(getPageTypes(pg).includes("schematic")||getPageTypes(pg).includes("layout")||getPageTypes(pg).includes("backpanel")||getPageTypes(pg).includes("enclosure"))&&(pg.dataUrl||pg.storageUrl));
      if(!hasSchOrLayout)continue;
      setValidateMsg(`Validating ${p.name||"Panel "+(i+1)}…`);
      const result=await runPanelValidation(p);
      if(result.validation||result.laborData){const bom=appendDefaultBomItems(p.bom||[]);panels[i]={...p,bom,...(result.validation?{validation:result.validation}:{}),...(result.laborData?{laborData:result.laborData}:{}),status:"validated"};}
    }
    const updatedProject={...project,panels};
    onUpdate(updatedProject);
    await saveProject(uid,updatedProject);
    setValidating(false);
    setValidateMsg("");
  }
  const panels=project.panels||[];
  return(<>
    <div style={{flex:1,display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"6px 24px",display:"flex",alignItems:"center",gap:12,minHeight:40,flexShrink:0}}>

        {readOnly&&<><div style={{width:1,height:16,background:C.border}}/><span style={{background:C.border,color:C.muted,borderRadius:20,padding:"2px 10px",fontSize:13,fontWeight:700}}>VIEW ONLY</span></>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
            <div>
              {editingName?(
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <input value={draftName} onChange={e=>setDraftName(e.target.value)} autoFocus
                    style={{...inp(),fontSize:18,fontWeight:700,padding:"4px 10px",minWidth:240}}
                    onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape")setEditingName(false);}}/>
                  <button onClick={saveName} style={btn(C.accent,"#fff",{fontSize:13,padding:"4px 12px"})}>✓</button>
                  <button onClick={()=>setEditingName(false)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13}}>Cancel</button>
                </div>
              ):(
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
                  {customerLogo&&<img src={customerLogo} alt="" style={{width:36,height:36,objectFit:"contain",borderRadius:6,background:"#fff",padding:2,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    {(project.bcProjectNumber||project.bcCustomerName)&&(
                      <div style={{display:"flex",alignItems:"baseline",gap:10}}>
                        {project.bcProjectNumber&&<span style={{fontSize:26,fontWeight:800,color:C.accent,lineHeight:1}}>{project.bcProjectNumber}</span>}
                        {project.bcCustomerName&&<span style={{fontSize:18,fontWeight:700,color:C.text}}>{project.bcCustomerName}</span>}
                      </div>

                    <div style={{display:"flex",alignItems:"center",gap:6}}>

// ── QUOTE VIEW (aggregates all panels) ──
function QuoteView({project,uid,onBack,onUpdate}){
  const panels=project.panels||[];
  const allBom=mergeBoms(panels.map(p=>p.bom||[]));
  const totalWireCount=panels.reduce((s,p)=>s+(p.validation?.wireCount||0),0);
  // Compute labor for each panel individually (preserves overrides), then sum
  const perPanelLabor=panels.map(p=>computeLaborEstimate(p));
  const totalLaborHours=perPanelLabor.reduce((s,l)=>s+l.totalHours,0);
  const totalLaborCost=perPanelLabor.reduce((s,l)=>s+l.totalCost,0);
  const hasLayoutData=perPanelLabor.some(l=>l.hasLayoutData);
  // Merge labor lines by category
  const laborLineMap={};
  perPanelLabor.forEach(l=>l.lines.forEach(line=>{
    if(laborLineMap[line.category]){laborLineMap[line.category].qty+=line.qty;laborLineMap[line.category].hours+=line.hours;laborLineMap[line.category].cost+=line.cost;}
    else{laborLineMap[line.category]={...line};}
  }));
  const aggregatedLaborLines=Object.values(laborLineMap);
  // Use first panel's pricing as source of truth (that's where user edits markup/contingency)
  const firstPanelPricing=panels.find(p=>p.pricing)?.pricing||{};
  const derivedPricing={...firstPanelPricing};
  // Build a fake laborData so computeLaborEstimate produces matching results for QuoteTab
  // But actually override QuoteTab's computation — pass pre-computed values via pricing
  const aggregated={
    ...project,
    bom:allBom,
    validation:{wireCount:totalWireCount},
    laborData:null, // null triggers legacy path, but we override via _quoteLabor
    pricing:derivedPricing,
    pages:panels.flatMap(p=>p.pages||[]),
    _quoteLabor:{lines:aggregatedLaborLines,totalHours:totalLaborHours,totalCost:totalLaborCost,hasLayoutData,isLegacy:false,isOverride:false},
  };
  function handleQuoteUpdate(upd){
    // Sync pricing back to all panels so panel cards stay consistent with quote
    const updatedPanels=(project.panels||[]).map(p=>({...p,pricing:{...(p.pricing||{}),...(upd.pricing||{})}}));
    onUpdate({...project,panels:updatedPanels,quote:upd.quote,pricing:upd.pricing,budgetaryQuote:upd.budgetaryQuote});
  }
  const fmtMoney=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0});
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",background:C.bg}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"6px 24px",display:"flex",alignItems:"center",gap:12,minHeight:40,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:6,padding:"0",whiteSpace:"nowrap"}}>← Panels</button>
        <div style={{width:1,height:16,background:C.border}}/>
        <div style={{fontSize:15,fontWeight:700,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{project.name}</div>
        <span style={{background:C.greenDim,color:C.green,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>COMBINED QUOTE</span>
        <div style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>{allBom.length} items · {totalWireCount} wires</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:24}}>
        <div style={{maxWidth:1400,margin:"0 auto"}}>
          {panels.length>0&&(
            <div style={{...card({padding:"12px 16px"}),marginBottom:20}} className="no-print">
              <div style={{fontSize:12,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Panel Breakdown</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                {panels.map(p=>{
                  const mats=(p.bom||[]).reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
                  return(
                    <div key={p.id} style={{...card({padding:"10px 14px"}),minWidth:170}}>
                      <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{p.name}</div>
                      <div style={{fontSize:12,color:C.muted}}>{(p.bom||[]).length} items · {(p.pages||[]).length} pages</div>
                      {p.validation?.wireCount>0&&<div style={{fontSize:12,color:C.muted}}>⚡ {p.validation.wireCount} wires</div>}
                      {mats>0&&<div style={{fontSize:12,color:C.green,marginTop:4}}>Materials: {fmtMoney(mats)}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <QuoteTab project={aggregated} onUpdate={handleQuoteUpdate}/>
        </div>
      </div>
    </div>
  );
}

// ── ERROR BOUNDARY ──
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,info){console.error("ErrorBoundary caught:",e,info);}
  render(){
    if(this.state.error){
      return(
        <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32}}>
          <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:700,color:C.red,marginBottom:8}}>Something went wrong</div>
          <div style={{fontSize:13,color:C.muted,marginBottom:24,maxWidth:600,textAlign:"center",wordBreak:"break-all"}}>{this.state.error?.message||String(this.state.error)}</div>
          <button onClick={()=>{this.setState({error:null});if(this.props.onBack)this.props.onBack();}}
            style={{background:"#383850",border:"1.5px solid #7a7a9a",color:"#d4d8e0",cursor:"pointer",fontSize:15,fontWeight:600,padding:"8px 20px",borderRadius:8}}>← Back to Projects</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ── PROJECT VIEW ──
function ProjectView({project:init,uid,onBack,onChange,onDelete,onTransfer}){
  const [project,setProject]=useState(()=>migrateProject(init));
  const projectRef=useRef(migrateProject(init));
  const [view,setView]=useState("panels"); // "panels"|"quote"
  const saveTimer=useRef(null);
  const readOnly=isReadOnly();
  const didMigrate=useRef(!init.panels);

  // Keep ref in sync with state for use in callbacks
  useEffect(()=>{projectRef.current=project;},[project]);

  // Save migrated project immediately on first open
  useEffect(()=>{
    if(didMigrate.current){
      didMigrate.current=false;
      saveProject(uid,migrateProject(init)).catch(()=>{});
    }
  },[]);

  // Listen for live updates from background extraction tasks (survives navigation)
  useEffect(()=>onProjectUpdated(project.id,p=>{setProject(p);projectRef.current=p;onChange(p);}),[project.id]);

  function update(p){
    setProject(p);projectRef.current=p;onChange(p);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>saveProject(uid,p),1000);
  }

  if(view==="quote"){
    return(
      <QuoteView
        project={project}
        uid={uid}
        onBack={()=>setView("panels")}
        onUpdate={update}
      />
    );
  }

  return(
    <PanelListView
      project={project}
      uid={uid}
      readOnly={readOnly}
      onBack={onBack}
      onViewQuote={()=>setView("quote")}
      onUpdate={update}
      onDelete={onDelete}
      onTransfer={onTransfer}
    />
  );
}

// ── SETTINGS MODAL ──
function SettingsModal({uid,onClose,onNameChange}){
  const [key,setKey]=useState("");
  const [loading,setLoading]=useState(true);
  const [saved,setSaved]=useState(false);
  const [firstName,setFirstName]=useState("");
  const [nameSaved,setNameSaved]=useState(false);

  const [curPass,setCurPass]=useState("");
  const [newPass,setNewPass]=useState("");
  const [confPass,setConfPass]=useState("");
  const [pwLoading,setPwLoading]=useState(false);
  const [pwErr,setPwErr]=useState("");
  const [pwOk,setPwOk]=useState(false);
  const [resetSent,setResetSent]=useState(false);

  const email=fbAuth.currentUser?.email||"";

  useEffect(()=>{
    Promise.all([
      fbDb.doc(`users/${uid}/config/api`).get(),
      fbDb.doc(`users/${uid}/config/profile`).get(),
    ]).then(([apiDoc,profileDoc])=>{
      if(apiDoc.exists)setKey(apiDoc.data().key||"");
      if(profileDoc.exists)setFirstName(profileDoc.data().firstName||"");
    }).finally(()=>setLoading(false));
  },[uid]);

  async function saveName(){
    const name=firstName.trim();
    await fbDb.doc(`users/${uid}/config/profile`).set({firstName:name},{merge:true});
    if(onNameChange)onNameChange(name);
    setNameSaved(true);setTimeout(()=>setNameSaved(false),2000);
  }

  async function save(){
    await fbDb.doc(`users/${uid}/config/api`).set({key});
    _apiKey=key;setSaved(true);setTimeout(()=>setSaved(false),2000);
  }

  async function sendReset(){
    setPwErr("");setPwLoading(true);
    try{
      await fbAuth.sendPasswordResetEmail(fbAuth.currentUser.email);
      setResetSent(true);
    }catch(ex){setPwErr(ex.message);}
    setPwLoading(false);
  }

  async function changePassword(e){
    e.preventDefault();setPwErr("");
    if(newPass.length<6){setPwErr("New password must be at least 6 characters.");return;}
    if(newPass!==confPass){setPwErr("Passwords do not match.");return;}
    setPwLoading(true);
    try{
      const user=fbAuth.currentUser;
      const cred=firebase.auth.EmailAuthProvider.credential(user.email,curPass);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPass);
      setPwOk(true);setCurPass("");setNewPass("");setConfPass("");
      setTimeout(()=>setPwOk(false),3000);
    }catch(ex){
      if(ex.code==="auth/wrong-password"||ex.code==="auth/invalid-credential")setPwErr("Current password is incorrect.");
      else if(ex.code==="auth/operation-not-allowed")setPwErr("Password sign-in is not enabled for this account.");
      else setPwErr(ex.message);
    }
    setPwLoading(false);
  }

  const isEmailProvider=fbAuth.currentUser?.providerData?.some(p=>p.providerId==="password");

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:18,fontWeight:700,flex:1}}>⚙ Settings</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20,lineHeight:1,padding:"2px 6px",borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color=C.text} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>✕</button>
        </div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>APEX ARC configuration</div>

        {/* Account */}
        <div style={{marginBottom:20,background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontSize:12,color:C.sub,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Account</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4}}>Email</label>
            <div style={{fontSize:14,color:C.text,padding:"8px 10px",background:C.surface,borderRadius:6,border:`1px solid ${C.border}`,userSelect:"all"}}>{email}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4}}>First Name</label>
              <input value={firstName} onChange={e=>setFirstName(e.target.value)} placeholder="Your first name"
                onKeyDown={e=>{if(e.key==="Enter")saveName();}}
                style={inp()}/>
            </div>
            <button onClick={saveName} disabled={loading}
              style={btn(nameSaved?C.green:C.accent,"#fff",{opacity:loading?0.5:1,flexShrink:0,marginBottom:1})}>
              {nameSaved?"✓ Saved":"Save"}
            </button>
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Anthropic API Key</label>
          {loading
            ?<div style={{color:C.muted,fontSize:13,padding:"9px 0"}}>Loading…</div>
            :<input value={key} onChange={e=>setKey(e.target.value)} type="password" placeholder="sk-ant-…" style={inp()}/>
          }
          <div style={{fontSize:11,color:C.muted,marginTop:6}}>Stored in your Firebase project. Shared across all team members.</div>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:24}}>
          <button onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Close</button>
          <button onClick={save} disabled={loading||!key.trim()} style={btn(saved?C.green:C.accent,"#fff",{flex:2,opacity:loading||!key.trim()?0.5:1})}>
            {saved?"✓ Saved":"Save Key"}
          </button>
        </div>

        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:20}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Change Password</label>
          {!isEmailProvider?(
            <div style={{fontSize:13,color:C.muted,padding:"10px 12px",background:C.surface,borderRadius:8}}>
              Your account uses Google Sign-In and does not have a password. Use "Forgot password?" on the login screen to set one.
            </div>
          ):(
            <form onSubmit={changePassword}>
              <div style={{marginBottom:4}}><input value={curPass} onChange={e=>setCurPass(e.target.value)} type="password" placeholder="Current password" style={inp()} required/></div>
              <div style={{textAlign:"right",marginBottom:10}}>
                {resetSent
                  ?<span style={{fontSize:12,color:C.green}}>✓ Reset link sent to {fbAuth.currentUser?.email}</span>
                  :<button type="button" onClick={sendReset} disabled={pwLoading} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:0}}>Forgot password?</button>
                }
              </div>
              <div style={{marginBottom:8}}><input value={newPass} onChange={e=>setNewPass(e.target.value)} type="password" placeholder="New password (min 6 chars)" style={inp()} required/></div>
              <div style={{marginBottom:10}}><input value={confPass} onChange={e=>setConfPass(e.target.value)} type="password" placeholder="Confirm new password" style={inp()} required/></div>
              {pwErr&&<div style={{color:C.red,fontSize:12,marginBottom:10,lineHeight:1.5}}>{pwErr}</div>}
              {pwOk&&<div style={{color:C.green,fontSize:12,marginBottom:10}}>✓ Password updated successfully.</div>}
              <button type="submit" disabled={pwLoading} style={btn(C.accent,"#fff",{width:"100%",opacity:pwLoading?0.6:1})}>
                {pwLoading?"Updating…":"Update Password"}
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

function DeleteConfirmModal({projectName,bcProjectNumber,isAdmin,onConfirm,onCancel}){
  const [deleteBC,setDeleteBC]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [bcErr,setBcErr]=useState("");
  async function handleConfirm(){
    setDeleting(true);setBcErr("");
    await onConfirm(deleteBC);
    setDeleting(false);
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onCancel}>
      <div style={{...card(),width:"100%",maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,color:C.red,marginBottom:8}}>Delete Project?</div>
        <div style={{fontSize:13,color:C.sub,marginBottom:6}}>This will permanently delete from ARC:</div>
        <div style={{fontSize:14,fontWeight:600,color:C.text,background:C.border,borderRadius:8,padding:"10px 14px",marginBottom:16}}>{projectName}</div>
        {isAdmin&&bcProjectNumber&&(
          <div onClick={()=>setDeleteBC(v=>!v)} style={{display:"flex",alignItems:"center",gap:10,background:deleteBC?C.redDim:"transparent",border:`1px solid ${deleteBC?C.red+"66":C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:12,cursor:"pointer"}}>
            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${deleteBC?C.red:C.muted}`,background:deleteBC?C.red:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {deleteBC&&<span style={{color:"#fff",fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>}
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:deleteBC?C.red:C.sub}}>Also delete from Business Central</div>

        )}

          </button>
        </div>

    </div>
  );
}

// ── NEW PROJECT MODAL ──
function NewProjectModal({uid,onCreated,onClose}){
  const [name,setName]=useState("");
  const [panelCount,setPanelCount]=useState(1);
  const [loading,setLoading]=useState(false);
  const [bcStatus,setBcStatus]=useState(null);
  const [createErr,setCreateErr]=useState("");
  const [customerQuery,setCustomerQuery]=useState("");
  const [allCustomers,setAllCustomers]=useState([]);
  const [customerResults,setCustomerResults]=useState([]);
  const [customerSearching,setCustomerSearching]=useState(false);
  const [selectedCustomer,setSelectedCustomer]=useState(null);
  const [showDropdown,setShowDropdown]=useState(false);
  const [bcConnected,setBcConnected]=useState(!!_bcToken);
  const [showNewCust,setShowNewCust]=useState(false);
  const [newCustName,setNewCustName]=useState("");
  const [newCustPhone,setNewCustPhone]=useState("");
  const [newCustEmail,setNewCustEmail]=useState("");
  const [creatingCust,setCreatingCust]=useState(false);
  const [newCustErr,setNewCustErr]=useState("");

  useEffect(()=>{
    if(_bcToken){loadCustomers();return;}
    acquireBcToken(false).then(t=>{
      if(t){setBcConnected(true);loadCustomers();}
    }).catch(()=>{});
  },[]);

  async function loadCustomers(){
    setCustomerSearching(true);
    const all=await bcLoadAllCustomers();
    setAllCustomers(all);
    setCustomerResults(all.slice(0,25));
    setCustomerSearching(false);
  }

  async function connectBC(){
    setCustomerSearching(true);
    const t=await acquireBcToken(true);
    if(t){setBcConnected(true);await loadCustomers();}
    setCustomerSearching(false);
  }

  function handleCustomerInput(val){
    setCustomerQuery(val);
    setSelectedCustomer(null);
    setShowDropdown(true);
    setCustomerResults(bcFilterCustomers(allCustomers,val));
  }

  function selectCustomer(c){
    setSelectedCustomer(c);
    setCustomerQuery(c.displayName);
    setShowDropdown(false);
  }

  async function createNewCustomer(){
    if(!newCustName.trim())return;
    setCreatingCust(true);setNewCustErr("");
    try{
      const c=await bcCreateCustomer(newCustName.trim(),newCustPhone.trim(),newCustEmail.trim());
      selectCustomer(c);
      const all=await bcLoadAllCustomers();
      setAllCustomers(all);
      setShowNewCust(false);setNewCustName("");setNewCustPhone("");setNewCustEmail("");
    }catch(err){setNewCustErr(err.message||"Failed to create customer in BC");}
    setCreatingCust(false);
  }

  async function create(e){
    e.preventDefault();
    if(!name.trim()||!selectedCustomer)return;
    setLoading(true);setCreateErr("");
    const trimmed=name.trim();
    if(!_bcToken){setBcStatus("connecting");await acquireBcToken(true);}
    if(!_bcToken){setCreateErr("Could not connect to Business Central. Please try again.");setLoading(false);return;}
    try{
      setBcStatus("creating");
      const bc=await bcCreateProject(trimmed,selectedCustomer.number);
      setBcStatus("ok");
      const p=await saveProject(uid,{
        name:trimmed,
        bcProjectId:bc.id,
        bcProjectNumber:bc.number,
        bcCustomerNumber:bc.customerNumber,
        bcCustomerName:bc.customerName||selectedCustomer.displayName,
        status:"draft",
        panels:Array.from({length:Math.max(1,panelCount)},(_,i)=>({id:`panel-${i+1}`,name:`Panel ${i+1}`,pages:[],bom:[],validation:null,pricing:null,budgetaryQuote:null,status:'draft'})),
        createdAt:Date.now(),updatedAt:Date.now()
      });
      onCreated(p);
    }catch(e){
      setBcStatus(null);
      setCreateErr(e.message||"Failed to create project in Business Central.");
      setLoading(false);
    }
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>New Project</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Name this control panel quote</div>
        <form onSubmit={create}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Project Name</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Conveyor Control Panel" style={{...inp(),marginBottom:16}} autoFocus/>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Number of Panels</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button type="button" onClick={()=>setPanelCount(c=>Math.max(1,c-1))} style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:C.border,color:C.text,fontSize:18,cursor:"pointer",lineHeight:1}}>−</button>
            <span style={{fontSize:20,fontWeight:700,minWidth:32,textAlign:"center"}}>{panelCount}</span>
            <button type="button" onClick={()=>setPanelCount(c=>Math.min(20,c+1))} style={{width:32,height:32,borderRadius:6,border:`1px solid ${C.border}`,background:C.border,color:C.text,fontSize:18,cursor:"pointer",lineHeight:1}}>+</button>
            <span style={{fontSize:12,color:C.muted}}>{panelCount===1?"1 panel will be created":`${panelCount} panels will be created`}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Customer <span style={{color:C.border,fontWeight:400,textTransform:"none",letterSpacing:0}}>(from Business Central)</span></div>
            {bcConnected&&!showNewCust&&<button type="button" onClick={()=>setShowNewCust(true)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:12,padding:0,fontWeight:600}}>+ New Customer</button>}
          </div>
          {showNewCust&&(
            <div style={{background:C.accentDim,border:`1px solid ${C.accent}44`,borderRadius:8,padding:14,marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>Create New BC Customer</div>
              <input value={newCustName} onChange={e=>setNewCustName(e.target.value)} placeholder="Customer Name *" style={{...inp(),marginBottom:8}}/>
              <input value={newCustPhone} onChange={e=>setNewCustPhone(e.target.value)} placeholder="Phone (optional)" style={{...inp(),marginBottom:8}}/>
              <input value={newCustEmail} onChange={e=>setNewCustEmail(e.target.value)} placeholder="Email (optional)" style={{...inp(),marginBottom:10}}/>
              {newCustErr&&<div style={{fontSize:11,color:C.red,marginBottom:8}}>{newCustErr}</div>}
              <div style={{display:"flex",gap:8}}>
                <button type="button" onClick={()=>{setShowNewCust(false);setNewCustName("");setNewCustPhone("");setNewCustEmail("");setNewCustErr("");}} style={btn(C.border,C.sub,{flex:1,fontSize:12})}>Cancel</button>
                <button type="button" onClick={createNewCustomer} disabled={!newCustName.trim()||creatingCust} style={btn(C.accent,"#fff",{flex:2,fontSize:12,opacity:!newCustName.trim()||creatingCust?0.5:1})}>{creatingCust?"Creating in BC…":"Create in BC"}</button>
              </div>
            </div>
          )}
          {!bcConnected?(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,background:C.border,borderRadius:8,padding:"10px 14px"}}>
              <span style={{fontSize:12,color:C.muted,flex:1}}>Connect to BC to pick a customer</span>
              <button type="button" onClick={connectBC} disabled={customerSearching}
                style={btn(C.accent,"#fff",{fontSize:12,padding:"6px 14px",opacity:customerSearching?0.5:1})}>
                {customerSearching?"Connecting…":"Connect BC"}
              </button>
            </div>
          ):(
            <div style={{position:"relative",marginBottom:16}}>
              <input
                value={customerQuery}
                onChange={e=>handleCustomerInput(e.target.value)}
                onFocus={()=>setShowDropdown(true)}
                onBlur={()=>setTimeout(()=>setShowDropdown(false),150)}
                onKeyDown={e=>{if(e.key==="Tab"&&customerResults.length===1){e.preventDefault();selectCustomer(customerResults[0]);}}}
                placeholder={customerSearching?"Loading customers…":"Search by name or number…"}
                style={{...inp()}}
              />
              {selectedCustomer&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.green,fontSize:14}}>✓</div>}
              {showDropdown&&customerResults.length>0&&(
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:10,maxHeight:200,overflowY:"auto",marginTop:4,boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>
                  {customerResults.map(c=>(
                    <div key={c.number} onMouseDown={()=>selectCustomer(c)}
                      style={{padding:"9px 12px",cursor:"pointer",display:"flex",gap:10,alignItems:"center"}}
                      onMouseEnter={e=>e.currentTarget.style.background=C.border}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <span style={{fontSize:11,color:C.muted,minWidth:60,fontFamily:"monospace"}}>{c.number}</span>
                      <span style={{fontSize:13,color:C.text}}>{c.displayName}</span>
                    </div>
                  ))}
                </div>
              )}
              {showDropdown&&!customerSearching&&customerResults.length===0&&customerQuery&&(
                <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,zIndex:10,padding:"10px 12px",marginTop:4,fontSize:12,color:C.muted}}>No customers found</div>
              )}
            </div>
          )}
          {bcStatus==="connecting"&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>Connecting to Business Central...</div>}
          {bcStatus==="creating"&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>Creating BC project, copying template tasks, and linking customer…</div>}
          {createErr&&<div style={{fontSize:12,color:C.red,background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 12px",marginBottom:12}}>{createErr}</div>}
          {!selectedCustomer&&name.trim()&&<div style={{fontSize:12,color:C.yellow,marginBottom:10}}>A customer is required to create a project.</div>}
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button type="button" onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
            <button type="submit" disabled={!name.trim()||!selectedCustomer||loading} style={btn(C.accent,"#fff",{flex:2,opacity:!name.trim()||!selectedCustomer||loading?0.5:1})}>
              {loading?"Creating…":"Create Project"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}
