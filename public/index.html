html,body{background:#0d0d14;color:#e8e8f0;font-family:-apple-system,'Inter',sans-serif;font-size:14px}
input,textarea,select,button{font-family:inherit;font-size:inherit}
input[type=number].no-spin::-webkit-inner-spin-button,input[type=number].no-spin::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

::-webkit-scrollbar-track{background:#1e1e2e}
::-webkit-scrollbar-thumb{background:#5a5a78;border-radius:5px}

[data-tip]{position:relative;}
[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#e2e8f0;font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;white-space:nowrap;max-width:240px;white-space:normal;text-align:center;pointer-events:none;opacity:0;transition:opacity 0.18s;z-index:10000;border:1px solid rgba(255,255,255,0.12);box-shadow:0 4px 14px rgba(0,0,0,0.5);line-height:1.4;}

body.no-tips [data-tip]::after{opacity:0!important;}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

/* ── Quote Document ── */
#quote-doc{font-family:'Inter',-apple-system,sans-serif;color:#1e293b;line-height:1.5}
.qd-page{width:8.5in;min-height:11in;margin:0 auto 40px;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.08);overflow:hidden}

.qd-brand{display:flex;align-items:center;gap:16px}.qd-brand h1{font-size:29px;font-weight:800;color:#2563eb;letter-spacing:-0.3px;margin:0}
.qd-brand .qd-addr{font-size:14px;color:#64748b;line-height:1.6;margin-top:2px}
.qd-hdr-right{text-align:right}.qd-qlabel{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#64748b}
.qd-qnum{font-size:34px;font-weight:800;color:#0f172a;letter-spacing:-0.5px}.qd-qmeta{font-size:14px;color:#64748b;margin-top:4px;line-height:1.6}

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// Smooth time-based progress bar: fills toward ~90% over estSeconds, snaps to 100% on finish
function useSmoothProgress(estSeconds=15){
  const [state,setState]=useState(null); // null | {msg,pct}
  const timer=useRef(null);
  const startTime=useRef(0);
  const est=useRef(estSeconds);
  const msgRef=useRef("");
  const baseRef=useRef(0); // base pct offset for phase transitions

  const tick=useCallback(()=>{
    const elapsed=(Date.now()-startTime.current)/1000;
    const t=Math.min(elapsed/est.current,1);
    // Steady progression — nearly linear with gentle ease near end
    const curve=Math.pow(t,0.9);
    const pct=baseRef.current+(97-baseRef.current)*curve;
    setState({msg:msgRef.current,pct:Math.min(97,Math.round(pct))});
    timer.current=requestAnimationFrame(tick);
  },[]);

  const start=useCallback((msg,seconds)=>{
    if(seconds)est.current=seconds;
    msgRef.current=msg||"";
    baseRef.current=0;
    startTime.current=Date.now();
    if(timer.current)cancelAnimationFrame(timer.current);
    setState({msg:msgRef.current,pct:0});
    timer.current=requestAnimationFrame(tick);
  },[tick]);

  // Transition to a new phase — continues smoothly from current pct
  const phase=useCallback((msg,seconds)=>{
    const elapsed=(Date.now()-startTime.current)/1000;
    const t=Math.min(elapsed/est.current,1);
    baseRef.current=Math.min(97,Math.round(baseRef.current+(97-baseRef.current)*Math.pow(t,0.9)));
    est.current=seconds||est.current;
    msgRef.current=msg||msgRef.current;
    startTime.current=Date.now();
  },[]);

  const update=useCallback((msg)=>{
    msgRef.current=msg||msgRef.current;
    // don't change pct — timer handles it
  },[]);

  // Jump to a real progress checkpoint and continue smooth animation from there
  const set=useCallback((pct,msg)=>{
    baseRef.current=Math.min(97,pct);
    startTime.current=Date.now();
    if(msg)msgRef.current=msg;
    setState({msg:msgRef.current,pct:Math.min(97,Math.round(pct))});
    if(!timer.current)timer.current=requestAnimationFrame(tick);
  },[tick]);

  const dismissTimer=useRef(null);
  const finish=useCallback((msg)=>{
    if(timer.current){cancelAnimationFrame(timer.current);timer.current=null;}
    if(dismissTimer.current)clearTimeout(dismissTimer.current);
    baseRef.current=0;
    setState(msg?{msg,pct:100}:null);
    if(msg)dismissTimer.current=setTimeout(()=>setState(null),3500);
  },[]);

  const stop=useCallback(()=>{
    if(timer.current){cancelAnimationFrame(timer.current);timer.current=null;}
    baseRef.current=0;
    setState(null);
  },[]);

  const running=useCallback(()=>!!timer.current,[]);

  useEffect(()=>()=>{if(timer.current)cancelAnimationFrame(timer.current);},[]);

  return{progress:state,start,phase,update,set,finish,stop,running};
}

// Subscribe to background task registry updates
function useBgTasks(){
  const [tasks,setTasks]=useState({..._bgTasks});
  useEffect(()=>{
    const fn=t=>setTasks(t);
    _bgListeners.add(fn);
    return()=>_bgListeners.delete(fn);
  },[]);
  return tasks;
}

// ── CUSTOMER LOGO ──
const _logoCache={};
function useCustomerLogo(name){
  const [logo,setLogo]=useState(()=>{
    if(!name)return null;
    const k=name.toLowerCase().trim();
    return k in _logoCache?_logoCache[k]:undefined;
  });
  useEffect(()=>{
    if(!name)return;
    const k=name.toLowerCase().trim();
    if(k in _logoCache){setLogo(_logoCache[k]);return;}
    setLogo(undefined);
    fetch(`https://autocomplete.clearbit.com/v1/companies/suggest?query=${encodeURIComponent(k)}`)

let _niqCache=null;
async function loadNIQ(){
  if(_niqCache)return _niqCache;
  if(!_appCtx.companyId)return[];
  try{
    const snap=await fbDb.collection(`companies/${_appCtx.companyId}/knowledgeBase`).get();
    _niqCache=snap.docs.map(d=>({id:d.id,...d.data()}));
    console.log(`[NIQ] Loaded ${_niqCache.length} Neural IQ docs (${_niqCache.reduce((s,d)=>(d.content||'').length+s,0)} chars)`);
    return _niqCache;
  }catch(e){console.warn('[NIQ] Load failed:',e);return[];}
}
function searchNIQ(niqDocs,terms){
  // Search ARC Neural IQ pages for terms, return top matches (max chars)
  if(!niqDocs?.length||!terms?.length)return'';
  const words=terms.flatMap(t=>t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/)).filter(w=>w.length>=3);
  if(!words.length)return'';
  const stopWords=new Set(['the','and','for','are','but','not','you','all','can','had','was','one','our','has','how','what','when','where','which','who','does','this','that','with','from','they','been','have','many','some','them','than','each','make','like','over','into','also']);
  const filtered=words.filter(w=>!stopWords.has(w));
  if(!filtered.length)return'';
  const scores=[];
  niqDocs.forEach(doc=>{
    if(!doc.content)return;
    const pages=doc.content.split(/--- PAGE (\d+) ---/).filter(Boolean);
    for(let i=0;i<pages.length-1;i+=2){
      const pageNum=pages[i],text=pages[i+1]||'',textLow=text.toLowerCase();
      let score=0;
      filtered.forEach(w=>{let idx=0;while((idx=textLow.indexOf(w,idx))!==-1){score++;idx+=w.length;}});
      if(score>0)scores.push({pageNum,text:text.trim(),score,source:doc.source||doc.id});
    }
    // Also handle non-paged docs (HazLoc DOCX extracts use === filename === format)
    if(!doc.content.includes('--- PAGE ')){
      const sections=doc.content.split(/=== (.+?) ===/).filter(Boolean);
      for(let i=0;i<sections.length-1;i+=2){
        const name=sections[i],text=sections[i+1]||'',textLow=text.toLowerCase();
        let score=0;
        filtered.forEach(w=>{let idx=0;while((idx=textLow.indexOf(w,idx))!==-1){score++;idx+=w.length;}});
        if(score>0)scores.push({pageNum:name.trim(),text:text.trim(),score,source:doc.source||doc.id});
      }
    }
  });
  scores.sort((a,b)=>b.score-a.score);
  let result='',chars=0;
  const MAX=12000;
  for(const pg of scores){
    if(chars+pg.text.length>MAX)break;
    result+=`\n[${pg.source} — Page ${pg.pageNum}]\n${pg.text}\n`;
    chars+=pg.text.length;
  }
  return result;
}

let _bgTasks={};           // { [taskId]: { taskId, panelName, projectId, status, msg } }
let _bgDeleteTimers={};    // { [taskId]: timerHandle } — cancel stale timers on bgStart
let _bgListeners=new Set();
function _bgNotify(){_bgListeners.forEach(fn=>fn({..._bgTasks}));}
function bgStart(taskId,panelName,projectId,msg){
  // Cancel any pending delete timer so a re-upload within the cleanup window doesn't wipe the new task
  if(_bgDeleteTimers[taskId]){clearTimeout(_bgDeleteTimers[taskId]);delete _bgDeleteTimers[taskId];}
  _bgTasks[taskId]={taskId,panelName,projectId,status:"running",msg:msg||"Processing…",pct:0,startedAt:Date.now()};
  _bgNotify();
}
function bgSetPct(taskId,pct,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],pct,...(msg&&{msg})};
  _bgNotify();
}
function bgUpdate(taskId,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],msg};
  _bgNotify();
}
function bgDone(taskId,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],status:"done",pct:100,msg:msg||"Complete"};
  _bgNotify();
  _bgDeleteTimers[taskId]=setTimeout(()=>{delete _bgTasks[taskId];delete _bgDeleteTimers[taskId];_bgNotify();},4000);
}
function bgError(taskId,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],status:"error",msg:msg||"Error"};
  _bgNotify();
  // No auto-dismiss — user must acknowledge errors
}
function bgDismiss(taskId){
  if(_bgDeleteTimers[taskId]){clearTimeout(_bgDeleteTimers[taskId]);delete _bgDeleteTimers[taskId];}
  delete _bgTasks[taskId];
  _bgNotify();
}

// ── LABOR ESTIMATION (centralized) ──
function computeFallbackLaborHours(wireCount){
  if(!wireCount)return 0;
  return Math.round((Math.ceil(wireCount/12)+Math.ceil(wireCount/8))/2);
}

function computeLaborEstimate(panel){
  const pr=panel.pricing||{};
  const laborRate=pr.laborRate??45;
  const ld=panel.laborData||null;
  const fmt=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

  // Total override: laborHoursOverride bypasses everything
  if((pr.laborHoursOverride??null)!==null){
    const hrs=pr.laborHoursOverride;
    const cost=hrs*laborRate;
    return{lines:[{category:"Total Override",qty:hrs,unit:"hr",rate:laborRate,hours:hrs,cost}],totalCost:cost,totalHours:hrs,inputs:{},hasLayoutData:false,isLegacy:false,isOverride:true};
  }

  // Legacy fallback: no laborData
  if(!ld){
    const wireCount=panel.validation?.wireCount||0;
    if(!wireCount)return{lines:[],totalCost:0,totalHours:0,inputs:{},hasLayoutData:false,isLegacy:true,isOverride:false};
    const hrs=computeFallbackLaborHours(wireCount);
    const cost=hrs*laborRate;
    return{lines:[{category:"Wire Time (legacy)",qty:wireCount,unit:"wires",rate:laborRate,cost,hours:hrs}],totalCost:cost,totalHours:hrs,inputs:{wireCount},hasLayoutData:false,isLegacy:true,isOverride:false};
  }

  // Full labor estimation from laborData
  const counts=ld.counts||{};
  const overrides=ld.overrides||{};
  const defaults=ld.defaults||{};
  const hasLayout=ld.hasLayoutData||false;

  // Helper: override > auto > default
  const val=(field,def)=>overrides[field]??counts[field]??defaults[field]??def;

  const wireCount=val("wireCount",0);
  const wireTerminations=val("wireTerminations",0);
  const doorDevices=val("doorDevices",0);
  const allDevices=val("allDevices",0);
  const panelHoles=val("panelHoles",0);
  const ductDinFeet=val("ductDinFeet",0);
  const sideTopSmallCount=val("sideTopSmallCount",0);
  const sideTopLargeCount=val("sideTopLargeCount",0);
  const squareCutoutCount=val("squareCutoutCount",0);
  const sideDeviceHours=val("sideDeviceHours",0);
  const sideDeviceCount=val("sideDeviceCount",0);
  const pmUnits=val("pmUnits",2);
  const buyoffUnits=val("buyoffUnits",2);
  const cratingUnits=val("cratingUnits",1);
  const labelHours=val("labelHours",4);

  const lines=[];
  const addLine=(category,qty,minPerUnit,unit,field)=>{
    const hours=qty*minPerUnit/60;
    const cost=hours*laborRate;
    lines.push({category,qty,unit,minPerUnit,hours,cost,field});
  };

  addLine("Wire Time",wireCount,LABOR_RATES.wireMinPerPoint,"wires","wireCount");
  addLine("Door Wiring",doorDevices,LABOR_RATES.doorDeviceMinPerDevice,"devices","doorDevices");
  addLine("Device Mounting",allDevices,LABOR_RATES.mountingMinPerDevice,"devices","allDevices");
  addLine("Duct & DIN Rail",ductDinFeet,LABOR_RATES.ductDinMinPerFoot,"feet","ductDinFeet");
  addLine("Panel Holes",panelHoles,LABOR_RATES.holesMinPerHole,"holes","panelHoles");
  // Side-mounted components (unified: fans, ACs, fan shrouds, horns, etc.)
  if(sideDeviceHours>0)lines.push({category:"Side-Mounted Components",qty:sideDeviceHours,unit:"hours",minPerUnit:60,hours:sideDeviceHours,cost:sideDeviceHours*laborRate,field:"sideDeviceHours"});
  // Labels: stored as hours directly
  lines.push({category:"Labels",qty:labelHours,unit:"hours",minPerUnit:60,hours:labelHours,cost:labelHours*laborRate,field:"labelHours"});
  addLine("Project Mgmt",pmUnits,LABOR_RATES.pmMinPerUnit,"sessions","pmUnits");

  addLine("Crating Time",cratingUnits,LABOR_RATES.cratingMinPerUnit,"crates","cratingUnits");

  const totalHours=lines.reduce((s,l)=>s+l.hours,0);
  const totalCost=totalHours*laborRate;

  return{
    lines,totalCost,totalHours,
    inputs:{wireCount,wireTerminations,doorDevices,allDevices,panelHoles,ductDinFeet,sideTopSmallCount,sideTopLargeCount,squareCutoutCount,sideDeviceHours,sideDeviceCount,pmUnits,buyoffUnits,cratingUnits,labelHours},
    hasLayoutData:hasLayout,
    isLegacy:false,
    isOverride:false
  };
}

function isPanelBudgetary(panel){
  // A panel is BUDGETARY if it has at least one BOM item that is not confirmed in BC.
  // Panels with no BOM items are treated as non-budgetary (blank/not-yet-extracted).
  const bom=(panel.bom||[]).filter(r=>!r.isLaborRow&&!r.isCrossed);
  if(!bom.length)return false;
  return !bom.every(r=>r.priceSource==='bc');
}

function computePanelSellPrice(panel){
  const pr=panel.pricing||{};
  const laborEst=computeLaborEstimate(panel);
  const bom=(panel.bom||[]).filter(r=>!r.isLaborRow&&!r.isCrossed);
  const materialCost=bom.reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
  const contingencyBOM=pr.contingencyBOM??_pricingConfig.contingencyBOM;
  const contingencyConsumables=pr.contingencyConsumables??_pricingConfig.contingencyConsumables;
  const grandTotal=materialCost+laborEst.totalCost+contingencyBOM+contingencyConsumables;
  const markup=pr.markup??30;
  return Math.round(grandTotal*(1+markup/100)*100)/100;
}

// ── LABOR BOM ROWS (auto-managed, always first 3 rows) ──
const LABOR_BOM_GROUPS=[
  {partNumber:"1012",description:"CUT",   cats:["Panel Holes","Side-Mounted Components"]},
  {partNumber:"1013",description:"LAYOUT",cats:["Device Mounting","Duct & DIN Rail","Labels"]},
  {partNumber:"1014",description:"WIRE",  cats:["Wire Time","Door Wiring"]},
];
function buildLaborBomRows(panel){
  const est=computeLaborEstimate(panel);
  if(!est.lines.length)return[];
  return LABOR_BOM_GROUPS.map(g=>{
    const hrs=est.lines.filter(l=>g.cats.includes(l.category)).reduce((s,l)=>s+l.hours,0);
    return{id:`labor-${g.partNumber}`,isLaborRow:true,partNumber:g.partNumber,description:g.description,qty:Math.ceil(hrs)||0,unitPrice:null,priceSource:"bc",priceDate:Date.now(),manufacturer:"",notes:""};
  });
}
function syncLaborBomRows(panel){
  const laborRows=buildLaborBomRows(panel);
  if(!laborRows.length)return panel;
  const nonLabor=(panel.bom||[]).filter(r=>!r.isLaborRow);
  return{...panel,bom:[...laborRows,...nonLabor]};
}

// Load MSAL on demand — not at page load (avoids conflict with Firebase Microsoft auth)
function loadMsalScript(){
  return new Promise((res,rej)=>{
    if(window.msal){res();return;}
    const s=document.createElement("script");
    s.src="https://alcdn.msauth.net/browser/2.28.1/js/msal-browser.min.js";
    s.onload=()=>res();
    s.onerror=()=>rej(new Error("Failed to load MSAL"));
    document.head.appendChild(s);
  });
}

async function ensureMsal(){
  if(_msalReady)return _msalInstance;
  await loadMsalScript();
  try{
    _msalInstance=new msal.PublicClientApplication({
      auth:{clientId:BC_CLIENT_ID,authority:`https://login.microsoftonline.com/${BC_TENANT}`,redirectUri:window.location.origin},
      cache:{cacheLocation:"sessionStorage"}
    });
    await _msalInstance.initialize();
    _msalReady=true;
    return _msalInstance;
  }catch(e){console.warn("MSAL init failed:",e);return null;}
}

async function acquireBcToken(interactive=true){
  const inst=await ensureMsal();
  if(!inst)return null;
  const scopes=["https://api.businesscentral.dynamics.com/.default"];
  // Try silent with cached accounts first
  try{
    const accounts=inst.getAllAccounts();
    if(accounts.length>0){
      const resp=await inst.acquireTokenSilent({scopes,account:accounts[0]});
      _bcToken=resp.accessToken;
      return _bcToken;
    }
  }catch(e){console.log("Silent BC token failed, trying ssoSilent…");}
  // Try SSO silent — works if the user already has an active Microsoft browser session
  try{
    const hint=fbAuth.currentUser?.email;
    const resp=await inst.ssoSilent({scopes,...(hint?{loginHint:hint}:{})});
    _bcToken=resp.accessToken;
    return _bcToken;
  }catch(e){}
  if(!interactive)return null;
  try{
    const resp=await inst.acquireTokenPopup({scopes});
    _bcToken=resp.accessToken;
    tryGraphTokenSilent().catch(()=>{}); // background: pre-consent Mail.Send if already granted
    return _bcToken;
  }catch(e){console.warn("BC token acquisition failed:",e);return null;}
}

// Heuristic: same chars different formatting = format; very different = extraction
function guessCorrection(origPN,newPN){
  const norm=s=>s.replace(/[-\s./\\()]/g,'').toUpperCase();
  const a=norm(origPN),b=norm(newPN);
  if(a===b)return'format';
  // Count overlapping chars
  let matches=0;
  const shorter=a.length<=b.length?a:b;
  const longer=a.length>b.length?a:b;
  for(const c of shorter){if(longer.includes(c))matches++;}
  const ratio=matches/Math.max(a.length,b.length,1);
  return ratio>=0.55?'format':'extraction';
}

async function logPanelToCPD(uid,panel,categorizedBom,metadata=null){
  const cpd=await loadCPD(uid);
  const plcProc=categorizedBom.filter(r=>r.cpdCategory==='PLC Processor').length;
  const plcIn=categorizedBom.filter(r=>r.cpdCategory==='PLC I/O Module'&&/(input|DI|AI)/i.test(r.description||'')).length;
  const plcOut=categorizedBom.filter(r=>r.cpdCategory==='PLC I/O Module'&&/(output|DO|AO)/i.test(r.description||'')).length;
  const motors=categorizedBom.filter(r=>['VFD','Contactor'].includes(r.cpdCategory)).length;
  const existing=cpd.panels||[];
  const prev=existing.find(p=>p.panelId===panel.id)||{};
  const spec={
    ...prev,
    panelId:panel.id,panelName:panel.name||panel.drawingNo||'Panel',
    projectId:panel.projectId||'',
    drawingNo:panel.drawingNo||'',
    specs:{plcProcessors:plcProc,plcInputs:plcIn,plcOutputs:plcOut,motorCount:motors,
      itemCount:categorizedBom.filter(r=>!r.isLaborRow).length},
    bomSummary:categorizedBom.filter(r=>!r.isLaborRow).map(r=>({category:r.cpdCategory||'Other',partNumber:r.partNumber,description:r.description,qty:r.qty||1})),
    ...(metadata?{
      panelType:metadata.panelType||prev.panelType||'',
      controlledEquipment:metadata.controlledEquipment||prev.controlledEquipment||'',
      voltages:metadata.voltages||prev.voltages||{},
      plcBrand:metadata.plcBrand||prev.plcBrand||'',
      enclosureType:metadata.enclosureType||prev.enclosureType||'',
      additionalNotes:metadata.additionalNotes||prev.additionalNotes||'',
      ...(metadata.inputCount>0?{specs:{...spec.specs,plcInputs:metadata.inputCount}}:{}),
      ...(metadata.outputCount>0?{specs:{...spec.specs,plcOutputs:metadata.outputCount}}:{}),
      ...(metadata.motorCount>0?{specs:{...spec.specs,motorCount:metadata.motorCount}}:{})
    }:{}),
    scannedAt:Date.now()
  };
  const panels=[...(cpd.panels||[]).filter(p=>p.panelId!==panel.id),spec];
  // Merge new products
  const existingProds=cpd.products||[];
  const newProds=[...existingProds];
  categorizedBom.filter(r=>!r.isLaborRow&&r.partNumber).forEach(r=>{
    const pn=(r.partNumber||'').trim();
    if(!pn)return;
    const idx=newProds.findIndex(p=>p.partNumber===pn);
    if(idx>=0){newProds[idx]={...newProds[idx],seenCount:(newProds[idx].seenCount||1)+1,lastSeen:Date.now()};}
    else{newProds.push({partNumber:pn,description:r.description||'',manufacturer:r.manufacturer||'',category:r.cpdCategory||'Other',approvals:{ul:'',ce:'',csa:''},seenCount:1,lastSeen:Date.now()});}
  });
  await saveCPD(uid,{panels,products:newProds});
}

// Keyword-based part categorizer
function categorizePart(partNumber,description){
  const t=((description||'')+(partNumber||'')).toLowerCase();
  if(/controllogix|compactlogix|micrologix|1756-l|1769-l|s7-\d{3}|plc.*cpu|cpu.*plc|processor.*module/.test(t))return'PLC Processor';
  if(/1756-[io]|1769-[io]|input.*module|output.*module|analog.*input|analog.*output|digital.*input|digital.*output|ai\d|ao\d|di\d|do\d|ib16|ob16|ia8|oa8/.test(t))return'PLC I/O Module';
  if(/\bvfd\b|variable.freq|powerflex|altivar|optidrive|micromaster|g120|g110|sv0/.test(t))return'VFD';
  if(/\bcontactor\b|iec.*motor|definite.purpose|dp.?contactor|100-[ccd]/.test(t))return'Contactor';
  if(/\brelay\b|ice\d|700-|750-|intermediate.relay|plug.in.relay|cr\d\d/.test(t))return'Relay';
  if(/mccb|molded.case|main.*breaker|hfd|hja|hjd|lal|main.*disconnect/.test(t))return'MCCB';
  if(/\bbreaker\b|ul.?489|qo\d|qob|hom|faz|c60n|miniature.circuit/.test(t))return'Circuit Breaker';
  if(/\bduct\b|wireway|panduit.*duct|wiring.duct|trunking/.test(t))return'Wire Duct';
  if(/din.?rail|ts.?35|top.hat|omega.rail|g-rail/.test(t))return'DIN Rail';
  if(/terminal|ptfix|sak\d|ut\d|pt \d|fence.*term|din.*term|terminal.*block/.test(t))return'Terminal Block';
  if(/enclosure.*heat|cabinet.*heat|strip.heat|ptc.heat|\bheater\b/.test(t))return'Heater';
  if(/air.cond|vortex|cooler|thermal.manag|cabinet.*cool/.test(t))return'Air Conditioner';
  if(/\bhorn\b|\bbeacon\b|\bsiren\b|\bstrobe\b|signal.tower|stack.?light|xvbc|k80l/.test(t))return'Horn/Beacon';
  if(/enclosure|nema.*\d|hoffman|rittal|junction.box|wireway.encl/.test(t))return'Enclosure';
  if(/\bhmi\b|panelview|pro-face|touch.*screen|operator.*interface|weintek/.test(t))return'HMI';
  if(/pilot.light|push.?button|selector|door.op|xb\d|800f|800h|illuminated/.test(t))return'Pilot Light/Operator';
  return'Other';
}

async function apiCall(body){
  if(!_apiKey)throw new Error("API key not set. Open Settings and add your Anthropic key.");
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-6",...body})
  });
  const d=await r.json();
  if(!r.ok){console.error("API ERROR:",r.status,d.error?.type,d.error?.message);throw new Error(d.error?.message||"API error");}
  return d.content?.[0]?.text||"";
}

async function parallelMap(items,fn,concurrency=4){
  const results=[];
  let idx=0;
  const workers=Array.from({length:Math.min(concurrency,items.length)},async()=>{
    while(idx<items.length){
      const i=idx++;
      results[i]=await fn(items[i],i);
    }
  });
  await Promise.all(workers);
  return results;
}

async function bcAttachPdfToJob(jobNumber,fileName,pdfArrayBuffer){
  const {compId,jobId}=await bcGetJobGuid(jobNumber);
  // Check for existing attachment with same filename
  const chk=await fetch(`${BC_API_BASE}/companies(${compId})/projects(${jobId})/documentAttachments?$filter=fileName eq '${encodeURIComponent(fileName)}'`,{
    headers:{"Authorization":`Bearer ${_bcToken}`}
  });
  if(chk.ok){
    const existing=(await chk.json()).value||[];
    if(existing.length>0)throw new Error(`Duplicate: "${fileName}" already exists in BC. Remove it first or re-stamp to generate a new filename.`);
  }
  // Step 1: create attachment record
  const cr=await fetch(`${BC_API_BASE}/companies(${compId})/projects(${jobId})/documentAttachments`,{
    method:"POST",
    headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({fileName})
  });
  if(!cr.ok){const t=await cr.text();throw new Error(`BC attachment create failed (${cr.status}): ${t}`);}
  const att=await cr.json();
  const editLink=att["attachmentContent@odata.mediaEditLink"];
  if(!editLink)throw new Error("BC did not return mediaEditLink for attachment");
  const etag=att["@odata.etag"]||"*";
  // Step 2: upload binary content
  const ur=await fetch(editLink,{
    method:"PATCH",
    headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/pdf","If-Match":etag},
    body:pdfArrayBuffer
  });
  if(!ur.ok){const t=await ur.text();throw new Error(`BC attachment upload failed (${ur.status}): ${t}`);}
  return att;
}

async function bcAttachPdfQueued(jobNumber,fileName,pdfArrayBuffer){
  if(!_bcToken||!jobNumber){
    if(jobNumber&&fileName&&pdfArrayBuffer){
      try{
        const pdfBase64=btoa(String.fromCharCode(...new Uint8Array(pdfArrayBuffer)));
        bcEnqueue('attachPdf',{jobNumber,fileName,pdfBase64},`Attach "${fileName}" to BC project ${jobNumber}`);
      }catch(e){console.warn("Could not queue PDF attachment:",e);}
    }
    return;
  }
  try{
    await bcAttachPdfToJob(jobNumber,fileName,pdfArrayBuffer);
  }catch(e){
    if(!_bcToken&&jobNumber&&fileName&&pdfArrayBuffer){
      try{
        const pdfBase64=btoa(String.fromCharCode(...new Uint8Array(pdfArrayBuffer)));
        bcEnqueue('attachPdf',{jobNumber,fileName,pdfBase64},`Attach "${fileName}" to BC project ${jobNumber}`);
      }catch(e2){console.warn("Could not queue PDF attachment:",e2);}
    }else throw e;
  }
}

async function bcCopyProjectFromTemplate(fromProjectNumber, toProjectNumber){
  // BC v2.0 REST API does not expose projectTasks — use OData via published web services instead.
  // Requires a "JobTaskLines" page (Object ID 1002) published in BC Web Services.
  const allPages=await bcDiscoverODataPages();
  console.log("bcCopy: available OData pages:",allPages.join(", "));

  // Find a task page — common names: JobTaskLines, Job_Task_Lines, ProjectTaskLines
  const taskPage=allPages.find(n=>/job.?task|project.?task/i.test(n))||null;
  if(!taskPage){
    console.warn("bcCopy: No job task OData page found. Publish page 1002 (Job Task Lines) as a BC web service named 'JobTaskLines'.");
    return 0;
  }
  console.log(`bcCopy: using OData page "${taskPage}" for tasks`);

  // Read tasks from template via OData — BC OData field names use underscores
  const readUrl=`${BC_ODATA_BASE}/${taskPage}?$filter=Job_No eq '${encodeURIComponent(fromProjectNumber)}'`;
  const tr=await fetch(readUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(!tr.ok){console.warn(`bcCopy: task read failed (${tr.status})`);return 0;}
  const tasks=(await tr.json()).value||[];
  console.log(`bcCopy: ${tasks.length} tasks to copy from ${fromProjectNumber} → ${toProjectNumber}`);

  // Write each task to the new project via OData POST
  let copied=0;
  for(const task of tasks){
    const body={
      Job_No:toProjectNumber,
      Job_Task_No:task.Job_Task_No||task.jobTaskNumber||"",
      Description:task.Description||task.description||"",
      Job_Task_Type:task.Job_Task_Type||task.jobTaskType||"Posting"
    };
    if(task.Totaling||task.totaling)body.Totaling=task.Totaling||task.totaling;
    if(task.New_Page!=null)body.New_Page=task.New_Page;
    if(task.Indentation!=null)body.Indentation=task.Indentation||task.indentation||0;
    const r=await fetch(`${BC_ODATA_BASE}/${taskPage}`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(r.ok){copied++;console.log(`bcCopy: task ${body.Job_Task_No} copied`);}
    else console.warn(`bcCopy: task ${body.Job_Task_No} failed (${r.status}):`,await r.text());
  }
  return copied;
}

async function bcCreatePanelTaskStructure(projectNumber, projectName, panels){
  // Creates the ARC-defined BC Job Task hierarchy for a new project.
  //
  // Numbering scheme:
  //   10000   = Project header (Begin-Total)             "{projectNumber} - {projectName}"
  //   20N00   = Panel N Begin-Total                      "{projectNumber}-{N*100} - {panelName}"
  //   20N10   = Panel N BOM / Drawing work (Posting)     "{projectNumber}-{N*100} Rev - - {panelName}"
  //             → Planning lines will be populated from BOM (future step)
  //             → Dwg Rev# will be tracked as an ARC panel field (future build-out)
  //   20N20   = Engineering / Design / Programming / Onsite Commissioning (Posting — future build-out)
  //   20N30   = ECO 1 for Panel N  ← created on-demand via bcAddEcoTask() (future build-out)
  //   20N31   = ECO 2 for Panel N  ← created on-demand
  //   ...up to 20N39 = ECO 10 for Panel N (10 ECO slots per panel)
  //   ECO tasks are NOT pre-created; only added when an ECO is created in ARC for a quote.
  //   20N99   = Panel N End-Total                        "TOTAL: {projectNumber}-{N*100} - {panelName}"
  //   99999   = Project End-Total                        "TOTAL: {projectNumber} - {projectName}"
  //
  // Panel index N is 1-based: Panel 1 → base 20100, Panel 2 → 20200, etc.

  const allPages=await bcDiscoverODataPages();
  const taskPage=allPages.find(n=>/^project.?task/i.test(n))||allPages.find(n=>/job.?task/i.test(n))||null;
  if(!taskPage){
    const msg=`No Project Task OData page found (available: ${allPages.join(", ")||"none"}). Publish BC web service page 1002 as 'ProjectTaskLines'.`;
    console.warn("bcCreatePanelTaskStructure:",msg);
    throw new Error(msg);
  }

  // Helper: build a task object using the given field-name prefix ("Project" or "Job")
  function makeTask(prefix,noVal,taskNoVal,desc,type,extra={}){
    return{[`${prefix}_No`]:noVal,[`${prefix}_Task_No`]:taskNoVal,Description:desc,[`${prefix}_Task_Type`]:type,...extra};
  }

  function buildTasks(prefix){
    const t=[];
    t.push(makeTask(prefix,projectNumber,"10000",`${projectNumber} - ${projectName}`,"Begin-Total"));
    for(let i=0;i<panels.length;i++){
      const n=i+1,base=20000+n*100,suffix=n*100;
      const beginNo=String(base),endNo=String(base+99),postingNo=String(base+10),engNo=String(base+20);
      const panelDesc=panels[i].drawingDesc||panels[i].name||`Panel ${n}`;
      const rev=panels[i].drawingRev||"-";
      const pfx=`${projectNumber}-${suffix}`;
      t.push(makeTask(prefix,projectNumber,beginNo,`${pfx} - ${panelDesc}`,"Begin-Total"));
      t.push(makeTask(prefix,projectNumber,postingNo,`${panels[i].drawingNo||pfx} Rev ${rev} - ${panelDesc}`,"Posting"));
      t.push(makeTask(prefix,projectNumber,engNo,`Engineering Design - ${panelDesc}`,"Posting"));
      t.push(makeTask(prefix,projectNumber,endNo,`TOTAL: ${pfx} - ${panelDesc}`,"End-Total",{Totaling:`${beginNo}..${endNo}`}));
    }
    t.push(makeTask(prefix,projectNumber,"99999",`TOTAL: ${projectNumber} - ${projectName}`,"End-Total",{Totaling:"10000..99999"}));
    return t;
  }

  // Probe: try first task with Project_ fields; auto-fall back to Job_ if BC rejects Project_No
  async function postTasks(prefix){
    const tasks=buildTasks(prefix);
    const taskNoField=`${prefix}_Task_No`;
    let created=0;
    for(const task of tasks){
      const r=await fetch(`${BC_ODATA_BASE}/${taskPage}`,{
        method:"POST",
        headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
        body:JSON.stringify(task)
      });
      if(r.ok){created++;console.log(`bcCreatePanelTaskStructure: task ${task[taskNoField]} created (${prefix}_No)`);}
      else{
        const txt=await r.text();
        if(created===0&&prefix==="Project"&&txt.includes("'Project_No' does not exist")){
          console.log("bcCreatePanelTaskStructure: Project_No rejected, retrying with Job_No");
          return postTasks("Job");
        }
        console.warn(`bcCreatePanelTaskStructure: task ${task[taskNoField]} failed (${r.status}):`,txt);
      }
    }
    return created;
  }

  console.log(`bcCreatePanelTaskStructure: using page '${taskPage}', probing with Project_No fields`);
  return postTasks("Project");
}

async function bcAddEcoTask(projectNumber, panelIndex, ecoNumber, panelName){
  // Adds a single ECO task line to BC for a specific panel.
  // Called on-demand when an ECO is created in ARC — NOT at project init.
  //
  // panelIndex : 1-based panel number (1 = Panel 1, 2 = Panel 2, …)
  // ecoNumber  : 1-based ECO number (1–10 supported; maps to slots 20N30–20N39)
  //
  // Task No. formula:  20{panelIndex}3{ecoNumber-1}
  //   Panel 1 ECO 1  → 20130,  ECO 2 → 20131, … ECO 10 → 20139
  //   Panel 2 ECO 1  → 20230,  ECO 2 → 20231, … ECO 10 → 20239
  //
  // Description: "ECO {ecoNumber} - Change Order for {panelName}"
  //
  // FUTURE BUILD-OUT: wire this to an "Add ECO" action in the ARC Quote view.
  // Store eco list on project (e.g. panel.ecos:[{number,description,status}]) and
  // call this function when a new ECO is saved.

  if(ecoNumber<1||ecoNumber>10)throw new Error(`ECO number must be 1–10 (got ${ecoNumber})`);
  const n=panelIndex;
  const base=20000+n*100;
  const taskNo=String(base+30+(ecoNumber-1)); // 20130, 20131, …

  const allPages=await bcDiscoverODataPages();
  const taskPage=allPages.find(p=>/^project.?task/i.test(p))||allPages.find(p=>/job.?task/i.test(p))||null;
  if(!taskPage)throw new Error("bcAddEcoTask: No project task OData page found");
  const useProj=taskPage&&/^project/i.test(taskPage);

  const body={
    [useProj?"Project_No":"Job_No"]:projectNumber,
    [useProj?"Project_Task_No":"Job_Task_No"]:taskNo,
    Description:`ECO ${ecoNumber} - Change Order for ${panelName}`,
    [useProj?"Project_Task_Type":"Job_Task_Type"]:"Posting",
    Indentation:2
  };
  const r=await fetch(`${BC_ODATA_BASE}/${taskPage}`,{
    method:"POST",
    headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error(`bcAddEcoTask: task ${taskNo} failed (${r.status}): ${await r.text()}`);
  console.log(`bcAddEcoTask: ECO ${ecoNumber} task ${taskNo} created for panel ${panelIndex}`);
  return taskNo;
}

async function bcSyncPanelTaskDescriptions(projectNumber, panelIndex, panel){
  // PATCHes the description fields on the four task lines for a specific panel
  // (Begin-Total 20N00, Posting 20N10, Engineering 20N20, End-Total 20N99)
  // to match the current drawingDesc/drawingRev values.
  // Called automatically by bcSyncPanelPlanningLines to keep tasks in sync.
  const n=panelIndex;
  const suffix=n*100;
  const pfx=`${projectNumber}-${suffix}`;
  const panelDesc=panel.drawingDesc||panel.name||`Panel ${n}`;
  const rev=panel.drawingRev||"-";
  const base=20000+n*100;
  const taskDescs={
    [String(base)]:    `${pfx} - ${panelDesc}`,
    [String(base+10)]: `${panel.drawingNo||pfx} Rev ${rev} - ${panelDesc}`,
    [String(base+20)]: `Engineering Design - ${panelDesc}`,
    [String(base+99)]: `TOTAL: ${pfx} - ${panelDesc}`,
  };

  const allPages=await bcDiscoverODataPages();
  const taskPage=allPages.find(p=>/^project.?task/i.test(p))||allPages.find(p=>/job.?task/i.test(p))||null;
  if(!taskPage){console.warn("bcSyncPanelTaskDescriptions: no task page found");return;}
  // Probe field names
  let FP_NO="Project_No",FP_TASK_NO="Project_Task_No";
  {
    const pr=await fetch(`${BC_ODATA_BASE}/${taskPage}?$top=1`,{headers:{"Authorization":`Bearer ${_bcToken}`,"Accept":"application/json"}});
    if(pr.ok){const pd=await pr.json();const rec=(pd.value||[])[0];if(rec&&"Job_No"in rec&&!("Project_No"in rec)){FP_NO="Job_No";FP_TASK_NO="Job_Task_No";}}
  }
  for(const [taskNo,desc] of Object.entries(taskDescs)){
    const url=`${BC_ODATA_BASE}/${taskPage}(${FP_NO}='${encodeURIComponent(projectNumber)}',${FP_TASK_NO}='${encodeURIComponent(taskNo)}')`;
    const r=await fetch(url,{method:"PATCH",headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json","If-Match":"*"},body:JSON.stringify({Description:desc})});
    if(r.ok){console.log(`bcSyncPanelTaskDescriptions: task ${taskNo} updated`);}
    else{const t=await r.text();console.warn(`bcSyncPanelTaskDescriptions: task ${taskNo} PATCH failed (${r.status}):`,t);}
  }
}

async function bcSyncPanelPlanningLines(projectNumber, panelIndex, panel){
  // Full sync of BC Job Planning Lines for task 20N10 (where N = panelIndex, 1-based).
  // Strategy: delete all existing lines for the task, then recreate from current ARC state.
  //
  // Line structure:
  //   10000  Billable / Item  "PROGRESS BILLING"   unit price = panel sell price, qty = panel.lineQty
  //   20000  Budget  / R0020  "ENGINEERING"         qty = 0 (not yet tracked in ARC — future build-out)
  //   30000  Budget  / R0020  "CUT"                 qty = CUT hours from ARC labor estimate
  //   40000  Budget  / R0020  "LAYOUT"              qty = LAYOUT hours from ARC labor estimate
  //   50000  Budget  / R0020  "WIRE"                qty = WIRE hours from ARC labor estimate
  //   60000+ Budget  / Item   BOM rows              starting at 60000, step 10000, non-labor non-crossed rows

  const n=panelIndex;
  const base=20000+n*100;
  const taskNo=String(base+10); // "20110", "20210", …
  const suffix=n*100;
  const pfx=`${projectNumber}-${suffix}`;

  // Discover Project Planning Lines OData page
  const allPages=await bcDiscoverODataPages();
  const planPage=allPages.find(p=>/^project.?planning/i.test(p))||allPages.find(p=>/job.?planning/i.test(p))||null;
  if(!planPage)throw new Error(`No Project Planning Lines OData page found (available: ${allPages.join(", ")||"none"}). Publish BC web service page 1007 as 'ProjectPlanningLines'.`);

  // Probe: GET one record to detect whether page uses Project_No or Job_No
  let FP_NO="Project_No",FP_TASK_NO="Project_Task_No";
  {
    const probeUrl=`${BC_ODATA_BASE}/${planPage}?$top=1`;
    const pr=await fetch(probeUrl,{headers:{"Authorization":`Bearer ${_bcToken}`,"Accept":"application/json"}});
    if(pr.ok){
      const pd=await pr.json();
      const rec=(pd.value||[])[0];
      if(rec&&"Job_No"in rec&&!("Project_No"in rec)){FP_NO="Job_No";FP_TASK_NO="Job_Task_No";}
    }
  }
  console.log(`bcSyncPlanningLines: using page '${planPage}' with fields ${FP_NO}/${FP_TASK_NO}`);

  // Step 1: delete all existing planning lines for this task
  const filterUrl=`${BC_ODATA_BASE}/${planPage}?$filter=${FP_NO} eq '${encodeURIComponent(projectNumber)}' and ${FP_TASK_NO} eq '${encodeURIComponent(taskNo)}'`;
  const gr=await fetch(filterUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(gr.ok){
    const existing=(await gr.json()).value||[];
    for(const line of existing){
      const etag=line["@odata.etag"];
      const delUrl=`${BC_ODATA_BASE}/${planPage}(${FP_NO}='${encodeURIComponent(projectNumber)}',${FP_TASK_NO}='${encodeURIComponent(taskNo)}',Line_No=${line.Line_No})`;
      const dr=await fetch(delUrl,{method:"DELETE",headers:{"Authorization":`Bearer ${_bcToken}`,"If-Match":etag||"*"}});
      if(!dr.ok)console.warn(`bcSyncPlanningLines: delete line ${line.Line_No} failed (${dr.status})`);
    }
    console.log(`bcSyncPlanningLines: deleted ${existing.length} existing lines for task ${taskNo}`);
  }

  // Step 2: build lines
  const today=new Date().toISOString().split('T')[0];
  const lines=[];

  // 10000 — Progress Billing (Billable)
  const sellPrice=computePanelSellPrice(panel);
  const lineQty=panel.lineQty??1;
  const panelDesc=panel.drawingDesc||panel.name||`Panel ${n}`;
  const rev=panel.drawingRev||"-";
  lines.push({[FP_NO]:projectNumber,[FP_TASK_NO]:taskNo,Line_No:10000,Planning_Date:panel.requestedShipDate||today,
    Line_Type:"Billable",Type:"Item",No:"PROGRESS BILLING",
    Description:`${panel.drawingNo||pfx} Rev ${rev} - ${panelDesc}`,
    Quantity:lineQty,Unit_Price:sellPrice,Location_Code:"MAIN"});

  // 20000 — Engineering (Budget, qty=0 until ARC tracks engineering hours)
  lines.push({[FP_NO]:projectNumber,[FP_TASK_NO]:taskNo,Line_No:20000,Planning_Date:today,
    Line_Type:"Budget",Type:"Resource",No:"R0020",Description:"ENGINEERING",
    Quantity:0,Unit_of_Measure_Code:"HR",Location_Code:"MAIN"});

  // Labor hours from ARC
  const laborEst=computeLaborEstimate(panel);
  const cutHrs=laborEst.lines.filter(l=>["Panel Holes","Side-Mounted Components"].includes(l.category)).reduce((s,l)=>s+l.hours,0);
  const layoutHrs=laborEst.lines.filter(l=>["Device Mounting","Duct & DIN Rail","Labels"].includes(l.category)).reduce((s,l)=>s+l.hours,0);
  const wireHrs=laborEst.lines.filter(l=>["Wire Time","Door Wiring"].includes(l.category)).reduce((s,l)=>s+l.hours,0);

  // 30000 — CUT
  lines.push({[FP_NO]:projectNumber,[FP_TASK_NO]:taskNo,Line_No:30000,Planning_Date:today,
    Line_Type:"Budget",Type:"Resource",No:"R0020",Description:"CUT",
    Quantity:Math.round(cutHrs*100)/100,Unit_of_Measure_Code:"HR",Location_Code:"MAIN"});

  // 40000 — LAYOUT
  lines.push({[FP_NO]:projectNumber,[FP_TASK_NO]:taskNo,Line_No:40000,Planning_Date:today,
    Line_Type:"Budget",Type:"Resource",No:"R0020",Description:"LAYOUT",
    Quantity:Math.round(layoutHrs*100)/100,Unit_of_Measure_Code:"HR",Location_Code:"MAIN"});

  // 50000 — WIRE
  lines.push({[FP_NO]:projectNumber,[FP_TASK_NO]:taskNo,Line_No:50000,Planning_Date:today,
    Line_Type:"Budget",Type:"Resource",No:"R0020",Description:"WIRE",
    Quantity:Math.round(wireHrs*100)/100,Unit_of_Measure_Code:"HR",Location_Code:"MAIN"});

  // 60000+ — ALL BOM items (non-labor; isCrossed rows ARE the replacement parts and must be included)
  const bomRows=(panel.bom||[]).filter(r=>!r.isLaborRow);
  let lineNo=60000;
  for(const row of bomRows){
    const desc=(row.description||"").slice(0,100);
    const fallbackDesc=`${row.partNumber||""} - ${(row.description||"").slice(0,90)}`.slice(0,100).trim();
    lines.push({[FP_NO]:projectNumber,[FP_TASK_NO]:taskNo,Line_No:lineNo,Planning_Date:today,
      Line_Type:"Budget",Type:"Item",No:row.partNumber,
      Description:desc,
      Quantity:row.qty||1,Unit_Price:row.unitPrice||0,Location_Code:"MAIN",
      _row:row,
      _fallback:{[FP_NO]:projectNumber,[FP_TASK_NO]:taskNo,Line_No:lineNo,Planning_Date:today,
        Line_Type:"Budget",Type:"Text",
        Description:fallbackDesc,
        Quantity:row.qty||1}});
    lineNo+=10000;
  }

  // Step 3: POST all lines — retry on 429, fallback to Text on item errors
  const sleep=ms=>new Promise(res=>setTimeout(res,ms));
  const failedRows=[];
  let created=0;

  async function postLine(payload){
    const r=await fetch(`${BC_ODATA_BASE}/${planPage}`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    if(r.status===429){await sleep(2000);
      const r2=await fetch(`${BC_ODATA_BASE}/${planPage}`,{
        method:"POST",
        headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      return r2;
    }
    return r;
  }

  for(const line of lines){
    await sleep(150);
    const {_fallback,_row,...payload}=line;
    const r=await postLine(payload);
    if(r.ok){created++;console.log(`bcSyncPlanningLines: line ${line.Line_No} (${line.Description}) created`);}
    else if(_fallback){
      const txt=await r.text();
      console.warn(`bcSyncPlanningLines: line ${line.Line_No} item POST failed (${r.status}), retrying as text:`,txt);
      await sleep(400);
      const r2=await postLine(_fallback);
      if(r2.ok){created++;console.log(`bcSyncPlanningLines: line ${line.Line_No} created as text line`);}
      else{
        const txt2=await r2.text();
        console.error(`bcSyncPlanningLines: line ${line.Line_No} TEXT fallback also failed (${r2.status}):`,txt2);
        if(_row)failedRows.push({partNumber:_row.partNumber||"",description:_row.description||"",rowId:_row.id,lineNo:line.Line_No,error:txt2});
      }
    }else{
      const txt=await r.text();
      console.error(`bcSyncPlanningLines: line ${line.Line_No} failed (${r.status}):`,txt);
      if(_row)failedRows.push({partNumber:_row.partNumber||"",description:_row.description||"",rowId:_row.id,lineNo:line.Line_No,error:txt});
    }
  }
  console.log(`bcSyncPlanningLines: ${created}/${lines.length} lines synced for task ${taskNo}${failedRows.length?` — ${failedRows.length} FAILED`:""}`,failedRows);
  return{created,total:lines.length,failed:failedRows};
}

async function bcCreateProject(displayName, customerNumber){
  if(!_bcToken)throw new Error("Not connected to Business Central");
  if(!customerNumber)throw new Error("A customer must be selected");
  const compId=await bcGetCompanyId();
  if(!compId)throw new Error("Could not resolve Business Central company");
  let projectId=null;
  try{
    // Step 1: Create project (name only)
    const r=await fetch(`${BC_API_BASE}/companies(${compId})/projects`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify({displayName})
    });
    if(!r.ok){const txt=await r.text();throw new Error(`BC project creation failed (${r.status}): ${txt}`);}
    const d=await r.json();
    projectId=d.id;

    // Step 2: PATCH project defaults via OData (BC requires customer before task lines)
    // Ending_Date (customer requested ship date) is a future ARC field — not yet tracked.
    // Global_Dimension_1_Code = "Project Code" (custom dimension, integrator-added) = BC project number
    const today=new Date().toISOString().split('T')[0];
    const _patchFields={
      Bill_to_Customer_No:customerNumber,
      Global_Dimension_1_Code:d.number,
      Location_Code:"MAIN",
      Status:"Quote",
      Job_Posting_Group:"DEFAULT",
      Bin_Code:"PROJ-IN",
      WIP_Method:"COMPLETED CONTRACT",
      WIP_Posting_Method:"Per Project",
      Starting_Date:today
    };
    await bcPatchJobOData(d.number,_patchFields).then(()=>{
      console.log("bcCreateProject: Project Code dimension (Global_Dimension_1_Code) set to",d.number);
    }).catch(e=>{
      if(!_bcToken)bcEnqueue('patchJob',{projectNumber:d.number,fields:_patchFields},`Update BC project ${d.number}`);
      else throw e;
    });

    // Step 3: Panel task structure is created by the caller (bcCreatePanelTaskStructure) after panels are known
    return{id:d.id,number:d.number,displayName:d.displayName,customerNumber:customerNumber,customerName:null};
  }catch(e){
    // Rollback: delete the BC project if it was created
    if(projectId){
      try{
        const g=await fetch(`${BC_API_BASE}/companies(${compId})/projects(${projectId})`,{headers:{"Authorization":`Bearer ${_bcToken}`}});
        if(g.ok){
          const etag=g.headers.get("ETag");
          await fetch(`${BC_API_BASE}/companies(${compId})/projects(${projectId})`,{method:"DELETE",headers:{"Authorization":`Bearer ${_bcToken}`,"If-Match":etag||"*"}});
          console.log("bcCreateProject: rolled back BC project",projectId);
        }
      }catch(re){console.warn("bcCreateProject: rollback failed",re);}
    }
    throw e;
  }
}

async function bcLookupItem(partNumber){
  if(!_bcToken||!partNumber||!partNumber.trim())return null;

  if(!compId)return null;
  const pn=partNumber.trim().replace(/'/g,"''");

    const r=await fetch(`${BC_API_BASE}/companies(${compId})/items?$filter=number eq '${pn}'`,{

    if(!r.ok){console.warn("BC item lookup failed:",r.status);return null;}
    const d=await r.json();
    const item=(d.value||[])[0];
    if(!item)return null;
    return{unitCost:item.unitCost||null,unitPrice:item.unitPrice||null,displayName:item.displayName||"",inventory:item.inventory||0,number:item.number||"",vendorNo:item.vendorNo||""};
  }catch(e){console.warn("BC item lookup error:",e);return null;}

async function bcLookupItems(bomItems){
  const result={};
  for(const row of bomItems){
    const pn=(row.partNumber||"").trim();
    if(!pn)continue;
    const item=await bcLookupItem(pn);
    if(item&&item.unitCost!=null){
      result[String(row.id)]={unitPrice:item.unitCost,source:"bc",bcDisplayName:item.displayName,bcInventory:item.inventory};
    }
  }
  return result;
}

async function _bcFetchItems(compId,filter,top,skip){
  const url=`${BC_API_BASE}/companies(${compId})/items?$filter=${filter}&$top=${top}&$skip=${skip}&$orderby=number`;
  console.log("bcSearchItems URL:",url);
  const r=await fetch(url,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(r.status===401){
    _bcToken=await acquireBcToken(false)||null;
    if(!_bcToken)return null;
    const r2=await fetch(url,{headers:{"Authorization":`Bearer ${_bcToken}`}});
    if(!r2.ok){_bcToken=null;return null;}
    const d2=await r2.json();
    return(d2.value||[]).map(item=>({number:item.number||"",displayName:item.displayName||"",unitCost:item.unitCost??null,unitPrice:item.unitPrice??null,inventory:item.inventory||0,lastModifiedDateTime:item.lastModifiedDateTime||"",vendorNo:item.vendorNo||""}));
  }
  if(!r.ok){console.warn("bcSearchItems failed:",r.status,await r.text());return null;}
  const d=await r.json();
  return(d.value||[]).map(item=>({
    number:item.number||"",displayName:item.displayName||"",
    unitCost:item.unitCost??null,unitPrice:item.unitPrice??null,
    inventory:item.inventory||0,lastModifiedDateTime:item.lastModifiedDateTime||"",vendorNo:item.vendorNo||""
  }));
}
async function bcSearchItems(query,{field="both",top=25,skip=0}={}){
  if(!query||query.trim().length<3)return{items:[],hasMore:false};
  // Auto-reacquire token if missing or recently cleared
  if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
  if(!_bcToken)return{items:[],hasMore:false};
  const compId=await bcGetCompanyId();
  if(!compId)return{items:[],hasMore:false};
  const q=query.trim().replace(/'/g,"''");
  try{
    if(field==="both"){
      // Two separate calls — BC may not support 'or' with contains()
      const [byNum,byName]=await Promise.all([
        _bcFetchItems(compId,`contains(number,'${q}')`,top+1,skip),
        _bcFetchItems(compId,`contains(displayName,'${q}')`,top+1,skip)
      ]);
      const seen=new Set();
      const merged=[];
      for(const item of[...(byNum||[]),...(byName||[])]){
        if(!seen.has(item.number)){seen.add(item.number);merged.push(item);}
      }
      merged.sort((a,b)=>a.number.localeCompare(b.number));
      const hasMore=merged.length>top;
      console.log("bcSearchItems results:",Math.min(merged.length,top),"items (both fields)");
      return{items:merged.slice(0,top),hasMore};
    }
    const filter=field==="number"?`contains(number,'${q}')`:`contains(displayName,'${q}')`;
    const all=await _bcFetchItems(compId,filter,top+1,skip);
    if(!all)return{items:[],hasMore:false};
    const hasMore=all.length>top;
    console.log("bcSearchItems results:",Math.min(all.length,top),"items");
    return{items:all.slice(0,top),hasMore};
  }catch(e){console.warn("bcSearchItems error:",e);return{items:[],hasMore:false};}
}

async function bcFuzzyLookup(partNumber){
  if(!_bcToken||!partNumber||!partNumber.trim())return{match:null,type:null,suggestions:[]};
  const pn=partNumber.trim();
  // 1. Exact match
  const exact=await bcLookupItem(pn);
  if(exact&&exact.unitCost!=null)return{match:exact,type:"exact",suggestions:[]};
  // 2. Stripped search — remove dashes, spaces, special chars
  const stripped=pn.replace(/[-\s\/\\.#_]+/g,"");
  if(stripped.length>=3){
    const r2=await bcSearchItems(stripped,{field:"number",top:10});
    if(r2.items.length===1)return{match:r2.items[0],type:"fuzzy",suggestions:[]};
    if(r2.items.length>1)return{match:null,type:"fuzzy",suggestions:r2.items.slice(0,8)};
  }
  // 3. Original as contains search
  if(pn.length>=3){
    const r3=await bcSearchItems(pn,{field:"number",top:10});
    if(r3.items.length===1)return{match:r3.items[0],type:"fuzzy",suggestions:[]};
    if(r3.items.length>1)return{match:null,type:"fuzzy",suggestions:r3.items.slice(0,8)};
  }
  // 4. Core substring — strip common prefixes/suffixes
  const core=pn.replace(/^(mtx|mat|mx|ms)[-\s]*/i,"").replace(/[-\s]*(rev[a-z0-9]*|v\d+)$/i,"").trim();
  if(core.length>=3&&core!==pn&&core!==stripped){
    const r4=await bcSearchItems(core,{field:"number",top:10});
    if(r4.items.length===1)return{match:r4.items[0],type:"fuzzy",suggestions:[]};
    if(r4.items.length>1)return{match:null,type:"fuzzy",suggestions:r4.items.slice(0,8)};
  }
  return{match:null,type:null,suggestions:[]};
}

async function bcCreateItem({number,displayName,unitCost,itemCategoryCode,baseUnitOfMeasureCode,vendorNo,genProdPostingGroup,inventoryPostingGroup}){
  if(!_bcToken)throw new Error("Not connected to Business Central");
  const compId=await bcGetCompanyId();
  if(!compId)throw new Error("Could not resolve BC company");
  const body={};
  if(number)body.number=number;
  if(displayName)body.displayName=displayName;
  if(unitCost!=null&&unitCost!=="")body.unitCost=parseFloat(unitCost);
  if(itemCategoryCode)body.itemCategoryCode=itemCategoryCode;
  if(baseUnitOfMeasureCode)body.baseUnitOfMeasureCode=baseUnitOfMeasureCode;
  try{
    const r=await fetch(`${BC_API_BASE}/companies(${compId})/items`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(r.status===401){_bcToken=null;throw new Error("BC session expired — please reconnect");}
    if(r.status===409||r.status===400){
      const txt=await r.text();
      if(/already exists|duplicate/i.test(txt))throw new Error(`Item "${number}" already exists in Business Central`);
      throw new Error(txt||`BC returned status ${r.status}`);
    }
    if(!r.ok){const txt=await r.text();throw new Error(txt||`BC returned status ${r.status}`);}
    const item=await r.json();
    // PATCH extra fields via OData ItemCard (v2.0 API doesn't expose these)
    if(item.number&&(vendorNo||genProdPostingGroup||inventoryPostingGroup)){
      const patch={};
      if(vendorNo)patch.Vendor_No=vendorNo;
      if(genProdPostingGroup)patch.Gen_Prod_Posting_Group=genProdPostingGroup;
      if(inventoryPostingGroup)patch.Inventory_Posting_Group=inventoryPostingGroup;
      // Retry up to 3x — newly created items may not be indexed in OData immediately
      for(let attempt=0;attempt<3;attempt++){
        if(attempt>0)await new Promise(r=>setTimeout(r,1500));
        try{await bcPatchItemOData(item.number,patch);break;}
        catch(ve){console.warn(`OData PATCH attempt ${attempt+1}:`,ve.message);}
      }
    }
    return{number:item.number||"",displayName:item.displayName||"",unitCost:item.unitCost??null,unitPrice:item.unitPrice??null,inventory:item.inventory||0,lastModifiedDateTime:item.lastModifiedDateTime||""};
  }catch(e){
    if(e.message.includes("BC session expired")||e.message.includes("already exists"))throw e;
    console.warn("bcCreateItem error:",e);
    throw new Error("Failed to create item: "+e.message);
  }
}

async function bcPatchItemOData(itemNo,fields){
  if(!_bcToken||!itemNo||!fields||!Object.keys(fields).length)return;
  // 1. GET the item from OData ItemCard to obtain ETag
  const filterUrl=`${BC_ODATA_BASE}/ItemCard?$filter=No eq '${encodeURIComponent(itemNo)}'`;
  const gr=await fetch(filterUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(!gr.ok){throw new Error(`OData ItemCard GET failed: ${gr.status}`);}
  const gd=await gr.json();
  const rec=(gd.value||[])[0];
  if(!rec){throw new Error(`Item not found via OData: ${itemNo}`);}
  const etag=rec["@odata.etag"];
  // 2. PATCH fields using the ETag
  const patchUrl=`${BC_ODATA_BASE}/ItemCard('${encodeURIComponent(itemNo)}')`;
  const pr=await fetch(patchUrl,{
    method:"PATCH",
    headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json","If-Match":etag||"*"},
    body:JSON.stringify(fields)
  });
  if(!pr.ok){const txt=await pr.text();console.warn("OData PATCH failed:",pr.status,txt);return;}
  console.log("OData PATCH OK:",itemNo,"→",JSON.stringify(fields));
}

async function bcPushPurchasePrice(itemNo,vendorNo,unitCost,startingDate,uom){
  if(!_bcToken||!itemNo||!vendorNo)return;
  try{
    const compId=await bcGetCompanyId();
    if(!compId){console.warn("bcPushPurchasePrice: no company ID");return;}
    const dateStr=startingDate?new Date(startingDate).toISOString().split('T')[0]:new Date().toISOString().split('T')[0];
    const baseUrl=`${BC_API_BASE}/companies(${compId})/purchasePrices`;
    // Check if record already exists for this item+vendor
    const filterUrl=`${baseUrl}?$filter=itemNumber eq '${encodeURIComponent(itemNo)}' and vendorNumber eq '${encodeURIComponent(vendorNo)}'`;
    console.log("bcPushPurchasePrice: checking existing for",itemNo,vendorNo);
    const gr=await fetch(filterUrl,{headers:{"Authorization":`Bearer ${_bcToken}`,"Accept":"application/json"}});
    if(gr.ok){
      const gd=await gr.json();
      const existing=(gd.value||[])[0];
      if(existing){
        // PATCH existing record
        const etag=existing["@odata.etag"];
        const patchUrl=`${baseUrl}(${existing.id})`;
        const patchBody={directUnitCost:unitCost,startingDate:dateStr};
        if(uom)patchBody.unitOfMeasureCode=uom;
        const pr=await fetch(patchUrl,{method:"PATCH",headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json","If-Match":etag||"*"},body:JSON.stringify(patchBody)});
        if(pr.ok){console.log("bcPushPurchasePrice PATCH OK:",itemNo,vendorNo,unitCost,dateStr);return;}
        const ptxt=await pr.text().catch(()=>"");
        console.warn("bcPushPurchasePrice PATCH failed:",pr.status,ptxt);
      }
    }
    // Create new record
    const payload={itemNumber:itemNo,vendorNumber:vendorNo,startingDate:dateStr,directUnitCost:unitCost,currencyCode:"",minimumQuantity:0};
    if(uom)payload.unitOfMeasureCode=uom;
    console.log("bcPushPurchasePrice POST:",JSON.stringify(payload));
    const cr=await fetch(baseUrl,{method:"POST",headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(cr.ok){console.log("bcPushPurchasePrice POST OK:",itemNo,vendorNo,unitCost,dateStr);}
    else{
      const txt=await cr.text().catch(()=>"");
      console.warn("bcPushPurchasePrice POST failed:",cr.status,txt);
    }
  }catch(e){console.warn("bcPushPurchasePrice error:",itemNo,e.message);}
}

async function bcDiscoverODataPages(){
  if(!_bcToken)return[];
  const headers={"Authorization":`Bearer ${_bcToken}`,"Accept":"application/json"};
  // Try company-level URL first (published web services are company-specific)
  // Fall back to root OData URL in case company URL returns empty
  const urls=[`${BC_ODATA_BASE}/`,`https://api.businesscentral.dynamics.com/v2.0/${BC_TENANT}/${BC_ENV}/ODataV4/`];
  for(const url of urls){
    try{
      const r=await fetch(url,{headers});
      if(!r.ok){console.warn("bcDiscoverODataPages",url,"→",r.status);continue;}
      const txt=await r.text();
      try{
        const d=JSON.parse(txt);
        const names=(d.value||[]).map(e=>e.name||e.url||"").filter(Boolean);
        if(names.length){
          console.log("bcDiscoverODataPages found at",url,":",names.join(", "));
          return names;
        }
        console.warn("bcDiscoverODataPages",url,"→ empty list, trying next");
      }catch(pe){console.warn("bcDiscoverODataPages JSON parse error at",url,":",pe.message);}
    }catch(e){console.warn("bcDiscoverODataPages error at",url,":",e.message);}
  }
  console.warn("bcDiscoverODataPages: all URLs returned empty");
  return[];
}

async function bcPatchJobOData(jobNo,fields){
  if(!_bcToken||!jobNo||!fields||!Object.keys(fields).length)return;
  // Discover published OData pages and find a project-related one
  const allPages=await bcDiscoverODataPages();
  // Match project card/header pages — common names: ProjectCard, JobCard, Project, Job
  const projectPage=allPages.find(n=>/^(project(card)?|job(card)?)$/i.test(n))||null;
  if(!projectPage){
    console.warn("BC OData published pages available:",allPages.join(", ")||"(none)");
    console.warn("bcPatchJobOData: No project OData page found — skipping defaults patch. Publish page 88 as 'ProjectCard' in BC Web Services (Settings → Web Services → New → Object Type: Page, Object ID: 88, Service Name: ProjectCard).");
    return; // non-fatal: project was already created, defaults can be set manually in BC
  }
  const pages=[projectPage];
  for(const page of pages){
    const filterUrl=`${BC_ODATA_BASE}/${page}?$filter=No eq '${encodeURIComponent(jobNo)}'`;
    const gr=await fetch(filterUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
    if(gr.status===404)continue;
    if(!gr.ok){const txt=await gr.text();throw new Error(`OData ${page} GET failed (${gr.status}): ${txt}`);}
    const gd=await gr.json();
    const rec=(gd.value||[])[0];
    if(!rec)throw new Error(`Project '${jobNo}' not found in OData page '${page}'`);
    const etag=rec["@odata.etag"];
    const patchUrl=`${BC_ODATA_BASE}/${page}('${encodeURIComponent(jobNo)}')`;
    const pr=await fetch(patchUrl,{
      method:"PATCH",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json","If-Match":etag||"*"},
      body:JSON.stringify(fields)
    });
    if(!pr.ok){const txt=await pr.text();throw new Error(`OData ${page} PATCH failed (${pr.status}): ${txt}`);}
    console.log("OData PATCH on project",jobNo,"via",page,"→",JSON.stringify(fields));
    return;
  }
  throw new Error("Could not reach ProjectCard or Project OData page in Business Central.");
}

    console.log('BC PQ: Using OData pages — header:',headerPage,'lines:',linePage||'(none)');
    // Probe header fields
    const probeR=await fetch(`${BC_ODATA_BASE}/${headerPage}?$top=1`,{headers:{"Authorization":`Bearer ${_bcToken}`,"Accept":"application/json"}});
    let headerFields=[];
    if(probeR.ok){const pd=await probeR.json();const rec=(pd.value||[])[0];if(rec)headerFields=Object.keys(rec);console.log('BC PQ: header fields:',headerFields.join(', '));}
    // Build header body — try common field names
    const hBody={};
    const vnField=headerFields.find(f=>/^Buy_from_Vendor_No$/i.test(f))||headerFields.find(f=>/vendor.*no/i.test(f))||'Buy_from_Vendor_No';
    if(vendorNo)hBody[vnField]=vendorNo;
    else if(vendorName){
      const vnameField=headerFields.find(f=>/^Buy_from_Vendor_Name$/i.test(f))||headerFields.find(f=>/vendor.*name/i.test(f));
      if(vnameField)hBody[vnameField]=vendorName;
    }
    console.log('BC PQ: POST',headerPage,'body:',JSON.stringify(hBody));
    const hr=await fetch(`${BC_ODATA_BASE}/${headerPage}`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify(hBody)
    });
    if(!hr.ok){const errText=await hr.text();console.warn('BC PQ: header POST failed:',hr.status,errText);return null;}
    const header=await hr.json();
    const docNo=header.No||header.Document_No||header.no||header.number||null;
    console.log('BC PQ: Created header, Doc No:',docNo,'full response keys:',Object.keys(header).join(', '));
    if(!docNo){console.warn('BC PQ: header created but no document number found in response');return null;}
    // Add line items — try multiple approaches to discover the right field names
    if(items&&items.length>0){
      let lineFields=[];
      let linesAdded=false;
      // Approach 1: If we have a dedicated lines page, probe its fields
      if(linePage){
        // Try fetching metadata from root OData to discover entity fields
        try{
          const metaUrl=`https://api.businesscentral.dynamics.com/v2.0/${BC_TENANT}/${BC_ENV}/ODataV4/$metadata`;
          const metaR=await fetch(metaUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
          if(metaR.ok){
            const metaText=await metaR.text();
            const entityMatch=metaText.match(new RegExp('EntityType Name="'+linePage+'"[\\s\\S]*?</EntityType>'));
            if(entityMatch){
              const propMatches=entityMatch[0].match(/Property Name="([^"]+)"/g)||[];
              lineFields=propMatches.map(function(m){return m.replace('Property Name="','').replace('"','')});
              console.log('BC PQ: line fields from $metadata:',lineFields.join(', '));
            }
          }else{console.log('BC PQ: $metadata returned',metaR.status,'- will try probe');}
        }catch(me){console.log('BC PQ: $metadata fetch failed:',me.message);}
        // Fallback: probe with $top=1
        if(!lineFields.length){
          const lineProbe=await fetch(`${BC_ODATA_BASE}/${linePage}?$top=1`,{headers:{"Authorization":`Bearer ${_bcToken}`,"Accept":"application/json"}}).catch(()=>null);
          if(lineProbe&&lineProbe.ok){const ld=await lineProbe.json();const rec=(ld.value||[])[0];if(rec){lineFields=Object.keys(rec);console.log('BC PQ: line fields from probe:',lineFields.join(', '));}}
          if(!lineFields.length)console.log('BC PQ: probe returned no records, no fields discovered');
        }
        if(lineFields.length){
          const docNoField=lineFields.find(f=>/^Document_No$/i.test(f));
          const docTypeField=lineFields.find(f=>/^Document_Type$/i.test(f));
          const typeField=lineFields.find(f=>/^Type$/i.test(f))||'Type';
          const noField=lineFields.find(f=>/^No$/i.test(f)&&!/line|doc/i.test(f))||'No';
          const qtyField=lineFields.find(f=>/^Quantity$/i.test(f))||'Quantity';
          const descField=lineFields.find(f=>/^Description$/i.test(f))||'Description';
          console.log('BC PQ: resolved line field names:',{docNoField,docTypeField,typeField,noField,qtyField,descField});
          for(const item of items){
            const lBody={[typeField]:'Item',[descField]:item.description||item.partNumber||'',[qtyField]:Number(item.qty)||1};
            if(docNoField)lBody[docNoField]=docNo;
            if(docTypeField)lBody[docTypeField]='Quote';
            if(item.partNumber)lBody[noField]=item.partNumber;
            console.log('BC PQ line POST body:',JSON.stringify(lBody));
            const lr=await fetch(`${BC_ODATA_BASE}/${linePage}`,{
              method:"POST",
              headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
              body:JSON.stringify(lBody)
            }).catch(e=>{console.warn('BC PQ line POST error:',e);return null;});
            if(lr&&!lr.ok){const t=await lr.text();console.warn('BC PQ line failed:',lr.status,t.slice(0,300));}
            else if(lr){console.log('BC PQ line added:',item.partNumber);linesAdded=true;}
          }
        }else{
          // No fields discovered — try minimal POST without doc fields (subform may auto-link)
          console.log('BC PQ: No fields discovered, trying minimal POST to',linePage);
          for(const item of items){
            const lBody={Type:'Item',Description:item.description||item.partNumber||'',Quantity:Number(item.qty)||1};
            if(item.partNumber)lBody.No=item.partNumber;
            const lr=await fetch(`${BC_ODATA_BASE}/${linePage}`,{
              method:"POST",
              headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
              body:JSON.stringify(lBody)
            }).catch(e=>{console.warn('BC PQ line minimal POST error:',e);return null;});
            if(lr&&!lr.ok){const t=await lr.text();console.warn('BC PQ line minimal failed:',lr.status,t.slice(0,300));}
            else if(lr){console.log('BC PQ line added (minimal):',item.partNumber);linesAdded=true;}
          }
        }
      }
      if(!linesAdded){console.log('BC PQ: Lines not added via OData, quote',docNo,'created as header only');}
    }
    return docNo;
  }catch(e){
    console.warn("bcCreatePurchaseQuote error:",e);
    if(!_bcToken){
      bcEnqueue('createPurchaseQuote',{vendorNo,vendorName,items},`Create BC purchase quote for ${vendorName}`);
    }
    return null;
  }
}

const _BC_QUEUE_KEY='_arc_bc_queue';
function _bcQGet(){try{return JSON.parse(localStorage.getItem(_BC_QUEUE_KEY)||'[]');}catch(e){return[];}}
function _bcQSet(q){try{localStorage.setItem(_BC_QUEUE_KEY,JSON.stringify(q));}catch(e){}}
let _bcQueueCountSetter=null; // injected by React to update badge

function bcEnqueue(type,params,description){
  const q=_bcQGet();
  q.push({id:`${Date.now()}-${Math.random().toString(36).slice(2,7)}`,type,params,description,enqueuedAt:Date.now(),attempts:0});
  _bcQSet(q);
  console.log(`[BC Queue] Enqueued: ${description}`);
  if(_bcQueueCountSetter)_bcQueueCountSetter(q.length);
}

async function bcProcessQueue(){
  if(!_bcToken)return;
  const q=_bcQGet();
  if(!q.length)return;
  console.log(`[BC Queue] Processing ${q.length} pending item(s)…`);
  const remaining=[];
  for(const item of q){
    try{
      await _bcQueueExecute(item);
      console.log(`[BC Queue] Done: ${item.description}`);
    }catch(e){
      console.warn(`[BC Queue] Failed (attempt ${(item.attempts||0)+1}): ${item.description}`,e.message);
      const updated={...item,attempts:(item.attempts||0)+1,lastError:String(e.message||e)};
      if(updated.attempts<5)remaining.push(updated);
      else console.warn(`[BC Queue] Dropped after 5 attempts: ${item.description}`);
    }
  }
  _bcQSet(remaining);
  if(_bcQueueCountSetter)_bcQueueCountSetter(remaining.length);
}

async function _bcQueueExecute(item){
  switch(item.type){
    case 'createPurchaseQuote':{
      const{vendorNo,vendorName,items}=item.params;
      const num=await bcCreatePurchaseQuote(vendorNo,vendorName,items);
      console.log(`[BC Queue] Purchase quote created: ${num}`);
      break;
    }
    case 'attachPdf':{
      const{jobNumber,fileName,pdfBase64}=item.params;
      const arr=Uint8Array.from(atob(pdfBase64),c=>c.charCodeAt(0)).buffer;
      await bcAttachPdfToJob(jobNumber,fileName,arr);
      break;
    }
    case 'patchJob':{
      const{projectNumber,fields}=item.params;
      await bcPatchJobOData(projectNumber,fields);
      break;
    }
    case 'syncTaskDescs':{
      const{projectNumber,taskDescs}=item.params;
      await bcSyncPanelTaskDescriptions(projectNumber,taskDescs);
      break;
    }
    default:
      throw new Error(`Unknown queue type: ${item.type}`);
  }
}

const RFQ_STALE_MS=60*24*60*60*1000; // 60 days
async function buildRfqSupplierGroups(bom){
  const now=Date.now();
  const eligible=bom.filter(r=>{
    if(r.isLaborRow||r.priceSource==="manual")return false;
    // Use the same date shown in the Priced column
    const isBC=r.priceSource==="bc"&&"bcPoDate"in r;
    const displayDate=isBC?r.bcPoDate:r.priceDate;
    // Include if no date (No POs / never priced) OR if older than 60 days
    return!displayDate||displayDate<now-RFQ_STALE_MS;
  });
  if(!eligible.length)return{groups:[],noItems:true};
  // Group by vendor — use user-assigned bcVendorName first, then BC lookup
  const groupMap={};
  for(const item of eligible){
    let vendorName=item.bcVendorName||"";
    let vendorNo="";
    if(!vendorName&&_bcToken){
      const pn=(item.partNumber||"").trim();
      if(pn){vendorNo=await bcGetItemVendorNo(pn);vendorName=vendorNo?await bcGetVendorName(vendorNo):"";}
    }
    if(!vendorName)vendorName="Unknown Supplier";
    if(!groupMap[vendorName])groupMap[vendorName]={vendorName,vendorNo,items:[]};
    groupMap[vendorName].items.push(item);
  }
  return{groups:Object.values(groupMap).sort((a,b)=>a.vendorName.localeCompare(b.vendorName)),noItems:false};
}

function vendorCode(vendorName){
  // Derives a 3-letter supplier code from the vendor name.
  // Single word → first 3 letters (Royal→ROY, Siemens→SIE, Wago→WAG).
  // Two words   → first 2 of word1 + first of word2 (Allen Bradley→ALB, Phoenix Contact→PHC).
  // 3+ words    → first letter of each of first 3 words (Automation Direct Inc→ADI).
  const skip=/^(inc|llc|corp|co|ltd|the|and|&)$/i;
  const words=(vendorName||'').trim().split(/[\s\-,&]+/).filter(w=>w.length>0&&!skip.test(w));
  if(words.length===0)return'SUP';
  if(words.length===1)return words[0].slice(0,3).toUpperCase().padEnd(3,'X');
  if(words.length===2)return(words[0].slice(0,2)+words[1].slice(0,1)).toUpperCase().padEnd(3,'X');
  return words.slice(0,3).map(w=>w[0]).join('').toUpperCase();
}
