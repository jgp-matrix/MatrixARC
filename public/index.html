// ── COMPONENTS ──

function calcConfidence(panel){
  const bom=panel.bom||[];
  const pages=panel.pages||[];
  const validation=panel.validation||null;

  // Pricing: BC/Manual=100%, AI=50%, Unpriced=0%
  let pricing=0;
  let bcCount=0,manualCount=0,aiCount=0,unpricedCount=0;
  if(bom.length){
    bom.forEach(r=>{
      if(r.priceSource==="bc"){bcCount++;}
      else if(r.priceSource==="manual"){manualCount++;}
      else if(r.priceSource==="ai"){aiCount++;}
      else{unpricedCount++;}
    });
    const total=bcCount*100+manualCount*100+aiCount*50;
    pricing=Math.round(total/bom.length);
  }

  // Wiring: derive from match data, factoring in accepted items
  let wiring=0;
  const acceptedArr=panel.wiringAccepted||[];
  const acceptedSet=new Set(acceptedArr.map(String));
  let matchedCount=0,missingArr=[],acceptedInMissing=0,ntCount=0,wiringTotal=0;
  if(validation){
    const matched=Array.isArray(validation.matched)?validation.matched:[];
    const missing=Array.isArray(validation.missingFromSchematic)?validation.missingFromSchematic:[];
    const nt=Array.isArray(validation.notTraceable)?validation.notTraceable:[];
    matchedCount=matched.length;
    missingArr=missing;
    ntCount=nt.length;
    acceptedInMissing=missing.filter(m=>acceptedSet.has(String(m.id))).length;
    const effectiveMatched=matchedCount+acceptedInMissing;
    const effectiveMissing=missing.length-acceptedInMissing;
    const traceable=effectiveMatched+effectiveMissing;
    wiringTotal=traceable+ntCount;
    const matchPct=traceable>0?effectiveMatched/traceable:1;
    const conf=matchPct>=0.9?"high":matchPct>=0.7?"medium":"low";
    wiring=conf==="high"?100:conf==="medium"?70:conf==="low"?40:0;
  }

  // BOM Extraction: quality-scored per row + part number verification
  let bomExt=0;
  const bomPages=pages.filter(p=>getPageTypes(p).includes("bom"));
  const ocrBadChars=/[|{}~`\\^]/;
  const verif=panel.bomVerification||[];
  const verifMap={};verif.forEach(v=>{verifMap[String(v.id)]=v;});
  let cleanCount=0,flaggedRows=[];
  let verifiedCount=0,plausibleCount=0,suspectCount=0,uncheckedCount=0;
  if(bom.length>0){
    let totalPts=0;
    bom.forEach(r=>{
      let pts=100;const issues=[];
      const pn=(r.partNumber||"").trim();
      const desc=(r.description||"").trim();
      if(!pn&&desc){pts=0;issues.push("no part # with description");}
      else if(!pn){pts-=40;issues.push("no part #");}
      else{
        if(pn.length<=2){pts-=30;issues.push("part # very short");}
        else if(/^\d{1,3}$/.test(pn)){pts-=20;issues.push("part # looks numeric");}
        if(ocrBadChars.test(pn)){pts-=20;issues.push("suspect OCR chars");}
      }
      if(!desc){pts-=15;issues.push("no description");}
      if(!r.qty||+r.qty===0){pts-=10;issues.push("missing qty");}
      // Part number verification scoring
      const vr=verifMap[String(r.id)];
      if(vr){
        if(vr.status==="verified"){verifiedCount++;}
        else if(vr.status==="plausible"){plausibleCount++;pts-=10;issues.push("part # plausible but unverified");}
        else if(vr.status==="suspect"){suspectCount++;pts-=30;issues.push("part # not recognized");}
      }else if(pn.length>=3){uncheckedCount++;}
      pts=Math.max(pts,0);
      totalPts+=pts;
      if(issues.length)flaggedRows.push({id:r.id,partNumber:pn,issues,score:pts,verifStatus:vr?.status||null});
      else cleanCount++;
    });
    bomExt=Math.round(totalPts/bom.length);
  }else if(bomPages.length>0){
    bomExt=0;
  }

  const overall=Math.round((pricing+wiring+bomExt)/3);
  return{pricing,wiring,bomExt,overall,
    pricingDetail:{bcCount,manualCount,aiCount,unpricedCount,total:bom.length},
    wiringDetail:{matched:matchedCount,missing:missingArr,accepted:acceptedInMissing,notTraceable:ntCount,total:wiringTotal},
    bomDetail:{bomPages:bomPages.length,itemCount:bom.length,cleanCount,flaggedRows,verifiedCount,plausibleCount,suspectCount,uncheckedCount}
  };
}

function ConfidenceBar({panel,readOnly,onUpdate,onSaveImmediate}){
  const conf=calcConfidence(panel);
  const {pricing,wiring,bomExt,overall,pricingDetail,wiringDetail,bomDetail}=conf;
  const bom=panel.bom||[];
  const validation=panel.validation||null;
  const [expanded,setExpanded]=React.useState(null);
  const [verifying,setVerifying]=React.useState(false);
  const barRef=React.useRef(null);
  React.useEffect(()=>{
    if(!expanded)return;
    function handleClick(e){if(barRef.current&&!barRef.current.contains(e.target))setExpanded(null);}
    document.addEventListener("mousedown",handleClick);
    return()=>document.removeEventListener("mousedown",handleClick);
  },[expanded]);
  async function runVerify(){
    if(verifying||!bom.length)return;
    setVerifying(true);
    try{
      const results=await verifyPartNumbers(bom);
      if(results.length>0){
        const updated={...panel,bomVerification:results,updatedAt:Date.now()};
        onUpdate(updated);
        if(onSaveImmediate)try{await onSaveImmediate(updated);}catch(e){}
      }
    }catch(e){console.error("Verify failed:",e);}
    setVerifying(false);
  }
  if(!bom.length&&!validation)return null;
  const barColor=v=>v>=80?C.green:v>=50?C.yellow:v>0?C.red:C.border;
  const items=[
    {label:"Pricing",val:pricing,key:"pricing"},
    {label:"Wiring",val:wiring,key:"wiring"},
    {label:"BOM",val:bomExt,key:"bom"}
  ];
  function toggleWiringAccepted(itemId){
    if(readOnly||!onUpdate)return;
    const arr=panel.wiringAccepted||[];
    const id=String(itemId);
    const updated=arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];
    const newPanel={...panel,wiringAccepted:updated};
    onUpdate(newPanel);
    if(onSaveImmediate)try{onSaveImmediate(newPanel);}catch(e){}
  }
  const acceptedSet=new Set((panel.wiringAccepted||[]).map(String));

    <div ref={barRef} style={{background:C.card,border:`1px solid #3a3a55`,borderRadius:10,padding:"14px 20px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
        <div style={{display:"flex",flexDirection:"column",gap:2,borderRight:`1px solid #3a3a55`,paddingRight:16}}>
          <span style={{fontSize:13,color:C.sub,fontWeight:700,letterSpacing:0.3,whiteSpace:"nowrap"}}>Level Of Confidence</span>
          <span style={{fontSize:10,color:C.muted,fontStyle:"italic"}}>click bar for details</span>
        </div>
        {items.map(it=>(
          <div key={it.key} onClick={()=>setExpanded(expanded===it.key?null:it.key)}
            style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}} title={`${it.label}: ${it.val}% — click for details`}>
            <span style={{fontSize:12,color:C.muted,transition:"transform 0.15s",display:"inline-block",transform:expanded===it.key?"rotate(90deg)":"none"}}>▸</span>
            <span style={{fontSize:15,color:expanded===it.key?C.text:C.muted,fontWeight:600}}>{it.label}</span>
            <div style={{width:70,height:10,background:"#2a2a40",borderRadius:5,overflow:"hidden",border:"1px solid #3a3a55"}}>
              <div style={{width:`${it.val}%`,height:"100%",background:barColor(it.val),borderRadius:5,transition:"width 0.3s"}}/>
            </div>
            <span style={{fontSize:15,color:barColor(it.val),fontWeight:700}}>{it.val}%</span>
          </div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:6,borderLeft:`1px solid #3a3a55`,paddingLeft:16}}>
          <span style={{fontSize:18,color:barColor(overall),fontWeight:800}}>{overall}%</span>
          <span style={{fontSize:14,color:C.muted}}>overall</span>
        </div>
      </div>
      {expanded==="pricing"&&(
        <div style={{marginTop:12,padding:"10px 14px",background:"#0d0d14",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13}}>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {pricingDetail.bcCount>0&&<div style={{color:C.green}}>{pricingDetail.bcCount} item{pricingDetail.bcCount!==1?"s":""} BC-priced ✓</div>}
            {pricingDetail.manualCount>0&&<div style={{color:C.green}}>{pricingDetail.manualCount} item{pricingDetail.manualCount!==1?"s":""} manual ✓</div>}
            {pricingDetail.aiCount>0&&<div style={{color:C.yellow}}>{pricingDetail.aiCount} item{pricingDetail.aiCount!==1?"s":""} AI-priced ⚠</div>}
            {pricingDetail.unpricedCount>0&&<div style={{color:C.red}}>{pricingDetail.unpricedCount} item{pricingDetail.unpricedCount!==1?"s":""} unpriced ✗</div>}
            {pricingDetail.total===0&&<div style={{color:C.muted}}>No BOM items yet</div>}
          </div>
          <div style={{marginTop:8,color:C.muted,fontSize:12,fontStyle:"italic"}}>Set prices manually or run Get Prices to improve this score</div>
        </div>
      )}
      {expanded==="wiring"&&(
        <div style={{marginTop:12,padding:"10px 14px",background:"#0d0d14",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13}}>
          {!validation?<div style={{color:C.muted}}>No validation data — run Re-Validate</div>:(
            <div>
              <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:8}}>
                <span style={{color:C.green}}>{wiringDetail.matched} matched ✓</span>
                <span style={{color:wiringDetail.missing.length-wiringDetail.accepted>0?C.red:C.green}}>{wiringDetail.missing.length-wiringDetail.accepted} missing ✗</span>
                {wiringDetail.accepted>0&&<span style={{color:C.accent}}>{wiringDetail.accepted} accepted</span>}
                <span style={{color:C.muted}}>{wiringDetail.notTraceable} not traceable —</span>
              </div>
              {wiringDetail.missing.length>0&&(
                <div style={{maxHeight:180,overflowY:"auto",borderTop:`1px solid ${C.border}`,paddingTop:6}}>
                  {wiringDetail.missing.map(m=>{
                    const id=String(m.id);
                    const isAccepted=acceptedSet.has(id);
                    return(
                      <div key={id} style={{display:"flex",alignItems:"center",gap:8,padding:"3px 0",borderBottom:`1px solid ${C.border}33`}}>
                        <span style={{color:isAccepted?C.accent:C.red,fontWeight:600,flex:1,fontSize:12}}>{m.partNumber||m.description||"Item #"+m.id}</span>
                        {m.notes&&<span style={{color:C.muted,fontSize:11}}>{m.notes}</span>}
                        <button onClick={()=>toggleWiringAccepted(m.id)} disabled={readOnly}
                          style={{background:isAccepted?C.accentDim:"transparent",color:isAccepted?C.accent:C.muted,border:`1px solid ${isAccepted?C.accent:C.border}`,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,cursor:readOnly?"default":"pointer",opacity:readOnly?0.5:1,whiteSpace:"nowrap"}}>
                          {isAccepted?"Accepted ✓":"Accept ✓"}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
              <div style={{marginTop:8,color:C.muted,fontSize:12,fontStyle:"italic"}}>Accept items you've verified or Re-Validate to rescan</div>
            </div>
          )}
        </div>
      )}
      {expanded==="bom"&&(
        <div style={{marginTop:12,padding:"10px 14px",background:"#0d0d14",borderRadius:8,border:`1px solid ${C.border}`,fontSize:13}}>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            <div style={{color:C.text}}>{bomDetail.bomPages} BOM page{bomDetail.bomPages!==1?"s":""} detected</div>
            <div style={{color:C.text}}>{bomDetail.itemCount} item{bomDetail.itemCount!==1?"s":""} extracted</div>
            {bomDetail.cleanCount>0&&<div style={{color:C.green}}>{bomDetail.cleanCount} item{bomDetail.cleanCount!==1?"s":""} clean ✓</div>}
            {bomDetail.flaggedRows.length>0&&<div style={{color:C.yellow}}>{bomDetail.flaggedRows.length} item{bomDetail.flaggedRows.length!==1?"s":""} flagged ⚠</div>}
          </div>
          {(bomDetail.verifiedCount>0||bomDetail.plausibleCount>0||bomDetail.suspectCount>0||bomDetail.uncheckedCount>0)&&(
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:8,paddingTop:6,borderTop:`1px solid ${C.border}`}}>
              <span style={{fontSize:12,color:C.muted,fontWeight:600}}>Part # Check:</span>
              {bomDetail.verifiedCount>0&&<span style={{color:C.green,fontSize:12}}>{bomDetail.verifiedCount} verified ✓</span>}
              {bomDetail.plausibleCount>0&&<span style={{color:C.yellow,fontSize:12}}>{bomDetail.plausibleCount} plausible ~</span>}
              {bomDetail.suspectCount>0&&<span style={{color:C.red,fontSize:12}}>{bomDetail.suspectCount} not found ✗</span>}
              {bomDetail.uncheckedCount>0&&<span style={{color:C.muted,fontSize:12}}>{bomDetail.uncheckedCount} unchecked</span>}
              {bomDetail.uncheckedCount>0&&!readOnly&&<button onClick={runVerify} disabled={verifying} style={{background:C.accentDim,color:C.accent,border:`1px solid ${C.accent}55`,borderRadius:6,padding:"1px 8px",fontSize:11,fontWeight:600,cursor:verifying?"default":"pointer",opacity:verifying?0.5:1}}>{verifying?"Checking…":"Verify Now"}</button>}
            </div>
          )}
          {bomDetail.flaggedRows.length>0&&(
            <div style={{maxHeight:180,overflowY:"auto",borderTop:`1px solid ${C.border}`,paddingTop:6,marginTop:8}}>
              {bomDetail.flaggedRows.map(f=>{
                const vColor=f.verifStatus==="verified"?C.green:f.verifStatus==="plausible"?C.yellow:f.verifStatus==="suspect"?C.red:null;
                return(
                <div key={f.id} style={{display:"flex",alignItems:"center",gap:8,padding:"3px 0",borderBottom:`1px solid ${C.border}33`}}>
                  <span style={{color:f.score>=70?C.yellow:C.red,fontWeight:600,fontSize:12,minWidth:0,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.partNumber||"(empty)"}</span>
                  {vColor&&<span style={{color:vColor,fontSize:10,fontWeight:700}}>{f.verifStatus==="verified"?"✓":f.verifStatus==="plausible"?"~":"✗"}</span>}
                  <span style={{color:C.muted,fontSize:11,whiteSpace:"nowrap"}}>{f.issues.join(", ")}</span>
                  <span style={{color:f.score>=70?C.yellow:C.red,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{f.score}%</span>
                </div>
                );
              })}
            </div>
          )}
          <div style={{marginTop:8,color:C.muted,fontSize:12,fontStyle:"italic"}}>Part numbers are verified against known manufacturers. Correct suspect items to improve score.</div>
        </div>
      )}
    </div>
  );
}

function projectStatus(project){
  const panels=project.panels||[];
  if(!panels.length)return project.status||"draft";
  const statuses=panels.map(p=>p.status||"draft");
  const rank={draft:0,extracted:1,validated:2,costed:3,pushed_to_bc:4,quoted:5};
  const rankToStatus=["draft","extracted","validated","costed","pushed_to_bc","quoted"];
  const maxRank=Math.max(...statuses.map(s=>rank[s]||0));
  return rankToStatus[maxRank]||"draft";
}
function Badge({status}){
  const map={
    draft:["#3d1a00","#f97316","Draft"],
    in_progress:[C.yellowDim,C.yellow,"In Progress"],
    extracted:[C.greenDim,C.green,"Extracted"],
    validated:[C.accentDim,C.accent,"Validated"],
    costed:["#052e1c",C.green,"Costed"],
    pushed_to_bc:["#0d1f3c","#38bdf8","Pushed to BC"],
    quoted:[C.yellowDim,C.yellow,"Quoted"],
    imported:["#1a1040","#a78bfa","Imported"]
  };
  const [bg,col,label]=map[status]||map.draft;
  return<span style={{background:bg,color:col,borderRadius:20,padding:"3px 12px",fontSize:13,fontWeight:700,letterSpacing:0.5,whiteSpace:"nowrap"}}>{label.toUpperCase()}</span>;
}

function PageTags({types,onChange,detecting}){
  const all=["bom","schematic","backpanel","enclosure","pid"];
  const colors={bom:C.accent,schematic:C.green,backpanel:C.purple,enclosure:C.teal||"#0d9488",pid:C.muted};
  const labels={bom:"BOM",schematic:"Schematic",backpanel:"Back Panel",enclosure:"Enclosure",pid:"P&ID"};
  if(detecting)return<span style={{fontSize:10,color:C.yellow,fontWeight:600}}>🤖 Detecting…</span>;
  return(
    <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
      {types.length===0&&<span style={{fontSize:10,color:C.muted,lineHeight:"20px"}}>tag:</span>}
      {all.map(t=>{
        const active=types.includes(t);
        return(
          <button key={t} onClick={()=>{const next=active?types.filter(x=>x!==t):[...types,t];onChange(next);}}
            style={{background:active?colors[t]+"33":"transparent",color:active?colors[t]:C.muted,border:`1px solid ${active?colors[t]+"88":C.border}`,borderRadius:20,padding:"2px 7px",fontSize:10,fontWeight:700,cursor:"pointer",transition:"all 0.1s"}}>
            {labels[t]}
          </button>
        );
      })}
    </div>
  );
}

// ── PRICING CONFIG MODAL ──
function PricingConfigModal({uid,onClose,onLogoChange}){
  const [bomVal,setBomVal]=useState(_pricingConfig.contingencyBOM);
  const [consVal,setConsVal]=useState(_pricingConfig.contingencyConsumables);
  const [budgPct,setBudgPct]=useState(_pricingConfig.budgetaryContingencyPct??20);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  // Auto-Add BOM Items state
  const [defaultItems,setDefaultItems]=useState(()=>[..._defaultBomItems]);
  const [bcQuery,setBcQuery]=useState("");
  const [bcResults,setBcResults]=useState([]);
  const [bcSearching,setBcSearching]=useState(false);
  const bcDebounce=useRef(null);
  const [manualDesc,setManualDesc]=useState("");
  const [manualPrice,setManualPrice]=useState("");

  // Logo upload (admin + company only)
  const canUploadLogo=!!(_appCtx.companyId&&_appCtx.role==="admin");
  const [logoUrl,setLogoUrl]=useState(null);
  const [logoUploading,setLogoUploading]=useState(false);
  const [logoErr,setLogoErr]=useState("");
  const logoInputRef=useRef(null);
  useEffect(()=>{
    if(!_appCtx.companyId)return;
    fbDb.doc(`companies/${_appCtx.companyId}`).get().then(d=>{if(d.exists)setLogoUrl(d.data().logoUrl||null);}).catch(()=>{});
  },[]);
  async function uploadLogo(file){
    if(!file)return;
    setLogoErr("");setLogoUploading(true);
    try{
      const ref=fbStorage.ref(`companies/${_appCtx.companyId}/logo`);
      await ref.put(file,{contentType:file.type});
      const url=await ref.getDownloadURL();
      await fbDb.doc(`companies/${_appCtx.companyId}`).update({logoUrl:url});
      setLogoUrl(url);
      if(onLogoChange)onLogoChange(url);
    }catch(e){setLogoErr("Upload failed: "+(e.message||e));}
    setLogoUploading(false);
  }
  async function removeLogo(){
    setLogoErr("");
    try{
      await fbDb.doc(`companies/${_appCtx.companyId}`).update({logoUrl:firebase.firestore.FieldValue.delete()});
      setLogoUrl(null);
      if(onLogoChange)onLogoChange(null);
    }catch(e){setLogoErr("Remove failed: "+(e.message||e));}
  }

  function fmtDate(iso){
    if(!iso)return"—";
    try{const d=new Date(iso);return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){return"—";}
  }

  async function doBcSearch(q){
    if(!q||q.trim().length<3){setBcResults([]);return;}
    setBcSearching(true);
    const r=await bcSearchItems(q.trim(),{top:10});
    setBcResults(r.items||[]);
    setBcSearching(false);
  }

  function onBcQueryChange(val){
    setBcQuery(val);
    if(bcDebounce.current)clearTimeout(bcDebounce.current);
    if(val.trim().length>=3){
      bcDebounce.current=setTimeout(()=>doBcSearch(val),350);
    } else {setBcResults([]);}
  }

  function addBcItem(item){
    if(bcDebounce.current){clearTimeout(bcDebounce.current);bcDebounce.current=null;}
    const exists=defaultItems.some(d=>(d.description||"").toLowerCase()===((item.displayName||"").toLowerCase()));
    if(!exists){
      setDefaultItems(prev=>[...prev,{partNumber:item.number||"",description:item.displayName||"",manufacturer:"",qty:1,unitPrice:item.unitCost??item.unitPrice??0,priceSource:"bc"}]);
    }
    setBcQuery("");setBcResults([]);setBcSearching(false);
  }

  function addManualItem(){
    const desc=manualDesc.trim();
    if(!desc)return;
    const exists=defaultItems.some(d=>(d.description||"").toLowerCase()===desc.toLowerCase());
    if(exists)return;
    setDefaultItems(prev=>[...prev,{partNumber:"",description:desc,manufacturer:"",qty:1,unitPrice:+manualPrice||0,priceSource:null}]);
    setManualDesc("");setManualPrice("");
  }

  function removeItem(idx){setDefaultItems(prev=>prev.filter((_,i)=>i!==idx));}

  async function save(){
    setSaving(true);
    await Promise.all([
      savePricingConfig(uid,{contingencyBOM:bomVal,contingencyConsumables:consVal,budgetaryContingencyPct:budgPct}),
      saveDefaultBomItems(uid,defaultItems)
    ]);
    setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),2000);
  }

  useEffect(()=>()=>{if(bcDebounce.current)clearTimeout(bcDebounce.current);},[]);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:540,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:18,fontWeight:700}}>Pricing Configuration</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:18,padding:"0 2px",lineHeight:1}}>✕</button>
        </div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Default contingencies applied when opening a new project</div>
        {[
          ["BOM Contingency","Default amount added to every quote for miscellaneous BOM items","$",bomVal,setBomVal,"number","50"],
          ["Wire / Zip Ties / etc.","Default amount for consumables (wire, zip ties, sticky backs, etc.)","$",consVal,setConsVal,"number","50"],
        ].map(([label,desc,prefix,val,setter,type,step])=>(
          <div key={label} style={{marginBottom:16}}>
            <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{label}</label>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{color:C.muted,fontSize:14}}>{prefix}</span>
              <input type={type} min="0" step={step} value={val} onChange={e=>setter(Math.max(0,+e.target.value||0))} style={{...inp(),width:140,textAlign:"right"}}/>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>{desc}</div>
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Budgetary Contingency %</label>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="number" min="0" max="100" step="1" value={budgPct} onChange={e=>setBudgPct(Math.max(0,+e.target.value||0))} style={{...inp(),width:140,textAlign:"right"}}/>
            <span style={{color:C.muted,fontSize:14}}>%</span>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:4}}>Hidden buffer added to budgetary sell price (default 20%)</div>
        </div>

        {/* ── AUTO-ADD BOM ITEMS ── */}
        <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:16,marginBottom:16}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Auto-Add BOM Items</label>
          <div style={{fontSize:11,color:C.muted,marginBottom:12}}>Items below are automatically added to every BOM after extraction</div>

          </div>

          {/* Manual add */}
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <input value={manualDesc} onChange={e=>setManualDesc(e.target.value)} placeholder="Description (manual)" style={{...inp(),flex:1,fontSize:12}}

            <div style={{display:"flex",alignItems:"center",gap:2}}>
              <span style={{color:C.muted,fontSize:12}}>$</span>

                onKeyDown={e=>{if(e.key==="Enter")addManualItem();}}/>
            </div>

          {defaultItems.length>0&&(
            <div style={{border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"50px 100px 1fr 80px 32px",gap:0,fontSize:10,color:C.muted,fontWeight:600,padding:"5px 10px",background:C.bg,textTransform:"uppercase",letterSpacing:0.3,borderBottom:`1px solid ${C.border}`}}>
                <div>Qty</div><div>Part #</div><div>Description</div><div style={{textAlign:"right"}}>Price</div><div></div>

                  <div key={i} style={{display:"grid",gridTemplateColumns:"50px 100px 1fr 80px 32px",gap:0,padding:"4px 10px",fontSize:12,borderBottom:i<defaultItems.length-1?`1px solid ${C.border}22`:"none",background:zeroPrice?"#ff000011":"transparent",alignItems:"center"}}>
                    <input type="number" min="1" step="1" value={item.qty||1} onChange={e=>{const q=Math.max(1,+e.target.value||1);setDefaultItems(prev=>prev.map((it,j)=>j===i?{...it,qty:q}:it));}} style={{...inp(),width:40,fontSize:12,textAlign:"center",padding:"3px 4px"}}/>
                    <div style={{color:C.accent,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.partNumber||"—"}</div>
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.description}</div>
                    <div style={{textAlign:"right",color:zeroPrice?C.red:C.green}}>{item.unitPrice?"$"+Number(item.unitPrice).toFixed(2):"$0.00"}</div>

          )}
          {defaultItems.length===0&&<div style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>No auto-add items configured</div>}
        </div>

        {canUploadLogo&&(
          <div style={{marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:13,fontWeight:700,color:C.sub,marginBottom:10}}>Company Logo</div>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              {logoUrl?(
                <img src={logoUrl} alt="Company logo" style={{maxHeight:56,maxWidth:160,objectFit:"contain",borderRadius:6,border:`1px solid ${C.border}`,background:"#fff",padding:4}}/>
              ):(
                <div style={{width:100,height:56,borderRadius:6,border:`1px dashed ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:11}}>No logo</div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <input ref={logoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadLogo(e.target.files[0])}/>
                <button onClick={()=>logoInputRef.current.click()} disabled={logoUploading} style={btn(C.accent,"#fff",{fontSize:12,padding:"6px 14px",opacity:logoUploading?0.6:1})}>
                  {logoUploading?"Uploading…":"Upload Logo"}
                </button>
                {logoUrl&&<button onClick={removeLogo} style={btn(C.border,C.red,{fontSize:12,padding:"6px 14px"})}>Remove</button>}
              </div>
            </div>
            {logoErr&&<div style={{fontSize:12,color:C.red,marginTop:6}}>{logoErr}</div>}
            <div style={{fontSize:11,color:C.muted,marginTop:6}}>PNG, JPG, or SVG recommended. Displayed in the header top-left.</div>
          </div>
        )}

        {/* ── UI PREFERENCES ── */}
        <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:16,marginBottom:4}}>
          <label style={{fontSize:12,color:C.sub,display:"block",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>UI Preferences</label>
          <TooltipToggle/>
        </div>

        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={onClose} style={btn(C.border,C.sub,{flex:1})}>Cancel</button>
          <button onClick={save} disabled={saving} style={btn(saved?C.green:C.accent,"#fff",{flex:2,opacity:saving?0.6:1})}>
            {saving?"Saving…":saved?"✓ Saved":"Save Defaults"}
          </button>
        </div>
        <button onClick={onClose} style={{display:"block",width:"100%",marginTop:10,background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 0",color:C.muted,cursor:"pointer",fontSize:13}}>Close</button>
      </div>
    </div>
  );
}

function CompanySetupModal({uid,email,onDone,onClose}){

  async function create(e){
    e.preventDefault();if(!name.trim())return;setLoading(true);setErr("");
    try{
      const cid=await createCompany(uid,email,name.trim());

      _appCtx.projectsPath=`companies/${cid}/projects`;
      _appCtx.configPath=`companies/${cid}/config`;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>

          {err&&<div style={{color:C.red,fontSize:12,marginBottom:12}}>{err}</div>}

}

// ── REMOVE MEMBER MODAL ──
function RemoveMemberModal({uid,companyId,member,members,onRemoved,onClose}){
  const [transferTo,setTransferTo]=useState("");
  const [memberProjects,setMemberProjects]=useState([]);
  const [loadingProjects,setLoadingProjects]=useState(true);
  const [removing,setRemoving]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    fbDb.collection(`companies/${companyId}/projects`)
      .where("createdBy","==",member.uid)
      .get()
      .then(snap=>{setMemberProjects(snap.docs.map(d=>d.data()));setLoadingProjects(false);})
      .catch(()=>setLoadingProjects(false));
  },[]);

  async function doRemove(){
    setRemoving(true);setErr("");
    try{
      if(transferTo&&memberProjects.length>0){
        const batch=fbDb.batch();
        memberProjects.forEach(p=>{
          batch.update(fbDb.doc(`companies/${companyId}/projects/${p.id}`),{
            transferred:true,
            transferredTo:transferTo,
            transferredFrom:{uid:member.uid,email:member.email},
            createdBy:transferTo,
          });
        });
        await batch.commit();
      }
      await fbFunctions.httpsCallable("removeTeamMember")({targetUid:member.uid,companyId});
      onRemoved(member.uid);
    }catch(ex){setErr(ex.message);}
    setRemoving(false);
  }

  const recipients=members.filter(m=>m.uid!==member.uid);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Remove Member</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Removing <strong style={{color:C.text}}>{member.email}</strong> from the workspace.</div>
        {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:10,marginBottom:12,fontSize:13,color:C.red}}>{err}</div>}
        {loadingProjects?(
          <div style={{color:C.muted,fontSize:13,padding:"20px 0",textAlign:"center"}}>Checking projects…</div>
        ):(
          <>
            {memberProjects.length>0?(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Their Projects ({memberProjects.length})</div>
                <div style={{background:"#0a0a12",borderRadius:8,padding:10,marginBottom:14,maxHeight:130,overflow:"auto"}}>
                  {memberProjects.map(p=>(
                    <div key={p.id} style={{fontSize:13,color:C.text,padding:"5px 0",borderBottom:`1px solid ${C.border}22`}}>{p.name}</div>
                  ))}
                </div>
                <div style={{fontSize:13,color:C.sub,marginBottom:8}}>Transfer projects to:</div>
                <select value={transferTo} onChange={e=>setTransferTo(e.target.value)}
                  style={{width:"100%",background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:transferTo?C.text:C.muted,fontSize:14,marginBottom:6}}>
                  <option value="">Leave in workspace (no specific owner)</option>
                  {recipients.map(m=>(
                    <option key={m.uid} value={m.uid}>{m.email} ({m.role})</option>
                  ))}
                </select>
                {transferTo&&<div style={{fontSize:11,color:C.muted}}>Projects will appear in the recipient's Transferred Projects section.</div>}
              </div>
            ):(
              <div style={{background:"#0a0a12",borderRadius:8,padding:14,marginBottom:20,fontSize:13,color:C.muted}}>This member has no projects.</div>
            )}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={onClose} disabled={removing} style={btn(C.border,C.sub)}>Cancel</button>
              <button onClick={doRemove} disabled={removing} style={btn(C.red,"#fff",{opacity:removing?0.6:1})}>
                {removing?"Removing…":transferTo?"Transfer & Remove":"Remove Member"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── TEAM MODAL ──
function TeamModal({uid,companyId,userRole,onClose}){
  const [members,setMembers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [inviteEmail,setInviteEmail]=useState("");
  const [inviteRole,setInviteRole]=useState("edit");
  const [inviting,setInviting]=useState(false);
  const [generatedLinks,setGeneratedLinks]=useState([]); // [{email,role,url}]
  const [copied,setCopied]=useState("");
  const [err,setErr]=useState("");
  const [removingMember,setRemovingMember]=useState(null);

  useEffect(()=>{
    if(!companyId){setLoading(false);return;}
    loadCompanyMembers(companyId)
      .then(m=>{
        // Ensure the current user always appears; repair missing member doc if needed
        if(!m.some(x=>x.uid===uid)){
          const self={uid,email:fbAuth.currentUser?.email||"",role:userRole};
          fbDb.doc(`companies/${companyId}/members/${uid}`).set(self,{merge:true}).catch(()=>{});
          m=[self,...m];
        }
        setMembers(m);setLoading(false);
      })
      .catch(e=>{setErr("Failed to load members: "+e.message);setLoading(false);});
  },[companyId]);

  async function sendInvite(e){
    e.preventDefault();if(!inviteEmail.trim())return;
    setInviting(true);setErr("");
    try{
      const email=inviteEmail.trim();
      const payload=btoa(JSON.stringify({c:companyId,r:inviteRole,e:email}));
      const url=`${window.location.origin}${window.location.pathname}?join=${payload}`;
      await fbFunctions.httpsCallable("sendInviteEmail")({to:email,inviteUrl:url,role:inviteRole});
      setGeneratedLinks(l=>[...l,{email,role:inviteRole,url,sent:true}]);
      setInviteEmail("");
    }catch(ex){setErr(ex.message);}
    setInviting(false);
  }

  function handleMemberRemoved(targetUid){
    setMembers(m=>m.filter(x=>x.uid!==targetUid));
    setRemovingMember(null);
  }

  async function changeRole(targetUid,role){
    try{
      await fbFunctions.httpsCallable("updateMemberRole")({targetUid,role,companyId});
      setMembers(m=>m.map(x=>x.uid===targetUid?{...x,role}:x));
    }catch(ex){setErr(ex.message);}
  }

  const admin=userRole==="admin";
  const roleBadge={admin:[C.accentDim,C.accent],edit:[C.greenDim,C.green],view:[C.border,C.muted]};

  return(<>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{...card(),width:"100%",maxWidth:560,maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>👥 Team</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Manage company workspace members</div>
        {loading&&<div style={{color:C.muted,fontSize:13,padding:"20px 0",textAlign:"center"}}>Loading…</div>}
        {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:10,marginBottom:12,fontSize:13,color:C.red}}>{err}</div>}

        {!loading&&(
          <>
            {/* Members */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:12,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Members ({members.length})</div>
              {members.map(m=>{
                const [bg,col]=roleBadge[m.role]||roleBadge.view;
                return(
                  <div key={m.uid} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"8px 12px",background:"#0a0a12",borderRadius:8}}>
                    <div style={{flex:1,fontSize:13,color:C.text}}>{m.email}</div>
                    {admin&&m.uid!==uid?(
                      <select value={m.role} onChange={e=>changeRole(m.uid,e.target.value)}
                        style={{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>
                        <option value="admin">admin</option>
                        <option value="edit">edit</option>
                        <option value="view">view</option>
                      </select>
                    ):(
                      <span style={{background:bg,color:col,borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700}}>{m.role}</span>
                    )}
                    {admin&&m.uid!==uid&&(
                      <button onClick={()=>setRemovingMember(m)} style={{background:C.redDim,color:C.red,border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>Remove</button>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Generated invite links (this session) */}
            {generatedLinks.length>0&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Invite Links</div>
                {generatedLinks.map((inv,i)=>(
                  <div key={i} style={{marginBottom:8,padding:"8px 12px",background:"#0a0a12",borderRadius:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1,fontSize:13,color:C.text}}>{inv.email}</div>
                      <span style={{background:C.yellowDim,color:C.yellow,borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{inv.role}</span>
                      {inv.sent&&<span style={{color:C.green,fontSize:11,fontWeight:700}}>✓ Email sent</span>}
                      <button
                        onClick={()=>{navigator.clipboard.writeText(inv.url);setCopied(i);setTimeout(()=>setCopied(""),2000);}}
                        style={btn(copied===i?C.greenDim:C.border,copied===i?C.green:C.muted,{fontSize:11,padding:"3px 10px"})}>
                        {copied===i?"✓ Copied":"Copy Link"}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Invite form — admin only */}
            {admin&&(
              <div>
                <div style={{fontSize:12,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Invite Member</div>
                <form onSubmit={sendInvite}>
                  <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                    <input value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} type="email" placeholder="email@company.com" style={{...inp(),flex:"2 1 180px"}}/>
                    <select value={inviteRole} onChange={e=>setInviteRole(e.target.value)}
                      style={{background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:14}}>
                      <option value="admin">Admin</option>
                      <option value="edit">Edit</option>
                      <option value="view">View</option>
                    </select>
                    <button type="submit" disabled={!inviteEmail.trim()||inviting} style={btn(C.accent,"#fff",{opacity:!inviteEmail.trim()||inviting?0.5:1})}>
                      {inviting?"Sending…":"Send Invite"}
                    </button>
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:4}}>Sends an invite email automatically. Link also appears below if you need to share it manually.</div>
                </form>
              </div>
            )}
          </>
        )}

        <div style={{marginTop:20,display:"flex",justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btn(C.border,C.sub)}>Close</button>
        </div>
      </div>
    </div>
    {removingMember&&(
      <RemoveMemberModal
        uid={uid} companyId={companyId} member={removingMember} members={members}
        onRemoved={handleMemberRemoved} onClose={()=>setRemovingMember(null)}/>
    )}
  </>);
}

// ── LOGIN ──
function LoginScreen({invite}){
  const [email,setEmail]=useState(invite?.e||"");
  const [pass,setPass]=useState("");
  const [mode,setMode]=useState(invite?"register":"login");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const emailRef=useRef(null);

  async function submit(e){
    e.preventDefault();setErr("");setLoading(true);
    try{
      if(mode==="login")await fbAuth.signInWithEmailAndPassword(email,pass);
      else await fbAuth.createUserWithEmailAndPassword(email,pass);
    }catch(ex){
      if(ex.code==="auth/email-already-in-use"){
        setMode("login");
        setErr("That email already has an account — sign in below, or use Forgot Password to reset it.");
      } else if(["auth/user-not-found","auth/wrong-password","auth/invalid-credential","auth/invalid-email"].includes(ex.code)){
        setErr("Email or password not recognized. Please try again, or use Forgot Password to reset it.");
      } else {
        setErr(ex.message);
      }
    }
    setLoading(false);
  }
  async function google(){
    setLoading(true);
    try{await fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
    catch(ex){setErr(ex.message);}
    setLoading(false);
  }
  async function microsoft(){
    setLoading(true);
    try{
      const provider=new firebase.auth.OAuthProvider("microsoft.com");
      provider.setCustomParameters({prompt:"select_account"});
      await fbAuth.signInWithPopup(provider);
    }catch(ex){
      if(ex.code==="auth/account-exists-with-different-credential"){
        if(ex.email)setEmail(ex.email);
        setErr("An account with this email already exists — please sign in with your email and password below.");
      } else {
        setErr(ex.message);
      }
    }
    setLoading(false);
  }
  async function sendReset(e){
    e.preventDefault();setErr("");setLoading(true);
    try{
      await fbAuth.sendPasswordResetEmail(email);
      setResetSent(true);
    }catch(ex){setErr(ex.message);}
    setLoading(false);
  }
  function switchMode(m){
    // Capture actual DOM value first — browser autocomplete may not fire onChange
    if(emailRef.current)setEmail(emailRef.current.value);
    setMode(m);setErr("");setResetSent(false);
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 50% 0%,#1a1a3e 0%,${C.bg} 60%)`}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:104,marginBottom:10}}>⬡</div>
        <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:64,fontWeight:900,letterSpacing:8,color:C.accent,lineHeight:1}}>ARC</div>
        <div style={{fontSize:14,color:C.muted,fontWeight:500,marginTop:6,letterSpacing:2}}>by APEX Software</div>
        <div style={{fontSize:13,color:C.muted,marginTop:4,opacity:0.6}}>{APP_VERSION}</div>
      </div>
      {invite&&(
        <div style={{background:C.accentDim,border:`1px solid ${C.accent}44`,borderRadius:12,padding:"14px 20px",marginBottom:20,textAlign:"center",width:"100%",maxWidth:400}}>
          <div style={{fontSize:15,fontWeight:700,color:C.accent,marginBottom:4}}>You've been invited to APEX ARC</div>
          <div style={{fontSize:13,color:C.sub}}>Create an account or sign in to join your team workspace.</div>
        </div>
      )}
      <div style={{...card(),width:"100%",maxWidth:400}}>
        {mode==="reset"?(
          resetSent?(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:12}}>Check your email</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6}}>A password reset link was sent to <strong style={{color:C.fg}}>{email}</strong>. Check your inbox and follow the link to set a new password.</div>
              <button onClick={()=>switchMode("login")} style={btn(C.accent,"#fff",{width:"100%"})}>Back to Sign In</button>
            </div>
          ):(
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Reset Password</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:16}}>Enter your email and we'll send a reset link.</div>
              <form onSubmit={sendReset}>

// ── FAST QUOTE OVERLAY ──
function FastQuoteOverlay({project,uid,onUpdate,onSaveImmediate,onClose,onDone}){
  const [progress,setProgress]=useState(0);
  const [stepLabel,setStepLabel]=useState("Starting…");
  const [status,setStatus]=useState("running"); // running | done | error
  const [err,setErr]=useState("");

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        let proj={...project};

        // Steps 1+2: Extract BOM & Analyze schematics/layout (concurrent, 0–66%)
        setStepLabel("Extracting BOM & analyzing drawings…");
        let bomPages=(proj.pages||[]).filter(p=>getPageTypes(p).includes("bom"));
        let schPages=(proj.pages||[]).filter(p=>getPageTypes(p).includes("schematic"));
        let layPages=(proj.pages||[]).filter(p=>getPageTypes(p).includes("layout"));
        // Ensure dataUrls for pages loaded from Storage
        bomPages=await Promise.all(bomPages.map(ensureDataUrl));
        schPages=await Promise.all(schPages.map(ensureDataUrl));
        layPages=await Promise.all(layPages.map(ensureDataUrl));
        let bomStarted=0,bomDone=0,valStarted=0,valDone=0;
        const totalValPages=schPages.length+layPages.length;
        const bomTicks=bomPages.length*2;
        const valTicks=totalValPages*2;
        const updateProgress=()=>{
          const bomPct=bomTicks?(bomStarted+bomDone)/bomTicks:1;
          const valPct=valTicks?(valStarted+valDone)/valTicks:1;
          setProgress(Math.round((bomPct*33)+(valPct*33)));
        };

        const [bomResults,[schResults,layResults]]=await Promise.all([
          // BOM extraction (concurrency 3)
          parallelMap(bomPages.filter(p=>p.dataUrl),async(pg)=>{
            bomStarted++;updateProgress();
            const items=await extractBomPage(pg.dataUrl);
            bomDone++;updateProgress();
            return items;
          },3),
          // Schematic + layout analysis (concurrency 4)
          Promise.all([
            parallelMap(schPages.filter(p=>p.dataUrl),async(pg)=>{
              valStarted++;updateProgress();
              const result=await analyzeSchematicPage(pg.dataUrl);
              valDone++;updateProgress();
              return result;
            },4),
            parallelMap(layPages.filter(p=>p.dataUrl),async(pg)=>{
              valStarted++;updateProgress();
              const lr=await analyzeLayoutPage(pg.dataUrl);
              valDone++;updateProgress();
              return lr;
            },4)
          ])
        ]);

        if(cancelled)return;
        // BOM dedup
        let all=bomResults.flat();
        const map={};
        all.forEach(item=>{
          const key=(item.partNumber||"").trim().toLowerCase()||("desc:"+item.description.toLowerCase().slice(0,40));
          if(map[key]){map[key].qty=(+map[key].qty||1)+(+item.qty||1);}
          else{map[key]={...item,id:Date.now()+Math.random(),qty:+item.qty||1};}
        });
        const bom=appendDefaultBomItems(all.length?Object.values(map):(proj.bom||[]));
        proj={...proj,bom,status:"extracted"};
        // Schematic results
        let allTags=[];let totalWires=0;let totalTerminations=0;
        for(const result of schResults){
          allTags=[...allTags,...result.tags];
          totalWires+=result.wireCount;
          totalTerminations+=result.wireTerminations;
        }
        let layoutMerged=null;
        const layoutResults=layResults.filter(Boolean);
        if(layoutResults.length>0)layoutMerged=mergeLayoutResults(layoutResults);
        const tagStrings=allTags.map(t=>typeof t==="string"?t:t.tag||"");
        const schematicTags=[...new Set(tagStrings.map(t=>t.trim()).filter(Boolean))];
        const validation={runAt:Date.now(),schematicTags,wireCount:totalWires,matched:[],missingFromSchematic:[],notTraceable:[],unaccountedTags:[],confidence:"medium"};
        // Build laborData — use schematic as authority for door device count
        const doorDevicesFromSch=allTags.filter(t=>{const type=typeof t==="string"?"other":(t.type||"other");return DOOR_DEVICE_TYPES.has(type);});
        const allDevicesFromSch=allTags.filter(t=>{const tag=typeof t==="string"?t:(t.tag||"");return tag.trim().length>0;});
        const schDoorCount2=doorDevicesFromSch.length;
        const layDoorCount2=layoutMerged?layoutMerged.doorDeviceCount:0;
        const layBackCount2=layoutMerged?layoutMerged.backpanelDeviceCount:0;
        const doorDevices2=schDoorCount2>0?schDoorCount2:layDoorCount2;
        const allDevices2=layoutMerged?(doorDevices2+layBackCount2):allDevicesFromSch.length;
        const layoutPanelHoles2=layoutMerged?layoutMerged.panelHoles:0;
        const panelHoles2=schDoorCount2>0?Math.min(layoutPanelHoles2,schDoorCount2):layoutPanelHoles2;
        console.log("FQ DOOR DEVICES: schematic="+schDoorCount2+", layout="+layDoorCount2+", using="+doorDevices2);
        const laborData={
          counts:{wireCount:totalWires,wireTerminations:totalTerminations,doorDevices:doorDevices2,allDevices:allDevices2,panelHoles:panelHoles2,ductDinFeet:layoutMerged?layoutMerged.ductDinFeet:0,sideTopSmallCount:layoutMerged?.sideTopSmallCount||0,sideTopLargeCount:layoutMerged?.sideTopLargeCount||0},
          overrides:{},defaults:{pmUnits:2,buyoffUnits:2,cratingUnits:1,labelHours:4},hasLayoutData:!!layoutMerged,layoutAnalysis:layoutMerged,deviceClassification:allTags
        };
        proj={...proj,validation,laborData,status:"validated"};
        setProgress(66);

        // Verify part numbers
        if(proj.bom&&proj.bom.length){
          const verifResults=await verifyPartNumbers(proj.bom);
          if(verifResults.length>0)proj={...proj,bomVerification:verifResults};
        }

        // Step 3: Price BOM (66–90%)
        setStepLabel("Estimating prices…");
        if(proj.bom&&proj.bom.length){
          const priceMap=await estimatePrices(proj.bom);
          const pricedBom=proj.bom.map(r=>{
            const key=String(r.id);
            if(key in priceMap)return{...r,unitPrice:priceMap[key],priceSource:priceMap[key]!=null?"ai":null};
            return r;
          });
          proj={...proj,bom:pricedBom,status:"costed"};
        }
        setProgress(90);

        // Step 4: Budgetary quote calculation (90–100%)
        setStepLabel("Computing budgetary estimate…");
        const pr=proj.pricing||{};
        const currentBom=proj.bom||[];
        const totalCost=currentBom.reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
        const laborEst=computeLaborEstimate(proj);
        const laborRate=pr.laborRate??45;
        const contingencyBOM=pr.contingencyBOM??_pricingConfig.contingencyBOM;
        const contingencyConsumables=pr.contingencyConsumables??_pricingConfig.contingencyConsumables;
        const grandTotal=totalCost+laborEst.totalCost+contingencyBOM+contingencyConsumables;
        const budgetaryPct=pr.budgetaryContingencyPct??_pricingConfig.budgetaryContingencyPct??20;
        const markup=pr.markup??30;
        const budgetarySellPrice=grandTotal*(1+budgetaryPct/100)*(1+markup/100);
        proj={...proj,budgetaryQuote:{generatedAt:Date.now(),contingencyPct:budgetaryPct,baseGrandTotal:grandTotal,budgetarySellPrice}};

        if(cancelled)return;
        setProgress(97);
        if(onSaveImmediate){await onSaveImmediate(proj);}else{await saveProject(uid,proj);}
        onUpdate(proj);
        setProgress(100);
        setStepLabel("Complete!");
        setStatus("done");
        setTimeout(()=>onDone("quote"),900);
      }catch(ex){
        setErr(ex.message);
        setStatus("error");
      }
    })();
    return()=>{cancelled=true;};
  },[]);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{...card(),width:"100%",maxWidth:480,textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>⚡</div>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Fast Quote</div>
        <div style={{fontSize:13,color:C.muted,marginBottom:24}}>Running full pipeline: Extract → Validate → Price → Budgetary Quote</div>
        <div style={{background:C.border,borderRadius:4,height:8,overflow:"hidden",marginBottom:12}}>
          <div style={{width:`${progress}%`,height:"100%",background:status==="error"?C.red:C.yellow,borderRadius:4,transition:"width 0.4s"}}/>
        </div>
        <div style={{fontSize:13,color:C.sub,minHeight:20,marginBottom:status==="error"?16:0}}>
          {status==="done"?"✓ Complete — opening Budgetary Quote…":status==="error"?"":stepLabel}
        </div>
        {err&&(
          <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:12,marginBottom:16,fontSize:13,color:C.red,textAlign:"left"}}>{err}</div>
        )}
        {status==="error"&&(
          <button onClick={onClose} style={btn(C.border,C.sub)}>Close</button>
        )}
      </div>
    </div>
  );
}

// ── TITLE BLOCK EXTRACTOR ──
async function extractTitleBlock(dataUrl){
  if(!_apiKey||!dataUrl)return null;
  try{
    const text=await apiCall({
      max_tokens:150,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:dataUrl.split(",")[1]}},
        {type:"text",text:`Look at the title block of this engineering drawing (typically in the bottom-right corner).
Extract exactly three fields:
- Drawing number (labeled DWG NO., DRAWING NO., JOB NO., DWG #, SHEET, or similar)
- Drawing title or description (the main name/description of what is shown)
- Revision (labeled REV, REVISION, REV NO., REV LETTER — typically a letter like A, B, C or a number; empty string if not shown)
Return ONLY valid JSON, no extra text: {"drawingNo":"...","drawingDesc":"...","drawingRev":"..."}`}
      ]}]
    });
    const m=text.replace(/```json|```/g,"").trim().match(/\{[\s\S]*?\}/);
    if(!m)return null;
    return JSON.parse(m[0]);
  }catch(e){return null;}
}

// ── CPD PANEL METADATA EXTRACTION ──
// Analyzes ALL pages in batches of 8, merges results into one metadata object
async function extractPanelMetadata(pages){
  if(!_apiKey||!pages||!pages.length)return null;
  const allPages=pages.filter(p=>(p.dataUrl||p.storageUrl));
  if(!allPages.length)return null;
  const BATCH=8;
  const prompt=`Analyze these control panel engineering drawings (schematics, layouts, title blocks, BOM pages — all page types). Extract every detail you can find.
Return ONLY valid JSON (no markdown):
{
  "panelType": "e.g. Motor Control Panel / PLC Panel / Junction Box / Heater Control / Relay Panel / MCC / Automation Panel",
  "controlledEquipment": "comma-separated list of all equipment mentioned e.g. Clarifier, Thickener, Kiln, Generator, Pump, Conveyor, Trash Rake, Heater, Fan",
  "voltages": {
    "lineVoltage": "e.g. 480V 3PH or 208V 3PH or unknown",
    "controlVoltage": "e.g. 120VAC or 24VDC or unknown",
    "motorVoltage": "e.g. 460V or unknown"
  },
  "plcBrand": "e.g. Allen-Bradley, Siemens, AutomationDirect, or none/unknown",
  "enclosureType": "e.g. NEMA 12, NEMA 4X, or unknown",
  "inputCount": 0,
  "outputCount": 0,
  "motorCount": 0,
  "additionalNotes": "any other relevant details: customer name, project name, location, special requirements, certifications required, environmental conditions"
}`;
  try{
    // Ensure all pages have dataUrl
    const ensured=await Promise.all(allPages.map(ensureDataUrl));
    const withData=ensured.filter(p=>p.dataUrl);
    if(!withData.length)return null;
    // Process in batches, collect partial results
    const partials=[];
    for(let i=0;i<withData.length;i+=BATCH){
      const batch=withData.slice(i,i+BATCH);
      const imageContents=batch.map(p=>({
        type:"image",source:{type:"base64",media_type:"image/jpeg",data:p.dataUrl.split(",")[1]}
      }));
      try{
        const resp=await apiCall({
          max_tokens:700,
          messages:[{role:"user",content:[...imageContents,{type:"text",text:prompt}]}]
        });
        const raw=resp.content[0].text.replace(/```json|```/g,'').trim();
        const m=raw.match(/\{[\s\S]*\}/);
        if(m)partials.push(JSON.parse(m[0]));
      }catch(e){}
    }
    if(!partials.length)return null;
    // Merge: prefer first non-unknown value for each field, sum counts, combine equipment lists
    const merged=partials[0];
    for(let i=1;i<partials.length;i++){
      const p=partials[i];
      if((!merged.panelType||merged.panelType==='unknown')&&p.panelType)merged.panelType=p.panelType;
      if(p.controlledEquipment){
        const existing=new Set((merged.controlledEquipment||'').split(/,\s*/).filter(Boolean));
        p.controlledEquipment.split(/,\s*/).filter(Boolean).forEach(e=>existing.add(e.trim()));
        merged.controlledEquipment=[...existing].join(', ');
      }
      if((!merged.voltages?.lineVoltage||merged.voltages.lineVoltage==='unknown')&&p.voltages?.lineVoltage&&p.voltages.lineVoltage!=='unknown')merged.voltages={...merged.voltages,...p.voltages};
      if((!merged.plcBrand||merged.plcBrand==='unknown')&&p.plcBrand&&p.plcBrand!=='unknown')merged.plcBrand=p.plcBrand;
      if((!merged.enclosureType||merged.enclosureType==='unknown')&&p.enclosureType&&p.enclosureType!=='unknown')merged.enclosureType=p.enclosureType;
      if(p.inputCount>0&&(!merged.inputCount||merged.inputCount<p.inputCount))merged.inputCount=p.inputCount;
      if(p.outputCount>0&&(!merged.outputCount||merged.outputCount<p.outputCount))merged.outputCount=p.outputCount;
      if(p.motorCount>0&&(!merged.motorCount||merged.motorCount<p.motorCount))merged.motorCount=p.motorCount;
      if(p.additionalNotes&&p.additionalNotes!==merged.additionalNotes){
        merged.additionalNotes=[merged.additionalNotes,p.additionalNotes].filter(Boolean).join(' | ');
      }
    }
    return merged;
  }catch(e){return null;}
}

// ── DRAWING LIGHTBOX ──
function DrawingLightbox({pages,startId,onClose}){
  const [idx,setIdx]=useState(()=>{const i=pages.findIndex(p=>p.id===startId);return i>=0?i:0;});
  const pg=pages[idx]||pages[0];
  const typeColors={bom:C.accent,schematic:C.green,backpanel:C.purple,enclosure:C.teal||"#0d9488",layout:C.purple,pid:C.muted};
  const typeLabels={bom:"BOM",schematic:"Schematic",backpanel:"Back Panel",enclosure:"Enclosure",layout:"Layout",pid:"P&ID"};

  useEffect(()=>{
    function onKey(e){
      if(e.key==="Escape")onClose();
      if(e.key==="ArrowRight"||e.key==="ArrowDown")setIdx(i=>Math.min(i+1,pages.length-1));
      if(e.key==="ArrowLeft"||e.key==="ArrowUp")setIdx(i=>Math.max(i-1,0));
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[pages.length,onClose]);

  if(!pg)return null;
  const types=getPageTypes(pg);
  const hasFilmstrip=pages.length>1;

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",flexDirection:"column",background:"rgba(0,0,0,0.97)"}}>

      {/* Top bar */}
      <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"#0d0d14",borderBottom:`1px solid ${C.border}`}}>
        <div style={{flex:1,fontSize:15,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pg.name}</div>
        <div style={{display:"flex",gap:6}}>
          {types.map(t=>(
            <span key={t} style={{background:typeColors[t]+"33",color:typeColors[t],border:`1px solid ${typeColors[t]}66`,borderRadius:10,padding:"3px 10px",fontSize:13,fontWeight:700}}>
              {typeLabels[t]}
            </span>
          ))}
        </div>
        <div style={{fontSize:13,color:C.muted,whiteSpace:"nowrap"}}>{idx+1} / {pages.length}</div>
        <button onClick={onClose} style={{background:C.border,border:"none",color:C.text,cursor:"pointer",borderRadius:6,padding:"6px 16px",fontSize:14,fontWeight:600}}>✕ Close</button>
      </div>

      {/* Image area */}
      <div onClick={onClose} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",padding:"16px 64px"}}>
        <img onClick={e=>e.stopPropagation()} src={pg.dataUrl||pg.storageUrl} alt={pg.name}
          style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:6,boxShadow:"0 4px 40px rgba(0,0,0,0.8)"}}/>

        {idx>0&&(
          <button onClick={e=>{e.stopPropagation();setIdx(i=>i-1);}}
            style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.1)",border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",borderRadius:8,padding:"10px 14px",fontSize:26,lineHeight:1}}>
            ‹
          </button>
        )}
        {idx<pages.length-1&&(
          <button onClick={e=>{e.stopPropagation();setIdx(i=>i+1);}}
            style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.1)",border:`1px solid ${C.border}`,color:C.text,cursor:"pointer",borderRadius:8,padding:"10px 14px",fontSize:26,lineHeight:1}}>
            ›
          </button>
        )}
      </div>

      {/* Filmstrip */}
      {hasFilmstrip&&(
        <div style={{flexShrink:0,display:"flex",gap:8,padding:"10px 16px",overflowX:"auto",background:"#0d0d14",borderTop:`1px solid ${C.border}`}}>
          {pages.map((p,i)=>(
            <img key={p.id} src={p.dataUrl||p.storageUrl} alt={p.name} onClick={()=>setIdx(i)}
              style={{height:64,width:104,objectFit:"contain",borderRadius:4,cursor:"pointer",border:`2px solid ${i===idx?C.accent:C.border}`,background:"#080810",flexShrink:0,opacity:i===idx?1:0.55,transition:"all 0.15s"}}/>
          ))}
        </div>
      )}
    </div>,
    document.body
  );
}

  async function locateInDrawing(pgIdx){
    const idx=pgIdx!=null?pgIdx:drawingPageIdx;
    const pg=bomPages[idx];
    if(!pg||!_apiKey)return;
    setLocating(true);setCroppedDataUrl(null);
    try{
      let dataUrl=pg.dataUrl;
      if(!dataUrl&&pg.storageUrl){const loaded=await ensureDataUrl(pg);dataUrl=loaded.dataUrl;}
      if(!dataUrl)return;
      const b64=dataUrl.split(',')[1];
      if(!b64)return;
      const pn=(targetRow?.partNumber||initialQuery||'').trim();
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:120,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:`This is a BOM table from an electrical panel drawing. Find the row containing the part number "${pn}". Return ONLY JSON, no explanation: {"found":true,"y_top":0.38,"y_bottom":0.42} where y_top and y_bottom are the top and bottom edges of that specific row as fractions of the total image height (0=top, 1=bottom). If not found return {"found":false}.`}
        ]}]})
      });
      const data=await resp.json();
      const text=data.content?.[0]?.text||'';
      const m=text.match(/\{[\s\S]*?\}/);
      if(m){
        const r=JSON.parse(m[0]);
        if(r.found&&r.y_top!=null&&r.y_bottom!=null){
          await cropRowFromImage(dataUrl,r.y_top,r.y_bottom);
        }
      }
    }catch(e){console.warn('locateInDrawing:',e);}
    finally{setLocating(false);}
  }

  function cropRowFromImage(dataUrl,yTop,yBottom){
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{
        const W=img.naturalWidth,H=img.naturalHeight;
        // Vertical crop — row + padding (2 rows worth above/below for context)
        const vPad=0.025;
        const cropTop=Math.max(0,yTop-vPad);
        const cropBottom=Math.min(1,yBottom+vPad);
        const srcY=Math.round(cropTop*H);
        const srcRowH=Math.round((yBottom-yTop)*H);
        const srcH=Math.round((cropBottom-cropTop)*H);
        // Scale so the target row renders at ~80px tall — full width, no horizontal crop
        const scale=Math.max(1,80/Math.max(srcRowH,1));
        const canvasW=Math.round(W*scale);
        const canvasH=Math.round(srcH*scale);
        const canvas=document.createElement('canvas');
        canvas.width=canvasW;canvas.height=canvasH;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,srcY,W,srcH,0,0,canvasW,canvasH);
        // Highlight the row
        const rowTopC=Math.round(((yTop-cropTop)/(cropBottom-cropTop))*canvasH);
        const rowBotC=Math.round(((yBottom-cropTop)/(cropBottom-cropTop))*canvasH);
        const rowH=Math.max(4,rowBotC-rowTopC);
        ctx.fillStyle='rgba(253,224,71,0.22)';
        ctx.fillRect(0,rowTopC,canvasW,rowH);
        ctx.strokeStyle='#fde047';ctx.lineWidth=3;
        ctx.strokeRect(1,rowTopC+1,canvasW-2,rowH-2);
        ctx.shadowColor='#fde047';ctx.shadowBlur=12;
        ctx.strokeRect(1,rowTopC+1,canvasW-2,rowH-2);
        setCroppedDataUrl(canvas.toDataURL('image/jpeg',0.95));
        resolve();
      };
      img.onerror=resolve;
      img.src=dataUrl;
    });
  }

        {bomPages.length>0&&(

              {bomPages.length>1&&(
                <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
                  {bomPages.map((_,i)=>(
                    <button key={i} onClick={()=>{setDrawingPageIdx(i);if(targetRow?.y_top!=null){const pg=bomPages[i];if(pg?.dataUrl)cropRowFromImage(pg.dataUrl,targetRow.y_top,targetRow.y_bottom);}else locateInDrawing(i);}}
                      style={{background:drawingPageIdx===i?C.accentDim:"transparent",border:`1px solid ${drawingPageIdx===i?C.accent:C.border}`,color:drawingPageIdx===i?C.accent:C.muted,borderRadius:4,padding:"2px 8px",fontSize:11,cursor:"pointer"}}>
                      Pg {i+1}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div style={{overflowX:"auto",background:"#020208",borderRadius:"0 0 8px 8px",minHeight:locating?60:croppedDataUrl?undefined:0}}>
              {locating&&!croppedDataUrl&&(
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:60,color:C.muted,fontSize:12,gap:8}}>
                  <span style={{animation:"pulse 1s ease-in-out infinite"}}>🔍</span> Locating row in drawing…
                </div>
              )}
              {croppedDataUrl&&(
                <img src={croppedDataUrl} alt="BOM row" style={{display:"block",height:"auto",imageRendering:"crisp-edges"}}/>
              )}
            </div>
          </div>
        )}
      </div>
    </div>,
    document.body
  );
}

  function parseLaborFeedback(text){
    const updates={};
    const t=text.toLowerCase();
    // Wire count: "X wires", "base labor off X wires", "wire count is X", "X wire terminations"
    const wireMatch=t.match(/\b(\d+)\s*wire(?:s|[\s-]terminations?|[\s-]count)?/);
    if(wireMatch){
      const wires=parseInt(wireMatch[1]);
      const hours=computeFallbackLaborHours(wires);
      updates.laborHoursOverride=hours;
      updates._wiresUsed=wires;
    }
    // Direct hour override: "X hours", "use X labor hours", "set hours to X"
    const hoursMatch=t.match(/\b(\d+(?:\.\d+)?)\s*(?:labor\s+)?hours?\b/);
    if(hoursMatch&&!wireMatch){
      updates.laborHoursOverride=parseFloat(hoursMatch[1]);
    }
    // Labor rate: "$X/hr", "rate is $X", "labor rate X"
    const rateMatch=t.match(/\$\s*(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r|per\s+hour)/)||
                    t.match(/labor\s+rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)/)||
                    t.match(/rate\s+(?:is\s+)?(?:\$)?(\d+(?:\.\d+)?)\s*(?:\/\s*h(?:ou)?r)?/);
    if(rateMatch){updates.laborRate=parseFloat(rateMatch[1]);}
    const {_wiresUsed,...pricingUpdates}=updates;
    return Object.keys(pricingUpdates).length>0?{pricingUpdates,wires:_wiresUsed||null}:null;
  }

      .then(()=>loadPartLibrary(uid).then(setPartLibrary)).catch(()=>{});

  function dismissSuggestion(id){

  function commitBcItem(bomRowId,bcItem,asCross,correctionType=null){
    const bom=(panel.bom||[]).map(r=>{
      if(r.id!==bomRowId)return r;
      const origPN=(r.crossedFrom||r.correctionFrom||r.partNumber||"").trim();
      const newPN=bcItem.number;
      const updates={...r,partNumber:newPN,unitPrice:bcItem.unitCost,priceSource:"bc"};
      if(asCross){
        updates.isCrossed=true;updates.crossedFrom=origPN;
        delete updates.isCorrection;delete updates.correctionType;delete updates.correctionFrom;
      }else{
        updates.isCorrection=true;updates.correctionType=correctionType;updates.correctionFrom=origPN;
        delete updates.isCrossed;delete updates.crossedFrom;
      }
      if(bcItem.displayName&&!r.description)updates.description=bcItem.displayName;
      if(bcItem._vendorName&&!r.manufacturer)updates.manufacturer=bcItem._vendorName;
      if(asCross){
        // autoReplace:true — APEX selection immediately trains the learning database
        saveAlternateEntry(uid,origPN,{partNumber:newPN,description:bcItem.displayName||r.description||"",unitCost:bcItem.unitCost},true)
          .then(alts=>setAlternates([...alts])).catch(()=>{});
      }else if(correctionType){
        saveCorrectionEntry(uid,origPN,newPN,correctionType).then(()=>{}).catch(()=>{});
      }
      return updates;
    });
    const updated={...panel,bom};
    onUpdate(updated);
    try{onSaveImmediate(updated);}catch(e){}
    setBcFuzzySuggestions(prev=>{const next={...prev};delete next[bomRowId];return next;});
  }
  function applyBcItem(bomRowId,bcItem){
    const row=(panel.bom||[]).find(r=>r.id===bomRowId);
    if(!row)return;
    const origPN=(row.crossedFrom||row.partNumber||"").trim();
    const newPN=bcItem.number;
    const isCrossing=origPN&&origPN!==newPN;
    if(isCrossing){
      setCrossOrCorrectPending({bomRowId,bcItem,origPN,newPN});
    }else{
      commitBcItem(bomRowId,bcItem,false);
    }
  }

  async function runPricingOnPanel(bomOverride){
    const bom=bomOverride||panel.bom||[];
    if(!bom.length||!_apiKey)return;
    setAiPricing(true);setPricingProgress({msg:"Starting…",pct:5});
    let updatedBom=[...bom];
    let bcCount=0;

    // Phase 1: Business Central lookup
    if(!_bcToken){
      setPricingProgress({msg:"Trying silent BC login…",pct:5});
      try{await Promise.race([acquireBcToken(false),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),5000))]);}
      catch(e){setPricingProgress({msg:"BC silent login skipped — use Connect BC button first. Using AI…",pct:5});}
    }
    if(_bcToken){
      setPricingProgress({msg:"BC: Getting company ID…",pct:5});
      try{
        const compId=await bcGetCompanyId();
        if(!compId){
          setPricingProgress({msg:"BC: Company not found (\""+BC_COMPANY_NAME+"\") — falling back to AI…",pct:10});
        }else{
          const eligible=bom.filter(r=>{const ps=r.priceSource;return ps!=="bc"&&ps!=="manual";});
          setPricingProgress({msg:`BC: Fuzzy-matching ${eligible.length} items…`,pct:7});
          const bcMap={};
          const fuzzySugg={};
          for(let i=0;i<eligible.length;i++){
            const pn=(eligible[i].partNumber||"").trim();
            if(!pn)continue;
            setPricingProgress({msg:`BC: Fuzzy lookup ${i+1}/${eligible.length}: ${pn}`,pct:7+Math.round((i/eligible.length)*30)});
            const result=await bcFuzzyLookup(pn);
            if(result.match&&result.match.unitCost!=null){
              bcMap[String(eligible[i].id)]={unitPrice:result.match.unitCost,source:"bc",bcDisplayName:result.match.displayName,bcInventory:result.match.inventory,bcNumber:result.match.number};
            } else if(result.suggestions.length>0){
              fuzzySugg[String(eligible[i].id)]=result.suggestions;
            }
          }
          bcCount=Object.keys(bcMap).length;
          updatedBom=updatedBom.map(r=>{
            const key=String(r.id);
            if(key in bcMap){return{...r,partNumber:bcMap[key].bcNumber||r.partNumber,unitPrice:bcMap[key].unitPrice,priceSource:"bc"};}
            return r;
          });
          if(Object.keys(fuzzySugg).length>0){
            setBcFuzzySuggestions(prev=>({...prev,...fuzzySugg}));
          }
          const fuzzyCount=Object.keys(fuzzySugg).length;
          setPricingProgress({msg:`BC: ${bcCount} matched${fuzzyCount>0?`, ${fuzzyCount} need review`:""} of ${eligible.length}. AI for the rest…`,pct:40});
        }
      }catch(ex){
        console.warn("BC pricing phase failed:",ex);
        setPricingProgress({msg:`BC failed: ${ex.message||ex} — falling back to AI…`,pct:10});
      }
    }

    // Phase 2: AI fallback for items not priced by BC
    const unpricedBom=updatedBom.filter(r=>r.priceSource!=="bc"&&r.priceSource!=="manual");
    if(unpricedBom.length>0){
      const BATCH=20;
      const total=Math.ceil(unpricedBom.length/BATCH);
      for(let i=0;i<unpricedBom.length;i+=BATCH){
        const batchIdx=Math.floor(i/BATCH);
        const basePct=_bcToken?45:5;
        const pctRange=_bcToken?45:90;
        setPricingProgress({msg:`AI pricing ${i+1}–${Math.min(i+BATCH,unpricedBom.length)} of ${unpricedBom.length} remaining items…`,pct:basePct+Math.round((batchIdx/total)*pctRange)});
        const batch=unpricedBom.slice(i,i+BATCH);
        try{
          const map=await estimatePrices(batch);
          updatedBom=updatedBom.map(r=>{
            const key=String(r.id);
            if(key in map&&r.priceSource!=="bc"&&r.priceSource!=="manual"){
              return{...r,unitPrice:map[key],priceSource:map[key]!=null?"ai":r.priceSource||null};
            }
            return r;
          });
        }catch(ex){setAiPricing(false);setPricingProgress({msg:`Pricing error: ${(ex.message||"failed").slice(0,60)}`,pct:0,isError:true});return;}
      }
    }

    const updated={...panel,bom:updatedBom,status:"costed"};
    onUpdate(updated);
    try{await onSaveImmediate(updated);}catch(e){}
    const aiCount=updatedBom.filter(r=>r.priceSource==="ai").length;
    const totalPriced=updatedBom.filter(r=>r.unitPrice!=null).length;
    setPricingProgress({msg:`✓ ${totalPriced} of ${bom.length} priced${bcCount>0?` (${bcCount} BC, ${aiCount} AI est.)`:""}.`,pct:100});
    setAiPricing(false);
    setTimeout(()=>setPricingProgress(null),4000);
  }
  async function validatePanel(){
    if(!_apiKey)return;
    setValidatingPanel(true);setValPct(0);valTarget.current=0;
    let current=0;
    function tick(){
      const target=valTarget.current;
      const ceiling=Math.max(target,Math.min(current+0.08,99));
      current+=(ceiling-current)*0.06+0.02;
      current=Math.min(current,99);
      setValPct(Math.round(current));
      valRaf.current=requestAnimationFrame(tick);
    }
    valRaf.current=requestAnimationFrame(tick);
    try{
      const result=await runPanelValidation(panel,pct=>{valTarget.current=pct;});
      if(valRaf.current){cancelAnimationFrame(valRaf.current);valRaf.current=null;}
      setValPct(100);
      if(result.validation||result.laborData){
        const bom=appendDefaultBomItems(panel.bom||[]);
        const updated={...panel,bom,...(result.validation?{validation:result.validation}:{}),...(result.laborData?{laborData:result.laborData}:{}),status:"validated"};
        onUpdate(updated);
        try{await onSaveImmediate(updated);}catch(e){}
      }
    }catch(e){
      console.error("Validation error:",e);
      if(valRaf.current){cancelAnimationFrame(valRaf.current);valRaf.current=null;}
    }
    setTimeout(()=>{setValidatingPanel(false);setValPct(0);},600);
  }
  function exportCSV(){
    const sourceLabel=s=>s==="bc"?"BC":s==="ai"?"AI":s==="manual"?"Manual":"";
    const header=["Qty","Part Number","Description","Manufacturer","Unit $","Cost Source","Notes"];
    const rows=[header,...(panel.bom||[]).map(r=>[

    ])];
    const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`${(panel.drawingNo||panel.name||"BOM").replace(/[^a-z0-9]/gi,"_")}_BOM.csv`;
    a.click();
  }

              style={{flexShrink:0,width:420,height:381,border:`2px dashed ${dragging?C.accent:C.border}`,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:processing||detecting?"default":"pointer",transition:"all 0.15s",background:dragging?C.accentDim+"33":"transparent",textAlign:"center",padding:12,gap:8}}>
              <input ref={fileRef} type="file" multiple accept="image/*,application/pdf" onChange={e=>{addFiles(e.target.files);e.target.value="";}} style={{display:"none"}}/>

              <div style={{fontSize:12,color:C.muted,lineHeight:1.6,whiteSpace:"pre-line"}}>{processing?processingMsg:"Drop or click\nPDF · JPG · PNG"}</div>
            </div>

      </div>

      {/* Confirm page types banner */}
      {awaitingConfirm&&!detecting&&(
        <div style={{border:"1px solid",borderRadius:8,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,animation:"pulseYellow 1.6s ease-in-out infinite"}}>

      {/* Error */}
      {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.red,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>{err}<button onClick={()=>setErr("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:15,lineHeight:1}}>✕</button></div>}

      {unifiedProgress&&(()=>{
