const {useState,useEffect,useRef,useCallback}=React;

// Smooth time-based progress bar: fills toward ~90% over estSeconds, snaps to 100% on finish
function useSmoothProgress(estSeconds=15){
  const [state,setState]=useState(null); // null | {msg,pct}
  const timer=useRef(null);
  const startTime=useRef(0);
  const est=useRef(estSeconds);
  const msgRef=useRef("");
  const baseRef=useRef(0); // base pct offset for phase transitions

  const tick=useCallback(()=>{
    const elapsed=(Date.now()-startTime.current)/1000;
    const t=Math.min(elapsed/est.current,1);
    // Steady progression — nearly linear with gentle ease near end
    const curve=Math.pow(t,0.9);
    const pct=baseRef.current+(97-baseRef.current)*curve;
    setState({msg:msgRef.current,pct:Math.min(97,Math.round(pct))});
    timer.current=requestAnimationFrame(tick);
  },[]);

  const start=useCallback((msg,seconds)=>{
    if(seconds)est.current=seconds;
    msgRef.current=msg||"";
    baseRef.current=0;
    startTime.current=Date.now();
    if(timer.current)cancelAnimationFrame(timer.current);
    setState({msg:msgRef.current,pct:0});
    timer.current=requestAnimationFrame(tick);
  },[tick]);

  // Transition to a new phase — continues smoothly from current pct
  const phase=useCallback((msg,seconds)=>{
    const elapsed=(Date.now()-startTime.current)/1000;
    const t=Math.min(elapsed/est.current,1);
    baseRef.current=Math.min(97,Math.round(baseRef.current+(97-baseRef.current)*Math.pow(t,0.9)));
    est.current=seconds||est.current;
    msgRef.current=msg||msgRef.current;
    startTime.current=Date.now();
  },[]);

  const update=useCallback((msg)=>{
    msgRef.current=msg||msgRef.current;
    // don't change pct — timer handles it
  },[]);

  // Jump to a real progress checkpoint and continue smooth animation from there
  const set=useCallback((pct,msg)=>{
    baseRef.current=Math.min(97,pct);
    startTime.current=Date.now();
    if(msg)msgRef.current=msg;
    setState({msg:msgRef.current,pct:Math.min(97,Math.round(pct))});
    if(!timer.current)timer.current=requestAnimationFrame(tick);
  },[tick]);

  const dismissTimer=useRef(null);
  const finish=useCallback((msg)=>{
    if(timer.current){cancelAnimationFrame(timer.current);timer.current=null;}
    if(dismissTimer.current)clearTimeout(dismissTimer.current);
    baseRef.current=0;
    setState(msg?{msg,pct:100}:null);
    if(msg)dismissTimer.current=setTimeout(()=>setState(null),3500);
  },[]);

  const stop=useCallback(()=>{
    if(timer.current){cancelAnimationFrame(timer.current);timer.current=null;}
    baseRef.current=0;
    setState(null);
  },[]);

  const running=useCallback(()=>!!timer.current,[]);

  useEffect(()=>()=>{if(timer.current)cancelAnimationFrame(timer.current);},[]);

  return{progress:state,start,phase,update,set,finish,stop,running};
}

// Subscribe to background task registry updates
function useBgTasks(){
  const [tasks,setTasks]=useState({..._bgTasks});
  useEffect(()=>{
    const fn=t=>setTasks(t);
    _bgListeners.add(fn);
    return()=>_bgListeners.delete(fn);
  },[]);
  return tasks;
}

// ── CUSTOMER LOGO ──
const _logoCache={};
function useCustomerLogo(name){
  const [logo,setLogo]=useState(()=>{
    if(!name)return null;
    const k=name.toLowerCase().trim();
    return k in _logoCache?_logoCache[k]:undefined;
  });
  useEffect(()=>{
    if(!name)return;
    const k=name.toLowerCase().trim();
    if(k in _logoCache){setLogo(_logoCache[k]);return;}
    setLogo(undefined);
    fetch(`https://autocomplete.clearbit.com/v1/companies/suggest?query=${encodeURIComponent(k)}`)
      .then(r=>r.json())
      .then(d=>{const url=d&&d[0]?.logo||null;_logoCache[k]=url;setLogo(url);})
      .catch(()=>{_logoCache[k]=null;setLogo(null);});
  },[name]);
  return logo||null;
}

// ── BACKGROUND TASK REGISTRY ──
let _bgTasks={};           // { [taskId]: { taskId, panelName, projectId, status, msg } }
let _bgDeleteTimers={};    // { [taskId]: timerHandle } — cancel stale timers on bgStart
let _bgListeners=new Set();
function _bgNotify(){_bgListeners.forEach(fn=>fn({..._bgTasks}));}
function bgStart(taskId,panelName,projectId,msg){
  // Cancel any pending delete timer so a re-upload within the cleanup window doesn't wipe the new task
  if(_bgDeleteTimers[taskId]){clearTimeout(_bgDeleteTimers[taskId]);delete _bgDeleteTimers[taskId];}
  _bgTasks[taskId]={taskId,panelName,projectId,status:"running",msg:msg||"Processing…",pct:0,startedAt:Date.now()};
  _bgNotify();
}
function bgSetPct(taskId,pct,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],pct,...(msg&&{msg})};
  _bgNotify();
}
function bgUpdate(taskId,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],msg};
  _bgNotify();
}
function bgDone(taskId,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],status:"done",pct:100,msg:msg||"Complete"};
  _bgNotify();
  _bgDeleteTimers[taskId]=setTimeout(()=>{delete _bgTasks[taskId];delete _bgDeleteTimers[taskId];_bgNotify();},4000);
}
function bgError(taskId,msg){
  if(!_bgTasks[taskId])return;
  _bgTasks[taskId]={..._bgTasks[taskId],status:"error",msg:msg||"Error"};
  _bgNotify();
  // No auto-dismiss — user must acknowledge errors
}
function bgDismiss(taskId){
  if(_bgDeleteTimers[taskId]){clearTimeout(_bgDeleteTimers[taskId]);delete _bgDeleteTimers[taskId];}
  delete _bgTasks[taskId];
  _bgNotify();
}

  pmMinPerUnit:60,            // Project management: 60 min/session
  buyoffMinPerUnit:60,        // Buyoff/QC: 60 min/session

// ── LABOR ESTIMATION (centralized) ──
function computeFallbackLaborHours(wireCount){
  if(!wireCount)return 0;
  return Math.round((Math.ceil(wireCount/12)+Math.ceil(wireCount/8))/2);
}

function computeLaborEstimate(panel){
  const pr=panel.pricing||{};
  const laborRate=pr.laborRate??45;
  const ld=panel.laborData||null;
  const fmt=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

  // Total override: laborHoursOverride bypasses everything
  if((pr.laborHoursOverride??null)!==null){
    const hrs=pr.laborHoursOverride;
    const cost=hrs*laborRate;
    return{lines:[{category:"Total Override",qty:hrs,unit:"hr",rate:laborRate,hours:hrs,cost}],totalCost:cost,totalHours:hrs,inputs:{},hasLayoutData:false,isLegacy:false,isOverride:true};
  }

  // Legacy fallback: no laborData
  if(!ld){
    const wireCount=panel.validation?.wireCount||0;
    if(!wireCount)return{lines:[],totalCost:0,totalHours:0,inputs:{},hasLayoutData:false,isLegacy:true,isOverride:false};
    const hrs=computeFallbackLaborHours(wireCount);
    const cost=hrs*laborRate;
    return{lines:[{category:"Wire Time (legacy)",qty:wireCount,unit:"wires",rate:laborRate,cost,hours:hrs}],totalCost:cost,totalHours:hrs,inputs:{wireCount},hasLayoutData:false,isLegacy:true,isOverride:false};
  }

  // Full labor estimation from laborData
  const counts=ld.counts||{};
  const overrides=ld.overrides||{};
  const defaults=ld.defaults||{};
  const hasLayout=ld.hasLayoutData||false;

  // Helper: override > auto > default
  const val=(field,def)=>overrides[field]??counts[field]??defaults[field]??def;

  const wireCount=val("wireCount",0);
  const wireTerminations=val("wireTerminations",0);
  const doorDevices=val("doorDevices",0);
  const allDevices=val("allDevices",0);
  const panelHoles=val("panelHoles",0);
  const ductDinFeet=val("ductDinFeet",0);
  const sideTopSmallCount=val("sideTopSmallCount",0);
  const sideTopLargeCount=val("sideTopLargeCount",0);
  const squareCutoutCount=val("squareCutoutCount",0);
  const pmUnits=val("pmUnits",2);
  const buyoffUnits=val("buyoffUnits",2);
  const cratingUnits=val("cratingUnits",1);
  const labelHours=val("labelHours",4);

  const lines=[];
  const addLine=(category,qty,minPerUnit,unit,field)=>{
    const hours=qty*minPerUnit/60;
    const cost=hours*laborRate;
    lines.push({category,qty,unit,minPerUnit,hours,cost,field});
  };

  addLine("Wire Time",wireCount,LABOR_RATES.wireMinPerPoint,"wires","wireCount");
  addLine("Door Wiring",doorDevices,LABOR_RATES.doorDeviceMinPerDevice,"devices","doorDevices");
  addLine("Device Mounting",allDevices,LABOR_RATES.mountingMinPerDevice,"devices","allDevices");
  addLine("Duct & DIN Rail",ductDinFeet,LABOR_RATES.ductDinMinPerFoot,"feet","ductDinFeet");
  addLine("Panel Holes",panelHoles,LABOR_RATES.holesMinPerHole,"holes","panelHoles");
  // Side/top-mounted devices
  if(sideTopSmallCount>0)addLine("Side Fans",sideTopSmallCount,120,"devices","sideTopSmallCount");
  if(sideTopLargeCount>0)addLine("HVAC/Fans",sideTopLargeCount,240,"devices","sideTopLargeCount");
  if(squareCutoutCount>0)addLine("Square Cutouts",squareCutoutCount,LABOR_RATES.squareCutoutMinPerCut,"cutouts","squareCutoutCount");
  // Labels: stored as hours directly
  lines.push({category:"Labels",qty:labelHours,unit:"hours",minPerUnit:60,hours:labelHours,cost:labelHours*laborRate,field:"labelHours"});
  addLine("Project Mgmt",pmUnits,LABOR_RATES.pmMinPerUnit,"sessions","pmUnits");

  addLine("Crating Time",cratingUnits,LABOR_RATES.cratingMinPerUnit,"crates","cratingUnits");

  const totalHours=lines.reduce((s,l)=>s+l.hours,0);
  const totalCost=totalHours*laborRate;

  return{
    lines,totalCost,totalHours,
    inputs:{wireCount,wireTerminations,doorDevices,allDevices,panelHoles,ductDinFeet,sideTopSmallCount,sideTopLargeCount,squareCutoutCount,pmUnits,buyoffUnits,cratingUnits,labelHours},
    hasLayoutData:hasLayout,
    isLegacy:false,
    isOverride:false
  };
}

// ── LABOR BOM ROWS (auto-managed, always first 3 rows) ──
const LABOR_BOM_GROUPS=[
  {partNumber:"1012",description:"CUT",   cats:["Panel Holes","Side Devices","HVAC/Fans"]},
  {partNumber:"1013",description:"LAYOUT",cats:["Device Mounting","Duct & DIN Rail","Labels"]},
  {partNumber:"1014",description:"WIRE",  cats:["Wire Time","Door Wiring"]},
];
function buildLaborBomRows(panel){
  const est=computeLaborEstimate(panel);
  if(!est.lines.length)return[];
  return LABOR_BOM_GROUPS.map(g=>{
    const hrs=est.lines.filter(l=>g.cats.includes(l.category)).reduce((s,l)=>s+l.hours,0);
    return{id:`labor-${g.partNumber}`,isLaborRow:true,partNumber:g.partNumber,description:g.description,qty:Math.ceil(hrs)||0,unitPrice:null,priceSource:"bc",manufacturer:"",notes:""};
  });
}
function syncLaborBomRows(panel){
  const laborRows=buildLaborBomRows(panel);
  if(!laborRows.length)return panel;
  const nonLabor=(panel.bom||[]).filter(r=>!r.isLaborRow);
  return{...panel,bom:[...laborRows,...nonLabor]};
}

// Load MSAL on demand — not at page load (avoids conflict with Firebase Microsoft auth)
function loadMsalScript(){
  return new Promise((res,rej)=>{
    if(window.msal){res();return;}
    const s=document.createElement("script");
    s.src="https://alcdn.msauth.net/browser/2.28.1/js/msal-browser.min.js";
    s.onload=()=>res();
    s.onerror=()=>rej(new Error("Failed to load MSAL"));
    document.head.appendChild(s);
  });
}

async function ensureMsal(){
  if(_msalReady)return _msalInstance;
  await loadMsalScript();
  try{
    _msalInstance=new msal.PublicClientApplication({
      auth:{clientId:BC_CLIENT_ID,authority:`https://login.microsoftonline.com/${BC_TENANT}`,redirectUri:window.location.origin},
      cache:{cacheLocation:"localStorage"}
    });
    await _msalInstance.initialize();
    _msalReady=true;
    return _msalInstance;
  }catch(e){console.warn("MSAL init failed:",e);return null;}
}

async function acquireBcToken(interactive=true){
  const inst=await ensureMsal();
  if(!inst)return null;
  const scopes=["https://api.businesscentral.dynamics.com/.default"];
  // Try silent with cached accounts first
  try{
    const accounts=inst.getAllAccounts();
    if(accounts.length>0){
      const resp=await inst.acquireTokenSilent({scopes,account:accounts[0]});
      _bcToken=resp.accessToken;
      return _bcToken;
    }
  }catch(e){console.log("Silent BC token failed, trying ssoSilent…");}
  // Try SSO silent — works if the user already has an active Microsoft browser session
  try{
    const hint=fbAuth.currentUser?.email;
    const resp=await inst.ssoSilent({scopes,...(hint?{loginHint:hint}:{})});
    _bcToken=resp.accessToken;
    return _bcToken;
  }catch(e){}
  if(!interactive)return null;
  try{
    const resp=await inst.acquireTokenPopup({scopes});
    _bcToken=resp.accessToken;
    return _bcToken;
  }catch(e){console.warn("BC token acquisition failed:",e);return null;}
}

function _altPath(uid){return (_appCtx.configPath||`users/${uid}/config`)+"/alternates";}
async function loadAlternates(uid){
  if(_altCache)return _altCache;
  try{const d=await fbDb.doc(_altPath(uid)).get();_altCache=d.exists?(d.data().alternates||[]):[];}
  catch(e){_altCache=[];}
  return _altCache;
}
async function saveAlternateEntry(uid,originalPN,replacement,autoReplace=false){
  const alts=await loadAlternates(uid);
  const idx=alts.findIndex(a=>a.originalPN===originalPN);
  if(idx>=0){alts[idx]={...alts[idx],replacement,autoReplace:autoReplace||alts[idx].autoReplace,updatedAt:Date.now()};}
  else{alts.push({originalPN,replacement,autoReplace,createdAt:Date.now()});}
  _altCache=[...alts];
  await fbDb.doc(_altPath(uid)).set({alternates:_altCache});
  return _altCache;
}

  _altCache=[...alts];

// Heuristic: same chars different formatting = format; very different = extraction
function guessCorrection(origPN,newPN){
  const norm=s=>s.replace(/[-\s./\\()]/g,'').toUpperCase();
  const a=norm(origPN),b=norm(newPN);
  if(a===b)return'format';
  // Count overlapping chars
  let matches=0;
  const shorter=a.length<=b.length?a:b;
  const longer=a.length>b.length?a:b;
  for(const c of shorter){if(longer.includes(c))matches++;}
  const ratio=matches/Math.max(a.length,b.length,1);
  return ratio>=0.55?'format':'extraction';
}

async function logPanelToCPD(uid,panel,categorizedBom,metadata=null){
  const cpd=await loadCPD(uid);
  const plcProc=categorizedBom.filter(r=>r.cpdCategory==='PLC Processor').length;
  const plcIn=categorizedBom.filter(r=>r.cpdCategory==='PLC I/O Module'&&/(input|DI|AI)/i.test(r.description||'')).length;
  const plcOut=categorizedBom.filter(r=>r.cpdCategory==='PLC I/O Module'&&/(output|DO|AO)/i.test(r.description||'')).length;
  const motors=categorizedBom.filter(r=>['VFD','Contactor'].includes(r.cpdCategory)).length;
  const existing=cpd.panels||[];
  const prev=existing.find(p=>p.panelId===panel.id)||{};
  const spec={
    ...prev,
    panelId:panel.id,panelName:panel.name||panel.drawingNo||'Panel',
    projectId:panel.projectId||'',
    drawingNo:panel.drawingNo||'',
    specs:{plcProcessors:plcProc,plcInputs:plcIn,plcOutputs:plcOut,motorCount:motors,
      itemCount:categorizedBom.filter(r=>!r.isLaborRow).length},
    bomSummary:categorizedBom.filter(r=>!r.isLaborRow).map(r=>({category:r.cpdCategory||'Other',partNumber:r.partNumber,description:r.description,qty:r.qty||1})),
    ...(metadata?{
      panelType:metadata.panelType||prev.panelType||'',
      controlledEquipment:metadata.controlledEquipment||prev.controlledEquipment||'',
      voltages:metadata.voltages||prev.voltages||{},
      plcBrand:metadata.plcBrand||prev.plcBrand||'',
      enclosureType:metadata.enclosureType||prev.enclosureType||'',
      additionalNotes:metadata.additionalNotes||prev.additionalNotes||'',
      ...(metadata.inputCount>0?{specs:{...spec.specs,plcInputs:metadata.inputCount}}:{}),
      ...(metadata.outputCount>0?{specs:{...spec.specs,plcOutputs:metadata.outputCount}}:{}),
      ...(metadata.motorCount>0?{specs:{...spec.specs,motorCount:metadata.motorCount}}:{})
    }:{}),
    scannedAt:Date.now()
  };
  const panels=[...(cpd.panels||[]).filter(p=>p.panelId!==panel.id),spec];
  // Merge new products
  const existingProds=cpd.products||[];
  const newProds=[...existingProds];
  categorizedBom.filter(r=>!r.isLaborRow&&r.partNumber).forEach(r=>{
    const pn=(r.partNumber||'').trim();
    if(!pn)return;
    const idx=newProds.findIndex(p=>p.partNumber===pn);
    if(idx>=0){newProds[idx]={...newProds[idx],seenCount:(newProds[idx].seenCount||1)+1,lastSeen:Date.now()};}
    else{newProds.push({partNumber:pn,description:r.description||'',manufacturer:r.manufacturer||'',category:r.cpdCategory||'Other',approvals:{ul:'',ce:'',csa:''},seenCount:1,lastSeen:Date.now()});}
  });
  await saveCPD(uid,{panels,products:newProds});
}
// Background product enrichment — looks up specs for parts without details
// Throttled: max 4 parts per session to avoid excessive API usage
let _enrichSessionCount=0;
async function enrichProductDetails(uid,partNumber,description,category){
  if(!_apiKey||_enrichSessionCount>=4)return;
  _enrichSessionCount++;
  try{
    const resp=await apiCall({
      max_tokens:300,
      messages:[{role:"user",content:`You are an industrial parts expert. For this part: "${partNumber}" (${description||'no description'}, category: ${category||'unknown'}), provide technical specifications.
Return ONLY valid JSON (no markdown):
{"voltageRating":"","currentRating":"","brand":"","series":"","ul":"yes/no/unknown","ce":"yes/no/unknown","csa":"yes/no/unknown","shortSpec":"one sentence description of what this part is and its key specs"}`}]
    });
    const raw=resp.content[0].text.replace(/```json|```/g,'').trim();
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m)return;
    const specs=JSON.parse(m[0]);
    const cpd=await loadCPD(uid);
    const products=(cpd.products||[]).map(p=>p.partNumber===partNumber?{...p,
      manufacturer:specs.brand||p.manufacturer,
      approvals:{ul:specs.ul||'',ce:specs.ce||'',csa:specs.csa||''},
      voltageRating:specs.voltageRating||'',
      currentRating:specs.currentRating||'',
      shortSpec:specs.shortSpec||'',
      enriched:true,enrichedAt:Date.now()
    }:p);
    await saveCPD(uid,{products});
  }catch(e){}
}

// Keyword-based part categorizer
function categorizePart(partNumber,description){
  const t=((description||'')+(partNumber||'')).toLowerCase();
  if(/controllogix|compactlogix|micrologix|1756-l|1769-l|s7-\d{3}|plc.*cpu|cpu.*plc|processor.*module/.test(t))return'PLC Processor';
  if(/1756-[io]|1769-[io]|input.*module|output.*module|analog.*input|analog.*output|digital.*input|digital.*output|ai\d|ao\d|di\d|do\d|ib16|ob16|ia8|oa8/.test(t))return'PLC I/O Module';
  if(/\bvfd\b|variable.freq|powerflex|altivar|optidrive|micromaster|g120|g110|sv0/.test(t))return'VFD';
  if(/\bcontactor\b|iec.*motor|definite.purpose|dp.?contactor|100-[ccd]/.test(t))return'Contactor';
  if(/\brelay\b|ice\d|700-|750-|intermediate.relay|plug.in.relay|cr\d\d/.test(t))return'Relay';
  if(/mccb|molded.case|main.*breaker|hfd|hja|hjd|lal|main.*disconnect/.test(t))return'MCCB';
  if(/\bbreaker\b|ul.?489|qo\d|qob|hom|faz|c60n|miniature.circuit/.test(t))return'Circuit Breaker';
  if(/\bduct\b|wireway|panduit.*duct|wiring.duct|trunking/.test(t))return'Wire Duct';
  if(/din.?rail|ts.?35|top.hat|omega.rail|g-rail/.test(t))return'DIN Rail';
  if(/terminal|ptfix|sak\d|ut\d|pt \d|fence.*term|din.*term|terminal.*block/.test(t))return'Terminal Block';
  if(/enclosure.*heat|cabinet.*heat|strip.heat|ptc.heat|\bheater\b/.test(t))return'Heater';
  if(/air.cond|vortex|cooler|thermal.manag|cabinet.*cool/.test(t))return'Air Conditioner';
  if(/\bhorn\b|\bbeacon\b|\bsiren\b|\bstrobe\b|signal.tower|stack.?light|xvbc|k80l/.test(t))return'Horn/Beacon';
  if(/enclosure|nema.*\d|hoffman|rittal|junction.box|wireway.encl/.test(t))return'Enclosure';
  if(/\bhmi\b|panelview|pro-face|touch.*screen|operator.*interface|weintek/.test(t))return'HMI';
  if(/pilot.light|push.?button|selector|door.op|xb\d|800f|800h|illuminated/.test(t))return'Pilot Light/Operator';
  return'Other';
}

async function apiCall(body){
  if(!_apiKey)throw new Error("API key not set. Open Settings and add your Anthropic key.");
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-6",...body})
  });
  const d=await r.json();
  if(!r.ok){console.error("API ERROR:",r.status,d.error?.type,d.error?.message);throw new Error(d.error?.message||"API error");}
  return d.content?.[0]?.text||"";
}

async function parallelMap(items,fn,concurrency=4){
  const results=[];
  let idx=0;
  const workers=Array.from({length:Math.min(concurrency,items.length)},async()=>{
    while(idx<items.length){
      const i=idx++;
      results[i]=await fn(items[i],i);
    }
  });
  await Promise.all(workers);
  return results;
}

async function bcCopyProjectFromTemplate(fromProjectNumber, toProjectNumber){
  // BC v2.0 REST API does not expose projectTasks — use OData via published web services instead.
  // Requires a "JobTaskLines" page (Object ID 1002) published in BC Web Services.
  const allPages=await bcDiscoverODataPages();
  console.log("bcCopy: available OData pages:",allPages.join(", "));

  // Find a task page — common names: JobTaskLines, Job_Task_Lines, ProjectTaskLines
  const taskPage=allPages.find(n=>/job.?task|project.?task/i.test(n))||null;
  if(!taskPage){
    console.warn("bcCopy: No job task OData page found. Publish page 1002 (Job Task Lines) as a BC web service named 'JobTaskLines'.");
    return 0;
  }
  console.log(`bcCopy: using OData page "${taskPage}" for tasks`);

  // Read tasks from template via OData — BC OData field names use underscores
  const readUrl=`${BC_ODATA_BASE}/${taskPage}?$filter=Job_No eq '${encodeURIComponent(fromProjectNumber)}'`;
  const tr=await fetch(readUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(!tr.ok){console.warn(`bcCopy: task read failed (${tr.status})`);return 0;}
  const tasks=(await tr.json()).value||[];
  console.log(`bcCopy: ${tasks.length} tasks to copy from ${fromProjectNumber} → ${toProjectNumber}`);

  // Write each task to the new project via OData POST
  let copied=0;
  for(const task of tasks){
    const body={
      Job_No:toProjectNumber,
      Job_Task_No:task.Job_Task_No||task.jobTaskNumber||"",
      Description:task.Description||task.description||"",
      Job_Task_Type:task.Job_Task_Type||task.jobTaskType||"Posting"
    };
    if(task.Totaling||task.totaling)body.Totaling=task.Totaling||task.totaling;
    if(task.New_Page!=null)body.New_Page=task.New_Page;
    if(task.Indentation!=null)body.Indentation=task.Indentation||task.indentation||0;
    const r=await fetch(`${BC_ODATA_BASE}/${taskPage}`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(r.ok){copied++;console.log(`bcCopy: task ${body.Job_Task_No} copied`);}
    else console.warn(`bcCopy: task ${body.Job_Task_No} failed (${r.status}):`,await r.text());
  }
  return copied;
}

async function bcCreateProject(displayName, customerNumber){
  if(!_bcToken)throw new Error("Not connected to Business Central");
  if(!customerNumber)throw new Error("A customer must be selected");
  const compId=await bcGetCompanyId();
  if(!compId)throw new Error("Could not resolve Business Central company");
  let projectId=null;
  try{
    // Step 1: Create project (name only)
    const r=await fetch(`${BC_API_BASE}/companies(${compId})/projects`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify({displayName})
    });
    if(!r.ok){const txt=await r.text();throw new Error(`BC project creation failed (${r.status}): ${txt}`);}
    const d=await r.json();
    projectId=d.id;

    // Step 2: PATCH Bill_to_Customer_No via OData FIRST (BC requires customer before task lines)
    await bcPatchJobOData(d.number,{Bill_to_Customer_No:customerNumber});

    // Step 3: Copy project tasks from template via OData (non-fatal if BC web service not published)
    try{await bcCopyProjectFromTemplate(BC_PROJECT_TEMPLATE, d.number);}
    catch(e){console.warn("bcCreateProject: task copy skipped:",e.message);}
    return{id:d.id,number:d.number,displayName:d.displayName,customerNumber:customerNumber,customerName:null};
  }catch(e){
    // Rollback: delete the BC project if it was created
    if(projectId){
      try{
        const g=await fetch(`${BC_API_BASE}/companies(${compId})/projects(${projectId})`,{headers:{"Authorization":`Bearer ${_bcToken}`}});
        if(g.ok){
          const etag=g.headers.get("ETag");
          await fetch(`${BC_API_BASE}/companies(${compId})/projects(${projectId})`,{method:"DELETE",headers:{"Authorization":`Bearer ${_bcToken}`,"If-Match":etag||"*"}});
          console.log("bcCreateProject: rolled back BC project",projectId);
        }
      }catch(re){console.warn("bcCreateProject: rollback failed",re);}
    }
    throw e;
  }
}

function bcFilterCustomers(allCustomers,query){

async function bcUpdateProject(bcProjectId, displayName){
  if(!bcProjectId)return false;
  if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
  if(!_bcToken){_bcToken=await acquireBcToken(true)||null;}
  if(!_bcToken)return false;
  const compId=await bcGetCompanyId();
  if(!compId)return false;
  try{
    const g=await fetch(`${BC_API_BASE}/companies(${compId})/projects(${bcProjectId})`,{
      headers:{"Authorization":`Bearer ${_bcToken}`}
    });
    if(g.status===401){_bcToken=await acquireBcToken(true)||null;if(!_bcToken)return false;}
    if(!g.ok){console.warn("bcUpdateProject GET failed:",g.status);return false;}
    const etag=g.headers.get("ETag");
    const r=await fetch(`${BC_API_BASE}/companies(${compId})/projects(${bcProjectId})`,{
      method:"PATCH",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json","If-Match":etag||"*"},
      body:JSON.stringify({displayName})
    });
    if(!r.ok){console.warn("bcUpdateProject PATCH failed:",r.status,await r.text());return false;}
    return true;
  }catch(e){console.warn("bcUpdateProject error:",e);return false;}
}

async function bcLookupItem(partNumber){
  if(!_bcToken||!partNumber||!partNumber.trim())return null;
  const compId=await bcGetCompanyId();
  if(!compId)return null;
  const pn=partNumber.trim().replace(/'/g,"''");
  try{
    const r=await fetch(`${BC_API_BASE}/companies(${compId})/items?$filter=number eq '${pn}'`,{
      headers:{"Authorization":`Bearer ${_bcToken}`}
    });
    if(!r.ok){console.warn("BC item lookup failed:",r.status);return null;}
    const d=await r.json();
    const item=(d.value||[])[0];
    if(!item)return null;
    return{unitCost:item.unitCost||null,unitPrice:item.unitPrice||null,displayName:item.displayName||"",inventory:item.inventory||0,number:item.number||""};
  }catch(e){console.warn("BC item lookup error:",e);return null;}
}

async function bcLookupItems(bomItems){
  const result={};
  for(const row of bomItems){
    const pn=(row.partNumber||"").trim();
    if(!pn)continue;
    const item=await bcLookupItem(pn);
    if(item&&item.unitCost!=null){
      result[String(row.id)]={unitPrice:item.unitCost,source:"bc",bcDisplayName:item.displayName,bcInventory:item.inventory};
    }
  }
  return result;
}

async function _bcFetchItems(compId,filter,top,skip){
  const url=`${BC_API_BASE}/companies(${compId})/items?$filter=${filter}&$top=${top}&$skip=${skip}&$orderby=number`;
  console.log("bcSearchItems URL:",url);
  const r=await fetch(url,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(r.status===401){_bcToken=null;return null;}
  if(!r.ok){console.warn("bcSearchItems failed:",r.status,await r.text());return null;}
  const d=await r.json();
  return(d.value||[]).map(item=>({
    number:item.number||"",displayName:item.displayName||"",
    unitCost:item.unitCost??null,unitPrice:item.unitPrice??null,
    inventory:item.inventory||0,lastModifiedDateTime:item.lastModifiedDateTime||""
  }));
}
async function bcSearchItems(query,{field="both",top=25,skip=0}={}){
  if(!_bcToken||!query||query.trim().length<3)return{items:[],hasMore:false};
  const compId=await bcGetCompanyId();
  if(!compId)return{items:[],hasMore:false};
  const q=query.trim().replace(/'/g,"''");
  try{
    if(field==="both"){
      // Two separate calls — BC may not support 'or' with contains()
      const [byNum,byName]=await Promise.all([
        _bcFetchItems(compId,`contains(number,'${q}')`,top+1,skip),
        _bcFetchItems(compId,`contains(displayName,'${q}')`,top+1,skip)
      ]);
      const seen=new Set();
      const merged=[];
      for(const item of[...(byNum||[]),...(byName||[])]){
        if(!seen.has(item.number)){seen.add(item.number);merged.push(item);}
      }
      merged.sort((a,b)=>a.number.localeCompare(b.number));
      const hasMore=merged.length>top;
      console.log("bcSearchItems results:",Math.min(merged.length,top),"items (both fields)");
      return{items:merged.slice(0,top),hasMore};
    }
    const filter=field==="number"?`contains(number,'${q}')`:`contains(displayName,'${q}')`;
    const all=await _bcFetchItems(compId,filter,top+1,skip);
    if(!all)return{items:[],hasMore:false};
    const hasMore=all.length>top;
    console.log("bcSearchItems results:",Math.min(all.length,top),"items");
    return{items:all.slice(0,top),hasMore};
  }catch(e){console.warn("bcSearchItems error:",e);return{items:[],hasMore:false};}
}

async function bcFuzzyLookup(partNumber){
  if(!_bcToken||!partNumber||!partNumber.trim())return{match:null,type:null,suggestions:[]};
  const pn=partNumber.trim();
  // 1. Exact match
  const exact=await bcLookupItem(pn);
  if(exact&&exact.unitCost!=null)return{match:exact,type:"exact",suggestions:[]};
  // 2. Stripped search — remove dashes, spaces, special chars
  const stripped=pn.replace(/[-\s\/\\.#_]+/g,"");
  if(stripped.length>=3){
    const r2=await bcSearchItems(stripped,{field:"number",top:10});
    if(r2.items.length===1)return{match:r2.items[0],type:"fuzzy",suggestions:[]};
    if(r2.items.length>1)return{match:null,type:"fuzzy",suggestions:r2.items.slice(0,8)};
  }
  // 3. Original as contains search
  if(pn.length>=3){
    const r3=await bcSearchItems(pn,{field:"number",top:10});
    if(r3.items.length===1)return{match:r3.items[0],type:"fuzzy",suggestions:[]};
    if(r3.items.length>1)return{match:null,type:"fuzzy",suggestions:r3.items.slice(0,8)};
  }
  // 4. Core substring — strip common prefixes/suffixes
  const core=pn.replace(/^(mtx|mat|mx|ms)[-\s]*/i,"").replace(/[-\s]*(rev[a-z0-9]*|v\d+)$/i,"").trim();
  if(core.length>=3&&core!==pn&&core!==stripped){
    const r4=await bcSearchItems(core,{field:"number",top:10});
    if(r4.items.length===1)return{match:r4.items[0],type:"fuzzy",suggestions:[]};
    if(r4.items.length>1)return{match:null,type:"fuzzy",suggestions:r4.items.slice(0,8)};
  }
  return{match:null,type:null,suggestions:[]};
}

async function bcCreateItem({number,displayName,unitCost,itemCategoryCode,baseUnitOfMeasureCode,vendorNo}){
  if(!_bcToken)throw new Error("Not connected to Business Central");
  const compId=await bcGetCompanyId();
  if(!compId)throw new Error("Could not resolve BC company");
  const body={};
  if(number)body.number=number;
  if(displayName)body.displayName=displayName;
  if(unitCost!=null&&unitCost!=="")body.unitCost=parseFloat(unitCost);
  if(itemCategoryCode)body.itemCategoryCode=itemCategoryCode;
  if(baseUnitOfMeasureCode)body.baseUnitOfMeasureCode=baseUnitOfMeasureCode;
  try{
    const r=await fetch(`${BC_API_BASE}/companies(${compId})/items`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(r.status===401){_bcToken=null;throw new Error("BC session expired — please reconnect");}
    if(r.status===409||r.status===400){
      const txt=await r.text();
      if(/already exists|duplicate/i.test(txt))throw new Error(`Item "${number}" already exists in Business Central`);
      throw new Error(txt||`BC returned status ${r.status}`);
    }
    if(!r.ok){const txt=await r.text();throw new Error(txt||`BC returned status ${r.status}`);}
    const item=await r.json();
    // PATCH extra fields via OData ItemCard (v2.0 API doesn't expose these)
    if(item.number&&vendorNo){
      try{await bcPatchItemOData(item.number,{Vendor_No:vendorNo});}
      catch(ve){console.warn("OData PATCH failed:",ve);}
    }
    return{number:item.number||"",displayName:item.displayName||"",unitCost:item.unitCost??null,unitPrice:item.unitPrice??null,inventory:item.inventory||0,lastModifiedDateTime:item.lastModifiedDateTime||""};
  }catch(e){
    if(e.message.includes("BC session expired")||e.message.includes("already exists"))throw e;
    console.warn("bcCreateItem error:",e);
    throw new Error("Failed to create item: "+e.message);
  }
}

async function bcPatchItemOData(itemNo,fields){
  if(!_bcToken||!itemNo||!fields||!Object.keys(fields).length)return;
  // 1. GET the item from OData ItemCard to obtain ETag
  const filterUrl=`${BC_ODATA_BASE}/ItemCard?$filter=No eq '${encodeURIComponent(itemNo)}'`;
  const gr=await fetch(filterUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(!gr.ok){console.warn("OData ItemCard GET failed:",gr.status);return;}
  const gd=await gr.json();
  const rec=(gd.value||[])[0];
  if(!rec){console.warn("Item not found via OData:",itemNo);return;}
  const etag=rec["@odata.etag"];
  // 2. PATCH fields using the ETag
  const patchUrl=`${BC_ODATA_BASE}/ItemCard('${encodeURIComponent(itemNo)}')`;
  const pr=await fetch(patchUrl,{
    method:"PATCH",
    headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json","If-Match":etag||"*"},
    body:JSON.stringify(fields)
  });
  if(!pr.ok){const txt=await pr.text();console.warn("OData ItemCard PATCH failed:",pr.status,txt);}
  else{console.log("OData PATCH on item",itemNo,"→",JSON.stringify(fields));}
}

async function bcDiscoverODataPages(){
  if(!_bcToken)return[];
  // The service list is at the ODataV4 root, not the company-level URL
  const rootUrl=`https://api.businesscentral.dynamics.com/v2.0/${BC_TENANT}/${BC_ENV}/ODataV4/`;
  try{
    const r=await fetch(rootUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
    if(!r.ok){console.warn("bcDiscoverODataPages failed:",r.status);return[];}
    const txt=await r.text();
    try{
      const d=JSON.parse(txt);
      const names=(d.value||[]).map(e=>e.name||e.url||"").filter(Boolean);
      return names;
    }catch(pe){console.warn("bcDiscoverODataPages JSON parse error:",pe);return[];}
  }catch(e){console.warn("bcDiscoverODataPages error:",e);return[];}
}

async function bcPatchJobOData(jobNo,fields){
  if(!_bcToken||!jobNo||!fields||!Object.keys(fields).length)return;
  // Discover published OData pages and find a project-related one
  const allPages=await bcDiscoverODataPages();
  // Match project card/header pages only — exclude planning lines, tasks, etc.
  const projectPage=allPages.find(n=>/^project(card)?$/i.test(n))||null;
  if(!projectPage){
    console.warn("BC OData published pages available:",allPages.join(", "));
    throw new Error(`No Project Card OData page found in Business Central. Please publish the Project Card page as a web service in BC (Settings → Web Services → New → Object Type: Page, Object ID: 88, Service Name: ProjectCard).`);
  }
  const pages=[projectPage];
  for(const page of pages){
    const filterUrl=`${BC_ODATA_BASE}/${page}?$filter=No eq '${encodeURIComponent(jobNo)}'`;
    const gr=await fetch(filterUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
    if(gr.status===404)continue;
    if(!gr.ok){const txt=await gr.text();throw new Error(`OData ${page} GET failed (${gr.status}): ${txt}`);}
    const gd=await gr.json();
    const rec=(gd.value||[])[0];
    if(!rec)throw new Error(`Project '${jobNo}' not found in OData page '${page}'`);
    const etag=rec["@odata.etag"];
    const patchUrl=`${BC_ODATA_BASE}/${page}('${encodeURIComponent(jobNo)}')`;
    const pr=await fetch(patchUrl,{
      method:"PATCH",
      headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json","If-Match":etag||"*"},
      body:JSON.stringify(fields)
    });
    if(!pr.ok){const txt=await pr.text();throw new Error(`OData ${page} PATCH failed (${pr.status}): ${txt}`);}
    console.log("OData PATCH on project",jobNo,"via",page,"→",JSON.stringify(fields));
    return;
  }
  throw new Error("Could not reach ProjectCard or Project OData page in Business Central.");
}

async function bcClearAssemblyBOMLines(parentItemNo,bomPage){
  const getUrl=`${BC_ODATA_BASE}/${bomPage}?$filter=Parent_Item_No eq '${encodeURIComponent(parentItemNo)}'`;
  const gr=await fetch(getUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(!gr.ok)throw new Error(`Failed to read existing BOM lines: ${gr.status}`);
  const lines=(await gr.json()).value||[];
  let deleted=0;const errors=[];
  for(const line of lines){
    const lineNo=line.Line_No;
    const etag=line["@odata.etag"];
    const delUrl=`${BC_ODATA_BASE}/${bomPage}(Parent_Item_No='${encodeURIComponent(parentItemNo)}',Line_No=${lineNo})`;
    const dr=await fetch(delUrl,{method:"DELETE",headers:{"Authorization":`Bearer ${_bcToken}`,"If-Match":etag||"*"}});
    if(dr.ok||dr.status===204){deleted++;}
    else{const t=await dr.text();errors.push(`Line ${lineNo}: ${t.slice(0,80)}`);}
  }
  return{deleted,total:lines.length,errors};
}

async function bcReplaceAssemblyBOMLines(parentItemNo,bomRows,onProgress){
  const result={deleted:0,added:0,skipped:0,errors:[],warning:""};
  const allPages=await bcDiscoverODataPages();
  const bomPage=allPages.find(n=>/assembly.*bom|bom.*comp/i.test(n))||null;
  if(!bomPage){
    result.warning="No Assembly BOM OData page found. In BC, go to Web Services → New → Object Type: Page, Object ID: 36, Service Name: AssemblyBOM, Published: true.";
    return result;
  }
  if(onProgress)onProgress(-1,bomRows.length,"Clearing existing BOM lines…");
  try{
    const clear=await bcClearAssemblyBOMLines(parentItemNo,bomPage);
    result.deleted=clear.deleted;
    if(clear.errors.length)result.errors.push(...clear.errors.map(e=>"[clear] "+e));
  }catch(ce){result.errors.push("[clear] "+ce.message);}
  const addResult=await bcAddAssemblyBOMLines(parentItemNo,bomRows,onProgress,bomPage);
  result.added=addResult.added;
  result.skipped=addResult.skipped;
  result.errors.push(...addResult.errors);
  result.warning=addResult.warning;
  return result;
}

async function bcAddAssemblyBOMLines(parentItemNo,bomRows,onProgress,_bomPage){
  const result={added:0,skipped:0,errors:[],warning:""};
  if(!bomRows||!bomRows.length)return result;
  let bomPage=_bomPage||null;
  if(!bomPage){
    const allPages=await bcDiscoverODataPages();
    bomPage=allPages.find(n=>/assembly.*bom|bom.*comp/i.test(n))||null;
  }
  if(!bomPage){
    result.warning="No Assembly BOM OData page found. In BC, go to Web Services → New → Object Type: Page, Object ID: 36, Service Name: AssemblyBOM, Published: true.";
    return result;
  }
  for(let i=0;i<bomRows.length;i++){
    const row=bomRows[i];
    const pn=(row.partNumber||"").trim();
    if(!pn){result.skipped++;continue;}
    if(onProgress)onProgress(i,bomRows.length,pn);
    try{
      const r=await fetch(`${BC_ODATA_BASE}/${bomPage}`,{
        method:"POST",
        headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
        body:JSON.stringify({Parent_Item_No:parentItemNo,Type:"Item",No:pn,Quantity_per:+(row.qty||1)})
      });
      if(r.ok){result.added++;}
      else{const t=await r.text();result.errors.push(`${pn}: ${t.slice(0,120)}`);result.skipped++;}
    }catch(e){result.errors.push(`${pn}: ${e.message}`);result.skipped++;}
  }
  return result;
}

// ── IMAGE RESIZE ──
function resizeImage(dataUrl,maxW=2800){
  return new Promise((res,rej)=>{
    if(!dataUrl){return rej(new Error("resizeImage: empty dataUrl"));}
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.95));c.width=0;c.height=0;
    };
    img.onerror=()=>rej(new Error("resizeImage: failed to load image"));
    img.src=dataUrl;
  });
}
// Resize specifically for AI API calls — Claude internally caps at 1568px, so sending larger is wasted bandwidth
function resizeForAnalysis(dataUrl,maxW=1568){return resizeImage(dataUrl,maxW);}

async function saveProject(uid,project){
  const path=_appCtx.projectsPath||`users/${uid}/projects`;
  const col=fbDb.collection(path);
  const ref=project.id?col.doc(project.id):col.doc();
  const data={...project,id:ref.id,updatedAt:Date.now(),...(!project.id&&{createdBy:uid})};
  // Don't store page images in Firestore — strip dataUrls from panels
  const stripped={...data,panels:(data.panels||[]).map(panel=>({...panel,pages:(panel.pages||[]).map(p=>{const {dataUrl,...rest}=p;return rest;})}))};
  // Firestore rejects undefined values — round-trip through JSON to remove them
  const toSave=JSON.parse(JSON.stringify(stripped));
  await ref.set(toSave);
  return data; // return with dataUrls intact for in-memory use
}

async function ensureDataUrl(page){
  if(page.dataUrl)return page;
  if(!page.storageUrl)return page;
  try{
    // Get a fresh download URL from Firebase Storage SDK
    let url=page.storageUrl;
    const pathMatch=page.storageUrl.match(/\/o\/([^?]+)/);
    if(pathMatch){
      const storagePath=decodeURIComponent(pathMatch[1]);
      url=await fbStorage.ref(storagePath).getDownloadURL();
    }
    // Load via <img> + canvas to avoid CORS fetch issues
    const dataUrl=await new Promise((resolve,reject)=>{
      const img=new Image();
      img.crossOrigin="anonymous";
      img.onload=()=>{
        const c=document.createElement("canvas");
        c.width=img.naturalWidth;c.height=img.naturalHeight;
        c.getContext("2d").drawImage(img,0,0);
        resolve(c.toDataURL("image/jpeg",0.92));
      };
      img.onerror=()=>reject(new Error("Image load failed"));
      img.src=url;
    });
    return{...page,dataUrl};
  }catch(e){
    console.warn("ensureDataUrl failed for page",page.id,e);
    return page;
  }
}

function _libPath(uid){
  return _appCtx.configPath?`${_appCtx.configPath}/partLibrary`:`users/${uid}/config/partLibrary`;
}
function _libKey(manufacturer,description){
  const n=s=>(s||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
  return `${n(manufacturer)}||${n(description).slice(0,80)}`;
}
async function loadPartLibrary(uid){
  try{const d=await fbDb.doc(_libPath(uid)).get();return d.exists?(d.data().entries||[]):[];}
  catch(e){return[];}
}
async function savePartLibraryEntry(uid,{manufacturer,description,partNumber}){
  if(!partNumber||!partNumber.trim())return;
  if(!manufacturer&&!description)return;
  const path=_libPath(uid);
  let entries=[];
  try{const d=await fbDb.doc(path).get();if(d.exists)entries=d.data().entries||[];}catch(e){}
  const key=_libKey(manufacturer,description);
  const idx=entries.findIndex(e=>e.key===key);
  const entry={key,manufacturer:manufacturer||"",description:description||"",partNumber:partNumber.trim(),updatedAt:Date.now()};
  if(idx>=0)entries[idx]=entry;else entries.push(entry);
  await fbDb.doc(path).set({entries});
}
function findPartSuggestion(library,row){
  if(!library||!library.length)return null;
  if(row.partNumber&&row.partNumber.trim())return null;
  if(!row.manufacturer&&!row.description)return null;
  const n=s=>(s||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
  const exact=library.find(e=>e.key===_libKey(row.manufacturer,row.description));
  if(exact)return exact.partNumber;
  const words=s=>s.split(/\s+/).filter(w=>w.length>2);
  const rowWords=words(n(row.description));
  if(rowWords.length<2)return null;
  const mfr=n(row.manufacturer);
  let best=null,bestScore=0;
  for(const e of library){
    const eMfr=n(e.manufacturer);
    if(mfr&&eMfr&&!eMfr.includes(mfr)&&!mfr.includes(eMfr))continue;
    const eWords=words(n(e.description));
    const common=rowWords.filter(w=>eWords.includes(w)).length;
    const score=common/Math.max(rowWords.length,eWords.length,1);
    if(score>0.6&&score>bestScore){bestScore=score;best=e.partNumber;}
  }
  return best;
}
async function loadPartCorrections(uid){
  try{const d=await fbDb.doc(_libPath(uid)).get();return d.exists?(d.data().corrections||[]):[];}
  catch(e){return[];}
}
async function savePartCorrection(uid,{wrongValue,correctValue,description,manufacturer}){
  if(!wrongValue||!wrongValue.trim()||!correctValue||!correctValue.trim())return;
  const path=_libPath(uid);
  let corrections=[];
  try{const d=await fbDb.doc(path).get();if(d.exists)corrections=d.data().corrections||[];}catch(e){}
  const key=(wrongValue||"").trim().toLowerCase();
  const idx=corrections.findIndex(c=>c.key===key);
  const entry={key,wrongValue:wrongValue.trim(),correctValue:correctValue.trim(),description:description||"",manufacturer:manufacturer||"",updatedAt:Date.now()};
  if(idx>=0)corrections[idx]=entry;else corrections.push(entry);
  try{await fbDb.doc(path).set({corrections},{merge:true});}catch(e){}
}
function applyPartCorrections(corrections,bom){
  if(!corrections||!corrections.length)return bom;
  return bom.map(row=>{
    if(!row.partNumber||!row.partNumber.trim())return row;
    const key=(row.partNumber||"").trim().toLowerCase();
    const match=corrections.find(c=>c.key===key);
    return match?{...row,partNumber:match.correctValue,correctedByLibrary:true}:row;
  });
}

function appendDefaultBomItems(bom){
  console.log("APPEND DEFAULTS: _defaultBomItems=",_defaultBomItems.length,"items:",_defaultBomItems.map(d=>d.description));
  if(!_defaultBomItems.length){console.log("APPEND DEFAULTS: skipped — no defaults configured");return bom;}
  const lower=new Set(bom.map(r=>(r.description||"").trim().toLowerCase()));
  console.log("APPEND DEFAULTS: existing BOM descriptions:",[...lower]);
  const _laborPns=new Set(LABOR_BOM_GROUPS.map(g=>g.partNumber));
  const items=[];
  for(const tpl of _defaultBomItems){
    if(_laborPns.has((tpl.partNumber||"").trim()))continue;
    const desc=(tpl.description||"").trim().toLowerCase();
    if(desc&&lower.has(desc)){console.log("APPEND DEFAULTS: skipped (duplicate):",tpl.description);continue;}
    items.push({id:Date.now()+Math.random(),qty:tpl.qty||1,partNumber:tpl.partNumber||"",description:tpl.description||"",manufacturer:tpl.manufacturer||"",notes:"",unitPrice:tpl.unitPrice||0,priceSource:tpl.priceSource||null,autoLoaded:true});
    console.log("APPEND DEFAULTS: adding:",tpl.description,"$"+tpl.unitPrice);
  }
  console.log("APPEND DEFAULTS: appended",items.length,"of",_defaultBomItems.length,"defaults. BOM total:",bom.length+items.length);
  return items.length?[...bom,...items]:bom;
}

// ── BOM MERGER (combine by partNumber, sum qty) ──
function mergeBoms(bomArrays){
  const map={};
  bomArrays.flat().forEach(item=>{
    const key=(item.partNumber||"").trim().toLowerCase()||("desc:"+((item.description||"").toLowerCase().slice(0,40)));
    if(map[key]){map[key]={...map[key],qty:(+map[key].qty||1)+(+item.qty||1)};}
    else{map[key]={...item};}
  });
  return Object.values(map);
}

// ── BOM EXTRACTION PROMPT ──
const BOM_PROMPT=`You are an expert at reading UL508A industrial electrical control panel drawings.

TASK: Extract every line item from the BOM table on this drawing page.

STEP 1 — ANALYZE THE TABLE STRUCTURE FIRST:
Before extracting anything, carefully examine:
• All column headers exactly as printed
• Total number of data rows in the table (count them)
• Any multi-line cells, merged cells, or continuation rows
• Whether rows continue from a previous page (no header row visible)

STEP 2 — MAP COLUMNS:
• itemNo      → ITEM, Item #, Item No., LINE, Line #, No., or leftmost sequential number column
• qty         → QTY, Quantity, Qty., EA, Each
• partNumber  → "MFG/PART NO.", "Part No.", "Part #", "Cat. No.", "Catalog No.", "Model No.",
                "Order No.", "Product No.", "Stock No." — values are alphanumeric catalog codes
• manufacturer → Manufacturer, MFG, Brand, Make
• notes       → TAG, Tag No., Ref, Reference, Device ID — contains ref designators (CB1, M2, OL1…)
• description → Description, Item Description, Function, Material Description

STEP 3 — EXTRACT EVERY ROW (no skipping):
• Multi-line cells: if text wraps to the next printed line, it is ONE row — keep it as one item
• itemNo: copy exact value printed. Use "" if no item number column exists
• NEVER invent or use sequential row counts (1,2,3…) as partNumber values
• Blank / "—" / "N/A" in part number column → partNumber: ""
• Manufacturer prefix in part number cell: split it
  e.g. "SAGINAW SCE-24EL20X10SSLP" → manufacturer:"SAGINAW", partNumber:"SCE-24EL20X10SSLP"
  e.g. "ABB AF09-30-10-13" → manufacturer:"ABB", partNumber:"AF09-30-10-13"
• Multiple catalog codes in ONE cell (comma- or slash-separated): output a SEPARATE row for each
  e.g. "ABB KXTBRHEBFP, OXP10X225, OH865L10B" → three rows, each with same qty/manufacturer/notes
  First row: original description unchanged
  Each extra row: append " (sub-part)" to description
• Reference designators (CB1, M1, OL2, PB3, SS1…) → notes field only, never partNumber
• Include ALL data rows even when some fields are blank — only skip: column header row, totals rows, title block text, revision block rows

STEP 4 — CHARACTER ACCURACY (most critical step):
Each character in a part number must be verified individually. Common industrial drawing confusions:
• 0 (zero) vs O (letter-O): zero is narrower and has flat or angled cuts; O is a smooth oval
• 1 (one) vs I (capital-i) vs L (capital-L): check stroke widths and serif details carefully
• 2 vs Z — 5 vs S — 8 vs B — 6 vs G — 4 vs A — 9 vs q
• Q has a small tail/stroke inside the circle; O does not
• U vs V vs W — count the number of strokes and angles
• Hyphens matter: "100-C09D10" is different from "1OOC09D10"
• When unsure of a character: look at the full context of the part number format for that manufacturer
TRANSCRIBE EXACTLY what is printed — do NOT autocomplete, normalize, or guess part numbers

RETURN FORMAT:
Output ONLY a valid JSON array — no markdown, no explanation. Each object must have exactly:
{"itemNo":"","qty":1,"partNumber":"","description":"","manufacturer":"","notes":"","y_top":0.0,"y_bottom":0.0}

y_top and y_bottom are the vertical position of this row's top and bottom edges as fractions of the total image height (0.0 = top of image, 1.0 = bottom of image). Be precise — these will be used to locate the row visually.

If no BOM table exists on this page, return [].`;

async function extractBomPage(dataUrl,feedback=""){
  const small=await resizeForAnalysis(dataUrl,2000); // BOM needs higher res for small text
  const b64=small&&small.split(",")[1];
  if(!b64){console.warn("extractBomPage: skipping — empty or invalid dataUrl");return[];}
  const feedbackSection=feedback?`\n\nCORRECTION INSTRUCTIONS FROM USER:\n${feedback}\nApply these corrections carefully and exactly as described.`:"";
  // Use extended thinking so Claude reasons through the table structure before extracting
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-beta":"interleaved-thinking-2025-05-14","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:10000,
      thinking:{type:"enabled",budget_tokens:4000},
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:BOM_PROMPT+feedbackSection}
      ]}]
    })
  });
  const d=await resp.json();
  if(!resp.ok)throw new Error(d.error?.message||"API error");
  // Find the text block (thinking blocks come first)
  const raw=(d.content||[]).find(b=>b.type==="text")?.text||"";
  console.log("Claude raw response:",raw);
  try{
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const m=cleaned.match(/\[[\s\S]*\]/);
    if(!m){console.warn("No JSON array found in response");return[];}
    const items=JSON.parse(m[0]);
    // Post-process: split any rows where partNumber still contains multiple values
    const expanded=[];
    for(const item of items){
      const pn=(item.partNumber||"").trim();
      // Detect multiple part numbers: split on " / " or ", " but only when each segment looks like a part number
      // (contains letters+numbers, not just a description phrase)
      const segments=pn.split(/\s*\/\s*|\s*,\s*/).map(s=>s.trim()).filter(s=>s&&/[A-Z0-9]{3,}/i.test(s));
      if(segments.length>1){
        for(let si=0;si<segments.length;si++){
          const base=item.description||"";
        const alreadyLabeled=base.includes("(sub-part from above)");
        const desc=si===0?base:(alreadyLabeled?base:base+" (sub-part from above)");
          expanded.push({...item,partNumber:segments[si],description:desc});
        }
      } else {
        expanded.push(item);
      }
    }
    return expanded;
  }catch(e){console.error("JSON parse error:",e,raw);return[];}
}

  const list=toCheck.map(r=>({id:String(r.id),pn:(r.partNumber||"").trim(),mfr:(r.manufacturer||"").trim(),desc:(r.description||"").trim().slice(0,60)}));
  const prompt=`You are verifying industrial/electrical part numbers. For each part number below, determine if it is a real, recognized part number from a known manufacturer.

Rate each as:
- "verified" — recognized real part number (you are confident this exists)
- "plausible" — follows a valid manufacturer part number pattern, likely real

Use the manufacturer and description as context clues. Be strict — if you are not confident the exact part number exists, rate it "plausible" not "verified".

Part numbers to check:

const SCHEMATIC_PROMPT=`You are reading a UL508A electrical control panel schematic page.

Extract and return ONLY valid JSON:
{
  "tags": [{"tag":"CB100","type":"breaker"}, {"tag":"PB1","type":"pushbutton"}],
  "wires": [
    {"w":"L1 bus to CB1 top","internal":true},
    {"w":"CB1 bottom to T1 H1","internal":true},
    {"w":"TB1-3 to output signal","internal":false}
  ]
}

Rules:
- tags: array of objects with "tag" (alphanumeric device ID) and "type" (one of: breaker, contactor, overload, relay, transformer, fuse, disconnect, drive, plc_io, terminal_block, pushbutton, pilot_light, selector_switch, hmi, e_stop, horn, power_supply, surge, meter, other)

Wire listing rules (CRITICAL — follow exactly):
- List every solid-line connection as an object with "w" (description) and "internal" (boolean).
- "internal": true means BOTH endpoints are devices, terminal blocks, or busses INSIDE the panel.
- "internal": false means one or both endpoints leave the panel (output signals, incoming supplies, field wires, external destinations).

Examples of internal=TRUE: bus to breaker, breaker to contactor, switch to terminal block, bus to switch.
Examples of internal=FALSE: terminal block to "output signal", "incoming supply" to terminal block, anything to/from a named signal like "high torque shutdown", "clarifier start", "alarm output", anything described as an output or external signal.

- The vertical bus lines themselves (L1, L2, L3, N) are NOT wires — do not list them.
- Dashed lines are NOT wires — do not list them.
- Ground symbols and internal device connections are NOT wires.
- If a line branches at a junction, each branch is a separate wire.
- Be conservative. When in doubt, mark internal: false.
- Return JSON only, no explanation`;

async function analyzeSchematicPage(dataUrl){
  const small=await resizeForAnalysis(dataUrl,1568);
  const b64=small&&small.split(",")[1];
  if(!b64){console.warn("analyzeSchematicPage: skipping — empty or invalid dataUrl");return{tags:[],wireCount:0,wireTerminations:0};}
  const raw=await apiCall({
    model:"claude-sonnet-4-6",
    max_tokens:4000,
    messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
      {type:"text",text:SCHEMATIC_PROMPT}
    ]}]
  });
  console.log("Schematic Claude response:",raw);
  try{
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const m=cleaned.match(/\{[\s\S]*\}/);
    if(!m){console.warn("No JSON object found in schematic response");return{tags:[],wireCount:0,wireTerminations:0};}
    const parsed=JSON.parse(m[0]);
    // Normalize tags: accept both old ["CB100",...] and new [{tag,type},...] formats
    const rawTags=Array.isArray(parsed.tags)?parsed.tags:[];
    const tags=rawTags.map(t=>typeof t==="string"?{tag:t,type:"other"}:({tag:t.tag||"",type:t.type||"other"}));
    const wires=Array.isArray(parsed.wires)?parsed.wires:[];
    const internalWires=wires.filter(w=>typeof w==="object"?w.internal:true);
    const externalWires=wires.filter(w=>typeof w==="object"&&!w.internal);
    const wireCount=internalWires.length||+parsed.wireCount||0;
    const wireTerminations=wireCount*2;
    console.log(`WIRE COUNT: ${internalWires.length} internal, ${externalWires.length} external, ${wires.length} total`);
    console.log("Wires INTERNAL (counted):",internalWires.map(w=>w.w||w));
    console.log("Wires EXTERNAL (excluded):",externalWires.map(w=>w.w||w));
    return{tags,wireCount,wireTerminations};
  }catch(e){console.error("Schematic JSON parse error:",e,raw);return{tags:[],wireCount:0,wireTerminations:0};}
}

function mergeLayoutResults(layouts){
  console.log("MERGE LAYOUTS: "+layouts.length+" layout results to merge");
  layouts.forEach((l,i)=>console.log("Layout result "+i+":",JSON.stringify({doorCutouts:l?.doorCutouts?.length,backpanelDevices:l?.backpanelDevices?.length})));
  const merged={doorCutouts:[],backpanelDevices:[],ductRuns:[],dinRails:[],sideTopDevices:[],enclosure:null};
  for(const l of layouts){
    if(!l)continue;
    if(l.enclosure&&!merged.enclosure)merged.enclosure=l.enclosure;
    if(Array.isArray(l.doorCutouts))merged.doorCutouts.push(...l.doorCutouts);
    if(Array.isArray(l.backpanelDevices))merged.backpanelDevices.push(...l.backpanelDevices);
    if(Array.isArray(l.ductRuns))merged.ductRuns.push(...l.ductRuns);
    if(Array.isArray(l.dinRails))merged.dinRails.push(...l.dinRails);
    if(Array.isArray(l.sideTopDevices))merged.sideTopDevices.push(...l.sideTopDevices);
  }
  // Deduplicate door cutouts by tag (same device may appear on multiple layout pages)
  const seenDoor=new Set();
  merged.doorCutouts=merged.doorCutouts.filter(d=>{
    const key=(d.tag||"").toUpperCase();
    if(!key||seenDoor.has(key))return false;
    seenDoor.add(key);return true;
  });
  // Deduplicate backpanel devices by tag
  const seenBack=new Set();
  merged.backpanelDevices=merged.backpanelDevices.filter(d=>{
    const key=(d.tag||"").toUpperCase();
    if(!key||seenBack.has(key))return false;
    seenBack.add(key);return true;
  });
  console.log("AFTER DEDUP: doorCutouts="+merged.doorCutouts.length+", backpanelDevices="+merged.backpanelDevices.length);
  // Deduplicate side/top devices by tag
  const seenSide=new Set();
  merged.sideTopDevices=merged.sideTopDevices.filter(d=>{
    const key=(d.tag||"").toUpperCase();
    if(!key||seenSide.has(key))return false;
    seenSide.add(key);return true;
  });
  // Compute derived counts
  const ductFeet=merged.ductRuns.reduce((s,r)=>s+(r.lengthFt||0),0);
  const dinFeet=merged.dinRails.reduce((s,r)=>s+(r.lengthFt||0),0);
  const ductDinFeet=Math.round((ductFeet+dinFeet)*10)/10;
  // Categorize side/top devices by location and type
  const topBeaconCount=merged.sideTopDevices.filter(d=>d.location==="top"||d.type==="beacon").length;
  const squareCutoutCount=merged.sideTopDevices.filter(d=>d.location!=="top"&&d.type!=="beacon"&&d.type!=="fan"&&d.type!=="air_conditioner").length;
  const sideTopSmallCount=merged.sideTopDevices.filter(d=>d.type==="fan").length;
  const sideTopLargeCount=merged.sideTopDevices.filter(d=>d.type==="air_conditioner").length;
  // Panel holes: door cutouts (HMI=25 eq) + top beacons (1 hole each)
  const doorHoles=merged.doorCutouts.reduce((s,c)=>s+(c.type==="hmi"?LABOR_RATES.hmiHoleEquivalent:1),0);
  const panelHoles=doorHoles+topBeaconCount;
  const doorDeviceCount=merged.doorCutouts.length;
  const backpanelDeviceCount=merged.backpanelDevices.length;
  return{...merged,ductDinFeet,panelHoles,doorDeviceCount,backpanelDeviceCount,sideTopSmallCount,sideTopLargeCount,squareCutoutCount,topBeaconCount};
}

// Detect zoomed/duplicate pages among same-type pages (BP, ENC, BOM with 2+ pages)
async function detectZoomedPages(pagesOfType){
  if(!_apiKey||pagesOfType.length<2)return[];
  try{
    const batch=pagesOfType.slice(0,6);
    const imageContent=batch.map((pg,i)=>[
      {type:"text",text:`Page ${i+1}:`},
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:(pg.dataUrl||"").split(",")[1]}}
    ]).flat();
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:[
        ...imageContent,
        {type:"text",text:`These ${batch.length} drawing pages are all tagged as the same type. Identify any that are clearly zoomed-in detail sections showing just a portion of content that already appears in full on another page. These zoomed pages duplicate information and should be excluded from processing.\nReturn ONLY JSON array: [{"idx":0,"isZoomed":false},{"idx":1,"isZoomed":true},...] for all ${batch.length} pages. If uncertain, set isZoomed:false.`}
      ]}]})
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||"";
    const m=text.match(/\[[\s\S]*\]/);
    if(!m)return[];
    const results=JSON.parse(m[0]);
    return results.filter(r=>r.isZoomed).map(r=>batch[r.idx]?.id).filter(Boolean);
  }catch(e){console.warn("detectZoomedPages:",e);return[];}
}

// ── PANEL VALIDATION ──
async function runPanelValidation(panel,onProgress,bomPromise=null){
  let schematicPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("schematic")&&(p.dataUrl||p.storageUrl));
  let backpanelPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("backpanel")&&(p.dataUrl||p.storageUrl));
  let enclosurePages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("enclosure")&&(p.dataUrl||p.storageUrl));
  let layoutPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("layout")&&(p.dataUrl||p.storageUrl)); // legacy
  if(!schematicPages.length&&!backpanelPages.length&&!enclosurePages.length&&!layoutPages.length)return{validation:null,laborData:null};
  // Ensure dataUrls for pages loaded from Storage
  schematicPages=await Promise.all(schematicPages.map(ensureDataUrl));
  backpanelPages=await Promise.all(backpanelPages.map(ensureDataUrl));
  enclosurePages=await Promise.all(enclosurePages.map(ensureDataUrl));
  layoutPages=await Promise.all(layoutPages.map(ensureDataUrl));

  // 1. Schematic + layout analysis (parallel) — with real progress tracking
  let allTags=[],totalWires=0,totalTerminations=0;
  let layoutMerged=null;
  const totalPages=schematicPages.length+backpanelPages.length+enclosurePages.length+layoutPages.length;
  let donePages=0;
  const reportProgress=()=>{if(onProgress&&totalPages>0)onProgress(Math.round((donePages/totalPages)*90));};
  if(onProgress)onProgress(0);
  const [schResults,bpResults,encResults,layResults]=await Promise.all([
    parallelMap(schematicPages,async pg=>{const r=await analyzeSchematicPage(pg.dataUrl);donePages++;reportProgress();return r;},4),
    parallelMap(backpanelPages,async pg=>{const r=await analyzeBackpanelPage(pg.dataUrl);donePages++;reportProgress();return r;},4),
    parallelMap(enclosurePages,async pg=>{const r=await analyzeEnclosurePage(pg.dataUrl);donePages++;reportProgress();return r;},4),
    parallelMap(layoutPages,async pg=>{const r=await analyzeLayoutPage(pg.dataUrl);donePages++;reportProgress();return r;},4)
  ]);
  if(onProgress)onProgress(92);
  for(const result of schResults){
    allTags=[...allTags,...result.tags];
    totalWires+=result.wireCount;
    totalTerminations+=result.wireTerminations;
  }
  const layoutResults=[...bpResults,...encResults,...layResults].filter(Boolean);
  if(layoutResults.length>0)layoutMerged=mergeLayoutResults(layoutResults);
  // Normalize tag strings for BOM cross-reference (extract .tag from objects)
  const tagStrings=allTags.map(t=>typeof t==="string"?t:t.tag||"");
  const schematicTags=[...new Set(tagStrings.map(t=>t.trim()).filter(Boolean))];
  const allTagsSet=new Set(schematicTags.map(t=>t.toUpperCase()));

  // 3. Device classification: door vs backpanel by type
  const doorDevicesFromSchematic=allTags.filter(t=>{
    const type=typeof t==="string"?"other":(t.type||"other");
    return DOOR_DEVICE_TYPES.has(type);
  });
  const allDevicesFromSchematic=allTags.filter(t=>{
    const tag=typeof t==="string"?t:(t.tag||"");
    return tag.trim().length>0;
  });

  // 4. Build laborData counts
  const schDoorCount=doorDevicesFromSchematic.length;
  const layDoorCount=layoutMerged?layoutMerged.doorDeviceCount:0;
  const layBackCount=layoutMerged?layoutMerged.backpanelDeviceCount:0;
  const layoutPanelHoles=layoutMerged?layoutMerged.panelHoles:0;
  // When a dedicated enclosure page was analyzed, trust its physical door cutout count.
  // Schematic overcounts: it finds all door-type device symbols including remote stations and external devices.
  // Legacy layout pages (no enclosure page) may undercount, so fall back to schematic in that case.
  const hasEnclosureData=enclosurePages.length>0&&encResults.some(Boolean)&&layDoorCount>0;
  const doorDevices=hasEnclosureData?layDoorCount:(schDoorCount>0?schDoorCount:layDoorCount);
  const panelHoles=hasEnclosureData?layoutPanelHoles:(schDoorCount>0?Math.min(layoutPanelHoles,schDoorCount):layoutPanelHoles);
  // Total devices: door + backpanel (from layout if available, else schematic total)
  const allDevices=layoutMerged?(doorDevices+layBackCount):allDevicesFromSchematic.length;
  console.log("DOOR DEVICES: schematic="+schDoorCount+", enclosure/layout="+layDoorCount+", hasEnclosureData="+hasEnclosureData+", using="+doorDevices);
  console.log("ALL DEVICES: "+allDevices+", panelHoles="+panelHoles);
  const ductDinFeet=layoutMerged?layoutMerged.ductDinFeet:0;
  const hasLayoutData=!!layoutMerged;

  console.log("LABOR COUNTS: doorDevices="+doorDevices+", allDevices="+allDevices+", panelHoles="+panelHoles+", ductDinFeet="+ductDinFeet+", wireCount="+totalWires);
  const laborData={
    counts:{wireCount:totalWires,wireTerminations:totalTerminations,doorDevices,allDevices,panelHoles,ductDinFeet,sideTopSmallCount:layoutMerged?.sideTopSmallCount||0,sideTopLargeCount:layoutMerged?.sideTopLargeCount||0},
    overrides:{},
    defaults:{pmUnits:2,buyoffUnits:2,cratingUnits:1,labelHours:4},
    hasLayoutData,
    layoutAnalysis:layoutMerged,
    deviceClassification:allTags
  };

  // 5. BOM cross-reference — await bomPromise if BOM is being extracted in parallel
  const resolvedBom=bomPromise?(await bomPromise):(panel.bom||[]);
  const isAsShown=notes=>/^(as\s+shown|enclosure)$/i.test((notes||"").trim());
  const matched=[],missing=[],notTraceable=[];
  for(const item of resolvedBom){
    const notes=(item.notes||"").trim();
    if(isAsShown(notes)){notTraceable.push(item);continue;}
    const itemTags=notes.split(/[\s,;]+/).filter(Boolean);
    const found=itemTags.filter(t=>allTagsSet.has(t.toUpperCase()));
    if(found.length>0||itemTags.length===0)matched.push({item,found});
    else missing.push(item);
  }
  const allBomTags=new Set(resolvedBom.flatMap(i=>(i.notes||"").split(/[\s,;]+/).filter(Boolean).map(t=>t.toUpperCase())));
  const unaccounted=schematicTags.filter(t=>!allBomTags.has(t.toUpperCase()));
  const traceable=resolvedBom.length-notTraceable.length;
  const matchPct=traceable>0?matched.length/traceable:1;
  const confidence=matchPct>=0.9?"high":matchPct>=0.7?"medium":"low";

  if(onProgress)onProgress(98);
  const validation={runAt:Date.now(),schematicTags,wireCount:totalWires,matched,missingFromSchematic:missing,notTraceable,unaccountedTags:unaccounted,confidence};
  console.log("VALIDATION COMPLETE: pages="+totalPages+", tags="+schematicTags.length+", wires="+totalWires+", matched="+matched.length+", missing="+missing.length);
  return{validation,laborData};
}

// ── BACKGROUND EXTRACTION TASK (module-level — survives React component unmount / navigation) ──
async function runExtractionTask(uid,projectId,panel,cbs={}){

  let latestPanel=panel;
  try{
  latestPanel={...panel};
  const bomPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("bom")&&p.dataUrl);

  const willValidate=!!_apiKey&&hasSchOrLayout;
  const save=async p=>{latestPanel=p;await saveProjectPanel(uid,projectId,panel.id,p).catch(e=>console.warn("bg save:",e));};
  // Always update immediately so the bar never stays on "Starting extraction…"
  bgUpdate(panel.id,bomPages.length>0?"Extracting BOM…":willValidate?"Validating…":"Uploading drawings…");
    // BOM extraction
    let bomMergePromise=Promise.resolve([]);
    if(_apiKey&&bomPages.length>0){
      bgUpdate(panel.id,"Extracting BOM…");
      let bomDone=0;
      bomMergePromise=parallelMap(bomPages,async (pg,pgIdx)=>{
        bomDone++;
        bgSetPct(panel.id,Math.round((bomDone/bomPages.length)*40),`Extracting BOM — page ${bomDone}/${bomPages.length}…`);
        const items=await extractBomPage(pg.dataUrl);
        return items.map(item=>({...item,sourcePageIdx:pgIdx}));
      },3).then(results=>{
        const all=results.flat();if(!all.length)return[];
        const map={};
        all.forEach(item=>{const key=(item.partNumber||"").trim().toLowerCase()||("desc:"+item.description.toLowerCase().slice(0,40));if(map[key]){map[key].qty=(+map[key].qty||1)+(+item.qty||1);}else{map[key]={...item,id:Date.now()+Math.random(),qty:+item.qty||1};}});
        return appendDefaultBomItems(Object.values(map));
      }).catch(ex=>{console.error("BOM extraction failed:",ex);return[];});
    }
    // Validation (parallel with BOM)
    let valPromise=Promise.resolve(null);
    if(willValidate){
      bgUpdate(panel.id,"Validating…");
      valPromise=runPanelValidation(latestPanel,pct=>{bgSetPct(panel.id,40+Math.round(pct*0.5),"Validating…");},bomMergePromise);
    }
    // Await BOM and save
    const mergedBom=await bomMergePromise;
    if(mergedBom.length>0)await save({...latestPanel,bom:mergedBom,status:"extracted",updatedAt:Date.now()});
    // Await validation and save
    if(willValidate){
      try{
        const result=await valPromise;
        if(result?.validation||result?.laborData)
          await save({...latestPanel,...(result.validation?{validation:result.validation}:{}),...(result.laborData?{laborData:result.laborData}:{}),status:"validated",updatedAt:Date.now()});
      }catch(valEx){console.error("Validation failed:",valEx);}
    }
    // Part number verification
    const bomToVerify=(latestPanel.bom||[]).slice();
    if(bomToVerify.length>0&&_apiKey){
      try{const vr=await verifyPartNumbers(bomToVerify);if(vr?.length>0)await save({...latestPanel,bomVerification:vr,updatedAt:Date.now()});}
      catch(e){console.warn("Part verification failed:",e);}
    }
    // Upload page images to Firebase Storage
    const pagesNeedingUpload=latestPanel.pages.filter(pg=>pg.dataUrl&&!pg.storageUrl);
    if(pagesNeedingUpload.length>0&&projectId){
      try{
        const urlMap={};
        await parallelMap(pagesNeedingUpload,async pg=>{urlMap[pg.id]=await uploadPageImage(uid,projectId,pg.id,pg.dataUrl);},4);
        const pagesWithUrls=latestPanel.pages.map(pg=>urlMap[pg.id]?{...pg,storageUrl:urlMap[pg.id]}:pg);
        await save({...latestPanel,pages:pagesWithUrls});
      }catch(e){console.warn("Storage upload failed:",e);}
    }
    const itemCount=(latestPanel.bom||[]).length;
    bgDone(panel.id,itemCount>0?`✓ ${itemCount} items`:"✓ Complete");
  }catch(ex){
    console.error("runExtractionTask error:",ex);
    bgError(panel.id,ex.message.slice(0,60));
  }finally{
    try{if(onDone)onDone(latestPanel);}catch(e){}
  }
}

const PRICING_PROMPT=`You are a pricing assistant for industrial electrical control panel components.
Estimate US distributor market prices (Grainger, AutomationDirect, Allied, DigiKey, etc.)
Return ONLY a valid JSON array, same order as input:
[{"id":"...","unitPrice":12.50},...]
Use null for any item you cannot price. No explanation, JSON only.

Items:`;

async function estimatePrices(items){
  const BATCH=20;
  const result={};
  const batches=[];
  for(let i=0;i<items.length;i+=BATCH)batches.push(items.slice(i,i+BATCH));
  await parallelMap(batches,async(batch)=>{
    const payload=batch.map(r=>({id:String(r.id),partNumber:r.partNumber||"",description:r.description||"",manufacturer:r.manufacturer||""}));
    try{
      const raw=await apiCall({
        model:"claude-sonnet-4-6",
        max_tokens:2000,
        messages:[{role:"user",content:`${PRICING_PROMPT}\n${JSON.stringify(payload)}`}]
      });
      const cleaned=raw.replace(/```json|```/g,"").trim();
      const m=cleaned.match(/\[[\s\S]*\]/);
      if(m){
        const arr=JSON.parse(m[0]);
        arr.forEach(r=>{result[r.id]=r.unitPrice??null;});
      }
    }catch(e){console.error("Pricing batch error:",e);}
  },3);
  return result;

// ── PAGE TYPE DETECTION ──
const PAGE_TYPE_DETECT_PROMPT=`Classify this page from a UL508A industrial control panel drawing set.
Return ONLY a JSON object: {"types":[...],"sheetNo":"..."}

Types (use only these values):
"bom"       — Bill of Materials table with columns for qty, part number, description
"schematic" — Electrical ladder diagram or wiring schematic: ladder rungs, wire numbers, terminal numbers, coil/contact symbols, device tags like CB1, CR1, PB1
"backpanel" — Interior mounting plate, single front view only: DIN rails, wire duct, rows of breakers/contactors/relays/drives/PLCs/terminal blocks. NO side views, NO enclosure outline with dimensions
"enclosure" — Enclosure/cabinet drawing. MOST RELIABLE SIGN: a side view drawn beside or below the front view. Also: overall W×H×D dimensions labeled, door cutout holes for pushbuttons/HMIs, side-panel fans or AC units, title says Enclosure/Cabinet/Door Layout
"pid"       — Process & Instrumentation Diagram. UNIQUE SIGNS not found in schematics: two-letter ISA instrument codes (YA, HS, ZS, SA, FT, PT, LIC, PIC) inside circles paired with a tag number, OR "DI"/"DO" text inside diamond shapes, OR a box labeled "INSTRUMENT & FUNCTION LEGEND". A P&ID has NO wire numbers, NO terminal numbers, NO ladder rungs.

Use [] for title sheets, rev blocks, or unrecognized pages.
"sheetNo": sheet number from title block (e.g. "1 of 5"). "" if not found.
Example: {"types":["schematic"],"sheetNo":"3 of 8"}`;

async function detectPageTypes(dataUrl,learningExamples=[]){
  const b64=dataUrl&&dataUrl.split(",")[1];
  if(!b64||!_apiKey)return{types:[],sheetNo:""};
  try{
    const hint=buildLearningHint(learningExamples);
    const raw=await apiCall({
      model:"claude-haiku-4-5-20251001",
      max_tokens:120,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:PAGE_TYPE_DETECT_PROMPT+hint}
      ]}]
    });
    const m=raw.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
    if(!m)return{types:[],sheetNo:""};
    const obj=JSON.parse(m[0]);
    return{types:(obj.types||[]).filter(t=>["bom","schematic","backpanel","enclosure","pid"].includes(t)),sheetNo:obj.sheetNo||""};
  }catch(e){return{types:[],sheetNo:""};}
}
