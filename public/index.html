function detectSheetMm(w,h){
  // Identify ANSI engineering sheet size from pixel dimensions.
  // Uses pixel area + aspect to select the closest standard size regardless of scan DPI.
  const landscape=w>=h;
  const [lw,lh]=landscape?[w,h]:[h,w];
  const area=lw*lh;
  // Pixel-area thresholds calibrated so any reasonable scan DPI (72–300) maps to the right size.
  // ANSI: A=8.5×11, B=11×17, C=17×22, D=22×34, E=34×44 inches → mm × 25.4
  let mmL,mmS;
  if(area>20000000){mmL=1117.6;mmS=863.6;}       // E 44×34"
  else if(area>8000000){mmL=863.6;mmS=558.8;}     // D 34×22"
  else if(area>3500000){mmL=558.8;mmS=431.8;}     // C 22×17"
  else if(area>1500000){mmL=431.8;mmS=279.4;}     // B 17×11"
  else{mmL=279.4;mmS=215.9;}                       // A 11×8.5"
  return landscape?{mmW:mmL,mmH:mmS}:{mmW:mmS,mmH:mmL};
}

async function buildCoverPage(doc,panel,bcProjectNumber,quoteData,lineIdx,W,H){
  // W/H passed in from caller to match drawing page size; fall back to 11x17 landscape
  if(!W||!H){W=431.8;H=279.4;}
  // Scale factor relative to 11x17 landscape baseline (431.8 x 279.4 mm)
  const sc=Math.min(W/431.8,H/279.4);
  const m=v=>v*sc; // scale a measurement
  const fs=v=>Math.max(4,Math.round(v*sc*10)/10); // scale a font size
  const margin=m(12);

  const q=quoteData||{};
  const accent=[30,64,175];
  const dark=[15,23,42];
  const mid=[71,85,105];
  const light=[241,245,249];
  const orange=[234,88,12];
  const generated=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

  // ── Header bar ──
  const hdrH=m(24);
  doc.setFillColor(...accent);
  doc.rect(0,0,W,hdrH,"F");
  doc.setFontSize(fs(17));doc.setFont("helvetica","bold");doc.setTextColor(255,255,255);
  doc.text("Matrix Systems, Inc.",margin,m(16));
  doc.setFontSize(fs(12));doc.setFont("helvetica","normal");
  doc.text("PANEL PRODUCTION TRAVELER",W-margin,m(16),{align:"right"});

  // ── Title block: Project # (primary) then DWG# ──
  const projectNum=q.projectNumber||bcProjectNumber||"—";
  doc.setFontSize(fs(30));doc.setFont("helvetica","bold");doc.setTextColor(...dark);
  doc.text(projectNum,margin,m(32));
  const dwgTitle=[panel.drawingNo,panel.drawingRev?"Rev "+panel.drawingRev:""].filter(Boolean).join("  ·  ");
  doc.setFontSize(fs(18));doc.setFont("helvetica","bold");doc.setTextColor(...mid);
  doc.text(dwgTitle,margin,m(40));
  let descEndY=m(40);
  if(panel.drawingDesc){
    doc.setFontSize(fs(11));doc.setFont("helvetica","normal");doc.setTextColor(...mid);
    doc.text(panel.drawingDesc,margin,m(47),{maxWidth:W-margin*2});
    descEndY=m(47);
  }

  // ── Info grid: 4 columns ──
  const infoY=descEndY+m(6);
  const rowH=m(12);
  const fields=[
    ["BC JOB #",bcProjectNumber||"—"],
    ["LINE #","Line "+(lineIdx+1)],
    ["DWG #",panel.drawingNo||"—"],
    ["REV",panel.drawingRev||"—"],
    ["SHIP DATE",panel.requestedShipDate||q.requestedShipDate||"—"],
    ["SALESPERSON",q.salesperson||"—"],
    ["GENERATED",generated],
    ["STATUS",(panel.status||"draft").toUpperCase()],
  ];
  const cols=4;
  const cellW=(W-margin*2)/cols;
  fields.forEach(([lbl,val],i)=>{
    const col=i%cols;
    const row=Math.floor(i/cols);
    const x=margin+col*cellW;
    const y=infoY+row*rowH;
    if(row%2===0){doc.setFillColor(...light);doc.rect(x,y-m(4),cellW-m(1),rowH-m(1),"F");}
    doc.setFontSize(fs(8));doc.setFont("helvetica","normal");doc.setTextColor(...mid);
    doc.text(lbl,x+m(2),y);
    doc.setFontSize(fs(11));doc.setFont("helvetica","bold");doc.setTextColor(...dark);
    doc.text(String(val).slice(0,28),x+m(2),y+m(6));
  });

  // Divider
  const gridRows=Math.ceil(fields.length/cols);
  const divY=infoY+gridRows*rowH+m(2);
  doc.setDrawColor(...accent);doc.setLineWidth(m(0.5));doc.line(margin,divY,W-margin,divY);

  // ── Labor summary ──
  const laborEst=computeLaborEstimate(panel);
  const LABOR_GROUPS=[
    {label:"CUT",  color:[249,115,22], cats:new Set(["Panel Holes","Side-Mounted Components","HVAC/Fans","Side Devices"])},
    {label:"LAYOUT",color:[167,139,250],cats:new Set(["Device Mounting","Duct & DIN Rail","Labels"])},
    {label:"WIRE", color:[56,189,248],  cats:new Set(["Wire Time","Door Wiring"])},
  ];
  const groupHrs=LABOR_GROUPS.map(g=>({
    label:g.label,color:g.color,
    hrs:laborEst.lines.filter(l=>g.cats.has(l.category)).reduce((s,l)=>s+l.hours,0),
  }));
  const otherHrs=laborEst.lines.filter(l=>!LABOR_GROUPS.some(g=>g.cats.has(l.category))).reduce((s,l)=>s+l.hours,0);
  const laborY=divY+m(8);

  // Section header — same weight as info grid labels
  doc.setFontSize(fs(9));doc.setFont("helvetica","bold");doc.setTextColor(...accent);
  doc.text("LABOR ESTIMATE",margin,laborY);
  doc.setDrawColor(...accent);doc.setLineWidth(m(0.3));doc.line(margin,laborY+m(2),margin+m(55),laborY+m(2));

  // Compact rows — colored left bar, uniform font size, tight spacing
  const laborRows=[
    ...groupHrs,
    {label:"OTHER",color:mid,hrs:otherHrs},
    {label:"TOTAL",color:accent,hrs:laborEst.totalHours},
  ];
  const lrH=m(9);
  const lrY=laborY+m(5);
  const barW=m(2.5);
  const hrsColX=margin+m(52);
  const rowW=hrsColX-margin+m(10);

  laborRows.forEach((g,i)=>{
    const y=lrY+i*lrH;
    const isTotal=g.label==="TOTAL";
    if(isTotal){doc.setFillColor(30,64,175);doc.rect(margin,y-m(6),rowW,lrH,"F");}
    else if(i%2===0){doc.setFillColor(...light);doc.rect(margin,y-m(6),rowW,lrH,"F");}
    if(!isTotal){doc.setFillColor(...g.color);doc.rect(margin,y-m(6),barW,lrH,"F");}
    doc.setFontSize(fs(isTotal?11:10));doc.setFont("helvetica",isTotal?"bold":"normal");
    if(isTotal){doc.setTextColor(255,255,255);}else{doc.setTextColor(...g.color);}
    doc.text(g.label,margin+barW+m(2),y);
    doc.setFont("helvetica","bold");
    if(isTotal){doc.setTextColor(255,255,255);}else{doc.setTextColor(...dark);}
    doc.text(`${Math.ceil(g.hrs)} hrs`,hrsColX,y,{align:"right"});
  });

  const laborDivY=lrY+laborRows.length*lrH+m(5);
  doc.setDrawColor(...accent);doc.setLineWidth(m(0.3));doc.line(margin,laborDivY,W-margin,laborDivY);

  // ── BOM section label ──
  doc.setFontSize(fs(9));doc.setFont("helvetica","bold");doc.setTextColor(...accent);
  doc.text("BILL OF MATERIALS",margin,laborDivY+m(7));
  const bom=(panel.bom||[]).filter(r=>!r.isLaborRow).slice().sort((a,b)=>{
    if(!a.itemNo&&!b.itemNo)return 0;
    if(!a.itemNo)return 1;
    if(!b.itemNo)return -1;
    const an=parseFloat(a.itemNo),bn=parseFloat(b.itemNo);
    if(!isNaN(an)&&!isNaN(bn))return an-bn;
    return(a.itemNo||"").localeCompare(b.itemNo||"");
  });
  const hasCrosses=bom.some(r=>r.isCrossed&&r.crossedFrom);
  doc.setFontSize(fs(8));doc.setFont("helvetica","normal");doc.setTextColor(...mid);
  doc.text(`${bom.length} items${hasCrosses?` · ${bom.filter(r=>r.isCrossed).length} crossed`:""}`,W-margin,laborDivY+m(7),{align:"right"});

  // ── BOM table — starts on cover page, continues to page 2+ as needed ──
  const tableStart=laborDivY+m(10);
  const baseFontSize=fs(8);
  const fontSize=baseFontSize;
  const cellPad=m(1.8);

  // Fixed column widths — table is only as wide as needed, not forced to full page
  const colStyles=hasCrosses?{
    0:{cellWidth:m(7),halign:"center"},
    1:{cellWidth:m(11),halign:"center"},
    2:{cellWidth:m(38)},   // Part # (replacement)
    3:{cellWidth:m(30)},   // Original Part #
    4:{cellWidth:m(100)},  // Description — fixed, not auto-expanding
    5:{cellWidth:m(32)},   // MFR
    6:{cellWidth:m(34)},   // Supplier
  }:{
    0:{cellWidth:m(8),halign:"center"},
    1:{cellWidth:m(13),halign:"center"},
    2:{cellWidth:m(42)},   // Part #
    3:{cellWidth:m(110)},  // Description — fixed, not auto-expanding
    4:{cellWidth:m(36)},   // MFR
    5:{cellWidth:m(38)},   // Supplier
  };
  const head=hasCrosses
    ?[["#","Qty","Part #","Original Part #","Description","MFR","Supplier"]]
    :[["#","Qty","Part #","Description","MFR","Supplier"]];
  const body=bom.map((r,i)=>hasCrosses
    ?[i+1,r.qty||1,r.partNumber||"—",r.isCrossed?(r.crossedFrom||"—"):"",r.description||"—",r.manufacturer||"—",r.bcVendorName||"—"]
    :[i+1,r.qty||1,r.partNumber||"—",r.description||"—",r.manufacturer||"—",r.bcVendorName||"—"]
  );

  let coverPageCount=0;
  doc.autoTable({
    startY:tableStart,
    margin:{left:margin,right:margin,bottom:m(12)},
    tableWidth:"wrap",
    headStyles:{fillColor:accent,textColor:255,fontStyle:"bold",fontSize:fontSize+m(0.5),cellPadding:cellPad},
    bodyStyles:{fontSize,cellPadding:cellPad},
    alternateRowStyles:{fillColor:light},
    styles:{overflow:"ellipsize"},
    columnStyles:colStyles,
    head,
    body,
    didParseCell:(data)=>{
      if(hasCrosses&&data.section==="body"){
        const row=bom[data.row.index];
        if(row&&row.isCrossed){
          if(data.column.index===2){data.cell.styles.textColor=accent;}
          if(data.column.index===3){data.cell.styles.textColor=orange;data.cell.styles.fontStyle="italic";}
        }
      }
    },
    didDrawPage:(data)=>{
      coverPageCount++;
      doc.setFontSize(fs(7.5));doc.setFont("helvetica","normal");doc.setTextColor(...mid);
      const ph=doc.internal.pageSize.getHeight();
      doc.text(`${panel.drawingNo||bcProjectNumber}  ·  ${bom.length} items  ·  ${generated}`,margin,ph-m(5));
      doc.text(`Cover ${data.pageNumber}`,W-margin,ph-m(5),{align:"right"});
    }
  });
}

async function bcClearAssemblyBOMLines(parentItemNo,bomPage){
  const getUrl=`${BC_ODATA_BASE}/${bomPage}?$filter=Parent_Item_No eq '${encodeURIComponent(parentItemNo)}'`;
  const gr=await fetch(getUrl,{headers:{"Authorization":`Bearer ${_bcToken}`}});
  if(!gr.ok)throw new Error(`Failed to read existing BOM lines: ${gr.status}`);
  const lines=(await gr.json()).value||[];
  let deleted=0;const errors=[];
  for(const line of lines){
    const lineNo=line.Line_No;
    const etag=line["@odata.etag"];
    const delUrl=`${BC_ODATA_BASE}/${bomPage}(Parent_Item_No='${encodeURIComponent(parentItemNo)}',Line_No=${lineNo})`;
    const dr=await fetch(delUrl,{method:"DELETE",headers:{"Authorization":`Bearer ${_bcToken}`,"If-Match":etag||"*"}});
    if(dr.ok||dr.status===204){deleted++;}
    else{const t=await dr.text();errors.push(`Line ${lineNo}: ${t.slice(0,80)}`);}
  }
  return{deleted,total:lines.length,errors};
}

async function bcReplaceAssemblyBOMLines(parentItemNo,bomRows,onProgress){
  const result={deleted:0,added:0,skipped:0,errors:[],warning:""};
  const allPages=await bcDiscoverODataPages();
  const bomPage=allPages.find(n=>/assembly.*bom|bom.*comp/i.test(n))||null;
  if(!bomPage){
    result.warning="No Assembly BOM OData page found. In BC, go to Web Services → New → Object Type: Page, Object ID: 36, Service Name: AssemblyBOM, Published: true.";
    return result;
  }
  if(onProgress)onProgress(-1,bomRows.length,"Clearing existing BOM lines…");
  try{
    const clear=await bcClearAssemblyBOMLines(parentItemNo,bomPage);
    result.deleted=clear.deleted;
    if(clear.errors.length)result.errors.push(...clear.errors.map(e=>"[clear] "+e));
  }catch(ce){result.errors.push("[clear] "+ce.message);}
  const addResult=await bcAddAssemblyBOMLines(parentItemNo,bomRows,onProgress,bomPage);
  result.added=addResult.added;
  result.skipped=addResult.skipped;
  result.errors.push(...addResult.errors);
  result.warning=addResult.warning;
  return result;
}

async function bcAddAssemblyBOMLines(parentItemNo,bomRows,onProgress,_bomPage){
  const result={added:0,skipped:0,errors:[],warning:""};
  if(!bomRows||!bomRows.length)return result;
  let bomPage=_bomPage||null;
  if(!bomPage){
    const allPages=await bcDiscoverODataPages();
    bomPage=allPages.find(n=>/assembly.*bom|bom.*comp/i.test(n))||null;
  }
  if(!bomPage){
    result.warning="No Assembly BOM OData page found. In BC, go to Web Services → New → Object Type: Page, Object ID: 36, Service Name: AssemblyBOM, Published: true.";
    return result;
  }
  for(let i=0;i<bomRows.length;i++){
    const row=bomRows[i];
    const pn=(row.partNumber||"").trim();
    if(!pn){result.skipped++;continue;}
    if(onProgress)onProgress(i,bomRows.length,pn);
    try{
      const r=await fetch(`${BC_ODATA_BASE}/${bomPage}`,{
        method:"POST",
        headers:{"Authorization":`Bearer ${_bcToken}`,"Content-Type":"application/json"},
        body:JSON.stringify({Parent_Item_No:parentItemNo,Type:"Item",No:pn,Quantity_per:+(row.qty||1)})
      });
      if(r.ok){result.added++;}
      else{const t=await r.text();result.errors.push(`${pn}: ${t.slice(0,120)}`);result.skipped++;}
    }catch(e){result.errors.push(`${pn}: ${e.message}`);result.skipped++;}
  }
  return result;
}

// ── SUPPLIER QUOTE IMPORT ──
function sqExtractMfr(raw){
  if(!raw||typeof raw!=='string')return{mfr:'',partNumber:raw||''};
  const t=raw.trim(),parts=t.split(' '),p=parts[0]||'';
  if(/^[A-Za-z]{2,6}$/.test(p))return{mfr:p.toUpperCase(),partNumber:parts.slice(1).join(' ').trim()};
  return{mfr:'',partNumber:t};
}
const SQ_NOTES=[
  {p:/CANCEL/i,n:'CANCEL ON ORDER'},{p:/NEVER ORDERED/i,n:'NEVER ORDERED'},
  {p:/NOT SUPPLY/i,n:'NOT SUPPLYING'},{p:/IN HOUSE/i,n:'MAKE IN HOUSE'},
  {p:/TBD/i,n:'TBD'},{p:/ON HOLD/i,n:'ON HOLD'},
];
function sqNormalize(raw){
  const{mfr,partNumber}=sqExtractMfr(raw.rawPartNumber||'');
  const isPriced=raw.qty!=null&&raw.price!=null&&!isNaN(raw.qty)&&!isNaN(raw.price);
  let notes='';for(const{p,n}of SQ_NOTES){if(p.test(raw.description||'')){notes=n;break;}}
  return{ln:raw.ln??null,mfr,partNumber,rawPartNumber:raw.rawPartNumber||'',description:raw.description||'',
    qty:isPriced?Number(raw.qty):null,price:isPriced?Number(raw.price):null,uom:raw.uom||'',
    extPrice:isPriced?Math.round(raw.qty*raw.price*100)/100:null,notes,isPriced,
    extractionWarning:raw.extractionWarning||null,
    bcItemId:null,bcItemDescription:null,bcCurrentCost:null,matchStatus:'unmatched',priceUpdateStatus:null,approved:true};
}
function sqValidateLineItems(items){
  const dupeLines=[],dupeParts=[];
  const lnMap={},pnMap={};
  items.forEach((item,i)=>{
    if(item.ln!=null){const k=String(item.ln);(lnMap[k]=lnMap[k]||[]).push(i);}
    if(item.rawPartNumber){const k=(item.rawPartNumber||'').toLowerCase().trim();(pnMap[k]=pnMap[k]||[]).push(i);}
  });
  Object.entries(lnMap).filter(([,a])=>a.length>1).forEach(([ln,idxs])=>dupeLines.push({ln:Number(ln),rows:idxs}));
  Object.entries(pnMap).filter(([,a])=>a.length>1).forEach(([,idxs])=>dupeParts.push({pn:items[idxs[0]].rawPartNumber,rows:idxs}));
  const missingLn=items.filter(item=>item.ln==null).length;
  return{dupeLines,dupeParts,missingLn,hasIssues:dupeLines.length>0||dupeParts.length>0};
}

// Vendor fuzzy matching for supplier → BC vendor auto-population
// First word of supplier name is heavily weighted — e.g. "Royal - Salt Lake City" → "Royal Wholesale"
function sqFuzzyMatchVendor(supplierName,vendors){
  if(!supplierName||!vendors.length)return null;
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\b(inc|llc|ltd|corp|co|company|the|and)\b/g,' ').replace(/\s+/g,' ').trim();
  const srcWords=norm(supplierName).split(' ').filter(w=>w.length>1);
  if(!srcWords.length)return null;
  const srcFirst=srcWords[0];
  let best=null,bestScore=0;
  for(const v of vendors){
    const vWords=norm(v.displayName).split(' ').filter(w=>w.length>1);
    if(!vWords.length)continue;
    // If first words match exactly, score gets a strong 0.6 base boost
    const firstMatch=srcFirst&&vWords[0]===srcFirst;
    const overlapMatched=srcWords.filter(sw=>vWords.some(vw=>vw===sw||vw.includes(sw)||sw.includes(vw)));
    const overlapScore=overlapMatched.length/Math.max(srcWords.length,vWords.length);
    const score=firstMatch?Math.max(0.6+overlapScore*0.4,overlapScore):overlapScore;
    if(score>bestScore){bestScore=score;best=v;}
  }
  return bestScore>=0.25?best:null;
}

// ── IMAGE RESIZE ──
function resizeImage(dataUrl,maxW=2800){
  return new Promise((res,rej)=>{
    if(!dataUrl){return rej(new Error("resizeImage: empty dataUrl"));}
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.95));c.width=0;c.height=0;
    };
    img.onerror=()=>rej(new Error("resizeImage: failed to load image"));
    img.src=dataUrl;
  });
}
// Resize specifically for AI API calls — Claude internally caps at 1568px, so sending larger is wasted bandwidth
function resizeForAnalysis(dataUrl,maxW=1568){return resizeImage(dataUrl,maxW);}

// ── COPY PROJECT ──
async function copyProject(uid,sourceProject,onProgress){
  const pp=onProgress||(()=>{});
  const src=sourceProject;
  const srcPanels=src.panels||[];

  // Step 1: Create new BC project with same customer
  pp({step:"bc",msg:"Creating BC project…",pct:5});
  if(!_bcToken)await acquireBcToken(true);
  if(!_bcToken)throw new Error("Could not connect to Business Central");
  const bc=await bcCreateProject(src.name+" (Copy)",src.bcCustomerNumber);

  // Step 2: Create panel task structure in BC
  pp({step:"tasks",msg:"Creating BC tasks…",pct:15});
  const panelStubs=srcPanels.map((p,i)=>({id:`panel-${i+1}`,name:p.name||`Panel ${i+1}`}));
  try{await bcCreatePanelTaskStructure(bc.number,src.name+" (Copy)",panelStubs);}catch(e){console.warn("Copy: task structure warning:",e.message);}

  // Step 3: Deep clone panels (BOM, validation, labor, pages metadata)
  pp({step:"clone",msg:"Cloning panel data…",pct:25});
  const newPanels=srcPanels.map((panel,i)=>{
    const newPages=(panel.pages||[]).map(pg=>({...pg,id:`pg-${Date.now()}-${Math.random().toString(36).slice(2,8)}`,dataUrl:undefined,storageUrl:undefined,_srcStorageUrl:pg.storageUrl||null,_srcPageId:pg.id}));
    const newBom=(panel.bom||[]).map(r=>({...r,id:`row-${Date.now()}-${Math.random().toString(36).slice(2,8)}`}));
    return{...panel,id:`panel-${i+1}`,pages:newPages,bom:newBom};
  });

  // Step 4: Save new project to Firestore (without images yet)
  pp({step:"save",msg:"Saving project…",pct:35});
  const newProj=await saveProject(uid,{
    name:src.name+" (Copy)",
    bcProjectId:bc.id,
    bcProjectNumber:bc.number,
    bcEnv:_bcConfig.env,
    bcCustomerNumber:src.bcCustomerNumber,
    bcCustomerName:src.bcCustomerName,
    status:src.status||"draft",
    panels:newPanels,
    quote:src.quote?{...src.quote}:undefined,
    createdAt:Date.now(),updatedAt:Date.now()
  });

  // Step 5: Copy page images from source to new project in Storage
  const allPages=newPanels.flatMap((panel,pi)=>(panel.pages||[]).map((pg,pgi)=>({pi,pgi,pg})));
  const totalPages=allPages.filter(x=>x.pg._srcStorageUrl).length;
  let copied=0;
  for(const{pi,pgi,pg}of allPages){
    if(!pg._srcStorageUrl)continue;
    pp({step:"images",msg:`Copying drawing ${copied+1}/${totalPages}…`,pct:35+Math.round((copied/Math.max(totalPages,1))*40)});
    try{
      const loaded=await ensureDataUrl({storageUrl:pg._srcStorageUrl});
      if(loaded.dataUrl){
        const newUrl=await uploadPageImage(uid,newProj.id,pg.id,loaded.dataUrl);
        newPanels[pi].pages[pgi].storageUrl=newUrl;
        newPanels[pi].pages[pgi].dataUrl=loaded.dataUrl;
      }
    }catch(e){console.warn("Copy image failed for page",pg._srcPageId,e.message);}
    copied++;
  }
  // Clean up temp fields
  newPanels.forEach(panel=>(panel.pages||[]).forEach(pg=>{delete pg._srcStorageUrl;delete pg._srcPageId;}));

  // Step 6: Re-save with storage URLs
  pp({step:"save2",msg:"Saving images…",pct:80});
  const finalProj=await saveProject(uid,{...newProj,panels:newPanels,updatedAt:Date.now()});

  // Step 7: Sync planning lines to BC for each panel
  pp({step:"sync",msg:"Syncing planning lines to BC…",pct:85});
  for(let i=0;i<newPanels.length;i++){
    pp({step:"sync",msg:`Syncing panel ${i+1}/${newPanels.length} to BC…`,pct:85+Math.round((i/newPanels.length)*12)});
    try{await bcSyncPanelPlanningLines(bc.number,i+1,newPanels[i]);}catch(e){console.warn("Copy: planning line sync failed for panel",i+1,e.message);}
  }

  pp({step:"done",msg:"Project copied!",pct:100});
  return finalProj;
}

async function uploadPageImage(uid,projectId,pageId,dataUrl){

  console.log("UPLOAD IMAGE: starting",pageId,"to",ref.fullPath);

async function ensureDataUrl(page){
  if(page.dataUrl)return page;
  if(!page.storageUrl)return page;
  try{
    // Get a fresh download URL from Firebase Storage SDK
    let url=page.storageUrl;
    const pathMatch=page.storageUrl.match(/\/o\/([^?]+)/);
    if(pathMatch){
      const storagePath=decodeURIComponent(pathMatch[1]);
      url=await fbStorage.ref(storagePath).getDownloadURL();
    }
    // Load via <img> + canvas to avoid CORS fetch issues
    const dataUrl=await new Promise((resolve,reject)=>{
      const img=new Image();
      img.crossOrigin="anonymous";
      img.onload=()=>{
        const c=document.createElement("canvas");
        c.width=img.naturalWidth;c.height=img.naturalHeight;
        c.getContext("2d").drawImage(img,0,0);
        resolve(c.toDataURL("image/jpeg",0.92));
      };
      img.onerror=()=>reject(new Error("Image load failed"));
      img.src=url;
    });
    return{...page,dataUrl};
  }catch(e){
    console.warn("ensureDataUrl failed for page",page.id,e);
    return page;
  }
}

function _libPath(uid){
  return _appCtx.configPath?`${_appCtx.configPath}/partLibrary`:`users/${uid}/config/partLibrary`;

function _libKey(manufacturer,description){
  const n=s=>(s||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
  return `${n(manufacturer)}||${n(description).slice(0,80)}`;
}
async function loadPartLibrary(uid){
  try{const d=await fbDb.doc(_libPath(uid)).get();return d.exists?(d.data().entries||[]):[];}
  catch(e){return[];}

async function savePartLibraryEntry(uid,{manufacturer,description,partNumber}){
  if(!partNumber||!partNumber.trim())return;
  if(!manufacturer&&!description)return;
  const path=_libPath(uid);
  let entries=[];
  try{const d=await fbDb.doc(path).get();if(d.exists)entries=d.data().entries||[];}catch(e){}
  const key=_libKey(manufacturer,description);
  const idx=entries.findIndex(e=>e.key===key);
  const entry={key,manufacturer:manufacturer||"",description:description||"",partNumber:partNumber.trim(),updatedAt:Date.now()};
  if(idx>=0)entries[idx]=entry;else entries.push(entry);
  await fbDb.doc(path).set({entries});
}
function findPartSuggestion(library,row){
  if(!library||!library.length)return null;
  if(row.partNumber&&row.partNumber.trim())return null;
  if(!row.manufacturer&&!row.description)return null;
  const n=s=>(s||"").toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
  const exact=library.find(e=>e.key===_libKey(row.manufacturer,row.description));
  if(exact)return exact.partNumber;
  const words=s=>s.split(/\s+/).filter(w=>w.length>2);
  const rowWords=words(n(row.description));
  if(rowWords.length<2)return null;
  const mfr=n(row.manufacturer);
  let best=null,bestScore=0;
  for(const e of library){
    const eMfr=n(e.manufacturer);
    if(mfr&&eMfr&&!eMfr.includes(mfr)&&!mfr.includes(eMfr))continue;
    const eWords=words(n(e.description));
    const common=rowWords.filter(w=>eWords.includes(w)).length;
    const score=common/Math.max(rowWords.length,eWords.length,1);
    if(score>0.6&&score>bestScore){bestScore=score;best=e.partNumber;}
  }
  return best;
}

  if(!wrongValue||!wrongValue.trim()||!correctValue||!correctValue.trim())return;
  const path=_libPath(uid);
  let corrections=[];
  try{const d=await fbDb.doc(path).get();if(d.exists)corrections=d.data().corrections||[];}catch(e){}
  const key=(wrongValue||"").trim().toLowerCase();
  const idx=corrections.findIndex(c=>c.key===key);
  const entry={key,wrongValue:wrongValue.trim(),correctValue:correctValue.trim(),description:description||"",manufacturer:manufacturer||"",updatedAt:Date.now()};
  if(idx>=0)corrections[idx]=entry;else corrections.push(entry);
  try{await fbDb.doc(path).set({corrections},{merge:true});}catch(e){}
}
function applyPartCorrections(corrections,bom){
  if(!corrections||!corrections.length)return bom;
  return bom.map(row=>{
    if(!row.partNumber||!row.partNumber.trim())return row;
    const key=(row.partNumber||"").trim().toLowerCase();
    const match=corrections.find(c=>c.key===key);
    return match?{...row,partNumber:match.correctValue,correctedByLibrary:true}:row;
  });
}

// ── BOM EXTRACTION PROMPT ──
const BOM_PROMPT=`You are an expert at reading UL508A industrial electrical control panel drawings.

TASK: Extract every line item from the BOM table on this drawing page.

STEP 1 — ANALYZE THE TABLE STRUCTURE FIRST:
Before extracting anything, carefully examine:
• All column headers exactly as printed
• Total number of data rows in the table (count them)
• Any multi-line cells, merged cells, or continuation rows
• Whether rows continue from a previous page (no header row visible)

STEP 2 — MAP COLUMNS:
• itemNo      → ITEM, Item #, Item No., LINE, Line #, No., or leftmost sequential number column
• qty         → QTY, Quantity, Qty., EA, Each
• partNumber  → "MFG/PART NO.", "Part No.", "Part #", "Cat. No.", "Catalog No.", "Model No.",
                "Order No.", "Product No.", "Stock No." — values are alphanumeric catalog codes
• manufacturer → Manufacturer, MFG, Brand, Make
• notes       → TAG, Tag No., Ref, Reference, Device ID — contains ref designators (CB1, M2, OL1…)
• description → Description, Item Description, Function, Material Description

STEP 3 — EXTRACT EVERY ROW (no skipping):
• Multi-line cells: if text wraps to the next printed line, it is ONE row — keep it as one item
• itemNo: copy exact value printed. Use "" if no item number column exists
• NEVER invent or use sequential row counts (1,2,3…) as partNumber values
• Blank / "—" / "N/A" in part number column → partNumber: ""
• Manufacturer prefix in part number cell: split it
  e.g. "SAGINAW SCE-24EL20X10SSLP" → manufacturer:"SAGINAW", partNumber:"SCE-24EL20X10SSLP"
  e.g. "ABB AF09-30-10-13" → manufacturer:"ABB", partNumber:"AF09-30-10-13"
• Multiple catalog codes in ONE cell (comma- or slash-separated): output a SEPARATE row for each
  e.g. "ABB KXTBRHEBFP, OXP10X225, OH865L10B" → three rows, each with same qty/manufacturer/notes
  First row: original description unchanged
  Each extra row: append " (sub-part)" to description
• Reference designators (CB1, M1, OL2, PB3, SS1…) → notes field only, never partNumber
• Include ALL data rows even when some fields are blank — only skip: column header row, totals rows, title block text, revision block rows

STEP 4 — CHARACTER ACCURACY (most critical step):
Each character in a part number must be verified individually. Common industrial drawing confusions:
• 0 (zero) vs O (letter-O): zero is narrower and has flat or angled cuts; O is a smooth oval
• 1 (one) vs I (capital-i) vs L (capital-L): check stroke widths and serif details carefully
• 2 vs Z — 5 vs S — 8 vs B — 6 vs G — 4 vs A — 9 vs q
• Q has a small tail/stroke inside the circle; O does not
• U vs V vs W — count the number of strokes and angles
• Hyphens matter: "100-C09D10" is different from "1OOC09D10"
• When unsure of a character: look at the full context of the part number format for that manufacturer
TRANSCRIBE EXACTLY what is printed — do NOT autocomplete, normalize, or guess part numbers

RETURN FORMAT:
Output ONLY a valid JSON array — no markdown, no explanation. Each object must have exactly:
{"itemNo":"","qty":1,"partNumber":"","description":"","manufacturer":"","notes":"","y_top":0.0,"y_bottom":0.0,"x_left":0.0,"x_right":1.0}

y_top and y_bottom are the top and bottom edges of this row as fractions of the total image height (0.0=top, 1.0=bottom). Be precise.
x_left and x_right are the left and right edges of the entire BOM TABLE (all columns) as fractions of the total image width. Exclude any schematic diagram, layout drawing, or whitespace to the left of the table — crop to where the BOM table columns begin and end. All rows on the same page share the same x_left/x_right values.

If no BOM table exists on this page, return [].`;

async function extractBomPage(dataUrl,feedback="",userNotes=""){
  const small=await resizeForAnalysis(dataUrl,2000); // BOM needs higher res for small text
  const b64=small&&small.split(",")[1];
  if(!b64){console.warn("extractBomPage: skipping — empty or invalid dataUrl");return[];}
  const feedbackSection=feedback?`\n\nCORRECTION INSTRUCTIONS FROM USER:\n${feedback}\nApply these corrections carefully and exactly as described.`:"";
  const notesSection=userNotes?`\n\nUSER NOTES ABOUT THESE DRAWINGS:\n${userNotes}\nKeep these notes in mind while extracting. They describe specific characteristics of this drawing set.`:"";
  // Use extended thinking so Claude reasons through the table structure before extracting
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-beta":"interleaved-thinking-2025-05-14","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:10000,
      thinking:{type:"enabled",budget_tokens:4000},
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:BOM_PROMPT+feedbackSection+notesSection}
      ]}]
    })
  });
  const d=await resp.json();
  if(!resp.ok)throw new Error(d.error?.message||"API error");
  // Find the text block (thinking blocks come first)
  const raw=(d.content||[]).find(b=>b.type==="text")?.text||"";
  console.log("Claude raw response:",raw);
  try{
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const m=cleaned.match(/\[[\s\S]*\]/);
    if(!m){console.warn("No JSON array found in response");return[];}
    const items=JSON.parse(m[0]);
    // Post-process: split any rows where partNumber still contains multiple values
    const expanded=[];
    for(const item of items){
      const pn=(item.partNumber||"").trim();
      // Detect multiple part numbers: split on " / " or ", " but only when each segment looks like a part number
      // (contains letters+numbers, not just a description phrase)
      const segments=pn.split(/\s*\/\s*|\s*,\s*/).map(s=>s.trim()).filter(s=>s&&/[A-Z0-9]{3,}/i.test(s));
      if(segments.length>1){
        for(let si=0;si<segments.length;si++){
          const base=item.description||"";
        const alreadyLabeled=base.includes("(sub-part from above)");
        const desc=si===0?base:(alreadyLabeled?base:base+" (sub-part from above)");
          expanded.push({...item,partNumber:segments[si],description:desc});
        }
      } else {
        expanded.push(item);
      }
    }
    return expanded;
  }catch(e){console.error("JSON parse error:",e,raw);return[];}
}

// ── SCHEMATIC ANALYSIS PROMPT ──
const SCHEMATIC_PROMPT=`You are reading a UL508A electrical control panel schematic page.

Extract and return ONLY valid JSON:
{
  "tags": [{"tag":"CB100","type":"breaker"}, {"tag":"PB1","type":"pushbutton"}],
  "wires": [
    {"w":"L1 bus to CB1 top","internal":true},
    {"w":"CB1 bottom to T1 H1","internal":true},
    {"w":"TB1-3 to output signal","internal":false}
  ]
}

Rules:
- tags: array of objects with "tag" (alphanumeric device ID) and "type" (one of: breaker, contactor, overload, relay, transformer, fuse, disconnect, drive, plc_io, terminal_block, pushbutton, pilot_light, selector_switch, hmi, e_stop, horn, power_supply, surge, meter, other)

Wire listing rules (CRITICAL — follow exactly):
- List every solid-line connection as an object with "w" (description) and "internal" (boolean).
- "internal": true means BOTH endpoints are devices, terminal blocks, or busses INSIDE the panel.
- "internal": false means one or both endpoints leave the panel (output signals, incoming supplies, field wires, external destinations).

Examples of internal=TRUE: bus to breaker, breaker to contactor, switch to terminal block, bus to switch.
Examples of internal=FALSE: terminal block to "output signal", "incoming supply" to terminal block, anything to/from a named signal like "high torque shutdown", "clarifier start", "alarm output", anything described as an output or external signal.

- The vertical bus lines themselves (L1, L2, L3, N) are NOT wires — do not list them.
- Dashed lines are NOT wires — do not list them.
- Ground symbols and internal device connections are NOT wires.
- If a line branches at a junction, each branch is a separate wire.
- Be conservative. When in doubt, mark internal: false.
- Return JSON only, no explanation`;

async function analyzeSchematicPage(dataUrl,userNotes=""){
  const small=await resizeForAnalysis(dataUrl,1568);
  const b64=small&&small.split(",")[1];
  if(!b64){console.warn("analyzeSchematicPage: skipping — empty or invalid dataUrl");return{tags:[],wireCount:0,wireTerminations:0};}
  const notesAppend=userNotes?`\n\nUSER NOTES ABOUT THESE DRAWINGS:\n${userNotes}`:"";
  const raw=await apiCall({
    model:"claude-sonnet-4-6",
    max_tokens:4000,
    messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
      {type:"text",text:SCHEMATIC_PROMPT+notesAppend}
    ]}]
  });
  console.log("Schematic Claude response:",raw);
  try{
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const m=cleaned.match(/\{[\s\S]*\}/);
    if(!m){console.warn("No JSON object found in schematic response");return{tags:[],wireCount:0,wireTerminations:0};}
    const parsed=JSON.parse(m[0]);
    // Normalize tags: accept both old ["CB100",...] and new [{tag,type},...] formats
    const rawTags=Array.isArray(parsed.tags)?parsed.tags:[];
    const tags=rawTags.map(t=>typeof t==="string"?{tag:t,type:"other"}:({tag:t.tag||"",type:t.type||"other"}));
    const wires=Array.isArray(parsed.wires)?parsed.wires:[];
    const internalWires=wires.filter(w=>typeof w==="object"?w.internal:true);
    const externalWires=wires.filter(w=>typeof w==="object"&&!w.internal);
    const wireCount=internalWires.length||+parsed.wireCount||0;
    const wireTerminations=wireCount*2;
    console.log(`WIRE COUNT: ${internalWires.length} internal, ${externalWires.length} external, ${wires.length} total`);
    console.log("Wires INTERNAL (counted):",internalWires.map(w=>w.w||w));
    console.log("Wires EXTERNAL (excluded):",externalWires.map(w=>w.w||w));
    return{tags,wireCount,wireTerminations};
  }catch(e){console.error("Schematic JSON parse error:",e,raw);return{tags:[],wireCount:0,wireTerminations:0};}
}

function mergeLayoutResults(layouts){
  console.log("MERGE LAYOUTS: "+layouts.length+" layout results to merge");
  layouts.forEach((l,i)=>console.log("Layout result "+i+":",JSON.stringify({doorCutouts:l?.doorCutouts?.length,backpanelDevices:l?.backpanelDevices?.length})));
  const merged={doorCutouts:[],backpanelDevices:[],ductRuns:[],dinRails:[],sideTopDevices:[],enclosure:null};
  for(const l of layouts){
    if(!l)continue;
    if(l.enclosure&&!merged.enclosure)merged.enclosure=l.enclosure;
    if(Array.isArray(l.doorCutouts))merged.doorCutouts.push(...l.doorCutouts);
    if(Array.isArray(l.backpanelDevices))merged.backpanelDevices.push(...l.backpanelDevices);
    if(Array.isArray(l.ductRuns))merged.ductRuns.push(...l.ductRuns);
    if(Array.isArray(l.dinRails))merged.dinRails.push(...l.dinRails);
    if(Array.isArray(l.sideTopDevices))merged.sideTopDevices.push(...l.sideTopDevices);
  }
  // Deduplicate door cutouts by tag (same device may appear on multiple layout pages)
  const seenDoor=new Set();
  merged.doorCutouts=merged.doorCutouts.filter(d=>{
    const key=(d.tag||"").toUpperCase();
    if(!key||seenDoor.has(key))return false;
    seenDoor.add(key);return true;
  });
  // Deduplicate backpanel devices by tag
  const seenBack=new Set();
  merged.backpanelDevices=merged.backpanelDevices.filter(d=>{
    const key=(d.tag||"").toUpperCase();
    if(!key||seenBack.has(key))return false;
    seenBack.add(key);return true;
  });
  console.log("AFTER DEDUP: doorCutouts="+merged.doorCutouts.length+", backpanelDevices="+merged.backpanelDevices.length);
  // Deduplicate side/top devices by tag
  const seenSide=new Set();
  merged.sideTopDevices=merged.sideTopDevices.filter(d=>{
    const key=(d.tag||"").toUpperCase();
    if(!key||seenSide.has(key))return false;
    seenSide.add(key);return true;
  });
  // Compute derived counts
  const ductFeet=merged.ductRuns.reduce((s,r)=>s+(r.lengthFt||0),0);
  const dinFeet=merged.dinRails.reduce((s,r)=>s+(r.lengthFt||0),0);
  const ductDinFeet=Math.round((ductFeet+dinFeet)*10)/10;
  // Categorize side/top devices by location and type
  const topBeaconCount=merged.sideTopDevices.filter(d=>d.location==="top"||d.type==="beacon").length;
  const squareCutoutCount=merged.sideTopDevices.filter(d=>d.location!=="top"&&d.type!=="beacon"&&d.type!=="fan"&&d.type!=="air_conditioner").length;
  const sideTopSmallCount=merged.sideTopDevices.filter(d=>d.type==="fan").length;
  const sideTopLargeCount=merged.sideTopDevices.filter(d=>d.type==="air_conditioner").length;
  // Compute unified side-mounted component labor
  const sideDevices=merged.sideTopDevices.filter(d=>d.location!=="top"&&d.type!=="beacon");
  let sideDeviceMinutes=0;
  for(const d of sideDevices){
    if(d.type==="fan"){sideDeviceMinutes+=120;}
    else if(d.type==="air_conditioner"){sideDeviceMinutes+=240;}
    else if(d.type==="fan_shroud"){
      const maxDim=Math.max(d.widthIn||0,d.heightIn||0);
      if(maxDim<4)sideDeviceMinutes+=90;
      else if(maxDim<=6)sideDeviceMinutes+=120;
      else sideDeviceMinutes+=180;
    }
    else{sideDeviceMinutes+=180;} // horn, conduit_hub, other
  }
  const sideDeviceHours=Math.round(sideDeviceMinutes/60*100)/100;
  const sideDeviceCount=sideDevices.length;
  // Panel holes: door cutouts (HMI=25 eq) + top beacons (1 hole each)
  const doorHoles=merged.doorCutouts.reduce((s,c)=>s+(c.type==="hmi"?LABOR_RATES.hmiHoleEquivalent:1),0);
  const panelHoles=doorHoles+topBeaconCount;
  const doorDeviceCount=merged.doorCutouts.length;
  const backpanelDeviceCount=merged.backpanelDevices.length;
  return{...merged,ductDinFeet,panelHoles,doorDeviceCount,backpanelDeviceCount,sideTopSmallCount,sideTopLargeCount,squareCutoutCount,topBeaconCount,sideDeviceHours,sideDeviceCount};
}

// Detect zoomed/duplicate pages among same-type pages (BP, ENC, BOM with 2+ pages)
async function detectZoomedPages(pagesOfType){
  if(!_apiKey||pagesOfType.length<2)return[];
  try{
    const batch=pagesOfType.slice(0,6);
    const imageContent=batch.map((pg,i)=>[
      {type:"text",text:`Page ${i+1}:`},
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:(pg.dataUrl||"").split(",")[1]}}
    ]).flat();
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":_apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:[
        ...imageContent,
        {type:"text",text:`These ${batch.length} drawing pages are all tagged as the same type. Identify any that are clearly zoomed-in detail sections showing just a portion of content that already appears in full on another page. These zoomed pages duplicate information and should be excluded from processing.\nReturn ONLY JSON array: [{"idx":0,"isZoomed":false},{"idx":1,"isZoomed":true},...] for all ${batch.length} pages. If uncertain, set isZoomed:false.`}
      ]}]})
    });
    const data=await resp.json();
    const text=data.content?.[0]?.text||"";
    const m=text.match(/\[[\s\S]*\]/);
    if(!m)return[];
    const results=JSON.parse(m[0]);
    return results.filter(r=>r.isZoomed).map(r=>batch[r.idx]?.id).filter(Boolean);
  }catch(e){console.warn("detectZoomedPages:",e);return[];}
}

// ── PANEL VALIDATION ──
async function runPanelValidation(panel,onProgress,bomPromise=null){
  let schematicPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("schematic")&&(p.dataUrl||p.storageUrl));
  let backpanelPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("backpanel")&&(p.dataUrl||p.storageUrl));
  let enclosurePages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("enclosure")&&(p.dataUrl||p.storageUrl));
  let layoutPages=(panel.pages||[]).filter(p=>getPageTypes(p).includes("layout")&&(p.dataUrl||p.storageUrl)); // legacy
  if(!schematicPages.length&&!backpanelPages.length&&!enclosurePages.length&&!layoutPages.length)return{validation:null,laborData:null};
  // Ensure dataUrls for pages loaded from Storage
  schematicPages=await Promise.all(schematicPages.map(ensureDataUrl));
  backpanelPages=await Promise.all(backpanelPages.map(ensureDataUrl));
  enclosurePages=await Promise.all(enclosurePages.map(ensureDataUrl));
  layoutPages=await Promise.all(layoutPages.map(ensureDataUrl));

  // 1. Schematic + layout analysis (parallel) — with real progress tracking
  let allTags=[],totalWires=0,totalTerminations=0;
  let layoutMerged=null;
  const totalPages=schematicPages.length+backpanelPages.length+enclosurePages.length+layoutPages.length;
  let donePages=0;
  const reportProgress=()=>{if(onProgress&&totalPages>0)onProgress(Math.round((donePages/totalPages)*90));};
  if(onProgress)onProgress(0);
  // Load layout learning for AI hints
  const llHint=buildLayoutLearningHint(await loadLayoutLearning(_appCtx.uid).catch(()=>[]));
  const userNotes=panel.extractionNotes||"";
  const [schResults,bpResults,encResults,layResults]=await Promise.all([
    parallelMap(schematicPages,async pg=>{const r=await analyzeSchematicPage(pg.dataUrl,userNotes);donePages++;reportProgress();return r;},4),
    parallelMap(backpanelPages,async pg=>{const r=await analyzeBackpanelPage(pg.dataUrl,userNotes);donePages++;reportProgress();return r;},4),
    parallelMap(enclosurePages,async pg=>{const r=await analyzeEnclosurePage(pg.dataUrl,llHint,userNotes);donePages++;reportProgress();return r;},4),
    parallelMap(layoutPages,async pg=>{const r=await analyzeLayoutPage(pg.dataUrl,llHint,userNotes);donePages++;reportProgress();return r;},4)
  ]);
  if(onProgress)onProgress(92);
  for(const result of schResults){
    allTags=[...allTags,...result.tags];
    totalWires+=result.wireCount;
    totalTerminations+=result.wireTerminations;
  }
  const layoutResults=[...bpResults,...encResults,...layResults].filter(Boolean);
  if(layoutResults.length>0)layoutMerged=mergeLayoutResults(layoutResults);
  // Normalize tag strings for BOM cross-reference (extract .tag from objects)
  const tagStrings=allTags.map(t=>typeof t==="string"?t:t.tag||"");
  const schematicTags=[...new Set(tagStrings.map(t=>t.trim()).filter(Boolean))];
  const allTagsSet=new Set(schematicTags.map(t=>t.toUpperCase()));

  // 3. Device classification: door vs backpanel by type
  const doorDevicesFromSchematic=allTags.filter(t=>{
    const type=typeof t==="string"?"other":(t.type||"other");
    return DOOR_DEVICE_TYPES.has(type);
  });
  const allDevicesFromSchematic=allTags.filter(t=>{
    const tag=typeof t==="string"?t:(t.tag||"");
    return tag.trim().length>0;
  });

  // 4. Build laborData counts
  const schDoorCount=doorDevicesFromSchematic.length;
  const layDoorCount=layoutMerged?layoutMerged.doorDeviceCount:0;
  const layBackCount=layoutMerged?layoutMerged.backpanelDeviceCount:0;
  const layoutPanelHoles=layoutMerged?layoutMerged.panelHoles:0;
  // When a dedicated enclosure page was analyzed, trust its physical door cutout count.
  // Schematic overcounts: it finds all door-type device symbols including remote stations and external devices.
  // Legacy layout pages (no enclosure page) may undercount, so fall back to schematic in that case.
  const hasEnclosureData=enclosurePages.length>0&&encResults.some(Boolean)&&layDoorCount>0;
  const doorDevices=hasEnclosureData?layDoorCount:(schDoorCount>0?schDoorCount:layDoorCount);
  const panelHoles=hasEnclosureData?layoutPanelHoles:(schDoorCount>0?Math.min(layoutPanelHoles,schDoorCount):layoutPanelHoles);
  // Total devices: door + backpanel (from layout if available, else schematic total)
  const allDevices=layoutMerged?(doorDevices+layBackCount):allDevicesFromSchematic.length;
  console.log("DOOR DEVICES: schematic="+schDoorCount+", enclosure/layout="+layDoorCount+", hasEnclosureData="+hasEnclosureData+", using="+doorDevices);
  console.log("ALL DEVICES: "+allDevices+", panelHoles="+panelHoles);
  const ductDinFeet=layoutMerged?layoutMerged.ductDinFeet:0;
  const hasLayoutData=!!layoutMerged;

  console.log("LABOR COUNTS: doorDevices="+doorDevices+", allDevices="+allDevices+", panelHoles="+panelHoles+", ductDinFeet="+ductDinFeet+", wireCount="+totalWires);
  const laborData={
    counts:{wireCount:totalWires,wireTerminations:totalTerminations,doorDevices,allDevices,panelHoles,ductDinFeet,sideTopSmallCount:layoutMerged?.sideTopSmallCount||0,sideTopLargeCount:layoutMerged?.sideTopLargeCount||0,squareCutoutCount:layoutMerged?.squareCutoutCount||0,sideDeviceHours:layoutMerged?.sideDeviceHours||0,sideDeviceCount:layoutMerged?.sideDeviceCount||0},
    overrides:{},
    defaults:{pmUnits:2,buyoffUnits:2,cratingUnits:1,labelHours:4},
    hasLayoutData,
    layoutAnalysis:layoutMerged,
    deviceClassification:allTags
  };

  // 5. BOM cross-reference — await bomPromise if BOM is being extracted in parallel
  const resolvedBom=bomPromise?(await bomPromise):(panel.bom||[]);
  const isAsShown=notes=>/^(as\s+shown|enclosure)$/i.test((notes||"").trim());
  const matched=[],missing=[],notTraceable=[];
  for(const item of resolvedBom){
    const notes=(item.notes||"").trim();
    if(isAsShown(notes)){notTraceable.push(item);continue;}
    const itemTags=notes.split(/[\s,;]+/).filter(Boolean);
    const found=itemTags.filter(t=>allTagsSet.has(t.toUpperCase()));
    if(found.length>0||itemTags.length===0)matched.push({item,found});
    else missing.push(item);
  }
  const allBomTags=new Set(resolvedBom.flatMap(i=>(i.notes||"").split(/[\s,;]+/).filter(Boolean).map(t=>t.toUpperCase())));
  const unaccounted=schematicTags.filter(t=>!allBomTags.has(t.toUpperCase()));
  const traceable=resolvedBom.length-notTraceable.length;
  const matchPct=traceable>0?matched.length/traceable:1;
  const confidence=matchPct>=0.9?"high":matchPct>=0.7?"medium":"low";

  if(onProgress)onProgress(98);
  const validation={runAt:Date.now(),schematicTags,wireCount:totalWires,matched,missingFromSchematic:missing,notTraceable,unaccountedTags:unaccounted,confidence};
  console.log("VALIDATION COMPLETE: pages="+totalPages+", tags="+schematicTags.length+", wires="+totalWires+", matched="+matched.length+", missing="+missing.length);
  return{validation,laborData};
}

// ── COMPLIANCE REVIEW — analyzes extracted data against UL508A/C22.2 standards ──
async function runComplianceReview(panel){
  const bom=panel.bom||[];

  const deviceTypes={};
  (val.schematicTags||[]).forEach(t=>{const type=typeof t==='string'?'other':(t.type||'other');deviceTypes[type]=(deviceTypes[type]||0)+1;});
  const deviceSummary=Object.entries(deviceTypes).map(([t,c])=>`${t}: ${c}`).join(', ');

  // Determine search terms for KB lookup
  const searchTerms=['UL508A','branch circuit','overcurrent','SCCR','short circuit','wiring','marking','labeling','enclosure','spacing','grounding','bonding'];
  // Add terms based on what's in the panel
  if(deviceTypes.drive||deviceTypes.vfd)searchTerms.push('variable frequency drive','motor circuit','overload');
  if(deviceTypes.transformer)searchTerms.push('transformer','control circuit','secondary');
  if(deviceTypes.disconnect)searchTerms.push('disconnect','supply circuit','panelboard');
  if(deviceTypes.plc_io)searchTerms.push('PLC','programmable','controller');
  if(deviceTypes.e_stop)searchTerms.push('emergency stop','red mushroom','operator safety');
  if(counts.wireCount>50)searchTerms.push('wire bending','wire duct fill','raceway');
  if(layout.enclosure)searchTerms.push('enclosure type','NEMA','ventilation','thermal');

  // Fetch relevant NIQ sections
  const niqDocs=await loadNIQ();
  const niqContext=searchNIQ(niqDocs,searchTerms);

  const prompt=`You are a UL508A certified panel shop inspector and compliance reviewer. You have just reviewed the extraction results from an industrial control panel drawing set. Analyze the data below for potential compliance concerns, design issues, and things the panel builder should verify.

EXTRACTED PANEL DATA:
- Wire Count: ${counts.wireCount||0} internal wires, ${counts.wireTerminations||0} terminations

- Panel Holes: ${counts.panelHoles||0}
- Duct & DIN Rail: ${counts.ductDinFeet||0} feet
- Side Devices: ${counts.sideDeviceCount||0}
${layout.enclosure?`- Enclosure: ${layout.enclosure.width||'?'}×${layout.enclosure.height||'?'}×${layout.enclosure.depth||'?'} ${layout.enclosure.unit||'in'}`:'- Enclosure: dimensions not extracted'}

SCHEMATIC DEVICE BREAKDOWN:
${deviceSummary||'No devices identified'}

BOM (${bom.length} items):
${bomSummary||'No BOM extracted'}

VALIDATION:
- Schematic tags found: ${(val.schematicTags||[]).length}
- BOM-to-schematic match confidence: ${val.confidence||'N/A'}
- Missing from schematic: ${(val.missingFromSchematic||[]).length} items
- Unaccounted tags: ${(val.unaccountedTags||[]).join(', ')||'none'}
${panel.extractionNotes?`
USER NOTES ABOUT THESE DRAWINGS:
${panel.extractionNotes}
`:''}${niqContext?`
ARC NEURAL IQ — REFERENCE STANDARDS (excerpts from UL508A, CSA C22.2 No. 286, UL508A Supplement, FUII, Certification Manual):
${niqContext}
`:''}
INSTRUCTIONS:
Analyze the above and return a JSON object with this structure:
{
  "concerns": [
    {
      "severity": "warning",
      "category": "SCCR",
      "title": "SCCR rating may need verification",
      "detail": "Panel contains VFDs and motor starters. The assembly SCCR must be calculated per UL508A Table SB4.1 considering the lowest-rated component in each branch circuit.",
      "reference": "UL508A Section SB4.1, Table SB4.1",

  "observations": [

    "Wire count of 45 is reasonable for 12 schematic devices"
  ],
  "checklist": [
    "Verify SCCR marking matches calculated value",
    "Confirm all branch circuits have proper overcurrent protection",
    "Check wire sizing per UL508A Table 28.1"
  ]
}

SEVERITY LEVELS:
- "critical": Likely code violation or safety issue that must be addressed before UL listing
- "warning": Potential concern that should be verified — may or may not be an issue depending on details not visible in drawings
- "info": Best practice recommendation or design optimization

CATEGORIES: SCCR, overcurrent_protection, wiring, grounding, spacing, marking, enclosure, thermal, emergency_stop, motor_circuit, control_circuit, component_rating, general

RULES:

// ── BURN STAMP INTO IMAGE — applies overlay text permanently to a dataUrl via canvas ──
async function burnStampCanvas(dataUrl,overlay){
  return new Promise(resolve=>{
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      canvas.width=img.width;canvas.height=img.height;
      ctx.drawImage(img,0,0);
      const barH=Math.max(24,Math.round(img.height*0.03));
      const fontSize=Math.max(12,Math.round(barH*0.58));
      // White semi-transparent background strip — matches drawing paper look
      ctx.fillStyle='rgba(255,255,255,0.88)';ctx.fillRect(0,0,img.width,barH);
      // Red border line at bottom of strip
      ctx.fillStyle='#cc0000';ctx.fillRect(0,barH-1,img.width,1);
      ctx.font=`bold ${fontSize}px Arial,sans-serif`;ctx.fillStyle='#cc0000';ctx.textBaseline='middle';
      const y=barH/2;const pad=Math.max(10,Math.round(img.width*0.012));
      ctx.textAlign='left';ctx.fillText((overlay.left||'').slice(0,55),pad,y);
      ctx.textAlign='center';ctx.fillText(overlay.center||'',img.width/2,y);
      ctx.textAlign='right';ctx.fillText((overlay.right||'').slice(0,65),img.width-pad,y);
      resolve(canvas.toDataURL('image/jpeg',0.93));
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

async function estimatePrices(items){
  const BATCH=10;

    try{
      const raw=await apiCall({
        model:"claude-sonnet-4-6",

        messages:[{role:"user",content:`${PRICING_PROMPT}\n${JSON.stringify(payload)}`}]
      });
      const cleaned=raw.replace(/```json|```/g,"").trim();
      const m=cleaned.match(/\[[\s\S]*\]/);

// ── PAGE TYPE DETECTION ──
const PAGE_TYPE_DETECT_PROMPT=`Classify this page from a UL508A industrial control panel drawing set.
Return ONLY a JSON object: {"types":[...],"sheetNo":"..."}

Types (use only these values):
"bom"       — Bill of Materials table with columns for qty, part number, description
"schematic" — Electrical ladder diagram or wiring schematic: ladder rungs, wire numbers, terminal numbers, coil/contact symbols, device tags like CB1, CR1, PB1
"backpanel" — Interior mounting plate, single front view only: DIN rails, wire duct, rows of breakers/contactors/relays/drives/PLCs/terminal blocks. NO side views, NO enclosure outline with dimensions
"enclosure" — Enclosure/cabinet drawing. MOST RELIABLE SIGN: a side view drawn beside or below the front view. Also: overall W×H×D dimensions labeled, door cutout holes for pushbuttons/HMIs, side-panel fans or AC units, title says Enclosure/Cabinet/Door Layout
"pid"       — Process & Instrumentation Diagram. UNIQUE SIGNS not found in schematics: two-letter ISA instrument codes (YA, HS, ZS, SA, FT, PT, LIC, PIC) inside circles paired with a tag number, OR "DI"/"DO" text inside diamond shapes, OR a box labeled "INSTRUMENT & FUNCTION LEGEND". A P&ID has NO wire numbers, NO terminal numbers, NO ladder rungs.

Use [] for title sheets, rev blocks, or unrecognized pages.
"sheetNo": sheet number from title block (e.g. "1 of 5"). "" if not found.
Example: {"types":["schematic"],"sheetNo":"3 of 8"}`;

async function detectPageTypes(dataUrl,learningExamples=[]){
  const b64=dataUrl&&dataUrl.split(",")[1];
  if(!b64||!_apiKey)return{types:[],sheetNo:""};
  try{
    const hint=buildLearningHint(learningExamples);
    const raw=await apiCall({
      model:"claude-haiku-4-5-20251001",
      max_tokens:120,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
        {type:"text",text:PAGE_TYPE_DETECT_PROMPT+hint}
      ]}]
    });
    const m=raw.replace(/```json|```/g,"").trim().match(/\{[\s\S]*\}/);
    if(!m)return{types:[],sheetNo:""};
    const obj=JSON.parse(m[0]);
    return{types:(obj.types||[]).filter(t=>["bom","schematic","backpanel","enclosure","pid"].includes(t)),sheetNo:obj.sheetNo||""};
  }catch(e){return{types:[],sheetNo:""};}
}

function calcConfidence(panel){
  const bom=panel.bom||[];
  const pages=panel.pages||[];
  const validation=panel.validation||null;

  // Pricing: BC/Manual=100%, AI=50%, Unpriced=0%
  let pricing=0;
  let bcCount=0,manualCount=0,aiCount=0,unpricedCount=0;
  if(bom.length){
    bom.forEach(r=>{
      if(r.priceSource==="bc"){bcCount++;}
      else if(r.priceSource==="manual"){manualCount++;}
      else if(r.priceSource==="ai"){aiCount++;}
      else{unpricedCount++;}
    });
    const total=bcCount*100+manualCount*100+aiCount*50;
    pricing=Math.round(total/bom.length);
  }

  // Wiring: derive from match data, factoring in accepted items
  let wiring=0;
  const acceptedArr=panel.wiringAccepted||[];
  const acceptedSet=new Set(acceptedArr.map(String));
  let matchedCount=0,missingArr=[],acceptedInMissing=0,ntCount=0,wiringTotal=0;
  if(validation){
    const matched=Array.isArray(validation.matched)?validation.matched:[];
    const missing=Array.isArray(validation.missingFromSchematic)?validation.missingFromSchematic:[];
    const nt=Array.isArray(validation.notTraceable)?validation.notTraceable:[];
    matchedCount=matched.length;
    missingArr=missing;
    ntCount=nt.length;
    acceptedInMissing=missing.filter(m=>acceptedSet.has(String(m.id))).length;
    const effectiveMatched=matchedCount+acceptedInMissing;
    const effectiveMissing=missing.length-acceptedInMissing;
    const traceable=effectiveMatched+effectiveMissing;
    wiringTotal=traceable+ntCount;
    const matchPct=traceable>0?effectiveMatched/traceable:1;
    const conf=matchPct>=0.9?"high":matchPct>=0.7?"medium":"low";
    wiring=conf==="high"?100:conf==="medium"?70:conf==="low"?40:0;
  }

  // BOM Extraction: quality-scored per row + part number verification
  let bomExt=0;
  const bomPages=pages.filter(p=>getPageTypes(p).includes("bom"));
  const ocrBadChars=/[|{}~`\\^]/;
  const verif=panel.bomVerification||[];
  const verifMap={};verif.forEach(v=>{verifMap[String(v.id)]=v;});
  let cleanCount=0,flaggedRows=[];
  let verifiedCount=0,plausibleCount=0,suspectCount=0,uncheckedCount=0;
  if(bom.length>0){
    let totalPts=0;
    bom.forEach(r=>{
      let pts=100;const issues=[];
      const pn=(r.partNumber||"").trim();
      const desc=(r.description||"").trim();
      if(!pn&&desc){pts=0;issues.push("no part # with description");}
      else if(!pn){pts-=40;issues.push("no part #");}
      else{
        if(pn.length<=2){pts-=30;issues.push("part # very short");}
        else if(/^\d{1,3}$/.test(pn)){pts-=20;issues.push("part # looks numeric");}
        if(ocrBadChars.test(pn)){pts-=20;issues.push("suspect OCR chars");}
      }
      if(!desc){pts-=15;issues.push("no description");}
      if(!r.qty||+r.qty===0){pts-=10;issues.push("missing qty");}
      // Part number verification scoring
      const vr=verifMap[String(r.id)];
      if(vr){
        if(vr.status==="verified"){verifiedCount++;}
        else if(vr.status==="plausible"){plausibleCount++;pts-=10;issues.push("part # plausible but unverified");}
        else if(vr.status==="suspect"){suspectCount++;pts-=30;issues.push("part # not recognized");}
      }else if(pn.length>=3){uncheckedCount++;}
      pts=Math.max(pts,0);
      totalPts+=pts;
      if(issues.length)flaggedRows.push({id:r.id,partNumber:pn,issues,score:pts,verifStatus:vr?.status||null});
      else cleanCount++;
    });
    bomExt=Math.round(totalPts/bom.length);
  }else if(bomPages.length>0){
    bomExt=0;
  }

  const overall=Math.round((pricing+wiring+bomExt)/3);
  return{pricing,wiring,bomExt,overall,
    pricingDetail:{bcCount,manualCount,aiCount,unpricedCount,total:bom.length},
    wiringDetail:{matched:matchedCount,missing:missingArr,accepted:acceptedInMissing,notTraceable:ntCount,total:wiringTotal},
    bomDetail:{bomPages:bomPages.length,itemCount:bom.length,cleanCount,flaggedRows,verifiedCount,plausibleCount,suspectCount,uncheckedCount}
  };
}

function projectStatus(project){
  const panels=project.panels||[];
  if(!panels.length)return project.status||"draft";
  const readySet=new Set(["extracted","validated","costed","quoted","pushed_to_bc"]);
  const statuses=panels.map(p=>p.status||"draft");
  if(statuses.some(s=>!readySet.has(s)))return "in_progress";
  const rank={extracted:1,validated:2,costed:3,quoted:4,pushed_to_bc:5};
  const rankToStatus=["extracted","validated","costed","quoted","pushed_to_bc"];
  const maxRank=Math.max(...statuses.map(s=>rank[s]||1));
  return rankToStatus[maxRank-1]||"extracted";
}
