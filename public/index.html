// ── AI DATABASE PAGE (admin only) ──
function AIDatabasePage({uid,onBack}){
  const [cpd,setCpd]=useState(null);
  const [loading,setLoading]=useState(true);
  const [editingId,setEditingId]=useState(null);
  const [editNotes,setEditNotes]=useState("");
  const [saving,setSaving]=useState(false);
  const [filter,setFilter]=useState("");
  const [catalogOpen,setCatalogOpen]=useState(false);

  useEffect(()=>{
    loadCPD(uid).then(data=>{setCpd(data);setLoading(false);}).catch(()=>setLoading(false));
  },[uid]);

  async function saveAdminNotes(panelId){
    setSaving(true);
    const panels=(cpd.panels||[]).map(p=>p.panelId===panelId?{...p,adminNotes:editNotes}:p);
    const updated={...cpd,panels};
    await saveCPD(uid,updated);
    setCpd(updated);
    setSaving(false);
    setEditingId(null);
  }

  if(loading)return<div style={{padding:40,color:C.muted,fontSize:14}}>Loading AI Database…</div>;
  const panels=cpd?.panels||[];
  const products=cpd?.products||[];

  // Group panels by controlled equipment
  const groups={};
  panels.forEach(p=>{
    const equip=(p.controlledEquipment||'Unclassified').split(/,\s*/)[0].trim()||'Unclassified';
    if(!groups[equip])groups[equip]=[];
    groups[equip].push(p);
  });
  const sorted=Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0]));
  const filterLow=filter.toLowerCase();
  const filteredSorted=filter?sorted.map(([g,ps])=>[g,ps.filter(p=>{
    const hay=JSON.stringify(p).toLowerCase();
    return hay.includes(filterLow);
  })]).filter(([,ps])=>ps.length):sorted;

  return(
    <div style={{padding:"24px 32px",maxWidth:1400,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
        <button onClick={onBack} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,fontSize:12,padding:"5px 12px",cursor:"pointer"}}>← Back</button>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:"#a78bfa",letterSpacing:1}}>🧠 AI DATABASE</div>
          <div style={{fontSize:12,color:C.muted,marginTop:2}}>{panels.length} panels cataloged · {products.length} unique parts</div>
        </div>
        <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Filter by any field…"
          style={{marginLeft:"auto",background:"#0a0a16",border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:12,padding:"6px 12px",width:240,outline:"none"}}/>
      </div>

      {filteredSorted.length===0&&(
        <div style={{color:C.muted,fontSize:13,padding:"40px 0",textAlign:"center"}}>No panel data yet. Extractions will appear here automatically as panels are scanned.</div>
      )}

      {filteredSorted.map(([equipType,panelGroup])=>(
        <div key={equipType} style={{marginBottom:32}}>
          <div style={{fontSize:13,fontWeight:800,color:"#a78bfa",textTransform:"uppercase",letterSpacing:1,marginBottom:10,paddingBottom:6,borderBottom:`1px solid #a78bfa33`,display:"flex",alignItems:"center",gap:8}}>
            <span>⚡</span>{equipType}
            <span style={{fontSize:11,fontWeight:400,color:C.muted}}>({panelGroup.length} panel{panelGroup.length!==1?"s":""})</span>
          </div>
          {panelGroup.map(p=>(
            <div key={p.panelId} style={{background:"#0d0d1a",border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 18px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
                {/* Panel identity */}
                <div style={{minWidth:200,flex:"0 0 auto"}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:2}}>{p.panelName||p.drawingNo||'Unnamed Panel'}</div>
                  <div style={{fontSize:11,color:C.muted}}>{p.drawingNo&&<span style={{color:C.accent}}>{p.drawingNo} </span>}{p.panelType&&<span style={{color:C.sub}}>{p.panelType}</span>}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{p.scannedAt?new Date(p.scannedAt).toLocaleDateString():''}</div>
                </div>
                {/* Equipment + voltages */}
                <div style={{flex:1,minWidth:180}}>
                  {p.controlledEquipment&&<div style={{fontSize:11,color:C.sub,marginBottom:3}}><span style={{color:C.muted}}>Equipment: </span>{p.controlledEquipment}</div>}
                  {p.voltages&&(p.voltages.lineVoltage||p.voltages.controlVoltage)&&(
                    <div style={{fontSize:11,color:C.sub,marginBottom:3}}>
                      {p.voltages.lineVoltage&&p.voltages.lineVoltage!=='unknown'&&<span style={{marginRight:10}}><span style={{color:C.muted}}>Line: </span>{p.voltages.lineVoltage}</span>}
                      {p.voltages.controlVoltage&&p.voltages.controlVoltage!=='unknown'&&<span style={{marginRight:10}}><span style={{color:C.muted}}>Control: </span>{p.voltages.controlVoltage}</span>}
                      {p.voltages.motorVoltage&&p.voltages.motorVoltage!=='unknown'&&<span><span style={{color:C.muted}}>Motor: </span>{p.voltages.motorVoltage}</span>}
                    </div>
                  )}
                  {p.enclosureType&&p.enclosureType!=='unknown'&&<div style={{fontSize:11,color:C.sub,marginBottom:3}}><span style={{color:C.muted}}>Enclosure: </span>{p.enclosureType}</div>}
                  {p.plcBrand&&p.plcBrand!=='unknown'&&<div style={{fontSize:11,color:C.sub}}><span style={{color:C.muted}}>PLC: </span>{p.plcBrand}</div>}
                </div>
                {/* Specs */}
                <div style={{flex:"0 0 auto",display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-start"}}>
                  {[
                    {label:"Items",val:p.specs?.itemCount,color:C.accent},
                    {label:"Motors",val:p.specs?.motorCount,color:"#fb923c"},
                    {label:"PLC In",val:p.specs?.plcInputs,color:C.green},
                    {label:"PLC Out",val:p.specs?.plcOutputs,color:"#f472b6"},
                    {label:"Processors",val:p.specs?.plcProcessors,color:"#93c5fd"},

                  <div style={{marginTop:10,display:"flex",gap:5,flexWrap:"wrap"}}>
                    {Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,cnt])=>(
                      <span key={cat} style={{fontSize:10,background:"#1a1a2e",border:`1px solid ${C.border}`,borderRadius:4,padding:"2px 7px",color:C.muted}}>

              {/* Additional notes from extraction */}

                    <textarea value={editNotes} onChange={e=>setEditNotes(e.target.value)} rows={3} autoFocus
                      placeholder="Add additional details, corrections, or learning notes for this panel…"
                      style={{width:"100%",background:"#0a0814",border:"1px solid #a78bfa66",borderRadius:6,color:C.text,fontSize:12,padding:"7px 10px",resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      <button onClick={()=>saveAdminNotes(p.panelId)} disabled={saving}
                        style={btn("#1a0a2a","#a78bfa",{fontSize:12,border:"1px solid #a78bfa66",opacity:saving?0.5:1})}>
                        {saving?"Saving…":"Save Notes"}
                      </button>
                      <button onClick={()=>setEditingId(null)} style={btn(C.border,C.muted,{fontSize:12})}>Cancel</button>
                    </div>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    {p.adminNotes?(
                      <div style={{flex:1,fontSize:11,color:"#c4b5fd",lineHeight:1.5,background:"#1a0a2a",borderRadius:6,padding:"6px 10px",border:"1px solid #a78bfa33"}}>
                        <span style={{fontSize:10,fontWeight:700,color:"#a78bfa",marginRight:6}}>ADMIN:</span>{p.adminNotes}

                      <div style={{flex:1,fontSize:11,color:C.muted,fontStyle:"italic"}}>No admin notes yet</div>

                      {p.adminNotes?"Edit Notes":"+ Add Notes"}

              </div>
            </div>
          ))}
        </div>
      ))}

      {/* Products summary */}
      {products.length>0&&(
        <div style={{marginTop:16,paddingTop:24,borderTop:`1px solid ${C.border}`}}>
          <div onClick={()=>setCatalogOpen(o=>!o)}
            style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:catalogOpen?12:0}}>
            <span style={{fontSize:13,transition:"transform 0.15s",display:"inline-block",transform:catalogOpen?"rotate(90deg)":"none",color:"#a78bfa"}}>▸</span>
            <div style={{fontSize:13,fontWeight:800,color:"#a78bfa",textTransform:"uppercase",letterSpacing:1}}>📦 Product Catalog</div>
            <span style={{fontSize:11,color:C.muted,fontWeight:400}}>({products.length} parts)</span>
          </div>
          {catalogOpen&&(
            <>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:8}}>
                {products.filter(p=>!filter||JSON.stringify(p).toLowerCase().includes(filterLow)).slice(0,100).map(p=>(
                  <div key={p.partNumber} style={{background:"#0d0d1a",border:`1px solid ${C.border}`,borderRadius:6,padding:"9px 12px",fontSize:11}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <span style={{fontWeight:700,color:C.accent}}>{p.partNumber}</span>
                      <span style={{fontSize:9,background:C.border,borderRadius:3,padding:"1px 5px",color:C.muted}}>{p.category}</span>
                      {p.seenCount>1&&<span style={{fontSize:9,color:C.green}}>×{p.seenCount}</span>}
                      {p.enriched&&<span style={{fontSize:9,color:"#a78bfa"}}>✓ enriched</span>}
                    </div>
                    <div style={{color:C.sub,marginBottom:2}}>{p.description}</div>
                    {p.manufacturer&&<div style={{color:C.muted}}>MFR: {p.manufacturer}</div>}
                    {p.shortSpec&&<div style={{color:C.muted,fontStyle:"italic",marginTop:2}}>{p.shortSpec}</div>}
                    {p.enriched&&(p.approvals?.ul||p.approvals?.ce||p.approvals?.csa)&&(
                      <div style={{marginTop:3,display:"flex",gap:4}}>
                        {['ul','ce','csa'].filter(k=>p.approvals[k]&&p.approvals[k]!=='unknown').map(k=>(
                          <span key={k} style={{fontSize:9,background:p.approvals[k]==='yes'?"#14532d":"#1a1a1a",border:`1px solid ${p.approvals[k]==='yes'?"#22c55e":C.border}`,borderRadius:3,padding:"1px 5px",color:p.approvals[k]==='yes'?"#4ade80":C.muted,textTransform:"uppercase"}}>{k}: {p.approvals[k]}</span>

    </div>
  );
}

function Dashboard({uid,userFirstName,projects,loading,onOpen,onNew,onDelete,onAccept,onTransfer,onUpdateProject}){
  const [groupBy,setGroupBy]=useState("status");
  const [hideImported,setHideImported]=useState({});
  const [dragProjectId,setDragProjectId]=useState(null);
  const [dropTarget,setDropTarget]=useState(null);
  const bgTasks=useBgTasks();

  function groupProjects(list){
    if(groupBy==="customer"){
      const map={};
      list.forEach(p=>{
        const key=p.bcCustomerName||"No Customer";
        if(!map[key])map[key]=[];
        map[key].push(p);
      });
      return Object.keys(map).sort((a,b)=>a==="No Customer"?1:b==="No Customer"?-1:a.localeCompare(b)).map(k=>({label:k,items:map[k],customerNumber:map[k].find(p=>p.bcCustomerNumber)?.bcCustomerNumber||null}));
    }
    if(groupBy==="date"){
      const map={};
      const maxTs={};
      list.forEach(p=>{
        const d=p.createdAt||p.updatedAt||0;
        const key=d?new Date(d).toLocaleDateString("en-US",{month:"long",year:"numeric"}):"Unknown Date";
        if(!map[key])map[key]=[];
        map[key].push(p);
        if(d>=(maxTs[key]||0))maxTs[key]=d;
      });
      return Object.keys(map).sort((a,b)=>{
        if(a==="Unknown Date")return 1;
        if(b==="Unknown Date")return -1;
        return (maxTs[b]||0)-(maxTs[a]||0);
      }).map(k=>({label:k,items:map[k]}));
    }
    if(groupBy==="projectnum"){
      const sorted=[...list].sort((a,b)=>{
        const an=a.bcProjectNumber||"";
        const bn=b.bcProjectNumber||"";
        if(!an&&!bn)return 0;
        if(!an)return 1;
        if(!bn)return -1;
        return bn.localeCompare(an,undefined,{numeric:true});
      });
      return [{label:null,items:sorted}];
    }
    if(groupBy==="status"){
      const order=["draft","extracted","validated","costed","pushed_to_bc","quoted"];
      const labels={draft:"Draft",extracted:"Extracted",validated:"Validated",costed:"Costed",pushed_to_bc:"Pushed to BC",quoted:"Quoted"};
      const map={};
      list.forEach(p=>{const st=projectStatus(p);if(!map[st])map[st]=[];map[st].push(p);});
      return order.map(k=>({label:labels[k],items:map[k]||[]}));
    }
    if(groupBy==="imported"){
      return [{label:null,items:list.filter(p=>p.importedFromBC)}];
    }
    return [{label:null,items:list}];
  }

  async function assignCustomer(projectId,customerName,customerNumber){
    const proj=projects.find(p=>p.id===projectId);
    if(!proj||proj.bcCustomerName)return;
    const updated={...proj,bcCustomerName:customerName,bcCustomerNumber:customerNumber,updatedAt:Date.now()};
    await onUpdateProject(updated);
    if(proj.bcProjectNumber&&customerNumber){
      try{
        if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
        if(!_bcToken){_bcToken=await acquireBcToken(true)||null;}
        await bcPatchJobOData(proj.bcProjectNumber,{Bill_to_Customer_No:customerNumber});
      }catch(e){console.warn("BC customer assign failed:",e);}
    }
  }
  const filterBtn=(label,val)=>(
    <button key={val} onClick={()=>setGroupBy(val)} style={{background:groupBy===val?C.accent:"#383850",color:groupBy===val?"#fff":C.muted,border:groupBy===val?`1.5px solid ${C.accent}`:"1.5px solid #7a7a9a",borderRadius:8,padding:"8px 20px",fontSize:14,cursor:"pointer",fontWeight:600,transition:"all 0.15s"}}>
      {label}
    </button>
  );

  return(
    <div style={{maxWidth:2100,margin:"0 auto",padding:32,minWidth:0,width:"100%",boxSizing:"border-box"}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:26,fontWeight:800,letterSpacing:-0.5}}>Projects</div>
        </div>
        <button data-tip="Start a new panel extraction project" onClick={onNew} style={btn(C.accent,"#fff",{display:"flex",alignItems:"center",gap:8,fontSize:14})}>
          <span style={{fontSize:18,lineHeight:1}}>+</span> New Project
        </button>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:groupBy!=="imported"?8:24}}>
        {filterBtn("By Status","status")}
        {filterBtn("By Customer","customer")}
        {filterBtn("By Date","date")}
        {filterBtn("By Project #","projectnum")}
        {filterBtn("Imported","imported")}
        {filterBtn("All","all")}
      </div>
      {groupBy!=="imported"&&(
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none",fontSize:13,color:C.muted}}>
            <input type="checkbox" checked={!!hideImported[groupBy]} onChange={e=>setHideImported(h=>({...h,[groupBy]:e.target.checked}))}
              style={{accentColor:C.accent,width:14,height:14,cursor:"pointer"}}/>
            Hide Imported
          </label>
        </div>
      )}

      {loading&&(
        <div style={{textAlign:"center",padding:80,color:C.muted}}>
          <div className="spin" style={{fontSize:24,marginBottom:12}}>◌</div>
          <div>Loading projects…</div>
        </div>
      )}

      {(()=>{
        const myProjects=projects.filter(p=>(!p.transferred||p.transferredTo!==uid)&&(groupBy==="imported"||!hideImported[groupBy]||!p.importedFromBC));
        const transferred=projects.filter(p=>p.transferred&&p.transferredTo===uid);
        const groups=groupProjects(myProjects);
        return(<>
          {!loading&&myProjects.length===0&&transferred.length===0&&(
            <div style={{textAlign:"center",padding:80,color:C.muted}}>
              <div style={{fontSize:52,marginBottom:16,opacity:0.2}}>⬡</div>
              <div style={{fontSize:18,fontWeight:700,color:C.sub,marginBottom:8}}>No projects yet</div>
              <div style={{fontSize:13,marginBottom:24,lineHeight:1.7}}>Upload scanned UL508A drawings to extract<br/>BOM data, validate schematics, and generate quotes.</div>
              <button onClick={onNew} style={btn(C.accent,"#fff")}>Create First Project</button>
            </div>
          )}
          {(groupBy==="customer"||groupBy==="status")?(
            <div style={{display:"flex",gap:16,alignItems:"flex-start",width:"100%",paddingBottom:8}}>
              {groups.map((g,gi)=>{
                const statusColColors={Draft:C.muted,Extracted:C.green,Validated:C.accent,Costed:C.green,"Pushed to BC":"#38bdf8",Quoted:C.yellow};
                const statusColBg={Draft:C.border,Extracted:C.greenDim,Validated:C.accentDim,Costed:"#052e1c","Pushed to BC":"#0d1f3c",Quoted:C.yellowDim};
                const colColor=groupBy==="status"?(statusColColors[g.label]||C.muted):C.sub;
                const colBg=groupBy==="status"?(statusColBg[g.label]||C.border):"#2a2a3e";
                const isNoCustomer=groupBy==="customer"&&g.label==="No Customer";
                const isDropTarget=groupBy==="customer"&&!isNoCustomer&&!!g.customerNumber&&!!dragProjectId;
                const isOver=dropTarget===gi;
                return(
                <div key={gi} style={{flex:"1 1 0",minWidth:180}}
                  onDragOver={isDropTarget?e=>{e.preventDefault();setDropTarget(gi);}:undefined}
                  onDragLeave={isDropTarget?e=>{if(!e.currentTarget.contains(e.relatedTarget))setDropTarget(null);}:undefined}
                  onDrop={isDropTarget?e=>{e.preventDefault();setDropTarget(null);if(dragProjectId)assignCustomer(dragProjectId,g.label,g.customerNumber);setDragProjectId(null);}:undefined}>
                  {g.label&&<div style={{background:isOver?C.accent:colBg,color:isOver?"#fff":colColor,borderRadius:8,fontSize:13,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,marginBottom:10,textAlign:"center",height:44,display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxSizing:"border-box",width:"100%",transition:"background 0.15s,color 0.15s",outline:isDropTarget&&dragProjectId?(isOver?"2px solid "+C.accent:"2px dashed "+C.accent+"66"):"none",outlineOffset:2}}><span>{g.label}</span><span style={{opacity:0.6,fontWeight:400}}>({g.items.length})</span></div>}
                  <div style={{display:"flex",flexDirection:"column",gap:8,borderRadius:8,padding:isOver?"6px":"0",background:isOver?"#1e2e1e":"transparent",transition:"background 0.15s,padding 0.15s"}}>
                    {g.items.map(p=>(
                      <ProjectTile key={p.id} p={p} onOpen={onOpen} onDelete={onDelete} onTransfer={onTransfer} userFirstName={userFirstName}
                        draggable={isNoCustomer}
                        onDragStart={isNoCustomer?e=>{e.dataTransfer.effectAllowed="move";setDragProjectId(p.id);}:undefined}
                        onDragEnd={isNoCustomer?()=>{setDragProjectId(null);setDropTarget(null);}:undefined}/>
                    ))}
                  </div>
                </div>
                );
              })}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:32}}>
              {groups.map((g,gi)=>(
                <div key={gi}>
                  {g.label&&<div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:12,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>{g.label}</div>}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
                    {g.items.map(p=>(
                      <ProjectTile key={p.id} p={p} onOpen={onOpen} onDelete={onDelete} onTransfer={onTransfer} userFirstName={userFirstName}/>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
          {transferred.length>0&&(
            <div style={{marginTop:48}}>
              <div style={{fontSize:14,fontWeight:700,color:C.yellow,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Transferred Projects</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:20}}>These projects were transferred to you. Accept them to add them to your project list.</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
                {transferred.map(p=>{
                  const activeTask=Object.values(bgTasks).find(t=>t.projectId===p.id&&(t.status==="running"||t.status==="done"||t.status==="error"));
                  const st=projectStatus(p);
                  const statusColors={draft:C.muted,in_progress:C.yellow,extracted:C.green,validated:C.accent,costed:C.green,pushed_to_bc:"#38bdf8",quoted:C.yellow};
                  const statusLabels={draft:"DRAFT",in_progress:"PROCESSING",extracted:"EXTRACTED",validated:"VALIDATED",costed:"COSTED",pushed_to_bc:"PUSHED TO BC",quoted:"QUOTED"};
                  return(
                  <div key={p.id} className="fade-in" onClick={()=>onOpen(p)}
                    style={{...card({padding:"10px 14px"}),cursor:"pointer",borderColor:C.yellow+"44",transition:"border-color 0.15s,transform 0.15s",display:"flex",flexDirection:"column"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=C.yellow;e.currentTarget.style.transform="translateY(-2px)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.yellow+"44";e.currentTarget.style.transform="none";}}>
                    <div style={{fontSize:10,color:C.yellow,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>From {p.transferredFrom?.email||"a removed member"}</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.3,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                    {p.bcCustomerName&&<div style={{fontSize:11,color:C.teal,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.bcCustomerName}</div>}
                    <div style={{fontSize:11,color:C.muted,marginBottom:"auto"}}>{p.createdAt?new Date(p.createdAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):p.updatedAt?new Date(p.updatedAt).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—"}</div>
                    {activeTask&&(
                      <div style={{marginTop:6}}>
                        <div style={{fontSize:10,color:activeTask.status==="error"?C.red:C.accent,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{activeTask.msg}</div>
                        {activeTask.status!=="error"?(
                          <div style={{width:"100%",height:4,background:C.border,borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:(activeTask.pct||0)+"%",background:`linear-gradient(90deg,${C.accent},#818cf8)`,borderRadius:4,transition:"width 0.4s"}}/>
                          </div>
                        ):null}
                      </div>
                    )}
                    <div style={{marginTop:5,marginBottom:6}}><Badge status={st}/></div>
                    <button onClick={e=>{e.stopPropagation();onAccept(p.id);}}
                      style={btn(C.accentDim,C.accent,{width:"100%",fontSize:12,padding:"6px 0",fontWeight:700,border:`1px solid ${C.accent}88`})}>
                      Accept into My Projects
                    </button>
                  </div>
                  );
                })}
              </div>
            </div>
          )}
        </>);
      })()}
    </div>
  );
}

// ── TRANSFER PROJECT MODAL ──
function TransferProjectModal({project,companyId,uid,userEmail,onTransferred,onClose}){
  const [members,setMembers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [recipientUid,setRecipientUid]=useState("");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    if(!companyId){setLoading(false);return;}
    fbDb.collection(`companies/${companyId}/members`).get()
      .then(snap=>{
        const all=snap.docs.map(d=>({uid:d.id,...d.data()})).filter(m=>m.uid!==uid);
        setMembers(all);setLoading(false);
      })
      .catch(e=>{setErr("Failed to load members: "+e.message);setLoading(false);});
  },[companyId]);

  async function doTransfer(){
    if(!recipientUid)return;
    setSaving(true);setErr("");
    try{
      const path=_appCtx.projectsPath||`users/${uid}/projects`;
      await fbDb.doc(`${path}/${project.id}`).update({
        transferred:true,
        transferredTo:recipientUid,
        transferredFrom:{uid,email:userEmail},
        createdBy:recipientUid,
      });
      onTransferred(project.id);
    }catch(e){setErr(e.message);setSaving(false);}
  }

  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,padding:24,width:"100%",maxWidth:420,display:"flex",flexDirection:"column",gap:16}}>
        <div style={{fontSize:16,fontWeight:700,color:C.text}}>Transfer Project</div>
        <div style={{fontSize:13,color:C.sub}}>
          Move <span style={{color:C.accent,fontWeight:600}}>{project.name}</span> to another team member. They'll receive it in their Transferred Projects section.
        </div>
        {loading?(
          <div style={{fontSize:13,color:C.muted}}>Loading members…</div>
        ):!companyId?(
          <div style={{fontSize:13,color:C.red}}>You must be in a Company workspace to transfer projects.</div>
        ):members.length===0?(
          <div style={{fontSize:13,color:C.muted}}>No other team members found.</div>
        ):(
          <>
            <div>
              <div style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Transfer To</div>
              <select value={recipientUid} onChange={e=>setRecipientUid(e.target.value)}
                style={{width:"100%",background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:recipientUid?C.text:C.muted,fontSize:14}}>
                <option value="">Select a team member…</option>
                {members.map(m=>(
                  <option key={m.uid} value={m.uid}>{m.email} ({m.role})</option>
                ))}
              </select>
            </div>
            {recipientUid&&<div style={{fontSize:11,color:C.muted}}>The project will move out of your list immediately. The recipient can accept it from their dashboard.</div>}
          </>
        )}
        {err&&<div style={{fontSize:12,color:C.red}}>{err}</div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} disabled={saving} style={btn(C.border,C.sub)}>Cancel</button>
          <button onClick={doTransfer} disabled={saving||!recipientUid||loading}
            style={btn(C.accent,"#fff",{opacity:(saving||!recipientUid||loading)?0.5:1})}>
            {saving?"Transferring…":"Transfer"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── PROJECT TILE ──
function ProjectTile({p,onOpen,onDelete,onTransfer,userFirstName,draggable:isDraggable,onDragStart,onDragEnd}){
  const bgTasks=useBgTasks();
  const customerLogo=useCustomerLogo(p.bcCustomerName||null);
  const activeTask=Object.values(bgTasks).find(t=>t.projectId===p.id&&(t.status==="running"||t.status==="done"||t.status==="error"));
  const st=projectStatus(p);
  const statusColors={draft:C.muted,in_progress:C.yellow,extracted:C.green,validated:C.accent,costed:C.green,quoted:C.yellow};
  const statusLabels={draft:"DRAFT",in_progress:"PROCESSING",extracted:"EXTRACTED",validated:"VALIDATED",costed:"COSTED",quoted:"QUOTED"};
  return(
  <div className="fade-in" onClick={()=>onOpen(p)}
    draggable={isDraggable||false}
    onDragStart={onDragStart}
    onDragEnd={onDragEnd}
    style={{...card({padding:"4px 10px"}),border:"1px solid #4a5080",cursor:isDraggable?"grab":"pointer",transition:"border-color 0.15s,transform 0.15s",position:"relative",display:"flex",flexDirection:"column",gap:1}}
    onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent+"99";e.currentTarget.style.transform="translateY(-2px)";}}
    onMouseLeave={e=>{e.currentTarget.style.borderColor="#4a5080";e.currentTarget.style.transform="none";}}>
    <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
      {customerLogo&&<img src={customerLogo} alt="" style={{width:22,height:22,objectFit:"contain",borderRadius:3,background:"#fff",padding:2,flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
      <div style={{fontSize:14,fontWeight:800,color:C.accent,whiteSpace:"nowrap",visibility:p.bcProjectNumber?"visible":"hidden",flexShrink:0}}>{p.bcProjectNumber||"–"}</div>
      <div style={{fontSize:14,color:C.text,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,visibility:p.bcCustomerName?"visible":"hidden"}}>{p.bcCustomerName||"–"}</div>
      {userFirstName&&<div style={{fontSize:9,color:C.muted,fontWeight:600,letterSpacing:0.3,maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textTransform:"uppercase",flexShrink:0}}>{userFirstName}</div>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
      <div style={{fontSize:17,fontWeight:700,color:C.green,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{p.name}</div>
      <div style={{flexShrink:0,fontSize:"0.75em"}}><Badge status={p.importedFromBC?"imported":st}/></div>
    </div>
    {activeTask&&(
      <div style={{marginTop:4}}>
        <div style={{fontSize:10,color:activeTask.status==="error"?C.red:C.accent,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{activeTask.msg}</div>
        {activeTask.status!=="error"?(
          <div style={{width:"100%",height:4,background:C.border,borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:(activeTask.pct||0)+"%",background:`linear-gradient(90deg,${C.accent},#818cf8)`,borderRadius:4,transition:"width 0.4s"}}/>
          </div>
        ):null}
      </div>
    )}
  </div>
  );
}

// ── APP ──
function App({user}){
  const [projects,setProjects]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("dashboard");
  const [openProject,setOpenProject]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showConfig,setShowConfig]=useState(false);
  const [companyId,setCompanyId]=useState(null);
  const [userRole,setUserRole]=useState(null);
  const [companyName,setCompanyName]=useState(null);
  const [companyLogo,setCompanyLogo]=useState(null);
  const [showTeam,setShowTeam]=useState(false);
  const [showSetup,setShowSetup]=useState(false);
  const [setupDismissed,setSetupDismissed]=useState(false);
  const [deleteConfirm,setDeleteConfirm]=useState(null); // {id, name}
  const [transferProject,setTransferProject]=useState(null); // project object
  const [userFirstName,setUserFirstName]=useState("");
  const [bcOnline,setBcOnline]=useState(!!_bcToken);
  const [bcLostAlert,setBcLostAlert]=useState(false);
  const bcOnlinePrev=useRef(!!_bcToken);
  const bgTasks=useBgTasks();
  const bgRunning=Object.values(bgTasks).filter(t=>t.status==="running");

  // Periodic BC connectivity ping every 2 minutes
  useEffect(()=>{
    const CHECK_MS=120000;
    const checkBc=async()=>{
      if(!_bcToken){
        const t=await acquireBcToken(false);
        if(!t){bcOnlinePrev.current=false;setBcOnline(false);return;}
      }
      try{
        const r=await fetch(`${BC_API_BASE}/companies?$top=1`,{headers:{"Authorization":`Bearer ${_bcToken}`}});
        if(r.status===401){_bcToken=null;bcOnlinePrev.current=false;setBcOnline(false);return;}
        const ok=r.ok;
        if(!ok&&bcOnlinePrev.current){setBcOnline(false);setBcLostAlert(true);}
        else if(ok&&!bcOnlinePrev.current){setBcOnline(true);}
        bcOnlinePrev.current=ok;
      }catch(e){
        if(bcOnlinePrev.current){setBcOnline(false);setBcLostAlert(true);}
        bcOnlinePrev.current=false;
      }
    };
    const early=setTimeout(checkBc,5000);
    const interval=setInterval(checkBc,CHECK_MS);
    return()=>{clearTimeout(early);clearInterval(interval);};
  },[]);

  // Splash screen state: "loading" → "shrinking" → "done"
  const [splash,setSplash]=useState("loading");
  const [splashPct,setSplashPct]=useState(0);
  const splashStartRef=useRef(Date.now());
  useEffect(()=>{
    const duration=3000;
    let raf;
    function tick(){
      const elapsed=Date.now()-splashStartRef.current;
      const pct=Math.min(100,Math.round((elapsed/duration)*100));
      setSplashPct(pct);
      if(elapsed<duration){raf=requestAnimationFrame(tick);}
      else{setSplash("shrinking");setTimeout(()=>setSplash("done"),800);}
    }
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[]);

  useEffect(()=>{
    (async()=>{
      _appCtx.uid=user.uid;
      const profile=await loadUserProfile(user.uid);
      if(profile?.companyId){
        _appCtx.companyId=profile.companyId;
        _appCtx.role=profile.role;
        _appCtx.projectsPath=`companies/${profile.companyId}/projects`;
        _appCtx.configPath=`companies/${profile.companyId}/config`;
        setCompanyId(profile.companyId);
        setUserRole(profile.role);
        try{
          const cd=await fbDb.doc(`companies/${profile.companyId}`).get();
          if(cd.exists){setCompanyName(cd.data().name||null);setCompanyLogo(cd.data().logoUrl||null);}
        }catch(e){}
      } else {
        _appCtx.projectsPath=`users/${user.uid}/projects`;
      }
      await Promise.all([loadApiKey(user.uid),loadPricingConfig(user.uid),loadDefaultBomItems(user.uid)]);
      fbDb.doc(`users/${user.uid}/config/profile`).get().then(d=>{if(d.exists)setUserFirstName(d.data().firstName||"");}).catch(()=>{});
      if(!_defaultBomItems.length){
        _defaultBomItems=[
          {partNumber:"JOB-BUYOFF",description:"Job Buyoff",manufacturer:"",qty:1,unitPrice:0,priceSource:null},
          {partNumber:"",description:"Crate",manufacturer:"",qty:1,unitPrice:0,priceSource:null}
        ];
        saveDefaultBomItems(user.uid,_defaultBomItems).catch(()=>{});
      }
      console.log("API key loaded:",_apiKey?"YES ("+_apiKey.slice(0,8)+"…)":"NO — set in Settings");
      setProjects(await loadProjects(user.uid));
      setLoading(false);
      // Auto-connect BC silently in background
      if(!_bcToken){acquireBcToken(false).then(async t=>{if(t){console.log("BC auto-connected silently");setBcOnline(true);bcOnlinePrev.current=true;setProjects(ps=>[...ps]);}}).catch(()=>{});}
    })();
  },[user.uid]);

  // Register handler so background extraction tasks can update App state after navigation
  useEffect(()=>{
    _appProjectUpdateFn=(liveProject)=>{
      setProjects(ps=>ps.map(x=>x.id===liveProject.id?liveProject:x));
      setOpenProject(prev=>prev?.id===liveProject.id?liveProject:prev);
    };
    return()=>{_appProjectUpdateFn=null;};
  },[]);

  // Poll BC every 5 minutes and import any projects not yet in ARC
  useEffect(()=>{
    if(!user?.uid)return;
    async function syncBcProjects(){
      if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
      if(!_bcToken)return;
      try{
        const [bcProjects,bcCustomers,odataProjects]=await Promise.all([bcLoadAllProjects(),bcLoadAllCustomers(),bcLoadAllProjectsOData()]);
        // Build OData lookup by project No for rich customer fields
        const odataByNo=Object.fromEntries(odataProjects.filter(op=>op.No).map(op=>[op.No,op]));
        const bcById=Object.fromEntries(bcProjects.filter(bp=>bp.id).map(bp=>[bp.id,bp]));
        const custByNumber=Object.fromEntries(bcCustomers.map(c=>[c.number,c.displayName]));
        function extractCustomer(bp){
          const odata=odataByNo[bp.number]||{};
          const custNo=odata.Sell_to_Customer_No||odata.CCS_Sell_to_Customer_No||odata.Bill_to_Customer_No||bp.billToCustomerNumber||bp.billToCustomerNo||"";
          const custName=odata.Sell_to_Customer_Name||odata.Bill_to_Name||bp.billToName||bp.billToCustomerName||(custNo?custByNumber[custNo]||"":"");
          return{bcCustomerNumber:custNo,bcCustomerName:custName};
        }
        setProjects(ps=>{
          const existingBcIds=new Set(ps.map(p=>p.bcProjectId).filter(Boolean));
          // Import new projects
          const toImport=bcProjects.filter(bp=>bp.id&&!existingBcIds.has(bp.id));
          const newProjects=toImport.map(bp=>({
            id:"arc-"+bp.id.replace(/-/g,""),
            name:bp.displayName||bp.number||"Imported Project",
            bcProjectId:bp.id,
            bcProjectNumber:bp.number||"",
            ...extractCustomer(bp),
            importedFromBC:true,
            status:"draft",
            panels:[],
            createdAt:Date.now(),
            updatedAt:Date.now()
          }));
          if(newProjects.length){console.log(`BC sync: importing ${newProjects.length} new project(s)`);newProjects.forEach(p=>saveProject(user.uid,p).catch(e=>console.warn("BC import save failed:",e)));}
          // Re-sync customer name on BC-linked projects missing it
          const toUpdate=ps.filter(p=>p.bcProjectId&&!p.bcCustomerName&&bcById[p.bcProjectId]);
          const updatedPs=ps.map(p=>{
            if(!p.bcProjectId||p.bcCustomerName)return p;
            const bp=bcById[p.bcProjectId];
            // Also try direct customer number lookup even without a bp match
            const custNo=p.bcCustomerNumber||"";
            const nameFromCustomers=custNo?custByNumber[custNo]||"":"";
            if(!bp&&!nameFromCustomers)return p;
            const cust=bp?extractCustomer(bp):{bcCustomerNumber:custNo,bcCustomerName:nameFromCustomers};
            if(!cust.bcCustomerName)return p;
            const updated={...p,...cust,updatedAt:Date.now()};
            saveProject(user.uid,updated).catch(e=>console.warn("BC customer resync failed:",e));
            return updated;
          });
          if(toUpdate.length)console.log(`BC sync: re-synced customer on ${toUpdate.length} project(s)`);
          return newProjects.length||toUpdate.length?[...newProjects,...updatedPs]:ps;
        });
      }catch(e){console.warn("BC project sync error:",e);}
    }
    // Run immediately on load (delay slightly to allow silent BC auth to complete)
    const initialTimer=setTimeout(syncBcProjects,3000);
    const interval=setInterval(syncBcProjects,5*60*1000);
    return()=>{clearTimeout(initialTimer);clearInterval(interval);};
  },[user?.uid]);

  function handleOpen(p){setOpenProject(p);setView("project");}
  function handleCreated(p){setShowNew(false);setProjects(ps=>[p,...ps]);setOpenProject(p);setView("project");}
  function handleChange(p){setProjects(ps=>ps.map(x=>x.id===p.id?p:x));setOpenProject(p);}
  function handleDelete(id,name,bcProjectId,bcProjectNumber){setDeleteConfirm({id,name,bcProjectId,bcProjectNumber});}
  async function confirmDelete(deleteFromBC){
    if(!deleteConfirm)return;
    if(deleteFromBC&&deleteConfirm.bcProjectId){
      await bcDeleteProject(deleteConfirm.bcProjectId);
    }
    await deleteProject(user.uid,deleteConfirm.id);
    setProjects(ps=>ps.filter(x=>x.id!==deleteConfirm.id));
    if(view==="project"&&openProject?.id===deleteConfirm.id){setView("dashboard");setOpenProject(null);}
    setDeleteConfirm(null);
  }
  function handleTransferDone(id){
    setProjects(ps=>ps.filter(p=>p.id!==id));
    if(view==="project"&&openProject?.id===id){setView("dashboard");setOpenProject(null);}
    setTransferProject(null);
  }

  async function handleAccept(id){
    const path=_appCtx.projectsPath||`users/${user.uid}/projects`;
    await fbDb.doc(`${path}/${id}`).update({
      transferred:firebase.firestore.FieldValue.delete(),
      transferredTo:firebase.firestore.FieldValue.delete(),
      transferredFrom:firebase.firestore.FieldValue.delete(),
      createdBy:user.uid,
    });
    setProjects(ps=>ps.map(p=>p.id===id?{...p,transferred:undefined,transferredTo:undefined,transferredFrom:undefined,createdBy:user.uid}:p));
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
      {/* ── SPLASH SCREEN ── */}
      {splash!=="done"&&(
        <div style={{position:"fixed",inset:0,zIndex:9999,background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          transition:"opacity 0.5s ease",opacity:splash==="shrinking"?0:1,pointerEvents:splash==="shrinking"?"none":"auto"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",
            transition:"all 0.7s cubic-bezier(0.4,0,0.2,1)",
            transform:splash==="shrinking"?"translateY(-44vh) scale(0.38)":"translateY(0) scale(1)"}}>
            <svg width="100" height="90" viewBox="0 0 100 90" fill="none" style={{marginBottom:12}}>
              <polygon points="50,4 96,86 4,86" stroke={C.accent} strokeWidth="3.5" strokeLinejoin="round" fill={C.accentDim}/>
              <polygon points="50,4 68,38 32,38" fill={C.accent} opacity="0.85"/>
              <line x1="50" y1="38" x2="50" y2="86" stroke={C.accent} strokeWidth="1.2" opacity="0.35"/>
              <line x1="26" y1="62" x2="74" y2="62" stroke={C.accent} strokeWidth="1.2" opacity="0.35"/>
            </svg>
            <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:80,fontWeight:900,letterSpacing:8,marginBottom:4,lineHeight:1,color:C.accent}}>ARC</span>
            <span style={{fontSize:15,color:C.muted,letterSpacing:2,marginBottom:32}}>by APEX Software</span>
          </div>
          {splash==="loading"&&(
            <div style={{width:280,height:4,background:C.border,borderRadius:4,overflow:"hidden",transition:"opacity 0.3s",opacity:splash==="loading"?1:0}}>
              <div style={{height:"100%",background:`linear-gradient(90deg,${C.accent},#818cf8)`,borderRadius:4,transition:"width 0.15s linear",width:splashPct+"%"}}/>
            </div>
          )}
        </div>
      )}
      {/* ── TOP MENU BAR (always visible) ── */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"8px 32px",display:"flex",alignItems:"center",minHeight:88,position:"relative"}}>
        <div style={{position:"absolute",left:"50%",top:"50%",transform:"translateX(-50%) translateY(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:5,pointerEvents:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",pointerEvents:"auto"}} onClick={()=>{setView("dashboard");setOpenProject(null);}}>
            <svg width="38" height="34" viewBox="0 0 100 90" fill="none">
              <polygon points="50,4 96,86 4,86" stroke={C.accent} strokeWidth="3.5" strokeLinejoin="round" fill={C.accentDim}/>
              <polygon points="50,4 68,38 32,38" fill={C.accent} opacity="0.85"/>
              <line x1="50" y1="38" x2="50" y2="86" stroke={C.accent} strokeWidth="1.2" opacity="0.35"/>
              <line x1="26" y1="62" x2="74" y2="62" stroke={C.accent} strokeWidth="1.2" opacity="0.35"/>
            </svg>
            <div style={{display:"flex",flexDirection:"column",lineHeight:1}}>
              <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:34,fontWeight:900,letterSpacing:5,color:C.accent,lineHeight:1}}>ARC</span>
              <span style={{fontSize:11,color:C.muted,fontWeight:500,letterSpacing:1.5,marginTop:3}}>by APEX Software</span>
            </div>
          </div>
          <span style={{fontSize:14,color:C.muted,opacity:0.6}}>{APP_VERSION}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
          {companyLogo?(
            <img src={companyLogo} alt="Company logo" style={{maxHeight:64,maxWidth:200,objectFit:"contain"}}/>
          ):companyName?(
            <span style={{color:C.accent,fontSize:29,fontWeight:700}}>⬡ {companyName}</span>
          ):null}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",height:36}}>
          {bgRunning.length>0&&(
            <div title={bgRunning.map(t=>t.panelName+": "+t.msg).join("\n")}
              style={{display:"flex",alignItems:"center",gap:6,padding:"0 10px",height:36,boxSizing:"border-box",borderRadius:12,background:"#0d2a0d",border:"1px solid #22c55e99",cursor:"default"}}>
              <span className="spin" style={{fontSize:12,color:"#86efac",lineHeight:1}}>◌</span>
              <span style={{fontSize:11,fontWeight:600,color:"#86efac",whiteSpace:"nowrap"}}>{bgRunning.length} processing</span>
            </div>
          )}
          <div title={bcOnline?"Business Central is connected":"Click to connect to Business Central"}
            onClick={bcOnline?undefined:async()=>{const t=await acquireBcToken(true);if(t){setBcOnline(true);bcOnlinePrev.current=true;}}}
            style={{display:"flex",alignItems:"center",gap:5,padding:"0 10px",height:36,boxSizing:"border-box",borderRadius:12,background:bcOnline?"#1e4a8a55":"#3a1a1a44",border:`1px solid ${bcOnline?"#3b82f699":"#7f1d1d88"}`,cursor:bcOnline?"default":"pointer"}}>
            <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:bcOnline?"#3b82f6":"#ef4444",boxShadow:bcOnline?"0 0 5px #3b82f6":"0 0 5px #ef4444"}}/>
            <span style={{fontSize:11,fontWeight:600,color:bcOnline?"#93c5fd":"#fca5a5",whiteSpace:"nowrap"}}>{bcOnline?"BC Connected":"BC Offline — Click to connect"}</span>
          </div>
          {userRole==="admin"&&<button data-tip="View AI learning database — extracted parts and panel history" onClick={()=>setView("aidb")} style={{background:view==="aidb"?"#1a0a2a":"none",border:view==="aidb"?`1px solid #a78bfa44`:"none",color:"#a78bfa",cursor:"pointer",fontSize:13,fontWeight:700,padding:"0 10px",height:36,borderRadius:6,letterSpacing:0.5}}>🧠 AI Database</button>}
          <button data-tip="Manage team members and permissions" onClick={()=>setShowTeam(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:"0 10px",height:36,borderRadius:6}}>👥 Team</button>
          <button data-tip="Configure pricing defaults, contingencies, and auto-add BOM items" onClick={()=>setShowConfig(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:"0 10px",height:36,borderRadius:6}}>⚙ Config</button>
          <button data-tip="App settings — API key, company, preferences" onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:"0 10px",height:36,borderRadius:6}}>⚙ Settings</button>
          <div style={{width:1,height:24,background:C.border,alignSelf:"center"}}/>
          <span style={{fontSize:15,color:C.muted}}>{user.email}</span>
          {userRole&&<span style={{fontSize:14,fontWeight:700,padding:"4px 10px",borderRadius:10,background:userRole==="admin"?C.accentDim:userRole==="edit"?C.greenDim:C.border,color:userRole==="admin"?"#93c5fd":userRole==="edit"?C.green:C.muted}}>{userRole}</span>}
          <button data-tip="Sign out of ARC" onClick={()=>fbAuth.signOut()} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:15,padding:"0 10px",height:36}}>Sign out</button>
        </div>
      </div>
      {/* BC Connection Lost popup */}
      {bcLostAlert&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{...card(),maxWidth:400,width:"100%",border:"1px solid #ef444455",boxShadow:"0 0 40px #ef444422"}}>
            <div style={{fontSize:22,fontWeight:700,marginBottom:8,color:"#fca5a5"}}>⚠ BC Connection Lost</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6}}>The connection to Business Central has timed out. This can happen when the app is left open overnight. BC features (projects, customers, items) are unavailable until you reconnect.</div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setBcLostAlert(false)} style={btn(C.border,C.muted,{fontSize:13})}>Dismiss</button>
              <button onClick={async()=>{
                setBcLostAlert(false);
                const t=await acquireBcToken(true);
                if(t){setBcOnline(true);bcOnlinePrev.current=true;}
              }} style={btn(C.accent,"#fff",{fontSize:13})}>Reconnect to BC</button>
            </div>
          </div>
        </div>
      )}
      {view==="dashboard"&&(
        <>
          {/* Company setup banner */}
          {!companyId&&!setupDismissed&&(
            <div style={{background:"#1a1a3e",borderBottom:`1px solid ${C.accent}44`,padding:"8px 32px",display:"flex",alignItems:"center",gap:12,fontSize:13,flexWrap:"wrap"}}>
              <span style={{color:C.sub,flex:1}}>Set up a Company workspace to collaborate with your team.</span>
              <button onClick={()=>setShowSetup(true)} style={btn(C.accent,"#fff",{fontSize:12,padding:"5px 14px"})}>Set up Company</button>
              <button onClick={()=>setSetupDismissed(true)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,padding:"4px 8px"}}>Not now</button>
            </div>
          )}
          <Dashboard uid={user.uid} userFirstName={userFirstName} projects={projects} loading={loading} onOpen={handleOpen} onNew={()=>setShowNew(true)} onDelete={handleDelete} onAccept={handleAccept} onTransfer={companyId?setTransferProject:undefined} onUpdateProject={async p=>{await saveProject(user.uid,p);setProjects(ps=>ps.map(x=>x.id===p.id?p:x));}}/>
        </>
      )}
      {view==="project"&&openProject&&(
        <ErrorBoundary onBack={()=>setView("dashboard")}>
          <ProjectView project={openProject} uid={user.uid} onBack={()=>setView("dashboard")} onChange={handleChange} onDelete={()=>handleDelete(openProject.id,openProject.name,openProject.bcProjectId,openProject.bcProjectNumber)} onTransfer={companyId?()=>setTransferProject(openProject):undefined}/>
        </ErrorBoundary>
      )}
      {view==="aidb"&&userRole==="admin"&&(
        <AIDatabasePage uid={user.uid} onBack={()=>setView("dashboard")}/>
      )}
      {showNew&&<NewProjectModal uid={user.uid} onCreated={handleCreated} onClose={()=>setShowNew(false)}/>}
      {deleteConfirm&&<DeleteConfirmModal projectName={deleteConfirm.name} bcProjectNumber={deleteConfirm.bcProjectNumber} isAdmin={userRole==="admin"} onConfirm={confirmDelete} onCancel={()=>setDeleteConfirm(null)}/>}
      {transferProject&&<TransferProjectModal project={transferProject} companyId={companyId} uid={user.uid} userEmail={user.email} onTransferred={handleTransferDone} onClose={()=>setTransferProject(null)}/>}
      {showSettings&&<SettingsModal uid={user.uid} onClose={()=>setShowSettings(false)} onNameChange={n=>setUserFirstName(n)}/>}
      {showConfig&&<PricingConfigModal uid={user.uid} onClose={()=>setShowConfig(false)} onLogoChange={url=>setCompanyLogo(url||null)}/>}
      {showTeam&&<TeamModal uid={user.uid} companyId={companyId} userRole={userRole} onClose={()=>setShowTeam(false)}/>}
      {showSetup&&<CompanySetupModal uid={user.uid} email={user.email} onDone={(cid,role,name)=>{setCompanyId(cid);setUserRole(role);setCompanyName(name||null);setShowSetup(false);}} onClose={()=>setShowSetup(false)}/>}
    </div>
  );
}

// ── ROOT ──
function Root(){
  const [user,setUser]=useState(undefined);
  const [redirectDone,setRedirectDone]=useState(false);

  useEffect(()=>{setRedirectDone(true);},[]);
  const [joinPayload]=useState(()=>{
    try{
      const params=new URLSearchParams(window.location.search);
      const j=params.get("join");
      if(!j)return null;
      return JSON.parse(atob(j));
    }catch(e){return null;}
  });

  useEffect(()=>{
    return fbAuth.onAuthStateChanged(u=>{
      if(u&&joinPayload){
        // If signed in as a different user, sign out and show the invite login screen
        if(u.email.toLowerCase()!==joinPayload.e.toLowerCase()){
          fbAuth.signOut();
          return; // onAuthStateChanged will fire again with null → shows LoginScreen
        }
        const{c:companyId,r:role}=joinPayload;
        const batch=fbDb.batch();
        batch.set(fbDb.doc(`companies/${companyId}/members/${u.uid}`),{email:u.email,role,addedAt:Date.now()});
        batch.set(fbDb.doc(`users/${u.uid}/config/profile`),{companyId,role},{merge:true});
        batch.commit()
          .then(()=>{
            try{
              const url=new URL(window.location.href);
              url.searchParams.delete("join");
              window.history.replaceState({},"",url.toString());
            }catch(e){}
            setUser(u);
          })
          .catch(e=>{
            console.error("Failed to accept invite:",e);
            setUser(u);
          });
      } else {
        setUser(u);
      }
    });
  },[joinPayload]);

  if(user===undefined||!redirectDone)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>
      <div style={{color:C.muted,fontSize:14}}>Loading…</div>
    </div>
  );
  if(!user)return<LoginScreen invite={joinPayload}/>;
  return<App user={user}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
