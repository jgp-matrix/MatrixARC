      {!((panel.bom&&panel.bom.length>0)||["extracted","validated","costed","quoted"].includes(panel.status))&&<div style={{marginBottom:12}}>
        <div style={{display:"flex",gap:0,borderRadius:8,overflow:"hidden",border:`1px solid ${C.accent}55`,background:"#0a0a16"}}>
          <input
            value={cpdQuery}
            onChange={e=>setCpdQuery(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&cpdQuery.trim())setShowCpdSearch(true);}}
            placeholder="Type what you need in a panel and I will attempt to create a BOM for you without drawings"
            style={{flex:1,background:"transparent",border:"none",outline:"none",padding:"10px 14px",fontSize:12,color:C.text,fontStyle:cpdQuery?"normal":"italic"}}
          />
          <button
            onClick={()=>{if(cpdQuery.trim())setShowCpdSearch(true);}}
            style={{background:C.accentDim,border:"none",borderLeft:`1px solid ${C.accent}55`,padding:"10px 16px",color:C.accent,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",letterSpacing:0.5}}>
            CPD Search
          </button>
        </div>
      </div>}

      {/* 5 stat boxes */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:14}}>
        {[
          {label:"Total",count:pages.length,color:C.sub,dim:C.border+"44"},
          {label:"BOM",count:bomCount,color:C.accent,dim:C.accentDim},
          {label:"Schematic",count:schCount,color:C.green,dim:C.greenDim},
          {label:"Back Panel",count:backpanelCount+layoutCount,color:C.purple,dim:"#2e1a4a"},
          {label:"Enclosure",count:enclosureCount,color:C.teal||"#0d9488",dim:"#042f2e"},
        ].map(s=>(
          <div key={s.label} style={{background:s.dim,border:`1px solid ${s.color}44`,borderRadius:8,padding:"10px 6px",textAlign:"center"}}>
            <div style={{fontSize:24,fontWeight:800,color:s.color,lineHeight:1}}>{s.count}</div>
            <div style={{fontSize:12,color:s.color,fontWeight:700,marginTop:4,letterSpacing:0.5,opacity:0.85}}>{s.label.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {/* Drawings section */}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.7,marginRight:2}}>DRAWINGS</div>
          {!readOnly&&tagsChanged&&bomCount>0&&(
            <button data-tip="Re-run AI extraction on tagged BOM pages to rebuild the bill of materials" onClick={runExtraction} disabled={extracting}
              style={{background:"none",border:`1px solid ${C.accent}88`,color:C.accent,cursor:"pointer",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap",opacity:extracting?0.6:1}}>
              {extracting?"Extracting…":"🔄 Re-Extract"}
            </button>
          )}
          {pages.length>0&&!readOnly&&(
            <button data-tip="Burn overlay stamp into existing drawing images in storage" onClick={stampExistingDrawings} disabled={stampingDrawings}
              style={{background:"none",border:`1px solid ${C.yellow}88`,color:C.yellow,cursor:"pointer",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap",opacity:stampingDrawings?0.5:1}}>
              {stampingDrawings?"Stamping…":"🔏 Stamp Drawings"}
            </button>
          )}
          {pages.length>0&&!readOnly&&bcProjectNumber&&!bcDisconnected&&(
            <button data-tip={panel.bcPdfAttached&&!bcPdfMissing?`Already uploaded: ${panel.bcPdfFileName||"PDF"}`:`Combine all pages into a PDF and upload to BC Job ${bcProjectNumber}`}
              onClick={buildAndAttachPdf} disabled={attachingPdf||(panel.bcPdfAttached&&!bcPdfMissing)}
              style={{background:panel.bcPdfAttached&&!bcPdfMissing?C.greenDim:"none",border:`1px solid ${panel.bcPdfAttached&&!bcPdfMissing?C.green+"88":"#38bdf888"}`,color:panel.bcPdfAttached&&!bcPdfMissing?C.green:"#38bdf8",cursor:panel.bcPdfAttached&&!bcPdfMissing?"default":"pointer",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap",opacity:attachingPdf?0.5:1}}>
              {attachingPdf?"Working…":panel.bcPdfAttached&&!bcPdfMissing?"✓ Uploaded to BC":"📎 Upload to BC"}
            </button>
          )}
          {bcPdfMissing&&<span style={{fontSize:11,color:C.yellow,fontWeight:600}}>File was deleted from BC — Re-Upload?</span>}
          {attachPdfMsg&&<span style={{fontSize:11,color:attachPdfMsg.startsWith("✓")?C.green:attachPdfMsg.startsWith("✗")?C.red:C.muted,fontWeight:600}}>{attachPdfMsg}</span>}
        </div>

        {/* Thumbnail strip + drop tile */}
        <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:6,alignItems:"flex-start"}}>
          {(()=>{
            const extracted=["extracted","validated","costed","quoted"].includes(panel.status);
            const statusLabel=panel.status==="quoted"||panel.status==="costed"?"QUOTE":panel.status==="validated"?"VALIDATED":panel.status==="extracted"?"EXTRACTED":"DRAFT";
            const qd=quoteData||{};
            return pages.map((pg,pgIdx)=>{
            const types=getPageTypes(pg);
            return(
              <div key={pg.id} style={{flexShrink:0,width:420,display:"flex",flexDirection:"column",gap:6}}>
                <div style={{position:"relative",cursor:"zoom-in"}} onClick={()=>setLightboxId(pg.id)}>
                  <img src={pg.dataUrl||pg.storageUrl} alt={pg.name} style={{width:420,height:381,objectFit:"contain",borderRadius:6,background:"#080810",display:"block"}}/>
                  {!readOnly&&<button data-tip="Remove this drawing page" onClick={e=>{e.stopPropagation();removePage(pg.id);}} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.75)",border:"none",color:C.red,cursor:"pointer",borderRadius:4,padding:"1px 7px",fontSize:13,lineHeight:"20px"}}>✕</button>}
                </div>
                <div style={{lineHeight:1.4}}>
                  {(panel.drawingNo||panel.drawingDesc)?(
                    <>
                      <div style={{fontSize:12,color:C.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:600}}>
                        {[panel.drawingNo,panel.drawingDesc].filter(Boolean).join("  ")}
                      </div>
                      {panel.drawingRev&&<div style={{fontSize:11,color:C.yellow,fontWeight:700}}>Rev {panel.drawingRev}</div>}
                    </>
                  ):(
                    <div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pg.name}</div>
                  )}
                  {pg.sheetNo&&<div style={{fontSize:11,color:C.teal,fontWeight:700,marginTop:1}}>Sht {pg.sheetNo}</div>}
                </div>
                <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
                  {pg.isZoomedSection&&(
                    <span style={{background:"rgba(250,204,21,0.15)",color:"#fde047",border:"1px solid rgba(250,204,21,0.4)",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:700}}>
                      ⚡ Zoomed Section
                    </span>
                  )}
                  {["bom","schematic","backpanel","enclosure","pid"].map(t=>{
                    const active=types.includes(t);
                    return(
                      <button key={t} data-tip={active?`Remove "${SHORT[t]}" tag from this page`:`Tag this page as ${SHORT[t]}`} disabled={readOnly} onClick={()=>tagPage(pg.id,active?types.filter(x=>x!==t):[...types,t])}
                        style={{background:active?typeColors[t]+"33":"transparent",color:active?typeColors[t]:C.muted,border:`1px solid ${active?typeColors[t]+"88":C.border}`,borderRadius:10,padding:"2px 8px",fontSize:12,fontWeight:700,cursor:readOnly?"default":"pointer",transition:"all 0.1s"}}>
                        {SHORT[t]}
                      </button>
                    );
                  })}
                </div>
                {awaitingConfirm&&reasonPickerFor===pg.id&&(
                  <div style={{marginTop:4,background:"rgba(250,204,21,0.08)",border:"1px solid rgba(250,204,21,0.35)",borderRadius:6,padding:"8px 10px"}}>
                    <div style={{fontSize:11,color:"#fde047",fontWeight:700,marginBottom:5}}>Why was this type removed?</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {["Zoomed section","Wrong type","No useful content","Other"].map(r=>(
                        <button key={r} onClick={()=>{
                          const ch=pageTypeChangesRef.current[pg.id];
                          if(ch){pageTypeChangesRef.current[pg.id]={...ch,reason:r};}
                          setReasonPickerFor(null);
                        }} style={{background:"rgba(250,204,21,0.12)",color:"#fde047",border:"1px solid rgba(250,204,21,0.4)",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                          {r}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          });})()}

          {/* Drop zone tile */}
          {!readOnly&&(
            <div
              onDragOver={e=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={e=>{e.preventDefault();setDragging(false);if(!awaitingConfirm)addFiles(e.dataTransfer.files);}}
              onClick={()=>!processing&&!detecting&&!awaitingConfirm&&fileRef.current?.click()}
              data-tour="add-files-zone"
              style={{flexShrink:0,width:420,height:381,border:`2px dashed ${dragging?C.accent:C.border}`,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:processing||detecting?"default":"pointer",transition:"all 0.15s",background:dragging?C.accentDim+"33":"transparent",textAlign:"center",padding:12,gap:8}}>
              <input ref={fileRef} type="file" multiple accept="image/*,application/pdf" onChange={e=>{addFiles(e.target.files);e.target.value="";}} style={{display:"none"}}/>
              <div style={{fontSize:32,opacity:processing||detecting?1:0.35}}>{processing||detecting?"⏳":"+"}</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.6,whiteSpace:"pre-line"}}>{processing?processingMsg:"Drop or click\nPDF · JPG · PNG"}</div>
            </div>
          )}
        </div>
      </div>

      {/* Confirm page types banner */}
      {awaitingConfirm&&!detecting&&(
        <div style={{border:"1px solid",borderRadius:8,padding:"12px 16px",marginBottom:12,animation:"pulseYellow 1.6s ease-in-out infinite"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#fde047",marginBottom:3,animation:"pulse 1.6s ease-in-out infinite"}}>Review drawing types before extracting</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>Check that each page above is tagged correctly — <span style={{color:C.accent,fontWeight:600}}>BOM</span>, <span style={{color:C.green,fontWeight:600}}>SCH</span>, <span style={{color:C.purple,fontWeight:600}}>BP</span>, <span style={{color:C.teal||"#0d9488",fontWeight:600}}>ENC</span>, <span style={{color:C.muted,fontWeight:600}}>P&amp;ID</span>. Click a tag to add or remove it, then proceed.</div>
            </div>
            <button data-tip="Confirm drawing types are correct and begin BOM extraction, validation, and pricing" onClick={confirmAndExtract} style={{flexShrink:0,background:C.accent,color:"#fff",border:"none",borderRadius:7,padding:"9px 22px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              Proceed with Extraction
            </button>
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:4,letterSpacing:0.3}}>EXTRACTION NOTES <span style={{fontWeight:400,fontStyle:"italic"}}>(optional — hints for AI about these drawings)</span></div>
            <textarea value={extractionNotes} onChange={e=>setExtractionNotes(e.target.value)} placeholder='e.g. "P6 has a zoomed BOM section on the right side — only extract from that section" or "BOM spans pages 3-5, ignore parts list on page 2"' rows={2} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:12,lineHeight:1.5,resize:"vertical",outline:"none",fontFamily:"inherit"}}/>
          </div>
        </div>
      )}

      {/* Error */}
      {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.red,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>{err}<button onClick={()=>setErr("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:15,lineHeight:1}}>✕</button></div>}

      {/* Unified progress bar — extraction, validation, and pricing all share this one bar */}
      {unifiedProgress&&(()=>{
        const pct=unifiedProgress.pct;
        const isErr=unifiedProgress.isError;
        const barBg=isErr?`linear-gradient(90deg,${C.red},#b91c1c)`:`linear-gradient(90deg,${C.accent},#818cf8)`;
        const dismiss=()=>{if(pricingProgress?.isError)setPricingProgress(null);else bgDismiss(panel.id);};
        return(
        <div style={{marginBottom:12}}>
          <div style={{width:"100%",height:38,background:isErr?C.redDim:C.border,borderRadius:10,overflow:"hidden",position:"relative"}}>
            <div style={{height:"100%",background:barBg,borderRadius:10,transition:"width 0.25s linear",width:(isErr?100:pct)+"%",position:"relative",overflow:"hidden"}}>
              {!isErr&&pct<100&&<div style={{position:"absolute",top:0,bottom:0,width:"25%",background:"linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent)",animation:"shimmer 1.6s ease-in-out infinite",pointerEvents:"none"}}/>}
            </div>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px"}}>
              <span style={{display:"flex",flexDirection:"column",gap:1}}>
                <span style={{fontSize:14,fontWeight:700,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.5)"}}>{unifiedProgress.msg||"Processing…"}</span>
                {!isErr&&pct<100&&<span style={{fontSize:11,color:"rgba(255,255,255,0.65)",fontWeight:500}}>This process may take a while</span>}
              </span>
              {isErr
                ?<button onClick={dismiss} style={{background:"none",border:"1px solid rgba(255,255,255,0.4)",borderRadius:6,color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,padding:"3px 10px",lineHeight:1}}>Dismiss</button>
                :<span style={{fontSize:16,fontWeight:800,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.5)",fontVariantNumeric:"tabular-nums"}}>{pct}%</span>
              }
            </div>
          </div>
        </div>);})()}

      {/* Compliance Review */}
      {panel.complianceReview&&panel.complianceReview.concerns?.length>0&&(()=>{
        const cr=panel.complianceReview;
        const sevColors={critical:'#ef4444',warning:'#f59e0b',info:'#38bdf8'};
        const sevLabels={critical:'CRITICAL',warning:'WARNING',info:'INFO'};
        const sevIcons={critical:'\u26D4',warning:'\u26A0\uFE0F',info:'\u2139\uFE0F'};
        const critCount=cr.concerns.filter(c=>c.severity==='critical').length;
        const warnCount=cr.concerns.filter(c=>c.severity==='warning').length;
        const infoCount=cr.concerns.filter(c=>c.severity==='info').length;
        const headerColor=critCount>0?'#ef4444':warnCount>0?'#f59e0b':'#38bdf8';
        return <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer"}} onClick={()=>setShowCompliance(prev=>!prev)}>
            <div style={{fontSize:12,color:headerColor,fontWeight:700,letterSpacing:0.7}}>
              UL508A / C22.2 COMPLIANCE REVIEW
            </div>
            {critCount>0&&<span style={{fontSize:10,fontWeight:700,color:'#fff',background:'#ef4444',borderRadius:10,padding:'1px 7px'}}>{critCount} critical</span>}
            {warnCount>0&&<span style={{fontSize:10,fontWeight:700,color:'#1a1a2e',background:'#f59e0b',borderRadius:10,padding:'1px 7px'}}>{warnCount} warning{warnCount>1?'s':''}</span>}
            {infoCount>0&&<span style={{fontSize:10,fontWeight:700,color:'#fff',background:'#38bdf8',borderRadius:10,padding:'1px 7px'}}>{infoCount} info</span>}
            <div style={{flex:1}}/>
            <span style={{fontSize:11,color:C.muted,fontWeight:600}}>{showCompliance?'Hide':'Show'}</span>
          </div>
          {showCompliance&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
            {cr.concerns.map((c,i)=><div key={i} style={{background:c.severity==='critical'?'rgba(239,68,68,0.08)':c.severity==='warning'?'rgba(245,158,11,0.08)':'rgba(56,189,248,0.06)',border:`1px solid ${c.severity==='critical'?'rgba(239,68,68,0.25)':c.severity==='warning'?'rgba(245,158,11,0.25)':'rgba(56,189,248,0.2)'}`,borderRadius:8,padding:'10px 12px'}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontSize:10,fontWeight:800,color:sevColors[c.severity],background:c.severity==='critical'?'rgba(239,68,68,0.15)':c.severity==='warning'?'rgba(245,158,11,0.15)':'rgba(56,189,248,0.12)',borderRadius:4,padding:'1px 6px',letterSpacing:0.5}}>{sevLabels[c.severity]}</span>
                <span style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:0.5}}>{(c.category||'').replace(/_/g,' ')}</span>
              </div>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:3}}>{c.title}</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{c.detail}</div>
              {c.reference&&<div style={{fontSize:11,color:'#818cf8',marginTop:4,fontWeight:600}}>{c.reference}{c.page?' (p.'+c.page+')':''}</div>}
            </div>)}
            {cr.checklist?.length>0&&<div style={{background:'rgba(99,102,241,0.06)',border:'1px solid rgba(99,102,241,0.15)',borderRadius:8,padding:'10px 12px'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#818cf8',letterSpacing:0.5,marginBottom:6}}>INSPECTION CHECKLIST</div>
              {cr.checklist.map((item,i)=><div key={i} style={{fontSize:12,color:C.muted,padding:'2px 0',display:'flex',gap:6,alignItems:'flex-start'}}>
                <span style={{color:'#818cf8',fontSize:14,lineHeight:1}}>{'☐'}</span>
                <span>{item}</span>
              </div>)}
            </div>}
            {cr.observations?.length>0&&<div style={{fontSize:11,color:C.muted,fontStyle:'italic',padding:'4px 0'}}>
              {cr.observations.map((o,i)=><div key={i} style={{padding:'1px 0'}}>• {o}</div>)}
            </div>}
          </div>}
        </div>;
      })()}

      {/* BOM Table */}
      {(panel.bom||[]).length>0&&(
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.7,flex:1}}>
              BILL OF MATERIALS — {panel.bom.length} items
            </div>
            {!readOnly&&_apiKey&&(panel.bom||[]).length>0&&(
              <button data-tip="Re-run AI pricing on all BOM rows to fetch current prices from Business Central" onClick={()=>runPricingOnPanel()} disabled={aiPricing}
                style={btn(C.accentDim,C.accent,{fontSize:12,padding:"4px 12px",opacity:aiPricing?0.5:1,cursor:aiPricing?"default":"pointer"})}>
                {aiPricing?"Refreshing…":"↻ Re-Extract Pricing"}
              </button>
            )}
            {bcProjectNumber&&!readOnly&&(
              <button data-tip="Push BOM and labor costs to Business Central job planning lines" onClick={syncPlanningLinesToBC} disabled={bcSyncing}
                style={btn(bcSyncStatus==="ok"?C.greenDim:bcSyncStatus==="error"?"#2a0a0a":C.accentDim, bcSyncStatus==="ok"?C.green:bcSyncStatus==="error"?C.red:C.accent,{fontSize:12,padding:"4px 12px",opacity:bcSyncing?0.5:1})}>
                {bcSyncing?"Syncing…":bcSyncStatus==="ok"?"✓ Synced":bcSyncStatus==="error"?"✗ Sync Failed":"⇅ Sync BC"}
              </button>
            )}
            <button onClick={exportCSV} style={btn(C.greenDim,C.green,{fontSize:12,padding:"4px 12px"})}>⬇ CSV</button>
          </div>
          <div data-tour="bom-table" style={{borderRadius:8,border:`1px solid ${C.border}`,overflowX:"auto"}}>
            <table style={{width:"100%",minWidth:900,tableLayout:"auto",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#0a0a12"}}>
                  {[["ARC Ln #",50],["Ref Ln #",56],["Qty",56],["Part Number",0,"fit"],["",32],["Description",0,"auto"],["Manufacturer",0,"fit"],["Supplier",0,"fit"],["Unit $",100],["Ext $",80],["Priced",76],["",44]].map(([h,w,mode],hi)=>(
                    <th key={h||"bc"+hi} style={{padding:"9px 10px",textAlign:h==="Unit $"||h==="Ext $"?"right":"left",color:C.muted,fontWeight:700,fontSize:12,whiteSpace:"nowrap",width:mode==="fit"?"1%":mode==="auto"?"auto":w||"auto",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const sortedBom=(panel.bom||[]).slice().sort((a,b)=>{
                    if(a.isLaborRow&&!b.isLaborRow)return -1;
                    if(!a.isLaborRow&&b.isLaborRow)return 1;
                    if(a.isLaborRow&&b.isLaborRow)return(a.partNumber||"").localeCompare(b.partNumber||"");
                    if(!a.itemNo&&!b.itemNo)return 0;
                    if(!a.itemNo)return 1;
                    if(!b.itemNo)return -1;
                    const an=parseFloat(a.itemNo),bn=parseFloat(b.itemNo);
                    if(!isNaN(an)&&!isNaN(bn))return an-bn;
                    return (a.itemNo||"").localeCompare(b.itemNo||"");
                  });
                  return sortedBom.map((row,i)=>{
                  const rowBg=bcUpdatedRows.has(String(row.id))?undefined:row.isLaborRow?"#0a1628":(!row.isLaborRow&&!row.customerSupplied&&(+row.qty===0||+row.unitPrice===0))?"rgba(255,40,40,0.35)":i%2===0?"transparent":"rgba(255,255,255,0.015)";
                  return(
                  <tr key={row.id} className={bcUpdatedRows.has(String(row.id))?"bc-row-updated":undefined} style={{borderBottom:i<sortedBom.length-1?`1px solid ${C.border}33`:"none",background:rowBg}}>
                    <td style={{padding:"3px 4px",whiteSpace:"nowrap",textAlign:"center",fontSize:13,fontWeight:700,color:C.muted,userSelect:"none",position:"relative"}}>
                      {i+1}
                      {bcUpdatedRows.has(String(row.id))&&bcUpdateNotif&&(
                        <div onClick={e=>{e.stopPropagation();setBcUpdateNotif(false);}} style={{position:"absolute",top:-26,left:0,zIndex:200,background:"#052e16",border:"1px solid #4ade80",borderRadius:6,padding:"3px 10px",color:"#4ade80",fontSize:11,fontWeight:600,whiteSpace:"nowrap",boxShadow:"0 2px 12px rgba(0,0,0,0.6)",cursor:"pointer",animation:"fadeIn 0.2s ease-out",display:"flex",alignItems:"center",gap:5}}>
                          <span>↻</span><span>BC price updated</span>

                <span style={{color:"#a78bfa",fontWeight:700}}>ARC suggests: </span>

                <span style={{color:C.muted,fontSize:10,marginLeft:2}}>— based on part number similarity</span>

                  style={{padding:"11px 14px",background:C.accentDim,border:`1px solid ${C.accent}`,borderRadius:7,color:C.text,textAlign:"left",cursor:"pointer"}}>

                  style={{padding:"11px 14px",background:"#1a0a0a",border:`1px solid ${C.red}`,borderRadius:7,color:C.text,textAlign:"left",cursor:"pointer"}}>

                </button>
                <button onClick={()=>{commitBcItem(crossOrCorrectPending.bomRowId,crossOrCorrectPending.bcItem,false,'formatting');dismiss();}}
                  style={{padding:"11px 14px",background:"#0a1a12",border:"1px solid #4ade80",borderRadius:7,color:C.text,textAlign:"left",cursor:"pointer"}}>

// ── CPD SEARCH MODAL ──
function isBomQuoteAnalysis(q){
  const ql=(q||'').toLowerCase();
  return(ql.includes('bom')||ql.includes('bill of material'))
    &&(ql.includes('quote')||ql.includes('supplier'))
    &&(ql.includes('build')||ql.includes('how many')||ql.includes('quantities')||ql.includes('examine'));
}

function CPDSearchModal({query,uid,panel,onClose,onImportBom}){
  const isQuoteMode=isBomQuoteAnalysis(query);
  const [phase,setPhase]=useState(isQuoteMode?"analyzeQuote":"thinking"); // thinking | result | error | analyzeQuote | quoteResult
  const [result,setResult]=useState(null);
  const [selected,setSelected]=useState(new Set());
  const [errorMsg,setErrorMsg]=useState("");
  const [quoteAnalysis,setQuoteAnalysis]=useState(null); // {quote,results,totalPanels,matchedCount}
  const [marginPct,setMarginPct]=useState(30);

  const [similarPanels,setSimilarPanels]=useState([]);

  // Find similar panels from CPD database
  useEffect(()=>{
    loadCPD(uid).then(cpd=>{
      const panels=cpd.panels||[];
      if(!panels.length)return;
      const q=query.toLowerCase();
      const scored=panels.map(p=>{
        let score=0;
        const haystack=((p.panelType||'')+(p.controlledEquipment||'')+(p.panelName||'')+(p.additionalNotes||'')).toLowerCase();
        q.split(/\s+/).forEach(word=>{if(word.length>2&&haystack.includes(word))score++;});
        // Bonus for voltage match
        const vLine=(p.voltages?.lineVoltage||'').toLowerCase();
        if(q.includes('480')&&vLine.includes('480'))score+=2;
        if(q.includes('208')&&vLine.includes('208'))score+=2;
        return{...p,_score:score};
      }).filter(p=>p._score>0).sort((a,b)=>b._score-a._score).slice(0,3);
      setSimilarPanels(scored);
    }).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(isQuoteMode)return; // handled by quote analysis effect
    let cancelled=false;
    async function run(){
      try{
        const cpd=await loadCPD(uid);
        // Build context from CPD catalog including panel metadata
        const topCategories={};
        (cpd.products||[]).forEach(p=>{topCategories[p.category]=(topCategories[p.category]||0)+1;});
        const panelCount=(cpd.panels||[]).length;
        const panelSummaries=(cpd.panels||[]).slice(-5).map(p=>`${p.panelType||'Panel'} for ${p.controlledEquipment||'unknown equipment'} (${p.specs?.motorCount||0} motors, PLC I/O: ${p.specs?.plcInputs||0}in/${p.specs?.plcOutputs||0}out, ${p.voltages?.lineVoltage||'unknown voltage'})`).join('; ');
        const catalogContext=panelCount>0
          ?`The system has cataloged ${panelCount} control panel(s). Recent panels: ${panelSummaries}. Common components: ${Object.entries(topCategories).map(([k,v])=>`${k} (${v} unique parts)`).join(', ')}.`
          :`No prior panel scans in the database yet — generating BOM from expert knowledge.`;

        const systemPrompt=`You are an expert industrial control panel designer specializing in UL508A panels. You have deep knowledge of PLCs (Allen-Bradley, Siemens, Automation Direct), motor control, field instruments, and control panel BOM creation.

${catalogContext}

When given a panel description, generate a realistic preliminary Bill of Materials. Return ONLY valid JSON array, no markdown, no explanation. Each item: {"partNumber":"","description":"","qty":1,"manufacturer":"","category":"","unitPrice":0}

Categories: PLC Processor, PLC I/O Module, VFD, Contactor, Relay, MCCB, Circuit Breaker, Wire Duct, DIN Rail, Terminal Block, Heater, Air Conditioner, Horn/Beacon, Enclosure, HMI, Pilot Light/Operator, Other

Use realistic part numbers (Allen-Bradley, Phoenix Contact, Schneider, etc.) where confident. Set unitPrice to 0 if unknown.`;

        const resp=await apiCall({
          model:"claude-sonnet-4-6",
          max_tokens:4096,
          system:systemPrompt,
          messages:[{role:"user",content:`Generate a BOM for: ${query}`}]
        });
        if(cancelled)return;
        const raw=resp.content[0].text.trim();
        const json=raw.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
        const rows=JSON.parse(json);
        const bomRows=rows.map((r,i)=>({
          id:`cpd-${Date.now()}-${i}`,
          partNumber:r.partNumber||'',
          description:r.description||'',
          qty:r.qty||1,
          manufacturer:r.manufacturer||'',
          unitPrice:r.unitPrice||null,
          priceSource:r.unitPrice?'ai':null,priceDate:Date.now(),
          cpdCategory:r.category||'Other',
          cpdGenerated:true
        }));
        setResult(bomRows);
        setSelected(new Set(bomRows.map(r=>r.id)));
        setPhase("result");
      }catch(e){
        if(!cancelled){setErrorMsg(e.message||"Failed to generate BOM.");setPhase("error");}
      }
    }
    run();
    return()=>{cancelled=true;};
  },[]);

  // Quote analysis: compare panel BOM vs most recent supplier quote
  useEffect(()=>{
    if(!isQuoteMode)return;
    let cancelled=false;
    async function run(){
      try{
        const snap=await fbDb.collection('supplierQuotes').where('importedBy','==',uid).limit(50).get();
        if(snap.empty)throw new Error('No supplier quotes found. Import a supplier quote first.');
        const quotes=snap.docs.map(d=>({id:d.id,...d.data(),_ms:d.data().importedAt?.toMillis?.()||0}))
          .sort((a,b)=>b._ms-a._ms);
        const q=quotes[0];
        const quoteItems=(q.lineItems||[]).filter(qi=>qi.isPriced&&(qi.partNumber||qi.rawPartNumber));
        const bomRows=(panel.bom||[]).filter(r=>!r.isLaborRow&&(r.partNumber||'').trim());
        if(!bomRows.length)throw new Error('This panel has no BOM items. Extract a BOM from drawings first.');
        // Normalize: strip all non-alphanumeric chars and lowercase for fuzzy comparison
        const norm=s=>(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
        const results=bomRows.map(row=>{
          const pn=norm(row.partNumber);
          const bcNo=norm(row.bcItemNumber||'');
          let match=null;
          for(const qi of quoteItems){
            const qpn=norm(qi.partNumber);
            const qraw=norm(qi.rawPartNumber);
            const qmfrpn=norm((qi.mfr||'')+qi.partNumber); // e.g. "phxct2891035"
            const qbc=norm(qi.bcItemId||qi.bcItemNumber||'');
            // 1. Exact normalized part number
            if(pn&&qpn&&pn===qpn){match=qi;break;}
            // 2. BOM PN equals mfr+pn from quote (e.g. BOM "PHXCT2891035")
            if(pn&&qmfrpn&&pn===qmfrpn){match=qi;break;}
            // 3. BOM PN equals full normalized raw quote PN
            if(pn&&qraw&&pn===qraw){match=qi;break;}
            // 4. BC item number cross-reference
            if(bcNo&&qbc&&bcNo===qbc){match=qi;break;}
            // 5. One PN ends with the other (handles mfr prefixes like "PHXCT-2891035" → "2891035")
            if(pn.length>=4&&qpn.length>=4&&(pn.endsWith(qpn)||qpn.endsWith(pn))){match=qi;break;}
            // 6. BOM PN ends with mfr+pn or vice versa
            if(pn.length>=4&&qmfrpn.length>=4&&(pn.endsWith(qmfrpn)||qmfrpn.endsWith(pn))){match=qi;break;}
            // 7. Normalized raw ends with BOM PN (e.g. raw "phxct2891035" ends with "2891035")
            if(pn.length>=4&&qraw.length>=4&&qraw.endsWith(pn)){match=qi;break;}
            // 8. Substring containment for longer part numbers (min 6 chars to avoid false positives)
            if(pn.length>=6&&qpn.length>=6&&(pn.includes(qpn)||qpn.includes(pn))){match=qi;break;}
          }
          const bomQty=Number(row.qty)||1;
          const quotedQty=match!=null?Number(match.qty):null;
          const panelsFromItem=quotedQty!=null&&bomQty>0?Math.floor(quotedQty/bomQty):null;
          return{
            partNumber:row.partNumber||'—',
            description:row.description||match?.description||'',
            unitPrice:row.unitPrice??match?.price??null,
            bomQty,quotedQty,panelsFromItem,matched:!!match,
          };
        });
        const matched=results.filter(r=>r.panelsFromItem!==null);
        const totalPanels=matched.length>0?Math.min(...matched.map(r=>r.panelsFromItem)):null;
        if(cancelled)return;
        setQuoteAnalysis({
          quote:{supplier:q.supplier||'',quoteId:q.quoteId||'',revision:q.revision||''},
          results,totalPanels,matchedCount:matched.length,
        });
        setPhase('quoteResult');
      }catch(e){if(!cancelled){setErrorMsg(e.message);setPhase('error');}}
    }
    run();
    return()=>{cancelled=true;};
  },[]);

  // Excel download using SheetJS loaded on demand
  async function downloadExcel(){
    if(!window.XLSX){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://unpkg.com/xlsx/dist/xlsx.full.min.js';
        s.onload=res;s.onerror=()=>rej(new Error('Failed to load XLSX library'));
        document.head.appendChild(s);
      });
    }
    const XL=window.XLSX;
    const{results,totalPanels,quote}=quoteAnalysis;
    const margin=marginPct/100;
    const dataRows=results.map(r=>({
      'Part #':r.partNumber,
      'Description':r.description,
      'Unit Price':r.unitPrice!=null?Number(r.unitPrice.toFixed(4)):null,
      'BOM Qty (per panel)':r.bomQty,
      'Qty Quoted':r.quotedQty!=null?r.quotedQty:'',
      'Panels Buildable':r.panelsFromItem!=null?r.panelsFromItem:'—',
      'Margin %':marginPct,
      'Sale Price':r.unitPrice!=null?Number((r.unitPrice/(1-margin)).toFixed(4)):null,
    }));
    const salePriceTotal=results.reduce((s,r)=>s+(r.unitPrice!=null?r.unitPrice/(1-margin):0),0);
    dataRows.push({
      'Part #':'',
      'Description':'── TOTAL ──',
      'Unit Price':null,
      'BOM Qty (per panel)':'',
      'Qty Quoted':'',
      'Panels Buildable':totalPanels!=null?`${totalPanels} complete panels`:'',
      'Margin %':'',
      'Sale Price':Number(salePriceTotal.toFixed(4)),
    });
    const ws=XL.utils.json_to_sheet(dataRows);
    // Column widths
    ws['!cols']=[{wch:18},{wch:40},{wch:12},{wch:18},{wch:12},{wch:18},{wch:10},{wch:12}];
    const wb=XL.utils.book_new();
    XL.utils.book_append_sheet(wb,ws,'BOM vs Quote');
    const name=(panel.drawingNo||panel.name||'BOM').replace(/[^a-z0-9]/gi,'_');
    XL.writeFile(wb,`${name}_QuoteAnalysis.xlsx`);
  }

  const catColors={'PLC Processor':'#93c5fd','PLC I/O Module':'#818cf8','VFD':'#fb923c','Contactor':'#f472b6','Relay':'#a78bfa','MCCB':'#ef4444','Circuit Breaker':'#f87171','Wire Duct':'#6b7280','DIN Rail':'#9ca3af','Terminal Block':'#d1d5db','Heater':'#fb923c','Air Conditioner':'#22d3ee','Horn/Beacon':'#facc15','Enclosure':'#a3e635','HMI':'#34d399','Pilot Light/Operator':'#f9a8d4','Other':'#6b7280'};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#0d0d1a",border:`1px solid ${C.border}`,borderRadius:12,width:"100%",maxWidth:isQuoteMode?1100:780,maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 60px rgba(0,0,0,0.8)"}}>
        {/* Header */}
        <div style={{padding:"18px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexShrink:0}}>
          <div>
            <div style={{fontSize:13,fontWeight:800,color:C.accent,letterSpacing:1,marginBottom:4}}>CPD SEARCH — AI BOM GENERATOR</div>
            <div style={{fontSize:12,color:C.muted,fontStyle:"italic",lineHeight:1.5}}>"{query}"</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:18,cursor:"pointer",padding:"0 4px",flexShrink:0}}>✕</button>
        </div>

        {/* Body */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 24px"}}>
          {similarPanels.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",letterSpacing:0.7,marginBottom:8}}>Similar Panels in Database</div>
              {similarPanels.map((p,i)=>(
                <div key={p.panelId||i} style={{background:"#120a2a",border:"1px solid #a78bfa44",borderRadius:7,padding:"9px 12px",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#a78bfa"}}>{p.panelType||'Control Panel'}</span>
                    {p.controlledEquipment&&<span style={{fontSize:10,color:C.muted}}>— {p.controlledEquipment}</span>}
                  </div>
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    {p.voltages?.lineVoltage&&<span style={{fontSize:10,color:C.sub}}>⚡ {p.voltages.lineVoltage}</span>}
                    {p.specs?.motorCount>0&&<span style={{fontSize:10,color:C.sub}}>⚙ {p.specs.motorCount} motors</span>}
                    {(p.specs?.plcInputs||p.specs?.plcOutputs)&&<span style={{fontSize:10,color:C.sub}}>PLC {p.specs.plcInputs||0}in/{p.specs.plcOutputs||0}out</span>}
                    {p.plcBrand&&<span style={{fontSize:10,color:C.sub}}>{p.plcBrand}</span>}
                    <span style={{fontSize:10,color:C.muted}}>{p.panelName}</span>
                  </div>
                  {p.additionalNotes&&<div style={{fontSize:10,color:C.muted,marginTop:3,fontStyle:"italic"}}>{p.additionalNotes.slice(0,120)}</div>}
                </div>
              ))}
            </div>
          )}
          {phase==="analyzeQuote"&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 0",gap:14}}>
              <div style={{fontSize:36,animation:"spin 1.2s linear infinite",display:"inline-block"}}>📊</div>
              <div style={{fontSize:13,color:C.muted}}>Comparing BOM against supplier quote…</div>
            </div>
          )}
          {phase==="quoteResult"&&quoteAnalysis&&(()=>{
            const{quote,results,totalPanels,matchedCount}=quoteAnalysis;
            const margin=marginPct/100;
            const salePriceTotal=results.reduce((s,r)=>s+(r.unitPrice!=null?r.unitPrice/(1-margin):0),0);
            const unmatchedCount=results.filter(r=>!r.matched).length;
            return(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {/* Summary bar */}
                <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                  <div style={{background:"#0d1a0d",border:`1px solid ${C.green}44`,borderRadius:8,padding:"8px 16px"}}>
                    <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Complete Panels Buildable</div>
                    <div style={{fontSize:28,fontWeight:800,color:C.green,lineHeight:1.1}}>{totalPanels!=null?totalPanels:'—'}</div>
                  </div>
                  <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 16px"}}>
                    <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>BOM Items Matched</div>
                    <div style={{fontSize:20,fontWeight:700,color:C.accent}}>{matchedCount} / {results.length}</div>
                  </div>
                  {unmatchedCount>0&&(
                    <div style={{background:"#1a0d00",border:`1px solid ${C.yellow}44`,borderRadius:8,padding:"8px 16px"}}>
                      <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Unmatched (no quote data)</div>
                      <div style={{fontSize:20,fontWeight:700,color:C.yellow}}>{unmatchedCount}</div>
                    </div>
                  )}
                  <div style={{marginLeft:"auto",fontSize:11,color:C.muted,textAlign:"right",lineHeight:1.6}}>
                    Quote: <span style={{color:C.sub}}>{quote.supplier}</span><br/>
                    {quote.quoteId&&<>{quote.quoteId}{quote.revision?` Rev ${quote.revision}`:''}</>}
                  </div>
                </div>
                {/* Margin control */}
                <div style={{display:"flex",alignItems:"center",gap:10,background:C.bg,borderRadius:8,padding:"8px 14px",border:`1px solid ${C.border}`}}>
                  <span style={{fontSize:12,color:C.muted,flexShrink:0}}>Gross Margin %</span>
                  <input type="number" min={0} max={99} value={marginPct}
                    onChange={e=>setMarginPct(Math.max(0,Math.min(99,Number(e.target.value)||0)))}
                    style={{width:60,background:"#0a0a12",border:`1px solid ${C.accent}55`,borderRadius:6,padding:"3px 8px",color:C.accent,fontSize:13,fontWeight:700,outline:"none",textAlign:"center"}}/>
                  <span style={{fontSize:11,color:C.muted}}>Sale Price = Unit Cost ÷ (1 − margin)</span>
                  <button onClick={downloadExcel}
                    style={{marginLeft:"auto",background:"#0d2a0d",border:`1px solid ${C.green}`,color:C.green,borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    ⬇ Download Excel
                  </button>
                </div>
                {/* Table */}
                <div style={{overflowX:"auto",border:`1px solid ${C.border}`,borderRadius:8}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:700}}>
                    <thead>
                      <tr style={{background:C.card,color:C.muted,borderBottom:`2px solid ${C.border}`}}>
                        {['Part #','Description','Unit Price','BOM Qty','Qty Quoted','Panels','Margin %','Sale Price'].map(h=>(
                          <th key={h} style={{padding:"8px 10px",textAlign:h==='Description'?'left':'center',fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {results.map((r,i)=>{
                        const sp=r.unitPrice!=null?r.unitPrice/(1-margin):null;
                        const panelOk=r.panelsFromItem!=null&&r.panelsFromItem>=totalPanels;
                        return(
                          <tr key={i} style={{borderBottom:`1px solid ${C.border}33`,background:r.matched?"transparent":"#1a0d0011"}}>
                            <td style={{padding:"7px 10px",fontFamily:"monospace",color:C.accent,fontWeight:700,whiteSpace:"nowrap"}}>{r.partNumber}</td>
                            <td style={{padding:"7px 10px",color:C.sub,maxWidth:280,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description}</td>
                            <td style={{padding:"7px 10px",textAlign:"center",color:C.text}}>{r.unitPrice!=null?'$'+r.unitPrice.toFixed(2):'—'}</td>
                            <td style={{padding:"7px 10px",textAlign:"center",color:C.text}}>{r.bomQty}</td>
                            <td style={{padding:"7px 10px",textAlign:"center",color:r.matched?C.text:C.muted}}>{r.quotedQty!=null?r.quotedQty:'—'}</td>
                            <td style={{padding:"7px 10px",textAlign:"center",fontWeight:700,color:r.panelsFromItem!=null?(panelOk?C.green:C.yellow):C.red}}>
                              {r.panelsFromItem!=null?r.panelsFromItem:'—'}
                            </td>
                            <td style={{padding:"7px 10px",textAlign:"center",color:C.muted}}>{marginPct}%</td>
                            <td style={{padding:"7px 10px",textAlign:"center",color:C.green,fontWeight:600}}>{sp!=null?'$'+sp.toFixed(2):'—'}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                    <tfoot>
                      <tr style={{background:C.card,borderTop:`2px solid ${C.border}`}}>
                        <td colSpan={7} style={{padding:"8px 10px",textAlign:"right",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>Total Sale Price</td>
                        <td style={{padding:"8px 10px",textAlign:"center",fontWeight:800,color:C.green,fontSize:14}}>${salePriceTotal.toFixed(2)}</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
                {unmatchedCount>0&&(
                  <div style={{fontSize:11,color:C.yellow,background:"#1a0d00",border:`1px solid ${C.yellow}33`,borderRadius:6,padding:"8px 12px"}}>
                    ⚠ {unmatchedCount} BOM item{unmatchedCount!==1?'s':''} had no matching line in the supplier quote — shown as "—" for quoted qty and panels buildable.
                  </div>
                )}
              </div>
            );
          })()}
          {phase==="thinking"&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 0",gap:14}}>
              <div style={{fontSize:36,animation:"spin 1.2s linear infinite",display:"inline-block"}}>⚙</div>
              <div style={{fontSize:13,color:C.muted}}>ARC is generating your preliminary BOM…</div>
            </div>
          )}
          {phase==="error"&&(
            <div style={{color:C.red,fontSize:13,padding:"24px 0"}}>{errorMsg}</div>
          )}
          {phase==="result"&&result&&(
            <>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:12,color:C.muted}}>{result.length} items generated — check the items you want to import</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setSelected(new Set(result.map(r=>r.id)))} style={{fontSize:11,background:"none",border:`1px solid ${C.accent}`,borderRadius:4,color:C.accent,padding:"3px 8px",cursor:"pointer"}}>All</button>
                  <button onClick={()=>setSelected(new Set())} style={{fontSize:11,background:"none",border:`1px solid ${C.border}`,borderRadius:4,color:C.muted,padding:"3px 8px",cursor:"pointer"}}>None</button>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {result.map(r=>{
                  const checked=selected.has(r.id);
                  const col=catColors[r.cpdCategory]||'#6b7280';
                  return(
                    <div key={r.id} onClick={()=>setSelected(prev=>{const s=new Set(prev);checked?s.delete(r.id):s.add(r.id);return s;})}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:6,background:checked?"#0d1a2a":"#0a0a12",border:`1px solid ${checked?C.accent+'44':C.border}`,cursor:"pointer"}}>
                      <div style={{width:16,height:16,borderRadius:3,border:`2px solid ${checked?C.accent:C.muted}`,background:checked?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {checked&&<span style={{color:"#000",fontSize:10,fontWeight:800,lineHeight:1}}>✓</span>}
                      </div>
                      <div style={{fontSize:9,fontWeight:700,color:col,background:col+'22',borderRadius:3,padding:"2px 5px",whiteSpace:"nowrap",flexShrink:0}}>{r.cpdCategory}</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.accent,minWidth:120,flexShrink:0}}>{r.partNumber||<span style={{color:C.muted,fontStyle:"italic"}}>TBD</span>}</div>
                      <div style={{fontSize:12,color:C.sub,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description}</div>
                      <div style={{fontSize:11,color:C.muted,flexShrink:0}}>Qty: {r.qty}</div>
                      {r.unitPrice>0&&<div style={{fontSize:11,color:C.green,flexShrink:0}}>${r.unitPrice.toFixed(2)}</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:12,padding:"8px 10px",background:"#0a0a12",borderRadius:6,border:`1px solid ${C.border}`,lineHeight:1.5}}>
                ⚠ This is an AI-generated preliminary BOM. Part numbers and pricing should be verified before quoting. All items are marked as AI-generated in the BOM.
              </div>
            </>
          )}
        </div>

        {/* Footer */}
        {phase==="result"&&(
          <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,justifyContent:"flex-end",flexShrink:0}}>
            <button onClick={onClose} style={btn(C.border,C.muted,{fontSize:13})}>Cancel</button>
            <button onClick={()=>onImportBom(result.filter(r=>selected.has(r.id)))}
              disabled={selected.size===0}
              style={btn(C.accentDim,C.accent,{fontSize:13,fontWeight:700,opacity:selected.size===0?0.4:1})}>
              Import {selected.size} Item{selected.size!==1?"s":""} into BOM
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── UPDATE BOM IN BC MODAL ──
function UpdateBomInBCModal({panel,onClose,onUpdate,onSaveImmediate}){
  const [phase,setPhase]=useState("checking"); // checking | confirm | in_use | updating | done | error | missing_items
  const [progress,setProgress]=useState("");
  const [result,setResult]=useState(null);
  const [projectWarning,setProjectWarning]=useState([]);
  const [missingItems,setMissingItems]=useState([]);
  const itemNo=panel.bcItemNumber||"";
  const mergedBom=(panel.bom||[]).filter(r=>(r.partNumber||"").trim()).slice().sort((a,b)=>{
    if(a.isLaborRow&&!b.isLaborRow)return -1;
    if(!a.isLaborRow&&b.isLaborRow)return 1;
    return (a.partNumber||"").localeCompare(b.partNumber||"");
  });
  const pendingBcCount=mergedBom.filter(r=>r.priceSource!=="bc"&&r.priceSource!=="manual").length;
  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:24};
  const modalCard={...card({padding:28}),width:"100%",maxWidth:560,display:"flex",flexDirection:"column",gap:16};

  useEffect(()=>{
    (async()=>{
      try{
        if(!_bcToken){await acquireBcToken(false);}
        const[{inUse},{onProjects,projects}]=await Promise.all([
          bcCheckItemInUse(itemNo),
          bcCheckItemOnProjects(itemNo)
        ]);
        if(onProjects)setProjectWarning(projects);
        setPhase(inUse?"in_use":"confirm");
      }catch(e){setPhase("confirm");}
    })();
  },[]);

  async function handleUpdate(){
    setPhase("updating");
    setProgress("Connecting to Business Central…");
    try{
      if(!_bcToken){_bcToken=await acquireBcToken(false)||null;}
      if(!_bcToken){_bcToken=await acquireBcToken(true)||null;}
      if(!_bcToken)throw new Error("Not connected to Business Central");

      // Pre-validate: all BOM part numbers must exist in BC
      if(mergedBom.length>0){
        setProgress("Validating BOM items exist in BC…");
        const missing=[];
        for(const row of mergedBom){
          const pn=(row.partNumber||"").trim();
          if(!pn)continue;
          const found=await bcLookupItem(pn);
          if(!found)missing.push(pn);
        }
        if(missing.length>0){
          setMissingItems(missing);
          setPhase("missing_items");
          return;
        }
      }

      const res=await bcReplaceAssemblyBOMLines(
        itemNo,mergedBom,
        (i,total,pn)=>setProgress(i===-1?"Clearing existing BOM lines…":`Adding BOM line ${i+1}/${total}: ${pn}…`)
      );
      const success=res.added>0&&res.errors.length===0&&!res.warning;
      setResult({...res,success});
      if(success&&onUpdate&&onSaveImmediate){
        const updated={...panel,status:"pushed_to_bc",updatedAt:Date.now()};
        onUpdate(updated);
        try{await onSaveImmediate(updated);}catch(se){console.warn("Status save failed:",se);}
      }
      setPhase("done");
    }catch(e){
      setResult({error:e.message});
      setPhase("error");
    }
  }

  return(
    <div style={overlay} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={modalCard}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:18,fontWeight:700}}>Update BOM in BC</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20}}>✕</button>
        </div>

        {phase==="checking"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,padding:"20px 0"}}>
            <div style={{width:36,height:36,border:"3px solid #38bdf844",borderTop:"3px solid #38bdf8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            <div style={{fontSize:13,color:C.sub}}>Checking item usage in Business Central…</div>
          </div>
        )}

        {phase==="in_use"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:"#451a0355",border:"1px solid #f9731644",borderRadius:8,padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:12}}>
              <span style={{fontSize:22,flexShrink:0}}>⚠️</span>
              <div>
                <div style={{fontWeight:700,color:"#f97316",fontSize:14,marginBottom:6}}>Item {itemNo} is already in use on a BC Project</div>
                <div style={{fontSize:13,color:C.sub,lineHeight:1.6}}>This item has ledger entries in Business Central and cannot be edited. To update the BOM, you must create a new item with the revised components.</div>
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={onClose} style={btn("#383850",C.muted,{fontSize:13})}>Cancel</button>
            </div>
          </div>
        )}

        {phase==="confirm"&&(<>
          {pendingBcCount>0&&(
            <div style={{background:"#450a0a55",border:"1px solid #ef444466",borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:18,flexShrink:0}}>🚫</span>
              <div>
                <div style={{fontWeight:700,color:"#f87171",fontSize:13,marginBottom:3}}>{pendingBcCount} part{pendingBcCount>1?"s":""} not yet verified in BC</div>
                <div style={{fontSize:12,color:C.sub}}>Resolve all blue BC circles before updating.</div>
              </div>
            </div>
          )}
          {projectWarning.length>0&&(
            <div style={{background:"#422006aa",border:"1px solid #f9731655",borderRadius:8,padding:"12px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:18,flexShrink:0}}>⚠️</span>
              <div>
                <div style={{fontWeight:700,color:"#fb923c",fontSize:13,marginBottom:4}}>Item {itemNo} is assigned to {projectWarning.length} BC Project{projectWarning.length>1?"s":""}</div>
                <div style={{fontSize:12,color:C.sub,marginBottom:6,lineHeight:1.5}}>Updating the Assembly BOM will affect this item on the following project{projectWarning.length>1?"s":""}. Only proceed if you are sure the change is intentional.</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {projectWarning.map(p=><span key={p} style={{background:"#f9731622",color:"#fb923c",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"monospace"}}>{p}</span>)}
                </div>
              </div>
            </div>
          )}
          <div style={{background:"#0d1f3c",border:"1px solid #38bdf844",borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:13,color:C.sub,marginBottom:4}}>BC Item: <span style={{fontFamily:"monospace",color:"#38bdf8",fontWeight:700}}>{itemNo}</span></div>
            <div style={{fontSize:13,color:C.sub}}>This will <strong style={{color:"#f87171"}}>delete all existing Assembly BOM lines</strong> for this item and replace them with the current ARC BOM ({mergedBom.length} component{mergedBom.length!==1?"s":""}).</div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:4}}>
            <button onClick={onClose} style={btn("#383850",C.muted,{fontSize:13})}>Cancel</button>
            <button onClick={handleUpdate} disabled={pendingBcCount>0}
              style={btn("#0d1f3c","#38bdf8",{fontSize:13,opacity:pendingBcCount>0?0.4:1,border:"1px solid #38bdf866"})}>
              Replace BOM in BC
            </button>
          </div>
        </>)}

        {phase==="updating"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,padding:"20px 0"}}>
            <div style={{width:40,height:40,border:`3px solid ${"#38bdf8"}44`,borderTop:`3px solid ${"#38bdf8"}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            <div style={{fontSize:14,color:C.sub,textAlign:"center"}}>{progress}</div>
          </div>
        )}

        {phase==="done"&&result&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {result.success?(
              <div style={{background:"#0d1f3c",border:"1px solid #38bdf844",borderRadius:8,padding:16}}>
                <div style={{fontSize:15,fontWeight:700,color:"#38bdf8",marginBottom:6}}>✓ BOM Updated Successfully</div>
                <div style={{fontSize:13,color:C.sub}}>Removed <strong>{result.deleted}</strong> old line{result.deleted!==1?"s":""} · Added <strong>{result.added}</strong> new line{result.added!==1?"s":""}</div>
              </div>
            ):(
              <div style={{background:C.yellowDim,border:`1px solid ${C.yellow}44`,borderRadius:8,padding:16}}>
                <div style={{fontSize:15,fontWeight:700,color:C.yellow,marginBottom:6}}>⚠ Partial Update</div>
                <div style={{fontSize:13,color:C.sub}}>Removed {result.deleted} · Added {result.added} · {result.skipped} skipped</div>
              </div>
            )}
            {result.warning&&<div style={{fontSize:12,color:C.yellow,background:C.yellowDim,borderRadius:6,padding:"8px 12px"}}>{result.warning}</div>}
            {result.errors&&result.errors.length>0&&(
              <div style={{fontSize:12,color:C.red,background:C.redDim,borderRadius:6,padding:"8px 12px",maxHeight:120,overflowY:"auto"}}>
                <div style={{fontWeight:700,marginBottom:4}}>Errors ({result.errors.length}):</div>
                {result.errors.map((e,i)=><div key={i} style={{marginBottom:2}}>• {e}</div>)}
              </div>
            )}
            <div style={{textAlign:"right"}}><button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button></div>
          </div>
        )}

        {phase==="error"&&result&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:16}}>
              <div style={{fontSize:15,fontWeight:700,color:C.red,marginBottom:6}}>✗ Update Failed</div>
              <div style={{fontSize:13,color:C.sub}}>{result.error}</div>
            </div>
            <div style={{textAlign:"right"}}><button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button></div>
          </div>
        )}

        {phase==="missing_items"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:8,padding:16}}>
              <div style={{fontSize:15,fontWeight:700,color:C.red,marginBottom:6}}>⛔ Missing Items in BC</div>
              <div style={{fontSize:13,color:C.sub,marginBottom:10}}>The following item{missingItems.length>1?"s":""} must be added to Business Central before you can update this BOM:</div>
              <div style={{fontFamily:"monospace",fontSize:13,display:"flex",flexDirection:"column",gap:4}}>
                {missingItems.map(pn=><div key={pn} style={{color:C.red}}>• {pn}</div>)}
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <button onClick={onClose} style={btn(C.accent,"#fff",{fontSize:13})}>Close</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── SUPPLIER QUOTE IMPORT MODAL ──
