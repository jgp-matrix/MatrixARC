        const dismiss=()=>{if(pricingProgress?.isError)setPricingProgress(null);else bgDismiss(panel.id);};
        return(
        <div style={{marginBottom:12}}>
          <div style={{width:"100%",height:38,background:isErr?C.redDim:C.border,borderRadius:10,overflow:"hidden",position:"relative"}}>
            <div style={{height:"100%",background:barBg,borderRadius:10,transition:"width 0.25s linear",width:(isErr?100:pct)+"%"}}/>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 14px"}}>

            <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{color:"#cc0000",fontSize:12}}>⬤</span> Missing</span>

                  {[["#",56],["Qty",56],["Part Number",0,"fit"],["",32],["Description",0],["Manufacturer",0,"fit"],["Notes",160],["Unit $",110],["Ext $",80],["Val",44],["",90]].map(([h,w,mode],hi)=>(

                  ))}
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const sortedBom=(panel.bom||[]).slice().sort((a,b)=>{
                    if(a.isLaborRow&&!b.isLaborRow)return -1;

                    if(a.isLaborRow&&b.isLaborRow)return(a.partNumber||"").localeCompare(b.partNumber||"");
                    if(!a.itemNo&&!b.itemNo)return 0;
                    if(!a.itemNo)return 1;
                    if(!b.itemNo)return -1;
                    const an=parseFloat(a.itemNo),bn=parseFloat(b.itemNo);
                    if(!isNaN(an)&&!isNaN(bn))return an-bn;
                    return (a.itemNo||"").localeCompare(b.itemNo||"");
                  });
                  const valData=panel.validation||null;
                  const matchedIds=valData?new Set((valData.matched||[]).map(m=>String(m.item.id))):null;
                  const missingIds=valData?new Set((valData.missingFromSchematic||[]).map(m=>String(m.id))):null;
                  const ntIds=valData?new Set((valData.notTraceable||[]).map(m=>String(m.id))):null;
                  const wAccepted=new Set((panel.wiringAccepted||[]).map(String));

                                if(f==="partNumber"&&e.key==="Enter"&&!readOnly){
                                  e.preventDefault();

                                  const origVal=bomEditRef.current[row.id]||"";
                                  if(newVal&&newVal!==origVal){
                                    const label=row.itemNo||(i+1);
                                    const desc=row.description?` - "${row.description}"`:"";

                                    setAiFeedback(prev=>(prev.trim()?prev.trim()+"\n":"")+line);
                                    const updatedBom=(panel.bom||[]).map(r=>r.id===row.id?{...r,[f]:newVal}:r);
                                    const updatedPanel={...panel,bom:updatedBom};
                                    onUpdate(updatedPanel);
                                    saveBomRow(updatedPanel);
                                    if(origVal.trim()){
                                      savePartCorrection(uid,{wrongValue:origVal,correctValue:newVal,description:row.description||"",manufacturer:row.manufacturer||""})
                                        .then(()=>loadPartCorrections(uid).then(setPartCorrections)).catch(()=>{});
                                    }
                                    e.target.blur();
                                    setTimeout(()=>{feedbackRef.current?.scrollIntoView({behavior:"smooth",block:"nearest"});feedbackRef.current?.focus();},80);
                                  } else {
                                    e.target.blur();
                                  }
                                }
                              }}
                              style={{...inp({padding:"5px 14px 5px 7px",fontSize:13,borderColor:"transparent",background:"transparent",borderRadius:5}),position:"absolute",inset:0,width:"100%",minWidth:0}}
                            />
                            {f==="partNumber"&&(row.learnedPartNumber||row.correctedByLibrary)&&(
                              <span style={{position:"absolute",top:3,right:3,fontSize:9,color:row.correctedByLibrary?C.yellow:C.teal,pointerEvents:"none",fontWeight:800}}>{row.correctedByLibrary?"🔧":"📚"}</span>
                            )}
                          </div>
                          {f==="partNumber"&&row.autoLoaded&&(
                            <span style={{fontSize:10,color:C.red,fontWeight:700,marginLeft:6,whiteSpace:"nowrap"}}>Auto-Loaded</span>
                          )}
                          {f==="partNumber"&&row.isCrossed&&(
                            <span style={{fontSize:10,color:C.red,fontWeight:700,marginLeft:6,whiteSpace:"nowrap"}}>{row.autoReplaced?"APEX crossed":"crossed item"}</span>
                          )}
                          {f==="partNumber"&&row.isCorrection&&(
                            <span style={{fontSize:10,color:C.red,fontWeight:700,marginLeft:6,whiteSpace:"nowrap"}}>
                              {row.correctionType==='extraction'?'extraction corrected':row.correctionType==='formatting'?'formatting error':row.correctionType==='format'?'format corrected':'corrected'}
                            </span>
                          )}
                          </div>
                          {f==="partNumber"&&row.isCrossed&&row.crossedFrom&&!readOnly&&(()=>{
                            const alt=alternates.find(a=>a.originalPN===row.crossedFrom);
                            return(
                              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2,paddingLeft:2}}>
                                <span style={{fontSize:10,color:C.muted}}>from: <span style={{color:C.red}}>{row.crossedFrom}</span></span>
                                {alt&&(
                                  <label style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:C.muted,cursor:"pointer"}}>
                                    <input type="checkbox" checked={alt.autoReplace||false}
                                      onChange={e=>setAltAutoReplace(uid,row.crossedFrom,e.target.checked).then(alts=>setAlternates([...alts])).catch(()=>{})}
                                      style={{accentColor:C.accent,width:10,height:10,cursor:"pointer"}}/>
                                    auto-replace
                                  </label>
                                )}
                              </div>
                            );
                          })()}
                          {f==="partNumber"&&!row.isLaborRow&&!row.isCrossed&&!readOnly&&(()=>{
                            const pn=(row.partNumber||"").trim();
                            const avail=pn?alternates.filter(a=>a.originalPN===pn):[];
                            if(!avail.length)return null;
                            return(
                              <div style={{marginTop:3}}>
                                <select onChange={e=>{
                                  if(!e.target.value)return;
                                  const alt=avail.find(a=>a.replacement.partNumber===e.target.value);
                                  if(alt)applyBcItem(row.id,{number:alt.replacement.partNumber,unitCost:alt.replacement.unitCost,displayName:alt.replacement.description});
                                  e.target.value="";
                                }} style={{fontSize:10,background:"#1a1040",border:`1px solid ${C.accent}`,borderRadius:4,color:C.accent,padding:"1px 4px",cursor:"pointer"}}>
                                  <option value="">⇄ Alternates…</option>
                                  {avail.map(a=>(
                                    <option key={a.replacement.partNumber} value={a.replacement.partNumber}>
                                      {a.replacement.partNumber}{a.autoReplace?" ✓ auto":""} — {a.replacement.description}
                                    </option>
                                  ))}
                                </select>
                              </div>
                            );
                          })()}
                          {f==="partNumber"&&row.suggestedPartNumber&&!row.partNumber&&!readOnly&&(
                            <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3,paddingLeft:2,flexWrap:"nowrap"}}>
                              <span style={{fontSize:10,color:C.teal}}>📚</span>
                              <span style={{fontSize:11,color:C.teal,fontWeight:700}}>{row.suggestedPartNumber}</span>
                              <button onClick={()=>confirmSuggestion(row.id)} style={{fontSize:10,color:"#000",background:C.teal,border:"none",borderRadius:3,padding:"1px 7px",cursor:"pointer",fontWeight:700,whiteSpace:"nowrap"}}>Use</button>
                              <button onClick={()=>dismissSuggestion(row.id)} style={{fontSize:11,color:C.muted,background:"none",border:"none",cursor:"pointer",lineHeight:1}}>✕</button>
                            </div>
                          )}
                          {f==="partNumber"&&bcFuzzySuggestions[row.id]&&!readOnly&&(
                            <div style={{marginTop:4,background:"#0a0a12",border:`1px solid ${C.accent}44`,borderRadius:6,padding:6,maxHeight:140,overflow:"auto"}}>
                              <div style={{display:"flex",alignItems:"center",marginBottom:4}}>

                                  style={{fontSize:10,color:C.text,background:C.border,border:"none",cursor:"pointer",padding:"2px 10px",lineHeight:1,fontWeight:600,borderRadius:20}}
                                  onMouseEnter={e=>e.target.style.background=C.muted} onMouseLeave={e=>e.target.style.background=C.border}>Close</button>
                              </div>

                                  <span style={{color:C.green,fontWeight:600,whiteSpace:"nowrap"}}>{s.unitCost!=null?"$"+s.unitCost.toFixed(2):""}</span>
                                </div>
                              ))}
                            </div>
                          )}
                          </div>
                        ):(
                          <input value={row[f]||""} readOnly={readOnly||row.isLaborRow}
                            onChange={e=>!row.isLaborRow&&updateBomRow(row.id,f,e.target.value)}
                            onBlur={e=>{
                              e.target.style.borderColor="transparent";
                              const val=e.target.value;
                              const updatedBom=(panel.bom||[]).map(r=>r.id===row.id?{...r,[f]:val}:r);
                              saveBomRow({...panel,bom:updatedBom});
                              if(f==="partNumber"&&val.trim()){
                                savePartLibraryEntry(uid,{manufacturer:row.manufacturer||"",description:row.description||"",partNumber:val.trim()})
                                  .then(()=>loadPartLibrary(uid).then(setPartLibrary)).catch(()=>{});
                              }
                            }}
                            style={{...inp({padding:"5px 14px 5px 7px",fontSize:13,borderColor:"transparent",background:"transparent",borderRadius:5}),width:w?w-10+"px":"100%",minWidth:w?w-10+"px":"100px",flex:1}}
                            onFocus={e=>e.target.style.borderColor=C.accent}
                          />
                        )}
                      </td>
                    ))}
                    <td style={{padding:"3px 5px",textAlign:"right",width:110}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                        {row.isLaborRow&&<span style={{background:"#1e3a5f",color:"#38bdf8",borderRadius:8,padding:"1px 5px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>LABOR</span>}
                        {!row.isLaborRow&&row.priceSource==="bc"&&<span style={{background:"#2563eb22",color:"#5b9aff",borderRadius:8,padding:"1px 5px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>BC</span>}
                        {!row.isLaborRow&&row.priceSource==="ai"&&<span style={{background:C.teal+"22",color:C.teal,borderRadius:8,padding:"1px 5px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>AI</span>}
                        {!row.isLaborRow&&row.priceSource==="manual"&&<span style={{background:C.accentDim,color:C.accent,borderRadius:8,padding:"1px 5px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>M</span>}
                        <div style={{display:"inline-flex",alignItems:"center",gap:0,marginLeft:"auto"}}>
                        {row.isLaborRow?<span style={{color:C.muted,fontSize:13,minWidth:70,textAlign:"right"}}>— auto</span>:<>
                        <span style={{color:C.muted,fontSize:13,lineHeight:1}}>$</span>
                        <input type="text" inputMode="decimal" readOnly={readOnly}
                          defaultValue={row.unitPrice!=null?parseFloat(row.unitPrice).toFixed(2):""}

                          placeholder="—"
                          style={{background:"transparent",border:"1px solid transparent",borderRadius:5,padding:"5px 2px 5px 0",color:C.text,fontSize:13,outline:"none",textAlign:"left",width:70,minWidth:50}}

                          onBlur={e=>{e.target.style.borderColor="transparent";e.target.style.background="transparent";const v=e.target.value.trim();if(v===""){updatePrice(row.id,"");}else{const n=parseFloat(v);if(!isNaN(n)){e.target.value=n.toFixed(2);updatePrice(row.id,String(n));}else{e.target.value=row.unitPrice!=null?parseFloat(row.unitPrice).toFixed(2):"";}}}}

                        />
                        </>}
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"3px 8px",textAlign:"right",width:80,fontSize:13,color:row.unitPrice!=null?C.text:C.muted,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>
                      {row.isLaborRow?"—":row.unitPrice!=null?"$"+((row.unitPrice||0)*(row.qty||1)).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—"}
                    </td>
                    <td style={{padding:"3px 5px",textAlign:"center",width:44}}>
                      {valData&&(
                        matchedIds.has(String(row.id))?<span style={{color:C.green,fontSize:13}} title="Matched in schematic">⬤</span>

                        :<span style={{color:C.border,fontSize:11}}>—</span>
                      )}
                    </td>
                    <td style={{padding:"3px 3px",textAlign:"center",width:90}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:0}}>
                        {!readOnly&&!row.isLaborRow&&<button onClick={()=>deleteBomRow(row.id)} style={{background:"none",border:"none",color:"#ff3333",cursor:"pointer",fontSize:18,opacity:0.6,padding:"2px 4px",width:28,textAlign:"center"}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.6}>✕</button>}
                      </div>
                    </td>
                  </tr>
                ));
                })()}
              </tbody>
            </table>
          </div>
          {!readOnly&&<button onClick={addBomRow} style={btn("transparent",C.accent,{fontSize:12,padding:"8px 12px",border:`1px dashed ${C.accent}66`,width:"100%",marginTop:8})}>+ Add Row</button>}
          {/* BOM Notes */}
          {(()=>{
            const crossedItems=(panel.bom||[]).filter(r=>r.isCrossed&&r.crossedFrom);
            const formatCorrections=(panel.bom||[]).filter(r=>r.isCorrection&&(r.correctionType==='format'||r.correctionType==='formatting')&&r.correctionFrom);
            return(
              <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                {crossedItems.length>0&&(
                  <div style={{marginBottom:8,background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 12px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.red,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Crossed / Superseded</div>
                    {crossedItems.map((r,i)=>(
                      <div key={r.id} style={{fontSize:12,color:C.sub,marginBottom:2}}>
                        <span style={{color:C.muted}}>{i+1}.</span>{" "}
                        {r.autoReplaced&&<span style={{fontSize:10,color:"#a78bfa",fontWeight:700,marginRight:4}}>[APEX]</span>}
                        <span style={{color:C.red,fontWeight:600}}>{r.crossedFrom}</span>
                        <span style={{color:C.muted}}> → </span>
                        <span style={{color:C.accent,fontWeight:600}}>{r.partNumber}</span>
                        {r.description&&<span style={{color:C.muted,fontSize:11}}> ({r.description})</span>}
                      </div>
                    ))}
                  </div>
                )}
                {formatCorrections.length>0&&(
                  <div style={{marginBottom:8,background:"#0a0a12",border:"1px solid #f0c04044",borderRadius:6,padding:"8px 12px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#f0c040",textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Format Corrections</div>
                    {formatCorrections.map((r,i)=>(
                      <div key={r.id} style={{fontSize:12,color:C.sub,marginBottom:2}}>
                        <span style={{color:C.muted}}>{i+1}.</span>{" "}
                        <span style={{color:"#f0c040",fontWeight:600}}>{r.correctionFrom}</span>
                        <span style={{color:C.muted}}> → </span>
                        <span style={{color:C.accent,fontWeight:600}}>{r.partNumber}</span>
                        {r.description&&<span style={{color:C.muted,fontSize:11}}> ({r.description})</span>}
                        <span style={{color:C.muted,fontSize:10}}> — {r.correctionType==='formatting'?'formatting error':'format corrected'}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Notes</div>
                  <textarea
                    value={panel.bomNotes||""}
                    onChange={e=>{const updated={...panel,bomNotes:e.target.value};onUpdate(updated);if(autoSaveTimer.current)clearTimeout(autoSaveTimer.current);autoSaveTimer.current=setTimeout(()=>{try{onSaveImmediate(updated);}catch(ex){}},1000);}}
                    readOnly={readOnly}
                    rows={3}
                    placeholder="Additional notes about this panel's BOM…"
                    style={{width:"100%",background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:12,padding:"6px 8px",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",outline:"none"}}
                  />
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* Pricing Summary — directly under Add Row */}
      {(panel.bom||[]).length>0&&(()=>{
        const pr=panel.pricing||{};
        const markup=pr.markup??30;
        const laborRate=pr.laborRate??45;
        const contingencyBOM=pr.contingencyBOM??_pricingConfig.contingencyBOM;
        const contingencyConsumables=pr.contingencyConsumables??_pricingConfig.contingencyConsumables;
        const laborEst=computeLaborEstimate(panel);
        const laborHours=laborEst.totalHours;
        const laborCost=laborEst.totalCost;
        const bom=panel.bom||[];
        const pricedCount=bom.filter(r=>r.unitPrice!=null).length;
        const totalCost=bom.reduce((s,r)=>s+(r.unitPrice||0)*(r.qty||1),0);
        const grandTotal=totalCost+laborCost+contingencyBOM+contingencyConsumables;
        const sellPrice=grandTotal*(1+markup/100);
        const fmt=n=>"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
        const pendingBcCount=bom.filter(r=>(r.partNumber||"").trim()&&r.priceSource!=="bc"&&r.priceSource!=="manual").length;
        const GDEF=[
          {label:"CUT",   color:"#f97316", cats:["Panel Holes","Side Devices","HVAC/Fans"]},
          {label:"LAYOUT",color:"#a78bfa", cats:["Device Mounting","Duct & DIN Rail","Labels"]},
          {label:"WIRE",  color:"#38bdf8", cats:["Wire Time","Door Wiring"]},
        ];
        const laborAccepted=panel.laborData?.accepted||{};
        const acceptedCount=laborEst.lines.filter(l=>laborAccepted[l.category]).length;
        const allAccepted=laborEst.lines.length>0&&acceptedCount===laborEst.lines.length;
        return(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>

            {/* ── Top action bar ── */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap",justifyContent:"flex-end"}}>
              <span style={{fontSize:12,color:C.sub,marginRight:"auto"}}>{pricedCount}/{bom.length} priced</span>
              {_apiKey&&pages.some(p=>getPageTypes(p).includes("schematic")&&(p.dataUrl||p.storageUrl))&&(
                validatingPanel
                  ?<span style={{display:"inline-flex",alignItems:"center",gap:8,padding:"4px 12px"}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.accent,animation:"pulse 1.2s ease-in-out infinite"}}>Validating…</span>
                    <span style={{fontSize:15,fontWeight:800,color:C.text,fontVariantNumeric:"tabular-nums"}}>{valPct}%</span>
                  </span>
                  :<button data-tip="Re-run AI validation against schematic/back-panel drawings to update wiring and layout checks" onClick={validatePanel} disabled={readOnly} style={btn(C.accentDim,C.accent,{fontSize:12,padding:"4px 12px",opacity:readOnly?0.5:1,border:`1px solid ${C.accent}55`})}>🔄 Re-Validate</button>
              )}
              {!readOnly&&bom.length>0&&(<>
                {_bcToken
                  ?<span style={{background:"#2563eb22",color:"#5b9aff",borderRadius:10,padding:"3px 10px",fontSize:11,fontWeight:700}}>BC Connected</span>
                  :<button disabled={bcConnecting} onClick={async()=>{
                    setBcConnecting(true);setBcError("");
                    try{await acquireBcToken();if(_bcToken){setBcError("");}else{setBcError("BC login failed — no token received");}}
                    catch(e){setBcError("BC error: "+(e.message||e));}
                    setBcConnecting(false);onUpdate({...panel});
                  }} style={btn(C.border,C.muted,{fontSize:11,padding:"3px 10px",borderRadius:10,opacity:bcConnecting?0.5:1})}>
                    {bcConnecting?"Connecting…":"Connect BC"}
                  </button>
                }
                {bcError&&<span style={{fontSize:11,color:C.red}}>{bcError}</span>}
                {_apiKey&&<button data-tip="Look up prices from Business Central, then fill remaining items with AI estimates" onClick={runPricingOnPanel} disabled={aiPricing} style={btn(C.accentDim,C.accent,{fontSize:12,padding:"4px 12px",opacity:aiPricing?0.5:1,border:`1px solid ${C.accent}55`})}>
                  {aiPricing?"Pricing…":"💲 Get Prices (BC + AI)"}
                </button>}
              </>)}
            </div>

            {/* ── Three-column: Labor | Confidence | Pricing Summary ── */}
            <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"stretch",marginBottom:12}}>

              {/* LEFT: Labor */}
              <div style={{background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px",minWidth:300,flexShrink:0}}>
                {/* Header */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.5}}>LABOR</div>
                  <span style={{background:laborEst.isLegacy?C.yellowDim:laborEst.hasLayoutData?C.greenDim:C.accentDim,color:laborEst.isLegacy?C.yellow:laborEst.hasLayoutData?C.green:C.accent,borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>
                    {laborEst.isOverride?"Manual Override":laborEst.isLegacy?"Legacy":laborEst.hasLayoutData?"Auto (schematic + layout)":"Schematic only"}
                  </span>
                  {allAccepted&&<span style={{background:C.greenDim,color:C.green,borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700}}>All Accepted</span>}
                </div>
                {/* Estimated Hrs tiles */}
                {!laborEst.isOverride&&laborEst.lines.length>0&&(
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>Estimated Hrs</div>
                    <div style={{display:"flex",gap:0}}>
                      {GDEF.map(({label,color,cats},gi)=>{
                        const hrs=laborEst.lines.filter(l=>cats.includes(l.category)).reduce((s,l)=>s+l.hours,0);
                        return(
                          <div key={label} style={{flex:1,background:"#060610",border:`1px solid ${color}55`,borderRadius:gi===0?"8px 0 0 8px":gi===GDEF.length-1?"0 8px 8px 0":"0",borderRight:gi<GDEF.length-1?"none":undefined,padding:"10px 8px",textAlign:"center"}}>
                            <div style={{fontSize:11,fontWeight:700,color,letterSpacing:0.8,marginBottom:2}}>{label}</div>
                            <div style={{fontSize:20,fontWeight:800,color:C.text,fontVariantNumeric:"tabular-nums",lineHeight:1}}>{Math.ceil(hrs)}</div>
                            <div style={{fontSize:10,color:C.muted,marginTop:2}}>hrs</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                {/* Rate controls */}
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
                  <span style={{fontSize:12,color:C.muted}}>$/hr</span>
                  <input type="number" min="0" step="1" readOnly={readOnly} value={laborRate}
                    onChange={e=>savePricing({laborRate:Math.max(0,+e.target.value||0)})}
                    style={{...inp({padding:"3px 5px",fontSize:13,width:60,textAlign:"right",border:"1px solid #888"})}}/>
                  <span style={{fontSize:12,color:C.muted}}>Override hrs</span>
                  <input type="number" min="0" step="0.5" readOnly={readOnly} value={pr.laborHoursOverride??""} placeholder="auto"
                    onChange={e=>savePricing({laborHoursOverride:e.target.value===""?null:Math.max(0,+e.target.value||0)})}
                    style={{...inp({padding:"3px 5px",fontSize:13,width:60,textAlign:"right",border:"1px solid #888"})}}/>
                </div>
                {/* More Info toggle */}
                {laborEst.lines.length>0&&(
                  <button onClick={()=>setLaborMoreInfo(v=>!v)}
                    style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.muted,cursor:"pointer",fontSize:11,padding:"3px 10px",width:"100%",textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10}}>{laborMoreInfo?"▲":"▼"}</span>
                    {laborMoreInfo?"Hide Detail":"More Info"}
                  </button>
                )}
                {/* Collapsible detail — always rendered to preserve box height */}
                <div style={{visibility:laborMoreInfo?"visible":"hidden"}}>
                <>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginTop:8,marginBottom:6}}>
                    <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
                      <th style={{textAlign:"center",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12,width:24}}>&#10003;</th>
                      <th style={{textAlign:"left",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Category</th>
                      <th style={{textAlign:"right",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Qty</th>
                      <th style={{textAlign:"right",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Hrs</th>
                      <th style={{textAlign:"right",padding:"3px 4px",color:C.muted,fontWeight:600,fontSize:12}}>Cost</th>
                    </tr></thead>
                    <tbody>
                      {laborEst.lines.map((l,i)=>{
                        const isAccepted=!!laborAccepted[l.category];
                        return(
                        <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:isAccepted?"#0a1a0a":"transparent"}}>
                          <td style={{padding:"3px 4px",textAlign:"center"}}>
                            <input type="checkbox" checked={isAccepted} disabled={readOnly}
                              onChange={e=>saveLaborAccepted(l.category,e.target.checked)}
                              style={{accentColor:C.green,cursor:readOnly?"default":"pointer",margin:0}}/>
                          </td>
                          <td style={{padding:"3px 4px",color:isAccepted?C.green:C.sub,whiteSpace:"nowrap"}}>{l.category}</td>
                          <td style={{padding:"3px 4px",textAlign:"right",whiteSpace:"nowrap"}}>
                            {l.field&&!readOnly?(
                              <input type="text" inputMode="decimal" defaultValue={l.qty} key={l.field+"-"+l.qty}
                                onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v)&&v!==l.qty)saveLaborOverride(l.field,Math.max(0,v));}}
                                onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
                                style={{background:"transparent",border:"1px solid #888",borderRadius:4,color:C.text,padding:"1px 4px",fontSize:13,width:48,textAlign:"right"}}/>
                            ):(
                              <span style={{color:C.text}}>{l.qty}</span>
                            )}
                            {" "}<span style={{color:C.muted,fontSize:12}}>{l.unit}</span>
                          </td>
                          <td style={{padding:"3px 4px",textAlign:"right",color:C.muted,fontSize:12}}>{l.hours.toFixed(1)}</td>
                          <td style={{padding:"3px 4px",textAlign:"right",color:C.text,fontVariantNumeric:"tabular-nums"}}>{fmt(l.cost)}</td>
                        </tr>);
                      })}
                      <tr style={{borderTop:`1px solid ${C.border}`}}>
                        <td style={{padding:"3px 4px",textAlign:"center",fontSize:11,color:C.muted}}>{acceptedCount}/{laborEst.lines.length}</td>
                        <td style={{padding:"3px 4px",fontWeight:700,color:C.text}}>TOTAL</td>
                        <td></td>
                        <td style={{padding:"3px 4px",textAlign:"right",fontWeight:700,color:C.text}}>{laborEst.totalHours.toFixed(1)}</td>
                        <td style={{padding:"3px 4px",textAlign:"right",fontWeight:700,color:C.accent,fontVariantNumeric:"tabular-nums"}}>{fmt(laborEst.totalCost)}</td>
                      </tr>
                    </tbody>
                  </table>
                  {!laborEst.isOverride&&!laborEst.isLegacy&&laborEst.inputs&&(
                    <div style={{borderTop:`1px solid ${C.border}`,paddingTop:6,marginTop:4}}>
                      <div style={{fontSize:11,color:C.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Detected Inputs</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 12px",fontSize:12}}>
                        {[
                          ["Wire terminations",laborEst.inputs.wireTerminations||laborEst.inputs.wireCount||0],
                          ["Total wires",laborEst.inputs.wireCount||0],
                          ["Door-mounted devices",laborEst.inputs.doorDevices||0],
                          ["Total devices",laborEst.inputs.allDevices||0],
                          ["Panel holes",laborEst.inputs.panelHoles||0],
                          ["Duct & DIN rail",`${laborEst.inputs.ductDinFeet||0} ft`],
                          ["Side devices (small)",laborEst.inputs.sideTopSmallCount||0],
                          ["Side devices (AC/Fan)",laborEst.inputs.sideTopLargeCount||0],
                          ["Label hours",laborEst.inputs.labelHours||0],
                          ["PM sessions",laborEst.inputs.pmUnits||0],
                        ].map(([label,val])=>(
                          <div key={label} style={{display:"flex",justifyContent:"space-between"}}>
                            <span style={{color:C.muted}}>{label}</span>
                            <span style={{color:C.text,fontVariantNumeric:"tabular-nums"}}>{val}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
                </div>
              </div>

              {/* RIGHT: Pricing Summary */}
              {/* MIDDLE: Level of Confidence */}
              <div style={{flex:1,minWidth:180,display:"flex",flexDirection:"column"}}>
                <ConfidenceBar panel={panel} readOnly={readOnly} onUpdate={onUpdate} onSaveImmediate={onSaveImmediate}/>
              </div>

              <div style={{flex:"0 0 auto",width:"30%",minWidth:200,background:"#0a0a12",border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:12,color:C.muted,fontWeight:700,letterSpacing:0.7,marginBottom:10}}>PRICING SUMMARY</div>
                {[
                  ["Materials",fmt(totalCost),C.green,null,null],
                  ["BOM Contingency",null,C.sub,contingencyBOM,"contingencyBOM"],
                  ["Consumables",null,C.sub,contingencyConsumables,"contingencyConsumables"],
                  ["Labor",fmt(laborCost),C.sub,null,null],
                  ["Total",fmt(grandTotal),C.text,null,null],
                ].map(([label,val,color,numVal,key])=>(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,fontSize:13}}>
                    <span style={{color:C.muted}}>{label}</span>
                    {key?(
                      <div style={{display:"flex",alignItems:"center",gap:2}}>
                        <span style={{color:C.muted,fontSize:12}}>$</span>
                        <input type="number" min="0" step="50" readOnly={readOnly} value={numVal}
                          onChange={e=>savePricing({[key]:Math.max(0,+e.target.value||0)})}
                          style={{...inp({padding:"3px 5px",fontSize:13,borderColor:"transparent",background:"transparent",borderRadius:4,width:80,textAlign:"right"}),color}}
                          onFocus={e=>e.target.style.borderColor=C.accent}
                          onBlur={e=>e.target.style.borderColor="transparent"}/>
                      </div>
                    ):(
                      <span style={{color,fontWeight:label==="Total"?700:400,fontVariantNumeric:"tabular-nums"}}>{val}</span>
                    )}
                  </div>
                ))}
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:C.sub,fontSize:13}}>Margin</span>
                    <input type="number" min="0" step="1" value={markup} readOnly={readOnly}
                      onChange={e=>savePricing({markup:Math.max(0,+e.target.value||0)})}
                      style={{...inp({padding:"3px 6px",fontSize:13,width:55,textAlign:"right"})}}/>
                    <span style={{color:C.muted,fontSize:13}}>%</span>
                  </div>
                  <span style={{fontWeight:800,color:C.accent,fontSize:18,fontVariantNumeric:"tabular-nums"}}>{fmt(sellPrice)}</span>
                </div>
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:8,display:"flex",flexDirection:"column",gap:6}}>
                  <button onClick={onViewQuote} style={btn(C.greenDim,C.green,{fontSize:13,padding:"6px 18px",width:"100%"})}>📊 View Quote</button>
                  {!readOnly&&(<>
                    {panel.bcItemNumber&&(
                      <button onClick={()=>!pendingBcCount&&setShowUpdateBom(true)} disabled={pendingBcCount>0}
                        title={pendingBcCount>0?`${pendingBcCount} unverified BC parts — resolve blue circles first`:`Update Assembly BOM for item ${panel.bcItemNumber}`}
                        style={{background:pendingBcCount>0?"#111":"#0d1f3c",border:'1px solid '+(pendingBcCount>0?"#444":"#38bdf866"),color:pendingBcCount>0?"#555":"#38bdf8",cursor:pendingBcCount>0?"not-allowed":"pointer",borderRadius:20,padding:"5px 16px",fontSize:12,fontWeight:700,whiteSpace:"nowrap",letterSpacing:0.3,opacity:pendingBcCount>0?0.5:1,textAlign:"center"}}>
                        🔄 Update BOM in BC (Item# {panel.bcItemNumber})
                      </button>
                    )}
                    <button
                      onClick={()=>!panel.bcItemNumber&&!pendingBcCount&&setShowCreateItem(true)}
                      disabled={!!panel.bcItemNumber||pendingBcCount>0}
                      title={panel.bcItemNumber?`Item ${panel.bcItemNumber} already created in BC`:pendingBcCount>0?`${pendingBcCount} part${pendingBcCount>1?"s":""} not yet verified in BC — resolve all blue BC circles first`:undefined}
                      style={{background:(!panel.bcItemNumber&&!pendingBcCount)?"#1a1040":"#111",border:"1px solid "+(!panel.bcItemNumber&&!pendingBcCount?"#7c3aed":"#444"),color:panel.bcItemNumber?"#38bdf8":(!pendingBcCount?"#c4b5fd":"#555"),cursor:(!panel.bcItemNumber&&!pendingBcCount)?"pointer":"not-allowed",borderRadius:20,padding:"5px 16px",fontSize:12,fontWeight:700,whiteSpace:"nowrap",letterSpacing:0.3,opacity:panel.bcItemNumber?0.7:pendingBcCount>0?0.5:1,textAlign:"center"}}>
                      {panel.bcItemNumber?`✓ Item ${panel.bcItemNumber} Already In BC`:"⚙ Create Item in BC"}
                    </button>
                    {pendingBcCount>0&&<span style={{fontSize:10,color:"#f87171",textAlign:"center"}}>{pendingBcCount} unverified BC part{pendingBcCount>1?"s":""}</span>}
                  </>)}
                </div>
              </div>
            </div>

          </div>
        );
      })()}

      {/* AI Feedback & Correction */}
      {(panel.bom||[]).length>0&&!readOnly&&_apiKey&&(
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{fontSize:12,color:C.accent,fontWeight:700,letterSpacing:0.7}}>🤖 AI CORRECTION</div>
            {(panel.extractionFeedbackLog||[]).length>0&&(
              <span style={{fontSize:11,color:C.muted}}>{(panel.extractionFeedbackLog).length} correction{(panel.extractionFeedbackLog).length!==1?"s":""} logged</span>
            )}
          </div>
          <div style={{fontSize:12,color:C.sub,marginBottom:8,lineHeight:1.6}}>
            Describe what's wrong or missing. The AI will re-extract the BOM using your instructions, and your feedback is saved to improve future extractions.
          </div>
          <textarea
            ref={feedbackRef}
            value={aiFeedback}
            onChange={e=>setAiFeedback(e.target.value)}
            placeholder={"BOM corrections:\ne.g. Row 23 is missing — 3 items: KXTBRHEBFP, OXP10X225 and OH865L10B, all ABB qty 1.\ne.g. Row 19 quantity should be 2 not 1.\ne.g. The part number for the transformer is PH500MQMJ.\n\nLabor corrections (applied immediately):\ne.g. The wire count is not correct, base labor off 50 wires, not 25.\ne.g. Use 12 labor hours.\ne.g. Labor rate is $55/hr."}
            rows={4}

            {feedbackSaved&&<span style={{fontSize:12,color:C.green,fontWeight:600}}>✓ Feedback saved as training example</span>}
            {!feedbackSaved&&aiFeedback.trim()&&<span style={{fontSize:12,color:C.muted}}>Your feedback will be saved as a training example after re-extraction</span>}
          </div>
        </div>
      )}

      {/* Action row */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",borderTop:`1px solid ${C.border}`,paddingTop:12}}>
        {!readOnly&&tagsChanged&&bomCount>0&&(

          </button>
        )}
        {!readOnly&&(
          <div onClick={()=>{
            if(panel.budgetaryQuote){
              const updated={...panel,budgetaryQuote:null};
              onUpdate(updated);try{onSaveImmediate(updated);}catch(ex){}
            } else {
              setShowFastQuote(true);
            }
          }} style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",userSelect:"none",padding:"5px 10px",borderRadius:6,border:`1.5px solid ${panel.budgetaryQuote?C.yellow:C.border}`,background:panel.budgetaryQuote?C.yellowDim:"transparent",transition:"all 0.15s"}}>
            <div style={{width:20,height:20,border:`2px solid ${panel.budgetaryQuote?C.yellow:C.muted}`,borderRadius:4,background:panel.budgetaryQuote?C.yellow:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
              {panel.budgetaryQuote&&<span style={{fontSize:12,color:"#000",fontWeight:900,lineHeight:1}}>✓</span>}
            </div>
            <span style={{fontSize:14,color:panel.budgetaryQuote?C.yellow:C.sub,fontWeight:panel.budgetaryQuote?700:400,whiteSpace:"nowrap"}}>⚡ Fast Quote</span>
          </div>
        )}
        <div style={{flex:1}}/>
        {(panel.bom||[]).length>0&&<div style={{fontSize:13,color:C.muted}}>{panel.bom.length} BOM items{panel.validation?.wireCount>0?` · ${panel.validation.wireCount} wires`:""}</div>}
      </div>

      {showFastQuote&&(
        <FastQuoteOverlay
          project={panel}
          uid={uid}
          onUpdate={onUpdate}
          onSaveImmediate={onSaveImmediate}
          onClose={()=>setShowFastQuote(false)}
          onDone={()=>{setShowFastQuote(false);onViewQuote&&onViewQuote();}}
        />
      )}
      {lightboxId&&(
        <DrawingLightbox
          pages={pages.filter(p=>p.dataUrl||p.storageUrl)}
          startId={lightboxId}
          onClose={()=>setLightboxId(null)}
        />
      )}
      {bcBrowserOpen&&(
        <BCItemBrowserModal
          initialQuery={bcBrowserQuery}
          targetRow={bcBrowserTarget?(panel.bom||[]).find(r=>r.id===bcBrowserTarget)||null:null}
          pages={panel.pages||[]}
          onClose={()=>{setBcBrowserOpen(false);setBcBrowserTarget(null);setBcBrowserQuery("");}}
          onSelect={item=>{
            if(bcBrowserTarget){
              applyBcItem(bcBrowserTarget,item);
              if(item._created)setBcNewlyCreated(prev=>{const s=new Set(prev);s.add(bcBrowserTarget);return s;});
            }
            setBcBrowserOpen(false);setBcBrowserTarget(null);setBcBrowserQuery("");
          }}
        />
      )}
      {showCpdSearch&&<CPDSearchModal query={cpdQuery} uid={uid} panel={panel} onClose={()=>setShowCpdSearch(false)} onImportBom={rows=>{const newBom=[...(panel.bom||[]),...rows];const updated={...panel,bom:newBom};onUpdate(updated);try{onSaveImmediate(updated);}catch(e){}setShowCpdSearch(false);setCpdQuery("");}}/>}
      {showCreateItem&&<CreateItemInBCModal panel={panel} onClose={()=>setShowCreateItem(false)} onUpdate={onUpdate} onSaveImmediate={onSaveImmediate}/>}
      {showUpdateBom&&<UpdateBomInBCModal panel={panel} onClose={()=>setShowUpdateBom(false)} onUpdate={onUpdate} onSaveImmediate={onSaveImmediate} onCreateNewItem={()=>{setShowUpdateBom(false);setShowCreateItem(true);}}/>}
      {crossOrCorrectPending&&(()=>{
        const aiSug=guessCorrection(crossOrCorrectPending.origPN,crossOrCorrectPending.newPN);
        const dismiss=()=>setCrossOrCorrectPending(null);
        return ReactDOM.createPortal(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}
            onMouseDown={e=>{if(e.target===e.currentTarget)dismiss();}}>
            <div style={{background:"#0d0d1a",border:`1px solid ${C.border}`,borderRadius:10,padding:"28px 32px",minWidth:400,maxWidth:520,boxShadow:"0 8px 40px rgba(0,0,0,0.7)"}}>
              <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:6}}>APEX — Part Number Change Detected</div>
              <div style={{fontSize:13,color:C.muted,marginBottom:12}}>
                <span style={{color:C.red,fontWeight:700}}>{crossOrCorrectPending.origPN}</span>
                <span style={{color:C.muted}}> → </span>
                <span style={{color:C.accent,fontWeight:700}}>{crossOrCorrectPending.newPN}</span>
              </div>
              <div style={{fontSize:11,background:"#120a2a",border:"1px solid #a78bfa",borderRadius:6,padding:"7px 10px",marginBottom:16,display:"flex",alignItems:"center",gap:6}}>

                <span style={{color:"#a78bfa",fontWeight:700}}>APEX suggests: </span>
                <span style={{color:C.text,fontWeight:600}}>{aiSug==='format'?'Formatting Error':'Bad Extraction'}</span>

              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                <button onClick={()=>{commitBcItem(crossOrCorrectPending.bomRowId,crossOrCorrectPending.bcItem,true);dismiss();}}
